<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📖 历史绘本故事集</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>:root{--bg:#0f0e17;--card:#1a1932;--text:#fffffe;--muted:#94a1b2;--primary:#e94560;--primary-light:#2d1f3d;--accent:#f5a623;--border:#2a2a4a;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.toolbar{position:sticky;top:0;z-index:100;background:rgba(15,14,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar h1{font-size:1.1rem;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.view-toggle{margin-left:auto;display:flex;gap:4px}
.view-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.view-btn.active{background:var(--primary);color:#fff}
.refresh-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:1rem}
.refresh-btn:active{transform:rotate(180deg)}
.container{max-width:800px;margin:0 auto;padding:12px 16px 80px}
.date-section{margin-bottom:20px}
.date-header{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:.95rem;font-weight:600;color:var(--accent);border-bottom:1px solid var(--border);margin-bottom:12px}
.date-dot{width:8px;height:8px;border-radius:50%;background:var(--primary)}
.date-count{font-size:.75rem;color:var(--muted);font-weight:400}
.stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.stories-list{display:flex;flex-direction:column;gap:8px}
.story-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
.story-card:active{transform:scale(.97)}
.grid-view .story-card .card-img{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--primary-light)}
.grid-view .story-card .card-content{padding:8px 10px 10px}
.grid-view .story-card .card-title{font-size:.85rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-view .story-card .card-meta{display:flex;gap:4px;margin-top:4px;font-size:.7rem;color:var(--muted)}
.grid-view .story-card .card-tag{background:var(--primary-light);color:var(--primary);padding:1px 6px;border-radius:4px;font-size:.65rem}
.list-view .story-card{display:flex;gap:10px;padding:10px;align-items:center}
.list-view .story-card .card-img{width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--primary-light)}
.list-view .story-card .card-content{flex:1;min-width:0}
.list-view .story-card .card-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-view .story-card .card-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.list-view .story-card .card-tag{background:var(--primary-light);color:var(--primary);padding:1px 6px;border-radius:4px;font-size:.65rem;margin-left:4px}
.load-more-wrap{text-align:center;padding:20px 0}
.load-more-btn{padding:10px 32px;border-radius:24px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:.9rem;cursor:pointer;transition:all .2s}
.load-more-btn:active{transform:scale(.97)}
.load-more-btn:disabled{opacity:.4;cursor:default}
.story-counter{font-size:.8rem;color:var(--muted);margin-top:8px}
#storyPage{display:none}
#storyPage.active{display:block}
.story-back{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:6px;padding:12px 16px;background:rgba(15,14,23,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);color:var(--primary);font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
.story-back:active{background:rgba(15,14,23,1)}
.story-header{padding:56px 16px 12px}
.story-title{font-size:1.9rem;font-weight:700;line-height:1.4}
.story-era{font-size:.95rem;color:var(--muted);margin-top:4px}
.story-img{width:100%;border-radius:8px;margin:8px 0}
.story-paragraph{padding:0 16px;font-size:1.8rem;line-height:2.1;color:var(--text);margin-bottom:6px}
.moral-card{margin:16px;padding:16px;background:linear-gradient(135deg,var(--primary-light),rgba(245,166,35,.1));border-radius:var(--radius);border-left:3px solid var(--accent)}
.moral-title{font-size:1rem;font-weight:600;color:var(--accent);margin-bottom:6px}
.moral-text{font-size:1.8rem;line-height:2;color:var(--text)}
.hidden{display:none!important}
@media(min-width:768px){.container{max-width:900px;padding:16px 24px 80px}.stories-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}.grid-view .story-card .card-content{padding:10px 12px 12px}.grid-view .story-card .card-title{font-size:.9rem}.story-header{padding:56px 24px 16px}.story-paragraph{padding:0 24px;font-size:2rem;line-height:2.2}.moral-card{margin:16px 24px;padding:20px}.story-img{max-width:420px;margin:12px auto;display:block;border-radius:10px}}
@media(min-width:1024px){.container{max-width:720px;padding:20px 32px 80px}.stories-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}.story-header{padding:56px 32px 16px}.story-paragraph{padding:0 32px;font-size:2rem;line-height:2.2}.moral-card{margin:16px 32px}.story-img{max-width:400px;margin:12px auto;display:block;border-radius:10px}}</style>
</head>
<body>
<div id="homePage">
<div class="toolbar">
<h1>📖 历史绘本故事集</h1>
<button class="filter-btn active" onclick="filterStories('all')">全部</button>
<button class="filter-btn" onclick="filterStories('历史故事')">历史故事</button>
<button class="filter-btn" onclick="filterStories('名人传记')">名人传记</button>
<div class="view-toggle">
<button class="view-btn active" onclick="setView('grid')" id="gridBtn">⊞</button>
<button class="view-btn" onclick="setView('list')" id="listBtn">☰</button>
</div>
<button class="refresh-btn" onclick="location.reload()">🔄</button>
</div>
<div class="container" id="storiesContainer"></div>
</div>
<div id="storyPage">
<div class="story-back" onclick="goHome()">← 返回故事列表</div>
<div id="storyContent"></div>
</div>
<script>
const D=[{"t": "戚继光抗倭——民族英雄的故事", "e": "明代", "k": "qijiguang", "c": "历史故事", "d": "2026-06-06", "m": "面对困难要勇敢顽强，团结一心就能战胜强大的敌人。"}, {"t": "文天祥正气——留取丹心照汗青", "e": "宋末元初", "k": "wentianxiang", "c": "历史故事", "d": "2026-06-06", "m": "做人要有骨气，爱国的心永远不能丢。"}, {"t": "曹彬仁将——仁者无敌的好将军", "e": "北宋", "k": "caobin", "c": "历史故事", "d": "2026-06-06", "m": "善良和正义比武力更强大，真正的强者是保护弱小的人。"}, {"t": "黄巾起义——苍天已死黄天当立", "e": "东汉末年", "k": "huangjin_qiyi", "c": "历史故事", "d": "2026-07-03", "m": "黄巾起义虽然失败了，但它告诉我们：当老百姓活不下去的时候，就会爆发出惊天动地的力量！"}, {"t": "鸦片战争——列强敲开中国大门", "e": "晚清时期", "k": "yapian_zhanzheng", "c": "历史故事", "d": "2026-07-03", "m": "鸦片战争告诉我们：一个国家如果不进步不改革，就会挨打。落后就要挨打，这是血的教训！"}, {"t": "戊戌变法——百日维新的悲歌", "e": "晚清时期", "k": "wuxu_bianfa", "c": "历史故事", "d": "2026-07-03", "m": "戊戌变法虽然只有短短一百天，但它告诉我们：改革需要有勇有谋，更要懂得保护自己！"}, {"t": "冯如——中国航空之父", "e": "晚清时期", "k": "fengru", "c": "名人传记", "d": "2026-07-03", "m": "冯如从一个放牛娃成为中国航空之父——告诉我们：只要有梦想，肯钻研，穷苦人家的孩子也能飞上蓝天！"}, {"t": "华罗庚——自学成才的数学大师", "e": "近现代", "k": "hualuogeng", "c": "名人传记", "d": "2026-07-03", "m": "华罗庚凭着顽强的毅力自学成才，成了世界闻名的数学家——告诉我们：世界上没有天才，只有勤奋到极致的人！"}, {"t": "汉武帝北击匈奴——大汉铁骑扬国威", "e": "西汉时期", "k": "hanwudi", "c": "历史故事", "d": "2026-07-02", "m": "汉武帝敢于打破旧规矩，启用年轻人、大胆改革——告诉我们：想要做成大事，就要有敢想敢做的勇气和长远的眼光！"}, {"t": "黄巢起义——满城尽带黄金甲", "e": "唐朝末年", "k": "huangchao_qiyi", "c": "历史故事", "d": "2026-07-02", "m": "黄巢从一个书生变成起义领袖，虽然最后失败了，但他的故事告诉我们：当不公平到了极点，沉默比反抗更可怕！"}, {"t": "靖难之役——燕王叔夺位记", "e": "明朝", "k": "jingnan_zhiyi", "c": "历史故事", "d": "2026-07-02", "m": "朱棣从一个小小的藩王逆袭成为皇帝——告诉我们：面对逆境，不要轻易认输，有时候放手一搏反而能闯出新天地！"}, {"t": "唐伯虎——江南第一才子的潇洒人生", "e": "明朝", "k": "tangbohu", "c": "名人传记", "d": "2026-07-02", "m": "唐伯虎虽然一生坎坷，但他用画笔和诗歌活出了自己的潇洒——告诉我们：人生的精彩不在于顺风顺水，而在于跌倒了还能笑着站起来！"}, {"t": "曾国藩——修身齐家治国的晚清名臣", "e": "晚清时期", "k": "zengguofan", "c": "名人传记", "d": "2026-07-02", "m": "曾国藩天资并不聪明，可他靠着'笨人下笨功夫'的坚持，成了晚清第一能臣——告诉我们：聪明不如勤奋，天赋不如坚持！"}, {"t": "黄帝战蚩尤——华夏始祖的传奇之战", "e": "神话时代", "k": "huangdi_chiyou", "c": "历史故事", "d": "2026-07-01", "m": "黄帝和炎帝联手打败蚩尤的故事告诉我们：团结就是力量，只要大家齐心协力，再强大的敌人也能战胜！"}, {"t": "尧舜禅让——传贤不传亲的圣王故事", "e": "上古时代", "k": "yaoshun_shanrang", "c": "历史故事", "d": "2026-07-01", "m": "尧帝不把天下传给自己的儿子，而是传给贤能的舜——这个故事告诉我们：真正的伟大是选择最有能力的人来担当重任！"}, {"t": "大运河的故事——隋炀帝的梦想与功过", "e": "隋朝", "k": "dayunhe", "c": "历史故事", "d": "2026-07-01", "m": "隋炀帝修大运河虽然劳民伤财，但这条河连接了南北，造福了千年——历史告诉我们：任何伟大的工程，既要看到它的代价，也要看到它的价值！"}, {"t": "钱学森——中国航天之父的归国之路", "e": "现代（中国）", "k": "qianxuesen", "c": "名人传记", "d": "2026-07-01", "m": "钱学森克服千难万险回到祖国，用毕生所学建设国家——他的故事告诉我们：无论身在何处，都不要忘记自己脚下的土地！"}, {"t": "张择端——画尽汴京繁华的北宋画师", "e": "北宋时期", "k": "zhangzeduan", "c": "名人传记", "d": "2026-07-01", "m": "张择端用一支画笔，为后人留下了一幅活生生的北宋生活画卷——告诉我们：认真做好一件事，哪怕只是画画，也能名垂千古！"}, {"t": "郭子仪单骑退回纥", "e": "唐朝", "k": "guoziyi", "c": "历史故事", "d": "2026-06-30", "m": "真正的勇敢不是靠拳头——郭子仪用信任和坦诚化解了千军万马的危机，告诉我们：面对危险时，大智大勇比刀枪更有力量！"}, {"t": "刘伯温神机妙算", "e": "明朝", "k": "liubowen", "c": "历史故事", "d": "2026-06-30", "m": "真正聪明的人不打没有准备的仗——刘伯温用一次次精准的预言告诉我们：多观察、多思考，就能看到别人看不到的东西！"}, {"t": "李靖夜袭定襄", "e": "唐朝", "k": "lijin", "c": "历史故事", "d": "2026-06-30", "m": "机会来了就要果断抓住——李靖告诉我们：有时候稍一犹豫，最好的时机就永远错过了！"}, {"t": "鲁迅——以笔为刀的斗士", "e": "近代（中国）", "k": "luxun", "c": "名人传记", "d": "2026-06-30", "m": "鲁迅用一支笔唤醒了沉睡的中国人——有时候，笔杆子比枪杆子更有力量，文字能改变一个人的思想，而思想能改变整个世界！"}, {"t": "屠呦呦——一株小草改变世界", "e": "现代（中国）", "k": "tuyouyou", "c": "名人传记", "d": "2026-06-30", "m": "有时候最了不起的发现，就藏在最不起眼的地方——屠呦呦用一株小草告诉我们：坚持和专注，能把不起眼的小事变成改变世界的大事业！"}, {"t": "孙叔敖杀两头蛇", "e": "春秋时期", "k": "sunshuao", "c": "历史故事", "d": "2026-06-29", "m": "善良不是做给别人看的——孙叔敖心里装的都是别人，连遇到危险时想的都是不让别人受害，这才是真正的勇敢和善良！"}, {"t": "董狐直笔", "e": "春秋时期", "k": "donghu", "c": "历史故事", "d": "2026-06-29", "m": "真相比什么都重要——董狐用一支笔告诉我们：有时候说实话比说假话需要更大的勇气！"}, {"t": "赵奢秉公执法", "e": "战国时期", "k": "zhaoshe", "c": "历史故事", "d": "2026-06-29", "m": "法律面前人人平等——赵奢用行动告诉我们：不管你是谁，犯了法就要承担责任，这才是真正的公正！"}, {"t": "马可·波罗——从威尼斯到中国的传奇之旅", "e": "13世纪（意大利）", "k": "makeboluo", "c": "名人传记", "d": "2026-06-29", "m": "世界远比我们想象的更大更精彩——马可·波罗用他的双脚告诉我们：敢于出发，才能看到不一样的风景！"}, {"t": "顾恺之——画痴三绝的东晋画家", "e": "东晋时期", "k": "gukaizhi", "c": "名人传记", "d": "2026-06-29", "m": "真正的大师，是把热爱做到极致——顾恺之对绘画痴迷了一辈子，这份痴就是 ", "c": "历史故事", "d": "2026-05-29", "m": "唐代诗人李白曾写诗赞颂班超：\"长安什么少年儿，五十沙场竟不还。\"班超投笔从戎的故事告诉我们：读书很重要，但更重要的是知道自己想要什么，并勇敢地去追求！人生没有标准答案，适合自己的路就是最好的路！"}, {"t": "祖逖闻鸡起舞——珍惜每一天的努力", "e": "西晋时期", "k": "zuti", "c": "历史故事", "d": "2026-05-29", "m": "祖逖闻鸡起舞的故事告诉我们：想要成就一番事业，必须珍惜时光、勤奋努力！每天比别人早起一点、多努力一点，日积月累，就能取得不平凡的成就！"}, {"t": "爱迪生——发明大王的一千多项发明", "e": "近代美国", "k": "edison_bio", "c": "历史故事", "d": "2026-05-29", "m": "爱迪生一生发明了两千多种东西，获得了1093项专利，被称为\"发明大王\"。他还发明了电影摄影机、蓄电池等等。他的名言是：\"天才是1%的灵感加上99%的汗水。\"爱迪生的故事告诉我们：勤奋比天赋更重要，不怕失败才能成功！"}, {"t": "诺贝尔——用一生发明改变世界", "e": "近代瑞典", "k": "nobel_bio", "c": "历史故事", "d": "2026-05-29", "m": "诺贝尔的故事告诉我们：一个人的价值不在于拥有多少财富，而在于为人类做出了多少贡献。他发明了炸药，本可以靠此发大财，但他选择把所有的钱用来奖励那些为人类进步做出贡献的人。这种无私的精神，值得我们永远学习！"}, {"t": "莱特兄弟——让人类飞上天空", "e": "近代美国", "k": "wrightbrothers", "c": "历史故事", "d": "2026-05-29", "m": "莱特兄弟的故事告诉我们：梦想不分大小，只要敢想敢做；困难不怕多，只要坚持到底。兄弟俩用一辈子的时间研究飞行，最终让人类实现了飞上天空的梦想。只要我们像他们一样，勇敢地追求梦想，梦想就一定能实现！"}, {"t": "李时珍——走遍千山万水的药神", "e": "明朝", "k": "lishizhen_bio", "c": "历史故事", "d": "2026-05-29", "m": "《本草纲目》后来传到了全世界，被翻译成日文、英文、法文等多种文字，至今还是中医的重要参考书。李时珍的故事告诉我们：做一件有意义的事，什么时候开始都不晚；只要坚持到底，普通人也能做成伟大的事！"}, {"t": "张衡——发明地动仪的科学家", "e": "东汉时期", "k": "zhangheng_bio", "c": "历史故事", "d": "2026-05-29", "m": "公元139年，张衡在洛阳去世，享年62岁。他一生不慕名利，只喜欢研究科学和学问。美国科学家阿西摩夫曾说：\"张衡是中国文化史上一颗光芒万丈的星。\"张衡的故事告诉我们：科学是神奇的，学好科学可以造福人类！"}, {"t": "居里夫人——发光的石头", "e": "近代（1867-1934）", "k": "curie", "c": "名人传记", "d": "2026-05-29", "m": "真正的伟大不是为了自己，而是为了让更多人过得更好——居里夫人把发现献给了全世界！"}, {"t": "达·芬奇——画蛋的天才", "e": "文艺复兴（1452-1519）", "k": "davinci", "c": "名人传记", "d": "2026-05-29", "m": "打好基础比什么都重要——达·芬奇画了无数个蛋，才成了最伟大的画家！"}, {"t": "爱迪生——永不熄灭的灯", "e": "近代（1847-1931）", "k": "edison", "c": "名人传记", "d": "2026-05-29", "m": "失败不可怕，每一次失败都离成功更近一步——爱迪生试了一千次，才让灯泡亮起来！"}, {"t": "牛顿——苹果的秘密", "e": "近代（1643-1727）", "k": "newton", "c": "名人传记", "d": "2026-05-29", "m": "多观察、多思考，再普通的事情里也可能藏着大秘密——牛顿就是从一个苹果发现了万有引力！"}, {"t": "诺贝尔——炸药之父", "e": "近代（1833-1896）", "k": "nobel", "c": "名人传记", "d": "2026-05-29", "m": "失败不是终点，而是通往成功的必经之路——诺贝尔失败了一千多次，才发明了炸药！"}, {"t" const P={"pangu": ["很久很久以前，在那个连天和地都还没分开的年代，整个宇宙就像一个大鸡蛋，圆滚滚、黑乎乎的，什么都看不见。在这片混沌之中，躺着一个叫盘古的巨人，他睡得可香啦，足足睡了一万八千年那么久！", "有一天，盘古忽然睁开了眼睛。周围黑漆漆的，什么也看不清，他急得挥起拳头朝四周砸去——轰隆隆！大鸡蛋裂开了一道缝，光透了进来！原来是轻飘飘的东西往上飘，变成了蓝蓝的天空；沉甸甸的东西往下坠，变成了厚厚的大地。", "盘古可高兴了，他站起身，头顶天，脚踩地。为了不让天再塌下来，他每天都努力长高，天就每天升高一丈；地就每天加厚一丈。风儿吹过他的耳边，雨儿落在他的肩头，日复一日，年复一年，又过了一万八千年。", "终于，天变得又高又远，地变得又厚又实。可盘古实在太累太累了，他轰的一声倒在了地上，再也没有起来。他的左眼变成了红红的太阳，右眼变成了白白的月亮。", "他的头发飞上了天，变成了闪闪的星星。他的呼吸变成了轻柔的风，他的血液变成了奔腾的江河，他的骨头变成了地下的矿石，他的汗水变成了滋润万物的雨露。", "盘古用他整个的身体，创造了我们这个美丽的世界。每当我们仰望星空，看到太阳和月亮，都应该感谢这位伟大的巨人——盘古！", "盘古开天辟地的故事告诉我们：伟大的事业需要无私的奉献和坚持不懈的努力！"], "nuwa": ["传说在很久很久以前，水神共工和火神祝融打起仗来。共工打不过，一气之下撞断了撑天的柱子——不周山。天塌了一半，大地裂开了好多好多口子，洪水到处乱流，大火到处乱烧，野兽也跑出来伤害人们，大家可害怕了！", "女娲是人类的母亲，她看到自己创造的人们受苦受难，心里可疼了。她决定要把天补好，让人们重新过上平安的日子。", "女娲走遍了千山万水，历经千辛万苦，终于在昆仑山上找到了五种颜色的石头——青色的、红色的、黄色的、白色的、黑色的。她架起一口大锅，用神火把这些石头熔化成液体。", "女娲飞到天上，一点一点地补着天上的窟窿。这活儿可真辛苦啊！她的手被烫起了一个个大水泡，肩膀酸得都快抬不起来了，翅膀也累得扑扇扑扇的。可她一刻也不肯停下来，因为她知道人们在等着她。", "终于，天上最后一个大窟窿被补好啦！可是天还是歪歪的，摇摇晃晃的。女娲又四处寻找，最后找来一只巨大的神龟，砍下它的四条腿，竖在大地的四个角落，把天空稳稳地撑住。", "从此，天再也不会塌下来了，洪水也退去了，大火也熄灭了。人们又回到了田野，重新种起了庄稼，过上了平平安安的日子。大家都感激地说：多亏了女娲娘娘啊！", "女娲补天的故事告诉我们：看到别人受苦就要勇敢地帮忙，哪怕再难再累也要坚持到底！"], "dayu": ["很久以前，天下突然发了大洪水，洪水像凶猛的野兽一样冲垮了房屋，淹没了田地，人们无处可逃，四处流浪乞讨。住在岸边的部落首领鲧想了一个办法——用泥土和石块把洪水堵住。", "可是你知道吗？光堵是堵不住的！洪水越堵越高，最后冲破了堤坝，淹没了更多的村庄。鲧的办法彻底失败了，他也因为治水不力被处罚了。", "鲧的儿子大禹长大了，他接过了父亲的重任。大禹想：堵不是办法，得让洪水有地方流走才行！于是他改用疏导的方法，带领百姓挖河开渠，把洪水引向大海。", "大禹每天都和百姓一起干活，风里来雨里去，从不偷懒。他的手上磨出了厚厚的茧子，脚上全是水泡，脸也被太阳晒得黑黑的，但他从不说苦。", "大禹刚结婚才四天，听说洪水还在危害百姓，就告别了新娘子出门治水去了。在接下来的十三年里，他三次路过自己的家门，听到屋里妻子温柔的声音和孩子们嬉闹的笑声，可他一次也没有进去看过。", "他心里多想进去抱抱妻子、亲亲孩子啊！可是他想，如果我回家了，洪水就会继续伤害更多的家庭。最后一次路过时，他听到妻子对孩子们说：你们的爸爸是个英雄，正在保护我们呢！大禹听了，眼泪在眼眶里打转，但他的脚步还是没有停下。", "经过十三年的努力，九条大河终于被疏通了，滔滔的洪水乖乖地流进了大海。田地重新露出了水面，人们又回到了自己的家乡，过上了幸福的生活。大家感激地说：大禹真是我们的救命恩人啊！", "大禹治水的故事告诉我们：遇到问题要动脑筋找对方法；为了大家的幸福，有时要舍小家为大家！"], "caochong": ["三国时候，有人送给曹操一头大象。哇，这头大象可大了！腿像四根粗粗的大柱子，耳朵像两把大大的扇子，身子像一堵高高的墙。大象慢悠悠地走着，鼻子甩来甩去，可威风了！", "曹操和大臣们都想看看这头大象有多重，可是大象那么大，哪有那么大的秤啊？有人说把大象切成一块一块的称，可那大象不就死了吗？大家你看看我，我看看你，谁也想不出好办法。", "这时候，曹操七岁的小儿子曹冲从人群里钻了出来。他眨巴眨巴大眼睛，忽然说：我有一个办法！曹操笑着说：哦？那你说说看。", "曹冲拍拍手说：很简单！先把大象赶上这艘大船，看船身下沉到哪里，就在船舷上画一条线。然后把大象牵上岸，再往船上装石头，装到船沉到画线的地方。最后啊，只要把石头一筐一筐地称出来，加在一起，不就是大象的重量了吗？", "大臣们听了，眼睛都亮了起来！曹操也连连点头：好办法，好办法！于是大家照着曹冲说的做，先把大象赶上船，在船舷上画线，再一块块往船上装石头，最后称石头的重量，果然称出了大象的重量！", "大臣们纷纷竖起大拇指，夸赞道：这孩子才七八岁，怎么这么聪明啊！曹操摸着胡子，得意地笑了：我的冲儿，真是我的好儿子啊！曹冲称象的故事告诉我们：别人说不可能的时候，不要轻易放弃，换个角度想一想，也许办法就出来了！"], "jingwei": ["在很久很久以前，太阳神炎帝有一个最疼爱的小女儿，名叫女娃。女娃长得漂亮又可爱，她最喜欢到东海去玩耍。蓝色的海水波光粼粼，海鸥在天空飞翔，小鱼在浪花里跳跃，女娃玩得可开心啦！", "可是有一天，灾难突然降临了！东海的上空刮起了狂风，掀起了巨浪，一个比房子还高的浪头猛地扑过来，把女娃的小船打翻了。无情的大海吞没这个可怜的小姑娘。", "女娃不甘心就这样死去，她的灵魂化作了一只小鸟。这只小鸟长得很特别：小小的脑袋上长着花色的羽毛，白白的嘴巴尖尖的，红红的脚爪细细的。它飞在天空中，不断地叫着：精卫！精卫！人们就把它叫做精卫鸟。", "精卫恨透了夺走她生命的大海。她望着无边无际的大海，心里想：都是你害死了我，我一定要把你填平！于是，她每天从西山的树林里衔起小石子，又衔起小树枝，飞到东海上空，把它们投进大海里。", "大海看着这只小小的鸟儿，忍不住嘲笑它：小鸟儿，你这样子，要干一百万年也填不平我呀！还是回家歇着去吧！", "精卫坚定地回答说：就算一千万年！就算一万万年！我也一定要填平你！我绝不放弃！说完，它又扑扇着翅膀，飞向西山，去衔新的石子和树枝了。", "日复一日，年复一年，精卫从不休息，从不间断。虽然它那么弱小，可它那坚定的身影，却成了天空中最美丽的风景。它告诉我们：不管别人怎么说，认定了目标就坚持去做——不放弃本身就是一种了不起的力量！"], "shennong": ["在远古时候，人们靠打猎和采集野果生活。可是你知道吗？那时候人们还不知道什么植物能治病，生病了只能硬扛着，很多人因为得不到救治就这样失去了生命。", "部落的首领神农看到人们受苦，心里着急极了。他决定要把所有能治病的植物都找出来，教会人们用草药治病。于是，他告别了家人，独自走进了深山老林。", "神农亲自品尝每一种他遇到的植物——甜甜的果子、苦涩的草根、辣辣的叶子、麻麻木木的树皮。他仔细分辨：这种草吃了肚子疼，不能吃；那种花泡水喝可以退烧，可以记下来。", "传说神农有一双神奇的眼睛，他的肚子像水晶一样透明，能清清楚楚地看到吃进去的植物在身体里的变化——哪株草在胃里发热，哪个根在肠子里发凉，一看就知道它们能治什么病。", "可是尝草治病太危险了！有时候一天之中就要中毒好几次。神农的肚子疼得直打滚，脸都变绿了，冷汗直往下流。身边的人赶紧给他吃解毒的草药，他才慢慢缓过来。", "虽然这么辛苦，神农却从不肯停止。因为他心里想着：每多尝出一种有用的药，就能多救一个人的命！就这样，他尝遍了山里的各种植物，最后终于总结出了一百多种可以治病的草药。", "神农把这些草药的形状、颜色、味道、功效都告诉了人们，还画成了图。从那以后，人们生了病就知道该吃什么草药，再也不用害怕了。后人尊称他为：医药之祖！神农尝百草的故事告诉我们：帮助别人需要勇气，更需要行动！"], "goujian": ["春秋时候，越王勾践带领着越国的军队和吴国打仗。可是吴国太强大了，越国大败，越王勾践也被抓去当了俘虏。他住在简陋的石屋里，白天养马、喂马，晚上就睡在柴草堆上。堂堂一国之君，现在却要干下人的活儿，吴王夫差还经常羞辱他。", "三年后，吴王终于把勾践放回了越国。勾践一回到自己的国家，就搬出了豪华的王宫。他让人在地上铺上柴草，睡在硬邦邦的柴草上——这哪里是睡觉啊，简直是受罪！", "可是勾践觉得这样还不够。每天吃饭前、睡觉前，他都要舔一舔挂在房梁上的苦胆。那苦胆的味道可真苦啊，苦得舌头发麻、眼泪直流！勾践的心里想着：这苦胆的味道，就是在提醒我——不要忘记在吴国受到的耻辱，不要忘记越国人民的期望！", "勾践不仅自己吃苦耐劳，还和百姓一起下地干活。他的王后也带头织布，养蚕种桑。勾践还鼓励老百姓多开垦荒地、多种粮食，人口也要越来越多。十年生聚，十年教训，越国一天天地强大起来。", "二十年过去了，勾践觉得报仇的时机终于成熟了。他亲自率领越国的精兵，向吴国发起进攻。这一仗打得可激烈了！越国的士兵们一个个奋勇杀敌，因为他们都知道：我们的王卧薪尝胆二十年，就是为了今天！", "最后，越国大获全胜，打败了吴国，彻底洗雪了当年的耻辱！卧薪尝胆的故事告诉我们：失败不可怕，只要记住教训、默默努力变强，总有一天能重新站起来！"], "wanbi": ["战国时候，赵国得到了一块天下闻名的宝玉——和氏璧。这块玉洁白无瑕，温润如水，价值连城。秦国的秦昭王听说了，派人给赵王送信说：秦王愿意用十五座城池来换这块和氏璧！赵王又高兴又发愁。高兴的是秦王居然愿意用十五座城来换！发愁的是：秦王一向说话不算话，万一他把玉拿走了，城池却不给怎么办？", "赵国的臣子们议论纷纷，这时候，一个叫蔺相如的小官站了出来。他挺起胸膛说：大王，让我带着和氏璧去秦国吧！如果秦王真的给城，我就把玉给他；如果他耍花招，我一定把玉完好无损地带回来！", "蔺相如到了秦国，把和氏璧恭恭敬敬地献给秦王。秦王接过璧，左看右看，爱不释手，连连赞叹：好玉！好玉！可是他左看右看，就是一个字也不提给城的事。蔺相如看在眼里，心里明白了。他走上前去，假装指着璧上的一个小地方说：大王，这块玉上有一个小斑点，请让我指给您看。", "蔺相如接过和氏璧，退后几步，靠在大柱子上，眼睛瞪得圆圆的，头发都竖起来了——他怒发冲冠！只听他大声说：大王，秦国自恃强大，从来就不讲信用。今天您拿着璧左看右看，却不提给城的事，分明是在骗我！如果您硬要强夺，我就把璧和脑袋一起撞碎在这根柱子上！", "秦王一看急了：这么珍贵的玉撞碎了多可惜啊！他连忙说：别别别，有话好好说。蔺相如趁机说：那请您斋戒五天，举行一个隆重的仪式，我再把玉献给您。秦王只好答应了。蔺相如回到宾馆，连夜让人把和氏璧偷偷送回了赵国。", "五天后，秦王举行仪式，蔺相如空手来了，笑着说：大王，和氏璧已经回赵国了。您要是真心换玉，就先把十五座城交给赵国吧。秦王和大臣们听了，又气又惊。可是蔺相如已经把玉送回去了，秦王杀了他也没用，反而会让天下人笑话。最后，秦王只好放了蔺相如，让他回了赵国。蔺相如凭着勇气和智慧，完好无损地把和氏璧带回了赵国。人们都夸他是：真正的勇士！", "完璧归赵的故事告诉我们：面对强大的对手，不要害怕也不要看轻自己，用智慧和勇气就能保护自己的东西！"], "mengmu": ["战国时候，有个大思想家叫孟子，他的名字叫孟轲。可是你知道吗？孟子小时候可调皮了，他能成为大思想家，多亏了他的好妈妈！孟子小时候，他们家住在墓地旁边。什么叫墓地呢？就是埋死人的地方。", "隔壁邻居家里有人去世了，大人们穿着白衣服，又哭又拜的。小孟子觉得有趣极了，就跟着学：跪下磕头，哭哭啼啼，还学人家喊号子。孟子的妈妈看见了，皱起了眉头：这里的环境不行啊！孩子天天学这些，以后还能有什么出息？不行，我们得搬家！", "于是，孟家搬到了集市旁边。集市可热闹了，吆喝声此起彼伏：卖菜啦！新鲜的蔬菜！便宜卖啦！小孟子又觉得新鲜有趣，开始学起商人吆喝叫卖：走过路过不要错过啊！", "孟子的妈妈又皱起了眉头：不行不行，这里也不行！商人整天只想着赚钱，孩子跟着学，以后还能好好读书吗？不行，再搬！", "这一次，孟家搬到了学堂旁边。每天清晨，小孟子都能听到学堂里传来朗朗的读书声。他也跟着咿咿呀呀地念了起来，学堂里的学生见到小孟子，都很有礼貌地行礼问好。小孟子也学着大人的样子，恭恭敬敬地作揖问好。他开始变得懂事起来，也喜欢上了读书学习。", "孟子的妈妈终于满意地笑了：这里才是好地方啊！从那以后，孟子就在学堂旁边住了下来，天天跟着学生们读书，渐渐地成了一个有学问的人。后来，孟子成了中国古代最伟大的思想家之一，和孔子一起被后人称为孔孟之道。大家都说：这可离不开孟妈妈当初三次搬家的决定啊！", "孟母三迁的故事告诉我们：好的环境和朋友会让我们变得更好，选择和谁在一起、住在什么地方，真的很重要！"], "tiechu": ["唐朝时候，有一个著名的大诗人叫李白。李白的诗写得可好了，后人称他为诗仙。可是你知道吗？李白小时候其实不爱读书，经常逃学出去玩呢！", "有一天，小李白又偷偷溜出了学堂，跑到山间的小河边玩耍。河水哗哗地流着，鸟儿在枝头唱着歌，李白玩得可开心了。忽然，他看见一位白发苍苍的老婆婆坐在河边的石头上，手里拿着一根粗粗的铁棒，正在石头上磨来磨去。老婆婆累得满头大汗，那铁棒却才磨掉了一点点。", "小李白好奇地走过去，歪着脑袋问：老婆婆，您这是在干什么呀？老婆婆抬起头，擦了擦汗，笑眯眯地说：我要把它磨成一根绣花针。小李白瞪大了眼睛：绣花针？这么粗的铁棒要磨成细细的针？那得磨到什么时候啊！", "老婆婆笑了笑，眼睛里闪着光芒：只要功夫深，铁棒也能磨成针。我今天磨一点，明天磨一点，只要每天不停地磨，总有一天能磨成！", "小李白听了老婆婆的话，心里像被什么东西震了一下。他呆呆地站在那里，想了很久很久。老婆婆那么大的年纪了，还这么有耐心，每天坚持磨针。而我呢？读书才读了一点点，就嫌枯燥想放弃……老婆婆看出了小李白的心思，和蔼地说：小娃娃，读书也是一样的道理啊，每天学一点，日积月累，就能成为有学问的人啦！", "小李白听了老婆婆的话，心里一震：老婆婆说得太有道理了！我读书怎么能半途而废呢？从此以后，他发愤苦读，再也不逃学了。后来，李白真的成了中国最伟大的诗人之一，他的诗流传了一千多年，影响了一代又一代的人。", "铁杵磨针的故事告诉我们：再难的事情，只要坚持下去就一定能做到——坚持就是最大的力量！"], "caochuan": ["三国时候，蜀国和吴国是联合抗曹的盟友。蜀国有个特别聪明的人叫诸葛亮，吴国的大都督周瑜却非常嫉妒他的才能，总想找机会为难他。有一天，周瑜把诸葛亮请来议事。周瑜假惺惺地说：诸葛先生，曹军就在江北，水军是我们的弱项，急需十万支箭。麻烦您在十天内造出来。诸葛亮笑了笑，摇了摇羽毛扇说：十天？不需十天，三天就够！周瑜心里乐开了花：三天？立下军令状吧！诸葛亮二话不说，签了字，转身走了。", "周瑜暗自得意：三天？就算三十天也造不出十万支箭啊！第一天过去了，诸葛亮什么事也没做，只是让士兵们准备船和稻草人。士兵们疑惑不解：都督只给了三天时间，我们不造箭，干什么呢？第二天又过去了，诸葛亮还是在喝酒聊天，好像完全不着急。士兵们急得像热锅上的蚂蚁。", "第三天一大早，天阴沉沉的，江面上起了大雾，白茫茫的一片，什么都看不清。诸葛亮把士兵们召集起来，下令出发！士兵们把二十条小船排成一排，每条船上扎满了稻草人，远远看去，就像真人站在船上一样。船队趁着大雾，向江北的曹营驶去。", "曹操在营中听到报告：东吴的军队趁着大雾杀过来了！曹操心想：雾这么大，一定有埋伏！他连忙下令：弓箭手准备，往江面上射箭！不许让敌人靠近！一时间，万箭齐发，箭像雨点一样飞过来。那些箭全都射在了稻草人身上，密密麻麻，多得像刺猬一样。等稻草人身上的箭射满了，诸葛亮命令士兵们把船调头，另一面也射满了箭。", "天渐渐亮了，雾也开始散了，诸葛亮满载着十万支箭，命令船队凯旋而归。东吴的士兵们高声欢呼：诸葛亮真神人啊！周瑜听说后，惊讶得说不出话来。原来啊，诸葛亮早就算准了三天后会有大雾，他利用曹操多疑的性格，借来了十万支箭。这个计谋，就叫做——草船借箭！", "草船借箭的故事告诉我们：遇到难题不要慌，开动脑筋想办法。有时候换个思路，就能把不可能变成可能！"], "zhishang": ["战国时候，赵国有一位著名的将军叫赵奢，他打起仗来又勇又猛，立下过很多战功。赵奢有个儿子叫赵括，从小就聪明伶俐，特别爱读兵书。什么孙子兵法、吴子兵法，他都能倒背如流。谈起兵法来，那是头头是道，口若悬河，连他爸爸赵奢都说不过他。", "赵括很骄傲，觉得自己天下无敌，心想：爸爸不过是个武将，没读过几本书，我读了这么多兵书，肯定比他强多了！秦国听说赵奢死了，又听说他儿子赵括熟读兵书，便想了一个计谋。他们故意派人在赵国散布谣言：秦军最怕的，就是赵奢的儿子赵括啊！", "赵王听了谣言，信以为真，就下了一道命令：让赵括代替老将军廉颇，去前线指挥军队。蔺相如听说后，赶紧跑去劝赵王：大王啊，赵括只会纸上谈兵，没有实战经验，可不能让他当将军啊！可惜赵王不听。", "赵括一上任，就骄傲地说：廉颇那个老头子太胆小了，只会躲着不打仗。看我的，我要主动进攻，一定能打败秦军！可是赵括哪里知道，秦国这次派来的将军是大名鼎鼎的白起！白起早就设下了计策。他假装战败撤退，引诱赵括带领大军追上来，等赵括的军队追到秦军的营地，白起一声令下：切断他们的退路！秦军从两翼包抄过来，把赵军围得水泄不通。", "赵括这才知道中计了，可是已经太晚了。白起又派人切断了赵军的粮草通道。赵军被围困了四十多天，粮食吃光了，水也喝光了，有的甚至开始互相残杀。赵括亲自带队冲杀，想杀出一条血路，可每次都失败了。最后，在一次突围中，赵括被秦军的乱箭射死。四十万赵军全部投降了，白起却下令把他们全部活埋。", "赵国从此一蹶不振，再也没有力量和秦国抗衡了。而赵括，也在这场战役中战死沙场，留下了一个千古教训：光会说不一定会做，本事要靠真刀真枪地练出来。只会纸上谈兵，可不行！"], "maosui": ["战国时候，赵国的都城邯郸被秦国军队团团包围了。赵王急得像热锅上的蚂蚁，连忙派平原君去楚国求救。平原君是赵国的相国，他要挑选二十个有勇有谋的门客，一起去说服楚国出兵。挑来挑去，只选中了十九个，还差一个。", "这时，一个叫毛遂的门客站出来说：先生，让我一起去吧！平原君看了他一眼，问：你来了几年了？毛遂回答：三年了。平原君摇摇头：你来三年了，我都没听说过你有什么本事，我看还是算了吧。毛遂不慌不忙地说：先生，如果我是埋在土里的锥子，您把我放进口袋，我早就脱颖而出了。现在我还没出头，是因为您没有给我机会啊！", "平原君听了，觉得这个人说话不一般，就答应带他一起去。其他的门客们偷偷笑话毛遂：就他？去了也是白去！到了楚国，平原君和楚王谈判。从早上谈到中午，从中午谈到下午，楚王就是不肯答应出兵。十九个门客急得团团转，可是谁也想不出办法。", "这时候，毛遂站了出来。他按着剑，大步走上前去，对楚王说：楚国的土地有你们赵国的五倍大，兵有你们赵国的十倍多。可是现在邯郸被围，你们却不肯帮忙，这是为什么？楚王听了，脸色变了。毛遂继续说：想当年，楚国被吴国欺负，连国都都被打进了，大王您忘了吗？今天秦国又来欺负我们，如果我们不团结起来，下一个被灭的就是楚国！", "毛遂的话字字句句说到了楚王的心坎上。楚王一拍桌子：说得好！我楚国愿意和赵国联合抗秦！于是，楚王和平原君当场歃血为盟，决定一起出兵救赵。平原君回到赵国后，感叹地说：毛遂的三寸之舌，比百万大军还厉害啊！我看人还是看走眼了！从此，平原君对毛遂刮目相看，把他当作上宾对待。", "毛遂自荐的故事告诉我们：机会是要靠自己争取的，有才能就要勇敢地展现出来！"], "pofu": ["秦朝末年，天下大乱。陈胜、吴广起义后，各路英雄纷纷响应，其中最厉害的一支队伍是由项羽带领的楚军。有一天，项羽带着军队去救赵国，必须渡过一条叫漳水的河。过了河就是秦军的营地，那里有二十万秦军等着他们呢。", "对岸的秦军看到楚军来了，哈哈大笑：就凭你们这点人马，还想打过长江去？做梦吧！楚军的士兵们听了，心里都有些害怕。项羽站在船头，看着对岸耀武扬威的秦军，眉头紧锁。他知道，如果这次不打赢，士兵们以后就没有勇气了。", "船靠了岸，项羽跳下船，拔出腰间的宝剑，高高举起，大声喊道：弟兄们！我们的粮食不多了，过了河就没有退路！我现在下令：把做饭的锅全部砸碎！把渡河的船全部凿沉！", "士兵们惊呆了：什么？把锅砸了？那我们吃什么？把船凿沉？那我们怎么回去？项羽大声说：没有退路了！只能前进！今天，要么我们打败秦军，要么就死在这里！", "项羽身先士卒，第一个冲向了秦军。士兵们看到主帅这么勇猛，士气大振，一个个嗷嗷叫着跟了上去。楚军士兵们个个以一当十，越杀越勇。九次大战，九次胜利，杀得秦军人仰马翻，血流成河。秦军的主将王离被活捉了，苏角被杀死了，涉间不肯投降，自己跳进火里烧死了。", "这一仗，楚军以少胜多，打败了强大的秦军，威名传遍了天下！楚军士兵们激动地欢呼：霸王万岁！项羽站在尸山血海之中，仰天大笑。从此，项羽有了一个响亮的名号——西楚霸王！", "破釜沉舟的故事告诉我们：下定决心、断了退路，反而能激发全部的勇气和力量！"], "sangu": ["三国时候，有一个叫刘备的英雄。他虽然姓刘，是汉朝皇室的后代，可是他的日子过得很苦，整天东奔西跑，没有一块属于自己的地盘。后来，刘备听说有一个叫诸葛亮的奇才，人称卧龙先生。这个诸葛亮住在襄阳城外一座小山上的茅草屋里，据说上知天文，下知地理，是个了不起的能人！刘备心想：我要是能得到诸葛亮的帮助，何愁大业不成？于是他带着关羽、张飞两位兄弟，第一次去请诸葛亮出山。三个人骑着马，翻山越岭，好不容易找到了那座小山。可是到了诸葛亮家门口，却发现先生不在家——他出门会友去了。刘备扑了个空，只好失望地留下姓名，转身回去了。", "过了几天，刘备不死心，带着关羽、张飞第二次去请诸葛亮。这一次，诸葛亮还是不在家——他云游去了，不知道什么时候才能回来。张飞不耐烦了，他气呼呼地说：大哥，这个山野村民有什么了不起的？我看他就是个骗子！您等着，我骑快马去把他绑来！刘备赶紧拦住他：翼德，不可无礼！诸葛亮先生是有真本事的人，我们要有诚意！张飞只好作罢。", "又过了一段时间，刘备决定第三次去请诸葛亮。这次张飞都要炸了：大哥，还去？不去不去，去了也是白去！刘备笑着说：不去怎么知道呢？第三次到了诸葛亮家门口，刘备远远就看到门半开着，心想这次一定在家了！谁知进去一看，诸葛亮正躺在草堂里睡午觉呢。张飞气得吹胡子瞪眼：好啊，让我大哥在外面等着，他倒睡大觉！我去把他的草堂点了！关羽赶紧拉住他：大王不是说了吗？要有诚意！刘备站在门外，静静地等着。他等啊等，从上午等到中午，又从中午等到下午。站得腿都酸了，可他一动不动，生怕吵醒了诸葛亮。", "终于，诸葛亮醒了。他睁开眼，看到刘备站在门外，又惊又喜：哎呀，刘皇叔来了，您怎么不叫我呢？刘备说：是我打扰先生休息了，不敢叫啊。诸葛亮被刘备的诚意深深感动了，他知道刘备是真心实意来请自己的，于是答应了出山。从那以后，诸葛亮就成为了刘备身边最重要的军师，帮助刘备建立了蜀国，和魏国、吴国形成了三足鼎立的局面。", "三顾茅庐的故事告诉我们：真诚和耐心能打动人心。想请高人帮忙，就要有放下身段的诚意！"], "xuanshencigu": ["战国时候，有两个出了名的大学问家——孙敬和苏秦。他们后来都当了大官，可是你知道吗？他们小时候读书可辛苦了，都是靠着自己不懈的努力才成功的！", "先说说孙敬吧。孙敬是洛阳人，他家里穷得叮当响，买不起书。可是他特别爱学习，每天都去村里的学堂门口站着，偷偷地听先生讲课。先生被他感动了，就免费借书给他看。", "孙敬如获至宝，他白天干活，晚上读书。可是他太困了，看着看着书，眼睛就睁不开了。有一天晚上，孙敬又困得不行了，头一歪，脑袋差点撞到墙上。", "他急中生智，找来一根绳子，把自己的头发绑起来，绳子的另一头系在房梁上。这样一打瞌睡，头往下一垂，头发就会被绳子扯住，疼得他一下子清醒过来！孙敬就是这样逼着自己读书的。", "再说说苏秦。苏秦是洛阳人，他也是家里穷，读不起书。可是苏秦不甘心，他决定去各国游说，希望能得到国君的重用。他跑了很多地方，说了很多话，可是没有一个人相信他。", "苏秦灰溜溜地回了家。家里人都嘲笑他：你看你，出去转了一圈，什么官也没当上，还欠了一屁股债！妻子不理他，嫂子不给他做饭，连父母都不想认他了。苏秦又难过又惭愧，他躲在房间里，呜呜地哭了起来。", "哭完了，苏秦擦干眼泪，对自己说：都是我自己没用，怪不得别人！从今天起，我要发愤读书！他从箱子里翻出一本叫《阴符经》的书，每天天不亮就起来读书，一读就是好几个时辰。", "读到困的时候，苏秦实在撑不住了，就拿起锥子，往自己的大腿上扎一下！疼得他倒吸一口凉气，一下子就清醒了。有时候扎得太狠，血都流到了地上，染红了草席。", "就这样，苏秦整整读了一年书。一年后，他再次出门游说各国。这一次，他口若悬河，说得头头是道各国的国君都被他的才华折服了。最后，苏秦当上了六个国家的宰相，佩带着六国相印，风光极了！", "悬梁刺股的故事告诉我们：想要成功就必须付出努力，哪怕条件再艰苦，也不能放弃学习！"], "fujingqingzui": ["战国时候，赵国有两位大臣——蔺相如和廉颇将军。蔺相如因为完璧归赵和渑池会两件事立了大功，被赵王封为上卿，地位比廉颇将军还要高。", "廉颇将军心里可不服气了。他想：我廉颇在战场上拼死拼活，打了多少胜仗，才当上大将军。这个蔺相如不过是个耍嘴皮子的，凭什么爬到我头上去？", "廉颇逢人就说：蔺相如算什么！如果让我碰见他，我一定要给他点颜色看看！这话传到了蔺相如的耳朵里，他怎么办呢？", "蔺相如的部下知道了这件事，都很生气。有人对蔺相如说：大人，您官居高位，廉颇这样说您，太过分了！您让我们去揍他一顿吧！", "蔺相如笑着摇摇头说：你们想想，是秦王厉害，还是廉颇将军厉害？大家说：当然是秦王厉害。蔺相如说：对啊，秦王那么厉害，我都不怕他，难道我还怕廉颇将军吗？", "蔺相如喝了口茶，继续说：你们知道吗？我和廉颇将军，就像赵国的两只胳膊。如果我和他闹翻了，秦国就会趁机来打我们。我躲着廉颇将军，不是因为怕他，而是为了我们赵国的安宁啊！", "廉颇将军听说这番话后，羞得满脸通红。他想：蔺相如大人真是心胸宽广，处处为国家着想。而我呢？只顾着自己的面子，还到处说他的坏话，我真是太不应该了！", "这一天，廉颇将军脱下战袍，换上一身普通的衣服，扛着一根荆条，大步走向蔺相如的府邸。路人都好奇地看着他，议论纷纷：廉颇将军这是要干什么呀？", "廉颇来到蔺相如家门口，二话不说，扑通一声跪了下来，把荆条高高举过头顶。他说：蔺大人，我以前太傲慢了，说了那么多伤害您的话。今天我来向您请罪，请您用荆条狠狠地打我一顿吧！", "蔺相如连忙跑出来，扶起廉颇将军，说：将军快起来！您是赵国的功臣，我怎么舍得打您呢？两个人的手紧紧握在一起，眼泪都流了下来。", "从此，蔺相如和廉颇将军成了最好的朋友，他们一起帮助赵王治理国家，让赵国越来越强大。这就是千古流传的将相和的故事。", "负荆请罪的故事告诉我们：有错就要勇于承认，真诚道歉不丢人，反而会赢得更多人的尊重！"], "zhujiulunyingxiong": ["三国时候，曹操和刘备都住在许昌。曹操是汉朝的丞相，挟天子以令诸侯，势力可大了。刘备呢，当时还没有什么地盘，只能暂时寄居在曹操门下。", "刘备心里一直有一个梦想：光复汉室，打败曹操。可是曹操势力太大，刘备只好装作胸无大志的样子，每天在后园里种菜浇花，什么也不问。", "有一天，曹操派人来请刘备。刘备心里咯噔一下，不知道曹操找他有什么事。他忐忑不安地跟着来人走了。", "曹操见到刘备，笑着说：玄德啊，你在后园种的菜不错嘛！今天我请你喝酒，来，咱们好好聊聊。两个人面对面坐着，一边喝酒，一边聊天。", "喝着喝着，曹操突然说：玄德，你走南闯北这么多年，见过那么多英雄豪杰，你觉得谁能称得上是真正的英雄呢？", "刘备心里一惊：曹操这是在试探我呀！他故意说了一串名字：袁术兵多粮足，是英雄吧？袁绍家世显赫，是英雄吧？还有那个公孙瓒、刘表、孙策……", "曹操听着，一个劲地摇头：这些算什么英雄？刘备假装糊涂：那我可想不出来了，谁才是英雄呢？", "曹操哈哈大笑，用手指了指刘备，又指了指自己说：天下英雄，只有你和我！刘备听了，手一抖，筷子掉在了地上。", "就在这时，天上突然打了个响雷。刘备趁机说：雷声这么大，我都被吓到了！筷子都掉了。曹操看了看刘备，心想：他连打雷都怕成这样，能是什么英雄？看来是我多心了。", "其实刘备是在演戏呢！他心里暗想：好险啊！差点让曹操看穿了。幸好有雷声帮忙，否则今天可就麻烦了。", "后来，刘备找机会逃出了许昌，建立了蜀国，真的和曹操、孙权三分天下。他用行动证明了：自己才是真正的英雄！", "煮酒论英雄的故事告诉我们：真正有本事的人，往往懂得隐藏实力，等待合适的时机。英雄不问出处，是金子总会发光！"], "kongrong": ["东汉时候，有个聪明懂事的小男孩叫孔融。孔融的爸爸是朝廷里的大官，妈妈是温柔贤惠的大家闺秀。孔融是家里最小的孩子，上头还有五个哥哥。", "有一天，有人给孔家送来了一筐又大又黄的鸭梨。那筐梨一打开，香味扑鼻，馋得人直流口水。妈妈把梨洗得干干净净，端到桌上，让孩子们来吃。", "最大的哥哥先走过来，伸出手想拿最大的那个。孔融的妈妈看见了，笑着摇摇头说：等等，你们最小的小融还没来呢，等他来了再一起分吧。", "孔融从院子里跑进来，小脸红扑扑的，额头上还冒着汗珠。他看了看桌上的梨，二话不说，伸手拿了一个最小的。妈妈看见了，眼睛一亮，故意问：这么多梨，你为什么拿最小的呀？", "孔融歪着脑袋，认真地说：因为我最小呀，当然应该吃最小的。大的梨应该让给哥哥们吃。", "妈妈又问：那你还有五个哥哥呢，他们都应该比你大呀？孔融眨眨眼睛，笑着说：正因为我有五个哥哥，所以我更应该吃小的呀！这样哥哥们就会觉得我很懂事，会更喜欢我的！", "妈妈听了，感动得眼眶都红了。她把孔融搂在怀里，亲了亲他的小脸蛋：我的好孩子，你真是又聪明又懂事啊！后来，孔融长大后真的成了有名的大官，大家都说他从小就懂得谦让，长大了果然是个有品德的人。", "孔融让梨的故事告诉我们：谦让是一种美德，把好处让给别人，自己也会得到更多的快乐！"], "wangmei": ["三国时候，曹操带着军队去打仗。那是夏天，太阳火辣辣地烤着大地，道路两旁的庄稼都被晒得低下了头。士兵们穿着厚厚的铠甲，背着沉甸甸的武器，走得汗流浃背。", "走了大半天，队伍渐渐慢了下来。士兵们的嘴唇干得起了皮，嗓子眼儿里像着了火一样难受。有人开始小声抱怨：渴死了，哪儿有水喝呀？", "又走了一会儿，士兵们实在走不动了，纷纷停下来，有的坐在地上，有的靠在树上，还有人干脆扔掉了武器，瘫倒在地上。大家你看看我，我看看你，谁也不想再往前走了。", "曹操骑在马上，看见队伍停了下来，士兵们一个个有气无力的样子，心里着急极了。这可怎么办？这里前不着村后不着店，哪儿去找水呢？", "忽然，曹操眼珠一转，想出了一个主意。他扯着嗓子大声喊道：士兵们！前面有一片梅林！那里的梅子又大又酸，咬一口直流口水！咱们快点走，去摘梅子吃！", "士兵们一听有梅子吃，眼睛都亮了起来。梅子？那可是又酸又甜的东西啊！一想到这里，大家的嘴巴里就开始分泌口水，好像真的吃到了酸酸的梅子一样。", "曹操趁热打铁，指挥队伍继续前进。士兵们虽然还是很渴，但一想到前面有酸梅子吃，脚下就像生了风一样，越走越快。", "终于，他们走出了那片没有水源的地方，找到了一条小河。士兵们欢呼着跑过去，咕咚咕咚喝了个痛快。大家这才明白：曹操说的梅林其实是骗人的，可他骗得好啊！要不是他用梅子鼓励大家，说不定真有人会渴死在路上呢！", "望梅止渴的故事告诉我们：遇到困难的时候，要开动脑筋想办法。有时候，善意的谎言也能帮助大家度过难关！"], "bawang": ["两千多年前，中国正处于秦朝末年。那时候有一个力大无穷的英雄，名叫项羽。他身长八尺，力气大得能举起一口大鼎，大家都叫他西楚霸王。", "项羽身边有一个最最心爱的美人，叫虞姬。虞姬长得漂亮极了，还会唱歌跳舞。她每天陪着项羽，项羽走到哪儿，就把虞姬带到哪儿。", "可是好景不长，项羽遇到了一个强大的对手——刘邦。刘邦虽然不如项羽勇猛，但他会用计谋，身边还有许多聪明的谋士帮他出主意。", "几年打下来，项羽的军队越来越少，刘邦的军队却越来越多。最后，项羽被刘邦的大军包围在了垓下，四面楚歌。", "那天晚上，项羽坐在营帐里，愁眉不展。忽然，四面八方传来了歌声——是刘邦的军队在唱楚国的歌谣。项羽听了，大惊失色：难道楚国的土地都被刘邦占了吗？怎么连我的家乡都在唱敌人的歌？", "虞姬看到项羽忧愁的样子，心里也很难过。她强撑着笑容，为项羽倒了一杯酒，轻声说：大王，喝了这杯酒，解解乏吧。", "项羽接过酒杯，一饮而尽。他看着虞姬，眼泪差点掉下来：虞姬啊虞姬，是我连累了你……说着说着，他唱起了一首歌：力拔山兮气盖世，时不利兮骓不逝……唱着唱着，泪水就流了下来。", "虞姬也跟着唱了起来，唱完了，她忽然拔出项羽腰间的宝剑，在项羽面前翩翩起舞。跳着跳着，她猛地把剑往自己脖子上一抹……", "项羽大惊失色，连忙抱住虞姬。可虞姬已经永远闭上了眼睛，脸上还挂着微笑。项羽抱着虞姬的尸体，放声大哭。", "后来，人们用'霸王别姬'这个故事来形容英雄末路的悲壮，也用来形容一对恩爱的伴侣不得不分离的凄美。", "霸王别姬的故事告诉我们：真正的爱情可以超越生死，哪怕面临困境，也要珍惜身边的人！"], "zuchongzhi": ["在一千五百多年前的南北朝时期，有一个叫祖冲之的少年。他从小就特别爱动脑筋，对天上的星星、地上的数字都充满了好奇。别的孩子在外面玩耍的时候，他总是一个人在屋子里算啊算啊，谁也不知道他在算什么。", "祖冲之的爷爷是朝廷里专门管天文历法的官员，从小就教他读书认字。有一天，小冲之问爷爷：'爷爷，圆的东西到底能分成多少份呢？'爷爷捋着胡子说：'古人说圆周一周三，简单说就是三比一，可这不太精确啊。'小冲之眨眨眼睛：'那我来算算看！'", "从此，祖冲之就像着了魔一样，整天对着圆圈研究。他找来一根竹棍当作圆规，在地上画了无数个圆圈，又找来很多小竹棍，一根一根地量。他量了一遍又一遍，算了一天又一天，连吃饭睡觉都在想这个圆周率到底该是多少。", "有人笑话他说：'这孩子是不是傻了？古人都说圆周三，这就是规矩，还费什么劲呢？'可祖冲之却认真地说：'古人的话不一定都对，我就要亲自算出来！'他坚持用'割圆术'的方法，把圆切成越来越多的小块来计算。", "经过无数个日夜的努力，祖冲之终于算出了圆周率在3.1415926和3.1415927之间！他还发明了'密率'355/113，这是当时世界上最精确的圆周率计算！", "你知道吗？祖冲之的这个发明，比欧洲早了整整一千多年呢！直到一千多年后，欧洲的数学家才算出同样的结果。祖冲之的成就让全世界都对中国古代数学刮目相看！", "祖冲之的故事告诉我们：不要迷信权威，要敢于质疑、勇于探索。认真坚持地做一件事，就一定能取得成功！"], "lishizhen": ["四百多年前的明朝，有一位了不起的医生叫李时珍。他从小就跟着父亲学医，每天跟着父亲上山采药，回家后帮父亲切药、晒药、磨药。虽然他只有十几岁，但对各种草药已经非常熟悉了。", "李时珍二十多岁的时候，已经成了当地很有名气的医生。可是他发现一个问题：以前的药书里有很多错误，有些药名对不上图片，有些药效写错了，还有些药根本就是毒性很大的，但书里却写着可以随便吃。", "'这样的书会害死人的！'李时珍皱起眉头，决心要重新写一本正确的药书。父亲知道后担心地说：'这可是个大工程啊，你想想清楚！'可李时珍坚定地说：'医生治病救人，不能有半点马虎，我一定要做这件事！'", "从那以后，李时珍背上药筐，带上纸笔，开始了他的寻药之旅。他翻过高山，蹚过河流，走过森林，去过草原。为了找到一种叫'薪蛇'的药蛇，他冒着生命危险跑到深山老林里；为了看清一种草药的生长过程，他在山里住了整整三个月。", "整整二十七年，李时珍走遍了大江南北，尝遍了各种草药，记录了几十万字的笔记。终于在他六十岁那年，一本叫《本草纲目》的书诞生了！书里记载了1892种药物，是当时最全、最准确的药书。", "你知道吗？《本草纲目》后来被翻译成很多国家的文字，传遍了全世界。直到今天，中医还在用这本书里的很多药方呢！", "李时珍的故事告诉我们：做事情要有始有终，不怕困难，坚持到底。把一件平凡的事做到极致，就是不平凡！"], "zhangheng": ["一千九百多年前的东汉时期，有一个人叫张衡，他从小就心灵手巧，特别喜欢研究各种机械和天文。别的孩子玩泥巴的时候，他就用木头做小车子、小风车，做得像真的一样会动！大家都叫他'小鲁班'。", "张衡长大后当了官，可他最喜欢的事情还是搞发明创造。那时候，经常发生地震，有时候房子会倒塌，人们会受伤。皇帝问大臣们：'谁能预测地震，好让人们提前躲一躲？'大臣们都说不可能，张衡却站出来说：'陛下，我可以试试看！'", "张衡开始了他的研究。他翻阅了很多古书，观察了很多自然现象，想啊想啊，画了无数张图纸。有一次，他看到有人在酒馆里喝酒，酒杯里的酒因为有人走路引起震动而晃动起来。他眼睛一亮：'对呀！我可以用这个原理来造地动仪！'", "张衡用青铜铸造了一个大圆球，圆球上面有八条龙，每条龙的嘴里都含着一个小铜球。圆球下面有八只青蛙，张着嘴对准每条龙。如果哪个方向发生地震，那条方向的龙嘴就会张开，铜球就会掉进青蛙的嘴里，发出'当'的一声响。", "有一天，地动仪上东边的龙突然'当'的一声，铜球掉进了青蛙嘴里。可是那天洛阳并没有感觉到地震啊！大家都议论纷纷，说张衡的地动仪不灵。可过了几天，陇西那边传来消息：那边发生了大地震！人们这才恍然大悟，原来地动仪真的能提前知道地震的发生！", "张衡还发明了浑天仪，是一个能显示星星位置的仪器，就像一个小小的宇宙。他写的《灵宪》这本书，记载了很多天文知识，比欧洲早了好几百年呢！", "张衡的故事告诉我们：不要因为别人说'不可能'就放弃创造。仔细观察身边的事物，灵感可能就在一杯酒、一阵风中！"], "zhenghe": ["六百多年前的明朝，有一个叫郑和的人，他是世界上最伟大的航海家之一！你知道吗？在他那个年代，中国的船队是全世界最厉害的，比欧洲那些大航海家还要早几十年呢！", "郑和本来姓马，小时候大家都叫他小马。他家住在云南，是虔诚的伊斯兰教徒。小时候，他最喜欢听老人们讲关于大海和远方国度的故事。海上有什么？有凶猛的鲨鱼吗？有会喷水的大鲸鱼吗？各国的人们长什么样？说着什么样的话？小马听得眼睛发亮，心里暗暗想着：长大了，我一定要去看看！", "后来，小马被送进了皇宫，成了朱棣皇帝身边的小太监。他聪明伶俐，又勇敢又机灵，很快就得到了皇帝的赏识。有一天，皇帝对他说：我有一个重要的任务要交给你——我要派船队出海，去访问那些远方的国家，让他们知道我们大明朝的威名！你敢不敢去？郑和激动得声音都颤抖了：皇上，小人一定完成任务！", "你知道郑和的船有多大吗？说出来吓你一跳！他的船比一个足球场还要长，有九根高高的大桅杆，船上可以住好几百人，还能装下无数的金银珠宝、丝绸瓷器。老百姓们亲切地叫它宝船。出海那天，郑和站在最大的那艘宝船上，看着码头上黑压压的人群，深吸一口气，大声下令：扬帆起航！", "郑和带领着庞大的船队，先后七次出海访问，最远到了非洲东海岸！你能想象吗？在那个没有指南针和GPS的年代，他是怎么找到方向的？郑和使用的是一种叫牵星术的古老方法——晚上看星星，白天看太阳，再加上老水手们代代相传的航海图，就能在茫茫大海中找到正确的方向。", "每到一个国家，郑和都会送上中国精美的丝绸和瓷器，还有会表演的金毛小狮子。当地的人们都看呆了：中国真是太富强了！郑和还会和各国国王友好交谈，邀请他们派使者来中国访问。很多国家都被郑和的真诚打动了，纷纷和中国建立了友好关系。", "郑和一生出海七次，前后整整二十八年！他在船上度过了大半辈子，把一生都献给了航海事业。他不仅是勇敢的航海家，还是出色的外交家、和平的使者。世界人民都敬仰他，科学家们甚至用他的名字给火星上的山命名呢！", "郑和下西洋的故事告诉我们：一个人的梦想有多大，舞台就有多大！只要敢想敢做，就没有到达不了的远方！"], "yuefei": ["说起南宋时候的英雄好汉，最让人们敬佩的，就是岳飞了。他的母亲在他背上刺了四个字——精忠报国，这四个字像烙印一样刻在他心里，伴随了他短暂而光辉的一生。", "岳飞小时候家里很穷，买不起纸笔，妈妈就用树枝在沙地上教他写字。岳飞学得可认真了，一笔一划，写得端端正正。虽然家里穷得揭不开锅，但岳飞从来不发牢骚，每天天不亮就起来练武，晚上还要读书到深夜。", "那时候，北方的金国经常来侵犯宋朝，烧杀抢掠，无恶不作。岳飞看在眼里，恨在心里：这些坏人，我一定要把他们赶出去！他对母亲说：娘，我要参军保卫国家！母亲含泪点头，在他背上刺下了精忠报国四个大字。", "岳飞武艺高强，又精通兵法，很快就成了一名将军。他带领的军队纪律严明，从不抢老百姓一针一线，老百姓们都亲切地叫他们岳家军。有一句俗话说得好：撼山易，撼岳家军难！意思是说你想把山移走还容易，想打败岳家军可就难喽！", "岳飞打仗特别勇敢，有一次他带着八百骑兵，就敢冲进敌人上万人的大营！敌人被他的气势吓坏了，四散奔逃。还有一次，岳飞让士兵们每人准备两捆柴草，在夜里悄悄堆在敌人城墙下。天亮了，岳飞一声令下：点火！熊熊大火把敌人吓得魂飞魄散，岳家军趁机攻破了城池。", "最让金国害怕的是朱仙镇一战。岳飞带领岳家军一路北上，把金兵打得落花流水，节节败退眼看就要收复中原了！可是就在这个关键时刻，皇帝连下十二道金牌，命令岳飞撤军。", "岳飞捧着金牌，眼泪止不住地流：十年心血，毁于一旦啊！可是皇命不可违，他只能带着遗憾撤军。回到京城后，岳飞被奸臣秦桧陷害，含冤而死，那一年他才三十九岁。", "岳飞虽然被害了，但他的故事流传了一千年又一千年。杭州有座岳王庙，岳飞的塑像就跪在害死他的秦桧旁边，每天都有人去那里，表达对英雄的敬意。", "岳飞的故事告诉我们：精忠报国不是一句空话，而是要用一生去践行的誓言！爱国，是中华民族最珍贵的品质！"], "mulan": ["很久很久以前，有个叫花木兰的姑娘，她住在长城脚下的一个小村子里。木兰是个又聪明又漂亮的女孩，织布、做饭、照顾家人，样样都是一把好手。邻居们都夸她：谁家娶了木兰，可真是有福气啊！", "可是这一年，边关告急，朝廷要征兵打仗。征兵的名册上，每家必须有一个男丁去当兵。木兰坐在织布机前，心事重重：爹爹年纪大了，腿脚不好；弟弟还太小，才刚学会走路。谁能替他们去打仗呢？", "那天晚上，木兰翻来覆去睡不着。她咬了咬牙，做了一个大胆的决定：我要女扮男装，替父从军！第二天一早，她去了集市，买了一匹高头大马，一副盔甲，一把锋利的宝剑。回到家，她悄悄把自己的长头发盘起来，藏进了军帽里。", "临行前，木兰来到父亲的房间，跪下来说：爹，女儿不孝，要骗您一次了。父亲惊呆了：什么？你要去当兵？木兰点点头：爹，您的腿不好，弟弟又太小。我是女儿身，但我一样能打仗！父亲老泪纵横，却怎么也拦不住她。", "第二天天刚亮，木兰就骑着马出发了。一路上，她跟着大军跋山涉水，翻过了多少座山，蹚过了多少条河，她都记不清了。晚上睡觉的时候，她不敢脱衣服，总是一个人睡在角落里，生怕别人发现她是女孩。", "战场上，木兰可勇敢了！她武艺高强，骑马射箭样样精通，冲锋陷阵总是跑在最前面。打仗打了十二年，木兰立下了赫赫战功，从一个小士兵变成了威风凛凛的大将军！可是战友们竟然一直没有发现她是女孩子！", "战争终于结束了，皇帝要奖赏木兰，问她想要什么。木兰跪下来说：我不想要高官厚禄，只想骑上千里马，回家看望我的爹娘。皇帝批准了，还派了一队士兵护送她回家。", "回到村子里，木兰脱下战袍，换上了漂亮的裙子，梳理好长发，又变回了那个漂亮的姑娘。当年的战友来看望她，一进门就惊呆了：天哪！原来你是个女孩子！我和你一起打了十二年仗，竟然一点都不知道！", "花木兰的故事传遍了天下，后来还被写成了著名的《木兰诗》，一代又一代的孩子们都读过它。美国的迪士尼还把这个故事拍成了动画片呢！", "花木兰的故事告诉我们：女孩子一样可以勇敢、坚强、有担当！不管是谁，都应该有勇气做自己想做的事！"], "cailun": ["在东汉时期，有个叫蔡伦的人，他发明了一种让全世界都受益的东西——造纸术！在蔡伦之前，人们写字用的是竹简，又重又大，写一封信要用好多竹片，背起来能累死人。还有人用丝绸写字，虽然轻便，但太贵了，普通人家根本用不起。", "蔡伦是皇宫里的太监，专门负责制造各种器物。他特别喜欢动脑筋，看到人们写字这么不方便，就想：能不能找到一种又轻便、又便宜、又好写的材料来代替竹简呢？", "有一天，蔡伦看到老婆婆在河边洗衣服。老婆婆把破旧的衣服放在石头上捶打，捶着捶着，纤维散开了，在水里漂成了细细的绒毛。蔡伦眼睛一亮：'这个……'他捡起那些绒毛仔细看了看，发现它们竟然能连成薄薄的一层。", "蔡伦开始做实验。他收集了树皮、破布、麻头、旧渔网等各种材料，把它们泡在水里，然后放到石头上反复捶打。捶啊捶，这些材料就变成了细细的纸浆。蔡伦又把纸浆薄薄地铺在帘子上，晒干后，就得到了一张纸！", "可是最初的纸很粗糙，写字会洇墨。蔡伦又反复研究，终于发现：把树皮、麻头、破布等材料按一定比例混合，造出来的纸既结实又光滑。最重要的是，这种纸的成本特别低，普通老百姓也用得起了！", "公元105年，蔡伦把自己造的纸献给了皇帝。汉和帝看了非常喜欢，下令在全国推广这种方法。从此以后，中国人终于有了便宜好用的纸，写字、读书变得方便多了。", "后来，造纸术传到了世界各国。阿拉伯人学会了，传到了欧洲，美洲人后来也学会了。今天，我们能在纸上写字、画画、看报纸、看图书，都应该感谢一千多年前的蔡伦！蔡伦的发明改变了人类文明的进程，被后人称为'纸圣'！"], "zhenggong": ["明朝末年，大海那边有一个美丽的岛屿叫台湾。岛上住着很多老百姓，他们种田打鱼，过着平静的日子。可是有一天，一群蓝眼睛黄头发的外国人开着大船来了——他们是荷兰人，手里拿着火枪，强行占领了台湾！", "荷兰人把台湾老百姓当奴隶使唤，让他们干最苦最累的活儿，交最重的税。谁敢反抗，就狠狠地打，甚至杀掉。台湾老百姓苦不堪言，天天盼望有人来救他们。", "这时候，在大陆的福建，有一个年轻的将军叫郑成功。他长得威武雄壮，武艺高强，而且特别爱国。明朝灭亡后，他拒绝向清朝投降，带领队伍在东南沿海继续抗击，大家都叫他'国姓爷'。", "有一天，一个叫何斌的人从台湾偷偷跑来，给郑成功画了一幅台湾的地图，告诉他荷兰人在台湾有多少兵、多少船、哪里的防守最弱。何斌哭着说：'将军啊，台湾的百姓太苦了，求您救救他们吧！'", "郑成功拍着桌子站起来：'台湾是中国的地方，荷兰人凭什么霸占？我一定要把台湾夺回来！'他立刻开始准备，打造战船，训练士兵，储备粮草，整整准备了一年多。", "1661年4月，郑成功率领两万五千名将士，分乘四百多艘战船，从金门出发，浩浩荡荡地向台湾驶去。海上风浪很大，很多士兵晕船吐得稀里哗啦，可郑成功站在船头，大声鼓励大家：'兄弟们！台湾的同胞在等着我们，冲啊！'", "到了台湾，郑成功的军队和荷兰人展开了激烈的战斗。荷兰人的火枪厉害，可郑成功的将士们更勇敢！他们冒着枪林弹雨，一寸一寸地向前推进。打了几个月，荷兰人终于撑不住了，举起白旗投降了！", "台湾老百姓欢天喜地，敲锣打鼓欢迎郑成功的军队。大家流着眼泪说：'我们终于自由了！'郑成功看着欢乐的百姓，欣慰地笑了。从此，台湾重新回到了中国人的怀抱。", "郑成功收复台湾，是中国历史上最伟大的一次反侵略战争。他用自己的勇气和决心，保卫了祖国的领土。每当我们想起郑成功，都应该记住：爱国，就是永远热爱自己的祖国！"], "shangyang": ["战国时候，秦国是个弱小的国家，经常被别的国家欺负。秦国的国君秦孝公心里着急极了，他到处招揽人才，希望能找到让秦国变强的方法。", "这时候，一个叫商鞅的年轻人从卫国来到了秦国。商鞅虽然年轻，但他满脑子都是变法图强的想法。他听说秦孝公求贤若渴，就信心满满地去求见。", "商鞅对秦孝公说：大王，要让秦国强大起来，就必须进行变法改革！秦孝公问他：怎么变？商鞅说：首先要奖励农业生产，谁种田种得好，就奖励谁。其次要奖励作战立功的人，不管出身高低，只要立了功，就能当官！", "秦孝公听了很高兴，决定让商鞅主持变法。可是，老百姓都不相信啊——这新法令能是真的吗？商鞅想了个办法，他在都城的南门立了一根木头，贴出告示：谁把这根木头搬到北门，赏金十两！", "老百姓都围着看热闹，可是没人敢动。有人说：搬根木头就给十两黄金？这不是骗人吗？忽然，一个大胆的年轻人站出来说：我来试试！他扛起木头，一路小跑到了北门。商鞅立刻兑现承诺，当众把十两黄金奖给了他。", "老百姓这下相信了：商鞅说话算数，新法令是真的！于是，变法很快在秦国推行开来。农民们拼命种田，战士们勇敢杀敌，秦国越来越强大。", "商鞅的变法让秦国从一个弱小的国家，变成了战国七雄中最强的一个。后来，秦国统一了中国，建立了秦朝。商鞅虽然后来被人陷害而死，但他的变法却改变了中国历史的走向！", "商鞅变法的故事告诉我们：诚信是做人的根本，说到就要做到；同时，改革创新才能让国家和社会不断进步！"], "zhangyi": ["战国时候，七个国家天天打来打去。有个叫张仪的年轻人，满腹才华，口才特别好，可是穷得连饭都吃不起。他有个好朋友叫苏秦，两个人都是靠嘴巴吃饭的说客。", "张仪听说好朋友苏秦在赵国当了大官，就跑去投奔他。可是苏秦呢，不仅不好好招待他，还让他坐在堂下，给他吃仆人的饭菜，言语之中还带着嘲讽：张仪啊，你这么有才华，怎么混成这样？", "张仪气得脸都绿了，他一甩袖子离开了赵国。走在路上，张仪越想越气：苏秦这个家伙，太瞧不起人了！我一定要出人头地，让他看看！", "张仪决定去秦国，因为秦国正在招揽人才。他一路风餐露宿，终于来到了秦国。凭着三寸不烂之舌，张仪很快就得到了秦惠文王的赏识，当上了客卿——就是国王的顾问。", "张仪对秦王说：大王，我有一个计策，可以帮秦国打败其他六国！秦王问：什么计策？张仪说：连横！就是让秦国和几个国家结盟，一个一个地瓦解那些敌对的国家！", "张仪的嘴皮子可真厉害！他一会儿跑到楚国，说服楚国和齐国断交；一会儿跑到魏国，劝说魏国和秦国联盟。他就像一条滑溜溜的泥鳅，在六个国家之间游走，把各国耍得团团转。", "后来，张仪成功说服了楚国和其他几个国家和秦国结盟，秦国的势力越来越大。他用一张嘴，为秦国统一天下立下了大功！", "张仪连横的故事告诉我们：有时候，知识就是最强大的武器。张仪虽然穷困潦倒，但他凭借自己的口才和智慧，最终实现了自己的人生价值！"], "suwu": ["西汉时期，匈奴是北方最强大的游牧民族，他们经常侵犯中原。有一年，匈奴又来挑衅，汉武帝派苏武带着使团去谈判，顺便送还扣押的匈奴使者。", "苏武是个正直忠诚的人，他带着一百多人出发了。可是刚到匈奴的地盘，赶上匈奴内部发生叛乱，苏武他们被卷了进去，稀里糊涂地就成了俘虏。", "匈奴的单于听说苏武是个有才能的人，就想劝他投降。单于派了以前的汉朝降将李陵去劝说：苏武啊，你在这里受苦，何必呢？汉朝皇帝早就把你忘了，你投降吧，我们好好对待你！", "苏武听了，气得浑身发抖。他拔出刀来，就要自杀：李陵！你这个叛徒！我苏武宁可死，也不会背叛大汉！幸好旁边的人拼命拦住了他。", "单于见苏武不肯投降，就把他关进了一个大地窖里，不给吃的，不给喝的。那时候正好是冬天，北风呼呼地吹，雪花飘进来，苏武又冷又饿。可是他嚼着毡毛、咽着雪水，硬是撑了下来。", "单于没有办法，就把苏武流放到北海——就是今天的贝加尔湖一带去牧羊。单于对他说：等这些羊生了小羊，你就回中原吧！可苏武一看，那些羊全是公羊，根本不可能生小羊！这是故意刁难他啊！", "就这样，苏武在北海牧羊，一待就是十九年！他的节杖——那根代表汉朝的旌节，上的毛都掉光了，可他还每天拄着它，不曾丢弃。十九年后，汉朝和匈奴关系缓和，苏武终于回到了祖国。", "苏武牧羊的故事告诉我们：无论遇到多大的困难和诱惑，都要坚守自己的信念和节操！苏武用十九年的坚守，诠释了什么叫忠诚！"], "jingke": ["两千多年前的战国末期，秦国的国王秦始皇越来越强大，他想把其他六个国家都灭掉，统一全中国。燕国的太子丹从小和秦始皇一起在秦国当人质，他深知秦始皇的野心，心里害怕极了。", "太子丹回到燕国后，整天发愁：秦国的军队那么厉害，我们怎么能打得过呢？他的谋士田光出了一个主意：与其等秦国来打我们，不如我们先派人去刺杀秦始皇！没了秦始皇，秦国不就乱了吗？", "太子丹觉得这个主意不错，就问田光：谁能担当这个重任呢？田光说：我的朋友荆轲是个勇士，他武艺高强，又有一身正气，一定能完成这个任务！于是，田光把荆轲推荐给了太子丹。", "太子丹见到荆轲，恭敬地说：荆轲啊，秦国就要来灭我们了，我想请你刺杀秦始皇。如果你愿意去，我会给你最好的马车、最锋利的匕首，还让勇士秦舞阳当你的助手。", "荆轲沉默了很久，最后说：太子这么信任我，我愿意去！不过，我要完成这个任务，还需要一样东西——秦国叛将樊於期的人头。秦王一直想抓他，如果你把他的人头给我，秦王一定会很高兴地接见我。", "太子丹虽然不忍心，但为了国家，还是咬牙答应了。樊於期听说后，流着泪说：太子对我这么好，我怎么能贪生怕死呢？说完，他就拔剑自刎了。", "荆轲带着樊於期的人头和燕国的地图，和秦舞阳一起出发了。临走那天，太子丹和所有的朋友都来送行。寒风吹过易水，水面波光粼粼，大家的心情却沉重得像压了一块大石头。", "太子丹给荆轲斟了一杯酒，哽咽着说：荆轲，你一定要成功啊！荆轲接过酒杯，一饮而尽，然后唱道：风萧萧兮易水寒，壮士一去兮不复还！唱完，他头也不回地上了马车，消失在漫天黄沙中。", "荆轲来到秦国，用重金买通了秦王的侍从，终于得到了觐见的机会。秦王听说燕国送来了樊於期的人头，高兴极了，立刻召见荆轲。", "荆轲捧着装有樊於期人头的盒子，秦舞阳捧着地图，一步步走向秦王的大殿。秦舞阳紧张得脸色发白，双腿发抖。秦王的大臣们觉得奇怪：这人怎么这么害怕？荆轲笑着解释道：他是北方蛮夷之地来的粗人，从没见过大王的威严，所以紧张。", "秦王让荆轲上前，把地图慢慢展开。当地图全部展开时，一把锋利的匕首露了出来——这就是太子丹准备的徐夫人匕首，剧毒无比，沾上就死！荆轲眼疾手快，一把抓起匕首，向秦王刺去！", "秦王吓了一跳，赶紧往后退，袖子被荆轲抓住了。秦王挣断袖子，拼命逃跑。荆轲紧追不舍，可秦王的侍从们围了上来。混乱中，秦王拔剑砍断了荆轲的左腿，荆轲摔倒在地。", "荆轲躺在地上，看着秦王，忽然哈哈大笑：哈哈哈！我本来想活捉你，逼你签下协议，把侵占各国的土地还回去。没想到老天不帮我啊！说完，他用力把匕首投向秦王，匕首擦过秦王的耳朵，钉在了柱子上。", "秦王吓得魂飞魄散，侍从们一拥而上，把荆轲和秦舞阳乱剑刺死。荆轲虽然死了，但他的勇气和忠诚，永远被后人记住了。", "荆轲刺秦王的故事告诉我们：虽然荆轲没有成功，但他的勇气和为国捐躯的精神值得我们敬佩。为了正义的事业，哪怕牺牲生命也在所不惜，这种精神叫做'义'！"], "zhuzhiwu": ["两千六百多年前的春秋时期，有一天，郑国突然来了两支大军——秦国和晋国！这可是两个超级大国，他们联合起来攻打郑国，郑国的国君吓得脸都白了。", "大臣们也都慌了神：完了完了，秦国和晋国一起打我们，我们这么小个国家，怎么打得过啊！有人建议：不如投降吧！有人说：赶紧向其他国家求救吧！可是谁敢来救呢？", "就在大家束手无策的时候，一个七十多岁的老人站了出来。他满头白发，步履蹒跚，可是眼睛里闪着智慧的光。他就是烛之武——郑国一个小小的养马官。", "郑国国君一看，惊讶地问：烛之武？你能退秦晋两国的大军？烛之武捋了捋白胡子，慢悠悠地说：大王，我虽然老了，但还有一张嘴呀。让我去试试吧，说不定能说退秦国的军队呢！", "当夜，月黑风高，郑国的士兵用绳子把烛之武从城墙上放了下去。烛之武摸黑来到了秦国的军营，求见秦穆公。", "秦穆公傲慢地说：你是谁？见我有什么事？烛之武不卑不亢地说：大王，我是郑国的使臣，来给您送一份大礼的。", "秦穆公冷笑一声：送大礼？你们郑国都快被我们灭了，还有什么礼可送？烛之武笑了笑说：大王息怒，且听我说完。您的军队比晋国强大十倍，晋国比郑国强大十倍。如果灭了郑国，晋国占了郑国的土地，不是更加强大了吗？到时候，晋国的实力超过秦国，您不担心吗？", "秦穆公听了，眉头微微一皱，心里开始盘算。烛之武看出了他的犹豫，继续说道：大王，您和晋国虽然是盟友，但盟友也会变成敌人啊。当年晋国的国君重耳流浪各国，是您帮他回到晋国当了国君。可是他当上国君后，答应给您的城池给过吗？", "这句话说到了秦穆公的痛处。当年他确实帮过晋文公重耳，可是晋文公当了国王后，根本没有给他任何好处！秦穆公的脸色越来越难看。", "烛之武趁机说道：大王，您看，晋国这个国家，说话不算话，今天是盟友，明天可能就是敌人。可是郑国不一样，郑国愿意永远做秦国的朋友，您把郑国留着，以后秦国的人到东方办事，郑国可以提供食宿和帮助，这不是更好吗？", "秦穆公越听越觉得有道理，他一拍大腿说：说得太好了！郑国不能灭！我要撤兵！", "大臣们连忙劝阻：大王，我们和晋国约定好了共同伐郑，现在撤兵，晋国怎么办？秦穆公摆摆手说：管他呢！郑国能给我好处，晋国能给我什么？撤兵！", "于是，秦国的大军连夜撤退了。晋国一看秦国跑了，没办法，只好也跟着撤了兵。郑国就这样化险为夷，保住了自己的国家。", "这就是历史上著名的'烛之武退秦师'。一个七十多岁的老人，靠着三寸不烂之舌，不费一兵一卒，就退了秦晋两国的大军，真是太厉害了！", "烛之武的故事告诉我们：知识就是力量！有时候，一个人的智慧可以胜过千军万马。所以小朋友们，要好好读书，学习知识，说不定有一天，你也能用智慧解决大问题呢！"], "xiaohao": ["两千多年前的楚汉争霸时期，有两个大英雄——项羽和刘邦。他们都想当皇帝，于是打来打去，打了好几年。", "刘邦的军队里有一个小士兵叫韩信，他家里很穷，从小就被人看不起。有一次，韩信在街上被一个屠夫欺负，屠夫说：你这么大个子，还整天背着剑，其实就是个胆小鬼！有本事你拿剑刺我啊！不敢刺，就从我的裤裆下钻过去！", "韩信看了屠夫一眼，二话不说，趴在地上，从屠夫的裤裆下面钻了过去。街上的人都笑话他：哈哈哈，这个人真没用！韩信却什么也没说，爬起来拍拍土，头也不回地走了。", "后来，韩信投奔了刘邦的军队，当了一个管仓库的小官。可是他觉得自己的本事没有发挥出来，就偷偷地跑了。", "这一天，刘邦的丞相萧何正在处理公务，忽然有人报告：丞相，大事不好！韩信跑了！萧何一听，急得跳了起来：什么？韩信跑了？不行，我得去追他！", "萧何来不及向刘邦报告，连夜骑马去追韩信。那天晚上，天黑得伸手不见五指，月亮躲在云层后面，路都看不清。萧何骑马跑了很久，终于在一座桥边追上了韩信。", "萧何气喘吁吁地说：韩信，你别跑了！韩信苦笑说：丞相，我在刘邦这里根本没有用武之地，我不跑干什么？萧何认真地说：你错了！刘邦这个人虽然看起来粗粗拉拉的，但他是个做大事的人。他需要你这样的人才！", "韩信摇摇头说：可是刘邦根本看不起我……萧何打断他的话：那是以前！现在我向你保证，我一定向刘邦推荐你，让你当大将军，统领所有军队！", "韩信的眼睛亮了：大将军？萧何郑重地点点头说：对！就是大将军！韩信想了想，最后答应跟萧何回去。", "萧何带着韩信回来，刘邦又惊又喜：什么？你去追一个逃跑的小兵？萧何严肃地说：大王，韩信不是普通的小兵。他是真正的军事天才！普天之下，没有人能比得上他！如果您想夺取天下，就必须重用韩信！", "刘邦半信半疑：真的吗？一个钻过别人裤裆的人，能有多厉害？萧何说：大王，当年齐桓公也钻过别人裤裆，后来不也成了霸主吗？用人要用他的长处，不能计较他的小节！", "刘邦被萧何说动了，于是举行隆重的仪式，封韩信为大将军。韩信穿上大将军的官服，站在高台上，接受将士们的朝拜。大家都惊呆了：这个钻过别人裤裆的人，竟然当上了大将军！", "可是韩信没有让大家失望。他运用自己的军事天才，为刘邦出谋划策，打败了一个又一个敌人。最后，刘邦真的当上了皇帝，建立了汉朝。", "萧何月下追韩信的故事告诉我们：人才是无价之宝，要善于发现和珍惜人才。同时，是金子总会发光的，即使现在被人看不起，只要坚持努力，总有一天会展现出真正的价值！"], "sunwu": ["两千五百多年前，齐国有个叫孙武的年轻人，他聪明过人，特别喜欢研究打仗的方法。他写了一本叫《孙子兵法》的书，这本书后来成了全世界最厉害的军事著作。可是那个时候，没有人知道他是个真正的人才。", "有一天，孙武带着自己写的兵法，去见吴国的国王吴王阖闾。吴王接过兵法，翻了几页，越看越喜欢，拍着桌子说：太好了！你的兵法太厉害了！可是光有兵法还不行，得看看你有没有真本事。你能不能用我的宫女们练练兵，让我看看？", "孙武说：当然可以！于是吴王把自己后宫的一百八十名宫女叫来，让孙武训练。孙武把宫女们分成两队，让吴王最宠爱的两个妃子当队长。宫女们嘻嘻哈哈的，觉得好玩极了，拿着兵器左摇右晃，像在跳舞一样。", "孙武一本正经地说：你们听着，向前看！眼睛看着我手指的方向！宫女们还是嘻嘻哈哈的，没人理会他。孙武皱起眉头，提高声音又说了一遍，可宫女们笑得更厉害了。", "孙武沉下脸来，大声说：听令不听宣，是谁的错？是我没说清楚，还是你们不听命令？他转头问吴王：大王，士兵不听命令，按照军法该斩首。宫女们是你的妃子，是斩还是不斩？", "吴王在一边看得正高兴，听到这话吓了一跳：什么？斩首？她们可是我心爱的妃子啊！你就不能放她们一马？孙武严肃地说：既然大王让我当将军，就要听我的！士兵不听命令，这是带兵的大忌！", "孙武一声令下，两名妃子被绑了起来。宫女们吓得脸色煞白，再也不敢笑了。吴王在上面急得直跺脚：别斩啊别斩啊！那可是我的爱妃啊！可是孙武根本不听，手起刀落，两名妃子的人头落地。", "宫女们全都吓傻了，再也不敢嘻嘻哈哈，都认认真真地听令操练。不一会儿，一百八十名宫女就训练得像真正的士兵一样整齐。", "吴王虽然心疼两个爱妃，可心里也不得不佩服：孙武真是个人才啊！从此以后，吴王重用孙武，让他带领吴国军队。孙武帮助吴国成了春秋时期最强大的国家之一。", "孙武练兵的故事告诉我们：无规矩不成方圆，做任何事情都要有纪律。将军没有威严，士兵不听命令，怎么能打胜仗呢？严格要求才是真正的爱护！"], "washington": ["两百多年前，美国有一个叫华盛顿的男孩，他出生在一个种烟草的农场主家庭里。小华盛顿从小就跟着爸爸在农场里干活学会了骑马、种地，他的眼睛里总是闪着聪明的光。", "有一天，小华盛顿在森林里迷了路，又累又饿。走着走着，他看到一棵大树上刻着一行字：往前走一百步，再往右转。他照着做了，果然走出了森林！后来他才知道，那是他爸爸故意做的标记，为的是教他如何在森林里辨别方向。", "华盛顿长大后，英国国王派总督来管理殖民地。这个总督经常欺负老百姓，让人们交很重的税，却把钱装进自己的口袋。大家都很生气，可又不敢说什么。", "有一天，总督在广场上宣布：每家每户都要交税，不交的就把房子拆了！老百姓们低着头不敢说话。这时候，华盛顿站了出来，他大声说：凭什么要交这么多税？我们的血汗钱，凭什么被你们抢走？", "总督气得脸都绿了：你敢反抗？小心我让人抓你！华盛顿毫不畏惧：我不怕你！你欺负我们老百姓，早晚会受到惩罚的！围观的人们纷纷鼓掌，总督灰溜溜地跑了。", "后来，美国的老百姓实在受不了英国人的欺负，纷纷拿起武器反抗英国统治。华盛顿被选为大陆军的总司令，带领大家和英国人打仗。", "打仗可不是一件容易的事！华盛顿的军队又缺粮食又缺武器，士兵们常常饿着肚子打仗。有时候，他们甚至没有鞋子穿，脚都冻烂了。华盛顿看着士兵们受苦，心里难过极了。", "有一年冬天，华盛顿的军队只剩下两千多人，大家都觉得撑不下去了。可华盛顿却咬牙坚持，他对士兵们说：只要我们团结一心，就一定能打败英国人！只要我们不放弃，自由就一定会来到！", "经过八年的艰苦奋斗，美国人终于打败了英国人，建立了独立的国家。华盛顿被选为美国第一任总统，大家都叫他美国的国父。", "可是，华盛顿只当了八年总统，就主动辞职不干了！原来，他想让大家自己管理国家，不能让一个人永远当总统。从那以后，美国就有了规矩：总统最多当两届。这个规矩，一直到现在还在用呢！", "华盛顿的故事告诉我们：真正的领袖不是想着怎么拥有权力，而是想着怎么为大家服务。华盛顿放弃权力，为美国树立了榜样——真正的伟大，不是当多大的官，而是为多少人做好事！"], "watt": ["两百多年前，英国有个叫瓦特的小男孩。他的爷爷和爸爸都是心灵手巧的工匠，家里摆满了各种工具和机器。小瓦特最喜欢蹲在角落里，看着爸爸做东西，心里想着：这个东西是怎么转起来的呀？", "有一天，小瓦特病了，躺在床上发着高烧。妈妈端来一碗热汤让他喝，汤上面冒着白色的热气。小瓦特看着那些热气，忽然问：妈妈，为什么热气会往上冒呢？妈妈笑着说：因为热的东西会变轻，轻了就往上飘啊。小瓦特似懂非懂地点点头。", "瓦特长大了，在一家工厂里修理机器。那时候的机器都用蒸汽来推动，可是这些蒸汽机又笨又重，效率很低，经常出问题。工人们都说：这破机器，真难用！", "可瓦特不这么想。他蹲在蒸汽机旁边，左看看右看看，想啊想啊。有一天，他看到茶壶里的水烧开了，壶盖被蒸汽顶得一上一下，噗噗地响。", "瓦特盯着茶壶看了好久，忽然眼睛一亮：哎呀！我知道问题在哪里了！蒸汽机之所以效率低，是因为每推动一次，汽缸就要冷却一次，然后再重新加热。这多浪费啊！", "瓦特开始研究怎么改进蒸汽机。他在汽缸外面加了一个冷凝器，让蒸汽在冷凝器里冷却，汽缸就能一直保持热乎的状态。这样一来，蒸汽机的效率一下子提高了四倍！", "工厂主听说了，嘲笑他说：瓦特，你就是个修理工，还想发明东西？别做梦了！瓦特听了，也不生气，只是笑笑：我会证明给你看的。", "瓦特继续改进他的蒸汽机。他还发明了一种叫做离心调速器的东西，可以让蒸汽机的速度保持稳定。这样，蒸汽机就可以用在各种机器上了。", "瓦特的蒸汽机越做越好，很快就用到了纺织厂、面粉厂、火车上。工厂的机器不再需要马拉或者水车来带动了，农民们也可以用蒸汽机来抽水灌溉农田。整个世界都变了样！", "后来，人们把瓦特发明的这种蒸汽机叫做瓦特蒸汽机。为了纪念他，人们还用他的名字来作为功率的单位。一台机器有多少马力，就是以瓦特的名字来计算的。", "瓦特的故事告诉我们：好奇心是发明之母。瓦特从一个茶壶盖想到了改变世界的大发明。只要我们平时多观察、多思考，再普通的事物里也可能藏着大秘密呢！"], "hongmen": ["秦朝灭亡后，天下分成了两股势力：一边是西楚霸王项羽，兵强马壮；一边是汉王刘邦，人少地小。本来刘邦先攻破了咸阳，按照约定，他应该当关中王。可是项羽不服气，带着四十万大军来攻关中。刘邦只有十万兵马，只好低头服软。", "项羽的谋士范增看出刘邦不简单，将来一定是项羽的大敌。他建议项羽在鸿门摆下酒宴，请刘邦来吃饭，趁机把他杀了。项羽答应了。", "刘邦知道这是鸿门宴，去可能有危险，不去又显得心虚。他想了想，决定带上张良和几个随从，亲自去向项羽赔罪。他心里想：只要我表现得恭敬真诚，项羽那家伙头脑简单，说不定就会放了我。", "鸿门宴开始了。项羽坐在主位上，刘邦坐在下首。范增一个劲儿给项羽使眼色，又把腰间的玉佩碰得叮当响，暗示项羽动手。可项羽装作没看见，只顾着喝酒。范增急坏了，只好派项庄进来舞剑助兴。", "项庄舞着舞着，剑越来越逼近刘邦。项羽的叔父项伯看出危险，也拔剑起舞，用自己的身体挡住刘邦。就在这千钧一发之际，刘邦的谋士樊哙闯了进来。樊哙是个猛汉，他瞪着眼睛，头发都竖起来了，把项羽都吓了一跳。", "趁着项羽被樊哙分散注意力，刘邦假装上厕所，悄悄溜走了。张良留下来送礼道歉，替刘邦打圆场。范增气得把刘邦送的白玉摔得粉碎，叹气说：将来夺走项王天下的，一定是刘邦这小子！", "鸿门宴的故事告诉我们：有时候最危险的地方反而最安全，关键时刻要冷静机智，更要懂得什么时候该进、什么时候该退！"], "kuaxia": ["韩信是汉朝的开国大英雄，被后人称为\"兵仙\"。可是他小时候，家里穷得叮当响，父母都去世了，他只能靠在河边钓鱼换钱生活。有时候钓不到鱼，他就饿肚子。", "有一天，韩信在街上饿得头晕眼花，一个卖肉的屠户看见他，嘲笑他说：看你长得高高大大的，还配着一把剑，可实际上就是个胆小鬼！你要是不怕死，就拿剑来刺我啊！要是怕死，就从我的胯下钻过去！", "街上的人都围过来看热闹，等着看韩信的反应。有人愤愤不平，觉得屠户太过分了；有人幸灾乐祸，等着看韩信的笑话。韩信站在那里，一动不动，盯着屠户看了很久很久。", "你知道韩信会怎么做吗？他弯下腰，从屠户的胯下爬了过去。街上的人哄堂大笑，都说韩信是个没用的胆小鬼。韩信爬起来，拍拍身上的土，头也不回地走了。", "很多人觉得韩信太丢人了。可是后来，当韩信成为大将军，统领千军万马的时候，他回想起当年的事，却说：那时候我要是杀了屠户，我也会被关进大牢，甚至丢掉性命。正是因为我忍下了那一时的侮辱，才能有今天的成就啊！", "韩信帮助刘邦打败了项羽，建立了汉朝，被封为楚王。他当上楚王后，找到了那个屠户，不但没有报复他，还封他当了个小官。屠户羞得满脸通红，从此逢人就说：韩信才是真正的大丈夫啊！", "胯下之辱的故事告诉我们：真正勇敢的人不是逞一时之勇，而是能够忍辱负重，为了远大的目标忍受暂时的委屈！"], "simianchuge": ["西楚霸王项羽和汉王刘邦打了五年仗，最后在垓下展开决战。刘邦的军队把项羽团团围住，项羽的兵越来越少，粮食也快吃完了。", "有一天夜里，项羽睡不着觉，坐在军帐里喝酒。他的身边只有虞姬——他最爱的女子，还有一匹乌骓马——他最爱的战马。项羽看着虞姬，唱起歌来：力拔山兮气盖世，时不利兮骓不逝……歌声悲壮，虞姬含泪起舞，最后拔剑自刎，鲜血染红了大地。", "这天夜里，项羽带着八百骑兵突围。他们趁着天黑冲出汉军的包围，天亮时才发现自己走错了路，绕到了一个叫乌江的地方。身后是刘邦的追兵，前面是滔滔的乌江水。", "乌江的亭长撑着小船等在那里，他说：大王，快上船吧！江东虽然小，可也有千里土地、几十万百姓，您回去还能东山再起啊！", "项羽苦笑了一下，回头望了望身后的追兵，又看了看亭长。他说：当年我带着八千江东子弟渡江打天下，如今他们全都战死了，我一个人回去，有什么脸见江东父老呢？", "项羽把自己的乌骓马送给了亭长，然后带着剩下的二十六个骑兵，回头冲向汉军。他一个人就杀了好几百汉兵，身上也受了十几处伤。最后，项羽倒在了血泊中，却至死不屈。", "四面楚歌的故事告诉我们：项羽虽然失败了，但他宁死不屈的精神永远被人敬佩。而真正的强者，应该像刘邦一样，能屈能伸，懂得何时进、何时退！"], "xuanzang": ["唐朝的时候，有个叫玄奘的小和尚。他从小就爱看佛经，一看就入迷，常常忘了吃饭睡觉。可是他发现当时的佛经翻译得不太好，有些意思看不明白。他想：如果能去佛教的发源地印度，亲自学习原汁原味的佛经，该多好啊！", "那时候，去印度可不是坐飞机、坐火车，而是要走路穿过沙漠、翻过高山，路途遥远极了。而且唐朝法律规定，不许老百姓随便出国。玄奘申请了好几次，都没被批准。", "可是玄奘没有放弃。有一天夜里，他偷偷离开了长安城，一个人踏上了西行的路。白天他顶着烈日赶路，晚上他披着星光睡觉。走啊走，他来到了甘肃的沙漠。", "沙漠里没有水，也没有食物。玄奘的水喝光了，干粮也吃完了，他渴得嘴唇都裂开了，好几次差点倒下。可是他闭上眼睛，心里念着佛经，一步一步地往前走。神奇的是，就在他快要倒下的时候，他看到了一汪清泉！", "玄奘走过了八百里沙漠，翻过了雪山，穿过了无数个国家，整整走了一年的时间，终于来到了印度。他在印度学习佛经，一学就是十七年！十七年里，他学会了梵文，读懂了无数珍贵的佛经。", "后来，玄奘带着657部佛经回到了长安。唐太宗亲自接见他，还让他把取经的经历写成了一本书——《大唐西域记》。这本书记录了玄奘一路上看到的风土人情，成了研究古代中亚和印度的重要史料。", "玄奘取经的故事告诉我们：只要有坚定的信念和不怕困难的勇气，就没有什么是不能实现的！"], "zhangqian": ["两千多年前的中国，正处于强盛的汉朝。那时候，北方的匈奴总是来侵犯边境，抢夺汉朝百姓的牛羊和粮食。汉武帝刘彻听说，在遥远的西域，有一个叫大月氏的国家，也被匈奴欺负得很惨。", "汉武帝心想：要是能联合大月氏，一起夹击匈奴，不就能把匈奴赶跑了吗？于是他下令招募愿意出使西域的使者。可是西域在哪里呢？谁也不知道，只知道要穿过茫茫戈壁，翻过冰雪覆盖的高山，才能到达。这可是九死一生的任务啊！", "这时候，一个叫张骞的年轻郎官站了出来。他虽然官职不大，但有一颗报国的心。还有一个叫堂邑父的匈奴族翻译，也自愿加入了队伍。就这样，张骞带着一百多人，从长安城出发，踏上了去往西域的漫漫长路。", "他们一路向西，穿过河西走廊，眼看就要出关了——却被一队匈奴骑兵拦住了去路！张骞和随从们寡不敌众，全部被俘。匈奴单于没有杀他们，而是把张骞扣押起来，想让他投降。张骞表面上恭恭敬敬，心里却一直想着完成使命。他时刻把汉武帝给他的符节带在身边，那可是代表大汉的凭证啊！", "光阴似箭，一晃就是十年。张骞在匈奴娶了妻子，有了孩子，但他从来没有忘记自己是个汉人。终于有一天，看守他的人松懈了，张骞带着堂邑父和几个忠诚的随从，在一个月黑风高的夜晚逃了出来。", "他们继续西行，历经千辛万苦。戈壁滩上没有水，他们喝马尿、啃干粮；大雪山上没有路，他们凿冰开道。好多人冻死在路上，但活着的人咬着牙继续前进。终于有一天，他们看到了一个水草丰美的地方——大月氏！", "可是，事情和张骞想的不一样。大月氏被匈奴打败后，搬到了新地方，早就不想报仇了。张骞在那里住了一年多，虽然没能说服大月氏一起打匈奴，但他仔细观察了西域各国的风土人情，记下了许多宝贵的资料。", "回国的时候，张骞决定走南道，没想到半路上又被匈奴抓住了。又过了一年多，趁匈奴发生内乱，张骞才终于逃回了长安。当他踏入长安城门的那一天，汉武帝亲自出城迎接。算算日子，从出发到归来，整整过去了十三年！张骞的胡须头发都白了，但手里的符节还是紧紧握着。", "张骞带回来的消息让汉武帝大开眼界。原来在中原之外，还有那么大的世界，有那么多不同的国家！从此，汉朝开始和西域各国交往，慢慢形成了著名的\"丝绸之路\"。中国的丝绸、瓷器传到了西方，西域的葡萄、石榴、汗血宝马也传到了中原。这条连接东西方的大道，改变了整个世界！", "张骞出使西域的故事告诉我们：真正的勇敢不是不怕危险，而是面对困难永不放弃；一个人只要心中有信念，哪怕走十年、二十年，也一定能走到目的地！"], "banchao": ["在东汉时期，有个叫班超的人。他从小就是个不安分的孩子，家里穷，没有钱买书，他就替官府抄写文书赚钱。每天天不亮就起来研墨写字，一直抄到天黑，一笔一画认认真真。虽然能勉强养家糊口，但班超的心里总有一股说不出的不甘。", "他常常望着窗外的天空发呆：难道我这辈子就这样抄一辈子文书吗？像卫青、霍去病那样驰骋疆场、杀敌报国的梦想，难道就只能是梦想吗？每想到这些，班超就坐不住了。", "有一天，班超又在那儿抄书抄得心烦意乱，忽然把笔往地上一扔，长长地叹了一口气：\"唉！大丈夫就应该像傅介子那样，到边疆去杀敌立功、封侯拜相！怎么能一辈子困在这几案前，跟笔墨纸砚打交道呢！\"说完，他站起身来，眼神里闪着光。", "说干就干！班超真的扔掉了笔，换上了铠甲，报名参军了。刚好那时候匈奴侵犯边境，班超跟随大军出征。第一次上战场，他就表现出惊人的勇气——他带头冲锋，挥舞着大刀，杀得敌人丢盔弃甲，大获全胜！", "战后，班超被封为兰台令史，虽然是个小官，但他心里仍然想着到边疆去建功立业。后来，他主动请缨，要求出使西域。皇帝批准了他的请求，派他带着36个人出发了。", "班超先到了鄯善国。鄯善王一开始对他们很热情，可没过几天，突然变得冷淡起来。班超敏锐地察觉到：一定是匈奴的使者也来了！鄯善王在犹豫该站哪边。班超心想：不能坐以待毙！必须先下手为强！", "那天深夜，班超把36个随从召集起来，低声说：\"今夜我们要突袭匈奴营地。成败在此一举！\"他命人在匈奴营帐周围点起大火，自己带头冲了进去。一时间喊杀声震天，匈奴人从睡梦中惊醒，乱作一团。班超亲手斩杀了匈奴使者，鄯善王吓得立刻表示愿意归顺汉朝。", "后来，班超又用同样的办法，平定了于阗、疏勒等好几个国家，让西域五十多个国家重新回到了汉朝的怀抱。他整整在西域待了三十一年，把自己的大半辈子都献给了边疆。直到头发花白、疾病缠身，他才请求回到家乡。", "唐代诗人李白曾写诗赞颂班超：\"长安什么少年儿，五十沙场竟不还。\"班超投笔从戎的故事告诉我们：读书很重要，但更重要的是知道自己想要什么，并勇敢地去追求！人生没有标准答案，适合自己的路就是最好的路！"], "zuti": ["在一千七百多年前的中国，有个叫祖逖的人。祖逖从小就与众不同，他不喜欢像其他官宦子弟那样整天吃喝玩乐，而是喜欢骑马射箭、舞枪弄棒，还读了好多好多兵书。他常常对朋友们说：\"等我长大了，一定要干出一番大事业来！\"", "后来，祖逖来到了京城洛阳，和一个叫刘琨的年轻人成了好朋友。刘琨也是个有理想、有抱负的青年。两人一见如故，经常睡在同一张床上，聊天聊到深夜都不想睡。他们聊什么呢？聊国家大事，聊怎么报效朝廷，聊怎么建功立业。", "有一天夜里，祖逖正在熟睡，忽然被远处传来的声音惊醒了。他竖起耳朵仔细听——原来是鸡叫声。\"咯咯咯——咯咯咯——\"祖逖不但没有生气，反而兴奋地用脚踢了踢旁边的刘琨：\"快起来！快起来！你听，这鸡叫声多好听啊！\"", "刘琨迷迷糊糊地睁开眼睛，打了个哈欠说：\"大半夜的鸡叫，有什么好听的？你该不是病了吧？\"祖逖却一本正经地说：\"我不是开玩笑！你想想，半夜鸡叫，催人起床。我们与其躺着做白日梦，不如现在就起来练剑！等练出一身好武艺，将来好报效国家啊！\"", "刘琨被好友的话打动了，两人一骨碌从床上爬起来，披上衣服，抽出宝剑，来到院子里。月光下，两个年轻人挥舞着宝剑，剑光闪烁，身影矫健。从那天起，只要半夜鸡叫，他们就会准时起床练剑。", "不管是刮风下雨，还是冰天雪地，这个习惯从来没有断过。慢慢地，他们的武艺越来越好，身体也越来越强壮。村子里的人都说：\"你看人家祖逖和刘琨，每天半夜起来练剑，将来肯定能成大器！\"", "后来，西晋发生了八王之乱，北方的匈奴、鲜卑等少数民族趁机打进了中原。祖逖带着族人南下来到江南避难。一路上，他看到老百姓被乱兵欺负，抢东西、烧房子，心里难受极了。他挺身而出，带领自己的族人和家丁，保护难民们安全转移。", "后来，晋元帝封祖逖为将军，让他北伐收复中原。祖逖带着军队渡过长江，在江心他用船桨敲打着船舷，发誓道：\"祖逖此生若不能收复中原、驱逐敌人，绝不活着回来！\"士兵们听了，个个热血沸腾，决心跟着将军好好打仗。", "祖逖闻鸡起舞的故事告诉我们：想要成就一番事业，必须珍惜时光、勤奋努力！每天比别人早起一点、多努力一点，日积月累，就能取得不平凡的成就！"], "edison_bio": ["1847年，在美国俄亥俄州的一个小镇上，一个特别好奇的小男孩出生了。他的名字叫托马斯·阿尔瓦·爱迪生。爱迪生从小就有一肚子的问题想问，他的脑袋里装满了\"为什么\"——为什么天是蓝色的？为什么鸟会飞？为什么鱼会在水里游？", "有一次，小爱迪生问妈妈：\"妈妈，为什么母鸡能孵出小鸡呀？\"妈妈笑着给他解释了鸡蛋要保持温暖才能孵出小鸡的道理。小爱迪生眼珠子一转，立刻跑到柴房里，搬来一筐鸡蛋，自己坐在上面，想看看能不能孵出小鸡来。结果呢？鸡蛋全被他压碎了！", "爱迪生8岁才上学，可才上了三个月，就被老师赶回家了。老师皱着眉头对爱迪生的妈妈说：\"您这孩子脑子有问题！上课的时候总是问一些奇怪的问题，比如'为什么2加2等于4'——这谁能回答得了他？\"爱迪生的妈妈听了，心里很难过，但她相信自己的孩子并不笨。从那以后，妈妈就在家里亲自教爱迪生读书。", "爱迪生最喜欢去的地方是图书馆。他在那里如饥似渴地阅读各种书籍，从科学到历史，从地理到文学，什么书都看。有时候，他看到一本好书，会忘记吃饭、忘记睡觉，一直看到图书馆关门才恋恋不舍地离开。", "爱迪生长大后，开始自己搞发明。他做过报童、当过电报员，但无论做什么工作，他都没有放弃搞发明创造。他在火车上做过实验，差点把火车给炸了；他试验过很多东西，失败过无数次。但他从不气馁，每次失败后，他都会说：\"我又发现了一种不能用的材料。\"", "1877年，爱迪生发明了一样神奇的东西——留声机！这是世界上第一个可以录下声音、再播放出来的机器。当人们第一次听到留声机播放出自己的声音时，都惊讶得张大了嘴巴：\"天哪！机器居然会说话！\"", "后来，爱迪生又开始研究电灯。那时候人们用的都是煤气灯，灯光昏暗还有危险。爱迪生想：如果能用电来照明，那该多好啊！为了找到合适的灯丝材料，他试验了上千种——竹丝、布丝、头发丝、纸丝……每试验一种，都要记录下来，分析为什么不行。", "有一次，一个记者去采访爱迪生，问他：\"您都失败了一千多次了，怎么还不放弃？\"爱迪生笑着回答：\"我没有失败啊！我只是发现了一千多种不能做灯丝的材料。最后，我终于找到了能用的那一种！\"是的，爱迪生找到了竹炭纤维，电灯亮了，而且整整亮了1200个小时！", "爱迪生一生发明了两千多种东西，获得了1093项专利，被称为\"发明大王\"。他还发明了电影摄影机、蓄电池等等。他的名言是：\"天才是1%的灵感加上99%的汗水。\"爱迪生的故事告诉我们：勤奋比天赋更重要，不怕失败才能成功！"], "nobel_bio": ["1833年，在瑞典首都斯德哥尔摩的一个贫苦家庭里，一个体弱多病的小男孩出生了。他的名字叫阿尔弗雷德·诺贝尔。诺贝尔小时候身体很差，经常生病，但他非常好学，特别喜欢读书，尤其是关于化学的书。", "诺贝尔的爸爸是个工程师，也喜欢搞发明。有一天，爸爸的工厂爆炸了，发生了严重的火灾。消息传来，大家都以为诺贝尔的爸爸在爆炸中丧生了。小诺贝尔听到消息，差点晕过去，他拼命往工厂跑去。", "幸运的是，诺贝尔的爸爸没有死，但他受了重伤，再也不能干重活了。家里变得更加贫穷。诺贝尔看到妈妈每天辛苦地工作，心里难受极了。他暗暗发誓：长大后一定要发明出能赚很多钱的东西，让妈妈过上好日子！", "诺贝尔长大后，开始研究一种危险的东西——炸药！炸药很容易爆炸，一不小心就会出人命。很多人嘲笑诺贝尔：你这不是在玩命吗？但诺贝尔不怕，他说：\"为了让人们生活得更好，我愿意冒这个险！\"", "1864年，诺贝尔在做实验时，实验室发生了爆炸，他的弟弟和好几个助手都被炸死了。诺贝尔悲痛欲绝，但瑞典政府不允许他在陆地上做实验。诺贝尔没有放弃，他把实验室搬到了湖中央的一条小船上，继续研究。", "经过无数次失败，诺贝尔终于发明出了一种安全又威力强大的炸药——黄色炸药。这种炸药可以用来开山劈石、修建铁路、开采矿山，让人们的工作变得轻松多了！后来，诺贝尔又发明了炸药胶、可塑炸药等等，被人们称为\"炸药大王\"。", "诺贝尔一生都在忙碌地工作。他发明了炸药，却希望炸药只用于和平建设，不要用于战争。他把自己所有的精力和才华都献给了科学发明，从不追求奢华的生活。他没有结婚，也没有孩子，把全部的财产都存了起来。", "1896年12月10日，诺贝尔在意大利去世了，享年63岁。他在去世前，留下了一份遗嘱：把所有的遗产变成基金，用这笔钱的利息奖励每年为人类做出杰出贡献的人。这就是著名的诺贝尔奖！", "1901年，第一届诺贝尔奖颁发。现在，诺贝尔奖已经成为全世界最崇高的荣誉之一。每年12月10日，来自世界各国最杰出的人都会聚集在瑞典斯德哥尔摩，领取这份荣誉。诺贝尔奖包括物理、化学、生理医学、文学、和平五个奖项，后来又增加了经济学奖。", "诺贝尔的故事告诉我们：一个人的价值不在于拥有多少财富，而在于为人类做出了多少贡献。他发明了炸药，本可以靠此发大财，但他选择把所有的钱用来奖励那些为人类进步做出贡献的人。这种无私的精神，值得我们永远学习！"], "wrightbrothers": ["一百多年前，美国俄亥俄州的代顿小镇上，住着一对兄弟。哥哥叫威尔伯·莱特，弟弟叫奥维尔·莱特。他们的爸爸是个牧师，妈妈是学校的老师。兄弟俩从小就喜欢捣鼓一些小发明，什么会转的风车、会跳的弹簧玩具，都是他们自己做的。", "有一天，爸爸从外地带回来一个会飞的小玩具——那是一个用橡皮筋做动力的小螺旋桨。兄弟俩高兴极了，轮流拿着它抛向天空，眼睛紧紧盯着那小小的飞机模型。\"它飞起来了！\"威尔伯喊道。从那一刻起，飞翔的梦想就在兄弟俩心里扎下了根。", "长大后，威尔伯开了一家自行车修理店，奥维尔也跟着一起干。修自行车虽然能赚钱，但兄弟俩心里一直想着那个飞翔的梦想。他们把赚来的钱都用来买书、研究飞行器的原理，还收集了很多关于鸟儿飞翔的资料。", "那时候，已经有很多人在研究飞机了，但都没有成功。有人嘲笑他们：\"人类怎么可能飞上天呢？鸟儿有翅膀，你们有吗？\"威尔伯和奥维尔没有理会这些嘲笑，他们说：\"鸟儿能飞，说明天空是能飞的。只要我们弄清楚飞行的原理，就一定能成功！\"", "兄弟俩先从风筝开始研究。他们做了各种各样的风筝，大的、小的、两只翅膀的、四只翅膀的，一遍遍地放飞，一遍遍地观察。然后，他们开始造真正的飞机。他们造了一架又不行，再造一架又失败，就这样造了三架滑翔机。", "1896年，威尔伯在一次实验中受了重伤，摔断了两颗门牙。但这点小伤算什么？他爬起来继续干。后来，弟弟奥维尔也受了伤，兄弟俩轮流躺在病床上研究飞行理论，轮流修飞机。", "1903年12月17日，在美国北卡罗来纳州的基蒂霍克海滩上，一架奇怪的东西被推出了小小的飞机库。它有两个大大的翅膀，下面是一个木头的框架，前面有两个螺旋桨。威尔伯和奥维尔又紧张又兴奋——这是他们自己设计的第一架飞机啊！", "\"谁先飞？\"奥维尔问。\"你年轻，你先。\"威尔伯说。奥维尔躺进飞机里，启动引擎。\"嗡嗡嗡——\"螺旋桨转了起来，飞机开始在滑道上滑行，然后——飞起来了！飞机在空中飞了12秒，飞行了36米。虽然只有12秒，虽然只有36米，但这是人类历史上第一次有动力的飞行！", "后来，兄弟俩不断改进飞机，越飞越远、越飞越高。威尔伯曾经飞过39公里，奥维尔飞过38公里。他们飞行的记录被一次次刷新，但兄弟俩从来不骄傲，只是默默地把每一个改进都记下来。1948年，奥维尔去世后，按照他的遗愿，所有的发明资料都交给了 Smithsonian 博物馆，供全世界的人学习。", "莱特兄弟的故事告诉我们：梦想不分大小，只要敢想敢做；困难不怕多，只要坚持到底。兄弟俩用一辈子的时间研究飞行，最终让人类实现了飞上天空的梦想。只要我们像他们一样，勇敢地追求梦想，梦想就一定能实现！"], "lishizhen_bio": ["1518年，在湖北蕲州的一个小村庄里，一个小男孩出生了。他的爸爸是当地很有名的大夫，经常背着药箱走村串户，给穷苦百姓看病。小男孩最喜欢跟在爸爸后面，看他给病人把脉、开药方。小男孩觉得，爸爸的药箱里装着的不是药材，而是人们的健康和希望。", "这个小男孩，就是后来被人们称为\"药圣\"的李时珍。李时珍从小就很聪明，他读书过目不忘，写文章下笔如神。可是他却三次考科举都落榜了。每次放榜的时候，看到自己名字又没在上面的，李时珍都很难过，但他从来不在人前表现出来。", "有一次，李时珍对爸爸说：\"爹，我不想再考科举了，我想跟您学医。\"爸爸听了，又惊讶又担忧：\"当大夫可赚不了多少钱啊……\"李时珍认真地说：\"爹，我不是为了赚钱。我是想救人，看到病人痛苦，我心里也难受。\"爸爸看着儿子坚定的眼神，点了点头。", "从此，李时珍跟着爸爸学医。他不仅读遍了家里的医书，还到处搜集民间的药方。不管是白发苍苍的老中医，还是大字不识的老奶奶，只要谁说出一个有用的药方，李时珍都会恭恭敬敬地记下来。他的医书越读越多，药方越记越厚，医术也越来越好。", "李时珍给穷人看病，从来不收钱。有时候穷人抓不起药，他就自己掏钱帮他们买。慢慢地，他的名声越来越大，连皇宫里的太医院都听说了他的名字。1551年，明世宗听说了李时珍的大名，把他召到太医院当官。", "可是李时珍发现，太医院里的那些官，整天只会研究怎么炼制长生不老的丹药，根本不关心百姓的疾苦。李时珍失望极了，干了一年多就辞职回家了。他决定做一件更有意义的事——编写一本更完整、更准确的本草纲目！", "那时候，古代的医书有很多错误和遗漏。有的药名写错了，有的功效写错了，还有的根本就是骗人的。李时珍看在眼里，急在心里。他说：\"医书关系人命，怎能有半点马虎？我要重新整理一遍，把正确的知识传给后人！\"", "从此，李时珍背起药箱，开始了漫长的实地考察。他走遍了湖北、湖南、江西、安徽、江苏的山山水水，采集各种草药标本，记录各种药材的生长环境和功效。有时候为了找到一味药，他要在深山里走好几天。", "在三十多年的时间里，李时珍翻阅了将近八百多本古籍，做了上百万字的笔记。他的足迹遍布大半个中国，采集了一万多种草药标本。1578年，李时珍终于完成了《本草纲目》的编写。这本书一共52卷，收录了1892种药材，11000多个药方！", "《本草纲目》后来传到了全世界，被翻译成日文、英文、法文等多种文字，至今还是中医的重要参考书。李时珍的故事告诉我们：做一件有意义的事，什么时候开始都不晚；只要坚持到底，普通人也能做成伟大的事！"], "zhangheng_bio": ["在将近两千年前的中国，有个叫张衡的人，他可厉害了，是古代少有的大科学家。不光会写文章，还是天文学家、数学家、发明家，大家都叫他\"科圣\"。张衡从小就喜欢问\"为什么\"——天上的星星为什么会闪？月亮为什么会有圆有缺？日食月食是怎么回事？", "张衡家里很穷，买不起书，他就借别人的书来看。有时候一本书要抄下来才能带走，他就夜以继日地抄写，从来不叫苦叫累。慢慢地，他的学问越来越大，成了当地很有名气的才子。公元100年，郡守听说了张衡的才华，推荐他到洛阳去做官。", "在洛阳，张衡当上了太史令，这是一个专门负责观测天文和记录历史的官。张衡可高兴了，因为他终于可以专心研究自己感兴趣的东西了。他每天晚上都到天文台上去观测星星，把每一颗星的位置都记下来。", "那时候，人们对地震还很迷信，认为地震是神仙发怒，是不祥之兆。可张衡不信这些，他想弄清楚地震到底是怎么回事。经过很多年的研究，公元132年，张衡终于发明出了世界上第一台测定地震方位的仪器——地动仪。", "地动仪是铜做的，圆圆的，像一个大酒坛子。坛子外面有八条龙，龙嘴里各含着一颗铜球，下面蹲着八只张着嘴的蛤蟆。哪边发生了地震，相应方向的龙嘴就会张开，铜球掉进蛤蟆嘴里，发出\"当\"的一声响，人们就知道哪个方向发生地震了。", "地动仪发明不久，有一天，地动仪上东方那条龙突然张开了嘴，铜球\"当\"的一声掉进了蛤蟆嘴里。可是那天洛阳并没有感觉到地震，人们都议论纷纷：\"什么地动仪？根本不灵嘛！\"张衡没有争辩，他只是说：\"等着看吧。\"", "过了几天，从陇西（在今天的甘肃省）来了一匹快马，送来了地震的消息——陇西发生了大地震！人们这才服了：\"张衡的地动仪真灵啊！连我们感觉不到的地震，它都能测出来！\"", "张衡不仅发明了地动仪，还发明了自动报时的滴漏壶、能飞的木鸟、指南车等等很多东西。他还写了《灵宪》《算罔论》等科学著作，画出了第一张比较准确的星图，记录了2500多颗星星！", "在文学方面，张衡也是个高手。他的《二京赋》写得特别长，是汉赋中的名篇；他的《归田赋》则写得清新自然，开启了魏晋山水文学的先河。可以说，张衡是古代少有的文理全才。", "公元139年，张衡在洛阳去世，享年62岁。他一生不慕名利，只喜欢研究科学和学问。美国科学家阿西摩夫曾说：\"张衡是中国文化史上一颗光芒万丈的星。\"张衡的故事告诉我们：科学是神奇的，学好科学可以造福人类！"], "zhangfei": ["话说三国时候，刘备的军队被曹操的大军追得四散逃跑。关羽在前面开路，张飞断后护着刘备撤退。可曹兵越来越多，眼看就要追上来了！关羽在前面杀出一条血路，可后头的张飞身边只剩下二十几个骑兵，怎么办呢？", "张飞骑在马上，瞪圆了眼睛，胡子都竖起来了。他心想：大哥和二哥（关羽）都在前面拼命，我张飞怎么能怕！我一个人也要挡住曹兵！", "张飞带着二十几个骑兵，来到了当阳桥。这座桥可不一般，桥下是又深又急的河水，桥这边是蜀军，桥那边是曹操的千军万马！张飞站在桥头，横枪跃马，大喊一声：谁敢来与我决一死战！", "这一声喊，可把曹兵吓了一大跳！张飞的声音像打雷一样轰隆隆的，在山谷里回荡。曹操的士兵们你看我，我看你，谁也不敢第一个冲上去。", "张飞更得意了，他又大吼一声，声音比刚才还大：燕人张翼德在此！谁敢与我一战！这一声喊得更响了，曹操身边的将领都觉得耳朵嗡嗡的。曹操也被这气势震住了，他想起以前关羽说过：我三弟张飞，在百万军中取上将首级，如探囊取物！", "曹操正犹豫着，忽然张飞又大喊一声：战又不战，退又不退，却是何故！这一声喊完，只听轰隆一声，桥断了！曹兵以为有埋伏，赶紧往后退。", "原来啊，张飞早就让人在桥后面准备了，等曹兵一退，他就拆了桥，稳稳当当地撤退了。刘备听说后，直夸三弟智勇双全：张飞这一声吼，吓退了曹操的百万大军，真是太厉害了！", "张飞喝断当阳桥的故事告诉我们：有时候勇气比武力更强大！在困难面前，只要鼓起勇气，就能创造奇迹！"], "qinshihuang": ["两千多年前的战国时期，天下有七个国家整天打来打去，百姓们可遭殃了。今天这个国家来抢东西，明天那个国家来征兵，老百姓种的庄稼都被踩烂了，大家都盼着什么时候能过上太平日子。", "在西方有一个国家叫秦国，国王叫赢政。这赢政从小就聪明过人，十三岁就当上了国王。可是那时候他还是个小孩，大权都在大臣手里。等他长大后，他先把那些欺负他的大臣一个个收拾了，然后开始统一天下的大业。", "赢政心想：这么多国家打来打去，什么时候是个头啊？不如我把他们都灭了，让天下统一，百姓不就能太平了吗？于是他开始攻打其他六国。别的国家也有厉害的将军和军队啊，打起仗来可不容易！", "赢政有个好帮手叫李斯，是个特别聪明的人。李斯给他出主意：咱们可以离间他们！比如今天请韩王吃个饭，明天给赵国送点礼，让他们互相猜疑，不就没法联合起来对付咱们了吗？赢政听了，连连点头：妙计妙计！", "就这样，秦国用了十年时间，一个一个地灭了韩、赵、魏、楚、燕、齐六个国家。公元前221年，最后一个国家齐国也被灭了，赢政终于统一了天下！", "统一之后，赢政可忙坏了。他让人把各国的城墙都拆了，修成一条条大路，叫驰道；他统一了钱币和文字，大家做生意方便多了；他还在北方修筑了万里长城，防止匈奴入侵。", "赢政给自己起了一个新名字——秦始皇。他说：从今以后，我是第一个皇帝，以后还有二世、三世，一直传下去，传到千秋万代！可惜秦朝只传了两代就没了，但秦始皇统一中国的功劳，永远被人们记住了。", "秦始皇统一六国的故事告诉我们：统一能带来和平与发展！虽然秦始皇也有缺点，但他统一中国的功绩，是中华民族历史上的大事件！"], "simaguang": ["北宋时候，有一个叫司马光的小孩，住在一个大院子里。他的邻居们也都住在这附近，小伙伴们经常一起玩耍，大家最喜欢玩的就是捉迷藏和爬假山。", "有一天，天气热得很，知了在树上叫个不停。几个小伙伴又聚在一起玩，忽然有人提议：咱们玩捉迷藏吧！大家纷纷赞同。石头、剪刀、布之后，一个叫小虎的孩子输了，他被蒙上了眼睛，其他小伙伴一哄而散。", "一个小伙伴跑得太急了，没看清脚下有一个大水缸。这口缸可大了，比一个小孩子还高，里面装满了水，是院子里用来防火的。那孩子一脚踩空，扑通一声掉进了缸里！", "缸里的水哗哗地流出来，那孩子挣扎着喊救命：救命啊！救命啊！可是他越挣扎，身体就越往下沉，水咕嘟咕嘟地灌进了他的嘴里、耳朵里、鼻子里。小伙伴们都吓坏了，有的哭了起来，有的喊大人。", "司马光也吓坏了，可他比其他孩子大一点，心里也冷静一点。他看着那口大缸，又看看自己矮小的身板：不行啊，我够不到缸沿，缸又太高太滑，我爬不上去……", "忽然，司马光看到地上有一块大石头，眼睛一亮：有了！他搬起那块大石头，瞄准水缸，用尽全身力气砸了下去——砰！哗啦啦啦！缸被砸破了一个大洞，水哗哗地流了出来。那个掉进缸里的小伙伴终于得救了！", "大人们听到动静赶紧跑过来，看到满地的水和破了的大缸，又看看获救的孩子，都松了一口气。大家纷纷夸司马光：你真聪明！真勇敢！这件事传开后，人们都夸司马光是个遇事冷静、聪明机智的好孩子。", "司马光砸缸的故事告诉我们：遇到危险不要慌，开动脑筋想办法，小脑袋也能解决大问题！"], "zhaojun": ["两千多年前的西汉时候，有个叫王昭君的姑娘，她长得可漂亮了，是村子里最美丽的女孩。昭君不仅长得美，还弹得一手好琴，唱起歌来像百灵鸟一样动听。", "皇帝听说民间有这么个美人，就把昭君选进了皇宫。昭君以为进了皇宫就能过上好日子，可谁知道，宫里有那么多漂亮的姑娘，昭君既不会讨好画师，也不会说好听的话，画师给她画像的时候，故意把她画丑了。", "几年过去了，昭君连皇帝的面都没见过几次，她每天只能弹弹琴、绣绣花，心里闷闷不乐的。有一天，边境的匈奴人派使者来求婚，说匈奴的单于想娶一个汉族的公主做妻子。", "皇帝正为这件事发愁呢：把自己的亲生女儿嫁到那么远的地方，谁舍得啊？这时，有个大臣悄悄说：陛下，后宫有个叫王昭君的宫女，长得挺漂亮的，要不让她去？皇帝想了想，点头同意了。", "昭君听说后，心里又惊又喜。惊的是自己要嫁到那么远的北方，喜的是终于能离开这个冷清的皇宫了。出嫁那天，昭君穿着漂亮的红嫁衣，骑在马上，慢慢地离开了长安。", "当车队走到边塞的时候，昭君忍不住弹起了琵琶。琴声悠扬，像在诉说着她的故事。忽然，天空中飞来了一群大雁，它们听到琴声，竟然忘了扇动翅膀，一只只掉落下来！人们都说：这就是昭君美得连大雁都看呆了！", "到了匈奴，昭君成了单于的王后。她教匈奴人织布、种庄稼，还把汉族的文化带到了草原上。匈奴人再也不想打仗了，两边签订了和平协议，边境的老百姓终于过上了太平日子。", "昭君出塞的故事告诉我们：美不只是外表，善良和勇敢才是真正的美。昭君用她的智慧和善良，换来了两个民族的和平！"], "liguang": ["两千多年前的西汉时候，北方有一个强大的敌人叫匈奴。匈奴人骑着马到处抢东西，破坏村庄，百姓们苦不堪言。汉朝皇帝派了很多将军去打仗，其中最厉害的一个叫李广，大家都叫他飞将军。", "李广武艺高强，射箭特别准，百步之内箭无虚发。有一天晚上，月亮又圆又亮，李广带着士兵们在山间巡逻。忽然，旁边的草丛里传来沙沙的声音，李广警觉地搭弓射箭，嗖的一声，箭射进了草丛里。", "士兵们跑过去一看，都惊呆了——箭射中的不是什么野兽，而是一块大石头！可是那箭深深扎进石头里，只露出一点箭尾，这箭法也太神了吧！李广也觉得很奇怪：我再射一次试试。", "李广又搭弓射箭，嗖嗖嗖连射几箭，可这些箭都弹开了，根本射不进石头。有人笑着说：也许刚才那一箭是碰巧射进石头缝里了吧？李广想了想，觉得也是，就没有再试。", "后来过了很多年，人们才知道，原来李广第一次射箭的时候，正好是月亮最亮的时候，在那一瞬间，李广的眼睛特别亮，力气也特别大，加上他专心致志，所以那一箭的力量特别大，竟然射穿了石头！", "李广驻守边关四十多年，和匈奴打了一百多场仗，每次都冲锋在前。士兵们都愿意跟着他打仗，因为他不仅武艺高强，还特别爱护士兵，行军的时候他和士兵们同吃同住，一点架子都没有。", "虽然李广那么厉害，可是他一辈子都没有被封侯。有人说他运气不好，可李广从不抱怨，他总是说：只要匈奴人不敢来侵犯，百姓能过上太平日子，我就心满意足了。", "李广射虎的故事告诉我们：真正的英雄不一定要被封官加爵，能保护百姓、让人们过上好日子，才是真正的大英雄！"], "luban": ["两千五百多年前，中国出了一个超级厉害的工匠，他的名字叫鲁班。鲁班从小就跟爸爸学做木工，他的手可巧了，不管什么木头，到了他手里，都能变成有用的东西。乡亲们都夸他：小小年纪，手艺就超过他爹啦！", "有一天，鲁班上山砍木头。山路很陡，到处都是野草和荆棘。鲁班走得满头大汗，一不小心，手被一种野草划破了。鲜血直流，疼得他直吸冷气。鲁班仔细一看，咦？这草叶子边缘有好多小牙齿，怪不得这么锋利！", "鲁班忍着疼，心里却冒出了一个奇妙的想法：如果我也用这种带齿的铁片锯木头，是不是也能又快又省力呢？他赶紧跑回家，找铁匠师傅帮忙，打造了一根带齿的铁片。", "鲁班拿着这个奇怪的东西去锯木头，嘿！还真管用！木头像豆腐一样被锯开了，又快又省力！这就是锯子的来历。鲁班高兴得像个孩子，逢人就炫耀：看，我发明的锯子！", "除了锯子，鲁班还发明了好多好多东西呢！他看到人们用桶去河里提水，太累了，就发明了辘轳——一种利用绳子转圈就能把水桶从井里拉上来的工具。他还发明了墨斗，就是木匠用来画直线的工具，到现在还在用呢！", "鲁班还想出了用木头做云梯的方法，帮助士兵们爬城墙打仗。他还用木头做了一只木鸟，据说能在天上飞三天三夜不停！虽然后来没人见过这只木鸟，但大家都相信，以鲁班的手艺，一定能做出这样的神奇东西。", "鲁班的名声越传越远，连后来的木匠们都把他叫做祖师爷——就是这一行的老祖宗。现在我们用的很多工具，最早都是鲁班发明的。他的故事告诉我们：多观察、多思考，就能创造出改变世界的东西！"], "libing": ["战国时候，四川这个地方可不是现在的天府之国。那时候常常发大水，洪水一来，老百姓的房屋被冲垮，庄稼被淹没，日子苦得没法说。大家年年祈求老天爷保佑，可洪水还是年年都来。", "后来，秦国的国王派了一个叫李冰的人来当蜀郡的郡守，就是管理四川的大官。李冰带着他的儿子二郎，来到岷江边考察。他们走遍了千山万水，终于找到了洪水泛滥的原因：原来岷江上游的水流太急了，带着很多泥沙冲到下游，就把河道堵住了！", "李冰和二郎想了很久，终于想出了一个绝妙的主意：与其堵住洪水，不如让洪水自己分流！在江中间建一个分水的堤坝，把岷江的水分成两条河，一条流向外江（泄洪道），一条流向内江（灌溉渠）。这样洪水来的时候，就不会全部挤在一起冲毁村庄了。", "这个办法说起来容易，做起来可太难了！那时候没有挖掘机，没有起重机，全靠人工一锄头一锄头地挖，一扁担一扁担地挑。李冰带着老百姓，日日夜夜地干活，手上磨出了血泡，血泡又变成了老茧。", "最难的是凿穿玉垒山，把水引到东边去。玉垒山坚硬得像铁一样，锤子砸下去只能留下一个小白点。有人泄气地说：这么大的山，什么时候才能凿通啊？李冰坚定地说：只要我们坚持不懈，子子孙孙一代代挖下去，总有一天会挖通的！", "就这样，李冰父子带领四川人民，花了好几十年时间，终于建成了都江堰。这个水利工程太神奇了！它不需要大坝，不需要闸门，却能自动分流、自动排沙、自动灌溉。两千多年来，都江堰一直默默地保护着四川平原，让这里变成了天下最富饶的地方。", "直到现在，都江堰还在发挥作用，灌溉着上千万亩农田！李冰父子虽然早已不在了，可是他们的智慧和功劳，永远留在了四川人民的心中。都江堰的故事告诉我们：真正的伟大，是为大多数人造福；真正的智慧，是顺应自然、与自然和谐相处！"], "zhangzhongjing": ["在东汉末年，天下大乱，瘟疫流行，很多人因为没有好医生、好药方而死去。那时候有个著名的医生叫张仲景，他的家族本来有两百多人，可是在十年间，有三分之二的人因为瘟疫去世了。张仲景看在眼里，疼在心里，他发誓一定要找到治病的方法！", "张仲景从小就立志学医。他拜了当地最有名的医生做师父，刻苦学习医术。白天他跟着师父出诊，晚上就挑灯夜读，把所有的医书都背得滚瓜烂熟。很快，他就成了当地有名的好医生。", "可是张仲景发现，很多医生治病只是头痛医头、脚痛医脚，没有找到生病的根本原因。他想：能不能写一本书，把各种疾病的原因和治疗方法都总结出来，让更多的人能够受益呢？", "于是，张仲景开始了他漫长的行医之旅。他走遍了河南、湖北、湖南、四川等地，一边给病人看病，一边收集各种药方。他还虚心向民间的医生请教，收集了三百多个民间验方。", "经过十几年的努力，张仲景终于写成了《伤寒杂病论》这本书。'伤寒'就是我们现在说的感冒发热等外感疾病；'杂病'就是内科、妇科、儿科等各种疾病。这本书把疾病分成了不同的类型，每个类型都有对应的药方，特别系统、特别实用！", "《伤寒杂病论》里记载了三百多个药方，很多药方到现在还在用。比如'桂枝汤'治疗感冒发热，'麻黄汤'治疗风寒感冒，'小柴胡汤'治疗忽冷忽热的疾病……这些药方效果都特别好，一直被用了两千年！", "张仲景不仅医术高明，医德也特别好。他给人看病从来不收钱，对穷苦的病人尤其照顾。所以大家都叫他'医圣'，意思是医生中最神圣、最了不起的人。他的书《伤寒杂病论》更是被称为'中医四大经典'之一，是每个学中医的人必读的书。张仲景的故事告诉我们：只有把个人的志向和社会的需要结合起来，才能做出真正伟大的事业！"], "tuibisan": ["春秋时期，晋国有个公子叫重耳。他可不是一般的王子，因为他小时候太善良了，经常被人欺负，后来干脆逃出了自己的国家，四处流浪。", "重耳带着一群忠心的随从，逃了很多很多地方。有一年，他们逃到了楚国。楚成王听说重耳来了，不但没有看不起他，还热情地接待了他们，摆下丰盛的酒席请他们吃饭。", "楚成王在酒席上开玩笑问重耳：公子啊，如果以后您回到晋国当了国君，该怎么报答我呢？重耳想了想，认真地说：如果我真的能回去，以后两国打仗，我就退让三舍。", "舍是古代的距离单位，一舍等于三十里。三舍就是九十里呢！大臣们都觉得重耳在说大话，可楚成王却记住了这句话，他觉得重耳是个知恩图报的人。", "后来，重耳果然回到晋国当了国君，就是历史上著名的晋文公。几年后，楚国和晋国真的打起来了。晋文公想起了自己的承诺，立刻下令：后退九十里！", "将士们都不理解了：大王，我们好不容易才打到这里，为什么要后退啊？晋文公说：我答应过楚王，退避三舍。这是我欠他的，我必须讲信用！", "楚军看见晋军后退，以为晋军害怕了，就得意洋洋地追了上来。可是他们不知道，晋军退到了城濮，那里地形对他们非常有利。晋军以逸待劳，一下子把楚军打得大败！", "楚军将领子玉狼狈地逃回了楚国，气得差点自杀。晋文公却并不骄傲，他说：这场胜利，是因为我们守信，得到了百姓的支持。不信守承诺的人，是不可能成功的！", "退避三舍的故事告诉我们：有时候后退不是懦弱，而是为了更好地前进。讲信用的人，才能得到别人的尊重和帮助！"], "fenghuo": ["西周的时候，有个国王叫周幽王。这个国王啊，整天就知道吃喝玩乐，不理朝政。大臣们急得团团转，可他呢，只顾着找乐子。", "有一天，周幽王出去打猎，路上遇到一个美女。那美女长得可漂亮了，眼睛像星星一样亮，笑容像春天的花朵。周幽王一看，眼睛都直了：哎呀，这是谁家的姑娘？我一定要把她娶回宫！", "这个美女叫褒姒，是个穷苦人家的女儿。周幽王用了很多金银珠宝才把她买回来。可是褒姒进了宫，却一点也高兴不起来，整天愁眉苦脸的，从来不笑。", "周幽王急坏了：美人啊美人，你要什么我都给你！你怎么就是不肯笑呢？他变着法子逗褒姒开心——唱歌、跳舞、杂技表演……可是褒姒看了，一点反应都没有。", "周幽王急得像热锅上的蚂蚁。这时，一个坏主意多的大臣虢石父来了：大王，我有办法让娘娘笑！周幽王赶紧问：什么办法？快说！", "虢石父说：咱们西周不是有烽火台吗？如果有敌人来入侵，就点燃烽火，各路诸侯看见了就会带兵来救。大王可以点燃烽火，让诸侯们白跑一趟，娘娘看了肯定会笑的！", "周幽王一拍大腿：好主意！他立刻跑到烽火台，点燃了烽火。远处的诸侯们看到烽火，以为敌人打来了，赶紧带上士兵，日夜兼程赶来救驾。", "可是等他们气喘吁吁地赶到一看，什么敌人也没有！只见周幽王和褒姒坐在高台上，褒姒看见这么多人马狼狈的样子，果然笑了出来。诸侯们这才知道自己被骗了，气得吹胡子瞪眼。", "后来，真的有敌人打来了。周幽王赶紧点燃烽火，可诸侯们以为又是骗人的，谁也不来救。最后，周幽王被敌人杀死了，西周也灭亡了。", "烽火戏诸侯的故事告诉我们：诚信就像空气，失去了谁都活不了。拿诚信开玩笑的人，最终一定会自食其果！"], "jiangtaigong": ["很久很久以前，有个白发苍苍的老爷爷叫姜子牙。他年轻的时候可苦了，卖过肉、开过酒店，干什么都不成功。别人都嘲笑他：姜子牙啊姜子牙，你就是天生穷命的相！", "可是姜子牙不服气。他每天一边干活，一边读书，研究天文地理、军事政治。虽然日子过得穷巴巴的，但他的学问却越来越大了。", "有一天，姜子牙听人说，西伯侯姬昌是个贤明的君主，正在招揽人才。姜子牙心想：这可是个机会啊！可是怎么才能见到他呢？", "姜子牙灵机一动，想出了一个主意。他跑到渭水河边，用一根直直的鱼钩钓鱼！你没听错，是直直的鱼钩，不是弯的！这鱼钩别说钓鱼了，连鱼鳞都钩不住。", "有人路过看见了，嘲笑他说：老人家，你这样能钓到鱼才怪呢！姜子牙笑眯眯地说：鱼儿鱼儿，愿者上钩！大家都觉得这个老头子疯了。", "消息传到了西伯侯姬昌耳朵里。姬昌觉得有意思，就派了个人去看看。那个士兵到了河边，看见姜子牙果然用直钩钓鱼，忍不住笑出声来。", "姜子牙头也不抬，念了一句：钓钓钓，大鱼不到小鱼到，小鱼不到虾蟆到！士兵觉得这人说话真有意思，就回去报告了姬昌。", "姬昌亲自来了。他远远地看见姜子牙仙风道骨的样子，心里一震：这人不是普通人！他走到姜子牙面前，恭恭敬敬地说：先生，我请您出山，帮我治理天下！", "姜子牙终于等到了这个机会。他跟着姬昌回到王宫，帮助姬昌发展生产、训练军队。后来姬昌的儿子周武王灭了商朝，建立了周朝。姜子牙被封为齐国国君，成了历史上著名的姜太公。", "姜太公钓鱼的故事告诉我们：机会总是会来的，但前提是你要有真本事。姜子牙用直钩钓鱼，看似荒唐，实际上是在等一个懂他的人！"], "xiean": ["东晋的时候，有个超级厉害的大臣叫谢安。他是当时最有智慧的人，老百姓都叫他江左夷吾，意思是说他是国家的顶梁柱。", "公元383年，前秦的皇帝苻坚带着八十万大军浩浩荡荡地杀过来了！那军队可长了，前面已经过了河，后面还没出发呢！苻坚得意洋洋地说：长江天堑又怎样？我投鞭子就能把长江水断掉！", "东晋朝廷吓坏了：八十万大军啊！东晋全部的军队加起来才八万人！这一比一的比例，怎么打啊？大臣们急得团团转，皇帝更是坐立不安。", "谢安却很淡定。他说：大家别慌，我自有办法！他派自己的侄子谢玄带兵去迎战。谢玄有点紧张，问：叔叔，万一打败了怎么办？谢安笑着说：你就放心去打，天塌下来有我顶着！", "大战之前，谢安和朋友们下棋打赌。他的朋友们都紧张得吃不下饭，只有谢安像没事人一样，还赢了赌局。有人问他：您不担心吗？谢安说：担心有什么用？我早就算好了！", "谢玄到了前线，发现苻坚的军队虽然人多，但纪律松散，内部还不团结。他灵机一动，想出了一个计策：让士兵们大喊秦军败了！秦军败了！然后假装后退。", "秦军果然中计了！后面的士兵以为前面打败了，开始往后跑。前面的士兵又以为后面的人要逃跑，也跟着跑了起来。一时间，八十万大军乱成一锅粥，自相践踏，死伤无数。", "前线的捷报传回京城时，谢安正在和客人下棋。他看完信，随手放在一边，继续下棋。客人急了：战况怎么样了？谢安慢悠悠地说：没什么，就是孩子们把敌人打败了。", "等客人走后，谢安高兴得跳了起来！他冲进书房，一不小心把木屐的鞋跟都碰断了！原来，他表面平静，心里其实紧张得很呢！这就是成语折屐齿的由来。", "淝水之战告诉我们：打仗不在人多，而在人心。只要团结一心、以智取胜，小力量也能打败大军队！"], "linxiangru": ["战国时期，赵国有个大功臣叫蔺相如。他本来只是个小门客，可是因为立了大功，被赵王封为上卿，地位比老将军廉颇还高！", "廉颇心里可不高兴了。他想：我廉颇在战场上出生入死，打了多少胜仗！这个蔺相如不就是耍嘴皮子吗？凭什么地位比我还高！", "廉颇气呼呼地说：哪天让我碰到蔺相如，一定要当众羞辱他一番！让他知道谁才是赵国的老大！这话传到蔺相如耳朵里，大家都以为蔺相如会生气。", "可是蔺相如一点都不生气。有一天，他坐车出门，远远地看见廉颇的车迎面而来。他赶紧让车夫把车掉头躲开，躲得远远的。", "蔺相如的手下都觉得很丢脸：大人，您怎么这么怕廉颇啊？我们在外面都抬不起头来了！蔺相如笑了笑，问：你们说，廉颇将军和秦王比，谁更厉害？", "手下人说：当然是秦王厉害啊！蔺相如说：秦王那么厉害，我都敢当面训斥他，我怎么会怕廉将军呢？我躲着他，是因为赵国不能没有他啊！", "蔺相如继续说：如果我和廉将军闹翻了，国家会怎么样？秦国知道我们内部不和，肯定会趁机打过来。到时候，赵国不就完了吗？我个人的面子，和国家的安危比起来，算什么呢？", "手下人听了，感动得眼泪都快掉下来了。慢慢地，蔺相如不计较个人得失、一心为国的事传开了。廉颇听说了，脸一下子红了：哎呀，原来蔺相如是这样为国家着想的人啊！我真是太小心眼了！", "廉颇脱掉上衣，背着一根荆条，走到蔺相如门口，跪下说：蔺大人，我知道自己错了！请您用荆条打我吧！蔺相如赶紧把他扶起来，说：将军知错就好，我们以后一起为赵国效力！", "从此，蔺相如和廉颇成了最好的朋友，他们一起努力，让赵国变得越来越强。这就是负荆请罪和将相和的故事。", "蔺相如和廉颇的故事告诉我们：朋友之间难免有误会，但只要多为对方着想，多为国家着想，就没有解不开的结！"], "yanzi": ["春秋时期，齐国有个大名鼎鼎的外交家，名叫晏子。别看他个子矮矮的，只有六尺高，可他的嘴巴比刀子还厉害，谁也别想在他那儿占到便宜！", "有一次，齐王派晏子出使楚国。楚王听说晏子要来，心里想：这个晏子不是号称能说会道吗？我倒要看看他有多厉害！于是他和大臣们商量好，要在晏子进城的时候好好羞辱他一番。", "晏子的马车到了城门下，楚国士兵故意把城门关得紧紧的，只留了一个五尺高的小洞。楚王派人对晏子说：听说你个子矮，从这个洞钻进去就行了，何必费事开门呢？", "晏子哈哈大笑，从马车里探出头来，说：这是狗洞，不是城门！我出使到狗国，才从狗洞进去呢！你们楚国是狗国吗？楚王听了，脸一下子红了，只好下令打开城门。", "晏子大摇大摆地走进王宫。楚王正坐在高高的宝座上，看见晏子进来，故意装出一副惊讶的样子说：哎呀，齐国难道没有别的人了吗？怎么派你这么矮的人来出使？", "晏子不慌不忙地说：大王有所不知，我们齐国有个规矩——出使上等国家，就派上等人去；出使下等国家，就派下等人去。我最不中用，所以就被派到楚国来了！", "楚王见晏子伶牙俐齿，心里很不服气。他眼珠一转，想出了个坏主意，让人把一个犯人押上来，故意大声问：这人是哪里人？犯了什么罪？手下人说：是齐国人，犯了盗窃罪！", "楚王故意看着晏子说：齐国人是不是天生就喜欢偷东西啊？晏子却不生气，他慢悠悠地说：橘子长在淮河以南又甜又大，长在淮河以北又苦又小，这是因为水土不同啊！齐国人在齐国好好的，到了楚国就偷东西——大概是因为楚国的水土让人变成小偷吧！", "满朝文武听了，都被晏子的机智逗得哄堂大笑。楚王呢，脸涨得通红通红，再也不敢小看晏子了。他竖起大拇指说：晏子大夫真是名不虚传啊，本王服了！从此，楚国和齐国成了好朋友。"], "zhougong": ["周武王建立周朝后，有个特别能干的弟弟叫周公。周公不但帮武王打天下，更是在武王去世后，尽心尽力辅佐年幼的小天子，被后人尊称为\"元圣\"。", "周公有多忙呢？他每天要处理很多很多的国家大事，接见络绎不绝的来访者，还要制定各种规矩制度。有时候，他正在吃饭，外面突然有人求见。周公二话不说，赶紧把嘴里的饭吐出来，跑去接待客人。", "吃完一口饭，又有人来，又要吐出来去接待。一顿饭下来，他要吐好几次呢！人们都说：周公吃饭可真不容易，嘴里还没嚼烂就跑出去了！", "晚上，周公也闲不下来。他经常工作到半夜，批阅堆积如山的竹简文书。有时候实在困得睁不开眼了，就用冷水洗洗脸，继续干活。星星都睡觉了，他还在烛光下忙碌着。", "周公还特别谦虚有礼貌。有一个叫伯禽的人来看他，伯禽是周公的儿子，刚被封到鲁国当诸侯。周公对儿子说：你到了鲁国，可千万要谦虚啊，不要因为是周天子的儿子就骄傲。", "周公说：我是天子的弟弟，却要恭恭敬敬地接待每一个来访的人。你也要一样，对百姓要有礼貌，对有才能的人要尊重，这样人家才愿意帮你啊！", "周公还经常去民间走访，看看百姓生活得怎么样。有一次，他发现一个老爷爷在路边哭泣，就赶紧上前问：老人家，您怎么了？老爷爷说：家里闹饥荒，没米下锅了。周公听了，心里可难受了。", "回到王宫后，周公立刻下令打开粮仓救济灾民。他还亲自去探望那个老爷爷的家庭，送去了粮食和衣物。老爷爷感动得热泪盈眶：周公真是我们的好管家啊！", "周公辛勤工作了一辈子，终于累倒了。临死前，他还在念叨着：百姓吃饱了吗？孩子们上学了吗？国家安定吗？人们为了纪念他，修建了周公庙，把他当作尊敬长辈的典范。", "后来，曹操在诗里写道：周公吐哺，天下归心。就是说周公连吃饭都顾不上，一心为百姓着想，所以全天下的人都真心拥护他。周公吐哺的故事告诉我们：心里装着别人，认真做事的人，才会得到大家的尊敬！"], "libai": ["唐朝有个大诗人叫李白，他的诗写得可好啦！据说他在妈妈肚子里的时候，妈妈梦见天上的星星掉进了怀里，所以给他取名\"白\"——就是像白玉一样纯洁透明的意思。", "李白从小就特别聪明，五岁就能背诗，十岁就写出了让人惊叹的文章。可是他最厉害的不是这个——他最喜欢喝酒！每天都要喝得醉醺醺的，然后才能写出好诗来。", "有一年中秋节，李白在花好月圆的美景下喝起了酒。喝着喝着，他抬头看见又大又圆的月亮倒映在酒杯里，美得像一幅画。李白迷迷糊糊地说：月亮真美啊……我要飞上去看看！", "说完，李白就摇摇晃晃地站起来，想要去捞月亮。他把船划到江中心，对着水里的月亮伸出手去捞——扑通！一下子掉进了江里。渔民们赶紧把他救上来，大家都笑得前仰后合。", "虽然掉进了江里，李白却一点都不后悔。他躺在船上，望着天上的月亮，诗兴大发，大声朗诵起来：\"床前明月光，疑是地上霜。举头望明月，低头思故乡。\"这首诗后来成了千古名篇！", "李白喝酒写诗的故事还有很多。有一回，皇帝唐玄宗请他进宫写诗，让他当场作一首夸赞杨贵妃的诗。李白喝了酒，脸红红的，一点都不紧张。他眯着眼睛，一边吟诵一边让太监高力士给他脱靴子。", "高力士可是大权臣，平时谁敢指使他？可李白醉醺醺地说：脱！不脱就不写！高力士气得脸都绿了，但又不敢得罪皇帝，只好憋着气给李白脱了靴子。", "李白就这样边喝酒边写，写出了《清平调》三首，把杨贵妃夸得跟天上的仙女似的。杨贵妃听了笑得合不拢嘴，连唐玄宗都鼓掌叫好。", "李白的诗充满了想象力，一会儿飞到天上和月亮喝酒，一会儿又跑到蜀道上感叹山路难走。他的诗读起来特别有画面感，好像一幅幅画在眼前展开。", "后来，人们都叫李白\"诗仙\"，因为他写的诗太厉害了，就像仙人作的一样。李白的故事告诉我们：做自己喜欢的事情，并且一直坚持，就能取得成功！"], "sushi": ["北宋有个大文豪叫苏轼，字子瞻，号东坡居士，大家都叫他苏东坡。他可是个超级厉害的人物——诗词、散文、书法、绘画，样样精通，简直就是全能学霸！", "苏东坡小时候特别聪明，读书过目不忘，写文章一挥而就。有一天，老师带着同学们去爬山，想考考大家的学问。爬到半山腰，老师指着远处的一座塔问：谁能以这座塔为题作首诗？", "其他同学还在冥思苦想，苏东坡已经脱口而出：\"人间草木育青红，我家门对最高峰，何时滑去无人到，有信秋风不可舂。\"老师听得连连点头：这孩子将来一定能成大器！", "苏东坡长大后当了官，可是他的官运不太好。因为他太正直了，总是说出真心话，得罪了不少人。有一次，他写诗批评新法，被人告发，差点丢了性命。", "最后，苏东坡被贬到了黄州，就是现在的湖北黄冈。那儿条件艰苦，薪水又少得可怜，苏东坡一下子变成了穷光蛋。可是他一点也不沮丧，反而在这里创造了著名的\"东坡肉\"！", "苏东坡研究出了一套做红烧肉的方法：把五花肉切成方块，加上酱油和酒，用小火慢慢炖。他说：\"黄州好猪肉，价钱如泥土。贵者不肯吃，贫者不解煮。\"意思是说，有钱人看不起猪肉，穷人又不会做，多可惜啊！", "苏东坡还经常自己下厨，邀请朋友们来家里吃\"东坡肉\"。朋友们吃了都赞不绝口：'这肉肥而不腻，入口即化，太好吃了！'苏东坡笑着说：'只要心态好，粗茶淡饭也是山珍海味！'", "后来，苏东坡又被贬到惠州、儋州，一次比一次远。可他依然乐观开朗，还发明了烤羊脊、烤生蚝等各种美食。他在诗里写：'日啖荔枝三百颗，不辞长作岭南人。'", "苏东坡用他的故事告诉我们：人生难免遇到挫折和困难，但只要保持乐观的心态，就能在逆境中找到快乐。苏东坡不愧是历史上最豁达的诗人！"], "baijuyi": ["唐朝有个大诗人叫白居易，他写的诗特别通俗易懂，老百姓都能看懂。据说白居易写完诗后，都要先念给不识字的老人听，如果老人听不懂，他就继续修改，直到老人能明白为止。", "白居易小时候家里穷，住在山脚下的小村子里。他特别喜欢读书，每天天不亮就爬起来，捧着书本在溪边朗诵。溪水哗哗地流，小鸟叽叽喳喳地叫，白居易觉得这是世界上最美的背景音乐。", "有一天，白居易在村口的大树下读书，读着读着睡着了。村里有个卖炭的老奶奶路过，看见他睡得香甜，就在他旁边坐下休息。等白居易醒来，老奶奶说：'小娃娃，你读的是什么书啊？'", "白居易揉揉眼睛说：'是我自己写的诗！'老奶奶笑了：'那你能念给我听听吗？'白居易大声念了起来。念完后，老奶奶皱着眉头说：'有一句我没听懂……'", "白居易脸红了，赶紧问：'哪一句？'老奶奶指着诗说：'就是这个'卖炭得钱何所营'，'何所营'是什么意思啊？'白居易这才明白，原来是自己用了太文绉绉的词。", "从那以后，白居易就特别注意把诗写得通俗易懂。他常去集市上、农田里，听老百姓聊天，学习他们说话的方式。慢慢地，他的诗越来越平易近人了。", "白居易有一首著名的诗叫《赋得古原草送别》，里面有一句'离离原上草，一岁一枯荣。野火烧不尽，春风吹又生'。这句诗简单又有哲理，连小朋友都能背诵！", "还有一首《琵琶行》，讲的是一个琵琶女的故事。白居易在诗里写：'同是天涯沦落人，相逢何必曾相识。'这句话后来成了千古名句，意思是：同样是漂泊在外的人，遇到就是缘分，不用以前认识。", "白居易后来当了官，做了很多好事。他曾经在杭州当刺史，带领百姓修建西湖堤坝，让更多的农田得到灌溉。杭州的百姓都叫他\"白使君\"，把他当作亲人一样爱戴。", "白居易写诗的故事告诉我们：好东西应该让大家都懂，大诗人也能写出接地气的诗！只要用心，就能把复杂的事情说得简单明白！"], "houyi": ["很久很久以前，天上有十个太阳，它们是东方天帝帝俊的儿子。每天，十个太阳轮流出勤，天上总是亮堂堂的，庄稼长得很好，人们生活得可开心啦！", "可是有一天，十个太阳觉得一起出来玩耍更有趣，就手拉手一起跑了出来。这下可糟糕了！十个太阳同时照耀大地，河流被晒干了，庄稼被烤焦了，森林着起了大火，人们热得喘不过气来。", "有一个叫后羿的大力士，他力大无穷，射箭的本领特别厉害。后羿看到人们受苦受难，心里难受极了。他拿起那张跟他一样高的神弓，背上满满一壶箭，决心要把多余的太阳射下来。", "后羿登上了一座高高的山顶，拉开神弓，瞄准天空——嗖！第一支箭飞上了天，一个太阳应声落下，只剩下九个太阳了。嗖！嗖！又是两箭，又有兩個太阳掉了下来。", "天上的太阳们吓坏了，它们东躲西藏，再也不敢一起出来了。只剩下一个太阳，每天从东方升起，从西方落下，给大地带来温暖和光明。庄稼又重新生长起来，人们又过上了幸福的生活。", "后羿成了大英雄，大家都感激他。天上的神仙也很高兴，他们送给后羿一颗仙丹作为奖励。后羿射日的故事告诉我们：遇到困难不要害怕，只要有勇气和本领，就能帮助需要帮助的人！"], "lvmeng": ["三国时候，东吴有一位将军叫吕蒙。吕蒙武艺高强，打起仗来特别勇猛，大家都叫他'吴下阿蒙'。可是吕蒙有个缺点——他从小家里穷，没有读过什么书，斗大的字不认识几个。", "有一天，吴王孙权把吕蒙叫来，说：你现在是一军之将，要多读点书，增长点学问才行啊！吕蒙为难地说：王爷，我是个粗人，拿起书来就犯困，真不是读书的料啊！", "孙权笑着说：你怎么比我还忙？我每天要处理那么多国家大事，还能抽出时间读书呢！你只要认真读，一定会有进步的。吕蒙听了王爷的话，不好意思再拒绝，就硬着头皮读起书来。", "一开始，吕蒙读书的时候眼皮直打架，看着看着就想睡觉。可是他咬着牙坚持，今天读一页，明天读两页，慢慢地，他发现书里的故事还挺有意思的。", "有一次，东吴的另一位大官鲁肃来找吕蒙商量事情。鲁肃是东吴有名的大学问家，他本来以为吕蒙还是那个只会舞刀弄枪的粗人，一见面却大吃一惊：哎呀，吕将军，你现在的谈吐和以前完全不一样了！", "吕蒙哈哈大笑：我哪里还是从前的吴下阿蒙！士别三日，当刮目相待嘛！意思就是说，分别几天之后，就不能用老眼光来看人了。鲁肃听了，连连点头，对吕蒙更加敬佩了。", "刮目相看的故事告诉我们：每个人都能改变自己，只要愿意学习、努力上进，就一定能让人刮目相看！"], "laozi": ["在很久很久以前的春秋时期，有一位超级厉害的老爷爷叫老子。他是当时最有智慧的人，大家都叫他'老子'，意思是很老很老的老师傅。老子在一个叫周朝的国家当图书馆馆长，每天的工作就是看书、思考、写书。", "有一天，年轻的孔子来找老子请教。孔子是鲁国的大思想家，很有学问，走路都昂着头。可他一见老子，恭恭敬敬地行礼请教。老子张开嘴巴，指着自己的牙齿和舌头说：'你看，我的牙齿全掉光了，可舌头还在。'孔子想了半天，终于明白了：牙齿硬的先掉，舌头软的还在——这就是'以柔克刚'的道理啊！孔子佩服得五体投地。", "老子晚年的时候，周朝越来越乱了。他心想：算了算了，这个地方待不下去了，我还是走吧。于是，他骑着一头青牛，慢慢悠悠地往函谷关走去。函谷关的守将叫尹喜，这天晚上，他突然看见东方有一道紫气飘来，足足有三千里长！尹喜高兴极了：'有大人物要来了！'", "果然，老子骑着青牛来了。尹喜亲自出关迎接，非要老子留下讲学不可。老子被他的诚意打动了，就把自己毕生的智慧写了下来，这就是著名的《道德经》。书里写着：'道可道，非常道；名可名，非常名。'意思是说，真正的道理是很难用言语说清楚的，要用心去体会。", "《道德经》虽然只有五千多个字，却包含了宇宙万物的大道理。老子说：'上善若水'，意思是做人要像水一样，表面上柔和，实际上最有力量——水能滋润万物，却从不和别的东西争高下。水往低处流，看起来很谦虚，可正是因为谦虚，最后才汇成了大海！", "老子还写道：'知人者智，自知者明。'意思是了解别人是聪明，了解自己才是真正的明白人。他还说过一个故事：从前有个人，以为自己很有智慧，整天嘲笑别人笨。结果有一天，他照镜子的时候，才发现自己脸上全是灰——原来最笨的是自己啊！", "写完《道德经》，老子骑上青牛，慢慢消失在了西方。没有人知道他去了哪里，但他的思想却留了下来，影响了中国几千年。后来的很多思想家、哲学家，都说自己是老子的学生。老子告诉我们的道理很简单：做人要谦虚，做事要耐心，不要争强好胜，这样才能活得长久，活得快乐！"], "bianque": ["春秋时期，有一个神医叫扁鹊。他医术高明，能治好各种疑难杂症，还会一种神奇的'透视眼'——能看到人身体里的问题。其实这不是真的透视，而是因为他观察病人特别仔细，能从蛛丝马迹中发现病因。", "有一天，扁鹊路过一个叫虢国的地方。他听说虢国的太子刚死了，大家都在举行葬礼。扁鹊问：'太子是怎么死的？'有人说：'太子突然倒地，就死了。'扁鹊想了想，问：'死了多久了？''一大早，到现在大概四个时辰。'扁鹊眼睛一亮：'还有救！快带我去看看！'", "扁鹊来到王宫，仔细观察太子的状况。他发现太子还有微弱的呼吸，鼻子微微翕动，耳朵后面靠近发际的地方还有温度。扁鹊高兴地说：'太子没死！他只是假死，就是我们说的'尸厥'！'国王又惊又喜：'真的？那你快救救他！'", "扁鹊立刻让弟子准备银针。他找准太子的穴位，一针扎下去，太子的身体微微动了一下。又扎了几针，太子的手指动了动。再扎一针——太子突然睁开了眼睛！满屋子的人都惊呆了！", "扁鹊又让弟子熬了药，给太子喝下去。太子喝了药，脸色慢慢红润起来。又调理了几天，太子完全恢复了健康，能跑能跳，和正常人一样！整个虢国都沸腾了：'扁鹊真是神医啊！把死人都救活了！'", "可是扁鹊却很谦虚地说：'不是我能起死回生，是太子本来就没死。我只是帮他把邪气赶走，让他的气血恢复正常罢了。'他还说了一句名言：'我大哥治病，是在病情发作之前就能发现病因，病人根本不知道自己生病，我大哥就把病治好了。我二哥治病，是在病情刚刚开始的时候，病人只是有点不舒服，我二哥就把病治好了。而我治病，是在病情很严重的时候，病人很痛苦，我才能看出来，所以大家都觉得我医术最高。'", "扁鹊的故事告诉我们：最高明的医生是治'未病'，就是还没生病就预防；同样，最聪明的人是在问题还小的时候就解决掉，不要等到问题严重了才着急！"], "tianji_saima": ["战国时期，齐国有个大将军叫田忌，他特别喜欢赛马。他的马养得膘肥体壮，跑起来可快了。可是他的对手是齐威王——齐国的国王，马也养得特别好。每次比赛，田忌都输，输得灰头土脸。", "田忌的谋士孙膑看在眼里，急在心里。孙膑是个特别聪明的人，虽然腿有点不方便（这是他以前被坏人陷害留下的残疾），但脑子可灵光了。他对田忌说：'将军，我有个办法，能让你赢！'田忌将信将疑：'真的假的？齐王的马比我的好，怎么可能赢？'", "孙膑笑着说：'马的等级差不多，只是有上、中、下三等。你的上等马和他上等马比，可能差一点；但你的下等马和他的上等马比，那差太多了。我的办法是：用自己的下等马去输给他上等马，然后用自己的上等马去赢他的中等马，最后用自己的中等马去赢他的下等马。这样三局两胜，你就赢了！'", "田忌听了，眼睛一亮：对啊！我怎么没想到！比赛那天，孙膑坐在田忌旁边当军师。第一场，田忌用下等马对阵齐王的上等马，果然输了。齐王哈哈大笑：'田忌啊田忌，你又输了！'田忌不慌不忙：'大王别急，还有两场呢！'", "第二场，田忌派出上等马，齐王派出中等马。发令枪一响，田忌的马像离弦的箭一样冲了出去，把齐王的马甩得老远！齐王愣了一下：'咦？'第三场，中等马对下等马，田忌又赢了！最终2比1，田忌赢了整场比赛！", "齐军溃败而逃，鲁庄公想立刻追击，曹刿却说：'等等，让我看看。'他下车看了看齐军撤退的车印，又上车望了望远方，说：'可以追了！'鲁军奋力追击，把齐军赶回了齐国。这一战，鲁国以少胜多，打了个大胜仗！", "田忌赛马的故事告诉我们：很多时候，实力不是最重要的，智慧和策略才是取胜的关键。用自己的长处去攻击对方的短处，看似吃了小亏，却能赢得最后的胜利，这就是聪明人的做法！"], "caogui": ["春秋时期，齐国和鲁国打起仗来了。齐国是个大国，军队人多势众；鲁国是个小国，军队人数少得多。鲁国的国王鲁庄公急得像热锅上的蚂蚁，召集大臣们商量对策。", "这时，一个叫曹刿的人站了出来。他是个普通的读书人，穿着粗布衣裳就来了。有人问他：'你一个普通人，能帮大王打什么仗？'曹刿说：'大王治理国家要靠德行，打仗要靠智慧。普通人没官位，但关键时刻也能出谋划策啊！'鲁庄公听说后，亲自接见了他。", "曹刿问鲁庄公：'大王，你凭什么能打赢这一仗呢？'鲁庄公想了想说：'我有很多金银财宝，吃的穿的都不缺。'曹刿摇摇头：'小恩小惠的东西，百姓不会为你拼命的。'鲁庄公又说：'我祭祀的时候特别虔诚，一点都不敢马虎。'曹刿还是摇头：'诚心是好的，但如果神明不能保佑你，虔诚也没用啊。'", "鲁庄公挠挠头，又说：'哦对了！有一年闹灾荒，老百姓没饭吃，我把自己仓库里的粮食拿出来分给大家；有一年闹虫灾，我把自己家的粮食借给百姓。这些事情虽然不大，但老百姓都记在心里。我觉得，大家一定会支持我的！'曹刿这才点点头：'对！能得到百姓支持的人，才能够打胜仗！大王，咱们出发吧！'", "两军在长勺摆开阵势。齐国军队擂响了战鼓，士兵们举着长矛，准备冲锋。鲁庄公也想擂鼓迎战，曹刿却说：'等等，别急。'齐军冲了一次，没遇到抵抗，疑惑地退了回去。过了一会儿，齐军又擂鼓冲锋，鲁庄公又想迎战，曹刿还是说：'再等等。'齐军冲了第二次，又没遇到敌人，只好又退回去。", "齐军连续擂了三次鼓，士兵们冲了两次，都白费力气，开始不耐烦了，阵脚也乱了。曹刿看准时机说：'现在可以了！擂鼓，进攻！'鲁国的战鼓震天响，士兵们像猛虎下山一样冲了出去。齐军正在休息，没想到敌人突然杀到，顿时阵脚大乱，被打得落花流水！", "齐军溃败而逃，鲁庄公想立刻追击，曹刿却说：'等等，让我看看。'他下车看了看齐军撤退的车印，又上车望了望远方，说：'可以追了！'鲁军奋力追击，把齐军赶回了齐国。这一战，鲁国以少胜多，打了个大胜仗！", "战后，鲁庄公问曹刿：'为什么不能急着追击呢？'曹刿说：'齐国是大国，第一次撤退可能是假装失败引诱我们。但我仔细观察，他们撤退时车印很乱，旗帜也倒下了，说明是真的溃败，不是假装。所以可以放心追击！'鲁庄公恍然大悟：'原来打仗不仅需要勇气，还需要智慧和冷静的判断啊！'", "曹刿论战的故事告诉我们：做事要抓住时机，不能操之过急；遇到问题要冷静分析，不能被表面现象迷惑；有勇有谋，才能成大事！"], "hufuqishi": ["战国时候，赵国的国王赵雍十九岁继承了王位。赵国虽然是个大国，可是北边的游牧民族——中山国和匈奴人，经常骑着马来抢东西，抢完就跑，赵国士兵穿着笨重的战车和宽大的衣服，根本追不上。每次打仗，赵国总是吃亏，赵雍看在眼里，急在心上。", "有一次，赵雍出使北方，亲眼看见胡人骑兵的厉害。那些胡人穿着短短的上衣、长长的裤子，骑在马上像长了一对翅膀，射箭、奔跑、转向，样样灵活。赵雍羡慕极了，心想：要是我赵国士兵也能这样穿、这样骑马，那该多好啊！", "回到赵国，赵雍把心中的想法告诉了大臣们：我打算让赵国百姓穿胡人的衣服，学习骑马射箭！大臣们听了，顿时炸开了锅。反对最激烈的是赵雍的叔叔公子成，他皱着眉头说：大王，这可不行啊！咱们中原人穿的衣服，是祖祖辈辈传下来的，穿胡人的衣服，那不是丢祖宗的脸吗？", "赵雍没有生气，他亲自上门去拜访叔叔。叔叔不见，赵雍就站在门口等。一天过去了，两天过去了，大雪飘落，赵雍冻得瑟瑟发抖，但他还是不肯走。第三天，叔叔终于被他的诚心打动了，答应见他。赵雍诚恳地说：叔叔，我们赵国地理位置特殊，北边有敌人，如果不变法图强，早晚会被吞并。打仗是为了保卫国家，穿什么衣服重要吗？", "叔叔沉默了。赵雍又说：我这样做，不是为了好玩，是为了赵国的强大，为了咱们的子孙后代不再受欺负！说完，赵雍跪下给叔叔行了一个大礼。叔叔被感动了，含着泪说：好，大王，我听您的！", "从那以后，赵雍带头穿上了胡服上朝。大臣们一看国王都穿了，也纷纷跟着穿。慢慢地，全国上下都穿上了行动方便的胡服。赵雍又亲自训练骑兵，骑在马上射箭，灵活得像一阵风。百姓们亲切地叫他武灵王——说他像神灵一样英明！", "几年后，赵国的骑兵强大起来，把欺负他们多年的中山国打得落花流水，一口气夺了好几个城池。赵国从此成为战国七雄中最厉害的军事大国之一。大家都说：看人家武灵王多有远见，一件衣服，改变了一个国家啊！", "赵武灵王胡服骑射的故事告诉我们：做正确的事情要有勇气，不要因为别人不理解就轻易放弃。外表的改变不可怕，可怕的是思想僵化、不敢创新！"], "xinlingjun": ["战国后期，秦国越来越强大，老想着吞并其他各国。秦昭王派大军把赵国的都城邯郸围得水泄不通，赵国危在旦夕，派人向各国求救。魏国和赵国是邻国，魏王本来答应派兵去救，可是秦王派人威胁说：谁敢救赵国，我就先打谁！魏王害怕了，赶紧让军队停在边界上，不许前进。", "魏国有位公子叫魏无忌，人称信陵君，是个出了名的仁义之人。他的门下养着上千位有本事的门客，其中有一位七十岁的老人叫侯赢，公子对他特别尊重。信陵君听说赵国被围，心急如焚，多次去见魏王，请求发兵。魏王就是不肯。", "信陵君急了，他对门客们说：算了，我自己带着你们去邯郸，跟秦军拼了！门客们听了，默默点头，愿意跟随公子赴死。出发那天，信陵君路过夷门，去找好友侯赢告别。侯赢只说了一句话：公子努力，老朽就不送了。信陵君心里不痛快：我的门客愿意跟我去死，你这个老头子怎么这么冷淡？", "走了几里地，信陵君越想越不对劲，他掉头回去找侯赢。侯赢笑着说：公子啊，我是在考验你呢！我知道你一定会回来的。侯赢说：我有一个好办法，能让魏王出兵救赵。但需要一个人帮忙——魏王最宠爱的如姬夫人。信陵君想了想：如姬？她父亲曾经被人杀害，是我帮她报了大仇，她一直说要报答我。", "信陵君找到如姬，请求帮忙。如姬二话不说，连夜从魏王的枕头底下偷出了调兵的虎符。侯赢又送给信陵君一个大力士朱亥，说：如果将军晋鄙起疑心不肯交兵，朱亥会用铁椎打死他。信陵君带着虎符和朱亥，日夜兼程赶到军营。", "晋鄙验过虎符，确实是真的，但他心里还是疑惑：这么重要的事，怎么就派你一个公子来？信陵君还没来得及回答，朱亥从袖子里抽出四十斤重的大铁椎，一椎下去，晋鄙就倒在了地上。信陵君含着泪说：对不起，我不得不这样做！赵国的百姓等着我们去救！", "信陵君重新整编军队，下令说：父子都在军中的，父亲回去；兄弟都在军中的，兄长回去；是独子的，回家奉养父母。士兵们听了，感动得热泪盈眶。最后，信陵君带领八万精兵，向秦军发起了猛攻。秦军大败，邯郸之围终于解除了！", "信陵君窃符救赵的故事告诉我们：真正的勇敢，是明知道有危险，还要去做；真正的智慧，是在关键时刻做出正确的选择；真正的友情，是愿意为朋友赴汤蹈火！"], "qijiguang": ["明朝的时候，中国沿海经常遭到一群坏人的骚扰。这些坏人叫做倭寇，他们坐着船来抢东西，杀害老百姓，搞得大家人心惶惶，夜不安眠。", "那时候有个将军叫戚继光，他武艺高强，还有一颗特别爱老百姓的心。他看到倭寇那么嚣张，心里特别难受，发誓一定要把这些坏人赶走。", "可是原来的军队不太行，士兵们打仗不够勇敢。戚继光想了想，决定自己训练一支新军队。他在浙江义乌招了很多农民和矿工，这些人身强力壮，吃苦耐劳。", "戚继光教他们一种特别的阵法叫做「鸳鸯阵」。这个阵法很神奇，士兵们配合起来就像一个人一样厉害。有人拿长矛，有人拿盾牌，有人拿大刀，配合得天衣无缝。", "有一次，戚家军和倭寇在海边打了一仗。倭寇仗着自己武器好，根本不把戚家军放在眼里。可是他们刚冲过来，就被鸳鸯阵牢牢困住了。", "戚家军喊着「报效国家」的口号冲上去，长矛刺，大刀砍，把倭寇打得落花流水。倭寇头子想逃跑，被戚继光一箭射中了手臂，跪地求饶。", "从那以后，戚家军越战越勇，把倭寇赶得远远的。沿海的老百姓终于能安心种田打鱼了，大家都亲切地叫戚继光「戚爷爷」。"], "wentianxiang": ["南宋末年，国家被元朝的大军打得很惨。元朝皇帝听说文天祥是个大才子，还特别忠心，就想让他投降，还许诺给他高官厚禄。", "文天祥摇摇头说：「我文天祥生是大宋的人，死是大宋的鬼，绝不会投降！」元朝皇帝生气了，把他关进了一间阴冷潮湿的牢房里。", "牢房里又暗又冷，地上都是脏水，墙上还爬满了虫子。有一个降将假惺惺地来劝他：「文大人，何必受这种苦呢？元朝对你多好啊！」", "文天祥看了看那人说：「你以为我不知道享受吗？可是我心里有一团火，是为大宋烧的。这团火永远也不会灭！」", "元朝皇帝又派人来，说只要文天祥投降，就封他做丞相。文天祥笑了笑，写了一首诗回答他们：「人生自古谁无死，留取丹心照汗青。」", "意思是说，人活着总要死的，但我要让自己的爱国之心永远留在史册上。元朝皇帝看了这首诗，气得直跺脚，却也没有办法。", "文天祥在牢里关了三年，始终没有屈服。最后他被处死了，但他的爱国精神永远留在了人们心中。现在我们去参观文天祥纪念馆，还能感受到他那一身正气呢！"], "caobin": ["北宋有一位将军叫曹彬，他武艺高强，打过很多胜仗。可是他和其他将军不一样，每次打完仗，他最关心的不是立了多大的功，而是问：「老百姓有没有受伤？」", "有一次，曹彬带兵去攻打一个城池。出发前，他把副将们叫来说：「这次打仗，我们只要能赢就行，千万别伤害城里的老百姓啊！」", "副将们听了都很奇怪：「将军，打仗哪有不死人的？何况是攻城战！」曹彬摇摇头说：「我们打仗是为了让老百姓过上好日子，不是为了杀他们。」", "攻城的时候，曹彬的士兵们发现城里的老百姓都躲在家里不敢出来。原来大家听说曹彬的军队来了，反而安心了，因为都知道他是个仁义将军。", "城里的守军看到曹彬这么仁义，感动得不行，主动打开城门投降了。曹彬进去后，果然秋毫无犯，还把粮食分给穷苦的百姓。", "后来宋太祖听说了这件事，夸赞曹彬说：「好将军啊！带兵能打胜仗，还这么爱护百姓，真是难得！」从此，「曹彬仁将」的名声传遍了天下。", "曹彬活到很高的年纪才去世，他教给后代的道理是：武力再强，也比不上有一颗仁爱的心。这个故事告诉我们，真正厉害的人，是能够帮助别人、保护弱小的人。"], "wencheng": ["唐朝的时候，吐蕃国王松赞干布派使者来到长安，向唐太宗请求娶一位公主做妻子。那时候唐朝非常强大，周围的许多国家都想和唐朝结亲。唐太宗想了想，决定把宗室女儿文成公主嫁到吐蕃去。", "文成公主听说自己要嫁到很远很远的地方，心里又害怕又难过。她舍不得离开自己的父母和朋友，吐蕃在青藏高原上，那里气候寒冷，和长安完全不同。可是文成公主知道，这是为了两个民族的和平，自己应该勇敢地去。", "出嫁那天，长安城里热闹极了。文成公主带着很多很多的嫁妆：有唐朝的丝绸、瓷器、书籍，还有各种农作物的种子。最厉害的是，她还带去了很多会种田、织布、做手艺的工匠。这些工匠后来在吐蕃教当地人学会了很多先进的生产技术。", "文成公主骑着马，翻过了无数座高山，穿过了无数片草原。一路上风雪交加，道路崎岖，有时候还要在荒野里过夜。可是公主从不叫苦，她鼓励身边的人说：我们走过的每一步，都是通往和平的路。", "当文成公主终于到达吐蕃的时候，松赞干布亲自来迎接她。他看到美丽的公主，高兴极了，对身边的人说：看，这就是大唐的天公主！从此以后，吐蕃人民都非常敬重文成公主。", "文成公主到了吐蕃之后，把中原的先进技术都传授给了当地人。她教藏族人怎么种庄稼，怎么纺线织布，还把中医知识带了过去。在她的帮助下，吐蕃慢慢变得富裕起来，藏汉两族人也越来越团结。", "文成公主在吐蕃生活了几十年，直到去世。她虽然没有再回到长安，可是她为两个民族带来的和平与友谊，一直延续了好几代人。后来，藏族人民修建了宏伟的布达拉宫，里面专门供奉着文成公主的塑像，表达对她的尊敬和怀念。", "文成公主入藏的故事告诉我们：真正的英雄不一定要上战场杀敌，有时候，一个人的勇气和善良，能够为千千万万的人带来和平与幸福！"], "zhangxun": ["唐朝的时候，爆发了一场大乱叫做安史之乱。叛军一路烧杀抢掠，打到了睢阳城。睢阳是唐朝的重要城市，如果被叛军占领，整个江淮地区都会沦陷。就在这危急关头，一个叫张巡的县令站了出来。", "张巡本来是个文官，平时就是读书写字的。可是当叛军打来的时候，他没有逃跑，而是带着仅有的三千士兵，决定死守睢阳。城里的老百姓听说张大人要守城，都感动极了，纷纷表示愿意出力帮忙。", "叛军的数量是张巡的一百倍！漫山遍野都是敌人，看起来黑压压的一片。城里有人害怕了：大人，敌人这么多，我们怎么打得过啊？不如投降吧！张巡听了，严肃地说：睢阳是江淮的屏障，如果我们投降了，后面成千上万的老百姓就要遭殃！", "张巡想了一个办法：他让人在城头扎了很多草人，给它们穿上黑衣服，远远看去就像真人一样。叛军一看城墙上有士兵，以为要偷袭，赶紧放箭射过来。整整一个晚上，叛军射了好几万支箭，全都射在了草人身上。等天亮叛军发现上当时，张巡已经白得了好多好多箭！", "后来叛军发现是草人计策，不再上当了。张巡又想了一招：把真人从城上放下去。这次是真的勇士，他们跳下城墙，冲进敌营，打了叛军一个措手不及，还活捉了敌人的一个将领。", "日子一天天过去，城里没有粮食了，士兵们饿得头晕眼花。张巡把自己的妻子儿女杀掉，分给士兵们吃。士兵们哭着说：大人，您怎么可以……张巡流着泪说：为了守护这座城，为了后面千千万万的老百姓，我什么都愿意牺牲！", "最后，睢阳城还是被攻破了。张巡被俘后，叛军想让他投降。张巡宁死不屈，叛军无奈之下杀死了他。可是张巡用自己的牺牲，为唐朝争取到了宝贵的时间，等来了援军，最终平定了叛乱。", "张巡守睢阳的故事告诉我们：真正的英雄不是没有恐惧，而是即使害怕也要坚持下去；真正的勇敢，是为了更大的目标愿意牺牲自己！"], "zhaokuangyin": ["五代十国的时候，天下大乱，各路英雄你争我夺。在后周朝有一位大将军叫赵匡胤，他武艺高强，手下的士兵都愿意为他拼死作战。当时的皇帝是个小孩子，国家大事实际上都是赵匡胤说了算。", "有一天，边境传来急报说敌人来侵犯。朝廷派赵匡胤带兵去打仗。大军走到陈桥驿这个地方时，天色已晚，就停下来休息。当天晚上，士兵们聚在一起议论纷纷：当今皇帝是个小孩子，国家没有大人做主，早晚会出乱子！不如让赵大将军当皇帝！", "赵匡胤的弟弟赵光义和谋士赵普知道了士兵们的想法，就悄悄安排人连夜准备了一件黄袍——黄袍是皇帝的专用服装。第二天一早，士兵们把赵匡胤从睡梦中叫醒，把黄袍披在他身上。", "赵匡胤假装很惊讶地说：哎呀，这可不行！你们怎么可以这样！士兵们齐声说道：天命所归，您就当皇帝吧！赵匡胤还要推辞，士兵们按着剑柄说：您要是不答应，我们就散伙回家！赵匡胤知道推辞不了了，就说：好吧，我可以当皇帝，但是你们要答应我一件事。", "士兵们问什么事，赵匡胤说：等我当了皇帝，不许随便抢老百姓的东西，不许杀害无辜的人。你们能做到吗？士兵们齐声回答：能！于是，赵匡胤带领大军回到京城，夺取了皇位，建立了宋朝。", "当了皇帝之后，赵匡胤没有像其他开国皇帝那样杀掉功臣。他请功臣们喝酒，然后在酒桌上说：你们的兵权太大了，我睡不着觉啊。功臣们一听，吓得跪下来说：陛下想怎么办就怎么办！第二天，赵匡胤就把兵权收了回来，还给了功臣们很多金银财宝，让他们回家养老去了。这就是历史上著名的'杯酒释兵权'。", "赵匡胤用温和的方式解决了一个可能危及国家的难题。从此以后，宋朝再也没有发生过武将夺权的事情，国家慢慢安定下来，百姓们过上了太平日子。大家都说：这位皇帝真有智慧啊！", "赵匡胤的故事告诉我们：真正厉害的人不是靠武力让别人害怕，而是用智慧把坏事变成好事，让大家都心服口服！"], "fanyizongyan": ["北宋时候有一个著名的大臣叫范仲淹。他小的时候家里很穷，父亲很早就去世了，母亲改嫁他人。范仲淹跟着继父继母生活，日子过得很清苦。继父家的孩子吃好的穿好的，范仲淹却只能穿粗布衣裳。", "范仲淹没有被贫困打倒。他知道只有读书才能改变命运，于是发愤图强，拼命学习。他在一个寺庙里借住读书，因为家里穷买不起灯油，他就借着寺庙大殿的烛光读书。有时候太困了，就用冷水洗把脸，继续看书。", "有一天晚上，范仲淹发现寺庙后院的墙根下有银子。他以为是自己不小心掉的，高兴地去挖，结果发现那是一窝蛇。旁边有块石碑，上面写着：'此地下有银子，挖出会招来灾祸。'范仲淹看了看，就又把土埋上了。他说：我范仲淹宁可穷一辈子，也不能贪这种不义之财！", "范仲淹读书特别刻苦，后来真的考中了进士，当上了大官。可是他当官之后，不是想着怎么发财，而是想着怎么帮助老百姓解决困难。他走到哪里，就在哪里为百姓做好事：减税、赈灾、修水利、办学校……", "有一次，宋仁宗请范仲淹等大臣商量国事。大臣们都不敢得罪人，只说一些不痛不痒的话。范仲淹急了，他站出来说：陛下，现在国家有很多问题，可是大臣们都不说真话！我范仲淹不怕得罪人，我来说！说着，他把朝政的问题一条一条地指出来，话说得很尖锐。", "有些大臣私下里说范仲淹太直了，太爱得罪人了。范仲淹听说后，坦然地说：我是朝廷的大臣，看到问题不说，那才是不忠！我宁可在朝廷上得罪人，也不能对不起天下的老百姓！", "范仲淹退休之后，住在穷苦的老百姓中间，和他们同甘共苦。他写了一篇著名的文章叫《岳阳楼记》，里面有一句话千古流传：'先天下之忧而忧，后天下之乐而乐。'意思是说：要在天下人担忧之前就担忧，在天下人快乐之后才快乐。", "范仲淹的故事告诉我们：做人要有担当，看到不对的事情要敢说；帮助别人不一定要很有钱，有一颗愿意付出的心就够了！"], "baozheng": ["北宋的时候，有个当官的叫包拯，老百姓都亲切地叫他'包青天'。为什么叫他青天呢？因为他办案公正，眼睛里揉不得沙子，不管你是大官还是有钱人，做了坏事就得受惩罚。", "包拯年轻的时候就很正直。有一次，他的一个亲戚犯了法，按理说应该打板子坐牢。那个亲戚想：包拯是我侄子，肯定会放我一马。没想到包拯一点情面都不讲，该怎么判就怎么判。那个亲戚气得指着他的鼻子骂：你这个忘恩负义的东西！包拯平静地说：我不是忘恩负义，我是在维护法律。法律面前，人人平等。", "后来包拯当了官，审理过很多案子。有一次，一个农民来告状，说自己家的牛被人偷了。包拯问：是谁偷的？农民说不知道。包拯想了想说：你先回去，过几天再来。农民走后，包拯让人贴出告示：县衙的牛病了，杀了吃牛肉的人要受罚！", "几天后，果然有人来承认自己偷了牛。包拯把偷牛贼抓住归案，还把牛还给了农民。旁边的人问包拯：你怎么知道用这个办法？包拯笑着说：偷牛贼肯定怕牛死了被人发现，所以一定会来自首。", "包拯当官的时候，还专门弹劾过很多贪官污吏。有个高官仗着皇帝宠信，欺负老百姓。包拯写了弹劾的奏章，一连弹劾了好几次，最后终于把那个高官拉下马。老百姓听说后，都高兴地说：包青天真是好啊！", "包拯当了很大的官，可是他的生活非常简朴。他不贪财，不受贿，穿的衣服和普通老百姓一样。别人送礼物给他，他从来不收。有一次，一个有权势的人给他送了一面镜子，说这是宝物，能照出人心。包拯笑着说：不用照，我的心我自己清楚！", "包拯去世的时候，老百姓哭成了一片。大家都说：再也没有像包青天这样的好官了！后来，人们把他画成戏剧里的人物：黑脸、额头上有个月亮。每次演包拯的戏，小孩子都看得特别认真。", "包拯的故事告诉我们：做人要正直，办事要公正，不管在什么时候，都不能做对不起良心的事！"], "yimingjingren": ["春秋时候，楚国来了一位年轻的新国王——楚庄王。可大家发现，这位新国王一点都不像国王的样子！他整天喝酒享乐，听音乐看舞蹈，朝政大事一概不管，还下了一道命令：谁敢来劝我，杀无赦！", "大臣们急得团团转：国家大事没人管，邻国都来欺负咱们了，可谁也不敢去劝。就这样，楚庄王浑浑噩噩地过了整整三年。这三年里，他看起来就是个只会享乐的昏君。", "有一天，一位叫伍举的大臣实在忍不住了。他没有直接劝，而是给楚庄王出了个谜语：'大王，山上有一只大鸟，三年不飞也不叫，这是什么鸟？'楚庄王笑了笑，回答道：'这鸟啊，三年不飞，一飞冲天；三年不鸣，一鸣惊人！'", "原来，楚庄王心里什么都明白！他故意装糊涂，就是为了看清谁是忠臣谁是奸臣。那些趁机贪赃枉法的坏官，他全都看得清清楚楚；那些默默做好事的好官，他也全都记在了心里。", "没过多久，楚庄王突然像变了个人！他停止了宴饮，开始亲自处理朝政。他一下子罢免了三百多个坏官，提拔了两百多个忠臣，还重用了一位叫孙叔敖的贤人当丞相。", "楚国的老百姓都惊呆了：咱们这位国王原来这么厉害啊！在楚庄王的治理下，楚国变得越来越强大。他带兵打仗，打败了一个又一个对手，最后成了春秋时期最强大的霸主之一！", "一鸣惊人的故事告诉我们：不要小看默默努力的人，真正厉害的人往往在暗处积蓄力量，一旦爆发就让人刮目相看！"], "guanyu_qianli": ["三国时候，有一位红脸长须的大将军，他叫关羽。关羽和他的大哥刘备失散了，暂时留在曹操的军营里。曹操非常喜欢关羽，给他送金银珠宝、好酒好肉，还封他做侯爷，可关羽心里一直想着大哥刘备。", "曹操想让关羽留下来，就派张辽去试探：'你觉得我和你大哥谁更好？'关羽毫不犹豫地说：'曹公对我确实好，可我和大哥刘备桃园结义，发誓同生共死，我终究要去找他的。'", "后来，关羽终于打听到刘备的消息。他把曹操赏赐的所有金银财宝都原封不动地留下，把侯爷的大印也挂在堂上，保护着嫂嫂——刘备的妻子，踏上了寻找大哥的路。", "这一路可不容易！没有通关的文书，守关的将军都不放行。关羽过第一关时，守将孔秀拦住他，关羽好言相求，孔秀却要动手。关羽无奈只得应战，一刀就把孔秀打落马下。就这样，他一连过了五道关口。", "到了黄河渡口，守将秦琪又拦住了去路，还嘲笑关羽没有通行证。关羽忍着怒气说：'我只是想过河去找大哥，何必为难？'可秦琪偏偏不肯，关羽只好再次出手，击败了秦琪，终于渡过了黄河。", "千里迢迢，过关斩将，关羽终于找到了大哥刘备！兄弟重逢，两个人抱在一起，眼泪止不住地流。刘备拍着关羽的肩膀说：'二弟，你受苦了！'关羽抹了抹眼泪笑道：'只要能见到大哥，再走千里也值得！'", "关羽千里走单骑的故事告诉我们：做人要重情重义，说到做到，即使困难重重也要坚守自己的承诺！"], "ganluo": ["战国时候，秦国有一个十二岁的小男孩叫甘罗。他的爷爷甘茂是秦国的大臣，甘罗从小跟着爷爷耳濡目染，对天下大事了如指掌，说起话来头头是道，连大人们都自愧不如。", "有一天，秦王想让大臣张唐去燕国当丞相，可张唐死活不肯去。原来，去燕国必须经过赵国，而张唐以前带兵打过赵国，赵国恨他入骨，悬赏要他的脑袋！张唐害怕极了，说什么也不去。", "大人们都没办法，甘罗却站了出来：'让我去劝劝张唐！'大人们都笑了：'我们大人都劝不动，你一个十二岁的小孩能行？'甘罗不慌不忙地说：'项橐七岁就当孔子的老师，我十二岁为什么不能试试？'", "甘罗找到张唐，没有像大人那样苦苦劝说，而是问道：'张大人，您的功劳和白起比起来，谁更大？'张唐说：'白起将军南征北战，功劳当然比我大。'甘罗又问：'那当年的丞相范雎和现在的丞相吕不韦，谁权力更大？'张唐说：'当然是吕不韦。'", "甘罗笑了：'白起功劳那么大，可范雎一句话就让白起自杀了。现在吕不韦的权力比范雎还大，您觉得他一句话能不能对付您呢？'张唐听了，吓得脸色发白，赶紧答应了去燕国！", "甘罗的才华让吕不韦大吃一惊。接着，甘罗又主动请缨出使赵国，凭着三寸不烂之舌，说服赵国割让了五座城池给秦国！秦王高兴极了，封十二岁的甘罗为上卿——相当于丞相！甘罗成了中国历史上最年轻的丞相。", "甘罗十二为丞相的故事告诉我们：年龄小不代表能力小，只要有真才实学、敢想敢做，再小的人也能做成大事！"], "weiweijiuzhao": ["战国时期，有两个很厉害的军事家，一个叫孙膑，一个叫庞涓。他们本来是好朋友，一起学习兵法。可是庞涓心眼很小，嫉妒孙膑比自己聪明，就设计陷害孙膑，挖掉了他的膝盖骨。", "孙膑假装疯了，才好不容易逃到了齐国。齐国的大将军田忌很欣赏孙膑的才华，把他留在身边当军师。孙膑虽然腿不好，但脑子特别好使，总能想出奇妙的计策。", "有一年，魏国派庞涓带兵攻打赵国，赵国很快就被包围了，赵王急得团团转，赶紧向齐国求救。齐威王派田忌和孙膑带着军队去救赵国。", "田忌说：咱们赶紧去赵国，和魏军打一仗！孙膑却摇摇头说：不行，魏国的精锐部队都去打赵国了，国内肯定很空虚。我们不如直接去攻打魏国的首都，庞涓一定会回来救的。", "田忌听了孙膑的话，带着军队直奔魏国首都大梁。庞涓得到消息，果然慌了神：不好！老家被人端了！他赶紧下令撤军，日夜兼程往回赶。", "孙膑早就料到庞涓会回来，在一个叫桂陵的地方设下了埋伏。魏军跑得气喘吁吁，刚到桂陵，就听见一声炮响，齐国的军队从四面八方杀了出来。魏军猝不及防，被打得落花流水。", "这就是著名的\"围魏救赵\"的故事。孙膑没有直接去救赵国，而是攻打魏国的老家，逼着庞涓退兵，既救了赵国，又打了胜仗。这个故事告诉我们：遇到问题不要硬碰硬，换个角度思考，也许能找到更聪明的解决办法！"], "qibuchengshi": ["三国时期，曹操有两个很优秀的儿子：曹丕和曹植。曹植从小就特别聪明，写诗写文章都特别好，曹操非常喜欢他，好几次想立他为世子。", "哥哥曹丕心里很嫉妒弟弟。他觉得曹植抢了自己的风头，总是想找机会除掉曹植。后来曹操去世了，曹丕当上了皇帝，他就想找个借口杀掉曹植。", "有一天，曹丕把曹植叫到宫里，板着脸说：听说你写诗很厉害，今天我要考考你。你必须在七步
