<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📖 历史绘本故事集</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>:root{--bg:#0f0e17;--card:#1a1932;--text:#fffffe;--muted:#94a1b2;--primary:#e94560;--primary-light:#2d1f3d;--accent:#f5a623;--border:#2a2a4a;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.toolbar{position:sticky;top:0;z-index:100;background:rgba(15,14,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar h1{font-size:1.1rem;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.view-toggle{margin-left:auto;display:flex;gap:4px}
.view-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.view-btn.active{background:var(--primary);color:#fff}
.refresh-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:1rem}
.refresh-btn:active{transform:rotate(180deg)}
.container{max-width:800px;margin:0 auto;padding:12px 16px 80px}
.date-section{margin-bottom:20px}
.date-header{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:.95rem;font-weight:600;color:var(--accent);border-bottom:1px solid var(--border);margin-bottom:12px}
.date-dot{width:8px;height:8px;border-radius:50%;background:var(--primary)}
.date-count{font-size:.75rem;color:var(--muted);font-weight:400}
.stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.stories-list{display:flex;flex-direction:column;gap:8px}
.story-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
.story-card:active{transform:scale(.97)}
.grid-view .story-card .card-img{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--primary-light)}
.grid-view .story-card .card-content{padding:8px 10px 10px}
.grid-view .story-card .card-title{font-size:.85rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-view .story-card .card-meta{display:flex;gap:4px;margin-top:4px;font-size:.7rem;color:var(--muted)}
.grid-view .story-card .card-tag{background:var(--primary-light);color:var(--primary);padding:1px 6px;border-radius:4px;font-size:.65rem}
.list-view .story-card{display:flex;gap:10px;padding:10px;align-items:center}
.list-view .story-card .card-img{width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--primary-light)}
.list-view .story-card .card-content{flex:1;min-width:0}
.list-view .story-card .card-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-view .story-card .card-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.list-view .story-card .card-tag{background:var(--primary-light);color:var(--primary);padding:1px 6px;border-radius:4px;font-size:.65rem;margin-left:4px}
.load-more-wrap{text-align:center;padding:20px 0}
.load-more-btn{padding:10px 32px;border-radius:24px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:.9rem;cursor:pointer;transition:all .2s}
.load-more-btn:active{transform:scale(.97)}
.load-more-btn:disabled{opacity:.4;cursor:default}
.story-counter{font-size:.8rem;color:var(--muted);margin-top:8px}
#storyPage{display:none}
#storyPage.active{display:block}
.story-back{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:6px;padding:12px 16px;background:rgba(15,14,23,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);color:var(--primary);font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
.story-back:active{background:rgba(15,14,23,1)}
.story-header{padding:56px 16px 12px}
.story-title{font-size:1.9rem;font-weight:700;line-height:1.4}
.story-era{font-size:.95rem;color:var(--muted);margin-top:4px}
.story-img{width:100%;border-radius:8px;margin:8px 0}
.story-paragraph{padding:0 16px;font-size:1.8rem;line-height:2.1;color:var(--text);margin-bottom:6px}
.moral-card{margin:16px;padding:16px;background:linear-gradient(135deg,var(--primary-light),rgba(245,166,35,.1));border-radius:var(--radius);border-left:3px solid var(--accent)}
.moral-title{font-size:1rem;font-weight:600;color:var(--accent);margin-bottom:6px}
.moral-text{font-size:1.8rem;line-height:2;color:var(--text)}
.hidden{display:none!important}
@media(min-width:768px){.container{max-width:900px;padding:16px 24px 80px}.stories-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}.grid-view .story-card .card-content{padding:10px 12px 12px}.grid-view .story-card .card-title{font-size:.9rem}.story-header{padding:56px 24px 16px}.story-paragraph{padding:0 24px;font-size:2rem;line-height:2.2}.moral-card{margin:16px 24px;padding:20px}.story-img{max-width:420px;margin:12px auto;display:block;border-radius:10px}}
@media(min-width:1024px){.container{max-width:720px;padding:20px 32px 80px}.stories-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}.story-header{padding:56px 32px 16px}.story-paragraph{padding:0 32px;font-size:2rem;line-height:2.2}.moral-card{margin:16px 32px}.story-img{max-width:400px;margin:12px auto;display:block;border-radius:10px}}</style>
</head>
<body>
<div id="homePage">
<div class="toolbar">
<h1>📖 历史绘本故事集</h1>
<button class="filter-btn active" onclick="filterStories('all')">全部</button>
<button class="filter-btn" onclick="filterStories('历史故事')">历史故事</button>
<button class="filter-btn" onclick="filterStories('名人传记')">名人传记</button>
<div class="view-toggle">
<button class="view-btn active" onclick="setView('grid')" id="gridBtn">⊞</button>
<button class="view-btn" onclick="setView('list')" id="listBtn">☰</button>
</div>
<button class="refresh-btn" onclick="location.reload()">🔄</button>
</div>
<div class="container" id="storiesContainer"></div>
</div>
<div id="storyPage">
<div class="story-back" onclick="goHome()">← 返回故事列表</div>
<div id="storyContent"></div>
</div>
<script src="data.js"></script>
<script>
const IMG_BASE='img/';
const PAGE_SIZE=20;
let currentFilter='全部';
let currentView='grid';
let displayCount=PAGE_SIZE;
let filteredData=[];
function getImgPath(k,i){return IMG_BASE+k+'_'+i+'.jpg'}
function formatDate(s){const d=new Date(s);const w=['日','一','二','三','四','五','六'];return(d.getMonth()+1)+'月'+d.getDate()+'日 周'+w[d.getDay()]}
function updateFilteredData(){filteredData=currentFilter==='全部'?D:D.filter(i=>i.c===currentFilter);}
function renderHome(){
  updateFilteredData();
  const c=document.getElementById('storiesContainer');
  const showing=filteredData.slice(0,displayCount);
  const g={,
"yongjia_zhiluan": ["西晋末年，朝廷里乱成了一锅粥。皇帝是个傻子，大臣们争权夺利，八个王爷互相残杀，打了整整十六年，这就是历史上的\\"八王之乱\\"。老百姓被折腾得苦不堪言，田里长满了野草，没人种地，到处都是饿死的人。", "北方的匈奴人看到了机会。他们的首领叫刘渊，从小就学习汉人文化，读《诗经》《左传》，武艺也高强。他趁着西晋内乱，在左国城竖起大旗，自称汉王，召集了五万多匈奴骑兵，浩浩荡荡地向南杀来。", "刘渊的侄子刘曜带兵一路南下，攻破了西晋的许多城池。晋军一触即溃，将领们不是逃跑就是投降。刘曜站在城楼上，望着南边富饶的中原大地，冷笑着说：\\"看来晋朝的气数尽了！\\"", "公元311年，永嘉五年，刘曜带着匈奴铁骑攻破了西晋的都城洛阳。骑兵们像潮水一样涌进城里，见人就杀，见东西就抢。皇宫里的珍宝被洗劫一空，晋怀帝被俘，洛阳城变成了一片废墟，大火烧了三天三夜。", "消息传开后，中原的百姓和官员们吓得魂飞魄散，纷纷收拾家当往南逃。他们拖家带口，赶着牛车，挑着担子，像潮水一样涌向长江。士大夫们穿着整齐的衣冠——那是他们身份和尊严的象征，可逃亡路上，衣冠沾满了泥土，脸上写满了悲伤。", "琅琊王司马睿在江南站稳了脚跟，建立东晋，定都建康。南迁的士族们常常聚在江边，望着北方流泪。宰相王导对他们说：\\"大家别哭了，我们虽然丢了半壁江山，但只要团结一心，总有一天能打回去！\\"这就是历史上著名的\\"衣冠南渡\\"。", "从此，北方的黄河流域陷入了长达一百多年的战乱，而南方的长江流域得到了开发，经济文化日渐繁荣。永嘉之乱虽然是一场大灾难，但也让中国的文化中心第一次从黄河流域转移到了长江流域。"],
"qingli_xinzheng": ["北宋仁宗年间，朝廷看起来太平，实际上问题一大堆。官员多得不得了，很多人拿了俸禄不干事；军队庞大却老打败仗；老百姓的税越来越重，很多人活不下去。大臣范仲淹看在眼里，急在心里，寝食难安。", "范仲淹从小就是个有志气的人。他两岁丧父，母亲改嫁，他跟着继父长大。读书时因为家里穷，每天只能煮一锅粥，等粥凉了划成四块，早晚各吃两块。可他从不叫苦，天天苦读到深夜，困了就用冷水洗脸。", "公元1043年，宋仁宗终于下定决心改革，把范仲淹提拔为副宰相。范仲淹激动得一夜没睡，连夜写了一份长长的奏折，提出了十条改革措施：要改革官员考核、要兴办学校、要减轻老百姓的负担……仁宗看了连连点头。", "范仲淹大刀阔斧地干了起来。他派了一批精明强干的人到各地去考察官员，把那些不称职的、贪污的、混日子的官员一个个揪出来，撤职的撤职，查办的查办。他拿着官员名册，看到不合格的名字，就在上面画个圈，毫不留情。", "这下可捅了马蜂窝！那些被撤职的官员个个有背景，有的和宰相是亲戚，有的和皇太后有关系。他们联合起来，天天在皇帝面前说范仲淹的坏话：\\"范仲淹结党营私！\\"\\"他要把朝廷的水搅浑！\\"一些人还写匿名信诬告他谋反。", "宋仁宗一开始还支持范仲淹，可架不住天天有人告状，耳朵都听出茧子了。渐渐地，他的态度动摇了。一些反对改革的官员趁机发力，把范仲淹派下去考察的人一个个调走。范仲淹的改革措施，一条条地被废除了。", "公元1045年，范仲淹被调离京城，贬到了外地。庆历新政只推行了短短一年四个月就失败了。范仲淹站在离开京城的路上，望着远方的城墙，心里说不出的苦涩。但他留给后人的那句\\"先天下之忧而忧，后天下之乐而乐\\"，却激励了一代又一代的中国人。"],
"chengpu_zhizhan": ["春秋时期，晋国公子重耳流亡在外十九年，历经千辛万苦，终于回到晋国当上了国君，就是晋文公。他流亡到楚国的时候，楚成王设宴款待他，席间问他：\\"如果你回了晋国，准备怎么报答我？\\"", "重耳想了想，诚恳地说：\\"楚国地大物博，什么珍宝都有，我真不知道拿什么报答您。如果将来晋楚两国在战场上相遇，我一定命令晋军退避三舍（一舍三十里，共九十里），以报答您今天的恩情！\\"楚成王哈哈大笑，没当回事。", "几年后，楚国联合了好几个小国去攻打宋国。宋国派人向晋国求救。晋文公召集大臣们商量：\\"楚国太强大了，硬打肯定不行，得想个办法。\\"大臣狐偃说：\\"不如我们攻打楚国的盟国曹国和卫国，楚国一定会来救，这样就能解宋国之围了。\\"", "晋文公依计而行，攻下了曹国和卫国。楚成王一看形势不妙，下令撤军。可楚国大将子玉是个骄傲的人，他不听命令，非要和晋国决一死战。子玉派人给晋文公送信，狂妄地说：\\"咱们干脆在战场上见个高低！\\"", "晋文公面对气势汹汹的楚军，从容下令：\\"全军后退九十里！\\"晋军将士们不解，纷纷问：\\"大王，我们还没打就退，这不是示弱吗？\\"晋文公说：\\"当年我在楚国时许下的诺言，一定要兑现。退避三舍，是信义，也是计策！\\"", "晋军退到了城濮这个地方。楚军以为晋文公害怕了，紧追不舍，将士们累得气喘吁吁，阵型也乱了。晋文公站在高处，看着楚军乱糟糟的样子，微微一笑：\\"时机到了！\\"他一声令下，晋军突然转身，战车轰鸣，杀声震天，如猛虎下山般冲向楚军。", "晋文公巧妙地运用了战术：先攻击楚军最薄弱的右翼，再用战车拖着树枝扬起漫天尘土，让楚军看不清虚实。楚军被打得晕头转向，子玉带着残兵败将狼狈逃窜。这一战，晋军以少胜多，大获全胜！", "城濮之战后，晋文公在践土会盟诸侯，周天子封他为霸主。从此，晋文公成了春秋五霸之一。而\\"退避三舍\\"这个成语，也成了信守诺言、以退为进的代名词，流传了两千多年。"],
"simaguang_bio": ["司马光出生在北宋一个读书人家庭，从小就是个聪明又沉稳的孩子。他七岁的时候，和小伙伴们在院子里玩捉迷藏，院子里有一口大水缸，装满了水。一个小伙伴爬上缸沿想躲起来，脚下一滑，\\"扑通\\"一声掉进了水缸里！", "其他孩子吓得大哭起来，有的跑去找大人，有的站在那儿发呆。水缸又高又大，孩子们根本够不着缸沿。眼看那个掉进缸里的孩子就要被淹死了，小司马光却一点也不慌，他飞快地搬起一块石头，使出全身力气朝水缸砸去！", "\\"砰\\"的一声，水缸被砸出一个大洞，水哗啦啦地流了出来，落水的孩子顺着水流滑了出来，得救了！大人们赶来时，看到这个场景都惊呆了，纷纷竖起大拇指：\\"司马家的孩子，真是了不起！\\"这个故事很快传遍了京城。", "司马光长大后，考中了进士，当了官。可他发现市面上的历史书太多太乱，皇帝和大臣们根本没时间读完。于是他下定决心，要编一本简明扼要的历史书，让后人从历史中吸取教训。他对皇帝说：\\"我想编一部《通志》，从战国写到五代。\\"", "宋神宗听了非常支持，给这本书赐名《资治通鉴》，意思是\\"帮助治理天下的镜子\\"。司马光带着几个助手，夜以继日地工作。他每天天不亮就起床，一直写到深夜。为了节省时间，他让人把枕头做成一个圆木筒，只要一翻身，枕头就滚走，他就醒了继续写。", "这一写，就是整整十九年！司马光从四十八岁写到了六十七岁，头发全都白了，身体也累垮了。书稿堆满了整整两间屋子，有三百多万字！他把书稿呈给皇帝时，激动地说：\\"臣用了十九年时间，日日夜夜不敢懈怠，终于完成了这部书。\\"", "《资治通鉴》成了中国历史上最伟大的史书之一，和司马迁的《史记》并称为\\"史学双璧\\"。司马光砸缸救人的故事，和他用十九年写《资治通鉴》的精神，激励着一代又一代的孩子——聪明和坚持，是人生最宝贵的两样财富！"],
"caozhi": ["曹植是曹操的第三个儿子，从小就是个天才。他十岁的时候就能写一手好文章，诗词歌赋样样精通。曹操看了他的文章，有点不敢相信，问他：\\"这真是你自己写的吗？是不是找人代笔的？\\"曹植跪在地上说：\\"父亲可以当面考我，一试便知！\\"", "曹操决定考考他。他带着曹植登上刚建好的铜雀台，让他在台上当场写一首诗。曹植站在高台上，望着远处的太行山和脚下的漳河水，略一思索，挥笔写下了《登台赋》。曹操看完，连连拍手叫好：\\"这孩子，真是文采斐然！\\"", "从此曹操特别宠爱曹植，好几次想立他为太子。可曹植有个大毛病——太任性了。他喜欢喝酒，常常喝得酩酊大醉。有一次，他喝醉了酒，竟然坐着王室的马车，打开了皇宫的司马门，在只有皇帝才能走的御道上纵马狂奔，把曹操气得半死。", "曹植还有一个大缺点——不懂得团结人。他身边的文人朋友虽然多，可他恃才傲物，看不起那些务实的大臣。而他的哥哥曹丕却恰恰相反，为人谦逊，善于结交各方面的官员，暗暗积蓄力量。渐渐地，大臣们的心都偏向了曹丕。", "公元217年，曹操终于下定决心，立曹丕为太子。消息传来，曹植正在喝酒，他放下酒杯，默默地流下了眼泪。他知道，自己失去了父亲最珍贵的信任。曹操去世后，曹丕当了皇帝，对曹植处处提防，把他一贬再贬，赶到了偏远的封地。", "曹丕曾想杀了曹植，就把他叫来，说：\\"大家都说你才思敏捷，今天就限你七步之内作一首诗，作不出来就治你的罪！\\"曹植看着哥哥冰冷的眼神，心中悲痛万分，迈出七步，吟出了千古名篇：\\"煮豆燃豆萁，豆在釜中泣。本是同根生，相煎何太急！\\"", "曹丕听了这首诗，心中羞愧难当，放过了曹植。但曹植的余生都在郁郁寡欢中度过，四十一岁就英年早逝。南朝诗人谢灵运曾评价说：\\"天下才共一石，曹子建独占八斗！\\"\\"才高八斗\\"这个成语，就是为曹植创造的。",
"tiandan_huoniuzhen": [
"战国时期，齐国被燕国打得节节败退。燕国大将乐毅率领五国联军，一口气攻占了齐国七十多座城池，齐国只剩下莒城和即墨两座城还在苦苦支撑。即墨城里的守将战死了，老百姓们挤在城门口，不知道该怎么办才好。",
"这时，一个人站了出来，他叫田单，是齐国宗室的一个远亲。田单对大家说：“大家都别慌！咱们城里还有不少粮食，城墙也还结实，只要大家团结一心，一定能守住！”乡亲们看着他坚定的眼神，都觉得有了主心骨，一致推举他当守城将军。",
"田单上任后，没有急着打仗，而是先做了一件事——安定军心。他把自己家里的粮食全部分给士兵，又把自己的妻妾编入军队帮忙做饭缝补。士兵们感动得热泪盈眶，都说：“田将军把家都舍了，咱们拼了命也要守住城！”",
"燕国的新统帅骑劫是个骄傲自大的人，他看不起田单。田单将计就计，派人去燕营假意投降。骑劫得意洋洋地说：“齐国人都怕了，看我怎么收拾他们！”他放松了警惕，整天喝酒作乐。",
"田单在城里秘密准备了一千多头牛。他给每头牛披上红色的绸子，画上五彩的龙纹，牛角上绑着锋利的尖刀，牛尾巴上扎着浸透了油的芦苇。他又挑选了五千名精壮的士兵，脸上涂得花花绿绿，跟在牛后面。",
"半夜时分，田单一声令下，士兵们点燃了牛尾巴上的芦苇。一千多头牛被火烧得发狂，哞哞叫着冲出了城门，直扑燕军大营。燕军士兵从睡梦中惊醒，看到无数头浑身冒火的怪物冲过来，吓得魂飞魄散，扔下兵器就跑。",
"火牛在燕军大营里横冲直撞，牛角上的尖刀刺穿了帐篷，撞翻了战车。五千名齐军士兵跟在后面，喊杀声震天动地。燕军兵败如山倒，骑劫在混乱中被杀。田单趁胜追击，一路收复了齐国丢失的七十多座城池。",
"齐襄王回到临淄，封田单为安平君。这个靠火牛阵创造奇迹的将军，用智慧和勇气书写了战国历史上最精彩的一场复国之战。",
"小道理：田单用火牛阵打败了强大的燕国军队，收复了齐国七十多座城池——告诉我们：智慧比蛮力更有力量，再困难的局面，只要动脑筋就能找到出路！"
],
"dunhuang_mogaoku": [
"公元366年，一个叫乐僔的和尚路过敦煌的三危山。夕阳西下，金色的阳光照在山上，他忽然看到山崖上光芒万丈，仿佛有成千上万个佛在金光中显现。乐僔激动得跪在地上，发誓要在这里开凿一个石窟，供奉佛祖。",
"乐僔找来工匠，在悬崖上凿出了第一个石窟。他每天天不亮就起来诵经，晚上借着月光画壁画。虽然条件艰苦，风沙漫天，可他的心里充满了虔诚。消息传开后，越来越多的僧人和信徒来到敦煌，加入了开窟的行列。",
"到了唐朝，莫高窟的规模已经非常壮观了。武则天在位时，一个叫灵隐的和尚在崖壁上开凿了一座高达三十五米的巨型佛像，仅耳朵就有两层楼那么高。工匠们在悬崖上搭起架子，一锤一锤地凿了整整二十年才完工。",
"画师们在洞窟里画满了精美的壁画。他们画了飞天仙女，衣带飘飘仿佛要从墙上飞出来；画了反弹琵琶的乐师，手指在琴弦上飞舞；还画了九色鹿的故事，讲述善良和感恩。这些壁画色彩鲜艳，历经千年依然光彩夺目。",
"最神奇的是藏经洞。1900年，一个叫王圆箓的道士在清理洞窟时，无意中发现了墙壁后面藏着一个小洞。他打开一看，里面堆满了四五万卷古代经卷、文书和绢画，从公元四世纪到十一世纪，跨越了整整七百年！",
"可惜的是，藏经洞的发现也引来了贪婪的外国探险家。英国的斯坦因、法国的伯希和等人用极少的钱骗走了大量珍贵文物，至今流散在十三个国家的博物馆里。王圆箓虽然没什么文化，可他也尽力保护了一部分经卷。",
"今天的莫高窟有七百三十五个洞窟，四万五千平方米壁画，两千多尊彩塑，是世界上最大的佛教艺术宝库。为了保护这些珍贵的壁画，很多洞窟已经不对外开放了，但数字化团队正在用高清相机一幅一幅地记录下来。",
"小道理：敦煌莫高窟是无数工匠和画师用一千年时间雕琢出来的艺术宝库——告诉我们：真正伟大的作品，不是一个人能完成的，而是一代又一代人接力守护的成果！"
],
"qian_du_beijing": [
"朱元璋建立明朝后，把都城定在了南京。可他的儿子朱棣当上皇帝后，却打起了搬家的主意。朱棣站在南京的皇宫里，心里总是不踏实：北方的蒙古人随时可能打过来，而自己的根基在北京，离前线那么远，怎么指挥打仗？",
"朱棣决定把都城迁到北京。他把这个想法告诉大臣们时，整个朝堂都炸开了锅。一个老臣扑通跪在地上，磕头如捣蒜：“陛下，南京有长江天险，北京靠近边境，敌人打过来怎么办啊！”其他大臣也纷纷附和，反对声一浪高过一浪。",
"朱棣不为所动，他大手一挥，命令全国各地的工匠和民工向北京集结。一时间，大运河上挤满了运送木材和石料的船只。从四川运来的金丝楠木，每根都有几十米长，几十个壮汉才能抬得动。从房山运来的汉白玉石料，每块重达上百吨。",
"修建紫禁城用了整整十四年，动用了上百万民工。工匠们日夜不停地干活，冬天冻得手指都伸不直，夏天热得汗水滴在砖上滋滋作响。光是城墙的城砖就烧制了上亿块，每块砖上都刻着烧制工匠的名字，谁出了问题就追究谁的责任。",
"1420年，紫禁城终于建成了。这座宫殿有九千多间房屋，黄色的琉璃瓦在阳光下闪闪发光，红色的宫墙绵延数里。朱棣站在太和殿前，望着这片宏伟的建筑，心中充满了自豪。他下令大宴群臣，庆祝迁都完成。",
"可就在庆祝的当天晚上，一场大火把刚建好的三大殿烧了个精光。大臣们又跳出来说：“这是天怒啊！陛下还是回南京吧！”朱棣咬着牙说：“不！烧了我就重建！”他亲自跑到工地，和工匠们一起搬砖运瓦，重新修建宫殿。",
"北京从此成了明朝乃至后来清朝的都城。紫禁城经历了六百年的风风雨雨，见证了无数历史事件，至今仍然屹立在北京的中轴线上，成了世界上最著名的宫殿建筑群之一。",
"小道理：明成祖迁都北京，建造了宏伟的紫禁城——告诉我们：做大事要有远大的眼光和坚定的决心，一时的困难阻挡不了真正想做成事的人！"
],
"songyingxing": [
"宋应星出生在江西奉新一个读书人家。他从小聪明好学，二十八岁那年和哥哥一起考中了举人，全县的人都来祝贺。可从那以后，他五次进京赶考都落榜了。每次落榜，他都要从江西徒步走到北京，来回几千里路，见过无数的人和事。",
"第五次落榜后，宋应星坐在回家的船上，望着两岸的田野发呆。他忽然想明白了：那些考卷上的文章，翻来覆去都是些空话，可沿途看到的农民种地、工匠打铁、织布机嗡嗡响，这些才是真正让国家运转起来的东西啊！",
"从那天起，宋应星不再参加科举考试了。他背起行囊，走遍了全国各地。他跑到农田里，蹲在田埂上看农民怎么插秧、怎么施肥；他钻进作坊里，看铁匠怎么把铁块烧红了一锤一锤打成农具；他站在织布机前，看织女怎么把一根根丝线织成绸缎。",
"每到一个地方，宋应星就拿出纸笔，把看到的、听到的仔仔细细记下来。他还画了插图，把各种工具和工序画得清清楚楚。有一次，为了搞懂造纸的过程，他在造纸作坊里待了整整一个月，手上全是纸浆，衣服被漂白水烧出了好几个洞。",
"1637年，五十岁的宋应星终于完成了他的巨著《天工开物》。这本书分上中下三卷，共十八篇，涵盖了农业、纺织、制盐、制糖、酿酒、造纸、冶铁、造船、火药等方方面面。书里有一百多幅精美的插图，把各种工具和工艺流程画得清清楚楚。",
"书中有个特别有意思的故事：宋应星为了验证火药配方，跑到山里做实验。他按照从老工匠那里学来的方法，把硫磺、木炭和硝石按比例混合，点燃后"轰"的一声，把山石炸开了一大片。他高兴得像个孩子一样跳了起来，完全忘了自己是个读书人。",
"《天工开物》后来传到了日本和欧洲，引起了巨大的轰动。法国汉学家儒莲把它翻译成法文，欧洲的科学家们惊呼：原来中国人在几百年前就有了这么先进的技术！这本书被称为"中国十七世纪的工艺百科全书"。",
"小道理：宋应星用一本《天工开物》记录了中国古代劳动人民的智慧和创造——告诉我们：最了不起的学问，往往藏在普通人的双手里，真正有价值的东西来自田间地头、作坊工场！"
],
"laoshe": [
"老舍原名舒庆春，1899年出生在北京一个贫苦的旗人家庭。他不到两岁，父亲就在抵抗八国联军的战斗中牺牲了。母亲靠给人家洗衣服、缝补丁，苦苦支撑着这个家。冬天的北京冷得刺骨，小庆春常常饿着肚子去上学，手上长满了冻疮。",
"虽然家里穷得叮当响，可母亲却是个特别坚强的人。她总对老舍说：“咱们人穷志不穷，做人要堂堂正正！”邻居们也都喜欢这个懂事的孩子，有人送他旧衣服，有人送他书本。老舍把这一切都记在心里，后来都写进了他的小说里。",
"十九岁时，老舍考上了北京师范学校，成了一名教师。他白天教书，晚上就趴在煤油灯下写文章。他写北京的大杂院、胡同口的小贩、茶馆里的说书人，那些市井小民的故事被他写得活灵活现，好像就在你眼前一样。",
"1924年，老舍去了英国，在伦敦大学教书。在异国他乡，他特别想念北京。他想起了北京的胡同、四合院，想起了小时候在胡同里和小伙伴们踢毽子、滚铁环的日子。他把这些思念都写进了小说《老张的哲学》里，这是他第一部长篇小说。",
"1936年，老舍完成了他的代表作《骆驼祥子》。他为了写好这本书，专门跑到北京的人力车厂去体验生活，跟车夫们聊天、喝酒、一起拉车。他问车夫们一天能挣多少钱、吃什么东西、住在哪里，把每一个细节都记在本子上。",
"新中国成立后，老舍创作了话剧《茶馆》。这部戏用一个茶馆的兴衰，展现了半个世纪的中国历史。戏里的每个角色都活灵活现——精明圆滑的王掌柜、正直仗义的常四爷、吃铁杆庄稼的松二爷……观众看了都说：这就是咱老百姓的故事！",

function loadMore(){displayCount+=PAGE_SIZE;renderHome();}
function showStory(title){
  const item=D.find(d=>d.t===title);if(!item)return;
  const ps=P[item.k]||[];const k=item.k;
  let h='<div class="story-header"><h1 class="story-title">'+title+'</h1><p class="story-era">'+item.e+'</p></div>';
  for(let i=0;i<ps.length;i++){
    h+='<img class="story-img" src="'+getImgPath(k,i)+'" alt="插图'+(i+1)+'" loading="lazy" onerror="this.style.display=\'none\'">';
    h+='<p class="story-paragraph">'+ps[i]+'</p>';
  }
  if(item.m){h+='<div class="moral-card"><div class="moral-title">💡 小道理</div><p class="moral-text">'+item.m+'</p></div>'}
  document.getElementById('storyContent').innerHTML=h;
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('storyPage').classList.add('active');
  window.scrollTo(0,0);
}
function goHome(){
  document.getElementById('storyPage').classList.remove('active');
  document.getElementById('homePage').classList.remove('hidden');
  window.scrollTo(0,0);
}
function filterStories(f){
  currentFilter=f;displayCount=PAGE_SIZE;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');renderHome();
}
function setView(v){
  currentView=v;
  document.getElementById('gridBtn').classList.toggle('active',v==='grid');
  document.getElementById('listBtn').classList.toggle('active',v==='list');
  renderHome();
}
renderHome();
