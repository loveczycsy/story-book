<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=3,user-scalable=yes">
<title>历史绘本故事集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #e8b87a;
    --primary-light: #f5d9b3;
    --secondary: #8b5a3c;
    --accent: #c75c2c;
    --bg: #fdf8f3;
    --card-bg: #fff;
    --text: #3d2914;
    --text-light: #6b5642;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
    font-family: 'LXGW WenKai','STKaiti','KaiTi','楷体',serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.8;
    min-height: 100vh;
}
.home-page { padding:20px; max-width:800px; margin:0 auto; }
.home-header { text-align:center; padding:30px 0 10px; }
.home-title { font-size:2rem; color:var(--secondary); margin-bottom:10px; }
.home-subtitle { color:var(--text-light); }

/* Toolbar: filter + view toggle */
.toolbar {
    display:flex; justify-content:space-between; align-items:center;
    margin:20px 0 10px; flex-wrap:wrap; gap:10px;
}
.filter-tabs {
    display:flex; gap:8px; flex-wrap:wrap;
}
.filter-tab {
    padding:7px 14px; border:2px solid var(--primary); border-radius:20px;
    background:transparent; color:var(--secondary); font-family:inherit;
    font-size:0.9rem; cursor:pointer; transition:all 0.3s;
}
.filter-tab.active { background:var(--primary); color:#fff; }
.view-toggle {
    display:flex; gap:4px; background:var(--primary-light); border-radius:10px; padding:3px;
}
.view-btn {
    padding:6px 12px; border:none; border-radius:8px; background:transparent;
    color:var(--secondary); font-size:1.1rem; cursor:pointer; transition:all 0.2s;
    font-family:inherit;
}
.view-btn.active { background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.refresh-btn {
    padding:6px 14px; border:2px solid var(--primary); border-radius:10px;
    background:transparent; color:var(--secondary); font-size:0.9rem;
    cursor:pointer; transition:all 0.3s; font-family:inherit;
}
.refresh-btn:hover { background:var(--primary-light); }
.refresh-btn:active { transform:scale(0.95); }

/* Date section */
.date-section { margin-top:24px; }
.date-header {
    font-size:1.1rem; color:var(--secondary); font-weight:bold;
    padding:10px 0 8px; border-bottom:2px solid var(--primary-light);
    margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.date-dot {
    width:8px; height:8px; border-radius:50%; background:var(--accent);
    display:inline-block;
}
.date-count {
    font-size:0.8rem; color:var(--text-light); font-weight:normal;
    margin-left:4px;
}

/* Grid view */
.stories-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:14px;
}
.story-card {
    background:var(--card-bg); border-radius:14px; overflow:hidden;
    box-shadow:0 3px 12px rgba(139,90,60,0.08); cursor:pointer;
    transition:transform 0.3s,box-shadow 0.3s;
}
.story-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(139,90,60,0.14); }
.card-img {
    width:100%; aspect-ratio:3/4; object-fit:cover; background:var(--primary-light);
}
.card-content { padding:10px 12px; }
.card-title { font-size:1rem; color:var(--secondary); margin-bottom:4px; line-height:1.4; }
.card-meta { display:flex; justify-content:space-between; font-size:0.78rem; color:var(--text-light); }
.card-tag {
    background:var(--primary-light); color:var(--secondary);
    padding:2px 8px; border-radius:8px; font-size:0.75rem;
}

/* List view */
.stories-list { display:flex; flex-direction:column; gap:10px; }
.story-list-item {
    display:flex; align-items:center; gap:12px; background:var(--card-bg);
    border-radius:12px; padding:10px 14px; cursor:pointer;
    box-shadow:0 2px 8px rgba(139,90,60,0.06); transition:all 0.2s;
}
.story-list-item:hover { box-shadow:0 4px 14px rgba(139,90,60,0.12); }
.list-img {
    width:56px; height:72px; border-radius:8px; object-fit:cover;
    flex-shrink:0; background:var(--primary-light);
}
.list-info { flex:1; min-width:0; }
.list-title {
    font-size:1rem; color:var(--secondary); margin-bottom:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.list-era { font-size:0.82rem; color:var(--text-light); }
.list-tag {
    font-size:0.75rem; color:var(--accent); background:var(--primary-light);
    padding:1px 8px; border-radius:6px; display:inline-block; margin-top:2px;
}

/* Story page */
.story-page { display:none; max-width:600px; margin:0 auto; padding:20px; }
.story-page.active { display:block; }
.back-btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:8px 16px; background:var(--primary); color:#fff;
    border:none; border-radius:20px; font-family:inherit;
    font-size:0.95rem; cursor:pointer; margin-bottom:20px;
}
.story-header { text-align:center; margin-bottom:20px; }
.story-title { font-size:1.8rem; color:var(--secondary); margin-bottom:10px; }
.story-era { color:var(--text-light); font-size:0.95rem; }
.story-img {
    width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:12px;
    margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.1);
    background:var(--primary-light);
}
.story-paragraph {
    font-size:1.1rem; line-height:2.2; text-indent:2em;
    margin-bottom:20px; text-align:justify;
}
.moral-card {
    background:linear-gradient(135deg,#fff8e7 0%,#ffecb3 100%);
    border-radius:16px; padding:20px; margin-top:30px;
    border-left:4px solid var(--accent);
}
.moral-title { font-size:1.1rem; color:var(--accent); margin-bottom:10px; font-weight:bold; }
.moral-text { font-size:1.05rem; color:var(--text); line-height:1.8; }
.hidden { display:none !important; }
@media (min-width:768px) { .rb { max-width:600px; margin:0 auto; } }
.fade-in { animation:fadeIn 0.3s ease-in; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="homePage" class="home-page fade-in">
    <div class="home-header">
        <h1 class="home-title">📚 历史绘本故事集</h1>
        <p class="home-subtitle">用故事点亮智慧，用图画温暖童年</p>
    </div>
    <div class="toolbar">
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="全部">全部</button>
            <button class="filter-tab" data-filter="历史故事">历史故事</button>
            <button class="filter-tab" data-filter="名人传记">名人传记</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
        <div class="view-toggle">
            <button class="view-btn active" data-view="grid" title="图标视图">⊞</button>
            <button class="view-btn" data-view="list" title="列表视图">☰</button>
        </div>
        <button class="refresh-btn" onclick="location.reload()" title="刷新">🔄 刷新</button>
        </div>
    </div>
    <div id="storiesContainer" class="rb"></div>
</div>

<div id="storyPage" class="story-page rb fade-in">
    <button class="back-btn" onclick="showHome()">← 返回首页</button>
    <div id="storyContent"></div>
</div>

const P = {"贝多芬——无声的音乐": {"paragraphs": ["两百多年前，德国有一个叫贝多芬的小男孩。他的爸爸是个歌手，整天喝酒，总想着把儿子培养成第二个莫扎特那样的音乐神童。每天晚上，爸爸都要小贝多芬练琴好几个小时，弹不好就挨打。小贝多芬哭着练琴，小手都弹得又红又肿了。有时候他真的很讨厌钢琴，心想：为什么别的小朋友可以出去玩，我却要一直练琴呢？", "可是慢慢地，贝多芬发现钢琴能发出美妙的音乐，能让人快乐，也能让人感动。他开始真正爱上音乐了，每天不用爸爸催，自己就坐到琴凳上练习。渐渐地，他的琴弹得越来越好了。贝多芬长大后成了有名的音乐家，他的音乐让无数人感动。可是正当他最辉煌的时候，灾难降临了——他的耳朵开始听不见声音了！对音乐家来说，这是多么可怕的事情啊！", "贝多芬伤心极了，把自己关在房间里，不吃不喝，也不想见任何人。他绝望地想：完了，我的音乐生涯结束了……那段时间，他的心里充满了黑暗。可是渐渐地，贝多芬想通了：虽然耳朵听不见了，可是我心里的音乐还在啊！我可以用心去感受音乐，把最美妙的旋律写下来！", "就这样，贝多芬在完全听不见的情况下，用牙咬着木棒，木棒顶在钢琴上，靠着振动来感受音乐。他写出了《命运交响曲》、《第九交响曲》等流传千古的伟大作品。《第九交响曲》第一次演奏那天，观众们激动得全体起立，掌声雷动。可是贝多芬自己什么都听不见，直到有人转过他的身子，他才看到观众热烈的掌声——掌声是那样的响亮，响亮得整个大厅都在震动！", "贝多芬的故事告诉我们：真正的坚强，是遇到最大的困难也不放弃。命运可以夺走他的听力，却夺不走他心里的音乐！"], "imgKey": "beethoven"}, "蔡伦造纸——改变世界的发明": {"paragraphs": ["一千九百多年前的中国东汉，有个叫蔡伦的宫廷工匠。他从小就很聪明，喜欢动脑筋想办法，大人们都说他是个小发明家呢！", "蔡伦在皇宫里负责制造各种器物。那时候写字可麻烦了，用的是竹子做的竹简——又重又大，一本书要用好多好多竹简，装满一车子才能运走。还有一种叫缣帛的丝布，轻倒是轻，可太贵了，普通人根本用不起。", "蔡伦看着这些东西，心里发愁：要是能有一种又轻便、又便宜、还方便写字的东西就好了！他开始到处收集材料：树皮、麻头、破布、旧渔网……宫女们觉得他很奇怪：你收集这些破烂干什么呀？蔡伦笑嘻嘻地说：别小看这些东西，它们可有大用处呢！", "蔡伦把这些材料剪碎、泡水，搅成黏黏的浆糊状。然后他把浆糊倒在竹帘上，晃一晃、抖一抖，让浆糊薄薄地铺开，晒干后就变成了一张纸！可是最早做出来的纸粗糙不平，根本没法写字。蔡伦不气馁，一遍又一遍地改进配方和工艺。", "经过无数次的失败，蔡伦终于做出了又白又滑、适合写字的纸！他把这种纸献给了皇帝，皇帝用了以后赞不绝口：好纸！好纸！这纸又轻又薄，写起字来方便极了！皇帝下令在全国推广这种造纸方法。", "可是有些大臣不服气，背地里说风凉话：哼，一个小小的工匠，能做出什么好东西来？蔡伦听到了，也不生气，只是笑笑。他相信，时间会证明一切的。", "果然，没过多久，蔡伦的造纸术就传遍了全国，后来又传到了全世界！小朋友们，你们知道吗？在欧洲，他们学会造纸是在蔡伦之后好几百年呢！我们中国人，是不是很了不起呀？", "蔡伦的造纸术传到阿拉伯，又传到欧洲，让全世界的人们都能用上便宜又好用的纸。有了纸，知识才能更快地传播，文明才能更快地发展。可以说，蔡伦改变了整个世界！", "蔡伦晚年的时候，被封为龙亭侯，人们都亲切地叫他蔡侯。可是他从不骄傲，依然每天在工坊里研究、实验，想要把纸做得更好。这种不断钻研的精神，值得我们每一个人学习呀！"], "imgKey": "cailun"}, "程门立雪——尊师重道": {"paragraphs": ["北宋时候，洛阳有两位非常有名的大学问家——程颢和程颐，他们兄弟俩一起创办了理学，被后人称为二程先生。很多人都想拜他们为师，其中有一个叫杨时的年轻人，特别好学。", "有一天，杨时遇到了一个难题，怎么想也想不明白。他想起了程颐先生，心想：程先生一定知道答案！于是，他告别了朋友，冒着大雪，一路跌跌撞撞地往程先生家走去。", "那时候正好是深冬，天冷极了，鹅毛大雪纷纷扬扬地飘落下来。杨时的脸被冻得通红，眉毛上挂着白色的霜珠，鞋子也被雪水浸湿了。可是他顾不上这些，只想着快点见到程先生。", "好不容易到了程家门口，杨时发现程先生正在屋子里睡午觉呢！程先生年纪大了，睡觉总是不太安稳，好不容易睡着了，杨时怎么忍心叫醒他呢？", "杨时想了想，轻轻地脱下帽子，解下围巾，安静地站在门口的屋檐下。他想：我就等一会儿吧，程先生一定会醒的。雪花一片一片地落在他的肩膀上，杨时一动也不动，就像一尊雪人。", "一个时辰过去了，两个时辰过去了……程先生还在睡觉。杨时的脚冻麻了，手冻僵了，鼻涕都快冻成冰棍了！旁边还有一个小同学，也跟着一起站着冻得直跺脚。小同学忍不住小声说：杨时哥哥，我们进去烤烤火吧……", "杨时摇摇头，轻声说：不行，我们不能吵醒先生。再等等吧，再等等他就醒了。说完，他又默默地站好，生怕发出一点点声音。", "又过了好久好久，程先生终于醒了。他伸了个懒腰，推开门往外一看——哇，门口竟然站着两个雪人！仔细一看，才认出是杨时和他的同学。程先生又惊讶又感动：这么大的雪，你们怎么不进来叫我呢？", "杨时恭恭敬敬地说：先生，学生不敢打扰您休息。我们多等一会儿没关系，您睡个好觉比什么都重要。程先生听了，眼眶都红了，心里想：这样的学生，真是太难得了！", "程门立雪的故事告诉我们：真正的求学精神是发自内心的尊敬，哪怕等得再久也不抱怨——这就是尊师重道的道理！"], "imgKey": "chengmen"}, "居里夫人——发光的石头": {"paragraphs": ["在一百多年前的波兰，有一个叫玛丽的小女孩。她家里很穷，爸爸是教师，妈妈是音乐老师。可是玛丽从小就特别喜欢读书，她觉得书里有一个奇妙的世界，比任何玩具都好玩。", "那时候女孩子很难上大学，可是玛丽不肯认输。她白天打工洗衣服赚钱，晚上就偷偷躲在阁楼里学习。冬天的波兰冷得要命，阁楼里没有暖气，小玛丽的手指冻得通红，可她还是舍不得放下书本。", "功夫不负有心人，玛丽终于考上了大学，还获得了去法国深造的机会。在法国，她遇到了和她一样热爱科学的皮埃尔，两个人结为夫妻，一起研究一种神奇的石头。", "这种石头会发出淡淡的蓝光，还能发出看不见的射线呢！他们在一个简陋的实验室里，一锅一锅地煮矿石，又脏又累又呛人。可是玛丽从不怕脏不怕累不怕苦，因为她的心里装着更大的梦想——要找到能治病的良药！", "经过四年的艰苦研究，玛丽终于从好几吨矿石中提炼出了一丁点儿发光的粉末，她给它取名叫镭。你们知道吗？这么一点点镭，要从好几吨矿石里才能提炼出来呢！", "镭可以用来治疗一种很可怕的病——癌症。很多得了癌症的病人，因为有了镭的治疗，终于能够康复出院，和家人团聚了。", "有人劝玛丽给镭申请专利，这样就能发大财。可是玛丽摇摇头说：镭是属于全人类的，不是属于我一个人的。她把发现的方法无私地告诉了全世界，自己却一辈子住在简陋的小房子里，过着简朴的生活。", "后来，玛丽两次获得了诺贝尔奖，成为了世界上最伟大的科学家之一。可是她从来不骄傲，她说：荣誉就像玩具一样，不值得炫耀。真正的伟大，不是为了自己，而是为了让更多人过得更好！"], "imgKey": "curie"}, "达·芬奇——画蛋的天才": {"paragraphs": ["五百多年前，意大利有一个叫达·芬奇的小男孩。他从小就特别喜欢画画，画什么像什么——画小鸟像要飞起来，画小鱼像在水里游，连蚂蚁画出来都有六条腿呢！邻居们看了都惊叹不已，纷纷夸他是小天才。", "达·芬奇的爸爸看他这么有天赋，高兴极了，就把他送到佛罗伦萨最有名的画家韦罗基奥那里学画。达·芬奇高兴得一蹦三尺高，心想：太好了！终于可以学真正的画画了！", "可是到了老师那里，达·芬奇傻眼了——老师不让他画别的，就让他画鸡蛋。一天画鸡蛋，两天画鸡蛋，三天还是画鸡蛋……小达·芬奇不耐烦了，忍不住问老师：老师，我已经画了这么多蛋了，什么时候才能画别的呀？", "老师笑着摇摇头，指着一个鸡蛋说：你看，这一个鸡蛋，从这个角度看是椭圆的，从那个角度看是扁的，光照过来又不一样了。这一千个鸡蛋，有哪两个是一模一样的呢？画蛋，是训练你的眼睛和手，让你学会认真观察。", "达·芬奇听了老师的话，恍然大悟：原来画画不是画得像不像那么简单，要用心去观察啊！从此他认认真真地画蛋，画了无数个蛋，把基本功练得特别扎实。", "后来，达·芬奇真的成了全世界最著名的画家之一。他画出了《蒙娜丽莎》——那幅微笑着的世界上最神秘的画，还画了《最后的晚餐》，影响了无数人。", "不仅如此，达·芬奇还是个全才呢！他设计过直升机、坦克、潜水艇的图纸，研究过人体解剖，还发明了很多奇妙的机器。那时候人们都叫他：万能的天才！", "达·芬奇的故事告诉我们：打好基础比什么都重要。就像盖房子一样，地基打不牢，房子就盖不高。达·芬奇画了无数个蛋，才成了最伟大的画家。你现在练习的基本功，都是以后成功的基石哦！"], "imgKey": "davinci"}, "爱迪生——永不熄灭的灯": {"paragraphs": ["很久很久以前，夜晚的世界是黑漆漆的。人们只能点蜡烛或者油灯，光线很微弱，一不小心还会引发火灾。有一个叫爱迪生的小男孩，从小就特别爱问为什么——为什么天会下雨？为什么鸟会飞？为什么星星会眨眼睛？问得大人们都答不上来，大家都叫他'问题大王'。", "爱迪生长大后，想发明一种又亮又安全的灯，让所有人都能在夜晚看到光明。他找来各种各样的材料做试验：白金试试，碳丝试试，甚至头发丝也试试！可是灯泡总是亮一下就灭了。试验了一次又一次，失败了一次又一次。", "很多人笑话他：你已经失败了几百次了，还是放弃吧！爱迪生的助手们也泄气了，问他还要不要继续试下去。", "可爱迪生不这么想。他笑眯眯地说：我没有失败啊，我只是发现了几百种不能做灯丝的方法！每失败一次，就离成功更近一步！他继续试验，试了竹丝、棉线、纸张……一直试了一千多次！", "终于有一天晚上，实验室里传来一阵欢呼声——灯泡亮了！而且亮了整整四十多个小时！爱迪生激动得跳了起来，眼睛里闪着泪光。", "从此，世界上有了电灯，黑夜变得像白天一样明亮。人们可以在灯下读书、写字、工作、玩耍，再也不用害怕黑暗了。", "爱迪生一生发明了两千多种东西，是世界上最伟大的发明家之一。他用行动告诉我们：只要不放弃，就一定能找到成功的路！失败不可怕，每失败一次，就离成功更近一步！"], "imgKey": "edison"}, "伽利略——星空的守望者": {"paragraphs": ["四百多年前，意大利有个叫伽利略的小男孩，出生在一个音乐家的家庭里。小伽利略从小就特别爱问问题——天上的星星为什么眨眼睛？月亮为什么会变形状？云为什么会飘来飘去？这些问题问得爸爸都答不上来。", "伽利略长大后，成了一名老师，还发明了很多有用的东西。他听说荷兰有人发明了一种神奇的镜子，可以看到很远很远的地方。伽利略想：如果我能用这个原理做出一个更好的东西，不就可以看到天上的星星了吗？", "于是，伽利略开始日夜不停地研究。他画了很多图纸，做了很多实验，有时候一做就是几天几夜不合眼。终于，他做出了世界上第一台真正的天文望远镜！", "伽利略把望远镜对准天空，哇，他看到了好多好多从前看不到的东西——月亮上有高高的山，金星也会像月亮一样有圆有缺，木星旁边还有四颗小星星在转来转去……这些发现，让所有人都惊呆了！", "可是，当时的人们都说：不对不对！月亮是完美的球，上面的山都是骗人的！伽利略被很多人嘲笑，还有人说他是骗子。", "但伽利略不在乎别人怎么说，他只相信自己的眼睛看到的东西。他把所有的发现都写成了书，告诉全天下的人：看，这就是我看到的！这就是宇宙的真相！", "后来，伽利略被坏人关进了监狱。大家以为他会屈服，可他一直坚持自己的观点。临死前，他还说：地球确实是在转动的！", "伽利略去世后三百多年，人类真的登上了月球，登上了火星探测器，证明了伽利略说的是对的。他用望远镜看到的那些东西，全都是真的！", "伽利略的故事告诉我们：坚持真理需要勇气，哪怕全世界都不相信你，也要相信自己的眼睛和思考！"], "imgKey": "galileo"}, "华佗——神医的故事": {"paragraphs": ["华佗是东汉末年最有名的神医，被后人称为外科的祖师爷。他从小聪明好学，四处拜师学医，走遍了千山万水，医术越来越精湛。", "华佗给人看病可神奇了！他只需要看看病人的脸色、听听病人的声音，就能准确地判断出病情是什么。有时候，他甚至只要把一下脉，就能知道病人肚子里长没长东西。", "有一次，州官倪寻和李延一起来了，两个人都头疼发热。华佗分别给他们把脉后，却开了不同的药方。倪寻奇怪地问：为什么我们症状一样，你开的药却不同呢？", "华佗笑着说：你们两个虽然症状相同，但病因不一样。倪寻是吃多了，肚子里的东西不消化；而李延是受了风寒。治病要治本，不能只看表面症状！果然，两个人吃了药，很快就好了。", "华佗发明了一种独特的健身方法，叫做五禽戏。他模仿虎、鹿、熊、猿、鸟这五种动物的动作，创编了一套体操。华佗的徒弟坚持练习这套体操，活到了九十多岁呢！", "华佗最厉害的是外科手术！当时没有麻醉药，做手术可是非常痛苦的事情。华佗研制出了一种叫麻沸散的中药，病人喝了以后，就像睡着了一样，一点也感觉不到疼。然后华佗再给病人开刀做手术，病人醒过来的时候，手术早就做完了，一点痛苦都没有！", "三国时候的曹操，患有头疼病，听说华佗医术高明，就把他请来。华佗说要用斧头砍开脑袋，把里面的风涎取出来。曹操吓坏了，以为华佗要害他，就把华佗关进了监狱。可怜的神医，最后死在了监狱里。", "华佗去世后，他的医术被弟子们传承了下来。后世的中医外科，一直都在使用华佗发明的很多方法和药物。人们永远怀念这位了不起的神医！", "华佗的故事告诉我们：医者仁心，治病救人是医生的天职。同时，要因人而异、对症下药，不能教条主义！"], "imgKey": "huatuo"}, "李时珍与本草纲目——走遍天下的神医": {"paragraphs": ["四百多年前的明朝，有一位了不起的医生叫李时珍。他从小就跟着父亲学医，每天跟着父亲上山采药，回家后帮父亲切药、晒药、磨药。虽然他只有十几岁，但对各种草药已经非常熟悉了。", "李时珍二十多岁的时候，已经成了当地很有名气的医生。可是他发现一个问题：以前的药书里有很多错误，有些药名对不上图片，有些药效写错了，还有些药根本就是毒性很大的，但书里却写着可以随便吃。", "'这样的书会害死人的！'李时珍皱起眉头，决心要重新写一本正确的药书。父亲知道后担心地说：'这可是个大工程啊，你想想清楚！'可李时珍坚定地说：'医生治病救人，不能有半点马虎，我一定要做这件事！'", "从那以后，李时珍背上药筐，带上纸笔，开始了他的寻药之旅。他翻过高山，蹚过河流，走过森林，去过草原。为了找到一种叫'薪蛇'的药蛇，他冒着生命危险跑到深山老林里；为了看清一种草药的生长过程，他在山里住了整整三个月。", "整整二十七年，李时珍走遍了大江南北，尝遍了各种草药，记录了几十万字的笔记。终于在他六十岁那年，一本叫《本草纲目》的书诞生了！书里记载了1892种药物，是当时最全、最准确的药书。", "你知道吗？《本草纲目》后来被翻译成很多国家的文字，传遍了全世界。直到今天，中医还在用这本书里的很多药方呢！", "李时珍的故事告诉我们：做事情要有始有终，不怕困难，坚持到底。把一件平凡的事做到极致，就是不平凡！"], "imgKey": "lishizhen"}, "牛顿——苹果的秘密": {"paragraphs": ["三百多年前，英国有一个小男孩叫牛顿。他从小就和其他孩子不一样——别的孩子在院子里追逐打闹的时候，他却喜欢蹲在角落里做各种小玩意儿。", "牛顿做的小风车会转，做的小水钟会按时滴水，还会报时呢！他还喜欢爬上屋顶，用三棱镜对着阳光看——哇，阳光居然能变成彩虹的颜色！小伙伴们都说牛顿是个怪孩子，可牛顿才不在乎呢，他觉得这个世界太有意思了，有好多秘密等着去发现。", "有一天傍晚，牛顿坐在苹果树下看书，看得入了迷。忽然，咚的一声，一个又红又大的苹果从树上掉下来，正好砸在他的头上。牛顿揉了揉脑袋，抬头看了看苹果树，心里忽然冒出一个问题：", "苹果为什么会往下掉呢？为什么不往天上飞，也不往旁边跑，偏偏往下掉呢？", "这个问题让牛顿想了好久好久。他想啊想，想到月亮，想到太阳，想到星星……终于有一天，他想明白了：原来地球有一种看不见的吸引力，像一只无形的大手，把所有东西都往下拉！这就是万有引力！月亮绕着地球转，也是因为地球在拉着它呢！", "牛顿后来成了伟大的科学家，发明了数学里的微积分，还发现了许多重要的科学定律。可是他从来都不骄傲，他总是说：我只是像一个在海边捡贝壳的孩子，真理的大海还有太多太多我没有发现。", "牛顿的故事告诉我们：多观察、多思考，再普通的事情里也可能藏着大秘密。一个苹果掉下来，就能让牛顿想到改变世界的大发现。你看，身边的小事是不是也值得我们多问几个为什么呢？"], "imgKey": "newton"}, "诺贝尔——炸药之父": {"paragraphs": ["一百多年前，瑞典有一个叫诺贝尔的小男孩。他的身体很弱，经常生病，妈妈总是担心他。可是小诺贝尔很勇敢，他最喜欢的事情就是跟着爸爸一起做各种小实验。", "有一天，爸爸把一小块白色的粉末放在火上烤。诺贝尔好奇地凑过去看，突然——砰！火药爆炸了，火星四溅！小诺贝尔吓得摔倒在地上，脸都吓白了。可是他的眼睛里闪着光，他没有被吓退，反而兴奋地说：爸爸，再来一次！我想看看它是怎么炸开的！", "诺贝尔长大后，国家正在大力发展工业，需要很多开矿修路的人。可是那时候的炸药很危险，一不小心就会爆炸伤人。诺贝尔想：如果能发明一种更安全的炸药，该有多好啊！", "于是，诺贝尔开始了他的实验。他把自己关在一间小小的实验室里，一次又一次地尝试，一次又一次地失败。有时候爆炸把他炸得满脸黑灰，有时候把他炸到墙上，可他从来不放弃。", "邻居们都在背后笑话他：这个诺贝尔，整天搞那些危险的实验，早晚要被炸死的！诺贝尔听到了，只是笑笑，继续做他的实验。", "有一次，诺贝尔在做实验的时候，炸药把实验室炸得粉碎，诺贝尔的弟弟和几个助手都被炸死了。诺贝尔难过得哭了很久，他也很害怕：这么危险，还要继续吗？", "可是他想起了那些在矿上辛苦劳动的工人们，他们需要炸药来开山修路，让人们生活得更好。诺贝尔擦干眼泪，又走进了实验室。他对自己说：再试一次，就一次！", "一晃眼，二十多年过去了。诺贝尔失败了无数次，炸毁了自己的实验室，炸伤了无数次。就在他快要绝望的时候，有一天，他终于成功了——他发明了一种叫做硝化甘油的安全炸药！", "这种炸药不会轻易爆炸，只有用雷管才能引爆。工人们可以安全地使用它来开矿、修路、盖房子。诺贝尔高兴得跳了起来，他终于成功了！", "后来，诺贝尔用他发明炸药赚的钱设立了诺贝尔奖，这是全世界最光荣的奖项。诺贝尔奖包括和平奖、物理奖、化学奖、医学奖、文学奖和经济学奖，用来奖励全世界最优秀的人才。", "诺贝尔的故事告诉我们：失败不是终点，而是通往成功的必经之路。只要坚持不懈，总有一天会成功！"], "imgKey": "nobel"}, "司马迁——忍辱负重的史学家": {"paragraphs": ["司马迁是西汉时期著名的史学家，他写的《史记》被称为史书的典范。可是你知道吗？司马迁能写出这么伟大的著作，经历了常人难以想象的苦难！", "司马迁从小就是个爱读书的孩子。他的父亲司马谈是汉朝的史官，专门负责记录历史。司马迁从小跟着父亲，耳濡目染，对历史产生了浓厚的兴趣。他立志要像父亲一样，成为一个记录历史的史官。", "长大后，司马迁当上了史官，开始四处游历，收集历史资料。他爬过巍峨的泰山，去过波涛汹涌的海边，访遍了古代名人故事发生的地方。他访问老人，收集古老的传说，就是为了把历史写得真实可信。", "公元前99年，发生了一件改变司马迁命运的事情。将军李陵在和匈奴打仗的时候，兵败被俘了。司马迁替李陵说了几句公道话，结果惹怒了汉武帝，被关进了大牢，判处了宫刑！", "宫刑是一种非常屈辱的刑罚，司马迁觉得天都要塌下来了。他想过自杀，一了百了。可是他转念一想：我的父亲把写史书的任务交给了我，《史记》还没写完呢！如果我就这样死了，谁来完成这部伟大的著作？", "司马迁咬紧牙关，活了下来。他说：人固有一死，或重于泰山，或轻于鸿毛。我要活下去，把《史记》写完！就这样，他在极其屈辱和痛苦中，继续坚持写作。", "整整十三年，司马迁忍着身体和心灵的巨大痛苦，终于完成了《史记》！这部书记载了从黄帝到汉武帝时期三千多年的历史，共有五十二万多字，是我国第一部纪传体通史！", "司马迁的故事告诉我们：遇到困难和挫折的时候，不要轻易放弃。要像司马迁一样，咬紧牙关坚持下去，完成自己的使命！《史记》至今仍然是中华民族最宝贵的文化遗产之一！", "司马迁的故事告诉我们：人的一生会遇到很多困难，但只要坚持理想、不放弃，就一定能创造出伟大的成就！"], "imgKey": "simaqian"}, "孙武练兵——斩杀吴王爱妃的军事家": {"paragraphs": ["两千五百多年前，齐国有个叫孙武的年轻人，他聪明过人，特别喜欢研究打仗的方法。他写了一本叫《孙子兵法》的书，这本书后来成了全世界最厉害的军事著作。可是那个时候，没有人知道他是个真正的人才。", "有一天，孙武带着自己写的兵法，去见吴国的国王吴王阖闾。吴王接过兵法，翻了几页，越看越喜欢，拍着桌子说：太好了！你的兵法太厉害了！可是光有兵法还不行，得看看你有没有真本事。你能不能用我的宫女们练练兵，让我看看？", "孙武说：当然可以！于是吴王把自己后宫的一百八十名宫女叫来，让孙武训练。孙武把宫女们分成两队，让吴王最宠爱的两个妃子当队长。宫女们嘻嘻哈哈的，觉得好玩极了，拿着兵器左摇右晃，像在跳舞一样。", "孙武一本正经地说：你们听着，向前看！眼睛看着我手指的方向！宫女们还是嘻嘻哈哈的，没人理会他。孙武皱起眉头，提高声音又说了一遍，可宫女们笑得更厉害了。", "孙武沉下脸来，大声说：听令不听宣，是谁的错？是我没说清楚，还是你们不听命令？他转头问吴王：大王，士兵不听命令，按照军法该斩首。宫女们是你的妃子，是斩还是不斩？", "吴王在一边看得正高兴，听到这话吓了一跳：什么？斩首？她们可是我心爱的妃子啊！你就不能放她们一马？孙武严肃地说：既然大王让我当将军，就要听我的！士兵不听命令，这是带兵的大忌！", "孙武一声令下，两名妃子被绑了起来。宫女们吓得脸色煞白，再也不敢笑了。吴王在上面急得直跺脚：别斩啊别斩啊！那可是我的爱妃啊！可是孙武根本不听，手起刀落，两名妃子的人头落地。", "宫女们全都吓傻了，再也不敢嘻嘻哈哈，都认认真真地听令操练。不一会儿，一百八十名宫女就训练得像真正的士兵一样整齐。", "吴王虽然心疼两个爱妃，可心里也不得不佩服：孙武真是个人才啊！从此以后，吴王重用孙武，让他带领吴国军队。孙武帮助吴国成了春秋时期最强大的国家之一。", "孙武练兵的故事告诉我们：无规矩不成方圆，做任何事情都要有纪律。将军没有威严，士兵不听命令，怎么能打胜仗呢？严格要求才是真正的爱护！"], "imgKey": "sunwu"}, "华盛顿——美国的国父": {"paragraphs": ["两百多年前，美国有一个叫华盛顿的男孩，他出生在一个种烟草的农场主家庭里。小华盛顿从小就跟着爸爸在农场里干活学会了骑马、种地，他的眼睛里总是闪着聪明的光。", "有一天，小华盛顿在森林里迷了路，又累又饿。走着走着，他看到一棵大树上刻着一行字：往前走一百步，再往右转。他照着做了，果然走出了森林！后来他才知道，那是他爸爸故意做的标记，为的是教他如何在森林里辨别方向。", "华盛顿长大后，英国国王派总督来管理殖民地。这个总督经常欺负老百姓，让人们交很重的税，却把钱装进自己的口袋。大家都很生气，可又不敢说什么。", "有一天，总督在广场上宣布：每家每户都要交税，不交的就把房子拆了！老百姓们低着头不敢说话。这时候，华盛顿站了出来，他大声说：凭什么要交这么多税？我们的血汗钱，凭什么被你们抢走？", "总督气得脸都绿了：你敢反抗？小心我让人抓你！华盛顿毫不畏惧：我不怕你！你欺负我们老百姓，早晚会受到惩罚的！围观的人们纷纷鼓掌，总督灰溜溜地跑了。", "后来，美国的老百姓实在受不了英国人的欺负，纷纷拿起武器反抗英国统治。华盛顿被选为大陆军的总司令，带领大家和英国人打仗。", "打仗可不是一件容易的事！华盛顿的军队又缺粮食又缺武器，士兵们常常饿着肚子打仗。有时候，他们甚至没有鞋子穿，脚都冻烂了。华盛顿看着士兵们受苦，心里难过极了。", "有一年冬天，华盛顿的军队只剩下两千多人，大家都觉得撑不下去了。可华盛顿却咬牙坚持，他对士兵们说：只要我们团结一心，就一定能打败英国人！只要我们不放弃，自由就一定会来到！", "经过八年的艰苦奋斗，美国人终于打败了英国人，建立了独立的国家。华盛顿被选为美国第一任总统，大家都叫他美国的国父。", "可是，华盛顿只当了八年总统，就主动辞职不干了！原来，他想让大家自己管理国家，不能让一个人永远当总统。从那以后，美国就有了规矩：总统最多当两届。这个规矩，一直到现在还在用呢！", "华盛顿的故事告诉我们：真正的领袖不是想着怎么拥有权力，而是想着怎么为大家服务。华盛顿放弃权力，为美国树立了榜样——真正的伟大，不是当多大的官，而是为多少人做好事！"], "imgKey": "washington"}, "瓦特与蒸汽机——改变世界的水壶盖": {"paragraphs": ["两百多年前，英国有个叫瓦特的小男孩。他的爷爷和爸爸都是心灵手巧的工匠，家里摆满了各种工具和机器。小瓦特最喜欢蹲在角落里，看着爸爸做东西，心里想着：这个东西是怎么转起来的呀？", "有一天，小瓦特病了，躺在床上发着高烧。妈妈端来一碗热汤让他喝，汤上面冒着白色的热气。小瓦特看着那些热气，忽然问：妈妈，为什么热气会往上冒呢？妈妈笑着说：因为热的东西会变轻，轻了就往上飘啊。小瓦特似懂非懂地点点头。", "瓦特长大了，在一家工厂里修理机器。那时候的机器都用蒸汽来推动，可是这些蒸汽机又笨又重，效率很低，经常出问题。工人们都说：这破机器，真难用！", "可瓦特不这么想。他蹲在蒸汽机旁边，左看看右看看，想啊想啊。有一天，他看到茶壶里的水烧开了，壶盖被蒸汽顶得一上一下，噗噗地响。", "瓦特盯着茶壶看了好久，忽然眼睛一亮：哎呀！我知道问题在哪里了！蒸汽机之所以效率低，是因为每推动一次，汽缸就要冷却一次，然后再重新加热。这多浪费啊！", "瓦特开始研究怎么改进蒸汽机。他在汽缸外面加了一个冷凝器，让蒸汽在冷凝器里冷却，汽缸就能一直保持热乎的状态。这样一来，蒸汽机的效率一下子提高了四倍！", "工厂主听说了，嘲笑他说：瓦特，你就是个修理工，还想发明东西？别做梦了！瓦特听了，也不生气，只是笑笑：我会证明给你看的。", "瓦特继续改进他的蒸汽机。他还发明了一种叫做离心调速器的东西，可以让蒸汽机的速度保持稳定。这样，蒸汽机就可以用在各种机器上了。", "瓦特的蒸汽机越做越好，很快就用到了纺织厂、面粉厂、火车上。工厂的机器不再需要马拉或者水车来带动了，农民们也可以用蒸汽机来抽水灌溉农田。整个世界都变了样！", "后来，人们把瓦特发明的这种蒸汽机叫做瓦特蒸汽机。为了纪念他，人们还用他的名字来作为功率的单位。一台机器有多少马力，就是以瓦特的名字来计算的。", "瓦特的故事告诉我们：好奇心是发明之母。瓦特从一个茶壶盖想到了改变世界的大发明。只要我们平时多观察、多思考，再普通的事物里也可能藏着大秘密呢！"], "imgKey": "watt"}, "莱特兄弟——插上翅膀的梦想": {"paragraphs": ["一百多年前，美国有一对兄弟——威尔伯·莱特和奥维尔·莱特。他们小时候家里很穷，爸爸是个牧师，妈妈心灵手巧，常常给孩子们做玩具。有一天，爸爸从外地回来，带给兄弟俩一个神秘的礼物——一个会飞的竹蜻蜓。", "兄弟俩好奇地把竹蜻蜓转了好几圈，竹蜻蜓真的飞了起来！他们高兴得又蹦又跳，心里种下了一颗小小的种子：长大了，我也要造出一个能飞的东西！", "兄弟俩长大后，一个开了一家自行车店修理自行车，一个当了一名老师。虽然工作很忙，但他们始终没有忘记童年的梦想——让人类飞上天空。", "那时候，已经有很多人在尝试造飞机了，可是全都失败了，还有人因为飞机坠落而失去了生命。大家都说：人类怎么可能像鸟儿一样飞上天空呢？", "可是莱特兄弟不信邪。他们买来很多关于鸟和飞行的书，白天修自行车，晚上就研究飞行知识。他们发现，鸟儿飞行的时候翅膀会上下拍打，飞机的翅膀却不能这样拍打——那飞机是怎么飞起来的呢？", "后来，他们想出了一个好办法：让飞机的翅膀稍微弯曲一点，这样空气流过的时候，就会把飞机托起来！这就是飞机能飞的关键——升力原理。", "有了原理，还需要不断地试验。莱特兄弟在自家的空地上搭了一个大风洞，一次又一次地试验。失败了没关系，爬起来再试；摔坏了修一修，继续飞！", "1903年12月17日这一天，天气冷飕飕的，兄弟俩在北卡罗来纳州的基蒂霍克海滩放飞了他们的飞机——飞行者一号。", "这一天，奥维尔坐上了飞机，螺旋桨转了起来，飞机在滑行了一段距离后，真的飞了起来！虽然只飞了12秒钟，飞了36米远，但这却是人类历史上第一次有动力的飞行！", "人们从四面八方赶来观看，消息传遍了全世界。从那以后，飞机越来越先进，飞得越来越高，越来越远。现在，我们可以坐飞机去地球的另一端，只要十几个小时就能到达。", "莱特兄弟的故事告诉我们：梦想是成功的起点，而坚持梦想、不断尝试，才是让梦想成真的关键！"], "imgKey": "wright"}, "张衡与地动仪——能捉龙的机器": {"paragraphs": ["一千九百多年前的东汉时期，有一个人叫张衡，他从小就心灵手巧，特别喜欢研究各种机械和天文。别的孩子玩泥巴的时候，他就用木头做小车子、小风车，做得像真的一样会动！大家都叫他'小鲁班'。", "张衡长大后当了官，可他最喜欢的事情还是搞发明创造。那时候，经常发生地震，有时候房子会倒塌，人们会受伤。皇帝问大臣们：'谁能预测地震，好让人们提前躲一躲？'大臣们都说不可能，张衡却站出来说：'陛下，我可以试试看！'", "张衡开始了他的研究。他翻阅了很多古书，观察了很多自然现象，想啊想啊，画了无数张图纸。有一次，他看到有人在酒馆里喝酒，酒杯里的酒因为有人走路引起震动而晃动起来。他眼睛一亮：'对呀！我可以用这个原理来造地动仪！'", "张衡用青铜铸造了一个大圆球，圆球上面有八条龙，每条龙的嘴里都含着一个小铜球。圆球下面有八只青蛙，张着嘴对准每条龙。如果哪个方向发生地震，那条方向的龙嘴就会张开，铜球就会掉进青蛙的嘴里，发出'当'的一声响。", "有一天，地动仪上东边的龙突然'当'的一声，铜球掉进了青蛙嘴里。可是那天洛阳并没有感觉到地震啊！大家都议论纷纷，说张衡的地动仪不灵。可过了几天，陇西那边传来消息：那边发生了大地震！人们这才恍然大悟，原来地动仪真的能提前知道地震的发生！", "张衡还发明了浑天仪，是一个能显示星星位置的仪器，就像一个小小的宇宙。他写的《灵宪》这本书，记载了很多天文知识，比欧洲早了好几百年呢！", "张衡的故事告诉我们：不要因为别人说'不可能'就放弃创造。仔细观察身边的事物，灵感可能就在一杯酒、一阵风中！"], "imgKey": "zhangheng"}, "郑成功收复台湾——收宝岛的民族英雄": {"paragraphs": ["三百多年前的台湾宝岛，被一群红毛发的荷兰人霸占着。他们在岛上建了好多城堡，欺负台湾的老百姓，抢走了无数金银珠宝。台湾人民天天盼望着：谁来救救我们啊！", "这时候，一位英雄站了出来——他就是郑成功！郑成功这个名字，可能小朋友们的爸爸妈妈都听说过呢。他从小就很勇敢，骑马射箭、读书写字，样样都学得特别认真。", "郑成功的爸爸是个商人，经常出海做生意。有一次，爸爸带着小成功坐船出海，遇到了大风暴。船差点就沉了，小成功紧紧抓着爸爸的衣服，吓得脸色发白。爸爸安慰他说：别怕，大海虽然可怕，但只要我们勇敢，就一定能战胜它！这次经历，让小成功变得特别坚强。", "长大后，郑成功当上了将军。他听说了台湾人民被荷兰人欺负的事，气得拍案而起：荷兰人太欺负人了！台湾是我们中国人的土地，一定要把它收回来！可是荷兰人仗着有大炮和城堡，根本不把郑成功放在眼里。", "郑成功带着大军，坐着几百艘战船，浩浩荡荡地出发了。海上波涛汹涌，有士兵害怕地说：将军，荷兰人的炮火很厉害啊！郑成功站在船头，大声喊道：狭路相逢勇者胜！今天，我们就是拼了命，也要收复台湾！", "荷兰人看到郑成功的大军，吓得赶紧开炮。可是郑成功的士兵们不怕死，前面的倒下了，后面的继续往前冲。有的士兵用竹筏搭成浮桥，有的士兵抱着木板游过浅滩，硬是冲到了荷兰人的城堡下面。", "郑成功下令攻城！士兵们扛着云梯，架到城墙上，一个接一个地往上爬。城墙上滚下热油，射下火箭，士兵们被烫伤、烧伤，可没有人退缩。激战了好几天，荷兰人的城墙终于被攻破了！", "荷兰人的将军看着满地的尸体，绝望地说：中国人的勇气太可怕了！他们投降了！被荷兰人霸占了三十八年的台湾，终于回到了祖国的怀抱！台湾人民欢天喜地，敲锣打鼓地庆祝，还给郑成功起了个尊称——国姓爷！", "可惜的是，郑成功收复台湾后第二年就病逝了，年仅三十九岁。他虽然离开了，但他的故事永远留在了台湾人民心中。现在台湾有郑成功的祠堂，每年都有很多人去祭拜他。", "郑成功收复台湾的故事告诉我们：台湾是我们祖国不可分割的一部分，任何想霸占台湾的企图都注定会失败！"], "imgKey": "zhenggong"}};
const IMG_BASE = 'img/';

let currentFilter = '全部';
let currentView = 'grid';

function getImgPath(imgKey, idx) {
    return IMG_BASE + imgKey + '_' + idx + '.jpg';
}

function formatDate(dateStr) {
    const d = new Date(dateStr);
    const month = d.getMonth() + 1;
    const day = d.getDate();
    const weekDays = ['日','一','二','三','四','五','六'];
    const weekDay = weekDays[d.getDay()];
    return month + '月' + day + '日 周' + weekDay;
}

function renderHome() {
    const container = document.getElementById('storiesContainer');
    const filteredD = currentFilter === '全部' ? D : D.filter(item => item.c === currentFilter);

    // Group by date
    const groups = {};
    for (const item of filteredD) {
        const date = item.d || '未知日期';
        if (!groups[date]) groups[date] = [];
        groups[date].push(item);
    }

    // Sort dates descending (newest first)
    const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

    let html = '';
    for (const date of sortedDates) {
        const items = groups[date];
        const dateLabel = formatDate(date);
        html += '<div class="date-section">';
        html += '<div class="date-header"><span class="date-dot"></span>' + dateLabel + '<span class="date-count">(' + items.length + '则)</span></div>';

        if (currentView === 'grid') {
            html += '<div class="stories-grid">';
            for (const item of items) {
                const title = item.s;
                const imgKey = item.imgKey || title;
                const imgSrc = getImgPath(imgKey, 0);
                html += '<div class="story-card" onclick="showStory(\'' + title.replace(/'/g, "\\'") + '\')">' +
                    '<img class="card-img" src="' + imgSrc + '" alt="' + title + '" loading="lazy" onerror="this.style.background=\'var(--primary-light)\'">' +
                    '<div class="card-content">' +
                    '<h3 class="card-title">' + title + '</h3>' +
                    '<div class="card-meta"><span>' + item.e + '</span><span class="card-tag">' + item.c + '</span></div>' +
                    '</div></div>';
            }
            html += '</div>';
        } else {
            html += '<div class="stories-list">';
            for (const item of items) {
                const title = item.s;
                const imgKey = item.imgKey || title;
                const imgSrc = getImgPath(imgKey, 0);
                html += '<div class="story-list-item" onclick="showStory(\'' + title.replace(/'/g, "\\'") + '\')">' +
                    '<img class="list-img" src="' + imgSrc + '" alt="' + title + '" loading="lazy" onerror="this.style.background=\'var(--primary-light)\'">' +
                    '<div class="list-info">' +
                    '<div class="list-title">' + title + '</div>' +
                    '<div class="list-era">' + item.e + '</div>' +
                    '<span class="list-tag">' + item.c + '</span>' +
                    '</div></div>';
            }
            html += '</div>';
        }

        html += '</div>';
    }

    container.innerHTML = html;
}

function showStory(title) {
    const item = D.find(d => d.s === title);
    if (!item) return;
    const data = P[title];
    const paragraphs = data ? data.paragraphs : [];
    const imgKey = data ? data.imgKey : item.imgKey || title;

    let html = '<div class="story-header"><h1 class="story-title">' + title + '</h1>' +
        '<p class="story-era">' + item.e + '</p></div>';

    for (let i = 0; i < paragraphs.length; i++) {
        const imgSrc = getImgPath(imgKey, i);
        html += '<img class="story-img" src="' + imgSrc + '" alt="插图' + (i+1) + '" loading="lazy" onerror="this.style.display=\'none\'">';
        html += '<p class="story-paragraph">' + paragraphs[i] + '</p>';
    }

    if (item.m) {
        html += '<div class="moral-card"><div class="moral-title">💡 小道理</div><p class="moral-text">' + item.m + '</p></div>';
    }

    document.getElementById('storyContent').innerHTML = html;
    document.getElementById('homePage').classList.add('hidden');
    document.getElementById('storyPage').classList.add('active');
    window.scrollTo(0, 0);
}

function showHome() {
    document.getElementById('storyPage').classList.remove('active');
    document.getElementById('homePage').classList.remove('hidden');
    window.scrollTo(0, 0);
}

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        renderHome();
    });
});

// View toggle
document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        renderHome();
    });
});

renderHome();
</script>
</body>
</html>
