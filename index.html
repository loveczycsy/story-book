<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📖 历史绘本故事集</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>:root{--bg:#0f0e17;--card:#1a1932;--text:#fffffe;--muted:#94a1b2;--primary:#e94560;--primary-light:#2d1f3d;--accent:#f5a623;--border:#2a2a4a;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.toolbar{position:sticky;top:0;z-index:100;background:rgba(15,14,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar h1{font-size:1.1rem;background:linear-gradient(90deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .2s}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.view-toggle{margin-left:auto;display:flex;gap:4px}
.view-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.view-btn.active{background:var(--primary);color:#fff}
.refresh-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:1rem}
.refresh-btn:active{transform:rotate(180deg)}
.container{max-width:800px;margin:0 auto;padding:12px 16px 80px}
.date-section{margin-bottom:20px}
.date-header{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:.95rem;font-weight:600;color:var(--accent);border-bottom:1px solid var(--border);margin-bottom:12px}
.date-dot{width:8px;height:8px;border-radius:50%;background:var(--primary)}
.date-count{font-size:.75rem;color:var(--muted);font-weight:400}
.stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.stories-list{display:flex;flex-direction:column;gap:8px}
.story-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
.story-card:active{transform:scale(.97)}
.grid-view .story-card .card-img{width:100%;aspect-ratio:3/4;object-fit:cover;background:var(--primary-light)}
.grid-view .story-card .card-content{padding:8px 10px 10px}
.grid-view .story-card .card-title{font-size:.85rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-view .story-card .card-meta{display:flex;gap:4px;margin-top:4px;font-size:.7rem;color:var(--muted)}
.grid-view .story-card .card-tag{background:var(--primary-light);color:var(--primary);padding:1px 6px;border-radius:4px;font-size:.65rem}
.list-view .story-card{display:flex;gap:10px;padding:10px;align-items:center}
.list-view .story-card .card-img{width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--primary-light)}
.list-view .story-card .card-content{flex:1;min-width:0}
.list-view .story-card .card-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-view .story-card .card-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.list-view .story-card .card-tag{background:var(--primary-light);color:var(--primary);padding:1px 6px;border-radius:4px;font-size:.65rem;margin-left:4px}
.load-more-wrap{text-align:center;padding:20px 0}
.load-more-btn{padding:10px 32px;border-radius:24px;border:1px solid var(--border);background:var(--card);color:var(--accent);font-size:.9rem;cursor:pointer;transition:all .2s}
.load-more-btn:active{transform:scale(.97)}
.load-more-btn:disabled{opacity:.4;cursor:default}
.story-counter{font-size:.8rem;color:var(--muted);margin-top:8px}
#storyPage{display:none}
#storyPage.active{display:block}
.story-back{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;gap:6px;padding:12px 16px;background:rgba(15,14,23,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);color:var(--primary);font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
.story-back:active{background:rgba(15,14,23,1)}
.story-header{padding:56px 16px 12px}
.story-title{font-size:1.9rem;font-weight:700;line-height:1.4}
.story-era{font-size:.95rem;color:var(--muted);margin-top:4px}
.story-img{width:100%;border-radius:8px;margin:8px 0}
.story-paragraph{padding:0 16px;font-size:1.8rem;line-height:2.1;color:var(--text);margin-bottom:6px}
.moral-card{margin:16px;padding:16px;background:linear-gradient(135deg,var(--primary-light),rgba(245,166,35,.1));border-radius:var(--radius);border-left:3px solid var(--accent)}
.moral-title{font-size:1rem;font-weight:600;color:var(--accent);margin-bottom:6px}
.moral-text{font-size:1.8rem;line-height:2;color:var(--text)}
.hidden{display:none!important}
@media(min-width:768px){.container{max-width:900px;padding:16px 24px 80px}.stories-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}.grid-view .story-card .card-content{padding:10px 12px 12px}.grid-view .story-card .card-title{font-size:.9rem}.story-header{padding:56px 24px 16px}.story-paragraph{padding:0 24px;font-size:2rem;line-height:2.2}.moral-card{margin:16px 24px;padding:20px}.story-img{max-width:420px;margin:12px auto;display:block;border-radius:10px}}
@media(min-width:1024px){.container{max-width:720px;padding:20px 32px 80px}.stories-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px}.story-header{padding:56px 32px 16px}.story-paragraph{padding:0 32px;font-size:2rem;line-height:2.2}.moral-card{margin:16px 32px}.story-img{max-width:400px;margin:12px auto;display:block;border-radius:10px}}</style>
</head>

<script>
const D=[{"t":"官渡之战——曹操以少胜多的奇迹","e":"东汉末年","k":"guandu_zhan","c":"历史故事","d":"2026-06-19","m":"实力不是决定胜负的唯一因素，智慧和勇气有时候比千军万马更重要！"},{"t":"贞观之治——唐太宗虚心纳谏","e":"唐朝","k":"zhenguan_zhizhi","c":"历史故事","d":"2026-06-19","m":"虚心听取别人的意见，才能不断进步，才能把事情做得更好！"},{"t":"李愬雪夜袭蔡州——出其不意的胜利","e":"唐朝","k":"lixue_xiye","c":"历史故事","d":"2026-06-19","m":"出其不意，攻其不备，是取胜的好办法。机会总是留给有准备的人！"},{"t":"郭守敬——仰望星空的大科学家","e":"元朝","k":"guoshoujing","c":"名人传记","d":"2026-06-19","m":"兴趣是最好的老师，只要对一件事充满热爱，并且坚持不懈地努力，就一定能取得了不起的成就！"},{"t":"韩愈——文起八代之衰的大文豪","e":"唐朝","k":"hanyu","c":"名人传记","d":"2026-06-19","m":"做人要正直，做学问要勤奋，哪怕遇到再多挫折，也不能放弃自己的原则！"},{"t":"靖康之耻——北宋灭亡的惨痛教训","e":"北宋末年","k":"jingkang_zhichi","c":"历史故事","d":"2026-06-18","m":"小道理：生于忧患，死于安乐。一个国家如果只贪图享乐、不重视国防，再富裕也会被欺负。我们要时刻保持警惕，努力让自己变得强大。"},{"t":"光武中兴——刘秀重建汉朝的故事","e":"西汉末年","k":"guangwu_zhongxing","c":"历史故事","d":"2026-06-18","m":"小道理：做人要能屈能伸，在逆境中不放弃，在顺境中不骄傲。刘秀从一个普通农民变成皇帝，靠的是坚韧不拔的意志和善待他人的胸怀。"},{"t":"澶渊之盟——北宋和辽国做兄弟","e":"北宋初年","k":"chanyuan_zhimeng","c":"历史故事","d":"2026-06-18","m":"小道理：有时候，和平比战争更重要。澶渊之盟虽然看起来宋朝有点吃亏，但换来了一百多年的和平，老百姓能够安居乐业，这才是最宝贵的。"},{"t":"王阳明——知行合一的心学大师","e":"明朝","k":"wangyangming","c":"名人传记","d":"2026-06-18","m":"小道理：知识要和行动结合起来才有用。我们不仅要多读书，更要在生活中去实践、去思考。听从自己内心的良知，做一个正直善良的人。"},{"t":"袁隆平——让大家吃饱饭的农学家","e":"现代","k":"yuanlongping","c":"名人传记","d":"2026-06-18","m":"小道理：只要有梦想，并且愿意为之付出一生的努力，就一定能创造奇迹。袁隆平爷爷用一粒种子改变了世界，他的心里装着全中国、全世界的吃饭问题。"},{"t":"长平之战——四十万赵卒的悲歌","e":"战国时期","k":"changping_zhan","c":"历史故事","d":"2026-06-17","m":"纸上谈兵不可取，实践才能出真知；用人不当，会给国家带来灾难。"},{"t":"王安石变法——十一世纪的改革风云","e":"北宋","k":"wang_anshi_bianfa","c":"历史故事","d":"2026-06-17","m":"改革需要勇气和智慧，也需要理解和支持；做大事不能怕困难，但也要多听听别人的意见。"},{"t":"开元盛世——唐朝最辉煌的年代","e":"唐朝","k":"kaiyuan_shengshi","c":"历史故事","d":"2026-06-17","m":"一个国家要想繁荣昌盛，需要英明的君主和贤能的大臣共同努力；太平日子久了，也不能忘记居安思危。"},{"t":"朱元璋——从放牛娃到开国皇帝","e":"明朝","k":"zhuyuanzhang","c":"名人传记","d":"2026-06-17","m":"出身低微不要紧，只要有志向、肯努力、善于学习，普通人也能成就伟大的事业。"},{"t":"李清照——千古第一才女","e":"宋朝","k":"liqingzhao","c":"名人传记","d":"2026-06-17","m":"女孩子也可以很有才华，只要努力学习，就能在喜欢的领域做出成就；苦难也能成为创作的源泉。"},{ const P={"guandu_zhan":["东汉末年，天下大乱。袁绍和曹操是两个最强大的军阀，他们都想统一天下。袁绍兵多将广，有七十万大军，粮草充足；曹操只有七万兵马，实力相差一大截。","袁绍率领大军浩浩荡荡杀向许昌，连营几十里，战鼓声震得大地都在发抖。曹操手下的将士们都很害怕，有些人偷偷地收拾包袱，准备随时逃跑。","可是曹操一点也不慌。他拍拍胸脯对大家说：\"袁绍虽然兵多，但他优柔寡断，不会用兵。我们虽然人少，但我们齐心协力，一定能打胜仗！\"","两军对峙了好几个月，曹操的粮食快吃完了。正在发愁的时候，袁绍的谋士许攸因为和袁绍闹别扭，连夜跑来投降。曹操高兴得连鞋子都来不及穿，光着脚就跑出去迎接。","许攸出了个好主意：\"袁绍的粮草都囤在乌巢，守兵不多。烧了他的粮草，袁军不战自乱！\"曹操一听，拍手叫好！当天夜里，他亲自率领五千精兵，打着袁军的旗号，悄悄摸到乌巢。","曹军把袁绍的粮草烧得一干二净，火光冲天，把黑夜都照成了白天。袁绍听说粮草被烧，顿时慌了神。将士们没饭吃，哪还有心思打仗？","曹操趁机发起总攻，七万曹军把七十万袁军打得落花流水。袁绍只带了八百骑兵，狼狈地逃回了北方。","官渡之战是历史上有名的以少胜多的战役。它告诉我们：实力不是决定胜负的唯一因素，智慧和勇气有时候比千军万马更重要！"],"zhenguan_zhizhi":["唐朝初年，唐太宗李世民当上了皇帝。他亲眼看到隋朝因为皇帝太霸道而亡国，所以他经常对大臣们说：\"君主就像船，百姓就像水。水能载船，也能把船打翻。\"","唐太宗特别虚心，喜欢听大臣们的批评意见。有个叫魏征的大臣，特别敢说话，经常当着满朝文武的面指出唐太宗的错误，有时候说得唐太宗脸一阵红一阵白的。","有一次，魏征在朝廷上和唐太宗争得面红耳赤。唐太宗气呼呼地回到后宫，对皇后说：\"气死我了！我一定要杀了这个乡巴佬！\"","皇后听了，赶紧换上漂亮的礼服，向唐太宗深深鞠了一躬。唐太宗纳闷极了：\"你这是干什么呀？\"皇后笑着说：\"我听说君主英明，大臣才敢直言。魏征这么敢说话，不正说明陛下是个英明的君主吗？\"","唐太宗听了，转怒为喜，不但不怪魏征，反而更加重用他了。魏征去世的时候，唐太宗伤心地哭了。他说：\"用铜做镜子，可以正衣冠；用历史做镜子，可以知道朝代兴亡；用人做镜子，可以明白自己的对错。魏征死了，我失去了一面好镜子啊！\"","在唐太宗的治理下，唐朝越来越强大。老百姓安居乐业，路上掉了东西都没人捡，监狱里常常空空的，因为犯罪的人太少了。","那时候的唐朝，是世界上最强大的国家。四面八方的国家都来朝拜学习，外国人都把中国人叫\"唐人\"。直到现在，国外的华人街还叫\"唐人街\"呢。","贞观之治告诉我们：虚心听取别人的意见，才能不断进步，才能把事情做得更好！"],"lixue_xiye":["唐朝中期，有个叫吴元济的节度使在蔡州造反，朝廷派了好多将军去讨伐，都打了败仗。后来，皇帝派了一个叫李愬的将军去平定叛乱。","李愬到了前线，不练兵、不打仗，整天和士兵们聊天开玩笑。他还到处散播谣言：\"皇上知道我胆小，派我来只是安抚大家罢了。\"吴元济听说后，哈哈大笑：\"这个李愬是个胆小鬼，有什么好怕的！\"","其实李愬是在麻痹敌人。他暗中训练精兵，打探敌情，等待最佳时机。他还善待俘虏，让他们心甘情愿地为自己做事，收集情报。","有一天，天空飘起了鹅毛大雪，北风呼呼地刮着，冷得滴水成冰。李愬突然召集将士：\"今夜突袭蔡州！\"将士们都惊呆了：这么大的雪，路都看不见，怎么打仗？","但军令如山，大家只好冒着大雪出发了。雪越下越大，路越来越滑，好多士兵和战马都冻死了。将领们问李愬：\"我们这是去哪儿啊？\"李愬说：\"只管往前走！\"","半夜时分，李愬的军队神不知鬼不觉地来到了蔡州城下。守城的士兵正缩在被窝里打呼噜呢，他们做梦也想不到大雪天会有敌军来偷袭。","李愬指挥士兵们爬上城墙，悄无声息地干掉了守门的士兵，然后打开城门。大军像潮水一样涌进了蔡州城。等吴元济从睡梦中惊醒的时候，他的帅府已经被团团围住了。","雪夜袭蔡州成了历史上最经典的奇袭战之一。它告诉我们：出其不意，攻其不备，是取胜的好办法。但更重要的是，机会总是留给有准备的人！"],"guoshoujing":["元朝的时候，出了一位了不起的科学家，名叫郭守敬。他从小就对天上的星星特别感兴趣，经常晚上不睡觉，仰着小脖子看星星，还喜欢自己动手做各种小玩意儿。","郭守敬的爷爷郭荣是个大学问家，他发现孙子很有天赋，就把他送到了著名学者刘秉忠那里去学习。郭守敬如饥似渴地读书，天文、地理、数学、水利，什么都学，而且学得特别快。","长大后，郭守敬成了一位出色的水利专家。他修复了好多古运河，还在西夏一带修了几十条灌溉渠道，让贫瘠的土地变成了肥沃的良田。老百姓都感激地称他为\"活龙王\"。","后来，元世祖忽必烈让郭守敬负责修订新历法。郭守敬说：\"要修订历法，必须先有准确的观测数据。\"于是，他发明了好多精密的天文仪器，比如简仪、高表、仰仪等等。","简仪可厉害了！它是当时世界上最先进的天文观测仪器，比西方类似的仪器早了三百多年！郭守敬用这些仪器，测出了一年有365.2425天，这个结果和现在的精确值只差了26秒！","郭守敬还主持了规模空前的天文观测。他在全国各地设立了27个观测站，北到西伯利亚，南到南海，收集了大量珍贵的天文数据。","经过四年的努力，郭守敬终于编成了新的历法——《授时历》。这部历法非常准确，是当时世界上最先进的历法，一直沿用了三百六十多年。","郭守敬的故事告诉我们：兴趣是最好的老师，只要对一件事充满热爱，并且坚持不懈地努力，就一定能取得了不起的成就！"],"hanyu":["唐朝的时候，有个大文学家叫韩愈。他三岁的时候父亲就去世了，由哥哥嫂子抚养长大。韩愈从小就聪明好学，每天都要读好多好多书，有时候读到半夜都不肯睡觉。","可是韩愈的运气不太好，他连续考了四次科举都没考上。换了别人可能早就灰心了，但韩愈不放弃。他说：\"我就是要考，考到考上为止！\"第五次考试，他终于考中了进士。","韩愈不仅文章写得好，人品也特别正直。他当监察御史的时候，看到关中地区闹旱灾，老百姓饿得吃不上饭，而官员们却隐瞒灾情，照样征税。","韩愈气愤极了，连夜写了奏章给皇帝，如实报告灾情，请求减免赋税。这下可得罪了那些贪官污吏，他们在皇帝面前说韩愈的坏话。结果，韩愈被贬到了偏远的阳山当县令。","但韩愈一点也不后悔。到了阳山，他还是认认真真地为老百姓办事，教孩子们读书识字，帮助农民发展生产。阳山的老百姓都很爱戴他，很多人家生了儿子都取名叫\"韩\"。","后来，韩愈又被召回了京城。有一次，皇帝要把佛骨迎进宫中供奉，全京城都跟着疯狂。韩愈却站出来反对，写了一篇《论佛骨表》，劝皇帝不要迷信。","皇帝看了勃然大怒，差点把韩愈处死。幸亏有大臣求情，韩愈才保住了性命，又一次被贬到了更远的潮州。在潮州，他依然为老百姓做好事，潮州的鳄鱼为害，韩愈还写了《祭鳄鱼文》呢。","韩愈是唐宋八大家之首，他的文章写得特别有气势，人们称赞他\"文起八代之衰\"。他的故事告诉我们：做人要正直，做学问要勤奋，哪怕遇到再多挫折，也不能放弃自己的原则！"],"jingkang_zhichi":["公元1127年的冬天，北宋都城开封格外寒冷。鹅毛大雪下了整整三天三夜，城里的柴火都快烧完了。就在这时，金兵的铁蹄冲破了城墙，繁华的汴京城瞬间变成了人间地狱。两个皇帝——宋徽宗和宋钦宗，都披着破羊皮，成了金人的俘虏。","宋徽宗可是个大名鼎鼎的艺术家，写得一手漂亮的瘦金体，画得一手好花鸟，还特别喜欢奇花异石。他在位的时候，专门设立了'应奉局'，从全国各地搜刮花石纲，用大船运到开封来修建豪华的皇家园林'艮岳'，老百姓被折腾得叫苦连天。","其实有好多忠臣都提醒过皇帝，金国狼子野心，一直在训练军队准备南下，一定要加强边防。可宋徽宗根本听不进去，他以为签了'海上之盟'就万事大吉，整天只顾着写字画画、欣赏奇石，还和蔡京、童贯这些奸臣一起吃喝玩乐。","金兵第一次南下的时候，宋徽宗吓得直接晕了过去。醒来后他赶紧把皇位传给儿子宋钦宗，自己带着一帮人想逃到南方去。幸好有李纲等忠臣坚守开封，老百姓也纷纷拿起武器保卫家园，金兵才暂时退走。","可金兵一走，宋朝君臣又开始了醉生梦死的生活。他们把李纲贬出了京城，还遣散了很多从各地赶来的援军。宋钦宗以为和平了，又开始在皇宫里大摆宴席，听戏看舞。结果第二年金兵又打了过来，这次开封城再也守不住了。","金兵把两个皇帝、皇后、公主、皇子、大臣还有工匠一万多人都押往北方的金国。路上风雪交加，俘虏们穿着单薄的衣服，吃不饱穿不暖，很多人冻死饿死在路上。到了金国，两个皇帝还被强迫行'牵羊礼'，受尽了侮辱。这就是历史上有名的'靖康之耻'。","曾经繁华无比、富甲天下的北宋，就这样灭亡了。很多老百姓不愿意做亡国奴，纷纷逃到南方。后来赵构在杭州建立了南宋，岳飞、韩世忠这些爱国将军，一直在为收复中原而战斗。"],"guangwu_zhongxing":["西汉末年，外戚王莽篡夺了汉朝的天下，建立了新朝。可是他的改革搞得一团糟，一会儿改币制，一会儿改官名，老百姓越活越穷。再加上连年闹蝗灾，地里颗粒无收，百姓们活不下去，各地都爆发了农民起义。刘秀和哥哥刘縯也在南阳舂陵起兵。","刘秀年轻的时候是个老实巴交的农民，特别喜欢种庄稼。他每天天不亮就起床去田里干活，除草、施肥、浇地，样样都干得很起劲。他哥哥刘縯却豪爽仗义，喜欢结交英雄好汉，还经常嘲笑刘秀只会种地，像个没出息的庄稼汉。","起义军刚起步的时候装备特别差，刘秀连一匹战马都没有，只能骑一头黄牛上战场。后来打了胜仗，抢了敌人的战马，他才终于骑上了马。大家都笑着叫他'牛背上的开国皇帝'，刘秀听了也不生气，还跟着大家一起笑。","昆阳之战是刘秀的成名之战。王莽派了四十万大军围攻小小的昆阳城，城里只有八九千守军。很多将领都想弃城逃跑，刘秀却站出来说：'现在我们齐心合力，还有机会打赢；如果各自逃命，只会被敌人一个个消灭。'他的话鼓舞了大家。","当天夜里，刘秀带着十三名勇士，骑着快马冲出了敌人的包围圈，去附近搬救兵。救兵赶到后，刘秀亲自率领三千名敢死队，像一把尖刀一样直冲敌人的中军大营。敌军阵脚大乱，城里的守军也趁机冲了出来，里外夹击，把四十万大军打得落花流水。","后来哥哥刘縯被嫉妒他的更始帝害死了，刘秀心里特别难过，常常一个人偷偷哭。但他表面上却装作没事一样，不给哥哥服丧，吃饭喝酒和平常一样谈笑风生。他知道现在还不是翻脸的时候，只能忍着，等待时机。","后来刘秀找机会去了河北发展势力。他每到一个地方，就废除王莽的苛政，平反冤狱，还把粮食分给穷苦的老百姓。很快就有很多人来投奔他，队伍越来越壮大。他先后消灭了各地的割据势力，终于在公元25年当上了皇帝，重建了汉朝，历史上称为东汉。刘秀就是汉光武帝。"],"chanyuan_zhimeng":["北宋建立后，和北方的辽国一直打打停停。辽国是契丹人建立的国家，他们的骑兵特别厉害，骑着高头大马，来去如风。宋朝一直想收复被辽国占去的燕云十六州，可打了好几次都没打赢，还损失了好多士兵。","宋真宗景德元年，辽国的萧太后和辽圣宗亲自率领二十万大军南下，绕过了宋军把守的城池，一直打到了黄河北岸的澶州城。消息传到开封，整个朝廷都吓坏了，大臣们议论纷纷，有的主战，有的主和，乱成了一锅粥。","很多胆小的大臣劝宋真宗赶紧逃跑，有的说去江南避难，有的说去四川躲起来。只有宰相寇准站出来，大声说：'谁再说逃跑，就砍谁的头！陛下应该御驾亲征，到前线去鼓舞士气，这样才能打退敌人。'","宋真宗心里特别害怕，双腿都在发抖，但又没办法反驳寇准，只好硬着头皮答应了。他磨磨蹭蹭地走了好多天才到澶州。当皇帝的黄龙旗出现在澶州城楼上的时候，士兵们齐声欢呼，声音传出去几十里远，士气一下子就高涨起来。","刚好这时候，辽国的大将萧挞凛带着几个亲兵在前线视察地形。宋军的士兵发现了他，就转动床子弩，'嗖'的一箭射过去，正好射中了萧挞凛的额头，当场就死了。辽军失去了主将，士气低落，萧太后也有点害怕了，就派人来讲和。","宋真宗一听要议和，高兴得不得了。他派曹利用去谈判，说：'只要不割地，每年给辽国一百万钱也行。'寇准偷偷把曹利用叫过来，板着脸说：'要是超过三十万，回来我就砍你的脑袋！'曹利用吓得连连点头。","最后谈成的条件是：宋朝每年给辽国白银十万两、绢二十万匹，两国约为兄弟之国，宋真宗是哥哥，辽圣宗是弟弟。这就是历史上有名的'澶渊之盟'。从此以后，宋辽两国一百多年没有打过仗，边境上的老百姓终于过上了安稳的日子。"],"wangyangming":["王阳明出生在明朝浙江余姚的一个大官家庭，他的爸爸王华是状元郎。王阳明从小就很特别，别的孩子都想着考科举做官，他却一本正经地说自己要当'圣人'。大家听了都哈哈大笑，觉得这孩子在说大话。","王阳明年轻的时候特别喜欢研究军事，还喜欢谈论兵法。他十五岁的时候，就一个人骑着马跑到山海关外去考察地形，差点在草原上迷路回不来。他还试着给皇帝上书，提出平定农民起义的办法，大家都觉得这孩子胆子真大。","考中进士后，王阳明当了官。那时候大太监刘瑾专权，好多正直的大臣都被他抓了起来。王阳明看不下去，就上书为忠臣求情。结果惹怒了刘瑾，被打了四十大板，贬到贵州龙场去当驿丞。那地方特别偏僻，都是深山老林，连房子都没有。","在龙场的日子特别苦，王阳明和随从们都生病了。没有药，他就自己采草药；没有房子，他就教大家搭草棚。他每天都在思考学问，还造了个石棺材，天天躺在里面想问题。终于有一天夜里，他突然想通了'心即理'的道理，高兴得手舞足蹈，这就是著名的'龙场悟道'。","后来刘瑾倒台了，王阳明又被重新起用。他不仅学问好，打仗也特别厉害。宁王朱宸濠在江西造反，声势浩大。王阳明手上没兵没粮，却一点都不慌。他用计策迷惑宁王，又临时招募民兵，只用了四十多天，就平定了叛乱，活捉了宁王，挽救了整个江南。","王阳明提出了'知行合一'的著名学说，他说知道道理却不去做，就不是真的知道。他还说每个人心里都有良知，就像太阳一样，只是有时候被乌云遮住了。只要我们听从良知的指引，多做好事，就能成为像圣人一样的人。","王阳明是中国历史上少有的'立德、立功、立言'都做到的人，被人们尊称为'阳明先生'。他的学说影响了好几百年，还传到了日本、朝鲜等国家。直到今天，还有很多人在学习他的思想，从中获得智慧和力量。"],"yuanlongping":["袁隆平出生在1930年的北京。小时候他跟着父母到处搬家，见过很多饿得面黄肌瘦的人。有一次，他看到路边躺着几个饿晕的人，心里特别难受。那时候他就暗暗想：如果能让所有人都吃饱饭，那该是一件多么伟大的事情啊！","长大后，袁隆平考上了西南农学院。毕业以后，他去了湖南安江的一所农校当老师。那时候中国很多地方粮食都不够吃，大家只能吃野菜、啃树皮。袁隆平看在眼里，急在心里，他下定决心要研究出高产的水稻。","有一天，袁隆平在稻田里散步，突然发现了一株特别大的稻穗，颗粒饱满，沉甸甸的，比别的稻穗大好多。他小心翼翼地把稻穗摘下来，带回实验室研究。他想：如果能培育出这样的高产水稻，那不就能多打好多粮食了吗？","那时候全世界的科学家都觉得水稻是自花授粉的植物，不可能培育出杂交品种。但袁隆平不相信这个说法，他顶着炎炎烈日，弯着腰在稻田里一株一株地寻找，汗水浸透了衣服，皮肤也晒得黝黑。终于，他找到了雄性不育的水稻植株。","研究的过程特别辛苦。为了加快实验进度，袁隆平每年冬天都要跑到海南去种水稻，因为那里暖和，一年能种三季。他在野外四处寻找野生稻，脚被泥水泡得发白，腿上被蚊子叮得全是包，但他一点都不在乎。","经过十多年的努力，做了无数次实验，失败了一次又一次，袁隆平终于成功培育出了杂交水稻。这种水稻比普通水稻产量高百分之二十多，一下子就让中国的粮食产量翻了番，好多好多人终于能吃上白米饭了。大家都亲切地叫他'袁隆平爷爷'。","袁隆平爷爷被称为'杂交水稻之父'，他获得了好多好多大奖，包括国家最高科学技术奖。但他还是天天泡在稻田里，九十多岁了还在研究超级水稻。他有两个著名的梦想：一个是禾下乘凉梦，就是水稻长得像树一样高，他能坐在稻穗下乘凉；另一个是杂交水稻覆盖全球梦，让全世界的人都能吃饱饭。"],"changping_zhan":["战国末年，秦国和赵国为了争夺上党地区，在长平展开了一场惊天动地的大战。赵国老将廉颇坚守不出，秦军久攻不下，两国就这样对峙了三年之久。","秦国丞相应侯想出了一条反间计，他派人到赵国散布谣言说：'秦军最怕的是赵括，要是赵括当了将军，秦军早就被打跑了。'赵王本来就对廉颇坚守不战很不满，听了谣言果然动了心。","赵括是赵国名将赵奢的儿子，从小熟读兵书，谈起兵法来头头是道，连他父亲都辩不过他。但赵奢临终前却对妻子说：'赵括把打仗看得太容易了，将来赵国要是用他为将，一定会吃大亏。'","赵王不听劝告，执意任命赵括为大将。赵括一到长平，就改变了廉颇的战略，下令全线出击。秦军主帅白起听说赵括来了，心里暗暗高兴，他故意假装败退，引诱赵军追击。","赵括率领四十万大军追了上去，没想到正中白起的圈套。秦军从两边包抄，把赵军团团围住，还切断了赵军的粮道。赵军被困了四十六天，粮食吃光了，士兵们饿得互相残杀吃人肉。","赵括没有办法，只好亲自率领精锐部队突围，结果被秦军乱箭射死。主将一死，四十万赵军群龙无首，只好全部投降。心狠手辣的白起担心降卒造反，竟然把他们全部活埋了。","长平一战，赵国元气大伤，从此再也无力与秦国抗衡。四十万生命化作了累累白骨，只留下'纸上谈兵'的教训，让后世人深深感叹：理论固然重要，但没有实践经验，终究是要吃大亏的。"],"wang_anshi_bianfa":["北宋神宗年间，国家看起来繁华，其实隐藏着很多问题：官员太多、军队太弱、老百姓赋税太重。年轻的宋神宗很想有一番作为，他听说江宁有个叫王安石的人，学问大、主意多。","王安石是个很有个性的人，他从小聪明好学，读书过目不忘。他做官的时候，常常提出一些与众不同的想法，别人觉得他古怪，可他毫不在意。他写了一篇《上仁宗皇帝言事书》，主张全面改革。","宋神宗把王安石召到京城，两人一见如故，聊得非常投机。神宗问：'你觉得治理国家最重要的是什么？'王安石说：'最重要的是变法，改变旧的法度，让国家富强起来。'","公元1069年，王安石开始了轰轰烈烈的变法运动。他推出了青苗法、免役法、方田均税法等十几项改革，有的让农民在青黄不接时能借到粮食，有的让富人也要交税，有的让军队更有战斗力。","但是变法遇到了很大的阻力。很多老臣反对，说王安石'乱了祖宗家法'。司马光、苏轼这些大文豪也不支持，他们觉得变法太急了，会让老百姓受苦。王安石的好朋友也纷纷离他而去。","王安石没有退缩，他说：'天变不足畏，祖宗不足法，人言不足恤。'意思是天象变化不用怕，祖宗规矩不必死守，别人的闲话不用在意。他顶着压力，坚持推行新法。","可惜，变法最终还是失败了。宋神宗死后，高太后临朝听政，把新法全部废除。王安石听说后，伤心地一病不起。这场十一世纪的大改革，虽然失败了，但它的勇气和智慧，永远值得后人敬佩。"],"kaiyuan_shengshi":["公元713年，唐玄宗李隆基改年号为'开元'，从此开启了唐朝最辉煌灿烂的时代——开元盛世。那时候的唐朝，是世界上最强大、最富裕的国家，长安是世界上最大的城市。","唐玄宗刚即位的时候，非常勤奋节俭。他把后宫里多余的宫女放回家，禁止各地进献珍宝，还烧掉了宫里的珠玉锦绣，表示不追求奢侈。他说：'我要让老百姓都过上好日子。'","唐玄宗特别会用人，他选拔了很多有才能的人当宰相。姚崇善于应变，宋璟守法持正，张说文采飞扬，张九龄正直敢言。这些贤相齐心协力，把国家治理得井井有条。","那时候的长安，到处都是热闹的景象。东市和西市商店林立，有卖丝绸的、卖瓷器的、卖茶叶的，还有来自波斯、阿拉伯、日本的商人。街上有汉人、胡人、突厥人、日本人，各种肤色的人来来往往。","农业也很发达，粮食年年丰收，仓库里堆满了粮食，便宜得几乎不值钱。杜甫写诗说：'忆昔开元全盛日，小邑犹藏万家室。稻米流脂粟米白，公私仓廪俱丰实。'可见当时有多富裕。","文化艺术更是百花齐放。李白、杜甫、王维这些大诗人写出了千古流传的诗篇，吴道子的画、张旭的字、李龟年的歌，都是天下一绝。大雁塔下，文人雅士饮酒作诗，好不快活。","可惜好景不长，唐玄宗晚年渐渐骄傲自满，沉迷于享乐，重用奸臣李林甫、杨国忠，还爆发了安史之乱。开元盛世就这样结束了。它告诉我们：无论多么辉煌的时代，都要居安思危，不能忘记初心。"],"zhuyuanzhang":["元朝末年，濠州钟离有个叫朱重八的孩子，他家世代都是农民，穷得叮当响。朱重八从小就给地主家放牛，经常饿肚子，还挨地主的打骂。但他特别聪明，也很有主见，小伙伴们都听他的。","十六岁那年，家乡发生了特大旱灾和蝗灾，接着又闹瘟疫。短短半个月，朱重八的父亲、大哥、母亲都先后病死了，连棺材都买不起，只能用破衣服裹着，埋在邻居送的一小块地里。","走投无路的朱重八只好到皇觉寺当和尚，混口饭吃。可是没过多久，寺里也没粮了，他只好拄着拐杖、托着钵盂，到处流浪化缘。这一走就是三年，他走遍了安徽、河南的山山水水。","流浪的日子虽然苦，但朱重八长了见识，认识了很多朋友，也锻炼了坚强的意志。后来，他投奔了郭子兴的红巾军，改名叫朱元璋，意思是'诛灭元朝的美玉'。","朱元璋作战勇敢，又有谋略，很快就从一个小兵当上了将军。他知人善任，招揽了徐达、常遇春、刘伯温等一大批人才。他的队伍纪律严明，不抢老百姓的东西，所以越来越壮大。","经过十几年的南征北战，朱元璋先后消灭了陈友谅、张士诚等对手，然后派出大军北伐，把元朝统治者赶回了蒙古大草原。公元1368年，朱元璋在应天府称帝，建立了明朝，年号洪武。","当了皇帝的朱元璋依然很勤奋，他每天天不亮就起床处理朝政，一直忙到深夜。他痛恨贪官污吏，制定了严厉的法律。虽然他也有很多缺点，但从一个放牛娃到开国皇帝，他的一生真的很了不起。"],"liqingzhao":["北宋年间，济南章丘出了一位了不起的女词人，她叫李清照。她的父亲李格非是著名的文学家，也是苏东坡的学生，母亲也很有文化。在这样的家庭里，李清照从小就饱读诗书。","少女时代的李清照活泼可爱，她写的词清新自然。'常记溪亭日暮，沉醉不知归路。兴尽晚回舟，误入藕花深处。争渡，争渡，惊起一滩鸥鹭。'短短几句，就把一个贪玩的小姑娘写活了。","十八岁那年，李清照嫁给了太学生赵明诚。两人志趣相投，都喜欢收集金石书画。他们经常一起喝茶、猜书、研究古董，日子过得又甜蜜又充实。赵明诚做官后，聚少离多，李清照写下了'莫道不销魂，帘卷西风，人比黄花瘦'的名句。","可惜好景不长，金兵南下，北宋灭亡了。李清照和赵明诚只好带着满满的收藏逃到南方。一路上颠沛流离，很多珍贵的金石书画都丢失了。更不幸的是，赵明诚在赴任途中生了重病，不治身亡。","丈夫去世后，李清照一个人孤苦伶仃地在江南漂泊。她尝尽了国破家亡的痛苦，词风也从以前的清新婉丽，变得深沉悲凉。'寻寻觅觅，冷冷清清，凄凄惨惨戚戚。'这十四个字，写尽了她晚年的孤寂。","虽然生活很苦，但李清照没有放弃写作和研究。她把赵明诚生前写的《金石录》整理完成，还写了《金石录后序》，记录了他们夫妻的收藏经历和遭遇，读来让人心酸不已。","李清照被称为'婉约派宗主'，也被称为'千古第一才女'。她的词既有女性的细腻，又有男子的豪气。'生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。'这样豪迈的诗句，谁能想到是出自一位弱女子之手呢？"],"huangxiang_wenxi":["东汉时期，有个叫黄香的孩子，他九岁的时候妈妈就去世了，和爸爸相依为命。黄香是个特别懂事的孩子，他知道爸爸又当爹又当妈，辛辛苦苦把自己养大，心里特别感激。","夏天的时候，天气特别炎热，屋子里像个大蒸笼。黄香担心爸爸热得睡不着觉，每天晚上都拿着蒲扇，在爸爸的床边使劲扇风，把枕头和席子都扇得凉凉的，还把蚊子都赶跑，然后才请爸爸去睡觉。","到了冬天，天寒地冻的，被窝里冷得像冰窖。小黄香可心疼爸爸了，他想：爸爸忙了一天，晚上再睡凉被窝，多难受啊！于是他想出了一个好办法。","每天晚上，黄香都先钻进爸爸的被窝里，用自己小小的身体把冰冷的被子捂得暖暖的。等被窝暖和了，他才爬出来，把爸爸扶到床上睡觉。爸爸感动得直掉眼泪，摸着黄香冻红的小脸蛋说：'我的好孩子，你真是爸爸的小棉袄啊！'","黄香不仅孝顺，还特别爱学习。他白天帮爸爸干活，晚上就点着油灯刻苦读书。他读了很多书，学问越来越大，后来成了一个很有学问的人，还当了大官呢。","黄香温席的故事传开了，大家都夸他是个孝顺的好孩子。当时的太守还特别表彰他，说他是'天下无双，江夏黄香'。后来这个故事被收录在《二十四孝》里，流传了几千年。","小朋友们，黄香九岁就知道孝敬父母，用自己的方式表达对爸爸的爱。我们也要向黄香学习，帮爸爸妈妈做力所能及的事，做一个孝顺懂事的好孩子。"],"yiling_zhan":["三国时期，蜀汉的大将关羽被东吴害死了。刘备知道后，气得不得了，他发誓要为关羽报仇。诸葛亮和赵云都劝他不要冲动，说当前的大敌是曹魏，不是东吴。可是刘备根本听不进去。","刘备亲自率领七十万大军，浩浩荡荡向东吴杀去。一路上势如破竹，很快就打到了夷陵（现在的湖北宜昌一带）。东吴的孙权吓得赶紧派人来讲和，愿意把荆州还给刘备，可是刘备还是不答应。","这时候，东吴出了一个年轻的将军叫陆逊。孙权任命陆逊为大都督，带领五万人马去抵挡刘备。陆逊虽然年轻，但是很有谋略。他仔细分析了形势，决定先坚守不出，等蜀军疲惫了再出击。","刘备的军队从春天一直打到夏天，士兵们又热又累，士气越来越低落。刘备为了让士兵们凉快些，就命令大军在树林里扎营，营寨一个接一个，连起来有七百多里长，就像一条长长的蛇。","陆逊观察到这个情况，高兴地说：'打败刘备的机会来了！'他制定了一个火攻的计划。在一个刮着大风的夜晚，陆逊命令士兵们每人拿着一把茅草，偷偷摸到蜀军营寨边，同时放火。","火借风势，风助火威，蜀军的营寨一下子就变成了一片火海。士兵们惊慌失措，四散逃跑，被烧死的、踩死的、被东吴兵杀死的，数都数不清。刘备在将士们的保护下，好不容易才逃了出来。","这一战，刘备的七十万大军几乎全军覆没，损失惨重。刘备又气又悔，病倒在白帝城。他后悔没有听诸葛亮的劝告，结果落得这么惨的下场。","夷陵之战是三国时期著名的战役，陆逊火烧连营的计策也成为了军事史上的经典。这个故事告诉我们，千万不能在气头上做决定，冷静和理智比什么都重要。"],"anshi_zhiluan":["唐朝的时候，有个皇帝叫唐玄宗。他年轻的时候特别能干，把国家治理得井井有条，出现了'开元盛世'的繁荣景象。可是到了晚年，唐玄宗渐渐骄傲起来，整天只顾着享乐，不理朝政。","当时有个叫安禄山的节度使，他是个大胖子，肚子特别大，看起来傻乎乎的，其实可狡猾了。他特别会拍马屁，每次见到唐玄宗都装得很忠诚的样子。唐玄宗越来越信任他，让他掌管了三个藩镇的兵权。","安禄山见唐玄宗昏庸无能，朝廷内部又有矛盾，就暗暗起了坏心思。他偷偷招兵买马，积蓄力量，准备造反。有一些大臣提醒唐玄宗要提防安禄山，可是唐玄宗根本不相信，还说：'安禄山对我忠心耿耿，怎么会造反呢？'","公元755年，安禄山果然以'讨伐奸臣'为借口，在范阳起兵造反了。十五万叛军一路南下，很快就攻下了洛阳和长安。唐玄宗吓得带着杨贵妃和大臣们仓皇逃跑，一直逃到四川才停下来。","半路上，士兵们又饿又气，都把罪过算在杨贵妃和她哥哥杨国忠头上。他们逼着唐玄宗处死了杨贵妃，不然就不肯再往前走。唐玄宗没办法，只好含泪让杨贵妃自缢了。这就是著名的'马嵬坡之变'。","后来，安禄山被他的儿子安庆绪杀死了，安庆绪又被另一个叛将史思明杀死了，史思明又被他儿子史朝义杀死了。叛军内部互相残杀，力量越来越弱。唐朝大将郭子仪、李光弼等人终于把叛乱平定了。","这场持续了八年的叛乱，历史上叫'安史之乱'。经过这场战乱，唐朝的人口减少了很多，经济遭到了严重破坏，曾经辉煌的大唐王朝从此由盛转衰，再也恢复不到以前的繁华了。","安史之乱给我们留下了深刻的教训：一个人如果骄傲自满、贪图享乐，就会看不清真相；一个国家如果放松警惕、任用奸臣，就会面临危险。我们要时刻保持清醒的头脑。"],"xinqiji":["辛弃疾是南宋时期著名的词人，也是一位了不起的抗金英雄。他出生在山东济南，那时候北方已经被金兵占领了。辛弃疾从小就听爷爷讲宋朝的故事，心里埋下了一颗爱国的种子，发誓要把金兵赶出去。","辛弃疾二十一岁那年，聚集了两千多人，参加了一支抗金起义军。他在起义军中表现得特别勇敢，有一次，他只带了五十个骑兵，就冲进了五万人的敌营，活捉了叛徒，还全身而退。大家都夸他是'飞虎将军'。","后来，辛弃疾来到了南方，投奔南宋朝廷。他一心想着北伐中原，收复失地，给皇帝上了很多奏章，提出了很多抗金的好办法。可是南宋的大官们都不想打仗，只想着偏安一隅，所以辛弃疾一直没有得到重用。","虽然没能实现北伐的理想，辛弃疾从来没有放弃过。他把满腔的爱国热情都写进了词里。他的词写得特别豪迈，充满了英雄气概，比如'醉里挑灯看剑，梦回吹角连营'，读起来让人热血沸腾。","辛弃疾不仅会打仗、会写词，当地方官也很能干。他在湖南当安抚使的时候，创建了一支'飞虎军'，纪律严明，战斗力特别强，金兵都很害怕。他还修建了很多水利工程，为老百姓做了不少好事。","辛弃疾和苏轼都是豪放派词人的代表，人们把他们合称为'苏辛'。辛弃疾一生写了六百多首词，有'词中之龙'的美称。他的词既有'金戈铁马，气吞万里如虎'的豪迈，也有'蓦然回首，那人却在灯火阑珊处'的柔情。","辛弃疾六十八岁那年，朝廷终于决定北伐，派人来请他出山。可是辛弃疾已经病重卧床不起了。他在临终前，还大喊着'杀贼！杀贼！'，心里始终想着收复中原的大业。","辛弃疾的一生，是爱国的一生。他虽然没能实现自己的理想，但是他的诗词和精神永远流传了下来。小朋友们，我们也要像辛弃疾一样，从小树立远大的理想，热爱自己的祖国。"],"linzexu":["林则徐是清朝时期著名的大臣，也是我国近代史上伟大的民族英雄。他出生在福建福州一个贫苦的教书先生家里，从小就刻苦读书，立志要做一个对国家有用的人。","林则徐当官以后，特别清正廉洁，为老百姓做了很多好事。他在江苏做官的时候，遇到了大水灾，他不顾个人安危，亲自到灾区指挥救灾，还打开官仓放粮，救活了很多灾民。老百姓都亲切地叫他'林青天'。","那时候，英国商人偷偷把鸦片运到中国来卖。鸦片是一种很可怕的毒品，人一旦吸上就会上瘾，身体会越来越差，最后变得骨瘦如柴，什么活都干不了。很多中国人因为吸食鸦片，倾家荡产，家破人亡。","林则徐看到这种情况，心里特别着急。他给皇帝上书说：'如果再不禁烟，再过几十年，中国就没有能打仗的士兵了，也没有银子了。'皇帝听了也很害怕，就派林则徐去广州禁烟。","林则徐到了广州以后，态度特别坚决。他命令外国商人必须把所有鸦片都交出来，还郑重地说：'只要鸦片一天没禁绝，我就一天不回去！'外国商人一开始还想耍赖，后来见林则徐态度坚决，只好乖乖地交出了鸦片。","1839年6月3日，林则徐在虎门海滩当众销毁收缴来的鸦片。他让人挖了两个大池子，里面放满海水和生石灰，把鸦片倒进去，不一会儿就冒起了滚滚浓烟。销烟一共持续了二十三天，销毁了两百多万斤鸦片。","虎门销烟的消息传开后，老百姓们都拍手称快，大家的爱国热情也被激发起来了。这是中国人民禁烟斗争的伟大胜利，显示了中华民族反抗外来侵略的坚强意志。林则徐也因此成为了受人尊敬的民族英雄。","小朋友们，林则徐虎门销烟的故事告诉我们，面对危害国家和人民的坏事，要勇敢地站出来斗争。我们要学习林则徐的爱国精神和坚定意志，做一个有骨气、有担当的中国人。"],"kongchengji":["三国时期，诸葛亮派马谡去守街亭，可是马谡骄傲自大，不听劝告，把营寨扎在了山上。司马懿趁机带兵打了过来，街亭失守了。诸葛亮听到消息，拍着大腿说：大事不好了！","这时候，诸葛亮身边没有多少兵，大部分都是文官。司马懿带着十五万大军，眼看就要打到西城了。文官们吓得脸色发白，有的说要投降，有的说要收拾东西逃跑。","诸葛亮却不慌不忙。他下令：把所有的旗帜都藏起来，士兵们都不许说话，不许随便走动。然后，他让人把四个城门都打开，每个门口派二十个士兵扮成老百姓，安安静静地扫地。","诸葛亮自己呢？他披上鹤氅，戴上纶巾，带着两个小书童，搬了一张琴，坐在城楼上焚香弹琴。那琴声悠扬婉转，一点都听不出慌乱，就像在自己家里开音乐会一样。","司马懿的大军来到城下，一看这情景，都愣住了。城门大开着，诸葛亮在城楼上悠闲地弹琴，几个老百姓在门口慢悠悠地扫地，连个守门的士兵都没有。这也太奇怪了吧？","司马懿心里想：诸葛亮一生谨慎，从来不做冒险的事。今天他打开城门，这么镇定，里面一定有埋伏！如果我们冲进去，不就上当了吗？不行，绝对不能进去！","于是，司马懿下令：全军撤退！十五万大军哗啦啦地撤走了。诸葛亮看着魏军远去的背影，哈哈大笑起来。旁边的人都惊呆了，竖起大拇指说：丞相，您真是太神了！","小道理：小朋友们，空城计的故事告诉我们，遇到危险的时候不要慌张，要冷静思考想办法。有时候，智慧和勇气比千军万马还要厉害！但也要记住，这只是个特别的计谋，平时可不能随便骗人哦！"],"xuanwumen":["唐朝初年，唐高祖李渊有三个儿子：太子李建成、秦王李世民和齐王李元吉。三个人里面，李世民最能干，他带兵打了很多胜仗，立下了赫赫战功，老百姓都很喜欢他。","太子李建成心里很嫉妒李世民。他想：我是太子，可是功劳和威望都比不上二弟，将来父皇百年之后，我这个皇帝能坐稳吗？于是他和三弟李元吉联合起来，处处排挤李世民。","有一次，李建成请李世民喝酒，居然在酒里下了毒。李世民喝了之后肚子疼得厉害，吐了好多血，差点就死了。还有一次，李元吉想趁乱杀死李世民，幸好被人拦住了。","李世民的手下都很生气，纷纷劝他：太子和齐王心太狠了，您要是再不动手，早晚被他们害死！长孙无忌和尉迟恭都说：大王，您快下决心吧，我们都跟着您干！","李世民叹了口气说：都是亲兄弟，我怎么下得了手呢？可是手下们说：大王，您不忍心害他们，他们可忍心害您啊！您要是再犹豫，我们都要跑了！李世民终于下定了决心。","公元626年的一天，李世民在玄武门设下了埋伏。李建成和李元吉骑马进宫，走到临湖殿的时候，感觉气氛不对，转身就想跑。李世民大喊一声：站住！一箭就射死了李建成。","尉迟恭也冲了上去，一刀杀死了李元吉。这就是历史上有名的玄武门之变。后来，唐高祖李渊把皇位传给了李世民，李世民就是大名鼎鼎的唐太宗。","小道理：小朋友们，玄武门之变是一个很复杂的历史故事。它告诉我们，权力有时候会让人变得很可怕。但更重要的是，唐太宗当上皇帝后，勤政爱民，开创了贞观之治，让老百姓过上了好日子。所以判断一个人，不仅要看他做过什么，还要看他为大家带来了什么。"],"beijiu_shibingquan":["北宋初年，赵匡胤通过陈桥兵变当上了皇帝，就是宋太祖。可是他当上皇帝之后，心里总是不踏实。他想：我是被手下的大将们黄袍加身才当上皇帝的，万一哪天他们的手下也这么干，我的皇位不就保不住了吗？","有一天，赵匡胤问宰相赵普：自从唐朝末年以来，几十年间换了那么多皇帝，战争从来没停过，老百姓苦不堪言。这到底是为什么呀？我想让天下长治久安，有什么好办法吗？","赵普回答说：陛下，问题的关键就在于藩镇权力太大，君弱臣强。只要把他们的兵权收回来，天下自然就太平了。赵匡胤听了，连连点头：你说得对，我明白该怎么做了。","过了几天，赵匡胤在宫里设宴，请石守信、王审琦等几位老将军喝酒。大家都是跟着赵匡胤一起打天下的好兄弟，喝着喝着，气氛非常热闹，你一言我一语，聊得可开心了。","喝到兴头上，赵匡胤突然叹了口气，皱起了眉头。大家都很奇怪：陛下今天怎么不高兴了？赵匡胤说：唉，要是没有你们，我也当不上皇帝。可是当皇帝也太难了，我整夜整夜睡不着觉啊！","石守信等人连忙问：陛下，这是为什么呀？赵匡胤说：这还不明白吗？皇帝这个位置，谁不想坐啊？大家一听，吓得赶紧跪下：陛下，天命已定，谁还敢有二心呢？","赵匡胤说：你们当然不会有二心，可是万一你们的手下贪图富贵，把黄袍加在你们身上，你们就算不想当皇帝，也身不由己了呀！大家一听，都吓哭了，求陛下给他们指条明路。","赵匡胤说：人生苦短，不如多攒点钱，买些好房子好地，快快乐乐过一辈子。你们把兵权交出来，我保你们荣华富贵，咱们君臣之间也不用互相猜疑了。第二天，将军们都主动交出了兵权。这就是杯酒释兵权的故事。"],"kangxi":["康熙皇帝名叫爱新觉罗·玄烨，他是清朝的第四位皇帝，也是中国历史上在位时间最长的皇帝，一共当了六十一年皇帝。康熙小的时候特别聪明好学，而且很勇敢。","康熙八岁就当上了皇帝。那时候他还是个小孩子，国家大事由四个辅政大臣帮忙处理。其中有个叫鳌拜的大臣，权力特别大，经常欺负小皇帝，不把康熙放在眼里。","康熙心里很生气，但他知道自己还小，硬拼是不行的。于是他表面上装作贪玩，天天和一群小侍卫在一起摔跤玩耍，暗地里却在训练这些侍卫，准备对付鳌拜。","康熙十六岁那年，机会终于来了。他把鳌拜召进宫，一声令下，那群练了好久摔跤的小侍卫们一拥而上，七手八脚就把鳌拜给抓住了。就这样，小康熙智擒了鳌拜，亲自掌握了大权。","康熙皇帝特别能干。他平定了三藩之乱，统一了台湾，还打退了沙俄的侵略，签订了《尼布楚条约》。他还多次到边疆巡视，巩固了我们国家的统一，真是个了不起的皇帝。","康熙不仅会打仗，还特别重视文化和农业。他组织人编了《康熙字典》，还亲自学习数学、天文、医学等知识。他关心老百姓的生活，多次减免赋税，让大家过上了好日子。","康熙皇帝一生勤政爱民，每天天不亮就起床处理政务，从来都不偷懒。他开创了康乾盛世，让清朝成为当时世界上最强大的国家之一。大家都尊称他为康熙大帝。","小道理：小朋友们，康熙皇帝八岁登基，十六岁就智擒鳌拜，靠的是智慧和勇气。他一辈子都在努力学习、努力工作，为国家和人民做了很多好事。我们也要像康熙一样，从小努力学习，长大了做一个对社会有用的人！"],"direnjie":["狄仁杰是唐朝武则天时期的一位大官，他特别聪明，断案如神，被人们称为狄青天。你知道吗？他一年就处理了一万七千多件案子，而且没有一个人喊冤，真是太厉害了！","狄仁杰小时候就特别爱读书，而且遇到事情喜欢动脑筋。有一次，他家的门人被人害死了，县吏来查案，大家都争先恐后地为自己辩解，只有狄仁杰一声不吭地坐在那里继续读书。","县吏很生气，就质问狄仁杰：你这孩子怎么回事？大人问话你都不回答吗？狄仁杰抬起头，不慌不忙地说：我正在和书中的圣贤对话呢，哪有时间理你们这些普通的官吏呀？县吏听了，又惊讶又佩服。","狄仁杰当官以后，特别正直，从来不怕得罪权贵。有一次，武卫大将军权善才不小心砍了昭陵的一棵柏树。昭陵是唐太宗的陵墓，唐高宗知道后特别生气，下令要杀掉权善才。","狄仁杰站出来说：陛下，法律上规定砍陵树的罪不至死。如果您因为一棵树就杀一个将军，后人会怎么说您呢？唐高宗听了，觉得很有道理，就免了权善才的死罪。","武则天当皇帝的时候，狄仁杰被人诬告谋反，关进了大牢。审讯的时候，狄仁杰居然马上承认了：没错，我就是要谋反！判官听了很高兴，就放松了警惕。","狄仁杰偷偷把自己的冤情写在一块布上，塞进棉衣里，让人送回家。他儿子看到了，就去告诉武则天。武则天亲自审问，才知道狄仁杰是冤枉的，就把他放了。","武则天很欣赏狄仁杰的才干，封他做了宰相。狄仁杰也没有辜负武则天的信任，他推荐了很多有本事的人，这些人后来都成了唐朝的栋梁之才。小道理：小朋友们，狄仁杰的故事告诉我们，遇到事情要冷静思考，用智慧解决问题。同时，做人要正直勇敢，敢于坚持真理，不害怕权势。只有这样，才能成为一个受人尊敬的人！"],"chibi_zhan":["三国时期，曹操率领八十万大军南下，想一举消灭孙权和刘备。孙权的手下大多害怕极了，纷纷劝说孙权投降。只有周瑜和鲁肃坚持要打，他们说：曹军虽然人多，但都是北方人，不擅长水战，而且长途跋涉肯定很累。","孙权听了他们的话，决定和刘备联合起来对抗曹操。周瑜派黄盖老将想了一个好主意——用火攻！可是冬天只有西北风，没有东南风，怎么放火呢？诸葛亮说：我有办法！他搭起一座七星坛，装作要借东风。","其实诸葛亮上知天文下知地理，他算准了这几天会刮东南风。果然，到了交战那天，真的刮起了大大的东南风！黄盖带着十艘装满干草的大船，船上浇上油，假装投降曹操。","曹操的士兵们都跑出来看，以为黄盖真的来投降了，一点防备都没有。黄盖的船离曹军越来越近，突然！十艘大船同时点着了火！火船像箭一样冲向曹军的大船。","曹军的大船都用铁链连在一起，一烧就是一大片！火借风势，风助火威，整个江面都成了一片火海。士兵们哭爹喊娘，有的被烧死，有的掉进水里淹死，死伤不计其数。","曹操看到大势已去，只好带着残兵败将逃跑。周瑜和刘备的军队乘胜追击，把曹操打得落花流水。这就是历史上有名的赤壁之战，孙刘联军只用了几万人，就打败了曹操的八十万大军。","赤壁之战告诉我们：团结起来力量大，有时候智慧比蛮力更重要。只要动脑筋想办法，弱小的一方也能战胜强大的敌人！"],"yizi_qianjin":["战国时候，有一个叫吕不韦的大商人。他做生意很有钱，还帮助秦国的王子当上了国王，也就是秦庄襄王。秦庄襄王很感激吕不韦，封他做了丞相，还给他很多很多的赏赐。","可是那些贵族大臣们心里不服气，他们私下议论纷纷：吕不韦算什么呀？一个做生意的，也配当丞相？还有人说他没读过什么书，肯定没什么本事。吕不韦听了这些话，心里很不舒服。","吕不韦想：我得做出点成绩让大家看看。他召集了好多好多有学问的人，养了三千多门客。这些人来自四面八方，各有各的本事。吕不韦让他们把自己知道的事情都写下来。","大家你写一篇，我写一篇，有的写历史，有的写地理，有的写打仗，有的写做人的道理。写了好多年，终于编成了一本厚厚的书，名叫《吕氏春秋》。全书一共有二十多万字呢！","吕不韦把这本书挂在咸阳城的城门上，旁边还挂着一千两黄金。他对大家说：谁要是能在这本书里增加一个字，或者删掉一个字，让这本书变得更好，我就把这一千两黄金赏给他！","消息传开了，人们从四面八方赶来看书。可是大家看了又看，读了又读，没有一个人能找出一个字来修改。因为这本书写得实在太好了！吕不韦的名气也越来越大，再也没有人敢小看他了。","一字千金的故事告诉我们：说话算数、信守承诺的人，才能得到别人的尊重。同时，只有真正有本事的人，才能经得起别人的考验！"],"bantu_erfei":["东汉时候，有一个叫乐羊子的人。他娶了一位非常贤惠又聪明的妻子。乐羊子觉得自己学问不够，就告别了妻子，出门去拜师求学。妻子送他到门口，说：你要好好读书，不要惦记家里。","可是乐羊子在外面读书读了才一年，就想家了。他收拾好行李，偷偷地跑回了家。妻子正在织布，看见丈夫回来了，先是吃了一惊，然后问：你怎么这么快就回来了？学业完成了吗？","乐羊子挠挠头，不好意思地说：也没什么事，就是离家太久了，想你了，所以回来看看。妻子听了，拿起一把剪刀，走到织布机前，咔嚓一下，把快要织好的布剪断了。","乐羊子吓了一大跳，赶紧拦住妻子：你这是干什么呀？多可惜啊！这布眼看就要织好了！妻子说：这布是我一根丝一根丝织起来的，一根丝虽然细，但一根一根积累起来，就能变成一匹布。现在我把它剪断了，以前的功夫就全都白费了。","妻子接着说：读书也是一样的道理啊！你每天学一点知识，日积月累，就能成为有学问的人。可是你现在半途就回来了，就像我剪断这匹布一样，以前的努力不就白费了吗？","乐羊子听了妻子的话，惭愧地低下了头。他说：妻子你说得对，我错了！我不应该半途而废。说完，他马上收拾好行李，又出门继续读书去了。这一去，就是七年。","七年以后，乐羊子终于学成归来，成了一个很有学问的人。大家都夸奖他，也夸奖他有一个好妻子。半途而废的故事告诉我们：做任何事情都要有始有终，坚持到底才能成功，千万不能做到一半就放弃呀！"],"zhuangzi":["战国时期，宋国有一个叫庄子的人。他的名字叫庄周，是道家学派的代表人物。庄子特别聪明，也特别有个性。他不喜欢做官，只喜欢自由自在地思考和写作。","有一次，楚国的国王听说庄子很有本事，就派了两个大夫带着厚礼去请他来当相国。庄子正在河边钓鱼，头也不回地说：我听说楚国有一只神龟，死了已经三千年了，国王把它的骨头包得好好的供在庙里。你们说，这只乌龟是愿意死了被供起来，还是愿意活着在泥水里打滚呢？","两个大夫说：当然是愿意活着在泥水里打滚啦！庄子笑着说：那你们回去吧，我也愿意在泥水里打滚，自由自在的，不想被当官困住。庄子就是这样一个不追求名利的人。","庄子还特别会讲故事。他写了一本叫《庄子》的书，里面有好多好多有趣的寓言故事。比如《逍遥游》里的大鹏鸟，翅膀展开有几千里那么大，一飞就能飞到九万里的高空。还有《庖丁解牛》的故事，告诉我们做事情要掌握规律。","有一天，庄子的妻子去世了。他的朋友惠子去吊丧，却看见庄子坐在地上，敲着盆子唱歌。惠子很生气：你不哭也就算了，怎么还唱歌？太过分了！庄子说：不是的，我刚开始也很伤心。可是我想想，人本来就没有生命，也没有形体，是从无到有来的。现在她又回到了自然中，就像春夏秋冬四季轮回一样。她安安静静地睡在天地之间，我要是哇哇大哭，不是太不懂道理了吗？","庄子的思想特别有意思。他说：道在屎溺，意思是说道无处不在，连屎尿里都有道。他还说：子非鱼，安知鱼之乐？你不是鱼，怎么知道鱼快不快乐呢？这些话都充满了智慧。","庄子虽然生活在两千多年前，但他的思想直到今天还在影响着我们。他告诉我们：不要被金钱和地位困住，要保持一颗自由的心，乐观豁达地面对生活。只有内心自由的人，才能真正地快乐！"],"hanxin":["秦朝末年，有一个叫韩信的年轻人。他从小父母双亡，家里特别穷，连饭都吃不上。他只好去别人家蹭饭吃，大家都很讨厌他。有个漂洗棉絮的老婆婆看他可怜，就经常把自己的饭分给他吃。韩信很感动，说：我以后一定会好好报答您的！","韩信虽然穷，但他胸怀大志。他每天都带着一把剑，梦想着有一天能成就一番大事业。有一天，韩信走在街上，突然被一个年轻的屠夫拦住了。屠夫挑衅说：韩信，你虽然长得人高马大，还带着剑，其实你胆子小得很！有本事你就刺我一剑，没本事你就从我裤裆底下钻过去！","韩信看了看那个屠夫，心里想：我要是杀了他，我也得偿命，那我的理想就没法实现了。为了这点小事死了，不值得。于是，他真的趴在地上，从屠夫的裤裆底下钻了过去。街上的人都哈哈大笑，说韩信是个胆小鬼。这就是胯下之辱的故事。","后来，韩信投奔了项羽的军队，可是项羽不重用他。他又去投奔刘邦，刚开始刘邦也不把他当回事。韩信很失望，就偷偷地跑了。萧何知道韩信是个难得的人才，听说他跑了，赶紧骑上马去追，追了两天两夜才把韩信追回来。这就是萧何月下追韩信的故事。","萧何对刘邦说：韩信是国士无双的大人才，你要是想争夺天下，就一定要重用他！刘邦听了萧何的话，专门选了一个好日子，搭了个高高的台子，拜韩信为大将军。全军上下都大吃一惊，谁也没想到这个默默无闻的年轻人居然能当大将军。","韩信当上大将军后，果然厉害极了。他明修栈道，暗度陈仓，帮刘邦打出了关中；他背水一战，用一万人打败了二十万赵军；他还设下十面埋伏，最后逼得项羽在乌江自刎。韩信打仗特别厉害，几乎百战百胜，人们都叫他兵仙。","可惜的是，韩信后来因为功劳太大，被刘邦的妻子吕后害死了。临死前，韩信感叹说：我真后悔当初没有听蒯通的话，现在居然死在一个女人手里，真是天意啊！","韩信的一生充满了传奇。他受过胯下之辱，也拜过大将军；他打过无数胜仗，最后却死得很惨。他的故事告诉我们：能屈能伸才是真正的勇敢，有真本事的人不怕暂时的委屈。但同时也要记住，功高震主的时候，要学会低调和自保！"],"lebusishu":["三国时期，蜀国的刘备去世后，他的儿子刘禅当上了皇帝。刘禅小名叫阿斗，是个不太聪明的皇帝。他整天吃喝玩乐，根本不关心国家大事。幸好有诸葛亮这样的大臣辅佐，蜀国才勉强维持着。","后来，诸葛亮去世了，魏国的军队打了过来。刘禅吓得赶紧投降，带着文武百官搬到了洛阳居住。魏国的皇帝司马昭封他为安乐公，给了他大房子、好多钱，还有一百多个仆人伺候着。","有一天，司马昭请刘禅吃饭。宴会上，司马昭故意安排表演蜀国的歌舞。旁边的蜀国旧臣们看了，想起自己的国家灭亡了，都难过地掉下了眼泪。可是刘禅呢？他看得津津有味，还拍着手叫好，一点都不难过。","司马昭看了，心里暗暗好笑。他问刘禅：'你在这里住得习惯吗？想不想念蜀国呀？'刘禅乐呵呵地说：'这里有吃有喝，还有歌舞看，我快乐极了，才不想蜀国呢！'（原文：此间乐，不思蜀）","过了一会儿，刘禅起身去上厕所。他的旧臣卻正赶紧跟了出去，对他说：'陛下，等会儿司马昭再问您想不想蜀国，您就哭着说：我祖先的坟墓都在蜀国，我天天都在想念。这样他说不定会放我们回去。'","刘禅点点头，记住了卻正的话。他回到座位上，司马昭果然又问了同样的问题。刘禅就照着卻正教他的话说了一遍，还闭上眼睛，装出要哭的样子。司马昭听了，笑着说：'这话怎么听起来像是卻正说的呀？'","刘禅一听，惊讶地睁开眼睛，说：'对对对！就是他教我的！你怎么知道的？'旁边的人听了，都忍不住笑了起来。司马昭也哈哈大笑，从此再也不防备刘禅了。","小道理：小朋友们，这个故事告诉我们，做人不能忘本，要记得自己的家乡和根。同时，我们也要努力学习，不能像刘禅一样，只知道吃喝玩乐，把国家都给丢了。"],"saiwengshima":["很久以前，在边塞的山脚下，住着一位老爷爷，大家都叫他塞翁。塞翁养了好多匹马，他每天都骑着马去放羊，日子过得逍遥自在。塞翁是个很有智慧的老人，看待事情总是和别人不一样。","有一天，塞翁的一匹马跑丢了。邻居们听说了，都来安慰他：'老人家，别太伤心了，丢了一匹马不算什么。'可是塞翁却笑着说：'丢了马怎么就一定是坏事呢？说不定还是好事呢！'","邻居们听了，都觉得这个老头真奇怪，马丢了明明是坏事，怎么还说是好事呢？他们摇摇头，都走了。没想到过了几个月，那匹跑丢的马居然自己回来了，还带回来了一群野马！数一数，足足有十几匹呢！","邻居们听说了，又都来祝贺塞翁：'哎呀，老人家您真是有福气！丢了一匹马，带回来一群马，真是太好了！'可是塞翁却皱着眉头说：'白得了这么多马，怎么就一定是好事呢？说不定还是坏事呢！'","邻居们听了，又觉得这个老头真奇怪，得了这么多马，明明是天大的好事，怎么还说是坏事呢？可是没过多久，塞翁的儿子因为骑野马，不小心从马上摔了下来，把腿给摔断了，成了瘸子。","邻居们听说了，又都来安慰塞翁：'唉，真是太不幸了，好端端的一个小伙子，腿摔断了，以后可怎么办呀？'可是塞翁又说：'腿摔断了怎么就一定是坏事呢？说不定还是好事呢！'","邻居们听了，都觉得这个老头疯了，儿子腿都断了，还说是好事。一年后，边境发生了战争，所有年轻力壮的小伙子都被抓去当兵了，大部分都死在了战场上。只有塞翁的儿子，因为腿瘸了，不用去当兵，保住了性命。","小道理：小朋友们，这个故事告诉我们，遇到坏事的时候不要太难过，遇到好事的时候也不要太得意。因为好事和坏事是可以互相转化的。我们要用平常心去看待生活中的每一件事。"],"beigongsheying":["晋朝的时候，有个叫乐广的人，他特别喜欢交朋友，经常请朋友到家里来喝酒聊天。乐广家的客厅里挂着一张弓，弓上画着五颜六色的花纹，远远看去，就像一条蛇盘在那里。","有一天，乐广又请了一位好朋友来家里喝酒。两人边喝边聊，聊得可开心了。可是喝着喝着，那位朋友突然脸色发白，皱起了眉头，好像很难受的样子。乐广赶紧问：'你怎么了？不舒服吗？'","朋友支支吾吾地说：'没...没什么...'其实啊，这位朋友刚才喝酒的时候，低头一看，发现酒杯里居然有一条小蛇！可是他不好意思说，硬着头皮把酒喝了下去。现在越想越害怕，觉得那条小蛇在肚子里游来游去。","回到家以后，这位朋友越想越害怕，觉得肚子里真的有一条蛇。他吃不下饭，睡不着觉，没过几天就病倒了，而且病得越来越重。家里人请了好多医生来看，都查不出是什么病。","乐广听说朋友病了，赶紧去看望他。问了半天，朋友才说出实情：'上次在你家喝酒，我看到酒杯里有一条小蛇，我把酒喝下去了，现在那条蛇在我肚子里，我快要死了！'说完，朋友就呜呜地哭了起来。","乐广听了，觉得很奇怪：酒杯里怎么会有蛇呢？他回到家，坐在上次喝酒的地方，倒了一杯酒，低头一看——呀！酒杯里真的有一条小蛇！乐广抬头一看，墙上挂着那张弓，顿时明白了。","原来啊，酒杯里根本不是什么蛇，而是墙上那张弓的影子，倒映在酒杯里，看起来就像一条小蛇！乐广赶紧跑到朋友家，把事情的真相告诉了他，还把他请到家里，让他亲眼看看墙上的弓和酒杯里的影子。朋友一看，恍然大悟，病立刻就好了。","小道理：小朋友们，这个故事告诉我们，遇到事情不要慌张，也不要自己吓自己。要多动脑筋想一想，弄清楚事情的真相。很多时候，让我们害怕的不是事情本身，而是我们自己的胡思乱想。"],"chengjisihan":["成吉思汗名叫铁木真，他是蒙古帝国的开创者，被人们称为'一代天骄'。可是你知道吗？铁木真小时候也吃过很多苦，经历过很多磨难。","铁木真出生在一个蒙古部落首领的家里。他的爸爸也速该是部落的首领，英勇善战。可是在铁木真九岁那年，爸爸被敌人毒死了。部落里的人见首领死了，都纷纷离开，还抢走了他们家的牛羊和财物。","铁木真和妈妈、弟弟妹妹们一下子从贵族变成了穷人。他们住在蒙古包里，靠挖野菜、打野兔过日子。有时候，他们甚至连饭都吃不饱。可是妈妈总是对铁木真说：'孩子，你要坚强，你爸爸是英雄，你将来也要像爸爸一样！'","有一次，铁木真被仇人抓住了。仇人给他戴上沉重的枷锁，拉着他到处游行示众。铁木真心里充满了愤怒和屈辱，但是他没有放弃。他趁看守不注意，用枷锁砸晕了看守，成功地逃了出来。","长大以后，铁木真凭着自己的勇敢和智慧，一点点地把散落的部落重新聚集起来。他和兄弟们一起打仗，打败了一个又一个敌人。他对士兵们特别好，打了胜仗总是把战利品分给大家，所以大家都愿意跟着他。","慢慢地，铁木真的部落越来越强大。他统一了蒙古各个部落，建立了蒙古帝国。大家尊称他为'成吉思汗'，意思是'拥有四海的大汗'。成吉思汗还带领军队打到了很远很远的地方，建立了世界上最大的帝国。","成吉思汗虽然是个大英雄，但他也很爱学习。他让人为蒙古人创造了文字，还制定了法律。他常说：'一个人可以没有金银财宝，但不能没有智慧和勇气。'","小道理：小朋友们，成吉思汗小时候经历了那么多苦难，但他没有被困难打倒，反而变得更加坚强。我们也要像他一样，遇到困难不退缩，勇敢地面对挑战，做一个坚强、勇敢的人。"],"qibaishi":["齐白石是中国最著名的国画大师之一。他画的虾栩栩如生，就像活的一样，在纸上游来游去。可是你知道吗？齐白石小时候是个穷孩子，长大以后还当过木匠呢。","齐白石出生在湖南的一个小山村里。家里很穷，他只上了半年学，就因为交不起学费辍学了。小小的齐白石只好去给人家放牛、砍柴，帮家里干活。可是他特别喜欢画画，每天放牛的时候，都要用树枝在地上画画。","十二岁那年，齐白石去学做木匠。他学的是雕花木匠，就是在木头家具上刻花。齐白石学得特别认真，他刻的花比别人都好看。白天干活，晚上就在油灯下练习画画。他把家里的草稿纸画得满满的，一张纸都舍不得扔。","二十七岁那年，齐白石遇到了一位叫胡沁园的老师。胡老师发现齐白石很有画画天赋，就收他为学生，教他画画和写诗。齐白石高兴极了，他学得特别刻苦。因为他是从二十七岁才开始正式学画画的，所以他给自己起了个外号叫'鲁班门下'。","齐白石画画有个特点，就是特别认真。为了画好虾，他在家里养了好多虾，每天都趴在鱼缸旁边，观察虾是怎么游的、怎么跳的、怎么打架的。他看呀看呀，画呀画呀，终于把虾画活了。","齐白石还特别勤奋。他每天早上天不亮就起床画画，一直画到晚上。他说：'不教一日闲过。'意思是说，不能让一天白白地过去。就算到了晚年，他也坚持每天画画，从来都不偷懒。","有一次，齐白石过生日，来了好多客人。他忙着招待客人，一天都没画画。到了晚上，客人都走了，齐白石觉得特别难受。他说：'今天的画还没画呢，不能就这么算了！'于是他拿起画笔，一口气画了四幅画，才去睡觉。","小道理：小朋友们，齐白石爷爷从一个小木匠变成了大画家，靠的就是勤奋和坚持。不管我们学什么，只要认真、努力、坚持，就一定能学好。记住：天才是用勤奋换来的！"],"zhilu":["秦朝的时候，有个叫赵高的人，他是秦二世身边的大红人。赵高心里一直想造反，可又不知道大臣们服不服他，于是想出了一个坏主意。","这天上朝的时候，赵高让人牵来一只鹿，笑着对秦二世说：'陛下，这是我献给您的一匹好马。'秦二世看了看，奇怪地说：'丞相搞错了吧？这明明是一只鹿啊！'","赵高却一本正经地说：'请陛下看清楚，这的确是一匹千里马。'秦二世又看了看那只鹿，将信将疑地说：'马的头上怎么会长角呢？'","赵高转过身，大声问大臣们：'你们说，这是鹿还是马？'大臣们你看看我，我看看你，都害怕赵高的权势。有些人不敢说话，有些人为了讨好赵高，连忙说：'对对对，这是马！'","只有几个正直的大臣，勇敢地说：'这是鹿，不是马！'赵高心里暗暗记住了那些说真话的人，后来就找借口把他们都害了。","从此以后，大臣们都害怕赵高，再也不敢说真话了。秦朝也因为有这样的坏人，很快就灭亡了。","小道理：小朋友们，这个故事告诉我们，要坚持真理，明辨是非，不能因为害怕就跟着说假话。真正勇敢的人，会说真话、做实事。"],"nangying":["晋朝的时候，有两个特别爱读书的孩子，一个叫车胤，一个叫孙康。他们家里都很穷，连灯油都买不起，晚上没法读书。","夏天的晚上，车胤坐在院子里，看着飞来飞去的萤火虫，忽然想出了一个好办法。他捉了好多萤火虫，装在白纱布口袋里。","口袋被萤火虫照得亮闪闪的，就像一盏小灯笼！车胤高兴极了，每天晚上都借着萤火虫的光认真读书。","冬天的时候，孙康也想出了另一个办法。有一天夜里，他从睡梦中醒来，发现窗外特别亮。原来是下了一场大雪，白茫茫的一片。","孙康想：雪光比油灯还亮呢！他立刻拿出书，跑到院子里，就着雪光读起来。天寒地冻，他的手都冻红了，可他一点儿也不觉得冷。","就这样，车胤和孙康都通过刻苦学习，后来都成了很有学问的人。人们用'囊萤映雪'来形容刻苦读书的精神。","小道理：小朋友们，现在我们有明亮的电灯、温暖的教室，更应该珍惜学习的机会。只要有心学习，什么困难都难不倒我们。"],"beishui":["秦朝末年，韩信带领军队去攻打赵国。赵王听说韩信只有几万人马，而赵国有二十万大军，根本不把韩信放在眼里。","韩信让士兵们在河边列阵，背对着河水摆开阵势。赵军见了都哈哈大笑：'韩信不会打仗，背水列阵，那不是找死吗？'","战斗开始了，赵军倾巢而出，想把韩信的军队全部消灭。韩信的士兵们背对着河水，没有退路，只能拼命往前冲。","士兵们心里想：反正退也是死，不如拼了！他们一个个像猛虎下山一样，奋勇杀敌，以一当十。","赵军打了半天，打不赢，想退回营寨，却发现自己的营寨已经被韩信事先派去的两千骑兵占领了！","原来韩信早就偷偷派骑兵趁赵军倾巢出动的时候，冲进赵营，把赵军的旗帜都换成了汉军的旗帜。","赵军一看营寨丢了，顿时乱作一团，纷纷逃跑。韩信乘胜追击，大获全胜。这就是著名的'背水一战'。","小道理：小朋友们，有时候没有退路的时候，反而能激发出我们最大的潜力。遇到困难不要退缩，勇敢面对，说不定能创造奇迹呢！"],"zhangliang":["张良是汉朝初年最聪明的人，被人们称为'谋圣'。他帮助刘邦打败了项羽，建立了汉朝。可是你知道吗？张良年轻时也有一个神奇的故事。","张良年轻的时候，有一天在桥上散步，遇到一个老爷爷。老爷爷故意把鞋扔到桥下，对张良说：'小伙子，下去把鞋给我捡上来！'","张良心里很生气，但看老爷爷年纪大了，还是忍住气，下去把鞋捡了上来。没想到老爷爷又说：'给我穿上！'张良就跪下来，恭恭敬敬地给老爷爷穿上鞋。","老爷爷笑着说：'你这个孩子值得教。五天后早上，你再来这里见我。'五天后，张良天刚亮就去了，可是老爷爷已经在那里了。","老爷爷生气地说：'和老人约会，怎么能迟到？再过五天来！'又过了五天，张良鸡一叫就去了，可老爷爷又先到了，又让他五天后再来。","第三次，张良半夜就去了，等了好一会儿，老爷爷才来。这次老爷爷高兴地说：'这就对了！'他拿出一本书送给张良，说：'读了这本书，你就能做帝王的老师。'","张良日夜研读这本书，后来果然成了一个非常有智慧的人。他为刘邦出了很多好主意，帮助刘邦建立了汉朝。","小道理：小朋友们，尊敬老人、虚心学习的人，才能得到别人的帮助和教导。张良的故事告诉我们，智慧的力量比武力更强大。"],"hailun":["海伦·凯勒出生在美国，她小的时候生了一场重病，病好以后，她再也看不见东西，也听不见了。她生活在一个黑暗又寂静的世界里。","可怜的海伦变得脾气越来越暴躁，她常常摔东西、大喊大叫。爸爸妈妈很担心她，给她请了一位老师，叫安妮·沙利文。","沙利文老师很有耐心，她在海伦的手心里写字母，教她认字。有一天，老师带海伦来到水井边，让冰凉的水流过海伦的手。","老师在海伦的另一只手上写下了'water'（水）这个单词。海伦突然明白了：原来每样东西都有名字！她兴奋极了，那天她学会了很多单词。","海伦每天都努力学习，她用手摸老师的嘴唇，学习说话。她还学会了读书、写字，甚至考上了大学，成了一位了不起的作家和演说家。","海伦走遍了全世界，帮助其他像她一样的残疾人。她写了很多书，鼓励人们勇敢地面对生活。","海伦·凯勒说：'虽然我看不见听不见，但我的世界因为有了爱和希望，变得无比光明。'","小道理：小朋友们，海伦·凯勒在那么困难的情况下都没有放弃，我们遇到的困难又算什么呢？只要不放弃，每个人都能创造属于自己的奇迹。"],"jiminggoudao":["战国时期，齐国有个贵族叫孟尝君。他最喜欢招贤纳士，家里养了三千多个门客。不管你是有大学问的人，还是只会一点小本事的人，只要来投奔他，他都好吃好喝招待着。","有一年，孟尝君带着门客们去秦国访问。秦王很欣赏他的才能，想留他在秦国做宰相。可是秦国的大臣们都嫉妒孟尝君，纷纷在秦王面前说他的坏话。秦王听得多了，就把孟尝君软禁了起来，还想找机会杀掉他。","孟尝君急得像热锅上的蚂蚁。他听说秦王有个最宠爱的妃子，就派人去求她帮忙说情。妃子说：'帮忙可以，但我要孟尝君那件天下无双的白狐皮大衣。'孟尝君一听就犯了难——那件大衣刚到秦国时，已经献给秦王了呀！","这时，一个平时最不起眼的门客站了出来。这个人没什么别的本事，就会学狗叫、偷东西。他说：'大人别急，我有办法！'当天夜里，他偷偷溜进秦王的宫殿，学着狗叫骗过了守卫，把那件白狐皮大衣偷了出来。","妃子拿到大衣，果然在秦王面前替孟尝君说了好多好话。秦王耳根子软，就答应放孟尝君回国。孟尝君生怕秦王反悔，赶紧带着门客们连夜逃跑。他们一路狂奔，跑到函谷关时，天还没亮呢。","按照秦国的规矩，函谷关要等到鸡叫了才会开门。这可怎么办？后面秦王的追兵说不定马上就到了！就在这千钧一发的时刻，又一个门客站了出来。这个人别的不会，就会学鸡叫。只见他伸长脖子'喔喔喔'一叫，附近的公鸡都跟着叫了起来。","守关的士兵听到鸡叫，迷迷糊糊地打开了城门。孟尝君一行人赶紧冲出函谷关，飞快地逃回了齐国。后来秦王果然后悔了，派兵来追，可是已经来不及了。","回到齐国后，大家都对那两个'没本事'的门客刮目相看。以前看不起他们的人，现在都竖起大拇指说：'原来每个人都有自己的用处啊！'从此以后，孟尝君对门客们就更加一视同仁了。"],"anduchencang":["秦朝灭亡后，项羽和刘邦开始争夺天下。项羽势力大，就把刘邦封到了偏僻的汉中当汉王。刘邦心里很不服气，但打不过项羽，只好带着人马去汉中上任。临走的时候，他还故意把连接汉中跟中原的栈道都烧了，意思是'我就待在汉中，不出来跟你抢天下'。","刘邦到了汉中后，得到了一位了不起的大将军——韩信。韩信可厉害了，他帮刘邦训练军队，还偷偷计划着打回中原去。可是要打出去，就得先通过关中地区，而把守关中的是项羽的三个大将，都很厉害。","有一天，韩信派了几百个老弱残兵去修复之前烧掉的栈道。关中的守将章邯听说了，哈哈大笑：'就这么点人，修到猴年马月才能修好啊？刘邦这小子也太没用了！'于是他就放松了警惕。","其实章邯哪里知道，这都是韩信的计策。表面上，韩信派老弱残兵大张旗鼓地修栈道，让敌人以为汉军要从栈道打过来；暗地里，韩信却带着主力部队，悄悄地从另一条小路出发，直奔关中的军事重镇——陈仓。","韩信的部队在山里走了好多天，每个人都小心翼翼，不敢发出一点声音。终于，他们神不知鬼不觉地来到了陈仓城下。这时候，陈仓的守军还在睡觉呢，根本没想到汉军会从天而降。","韩信一声令下，汉军像潮水一样冲向陈仓城。守城的士兵从睡梦中惊醒，慌慌张张地应战，哪里是汉军的对手？很快，陈仓就被韩信打下来了。汉军士气大振，乘胜追击，很快就占领了整个关中地区。","章邯得到消息，大吃一惊：'什么？汉军已经打到陈仓了？他们的栈道不是还没修好吗？'他赶紧带兵去救，可是已经晚了。最后章邯打了败仗，只好自杀了。","这就是历史上有名的'明修栈道，暗度陈仓'的故事。韩信表面上假装要从栈道进攻，实际上却偷偷走小路袭击陈仓，打了敌人一个措手不及。这个故事告诉我们，有时候换个思路，声东击西，就能出奇制胜哦。"],"liangxiufeng":["明朝的时候，有个大名鼎鼎的清官叫于谦。他从小就志向远大，读书非常用功，特别崇拜那些有气节的英雄人物。他写过一句很有名的诗：'粉骨碎身浑不怕，要留清白在人间。'这也是他一生的写照。","于谦长大以后做了大官，可是他一点也不摆官架子，生活非常俭朴。那时候，朝廷里有个大贪官叫王振，他是皇帝身边的红人，掌握着很大的权力。很多官员为了升官发财，都争着给王振送礼、拍马屁。","每次地方官进京办事，都要带上金银财宝和当地的土特产，去孝敬王振和朝中的权贵们。有人甚至说：'不送礼的话，肯定会被王振穿小鞋的！'可是于谦每次进京，什么礼物都不带，两手空空就去了。","有一次，于谦又要进京了。他的下属们都替他担心，纷纷劝他：'大人，您就算不送金银珠宝，也带点土特产吧，比如手帕、蘑菇、线香什么的，也算个意思呀！不然那些权贵们会不高兴的。'","于谦听了，哈哈大笑。他甩了甩自己的两只袖子，风趣地说：'你看，我这两只袖子里，除了清风，什么都没有！谁说我没带东西？我带了两袖清风呀！'下属们听了，都既佩服又担心。","后来，于谦还专门写了一首诗来表明自己的态度：'绢帕蘑菇与线香，本资民用反为殃。清风两袖朝天去，免得闾阎话短长。'意思是说，那些土特产本来是老百姓用的，搜刮来送礼反而害了百姓。我就带着两袖清风去见皇上，免得老百姓说闲话。","王振听说于谦不给他送礼，心里很不爽，就找了个借口把于谦关了起来。可是老百姓听说了，都纷纷为于谦求情。王振一看于谦这么得人心，也不敢随便害他，只好把他放了。","后来，于谦为国家做了很多大事，成了明朝的大功臣。'两袖清风'这个成语也一直流传到今天，用来形容那些为官清廉、不贪不占的好官。小朋友们，我们也要学习于谦这种正直清廉的好品质哦。"],"mengzi":["孟子名叫孟轲，是战国时期邹国人。他是继孔子之后，儒家学派最伟大的思想家，被后人尊称为'亚圣'。可是你知道吗？孟子小时候也是个调皮捣蛋的孩子，要不是有位好妈妈，他可能成不了大学问家呢。","孟子三岁的时候，爸爸就去世了，全靠妈妈一个人抚养他。一开始，他们家住在墓地旁边。小孟子每天看见人家哭哭啼啼地办丧事，觉得挺好玩，就和邻居的小朋友一起学着大人的样子磕头、哭丧。孟妈妈看了，皱着眉头说：'这个地方不适合我们的孩子住。'","于是孟妈妈就搬家了，这次搬到了集市旁边。可是集市里都是做生意的，小孟子又学着商人的样子，一会儿吆喝叫卖，一会儿跟人讨价还价，还学屠夫杀猪的样子。孟妈妈又摇摇头说：'这个地方也不好，我们再搬吧。'","这一次，他们搬到了学校旁边。每天都能听见学生们朗朗的读书声，还能看见老师们彬彬有礼的样子。小孟子也学着学生们的样子，读书、写字、讲礼貌。孟妈妈这才满意地说：'这才是我儿子应该住的地方呀！'这就是著名的'孟母三迁'的故事。","虽然搬到了好环境，可是小孟子还是很贪玩。有一天，孟子上学上到一半就偷偷跑回了家。孟妈妈正在织布，看见儿子逃学，非常生气。她拿起剪刀，'咔嚓'一声就把织布机上的布剪断了。孟子吓坏了，赶紧问妈妈为什么要这样做。","孟妈妈语重心长地说：'你读书就像我织布一样。织布要一根线一根线地织，才能织成一匹完整的布。读书也要一天天积累，才能成为有学问的人。你现在逃学，就像我剪断这匹布一样，前功尽弃了！'孟子听了妈妈的话，惭愧地低下了头。","从那以后，孟子发愤读书，再也不偷懒了。他跟着孔子的孙子子思学习，把孔子的思想学的透透的。长大以后，孟子也像孔子一样，周游列国，宣传自己的思想。他主张'仁政'，告诉国君们要爱护老百姓。","孟子还说过很多有名的话，比如'富贵不能淫，贫贱不能移，威武不能屈'，还有'生于忧患，死于安乐'。他的思想都记录在《孟子》这本书里，直到今天还在影响着我们。孟子用自己的努力，从一个调皮的小男孩，变成了受人尊敬的'亚圣'。"],"antusheng":["在丹麦的一个小城市里，住着一个叫安徒生的小男孩。他的爸爸是个穷鞋匠，妈妈是个洗衣工，家里非常穷。可是小安徒生从小就有一个大大的梦想——他想当一名演员，站在舞台上表演。","安徒生的爸爸虽然穷，但是很爱读书。每天晚上，爸爸都会给小安徒生讲故事，还教他读书认字。有时候，爸爸还会给他做木偶玩具。小安徒生就拿着木偶，自己编故事、演木偶戏，玩得可开心了。","可是不幸的是，在安徒生十一岁那年，爸爸生病去世了。家里的日子更难过了，妈妈只好一个人拼命干活，才能勉强养活他。有人劝妈妈：'让安徒生去当学徒吧，好歹能学门手艺。'可是安徒生不愿意，他的心里还装着那个当演员的梦想。","十四岁那年，安徒生做出了一个大胆的决定——他要去首都哥本哈根闯一闯，去实现自己的演员梦。妈妈哭着说：'孩子，你一个人去那么远的地方，可怎么办呀？'安徒生却坚定地说：'妈妈，我一定会成功的！'","可是到了哥本哈根，安徒生的日子可不好过。他长得又高又瘦，说话还有口音，很多人都看不起他。他去剧院面试，人家说他长得不好看，又不会跳舞，不适合当演员。安徒生没有气馁，他一边打工养活自己，一边学习唱歌和表演。","后来，安徒生得了一场大病，嗓子坏了，唱歌也不行了。当演员的梦想破灭了，他非常难过。但是他没有放弃，他想：'既然不能当演员，那我就写故事吧，让读者在我的故事里看到精彩的表演！'","于是安徒生开始写童话。他把小时候听来的故事，还有自己的想象，都写进了童话里。一开始，没有人愿意发表他的作品，有人甚至嘲笑他：'一个鞋匠的儿子，也想当作家？'可是安徒生不在乎，他还是不停地写呀写。","终于，安徒生的童话被越来越多的人喜欢了。《丑小鸭》《卖火柴的小女孩》《皇帝的新装》《海的女儿》……一个个精彩的故事，打动了全世界的孩子和大人。安徒生从一个穷鞋匠的儿子，变成了大名鼎鼎的'童话大王'。他用自己的经历告诉我们：只要有梦想，并且肯坚持，就一定能实现！"],"gaoshanliushui":["春秋时期，有个叫伯牙的人，他弹琴弹得特别好，是当时最有名的琴师。可是伯牙心里总是有点孤单，因为他觉得没有人能真正听懂他的琴声。","有一天，伯牙乘着小船去游玩，走到半路突然下起了大雨，他就把船停在山边避雨。听着哗啦啦的雨声和哗哗的流水声，伯牙心里特别有感觉，就拿出琴弹了起来。","他先弹了一首描写高山的曲子。琴声雄壮有力，就像巍峨的泰山一样。弹着弹着，忽然听到岸上有人鼓掌：\"好啊！弹得真好！这琴声就像巍峨的泰山一样雄伟！\"","伯牙心里一惊，抬头一看，岸上站着一个打柴的樵夫，叫钟子期。伯牙又弹了一首描写流水的曲子，琴声哗啦啦的，就像奔腾的江河。钟子期又拍手称赞：\"太好了！这琴声就像滔滔的江水一样奔流不息！\"","伯牙高兴极了，他弹什么，钟子期都能听出他心里想的是什么。伯牙心里想着高山，钟子期就说：\"巍巍乎若泰山！\"伯牙心里想着流水，钟子期就说：\"洋洋乎若江河！\"","伯牙激动地说：\"你真是我的知音啊！我弹了一辈子琴，从来没有人能这么懂我！\"两个人越聊越投机，成了最好的朋友。他们约好明年的今天还在这里见面。","可是第二年，钟子期却病死了。伯牙听说后，伤心极了。他来到钟子期的坟前，最后弹了一曲《高山流水》，然后把琴摔碎了，说：\"我的知音已经不在了，我还弹琴给谁听呢？\"从此以后，伯牙再也没有弹过琴。高山流水遇知音的故事告诉我们：人生得一知己足矣，真正的友谊是心灵的相通！"],"yuefasanzhang":["秦朝末年，天下大乱，各路英雄都起来反抗秦朝的暴政。其中有两支最强大的队伍，一支是项羽带领的，另一支是刘邦带领的。他们约定：谁先打进咸阳，谁就当关中王。","刘邦的军队一路势如破竹，很快就打到了咸阳城下。秦朝的最后一个皇帝子婴，穿着白衣服，脖子上系着绳子，捧着皇帝的大印，乖乖地投降了。咸阳城就这样被刘邦拿下了。","进了咸阳城，士兵们都高兴坏了，纷纷跑去皇宫里抢金银财宝。刘邦自己也被皇宫里的宝贝迷住了——那么多珍珠玛瑙，那么多美酒美女，他想干脆就住在这里不走了。","这时候，刘邦的谋士张良和大将樊哙站了出来。樊哙说：\"大王，您是想得天下，还是想当富翁呢？这些奢华的东西，就是秦朝灭亡的原因啊！您可不能学秦朝的样子！\"","刘邦听了，一下子就清醒了。他马上下令：把所有的财宝都封起来，军队撤出咸阳，驻扎在霸上。然后，他把附近的老百姓都召集起来，对他们说：","\"父老乡亲们，秦朝的法律太残酷了，你们受苦了！今天我和大家约法三章：第一，杀人的要偿命；第二，伤人的要受罚；第三，偷东西的要判刑。除了这三条，其他所有秦朝的法律统统废除！你们该怎么过日子就怎么过日子！\"","老百姓听了，都高兴得跳了起来。他们纷纷送来了牛羊酒食，犒劳刘邦的军队。刘邦却推辞说：\"我们仓库里有的是粮食，不能让大家破费。\"就这样，刘邦得到了老百姓的拥护和爱戴。约法三章的故事告诉我们：说到就要做到，讲信用、守规矩的人才能得到大家的信任和支持！"],"guanbaozhijiao":["春秋时期，齐国有两个非常好的朋友，一个叫管仲，一个叫鲍叔牙。管仲家里很穷，还要奉养老母亲，生活特别不容易。鲍叔牙家里很有钱，但他从来不看不起管仲。","两个人一起合伙做生意。因为管仲没钱，所以本钱大部分都是鲍叔牙出的。可是到了年底分红的时候，管仲总是要拿一大半。别人看了都替鲍叔牙抱不平：\"管仲怎么这么贪心啊！出的钱少，拿的钱却多！\"","鲍叔牙却笑着说：\"你们不知道，管仲家里穷，还有老母亲要养，多拿一点是应该的。他不是贪心，是真的需要钱。\"管仲听了，心里特别感动。","后来，两个人一起去当兵打仗。每次冲锋的时候，管仲都躲在最后面；每次撤退的时候，管仲又跑在最前面。大家都笑话管仲是个胆小鬼。鲍叔牙却替管仲说话：\"你们误会他了，他不是胆小，他家里还有老母亲要照顾啊！他要是死了，老母亲怎么办呢？\"","管仲听了，眼泪都流下来了。他叹了口气说：\"生我的人是父母，可是真正懂我的人，是鲍叔牙啊！\"这句话就叫做\"生我者父母，知我者鲍叔也\"。","再后来，齐国发生了内乱，管仲辅佐公子纠，鲍叔牙辅佐公子小白。两个公子争夺王位，最后公子小白赢了，当上了国君，就是齐桓公。齐桓公想让鲍叔牙当丞相，鲍叔牙却推荐了管仲。","齐桓公很惊讶：\"管仲是我的仇人啊！他曾经用箭射过我！\"鲍叔牙说：\"那是各为其主嘛！如果您想称霸天下，就一定要用管仲当丞相！他的才能比我强一百倍！\"齐桓公真的听了鲍叔牙的话，重用了管仲。管仲果然把齐国治理得非常强大，让齐桓公成了春秋时期的第一个霸主。管鲍之交的故事告诉我们：真正的朋友要互相理解、互相信任，这样的友谊才是最珍贵的！"],"kongzi":["春秋时期，鲁国有一个叫孔子的人。他的名字叫孔丘，字仲尼。孔子小的时候家里很穷，三岁的时候父亲就去世了，全靠妈妈一个人把他抚养长大。","孔子从小就特别爱学习。别的小孩子都在玩游戏，小孔子却喜欢摆上小盘子小碗，模仿大人祭祀的样子。他读书特别用功，遇到不懂的问题就一定要问个明白，这叫\"每事问\"。","孔子长大以后，成了一个非常有学问的人。他收了很多学生，开创了儒家学派。孔子教学生特别有耐心，不管学生是有钱人家的孩子还是穷人家的孩子，他都一视同仁，这叫\"有教无类\"。","孔子教学生有很多好方法。他会根据每个学生的特点来进行不同的教育，这叫\"因材施教\"。他还告诉学生：\"三人行，必有我师焉。\"意思是说，几个人一起走路，其中一定有可以当我老师的人。","孔子还当过鲁国的大官，把鲁国治理得特别好。可是后来，鲁国的国君贪图享乐，不再关心国家大事。孔子很失望，就带着学生们离开了鲁国，周游列国，去宣传自己的政治主张。","这一走就是十四年。一路上，孔子遇到了很多困难，有时候被人追杀，有时候被困在半路上没饭吃，还有人嘲笑他是\"丧家之犬\"。可是孔子从来没有放弃过自己的理想。","晚年的时候，孔子回到了鲁国，专心整理古代的典籍和教育学生。他教过的学生有三千多人，其中特别优秀的有七十二个，被称为\"七十二贤人\"。孔子的思想被弟子们记录下来，编成了《论语》这本书。","孔子去世后，他的思想影响了中国两千多年。人们尊称他为\"至圣先师\"、\"万世师表\"，意思是说，他是所有老师的榜样。直到今天，孔子的很多话还在被人们传诵，比如\"己所不欲，勿施于人\"、\"学而时习之，不亦说乎\"。孔子的故事告诉我们：学习是一辈子的事，做一个有道德、有学问的人，比什么都重要！"],"wuzetian":["唐朝的时候，有一个了不起的女人，她叫武则天。她是中国历史上唯一一个真正当皇帝的女人。武则天小的时候就特别聪明，长得也很漂亮，十四岁的时候就被选进了皇宫，当了唐太宗的才人。","唐太宗去世后，按照当时的规矩，武则天被送到了感业寺当尼姑。可是新皇帝唐高宗李治早就喜欢上了武则天，他把武则天又接回了皇宫，还封她做了昭仪。","武则天不仅聪明，而且很有政治才能。她一步步往上走，最后竟然当上了皇后。当上皇后之后，武则天开始帮助唐高宗处理国家大事。她把事情处理得井井有条，比很多男人都能干。","唐高宗去世后，武则天先后废掉了自己的两个儿子，最后干脆自己当了皇帝，改国号为\"周\"。这一年，武则天已经六十七岁了。一个女人当皇帝，在当时可是破天荒的大事！很多人都反对她，说女人不能当皇帝。","可是武则天根本不在乎别人怎么说。她当皇帝期间，做了很多好事。她特别重视选拔人才，开创了殿试和武举，让很多有才能的普通人也有机会当官。她还重视农业生产，减轻老百姓的负担，让国家越来越富强。","当然，武则天也有很残酷的一面。她重用了一些酷吏，杀害了很多反对她的人，连自己的亲生儿子都不放过。但是总的来说，武则天当皇帝的时候，国家还是很安定的，为后来的\"开元盛世\"打下了基础。","武则天活了八十二岁，当了十五年皇帝。她去世前，留下了一道遗诏：把自己的皇位还给李家，自己还当回大唐的皇后。她还为自己立了一块\"无字碑\"——碑上一个字都没有，让后人去评价她的功过是非。","武则天是一个很有争议的历史人物。有人说她是个好皇帝，把国家治理得很好；也有人说她心狠手辣，为了权力不择手段。但是无论如何，她都是中国历史上唯一一个女皇帝，她用自己的一生证明了：女人也能做皇帝，也能治理好国家。武则天的故事告诉我们：谁说女子不如男？只要有才能、有魄力，女孩子也能做出惊天动地的大事业！"],"weiweijiuzhao":["战国时期，有两个很厉害的军事家，一个叫孙膑，一个叫庞涓。他们本来是好朋友，一起学习兵法。可是庞涓心眼很小，嫉妒孙膑比自己聪明，就设计陷害孙膑，挖掉了他的膝盖骨。","孙膑假装疯了，才好不容易逃到了齐国。齐国的大将军田忌很欣赏孙膑的才华，把他留在身边当军师。孙膑虽然腿不好，但脑子特别好使，总能想出奇妙的计策。","有一年，魏国派庞涓带兵攻打赵国，赵国很快就被包围了，赵王急得团团转，赶紧向齐国求救。齐威王派田忌和孙膑带着军队去救赵国。","田忌说：咱们赶紧去赵国，和魏军打一仗！孙膑却摇摇头说：不行，魏国的精锐部队都去打赵国了，国内肯定很空虚。我们不如直接去攻打魏国的首都，庞涓一定会回来救的。","田忌听了孙膑的话，带着军队直奔魏国首都大梁。庞涓得到消息，果然慌了神：不好！老家被人端了！他赶紧下令撤军，日夜兼程往回赶。","孙膑早就料到庞涓会回来，在一个叫桂陵的地方设下了埋伏。魏军跑得气喘吁吁，刚到桂陵，就听见一声炮响，齐国的军队从四面八方杀了出来。魏军猝不及防，被打得落花流水。","这就是著名的\"围魏救赵\"的故事。孙膑没有直接去救赵国，而是攻打魏国的老家，逼着庞涓退兵，既救了赵国，又打了胜仗。这个故事告诉我们：遇到问题不要硬碰硬，换个角度思考，也许能找到更聪明的解决办法！"],"qibuchengshi":["三国时期，曹操有两个很优秀的儿子：曹丕和曹植。曹植从小就特别聪明，写诗写文章都特别好，曹操非常喜欢他，好几次想立他为世子。","哥哥曹丕心里很嫉妒弟弟。他觉得曹植抢了自己的风头，总是想找机会除掉曹植。后来曹操去世了，曹丕当上了皇帝，他就想找个借口杀掉曹植。","有一天，曹丕把曹植叫到宫里，板着脸说：听说你写诗很厉害，今天我要考考你。你必须在七步之内作出一首诗，作不出来，就治你的死罪！","在场的大臣们都倒吸了一口凉气：七步作一首诗，这怎么可能？大家都为曹植捏了一把汗。可是曹植却一点也不慌张，他低着头，一边走一边想。","一步、两步、三步……曹植慢慢走着，刚走到第七步，他就停下脚步，大声吟诵起来：\"煮豆持作羹，漉菽以为汁。萁在釜下燃，豆在釜中泣。本自同根生，相煎何太急？\"","这首诗的意思是：煮豆子的时候，豆秸在锅底下燃烧，豆子在锅里面哭泣。我们本来是同一条根上长出来的，为什么要这么急切地互相迫害呢？曹丕听了，脸一下子红了。","他想起了小时候和弟弟一起读书玩耍的日子，心里很惭愧。于是他放过了曹植，只是把他贬到了外地。\"七步成诗\"的故事就这样流传了下来。它告诉我们：平时多读书多积累，关键时刻就能展现出才华；同时也要珍惜兄弟情谊，不要手足相残。"],"zaobitouguang":["西汉时候，有个叫匡衡的孩子。他特别喜欢读书，可是家里很穷，连买蜡烛的钱都没有。白天他要帮家里干活，只有晚上才有时间读书，可是没有灯怎么读呢？","匡衡的邻居家很有钱，每天晚上都点着蜡烛，屋子里亮堂堂的。可是匡衡家和邻居家中间隔着一堵墙，光亮照不过来。小匡衡盯着那堵墙，心想：要是能有一点光就好了。","突然，他想到了一个好办法！他拿起一把小凿子，在墙上轻轻地凿呀凿。凿了好久好久，终于在墙上凿出了一个小小的洞。","哇！一道光亮从洞里透了过来！匡衡高兴极了，赶紧把书凑到洞口，借着这一点点光读了起来。虽然光线很暗，但是匡衡已经很满足了。","从那以后，每天晚上匡衡都靠在墙上，借着邻居家透过来的光读书。他读了一本又一本，常常读到深夜，有时候读得太入迷，连邻居家熄灯了都不知道。","可是书不够读啊！匡衡听说村里有个大户人家有很多书，就跑去对主人说：我愿意给您家干活，不要工钱，只求您能把书借给我读。主人很感动，就答应了他的请求。","匡衡就这样一边干活一边读书，读的书越来越多，学问也越来越大。后来他成了西汉著名的大学问家，还当上了丞相。\"凿壁偷光\"的故事告诉我们：只要有一颗爱学习的心，再大的困难也能克服。贫穷不是不努力的借口，刻苦学习终会有回报！"],"zhugeliang":["三国时期，有个叫诸葛亮的人，他是中国历史上最聪明的人之一。他从小就失去了父母，跟着叔叔生活。诸葛亮特别爱读书，不管是天文地理还是兵法历史，他都读得津津有味。","诸葛亮长大后，隐居在南阳的卧龙岗，一边种田一边读书。虽然他住在乡下，但是他对天下大事了如指掌，大家都叫他\"卧龙先生\"，意思是藏在山里的一条龙。","那时候刘备正在打天下，他听说诸葛亮很厉害，就亲自去请他出山。第一次去，诸葛亮不在家；第二次去，诸葛亮出门了；第三次去，诸葛亮正在午睡。刘备就站在门口等，一直等到诸葛亮醒来。","诸葛亮被刘备的诚意打动了，就决定帮助刘备。他给刘备分析了天下形势，制定了三分天下的计划。刘备听了高兴极了，说：我得到诸葛亮，就像鱼儿得到了水一样！","诸葛亮果然厉害！他用草船借箭，不费吹灰之力就从曹操那里\"借\"来了十万支箭；他用空城计，坐在城楼上弹琴，就吓退了司马懿的十五万大军；他还发明了木牛流马，运送粮草特别方便。","诸葛亮不仅聪明，还特别忠心。刘备去世后，把儿子刘禅托付给诸葛亮。诸葛亮尽心尽力地辅佐刘禅，每天都工作到很晚，大小事情都亲自处理，从来没有偷懒过。","为了完成刘备统一国家的愿望，诸葛亮好几次带兵北伐。可是因为太辛苦了，他在五丈原的军营里生病了，最后永远地闭上了眼睛。去世前，他还在为军队的撤退做安排。","诸葛亮的故事流传了一千多年，人们都很敬佩他的智慧和忠诚。他写的《出师表》感动了无数人，\"鞠躬尽瘁，死而后已\"这八个字，就是他一生的写照。诸葛亮的故事告诉我们：真正的聪明来自于勤奋学习和不断思考，知识就是力量！"],"dufu":["唐朝有个伟大的诗人叫杜甫。他和李白是好朋友，两个人都特别会写诗，李白被称为\"诗仙\"，杜甫被称为\"诗圣\"。杜甫的诗特别真实，就像照相机一样，记录了唐朝由盛转衰的历史。","杜甫小的时候特别聪明，七岁就能写诗了。他读书特别用功，\"读书破万卷，下笔如有神\"就是他说的。意思是书读得多了，写起文章来就像有神仙帮忙一样。","年轻的时候，杜甫也想像李白一样到处游历，过自由自在的生活。他爬过泰山，写下了\"会当凌绝顶，一览众山小\"的名句。那时候的杜甫，对未来充满了希望。","可是后来，杜甫参加科举考试没考上，在长安住了十年，日子过得越来越穷。他看到了很多老百姓的苦难生活，心里特别难过。他写了很多诗，记录下老百姓的悲惨遭遇。","安史之乱爆发了，战争让老百姓流离失所。杜甫亲眼看见官兵抓壮丁，连老人和孩子都不放过。他含着眼泪写下了《三吏》《三别》，把战争的残酷和人民的痛苦都写进了诗里。","杜甫自己的日子也很苦。他在成都盖了一间茅草屋，有一天刮大风，把屋顶的茅草都吹走了。他又冷又饿，可是他想到的不是自己，而是天下所有受苦的读书人。","他大声说：\"安得广厦千万间，大庇天下寒士俱欢颜！\"意思是：怎么才能得到千万间宽敞的大房子，让天下所有穷苦的读书人都能开开心心地住进去呢？哪怕只有我的房子破了，我冻死也心甘情愿！","杜甫的一生很坎坷，经常吃不饱穿不暖，可是他心里始终装着国家和人民。他的诗被称为\"诗史\"，因为每一首都真实地记录了那个时代。杜甫的故事告诉我们：真正伟大的人，心里装着别人。这种善良和大爱，会永远被人们记住。"],"yimingjingren":["春秋时候，楚国来了一位年轻的新国王——楚庄王。可大家发现，这位新国王一点都不像国王的样子！他整天喝酒享乐，听音乐看舞蹈，朝政大事一概不管，还下了一道命令：谁敢来劝我，杀无赦！","大臣们急得团团转：国家大事没人管，邻国都来欺负咱们了，可谁也不敢去劝。就这样，楚庄王浑浑噩噩地过了整整三年。这三年里，他看起来就是个只会享乐的昏君。","有一天，一位叫伍举的大臣实在忍不住了。他没有直接劝，而是给楚庄王出了个谜语：'大王，山上有一只大鸟，三年不飞也不叫，这是什么鸟？'楚庄王笑了笑，回答道：'这鸟啊，三年不飞，一飞冲天；三年不鸣，一鸣惊人！'","原来，楚庄王心里什么都明白！他故意装糊涂，就是为了看清谁是忠臣谁是奸臣。那些趁机贪赃枉法的坏官，他全都看得清清楚楚；那些默默做好事的好官，他也全都记在了心里。","没过多久，楚庄王突然像变了个人！他停止了宴饮，开始亲自处理朝政。他一下子罢免了三百多个坏官，提拔了两百多个忠臣，还重用了一位叫孙叔敖的贤人当丞相。","楚国的老百姓都惊呆了：咱们这位国王原来这么厉害啊！在楚庄王的治理下，楚国变得越来越强大。他带兵打仗，打败了一个又一个对手，最后成了春秋时期最强大的霸主之一！","一鸣惊人的故事告诉我们：不要小看默默努力的人，真正厉害的人往往在暗处积蓄力量，一旦爆发就让人刮目相看！"],"guanyu_qianli":["三国时候，有一位红脸长须的大将军，他叫关羽。关羽和他的大哥刘备失散了，暂时留在曹操的军营里。曹操非常喜欢关羽，给他送金银珠宝、好酒好肉，还封他做侯爷，可关羽心里一直想着大哥刘备。","曹操想让关羽留下来，就派张辽去试探：'你觉得我和你大哥谁更好？'关羽毫不犹豫地说：'曹公对我确实好，可我和大哥刘备桃园结义，发誓同生共死，我终究要去找他的。'","后来，关羽终于打听到刘备的消息。他把曹操赏赐的所有金银财宝都原封不动地留下，把侯爷的大印也挂在堂上，保护着嫂嫂——刘备的妻子，踏上了寻找大哥的路。","这一路可不容易！没有通关的文书，守关的将军都不放行。关羽过第一关时，守将孔秀拦住他，关羽好言相求，孔秀却要动手。关羽无奈只得应战，一刀就把孔秀打落马下。就这样，他一连过了五道关口。","到了黄河渡口，守将秦琪又拦住了去路，还嘲笑关羽没有通行证。关羽忍着怒气说：'我只是想过河去找大哥，何必为难？'可秦琪偏偏不肯，关羽只好再次出手，击败了秦琪，终于渡过了黄河。","千里迢迢，过关斩将，关羽终于找到了大哥刘备！兄弟重逢，两个人抱在一起，眼泪止不住地流。刘备拍着关羽的肩膀说：'二弟，你受苦了！'关羽抹了抹眼泪笑道：'只要能见到大哥，再走千里也值得！'","关羽千里走单骑的故事告诉我们：做人要重情重义，说到做到，即使困难重重也要坚守自己的承诺！"],"ganluo":["战国时候，秦国有一个十二岁的小男孩叫甘罗。他的爷爷甘茂是秦国的大臣，甘罗从小跟着爷爷耳濡目染，对天下大事了如指掌，说起话来头头是道，连大人们都自愧不如。","有一天，秦王想让大臣张唐去燕国当丞相，可张唐死活不肯去。原来，去燕国必须经过赵国，而张唐以前带兵打过赵国，赵国恨他入骨，悬赏要他的脑袋！张唐害怕极了，说什么也不去。","大人们都没办法，甘罗却站了出来：'让我去劝劝张唐！'大人们都笑了：'我们大人都劝不动，你一个十二岁的小孩能行？'甘罗不慌不忙地说：'项橐七岁就当孔子的老师，我十二岁为什么不能试试？'","甘罗找到张唐，没有像大人那样苦苦劝说，而是问道：'张大人，您的功劳和白起比起来，谁更大？'张唐说：'白起将军南征北战，功劳当然比我大。'甘罗又问：'那当年的丞相范雎和现在的丞相吕不韦，谁权力更大？'张唐说：'当然是吕不韦。'","甘罗笑了：'白起功劳那么大，可范雎一句话就让白起自杀了。现在吕不韦的权力比范雎还大，您觉得他一句话能不能对付您呢？'张唐听了，吓得脸色发白，赶紧答应了去燕国！","甘罗的才华让吕不韦大吃一惊。接着，甘罗又主动请缨出使赵国，凭着三寸不烂之舌，说服赵国割让了五座城池给秦国！秦王高兴极了，封十二岁的甘罗为上卿——相当于丞相！甘罗成了中国历史上最年轻的丞相。","甘罗十二为丞相的故事告诉我们：年龄小不代表能力小，只要有真才实学、敢想敢做，再小的人也能做成大事！"],"mozi":["战国时候，楚国是个超级大国，国君楚惠王野心勃勃，想攻打小小的宋国。他请来了当时最厉害的工匠公输班，造出了攻城用的云梯——这是一种特别高大的梯子，士兵可以踩着它爬上城墙！宋国危在旦夕。","这个消息传到了鲁国，一位叫墨子的哲学家听说了。墨子是墨家学派的创始人，他主张'兼爱'和'非攻'——意思是要爱天下所有的人，反对不义的战争。他一听说楚国要欺负宋国，立刻决定去阻止这场战争！","墨子日夜不停地赶路，走了整整十天十夜，鞋底都磨穿了，脚上全是血泡。到了楚国，他先去找公输班，说：'北方有人欺负我，请帮我杀了他！'公输班不高兴了：'我是讲道义的人，怎么能杀人呢？'墨子反问：'你不肯杀一个人，却要帮楚国杀宋国成千上万的人，这算什么道义？'","公输班被问得哑口无言。墨子又去见楚惠王，打了个比方：'有人放着自家的漂亮马车不坐，偏要去偷邻居的破车；放着自家的锦绣衣裳不穿，偏要去偷邻居的粗布短衣。大王您觉得这人怎么样？'楚王笑了：'这人一定有偷东西的毛病！'","墨子说：'楚国地大物博，宋国又小又穷。大王去攻打宋国，不就跟那个偷邻居破车的人一样吗？'楚王虽然觉得有道理，但还是不甘心：'公输班已经造好了云梯，一定能攻下宋国！'","墨子解下腰带放在桌上，当城墙；又拿小木片当攻城和守城的器械，和公输班当场比试起来。公输班用了九种攻城方法，墨子一一化解。公输班急了：'我有办法对付你，但我不说！'墨子笑了：'我知道你的办法——杀了我宋国就没人守了。可我早就派了三百个弟子去宋国帮忙守城了！'","楚王听罢，终于放弃了攻打宋国的念头。墨子靠着智慧和勇气，一个人阻止了一场大战，救了宋国千千万万的百姓！墨子止楚攻宋的故事告诉我们：和平比战争更珍贵，智慧和勇气可以阻止争端！"],"taoyuanming":["东晋时候，有一位大诗人叫陶渊明。他从小爱读书写字，更喜欢在田野间漫步，看花开花落、听鸟儿歌唱。他心里觉得，这世上最美的日子就是种田读书、自由自在。","可是家里太穷了，陶渊明不得不去做官养家糊口。他当了一个叫彭泽县令的小官，每天要处理各种烦心事，还要应付那些不讲道理的上司，心里别提多难受了。","有一天，上面派了一个督邮来检查工作。这个督邮是个傲慢无礼的人，他一到就大摆架子。手下人赶紧跑来告诉陶渊明：'大人，您快穿戴整齐去迎接督邮大人！要恭恭敬敬地行礼才行！'","陶渊明的脸一下子沉了下来。他沉默了好一会儿，忽然仰起头，大声说道：'我堂堂七尺男儿，怎么能为了五斗米的俸禄，就去向那种人卑躬屈膝！'五斗米就是他当县令的工资，他宁可不要这工资，也不愿意弯下腰来！","说完，陶渊明解下官印放在桌上，头也不回地走了。他只当了八十多天的县令，就这样辞官回家了。从那以后，他再也不做官了，回到乡下种田写诗，过起了自由自在的日子。","陶渊明回家后写了很多诗。他写采菊东篱下、悠然见南山的闲适，写种豆南山下、草盛豆苗稀的田园趣事。他还写了一篇《桃花源记》，想象了一个没有战乱、人人快乐的世外桃源，这篇故事流传千古。","虽然日子过得清苦，有时候连饭都吃不饱，但陶渊明从不后悔。他说：衣沾不足惜，但使愿无违——衣服弄脏了没什么可惜的，只要不违背自己的心意就好！陶渊明告诉我们：真正的快乐不是做官发财，而是做真实的自己！"],"wencheng":["唐朝的时候，吐蕃国王松赞干布派使者来到长安，向唐太宗请求娶一位公主做妻子。那时候唐朝非常强大，周围的许多国家都想和唐朝结亲。唐太宗想了想，决定把宗室女儿文成公主嫁到吐蕃去。","文成公主听说自己要嫁到很远很远的地方，心里又害怕又难过。她舍不得离开自己的父母和朋友，吐蕃在青藏高原上，那里气候寒冷，和长安完全不同。可是文成公主知道，这是为了两个民族的和平，自己应该勇敢地去。","出嫁那天，长安城里热闹极了。文成公主带着很多很多的嫁妆：有唐朝的丝绸、瓷器、书籍，还有各种农作物的种子。最厉害的是，她还带去了很多会种田、织布、做手艺的工匠。这些工匠后来在吐蕃教当地人学会了很多先进的生产技术。","文成公主骑着马，翻过了无数座高山，穿过了无数片草原。一路上风雪交加，道路崎岖，有时候还要在荒野里过夜。可是公主从不叫苦，她鼓励身边的人说：我们走过的每一步，都是通往和平的路。","当文成公主终于到达吐蕃的时候，松赞干布亲自来迎接她。他看到美丽的公主，高兴极了，对身边的人说：看，这就是大唐的天公主！从此以后，吐蕃人民都非常敬重文成公主。","文成公主到了吐蕃之后，把中原的先进技术都传授给了当地人。她教藏族人怎么种庄稼，怎么纺线织布，还把中医知识带了过去。在她的帮助下，吐蕃慢慢变得富裕起来，藏汉两族人也越来越团结。","文成公主在吐蕃生活了几十年，直到去世。她虽然没有再回到长安，可是她为两个民族带来的和平与友谊，一直延续了好几代人。后来，藏族人民修建了宏伟的布达拉宫，里面专门供奉着文成公主的塑像，表达对她的尊敬和怀念。","文成公主入藏的故事告诉我们：真正的英雄不一定要上战场杀敌，有时候，一个人的勇气和善良，能够为千千万万的人带来和平与幸福！"],"zhangxun":["唐朝的时候，爆发了一场大乱叫做安史之乱。叛军一路烧杀抢掠，打到了睢阳城。睢阳是唐朝的重要城市，如果被叛军占领，整个江淮地区都会沦陷。就在这危急关头，一个叫张巡的县令站了出来。","张巡本来是个文官，平时就是读书写字的。可是当叛军打来的时候，他没有逃跑，而是带着仅有的三千士兵，决定死守睢阳。城里的老百姓听说张大人要守城，都感动极了，纷纷表示愿意出力帮忙。","叛军的数量是张巡的一百倍！漫山遍野都是敌人，看起来黑压压的一片。城里有人害怕了：大人，敌人这么多，我们怎么打得过啊？不如投降吧！张巡听了，严肃地说：睢阳是江淮的屏障，如果我们投降了，后面成千上万的老百姓就要遭殃！","张巡想了一个办法：他让人在城头扎了很多草人，给它们穿上黑衣服，远远看去就像真人一样。叛军一看城墙上有士兵，以为要偷袭，赶紧放箭射过来。整整一个晚上，叛军射了好几万支箭，全都射在了草人身上。等天亮叛军发现上当时，张巡已经白得了好多好多箭！","后来叛军发现是草人计策，不再上当了。张巡又想了一招：把真人从城上放下去。这次是真的勇士，他们跳下城墙，冲进敌营，打了叛军一个措手不及，还活捉了敌人的一个将领。","日子一天天过去，城里没有粮食了，士兵们饿得头晕眼花。张巡把自己的妻子儿女杀掉，分给士兵们吃。士兵们哭着说：大人，您怎么可以……张巡流着泪说：为了守护这座城，为了后面千千万万的老百姓，我什么都愿意牺牲！","最后，睢阳城还是被攻破了。张巡被俘后，叛军想让他投降。张巡宁死不屈，叛军无奈之下杀死了他。可是张巡用自己的牺牲，为唐朝争取到了宝贵的时间，等来了援军，最终平定了叛乱。","张巡守睢阳的故事告诉我们：真正的英雄不是没有恐惧，而是即使害怕也要坚持下去；真正的勇敢，是为了更大的目标愿意牺牲自己！"],"zhaokuangyin":["五代十国的时候，天下大乱，各路英雄你争我夺。在后周朝有一位大将军叫赵匡胤，他武艺高强，手下的士兵都愿意为他拼死作战。当时的皇帝是个小孩子，国家大事实际上都是赵匡胤说了算。","有一天，边境传来急报说敌人来侵犯。朝廷派赵匡胤带兵去打仗。大军走到陈桥驿这个地方时，天色已晚，就停下来休息。当天晚上，士兵们聚在一起议论纷纷：当今皇帝是个小孩子，国家没有大人做主，早晚会出乱子！不如让赵大将军当皇帝！","赵匡胤的弟弟赵光义和谋士赵普知道了士兵们的想法，就悄悄安排人连夜准备了一件黄袍——黄袍是皇帝的专用服装。第二天一早，士兵们把赵匡胤从睡梦中叫醒，把黄袍披在他身上。","赵匡胤假装很惊讶地说：哎呀，这可不行！你们怎么可以这样！士兵们齐声说道：天命所归，您就当皇帝吧！赵匡胤还要推辞，士兵们按着剑柄说：您要是不答应，我们就散伙回家！赵匡胤知道推辞不了了，就说：好吧，我可以当皇帝，但是你们要答应我一件事。","士兵们问什么事，赵匡胤说：等我当了皇帝，不许随便抢老百姓的东西，不许杀害无辜的人。你们能做到吗？士兵们齐声回答：能！于是，赵匡胤带领大军回到京城，夺取了皇位，建立了宋朝。","当了皇帝之后，赵匡胤没有像其他开国皇帝那样杀掉功臣。他请功臣们喝酒，然后在酒桌上说：你们的兵权太大了，我睡不着觉啊。功臣们一听，吓得跪下来说：陛下想怎么办就怎么办！第二天，赵匡胤就把兵权收了回来，还给了功臣们很多金银财宝，让他们回家养老去了。这就是历史上著名的'杯酒释兵权'。","赵匡胤用温和的方式解决了一个可能危及国家的难题。从此以后，宋朝再也没有发生过武将夺权的事情，国家慢慢安定下来，百姓们过上了太平日子。大家都说：这位皇帝真有智慧啊！","赵匡胤的故事告诉我们：真正厉害的人不是靠武力让别人害怕，而是用智慧把坏事变成好事，让大家都心服口服！"],"fanyizongyan":["北宋时候有一个著名的大臣叫范仲淹。他小的时候家里很穷，父亲很早就去世了，母亲改嫁他人。范仲淹跟着继父继母生活，日子过得很清苦。继父家的孩子吃好的穿好的，范仲淹却只能穿粗布衣裳。","范仲淹没有被贫困打倒。他知道只有读书才能改变命运，于是发愤图强，拼命学习。他在一个寺庙里借住读书，因为家里穷买不起灯油，他就借着寺庙大殿的烛光读书。有时候太困了，就用冷水洗把脸，继续看书。","有一天晚上，范仲淹发现寺庙后院的墙根下有银子。他以为是自己不小心掉的，高兴地去挖，结果发现那是一窝蛇。旁边有块石碑，上面写着：'此地下有银子，挖出会招来灾祸。'范仲淹看了看，就又把土埋上了。他说：我范仲淹宁可穷一辈子，也不能贪这种不义之财！","范仲淹读书特别刻苦，后来真的考中了进士，当上了大官。可是他当官之后，不是想着怎么发财，而是想着怎么帮助老百姓解决困难。他走到哪里，就在哪里为百姓做好事：减税、赈灾、修水利、办学校……","有一次，宋仁宗请范仲淹等大臣商量国事。大臣们都不敢得罪人，只说一些不痛不痒的话。范仲淹急了，他站出来说：陛下，现在国家有很多问题，可是大臣们都不说真话！我范仲淹不怕得罪人，我来说！说着，他把朝政的问题一条一条地指出来，话说得很尖锐。","有些大臣私下里说范仲淹太直了，太爱得罪人了。范仲淹听说后，坦然地说：我是朝廷的大臣，看到问题不说，那才是不忠！我宁可在朝廷上得罪人，也不能对不起天下的老百姓！","范仲淹退休之后，住在穷苦的老百姓中间，和他们同甘共苦。他写了一篇著名的文章叫《岳阳楼记》，里面有一句话千古流传：'先天下之忧而忧，后天下之乐而乐。'意思是说：要在天下人担忧之前就担忧，在天下人快乐之后才快乐。","范仲淹的故事告诉我们：做人要有担当，看到不对的事情要敢说；帮助别人不一定要很有钱，有一颗愿意付出的心就够了！"],"baozheng":["北宋的时候，有个当官的叫包拯，老百姓都亲切地叫他'包青天'。为什么叫他青天呢？因为他办案公正，眼睛里揉不得沙子，不管你是大官还是有钱人，做了坏事就得受惩罚。","包拯年轻的时候就很正直。有一次，他的一个亲戚犯了法，按理说应该打板子坐牢。那个亲戚想：包拯是我侄子，肯定会放我一马。没想到包拯一点情面都不讲，该怎么判就怎么判。那个亲戚气得指着他的鼻子骂：你这个忘恩负义的东西！包拯平静地说：我不是忘恩负义，我是在维护法律。法律面前，人人平等。","后来包拯当了官，审理过很多案子。有一次，一个农民来告状，说自己家的牛被人偷了。包拯问：是谁偷的？农民说不知道。包拯想了想说：你先回去，过几天再来。农民走后，包拯让人贴出告示：县衙的牛病了，杀了吃牛肉的人要受罚！","几天后，果然有人来承认自己偷了牛。包拯把偷牛贼抓住归案，还把牛还给了农民。旁边的人问包拯：你怎么知道用这个办法？包拯笑着说：偷牛贼肯定怕牛死了被人发现，所以一定会来自首。","包拯当官的时候，还专门弹劾过很多贪官污吏。有个高官仗着皇帝宠信，欺负老百姓。包拯写了弹劾的奏章，一连弹劾了好几次，最后终于把那个高官拉下马。老百姓听说后，都高兴地说：包青天真是好啊！","包拯当了很大的官，可是他的生活非常简朴。他不贪财，不受贿，穿的衣服和普通老百姓一样。别人送礼物给他，他从来不收。有一次，一个有权势的人给他送了一面镜子，说这是宝物，能照出人心。包拯笑着说：不用照，我的心我自己清楚！","包拯去世的时候，老百姓哭成了一片。大家都说：再也没有像包青天这样的好官了！后来，人们把他画成戏剧里的人物：黑脸、额头上有个月亮。每次演包拯的戏，小孩子都看得特别认真。","包拯的故事告诉我们：做人要正直，办事要公正，不管在什么时候，都不能做对不起良心的事！"],"qijiguang":["明朝的时候，中国沿海经常遭到一群坏人的骚扰。这些坏人叫做倭寇，他们坐着船来抢东西，杀害老百姓，搞得大家人心惶惶，夜不安眠。","那时候有个将军叫戚继光，他武艺高强，还有一颗特别爱老百姓的心。他看到倭寇那么嚣张，心里特别难受，发誓一定要把这些坏人赶走。","可是原来的军队不太行，士兵们打仗不够勇敢。戚继光想了想，决定自己训练一支新军队。他在浙江义乌招了很多农民和矿工，这些人身强力壮，吃苦耐劳。","戚继光教他们一种特别的阵法叫做「鸳鸯阵」。这个阵法很神奇，士兵们配合起来就像一个人一样厉害。有人拿长矛，有人拿盾牌，有人拿大刀，配合得天衣无缝。","有一次，戚家军和倭寇在海边打了一仗。倭寇仗着自己武器好，根本不把戚家军放在眼里。可是他们刚冲过来，就被鸳鸯阵牢牢困住了。","戚家军喊着「报效国家」的口号冲上去，长矛刺，大刀砍，把倭寇打得落花流水。倭寇头子想逃跑，被戚继光一箭射中了手臂，跪地求饶。","从那以后，戚家军越战越勇，把倭寇赶得远远的。沿海的老百姓终于能安心种田打鱼了，大家都亲切地叫戚继光「戚爷爷」。"],"wentianxiang":["南宋末年，国家被元朝的大军打得很惨。元朝皇帝听说文天祥是个大才子，还特别忠心，就想让他投降，还许诺给他高官厚禄。","文天祥摇摇头说：「我文天祥生是大宋的人，死是大宋的鬼，绝不会投降！」元朝皇帝生气了，把他关进了一间阴冷潮湿的牢房里。","牢房里又暗又冷，地上都是脏水，墙上还爬满了虫子。有一个降将假惺惺地来劝他：「文大人，何必受这种苦呢？元朝对你多好啊！」","文天祥看了看那人说：「你以为我不知道享受吗？可是我心里有一团火，是为大宋烧的。这团火永远也不会灭！」","元朝皇帝又派人来，说只要文天祥投降，就封他做丞相。文天祥笑了笑，写了一首诗回答他们：「人生自古谁无死，留取丹心照汗青。」","意思是说，人活着总要死的，但我要让自己的爱国之心永远留在史册上。元朝皇帝看了这首诗，气得直跺脚，却也没有办法。","文天祥在牢里关了三年，始终没有屈服。最后他被处死了，但他的爱国精神永远留在了人们心中。现在我们去参观文天祥纪念馆，还能感受到他那一身正气呢！"],"caobin":["北宋有一位将军叫曹彬，他武艺高强，打过很多胜仗。可是他和其他将军不一样，每次打完仗，他最关心的不是立了多大的功，而是问：「老百姓有没有受伤？」","有一次，曹彬带兵去攻打一个城池。出发前，他把副将们叫来说：「这次打仗，我们只要能赢就行，千万别伤害城里的老百姓啊！」","副将们听了都很奇怪：「将军，打仗哪有不死人的？何况是攻城战！」曹彬摇摇头说：「我们打仗是为了让老百姓过上好日子，不是为了杀他们。」","攻城的时候，曹彬的士兵们发现城里的老百姓都躲在家里不敢出来。原来大家听说曹彬的军队来了，反而安心了，因为都知道他是个仁义将军。","城里的守军看到曹彬这么仁义，感动得不行，主动打开城门投降了。曹彬进去后，果然秋毫无犯，还把粮食分给穷苦的百姓。","后来宋太祖听说了这件事，夸赞曹彬说：「好将军啊！带兵能打胜仗，还这么爱护百姓，真是难得！」从此，「曹彬仁将」的名声传遍了天下。","曹彬活到很高的年纪才去世，他教给后代的道理是：武力再强，也比不上有一颗仁爱的心。这个故事告诉我们，真正厉害的人，是能够帮助别人、保护弱小的人。"],"shenkuo":["沈括是北宋时期一个大科学家，他简直是个全才！天文、地理、数学、化学、医学，什么都懂，被后人称为「中国科学史上的坐标人物」。","沈括小时候就特别爱问问题。看到蚂蚁搬家，他要问蚂蚁怎么认路；看到月亮在不同时间位置不一样，他要问月亮为什么会移动。他的脑袋里装满了「为什么」。","有一次，沈括发现指南针总是指向南边，他很好奇，就研究了很久，最后写文章记录了磁针偏角的现象。这个发现比欧洲早了四百多年呢！","沈括还特别会观察大自然。他在山里看到一层层叠起来的石头，就想：这些石头是怎么形成的呢？他跑去问老农，又自己研究，最后推断出这些岩石是古代的泥沙一层层堆积形成的。这就是最早的「地质学」思想。","沈括还发明了「隙积术」，这是一种计算酒坛子堆起来有多少个的方法。这可是世界上最早的等差数列研究哦，比欧洲早了好几百年！","晚年的时候，沈括住在一个叫梦溪园的地方，在这里写了很多很多科学笔记。后来这些笔记被整理成一本书叫《梦溪笔谈》，被誉为「中国科学史上的里程碑」。","沈括的故事告诉我们：大自然里藏着很多秘密，只要我们像他一样多看、多问、多想，就能发现很多有趣的事情，说不定你也能成为小科学家呢！"],"xuxiake":["徐霞客是明代一个大旅行家，他一辈子就喜欢做一件事——出门旅游。不过他可不是那种坐车坐船的普通游客，而是专门走路、爬山，睡野外的那种超级旅行者！","徐霞客小的时候就特别爱看地理书，书上说哪座山高、哪条河长，他都记得清清楚楚。他常常站在家门口望着远方的山，心想：那些山到底长什么样呢？","二十岁那年，徐霞客开始了他的旅行生涯。他背着干粮和换洗衣服，一个人出发了。一路上遇到很多困难，有时迷路了，有时生病了，有时差点掉进山崖。","可是徐霞客从来不后悔。他说：「山再高也有顶，水再深也有底，我要亲眼去看看！」他登过陡峭的华山，划过波涛汹涌的洞庭湖，还去过热带森林探险。","徐霞客旅行有个好习惯，就是把看到的东西都记下来。他写了几百万字的日记，记录了各种奇怪的山形地貌、植物动物，还有各地老百姓的生活。","有一年，他去云南探险，路上生了重病，走不动路。当地的好心人把他抬回了家。他的家人劝他不要再出去旅游了，可徐霞客摇摇头说：「我的腿还能走，我的心还想去看世界。」","徐霞客去世后，他的日记被整理成一本书叫《徐霞客游记》，成为了中国古代最著名的地理学著作。现在我们读这本书，还能感受到他那颗热爱大自然的心呢！"],"wangxizhi_lanting":["东晋时候，有个超级厉害的大书法家叫王羲之，他的字写得漂亮极了！人们说他的字像行云流水，又像龙飞凤舞，看一眼就忘不了。可是你知道吗？王羲之小时候字写得可丑了，还因为字太丑，差点被人笑话了一辈子呢！","王羲之七岁的时候开始学写字。刚开始，他握笔都握不稳，写的字歪歪扭扭的，像一条条小蚯蚓在纸上爬。他的启蒙老师看了直摇头：这孩子，怕不是学书法的料啊！王羲之听了，小脸涨得通红，暗暗下决心：我一定要把字写好！","从那以后，王羲之每天一大早就爬起来练字，写啊写啊，写到太阳落山。他练习的时候特别认真，一笔一划都要写到最好。有时候写得入神了，连吃饭都忘了。他的母亲心疼地说：孩子，先吃饭吧，饭都凉了！王羲之摆摆手：等我写完这一页！","王羲之练习书法有个习惯——他喜欢在池子里洗毛笔。天长日久，他家院子里的池子都被墨汁染黑了！人们把这个池子叫做墨池，还编了句顺口溜：羲之之书晚乃善，一池墨水尽天机。后来王羲之成了大书法家，还有人专门去参观那口墨池呢！","有一天，王羲之路过一个小村子，看见一位老婆婆在卖扇子。扇子上写着字，可是写得歪歪扭扭的，根本卖不出去。老婆婆愁眉苦脸：唉，这可怎么活啊！王羲之看了心里不忍，就拿起笔，在每把扇子上认认真真地写起字来。","老婆婆急坏了：小伙子，你把我的扇子弄脏了，这可怎么卖啊！王羲之笑着说：老婆婆，您就吆喝说是王羲之写的，保证卖光！老婆婆半信半疑地一试，果然，人们一听是王羲之写的字，呼啦一下全围上来了，扇子一下子就被抢光了！","公元353年春天，王羲之和朋友们在会稽山阴的兰亭聚会，大家喝酒写诗，玩得可开心了。喝到高兴处，有人提议：今天这么高兴，不如把大家写的诗编成一本诗集，再请王羲之写个序！大家都说好。","王羲之借着酒兴，提笔一挥而就，写下了《兰亭序》这篇文章。这篇文章写得文采飞扬，字更是漂亮得不得了！据说王羲之后来又写了好几遍，可是怎么写都赶不上第一遍那一份。他说：这一份是神来之笔，再也写不出来了！","《兰亭序》被称为天下第一行书，是中国书法的最高典范。后来的大书法家如颜真卿、柳公权，都专门临摹学习《兰亭序》。就连唐朝的皇帝唐太宗，都把《兰亭序》当作宝贝一样收藏，还让大臣们学习它的书法呢！","王羲之的故事告诉我们：想要做好一件事，没有捷径，只有日复一日地练习。只要肯下功夫，笨小孩也能变成大书法家！"],"hufuqishi":["战国时候，赵国的国王赵雍十九岁继承了王位。赵国虽然是个大国，可是北边的游牧民族——中山国和匈奴人，经常骑着马来抢东西，抢完就跑，赵国士兵穿着笨重的战车和宽大的衣服，根本追不上。每次打仗，赵国总是吃亏，赵雍看在眼里，急在心上。","有一次，赵雍出使北方，亲眼看见胡人骑兵的厉害。那些胡人穿着短短的上衣、长长的裤子，骑在马上像长了一对翅膀，射箭、奔跑、转向，样样灵活。赵雍羡慕极了，心想：要是我赵国士兵也能这样穿、这样骑马，那该多好啊！","回到赵国，赵雍把心中的想法告诉了大臣们：我打算让赵国百姓穿胡人的衣服，学习骑马射箭！大臣们听了，顿时炸开了锅。反对最激烈的是赵雍的叔叔公子成，他皱着眉头说：大王，这可不行啊！咱们中原人穿的衣服，是祖祖辈辈传下来的，穿胡人的衣服，那不是丢祖宗的脸吗？","赵雍没有生气，他亲自上门去拜访叔叔。叔叔不见，赵雍就站在门口等。一天过去了，两天过去了，大雪飘落，赵雍冻得瑟瑟发抖，但他还是不肯走。第三天，叔叔终于被他的诚心打动了，答应见他。赵雍诚恳地说：叔叔，我们赵国地理位置特殊，北边有敌人，如果不变法图强，早晚会被吞并。打仗是为了保卫国家，穿什么衣服重要吗？","叔叔沉默了。赵雍又说：我这样做，不是为了好玩，是为了赵国的强大，为了咱们的子孙后代不再受欺负！说完，赵雍跪下给叔叔行了一个大礼。叔叔被感动了，含着泪说：好，大王，我听您的！","从那以后，赵雍带头穿上了胡服上朝。大臣们一看国王都穿了，也纷纷跟着穿。慢慢地，全国上下都穿上了行动方便的胡服。赵雍又亲自训练骑兵，骑在马上射箭，灵活得像一阵风。百姓们亲切地叫他武灵王——说他像神灵一样英明！","几年后，赵国的骑兵强大起来，把欺负他们多年的中山国打得落花流水，一口气夺了好几个城池。赵国从此成为战国七雄中最厉害的军事大国之一。大家都说：看人家武灵王多有远见，一件衣服，改变了一个国家啊！","赵武灵王胡服骑射的故事告诉我们：做正确的事情要有勇气，不要因为别人不理解就轻易放弃。外表的改变不可怕，可怕的是思想僵化、不敢创新！"],"xinlingjun":["战国后期，秦国越来越强大，老想着吞并其他各国。秦昭王派大军把赵国的都城邯郸围得水泄不通，赵国危在旦夕，派人向各国求救。魏国和赵国是邻国，魏王本来答应派兵去救，可是秦王派人威胁说：谁敢救赵国，我就先打谁！魏王害怕了，赶紧让军队停在边界上，不许前进。","魏国有位公子叫魏无忌，人称信陵君，是个出了名的仁义之人。他的门下养着上千位有本事的门客，其中有一位七十岁的老人叫侯赢，公子对他特别尊重。信陵君听说赵国被围，心急如焚，多次去见魏王，请求发兵。魏王就是不肯。","信陵君急了，他对门客们说：算了，我自己带着你们去邯郸，跟秦军拼了！门客们听了，默默点头，愿意跟随公子赴死。出发那天，信陵君路过夷门，去找好友侯赢告别。侯赢只说了一句话：公子努力，老朽就不送了。信陵君心里不痛快：我的门客愿意跟我去死，你这个老头子怎么这么冷淡？","走了几里地，信陵君越想越不对劲，他掉头回去找侯赢。侯赢笑着说：公子啊，我是在考验你呢！我知道你一定会回来的。侯赢说：我有一个好办法，能让魏王出兵救赵。但需要一个人帮忙——魏王最宠爱的如姬夫人。信陵君想了想：如姬？她父亲曾经被人杀害，是我帮她报了大仇，她一直说要报答我。","信陵君找到如姬，请求帮忙。如姬二话不说，连夜从魏王的枕头底下偷出了调兵的虎符。侯赢又送给信陵君一个大力士朱亥，说：如果将军晋鄙起疑心不肯交兵，朱亥会用铁椎打死他。信陵君带着虎符和朱亥，日夜兼程赶到军营。","晋鄙验过虎符，确实是真的，但他心里还是疑惑：这么重要的事，怎么就派你一个公子来？信陵君还没来得及回答，朱亥从袖子里抽出四十斤重的大铁椎，一椎下去，晋鄙就倒在了地上。信陵君含着泪说：对不起，我不得不这样做！赵国的百姓等着我们去救！","信陵君重新整编军队，下令说：父子都在军中的，父亲回去；兄弟都在军中的，兄长回去；是独子的，回家奉养父母。士兵们听了，感动得热泪盈眶。最后，信陵君带领八万精兵，向秦军发起了猛攻。秦军大败，邯郸之围终于解除了！","信陵君窃符救赵的故事告诉我们：真正的勇敢，是明知道有危险，还要去做；真正的智慧，是在关键时刻做出正确的选择；真正的友情，是愿意为朋友赴汤蹈火！"],"huatuo_wuqinxi":["东汉末年，有一位特别厉害的大夫叫华佗。华佗的医术有多神呢？他走遍大江南北给人看病，不管什么疑难杂症，到了他手里都能治好。他还会做一种很厉害的外科手术——在手术前给病人喝一种叫\"麻沸散\"的药，病人喝下去就像睡着了一样，一点都不觉得疼。","有一年春天，华佗回到了老家安徽亳州。他看到邻居们整天待在家里，不爱运动，身子骨弱得很，三天两头就生病。华佗心里着急：有什么好办法，能让大家都身体健康，少生病呢？","华佗开始仔细观察。他发现，村里的小动物们整天蹦蹦跳跳、跑来跑去，却很少生病。他看了老虎打斗，那虎跃虎扑的动作，刚猛有力；他看了梅花鹿奔跑，那伸颈回头的样子，轻盈优美；他看了狗熊散步，那慢悠悠的步伐，憨态可掬。","他又看了猴子玩耍，那上蹿下跳的样子，机灵古怪；还看了鸟儿飞翔，那展翅高飞的动作，轻盈自在。华佗越看越兴奋：这些动物每天运动，身体倍儿棒！如果人也能学学它们的动作，不是也能健康长寿吗？","说干就干！华佗结合自己多年的医学知识，创造了一套模仿五种动物动作的健身操——\"五禽戏\"。第一禽是虎戏，模仿老虎伸展前肢，勇猛有力；第二禽是鹿戏，模仿小鹿伸颈回顾，轻盈优美；第三禽是熊戏，模仿狗熊慢走晃脑，憨态可掬；第四禽是猿戏，模仿猿猴攀援跳跃，灵活机敏；第五禽是鸟戏，模仿仙鹤展翅飞翔，轻盈自在。","华佗把这套健身操教给了乡亲们。大家跟着练，配合呼吸和动作，果然身体越来越好。村东头的王大爷本来走路都喘，练了三个月五禽戏，现在能挑着担子走十里地不累；村西头的李奶奶本来老感冒，坚持练了半年，现在冬天都不怕冷了！","华佗有个学生叫吴普，一直跟着师父学医。华佗把这套五禽戏也教给了他。吴普每天练习，从不间断，一直练到九十多岁，耳不聋眼不花，还能给病人看病呢！人们都说：吴普之所以这么长寿，全靠师父教的五禽戏啊！","后来，曹操听说了华佗的本事，把他请去给自己看病。可惜曹操疑心太重，把华佗关进了监狱。华佗在狱中把自己毕生的医学心得写成了书，可惜被烧毁了。幸好五禽戏流传了下来，一代一代传了两千多年，到现在还有人在练习呢！","华佗与五禽戏的故事告诉我们：最好的医生不是治病的，而是教人防病的。养成运动的好习惯，比吃什么补药都管用！"],"laozi":["在很久很久以前的春秋时期，有一位超级厉害的老爷爷叫老子。他是当时最有智慧的人，大家都叫他'老子'，意思是很老很老的老师傅。老子在一个叫周朝的国家当图书馆馆长，每天的工作就是看书、思考、写书。","有一天，年轻的孔子来找老子请教。孔子是鲁国的大思想家，很有学问，走路都昂着头。可他一见老子，恭恭敬敬地行礼请教。老子张开嘴巴，指着自己的牙齿和舌头说：'你看，我的牙齿全掉光了，可舌头还在。'孔子想了半天，终于明白了：牙齿硬的先掉，舌头软的还在——这就是'以柔克刚'的道理啊！孔子佩服得五体投地。","老子晚年的时候，周朝越来越乱了。他心想：算了算了，这个地方待不下去了，我还是走吧。于是，他骑着一头青牛，慢慢悠悠地往函谷关走去。函谷关的守将叫尹喜，这天晚上，他突然看见东方有一道紫气飘来，足足有三千里长！尹喜高兴极了：'有大人物要来了！'","果然，老子骑着青牛来了。尹喜亲自出关迎接，非要老子留下讲学不可。老子被他的诚意打动了，就把自己毕生的智慧写了下来，这就是著名的《道德经》。书里写着：'道可道，非常道；名可名，非常名。'意思是说，真正的道理是很难用言语说清楚的，要用心去体会。","《道德经》虽然只有五千多个字，却包含了宇宙万物的大道理。老子说：'上善若水'，意思是做人要像水一样，表面上柔和，实际上最有力量——水能滋润万物，却从不和别的东西争高下。水往低处流，看起来很谦虚，可正是因为谦虚，最后才汇成了大海！","老子还写道：'知人者智，自知者明。'意思是了解别人是聪明，了解自己才是真正的明白人。他还说过一个故事：从前有个人，以为自己很有智慧，整天嘲笑别人笨。结果有一天，他照镜子的时候，才发现自己脸上全是灰——原来最笨的是自己啊！","写完《道德经》，老子骑上青牛，慢慢消失在了西方。没有人知道他去了哪里，但他的思想却留了下来，影响了中国几千年。后来的很多思想家、哲学家，都说自己是老子的学生。老子告诉我们的道理很简单：做人要谦虚，做事要耐心，不要争强好胜，这样才能活得长久，活得快乐！"],"bianque":["春秋时期，有一个神医叫扁鹊。他医术高明，能治好各种疑难杂症，还会一种神奇的'透视眼'——能看到人身体里的问题。其实这不是真的透视，而是因为他观察病人特别仔细，能从蛛丝马迹中发现病因。","有一天，扁鹊路过一个叫虢国的地方。他听说虢国的太子刚死了，大家都在举行葬礼。扁鹊问：'太子是怎么死的？'有人说：'太子突然倒地，就死了。'扁鹊想了想，问：'死了多久了？''一大早，到现在大概四个时辰。'扁鹊眼睛一亮：'还有救！快带我去看看！'","扁鹊来到王宫，仔细观察太子的状况。他发现太子还有微弱的呼吸，鼻子微微翕动，耳朵后面靠近发际的地方还有温度。扁鹊高兴地说：'太子没死！他只是假死，就是我们说的'尸厥'！'国王又惊又喜：'真的？那你快救救他！'","扁鹊立刻让弟子准备银针。他找准太子的穴位，一针扎下去，太子的身体微微动了一下。又扎了几针，太子的手指动了动。再扎一针——太子突然睁开了眼睛！满屋子的人都惊呆了！","扁鹊又让弟子熬了药，给太子喝下去。太子喝了药，脸色慢慢红润起来。又调理了几天，太子完全恢复了健康，能跑能跳，和正常人一样！整个虢国都沸腾了：'扁鹊真是神医啊！把死人都救活了！'","可是扁鹊却很谦虚地说：'不是我能起死回生，是太子本来就没死。我只是帮他把邪气赶走，让他的气血恢复正常罢了。'他还说了一句名言：'我大哥治病，是在病情发作之前就能发现病因，病人根本不知道自己生病，我大哥就把病治好了。我二哥治病，是在病情刚刚开始的时候，病人只是有点不舒服，我二哥就把病治好了。而我治病，是在病情很严重的时候，病人很痛苦，我才能看出来，所以大家都觉得我医术最高。'","扁鹊的故事告诉我们：最高明的医生是治'未病'，就是还没生病就预防；同样，最聪明的人是在问题还小的时候就解决掉，不要等到问题严重了才着急！"],"tianji_saima":["战国时期，齐国有个大将军叫田忌，他特别喜欢赛马。他的马养得膘肥体壮，跑起来可快了。可是他的对手是齐威王——齐国的国王，马也养得特别好。每次比赛，田忌都输，输得灰头土脸。","田忌的谋士孙膑看在眼里，急在心里。孙膑是个特别聪明的人，虽然腿有点不方便（这是他以前被坏人陷害留下的残疾），但脑子可灵光了。他对田忌说：'将军，我有个办法，能让你赢！'田忌将信将疑：'真的假的？齐王的马比我的好，怎么可能赢？'","孙膑笑着说：'马的等级差不多，只是有上、中、下三等。你的上等马和他上等马比，可能差一点；但你的下等马和他的上等马比，那差太多了。我的办法是：用自己的下等马去输给他上等马，然后用自己的上等马去赢他的中等马，最后用自己的中等马去赢他的下等马。这样三局两胜，你就赢了！'","田忌听了，眼睛一亮：对啊！我怎么没想到！比赛那天，孙膑坐在田忌旁边当军师。第一场，田忌用下等马对阵齐王的上等马，果然输了。齐王哈哈大笑：'田忌啊田忌，你又输了！'田忌不慌不忙：'大王别急，还有两场呢！'","第二场，田忌派出上等马，齐王派出中等马。发令枪一响，田忌的马像离弦的箭一样冲了出去，把齐王的马甩得老远！齐王愣了一下：'咦？'第三场，中等马对下等马，田忌又赢了！最终2比1，田忌赢了整场比赛！","齐军溃败而逃，鲁庄公想立刻追击，曹刿却说：'等等，让我看看。'他下车看了看齐军撤退的车印，又上车望了望远方，说：'可以追了！'鲁军奋力追击，把齐军赶回了齐国。这一战，鲁国以少胜多，打了个大胜仗！","田忌赛马的故事告诉我们：很多时候，实力不是最重要的，智慧和策略才是取胜的关键。用自己的长处去攻击对方的短处，看似吃了小亏，却能赢得最后的胜利，这就是聪明人的做法！"],"caogui":["春秋时期，齐国和鲁国打起仗来了。齐国是个大国，军队人多势众；鲁国是个小国，军队人数少得多。鲁国的国王鲁庄公急得像热锅上的蚂蚁，召集大臣们商量对策。","这时，一个叫曹刿的人站了出来。他是个普通的读书人，穿着粗布衣裳就来了。有人问他：'你一个普通人，能帮大王打什么仗？'曹刿说：'大王治理国家要靠德行，打仗要靠智慧。普通人没官位，但关键时刻也能出谋划策啊！'鲁庄公听说后，亲自接见了他。","曹刿问鲁庄公：'大王，你凭什么能打赢这一仗呢？'鲁庄公想了想说：'我有很多金银财宝，吃的穿的都不缺。'曹刿摇摇头：'小恩小惠的东西，百姓不会为你拼命的。'鲁庄公又说：'我祭祀的时候特别虔诚，一点都不敢马虎。'曹刿还是摇头：'诚心是好的，但如果神明不能保佑你，虔诚也没用啊。'","鲁庄公挠挠头，又说：'哦对了！有一年闹灾荒，老百姓没饭吃，我把自己仓库里的粮食拿出来分给大家；有一年闹虫灾，我把自己家的粮食借给百姓。这些事情虽然不大，但老百姓都记在心里。我觉得，大家一定会支持我的！'曹刿这才点点头：'对！能得到百姓支持的人，才能够打胜仗！大王，咱们出发吧！'","两军在长勺摆开阵势。齐国军队擂响了战鼓，士兵们举着长矛，准备冲锋。鲁庄公也想擂鼓迎战，曹刿却说：'等等，别急。'齐军冲了一次，没遇到抵抗，疑惑地退了回去。过了一会儿，齐军又擂鼓冲锋，鲁庄公又想迎战，曹刿还是说：'再等等。'齐军冲了第二次，又没遇到敌人，只好又退回去。","齐军连续擂了三次鼓，士兵们冲了两次，都白费力气，开始不耐烦了，阵脚也乱了。曹刿看准时机说：'现在可以了！擂鼓，进攻！'鲁国的战鼓震天响，士兵们像猛虎下山一样冲了出去。齐军正在休息，没想到敌人突然杀到，顿时阵脚大乱，被打得落花流水！","齐军溃败而逃，鲁庄公想立刻追击，曹刿却说：'等等，让我看看。'他下车看了看齐军撤退的车印，又上车望了望远方，说：'可以追了！'鲁军奋力追击，把齐军赶回了齐国。这一战，鲁国以少胜多，打了个大胜仗！","战后，鲁庄公问曹刿：'为什么不能急着追击呢？'曹刿说：'齐国是大国，第一次撤退可能是假装失败引诱我们。但我仔细观察，他们撤退时车印很乱，旗帜也倒下了，说明是真的溃败，不是假装。所以可以放心追击！'鲁庄公恍然大悟：'原来打仗不仅需要勇气，还需要智慧和冷静的判断啊！'","曹刿论战的故事告诉我们：做事要抓住时机，不能操之过急；遇到问题要冷静分析，不能被表面现象迷惑；有勇有谋，才能成大事！"],"huatuo":["东汉末年，有一位神医叫华佗，他的医术神奇极了，会做外科手术，还会针灸治病，人们称他为'神医华佗'。传说华佗能看清病人身体里的问题，不管什么奇怪的病，他都能治好。","有一次，一个姓周的人得了很严重的病，整天拉肚子，看了很多医生都治不好。后来找到华佗，华佗看完后说：'你这病不是吃药能治好的，要先吃我的药，然后……我得先看看你肚子里有什么。'病人和家属都吓坏了：'看肚子里？那不是要把肚子切开吗？'华佗笑着说：'不用怕，我有办法。'","华佗给病人吃了一包药，然后让他躺下。过了一会儿，病人昏昏沉沉地睡着了。等病人醒来，华佗拿出一根长长的银针，说：'你的病根在这里，我给你扎一针就好了。'说完就把针扎了进去。病人只感觉肚子一疼，然后一阵轻松，病就好了！后来病人才知道，华佗用的其实是全身麻醉的方法，让病人睡着后，再做手术取病灶。这种方法比西方早了一千多年呢！","华佗不仅会治病，还特别注重预防保健。他观察到，很多人平时不注意锻炼，生病了才来看医生，往往已经晚了。于是他想：能不能发明一种方法，让人们在日常生活中就能锻炼身体、预防疾病呢？","有一天，华佗去山里采药，看见两只老虎在打架。两只老虎打完架后，竟然开始做起了运动——一会儿像鸟一样张开翅膀，一会儿像熊一样扭动腰身，一会儿像鹿一样伸长脖子……华佗看得入迷，心想：老虎这是在干什么呢？仔细一看，哦！原来老虎是在舒展筋骨、锻炼身体呢！","华佗受到老虎的启发，创造了一套健身方法，叫做'五禽戏'。'五禽'就是五种动物——虎、鹿、熊、猿、鸟。这套运动模仿老虎的扑跃、鹿的奔跑、熊的笨拙、猿的灵活、鸟的轻盈，让人体的各个部位都能得到锻炼。","华佗把这个方法教给了他的弟子吴普。吴普每天坚持练习五禽戏，活到了九十多岁，牙齿都没掉，头发也是黑的，眼睛还能看得很清楚！后来，五禽戏传了下来，成了中国传统的健身方法，到现在还有人在练呢！","华佗的故事告诉我们：预防比治疗更重要。平时多锻炼身体，保持健康的生活方式，比生病了再去找医生好多了！"],"houyi":["很久很久以前，天上有十个太阳，它们是东方天帝帝俊的儿子。每天，十个太阳轮流出勤，天上总是亮堂堂的，庄稼长得很好，人们生活得可开心啦！","可是有一天，十个太阳觉得一起出来玩耍更有趣，就手拉手一起跑了出来。这下可糟糕了！十个太阳同时照耀大地，河流被晒干了，庄稼被烤焦了，森林着起了大火，人们热得喘不过气来。","有一个叫后羿的大力士，他力大无穷，射箭的本领特别厉害。后羿看到人们受苦受难，心里难受极了。他拿起那张跟他一样高的神弓，背上满满一壶箭，决心要把多余的太阳射下来。","后羿登上了一座高高的山顶，拉开神弓，瞄准天空——嗖！第一支箭飞上了天，一个太阳应声落下，只剩下九个太阳了。嗖！嗖！又是两箭，又有兩個太阳掉了下来。","天上的太阳们吓坏了，它们东躲西藏，再也不敢一起出来了。只剩下一个太阳，每天从东方升起，从西方落下，给大地带来温暖和光明。庄稼又重新生长起来，人们又过上了幸福的生活。","后羿成了大英雄，大家都感激他。天上的神仙也很高兴，他们送给后羿一颗仙丹作为奖励。后羿射日的故事告诉我们：遇到困难不要害怕，只要有勇气和本领，就能帮助需要帮助的人！"],"lvmeng":["三国时候，东吴有一位将军叫吕蒙。吕蒙武艺高强，打起仗来特别勇猛，大家都叫他'吴下阿蒙'。可是吕蒙有个缺点——他从小家里穷，没有读过什么书，斗大的字不认识几个。","有一天，吴王孙权把吕蒙叫来，说：你现在是一军之将，要多读点书，增长点学问才行啊！吕蒙为难地说：王爷，我是个粗人，拿起书来就犯困，真不是读书的料啊！","孙权笑着说：你怎么比我还忙？我每天要处理那么多国家大事，还能抽出时间读书呢！你只要认真读，一定会有进步的。吕蒙听了王爷的话，不好意思再拒绝，就硬着头皮读起书来。","一开始，吕蒙读书的时候眼皮直打架，看着看着就想睡觉。可是他咬着牙坚持，今天读一页，明天读两页，慢慢地，他发现书里的故事还挺有意思的。","有一次，东吴的另一位大官鲁肃来找吕蒙商量事情。鲁肃是东吴有名的大学问家，他本来以为吕蒙还是那个只会舞刀弄枪的粗人，一见面却大吃一惊：哎呀，吕将军，你现在的谈吐和以前完全不一样了！","吕蒙哈哈大笑：我哪里还是从前的吴下阿蒙！士别三日，当刮目相待嘛！意思就是说，分别几天之后，就不能用老眼光来看人了。鲁肃听了，连连点头，对吕蒙更加敬佩了。","刮目相看的故事告诉我们：每个人都能改变自己，只要愿意学习、努力上进，就一定能让人刮目相看！"],"quyuan":["两千多年前，在楚国有一个特别有学问的人叫屈原。他从小就聪明好学，博览群书，长大后成为了楚国的大臣，为国家出谋划策。屈原特别爱国，他总想着让楚国变得强大起来。","可是楚国的一些奸臣嫉妒屈原的才能，他们经常在楚王面前说屈原的坏话。楚王听信了谗言，渐渐地疏远了屈原，最后甚至把他流放到了很远的地方。","屈原被流放后，心里非常难过。他一个人走在江边，看着滔滔的江水，想起了自己的祖国，忍不住痛哭起来。渔夫看见了，问他：你为什么这么伤心？屈原说：大家都浑浑噩噩，只有我一个人清醒；大家都醉生梦死，只有我一个人在坚持真理。我怎么能不难过呢？","后来，秦国攻打楚国，楚国眼看就要灭亡了。屈原听到这个消息，心如刀割。他不想看到自己的祖国灭亡，却又无能为力。公元前278年的五月初五，屈原抱着一块大石头，跳进了汨罗江。","人们听说屈原投江了，纷纷划着船去救他，还往江里投米粽喂鱼虾，生怕鱼虾吃掉屈原的身体。这就是端午节划龙舟、吃粽子的由来。","屈原虽然死了，但他的爱国精神永远留在了人们心中。他写的诗《离骚》、《九歌》等，成了千古传颂的经典。有一句诗说：路漫漫其修远兮，吾将上下而求索。意思是：追求真理的路虽然漫长，但我会一直努力探索。这句话激励了无数后人。","屈原的故事告诉我们：爱国是一种崇高的感情，无论身在何处，都不要忘记自己的祖国！"],"zuchongzi":["在一千五百多年前的南北朝，有一个叫祖冲之的科学家。他从小就特别喜欢数学和天文，常常捧着数学书看到忘记吃饭，晚上还会爬到屋顶上观察星星。","那时候，数学书上记载的圆周率是'径一周三'，意思是说圆的周长是直径的三倍。可是祖冲之觉得这个数字不太准确，他决定自己算一算，精确地量出圆周率的真正数值。","为了计算准确，祖冲之用竹子做了一些小棍子，叫做'算筹'。他把一根圆木棍截成两段，量出直径的长度，再用算筹一点一点地测量周长。白天量，晚上量，量了一遍又一遍。","那时候可没有计算器，所有的计算都要用算筹一根一根地摆。祖冲之摆了几万根算筹，算了几个月，终于算出了圆周率在3.1415926和3.1415927之间。","你知道吗？祖冲之算出的这个数字，西方人要等到一千年以后才能算出来呢！而且他还发明了一种新的计算方法，叫做'割圆术'，这种方法至今还被数学家们使用。","除了圆周率，祖冲之还发明了很多东西。他造出了指南车，让人在迷路的时候也能找到方向；他还制定了《大明历》，这是当时最先进的历法。","祖冲之的故事告诉我们：科学需要认真和坚持，不怕困难、追求真理的科学家最了不起！"],"tuibisan":["春秋时期，晋国有个公子叫重耳。他可不是一般的王子，因为他小时候太善良了，经常被人欺负，后来干脆逃出了自己的国家，四处流浪。","重耳带着一群忠心的随从，逃了很多很多地方。有一年，他们逃到了楚国。楚成王听说重耳来了，不但没有看不起他，还热情地接待了他们，摆下丰盛的酒席请他们吃饭。","楚成王在酒席上开玩笑问重耳：公子啊，如果以后您回到晋国当了国君，该怎么报答我呢？重耳想了想，认真地说：如果我真的能回去，以后两国打仗，我就退让三舍。","舍是古代的距离单位，一舍等于三十里。三舍就是九十里呢！大臣们都觉得重耳在说大话，可楚成王却记住了这句话，他觉得重耳是个知恩图报的人。","后来，重耳果然回到晋国当了国君，就是历史上著名的晋文公。几年后，楚国和晋国真的打起来了。晋文公想起了自己的承诺，立刻下令：后退九十里！","将士们都不理解了：大王，我们好不容易才打到这里，为什么要后退啊？晋文公说：我答应过楚王，退避三舍。这是我欠他的，我必须讲信用！","楚军看见晋军后退，以为晋军害怕了，就得意洋洋地追了上来。可是他们不知道，晋军退到了城濮，那里地形对他们非常有利。晋军以逸待劳，一下子把楚军打得大败！","楚军将领子玉狼狈地逃回了楚国，气得差点自杀。晋文公却并不骄傲，他说：这场胜利，是因为我们守信，得到了百姓的支持。不信守承诺的人，是不可能成功的！","退避三舍的故事告诉我们：有时候后退不是懦弱，而是为了更好地前进。讲信用的人，才能得到别人的尊重和帮助！"],"fenghuo":["西周的时候，有个国王叫周幽王。这个国王啊，整天就知道吃喝玩乐，不理朝政。大臣们急得团团转，可他呢，只顾着找乐子。","有一天，周幽王出去打猎，路上遇到一个美女。那美女长得可漂亮了，眼睛像星星一样亮，笑容像春天的花朵。周幽王一看，眼睛都直了：哎呀，这是谁家的姑娘？我一定要把她娶回宫！","这个美女叫褒姒，是个穷苦人家的女儿。周幽王用了很多金银珠宝才把她买回来。可是褒姒进了宫，却一点也高兴不起来，整天愁眉苦脸的，从来不笑。","周幽王急坏了：美人啊美人，你要什么我都给你！你怎么就是不肯笑呢？他变着法子逗褒姒开心——唱歌、跳舞、杂技表演……可是褒姒看了，一点反应都没有。","周幽王急得像热锅上的蚂蚁。这时，一个坏主意多的大臣虢石父来了：大王，我有办法让娘娘笑！周幽王赶紧问：什么办法？快说！","虢石父说：咱们西周不是有烽火台吗？如果有敌人来入侵，就点燃烽火，各路诸侯看见了就会带兵来救。大王可以点燃烽火，让诸侯们白跑一趟，娘娘看了肯定会笑的！","周幽王一拍大腿：好主意！他立刻跑到烽火台，点燃了烽火。远处的诸侯们看到烽火，以为敌人打来了，赶紧带上士兵，日夜兼程赶来救驾。","可是等他们气喘吁吁地赶到一看，什么敌人也没有！只见周幽王和褒姒坐在高台上，褒姒看见这么多人马狼狈的样子，果然笑了出来。诸侯们这才知道自己被骗了，气得吹胡子瞪眼。","后来，真的有敌人打来了。周幽王赶紧点燃烽火，可诸侯们以为又是骗人的，谁也不来救。最后，周幽王被敌人杀死了，西周也灭亡了。","烽火戏诸侯的故事告诉我们：诚信就像空气，失去了谁都活不了。拿诚信开玩笑的人，最终一定会自食其果！"],"jiangtaigong":["很久很久以前，有个白发苍苍的老爷爷叫姜子牙。他年轻的时候可苦了，卖过肉、开过酒店，干什么都不成功。别人都嘲笑他：姜子牙啊姜子牙，你就是天生穷命的相！","可是姜子牙不服气。他每天一边干活，一边读书，研究天文地理、军事政治。虽然日子过得穷巴巴的，但他的学问却越来越大了。","有一天，姜子牙听人说，西伯侯姬昌是个贤明的君主，正在招揽人才。姜子牙心想：这可是个机会啊！可是怎么才能见到他呢？","姜子牙灵机一动，想出了一个主意。他跑到渭水河边，用一根直直的鱼钩钓鱼！你没听错，是直直的鱼钩，不是弯的！这鱼钩别说钓鱼了，连鱼鳞都钩不住。","有人路过看见了，嘲笑他说：老人家，你这样能钓到鱼才怪呢！姜子牙笑眯眯地说：鱼儿鱼儿，愿者上钩！大家都觉得这个老头子疯了。","消息传到了西伯侯姬昌耳朵里。姬昌觉得有意思，就派了个人去看看。那个士兵到了河边，看见姜子牙果然用直钩钓鱼，忍不住笑出声来。","姜子牙头也不抬，念了一句：钓钓钓，大鱼不到小鱼到，小鱼不到虾蟆到！士兵觉得这人说话真有意思，就回去报告了姬昌。","姬昌亲自来了。他远远地看见姜子牙仙风道骨的样子，心里一震：这人不是普通人！他走到姜子牙面前，恭恭敬敬地说：先生，我请您出山，帮我治理天下！","姜子牙终于等到了这个机会。他跟着姬昌回到王宫，帮助姬昌发展生产、训练军队。后来姬昌的儿子周武王灭了商朝，建立了周朝。姜子牙被封为齐国国君，成了历史上著名的姜太公。","姜太公钓鱼的故事告诉我们：机会总是会来的，但前提是你要有真本事。姜子牙用直钩钓鱼，看似荒唐，实际上是在等一个懂他的人！"],"xiean":["东晋的时候，有个超级厉害的大臣叫谢安。他是当时最有智慧的人，老百姓都叫他江左夷吾，意思是说他是国家的顶梁柱。","公元383年，前秦的皇帝苻坚带着八十万大军浩浩荡荡地杀过来了！那军队可长了，前面已经过了河，后面还没出发呢！苻坚得意洋洋地说：长江天堑又怎样？我投鞭子就能把长江水断掉！","东晋朝廷吓坏了：八十万大军啊！东晋全部的军队加起来才八万人！这一比一的比例，怎么打啊？大臣们急得团团转，皇帝更是坐立不安。","谢安却很淡定。他说：大家别慌，我自有办法！他派自己的侄子谢玄带兵去迎战。谢玄有点紧张，问：叔叔，万一打败了怎么办？谢安笑着说：你就放心去打，天塌下来有我顶着！","大战之前，谢安和朋友们下棋打赌。他的朋友们都紧张得吃不下饭，只有谢安像没事人一样，还赢了赌局。有人问他：您不担心吗？谢安说：担心有什么用？我早就算好了！","谢玄到了前线，发现苻坚的军队虽然人多，但纪律松散，内部还不团结。他灵机一动，想出了一个计策：让士兵们大喊秦军败了！秦军败了！然后假装后退。","秦军果然中计了！后面的士兵以为前面打败了，开始往后跑。前面的士兵又以为后面的人要逃跑，也跟着跑了起来。一时间，八十万大军乱成一锅粥，自相践踏，死伤无数。","前线的捷报传回京城时，谢安正在和客人下棋。他看完信，随手放在一边，继续下棋。客人急了：战况怎么样了？谢安慢悠悠地说：没什么，就是孩子们把敌人打败了。","等客人走后，谢安高兴得跳了起来！他冲进书房，一不小心把木屐的鞋跟都碰断了！原来，他表面平静，心里其实紧张得很呢！这就是成语折屐齿的由来。","淝水之战告诉我们：打仗不在人多，而在人心。只要团结一心、以智取胜，小力量也能打败大军队！"],"linxiangru":["战国时期，赵国有个大功臣叫蔺相如。他本来只是个小门客，可是因为立了大功，被赵王封为上卿，地位比老将军廉颇还高！","廉颇心里可不高兴了。他想：我廉颇在战场上出生入死，打了多少胜仗！这个蔺相如不就是耍嘴皮子吗？凭什么地位比我还高！","廉颇气呼呼地说：哪天让我碰到蔺相如，一定要当众羞辱他一番！让他知道谁才是赵国的老大！这话传到蔺相如耳朵里，大家都以为蔺相如会生气。","可是蔺相如一点都不生气。有一天，他坐车出门，远远地看见廉颇的车迎面而来。他赶紧让车夫把车掉头躲开，躲得远远的。","蔺相如的手下都觉得很丢脸：大人，您怎么这么怕廉颇啊？我们在外面都抬不起头来了！蔺相如笑了笑，问：你们说，廉颇将军和秦王比，谁更厉害？","手下人说：当然是秦王厉害啊！蔺相如说：秦王那么厉害，我都敢当面训斥他，我怎么会怕廉将军呢？我躲着他，是因为赵国不能没有他啊！","蔺相如继续说：如果我和廉将军闹翻了，国家会怎么样？秦国知道我们内部不和，肯定会趁机打过来。到时候，赵国不就完了吗？我个人的面子，和国家的安危比起来，算什么呢？","手下人听了，感动得眼泪都快掉下来了。慢慢地，蔺相如不计较个人得失、一心为国的事传开了。廉颇听说了，脸一下子红了：哎呀，原来蔺相如是这样为国家着想的人啊！我真是太小心眼了！","廉颇脱掉上衣，背着一根荆条，走到蔺相如门口，跪下说：蔺大人，我知道自己错了！请您用荆条打我吧！蔺相如赶紧把他扶起来，说：将军知错就好，我们以后一起为赵国效力！","从此，蔺相如和廉颇成了最好的朋友，他们一起努力，让赵国变得越来越强。这就是负荆请罪和将相和的故事。","蔺相如和廉颇的故事告诉我们：朋友之间难免有误会，但只要多为对方着想，多为国家着想，就没有解不开的结！"],"yanzi":["春秋时期，齐国有个大名鼎鼎的外交家，名叫晏子。别看他个子矮矮的，只有六尺高，可他的嘴巴比刀子还厉害，谁也别想在他那儿占到便宜！","有一次，齐王派晏子出使楚国。楚王听说晏子要来，心里想：这个晏子不是号称能说会道吗？我倒要看看他有多厉害！于是他和大臣们商量好，要在晏子进城的时候好好羞辱他一番。","晏子的马车到了城门下，楚国士兵故意把城门关得紧紧的，只留了一个五尺高的小洞。楚王派人对晏子说：听说你个子矮，从这个洞钻进去就行了，何必费事开门呢？","晏子哈哈大笑，从马车里探出头来，说：这是狗洞，不是城门！我出使到狗国，才从狗洞进去呢！你们楚国是狗国吗？楚王听了，脸一下子红了，只好下令打开城门。","晏子大摇大摆地走进王宫。楚王正坐在高高的宝座上，看见晏子进来，故意装出一副惊讶的样子说：哎呀，齐国难道没有别的人了吗？怎么派你这么矮的人来出使？","晏子不慌不忙地说：大王有所不知，我们齐国有个规矩——出使上等国家，就派上等人去；出使下等国家，就派下等人去。我最不中用，所以就被派到楚国来了！","楚王见晏子伶牙俐齿，心里很不服气。他眼珠一转，想出了个坏主意，让人把一个犯人押上来，故意大声问：这人是哪里人？犯了什么罪？手下人说：是齐国人，犯了盗窃罪！","楚王故意看着晏子说：齐国人是不是天生就喜欢偷东西啊？晏子却不生气，他慢悠悠地说：橘子长在淮河以南又甜又大，长在淮河以北又苦又小，这是因为水土不同啊！齐国人在齐国好好的，到了楚国就偷东西——大概是因为楚国的水土让人变成小偷吧！","满朝文武听了，都被晏子的机智逗得哄堂大笑。楚王呢，脸涨得通红通红，再也不敢小看晏子了。他竖起大拇指说：晏子大夫真是名不虚传啊，本王服了！从此，楚国和齐国成了好朋友。"],"zhougong":["周武王建立周朝后，有个特别能干的弟弟叫周公。周公不但帮武王打天下，更是在武王去世后，尽心尽力辅佐年幼的小天子，被后人尊称为元圣。","周公有多忙呢？他每天要处理很多很多的国家大事，接见络绎不绝的来访者，还要制定各种规矩制度。有时候，他正在吃饭，外面突然有人求见。周公二话不说，赶紧把嘴里的饭吐出来，跑去接待客人。","吃完一口饭，又有人来，又要吐出来去接待。一顿饭下来，他要吐好几次呢！人们都说：周公吃饭可真不容易，嘴里还没嚼烂就跑出去了！","晚上，周公也闲不下来。他经常工作到半夜，批阅堆积如山的竹简文书。有时候实在困得睁不开眼了，就用冷水洗洗脸，继续干活。星星都睡觉了，他还在烛光下忙碌着。","周公还特别谦虚有礼貌。有一个叫伯禽的人来看他，伯禽是周公的儿子，刚被封到鲁国当诸侯。周公对儿子说：你到了鲁国，可千万要谦虚啊，不要因为是周天子的儿子就骄傲。","周公说：我是天子的弟弟，却要恭恭敬敬地接待每一个来访的人。你也要一样，对百姓要有礼貌，对有才能的人要尊重，这样人家才愿意帮你啊！","周公还经常去民间走访，看看百姓生活得怎么样。有一次，他发现一个老爷爷在路边哭泣，就赶紧上前问：老人家，您怎么了？老爷爷说：家里闹饥荒，没米下锅了。周公听了，心里可难受了。","回到王宫后，周公立刻下令打开粮仓救济灾民。他还亲自去探望那个老爷爷的家庭，送去了粮食和衣物。老爷爷感动得热泪盈眶：周公真是我们的好管家啊！","周公辛勤工作了一辈子，终于累倒了。临死前，他还在念叨着：百姓吃饱了吗？孩子们上学了吗？国家安定吗？人们为了纪念他，修建了周公庙，把他当作尊敬长辈的典范。","后来，曹操在诗里写道：周公吐哺，天下归心。就是说周公连吃饭都顾不上，一心为百姓着想，所以全天下的人都真心拥护他。"],"libai":["唐朝有个大诗人叫李白，他的诗写得可好啦！据说他在妈妈肚子里的时候，妈妈梦见天上的星星掉进了怀里，所以给他取名白——就是像白玉一样纯洁透明的意思。","李白从小就特别聪明，五岁就能背诗，十岁就写出了让人惊叹的文章。可是他最厉害的不是这个——他最喜欢喝酒！每天都要喝得醉醺醺的，然后才能写出好诗来。","有一年中秋节，李白在花好月圆的美景下喝起了酒。喝着喝着，他抬头看见又大又圆的月亮倒映在酒杯里，美得像一幅画。李白迷迷糊糊地说：月亮真美啊……我要飞上去看看！","说完，李白就摇摇晃晃地站起来，想要去捞月亮。他把船划到江中心，对着水里的月亮伸出手去捞——扑通！一下子掉进了江里。渔民们赶紧把他救上来，大家都笑得前仰后合。","虽然掉进了江里，李白却一点都不后悔。他躺在船上，望着天上的月亮，诗兴大发，大声朗诵起来：床前明月光，疑是地上霜。举头望明月，低头思故乡。这首诗后来成了千古名篇！","李白喝酒写诗的故事还有很多。有一回，皇帝唐玄宗请他进宫写诗，让他当场作一首夸赞杨贵妃的诗。李白喝了酒，脸红红的，一点都不紧张。他眯着眼睛，一边吟诵一边让太监高力士给他脱靴子。","高力士可是大权臣，平时谁敢指使他？可李白醉醺醺地说：脱！不脱就不写！高力士气得脸都绿了，但又不敢得罪皇帝，只好憋着气给李白脱了靴子。","李白就这样边喝酒边写，写出了《清平调》三首，把杨贵妃夸得跟天上的仙女似的。杨贵妃听了笑得合不拢嘴，连唐玄宗都鼓掌叫好。","李白的诗充满了想象力，一会儿飞到天上和月亮喝酒，一会儿又跑到蜀道上感叹山路难走。他的诗读起来特别有画面感，好像一幅幅画在眼前展开。","后来，人们都叫李白诗仙，因为他写的诗太厉害了，就像仙人作的一样。李白的故事告诉我们：做自己喜欢的事情，并且一直坚持，就能取得成功！"],"sushi":["北宋有个大文豪叫苏轼，字子瞻，号东坡居士，大家都叫他苏东坡。他可是个超级厉害的人物——诗词、散文、书法、绘画，样样精通，简直就是全能学霸！","苏东坡小时候特别聪明，读书过目不忘，写文章一挥而就。有一天，老师带着同学们去爬山，想考考大家的学问。爬到半山腰，老师指着远处的一座塔问：谁能以这座塔为题作首诗？","其他同学还在冥思苦想，苏东坡已经脱口而出。老师听得连连点头：这孩子将来一定能成大器！","苏东坡长大后当了官，可是他的官运不太好。因为他太正直了，总是说出真心话，得罪了不少人。有一次，他写诗批评新法，被人告发，差点丢了性命。","最后，苏东坡被贬到了黄州。那儿条件艰苦，薪水又少得可怜，苏东坡一下子变成了穷光蛋。可是他一点也不沮丧，反而在这里创造了著名的东坡肉！","苏东坡研究出了一套做红烧肉的方法：把五花肉切成方块，加上酱油和酒，用小火慢慢炖。他说：黄州好猪肉，价钱如泥土。贵者不肯吃，贫者不解煮。","苏东坡还经常自己下厨，邀请朋友们来家里吃东坡肉。朋友们吃了都赞不绝口。苏东坡笑着说：只要心态好，粗茶淡饭也是山珍海味！","后来，苏东坡又被贬到惠州、儋州，一次比一次远。可他依然乐观开朗，还发明了烤羊脊、烤生蚝等各种美食。他在诗里写：日啖荔枝三百颗，不辞长作岭南人。","苏东坡用他的故事告诉我们：人生难免遇到挫折和困难，但只要保持乐观的心态，就能在逆境中找到快乐。"],"baijuyi":["唐朝有个大诗人叫白居易，他写的诗特别通俗易懂，老百姓都能看懂。据说白居易写完诗后，都要先念给不识字的老人听，如果老人听不懂，他就继续修改，直到老人能明白为止。","白居易小时候家里穷，住在山脚下的小村子里。他特别喜欢读书，每天天不亮就爬起来，捧着书本在溪边朗诵。溪水哗哗地流，小鸟叽叽喳喳地叫，白居易觉得这是世界上最美的背景音乐。","有一天，白居易在村口的大树下读书，读着读着睡着了。村里有个卖炭的老奶奶路过，看见他睡得香甜，就在他旁边坐下休息。等白居易醒来，老奶奶说：小娃娃，你读的是什么书啊？","白居易揉揉眼睛说：是我自己写的诗！老奶奶笑了：那你能念给我听听吗？白居易大声念了起来。念完后，老奶奶皱着眉头说：有一句我没听懂……","白居易脸红了，赶紧问：哪一句？老奶奶指着诗说：就是这个卖炭得钱何所营，何所营是什么意思啊？白居易这才明白，原来是自己用了太文绉绉的词。","从那以后，白居易就特别注意把诗写得通俗易懂。他常去集市上、农田里，听老百姓聊天，学习他们说话的方式。慢慢地，他的诗越来越平易近人了。","白居易有一首著名的诗叫《赋得古原草送别》，里面有一句离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。这句诗简单又有哲理，连小朋友都能背诵！","还有一首《琵琶行》，讲的是一个琵琶女的故事。白居易在诗里写：同是天涯沦落人，相逢何必曾相识。这句话后来成了千古名句。","白居易后来当了官，做了很多好事。他曾经在杭州当刺史，带领百姓修建西湖堤坝，让更多的农田得到灌溉。杭州的百姓都叫他白使君。","白居易写诗的故事告诉我们：好东西应该让大家都懂，大诗人也能写出接地气的诗！只要用心，就能把复杂的事情说得简单明白！"],"zhangfei":["话说三国时候，刘备的军队被曹操的大军追得四散逃跑。关羽在前面开路，张飞断后护着刘备撤退。可曹兵越来越多，眼看就要追上来了！关羽在前面杀出一条血路，可后头的张飞身边只剩下二十几个骑兵，怎么办呢？","张飞骑在马上，瞪圆了眼睛，胡子都竖起来了。他心想：大哥和二哥（关羽）都在前面拼命，我张飞怎么能怕！我一个人也要挡住曹兵！","张飞带着二十几个骑兵，来到了当阳桥。这座桥可不一般，桥下是又深又急的河水，桥这边是蜀军，桥那边是曹操的千军万马！张飞站在桥头，横枪跃马，大喊一声：谁敢来与我决一死战！","这一声喊，可把曹兵吓了一大跳！张飞的声音像打雷一样轰隆隆的，在山谷里回荡。曹操的士兵们你看我，我看你，谁也不敢第一个冲上去。","张飞更得意了，他又大吼一声，声音比刚才还大：燕人张翼德在此！谁敢与我一战！这一声喊得更响了，曹操身边的将领都觉得耳朵嗡嗡的。曹操也被这气势震住了，他想起以前关羽说过：我三弟张飞，在百万军中取上将首级，如探囊取物！","曹操正犹豫着，忽然张飞又大喊一声：战又不战，退又不退，却是何故！这一声喊完，只听轰隆一声，桥断了！曹兵以为有埋伏，赶紧往后退。","原来啊，张飞早就让人在桥后面准备了，等曹兵一退，他就拆了桥，稳稳当当地撤退了。刘备听说后，直夸三弟智勇双全：张飞这一声吼，吓退了曹操的百万大军，真是太厉害了！","张飞喝断当阳桥的故事告诉我们：有时候勇气比武力更强大！在困难面前，只要鼓起勇气，就能创造奇迹！"],"qinshihuang":["两千多年前的战国时期，天下有七个国家整天打来打去，百姓们可遭殃了。今天这个国家来抢东西，明天那个国家来征兵，老百姓种的庄稼都被踩烂了，大家都盼着什么时候能过上太平日子。","在西方有一个国家叫秦国，国王叫赢政。这赢政从小就聪明过人，十三岁就当上了国王。可是那时候他还是个小孩，大权都在大臣手里。等他长大后，他先把那些欺负他的大臣一个个收拾了，然后开始统一天下的大业。","赢政心想：这么多国家打来打去，什么时候是个头啊？不如我把他们都灭了，让天下统一，百姓不就能太平了吗？于是他开始攻打其他六国。别的国家也有厉害的将军和军队啊，打起仗来可不容易！","赢政有个好帮手叫李斯，是个特别聪明的人。李斯给他出主意：咱们可以离间他们！比如今天请韩王吃个饭，明天给赵国送点礼，让他们互相猜疑，不就没法联合起来对付咱们了吗？赢政听了，连连点头：妙计妙计！","就这样，秦国用了十年时间，一个一个地灭了韩、赵、魏、楚、燕、齐六个国家。公元前221年，最后一个国家齐国也被灭了，赢政终于统一了天下！","统一之后，赢政可忙坏了。他让人把各国的城墙都拆了，修成一条条大路，叫驰道；他统一了钱币和文字，大家做生意方便多了；他还在北方修筑了万里长城，防止匈奴入侵。","赢政给自己起了一个新名字——秦始皇。他说：从今以后，我是第一个皇帝，以后还有二世、三世，一直传下去，传到千秋万代！可惜秦朝只传了两代就没了，但秦始皇统一中国的功劳，永远被人们记住了。","秦始皇统一六国的故事告诉我们：统一能带来和平与发展！虽然秦始皇也有缺点，但他统一中国的功绩，是中华民族历史上的大事件！"],"simaguang":["北宋时候，有一个叫司马光的小孩，住在一个大院子里。他的邻居们也都住在这附近，小伙伴们经常一起玩耍，大家最喜欢玩的就是捉迷藏和爬假山。","有一天，天气热得很，知了在树上叫个不停。几个小伙伴又聚在一起玩，忽然有人提议：咱们玩捉迷藏吧！大家纷纷赞同。石头、剪刀、布之后，一个叫小虎的孩子输了，他被蒙上了眼睛，其他小伙伴一哄而散。","一个小伙伴跑得太急了，没看清脚下有一个大水缸。这口缸可大了，比一个小孩子还高，里面装满了水，是院子里用来防火的。那孩子一脚踩空，扑通一声掉进了缸里！","缸里的水哗哗地流出来，那孩子挣扎着喊救命：救命啊！救命啊！可是他越挣扎，身体就越往下沉，水咕嘟咕嘟地灌进了他的嘴里、耳朵里、鼻子里。小伙伴们都吓坏了，有的哭了起来，有的喊大人。","司马光也吓坏了，可他比其他孩子大一点，心里也冷静一点。他看着那口大缸，又看看自己矮小的身板：不行啊，我够不到缸沿，缸又太高太滑，我爬不上去……","忽然，司马光看到地上有一块大石头，眼睛一亮：有了！他搬起那块大石头，瞄准水缸，用尽全身力气砸了下去——砰！哗啦啦啦！缸被砸破了一个大洞，水哗哗地流了出来。那个掉进缸里的小伙伴终于得救了！","大人们听到动静赶紧跑过来，看到满地的水和破了的大缸，又看看获救的孩子，都松了一口气。大家纷纷夸司马光：你真聪明！真勇敢！这件事传开后，人们都夸司马光是个遇事冷静、聪明机智的好孩子。","司马光砸缸的故事告诉我们：遇到危险不要慌，开动脑筋想办法，小脑袋也能解决大问题！"],"zhaojun":["两千多年前的西汉时候，有个叫王昭君的姑娘，她长得可漂亮了，是村子里最美丽的女孩。昭君不仅长得美，还弹得一手好琴，唱起歌来像百灵鸟一样动听。","皇帝听说民间有这么个美人，就把昭君选进了皇宫。昭君以为进了皇宫就能过上好日子，可谁知道，宫里有那么多漂亮的姑娘，昭君既不会讨好画师，也不会说好听的话，画师给她画像的时候，故意把她画丑了。","几年过去了，昭君连皇帝的面都没见过几次，她每天只能弹弹琴、绣绣花，心里闷闷不乐的。有一天，边境的匈奴人派使者来求婚，说匈奴的单于想娶一个汉族的公主做妻子。","皇帝正为这件事发愁呢：把自己的亲生女儿嫁到那么远的地方，谁舍得啊？这时，有个大臣悄悄说：陛下，后宫有个叫王昭君的宫女，长得挺漂亮的，要不让她去？皇帝想了想，点头同意了。","昭君听说后，心里又惊又喜。惊的是自己要嫁到那么远的北方，喜的是终于能离开这个冷清的皇宫了。出嫁那天，昭君穿着漂亮的红嫁衣，骑在马上，慢慢地离开了长安。","当车队走到边塞的时候，昭君忍不住弹起了琵琶。琴声悠扬，像在诉说着她的故事。忽然，天空中飞来了一群大雁，它们听到琴声，竟然忘了扇动翅膀，一只只掉落下来！人们都说：这就是昭君美得连大雁都看呆了！","到了匈奴，昭君成了单于的王后。她教匈奴人织布、种庄稼，还把汉族的文化带到了草原上。匈奴人再也不想打仗了，两边签订了和平协议，边境的老百姓终于过上了太平日子。","昭君出塞的故事告诉我们：美不只是外表，善良和勇敢才是真正的美。昭君用她的智慧和善良，换来了两个民族的和平！"],"liguang":["两千多年前的西汉时候，北方有一个强大的敌人叫匈奴。匈奴人骑着马到处抢东西，破坏村庄，百姓们苦不堪言。汉朝皇帝派了很多将军去打仗，其中最厉害的一个叫李广，大家都叫他飞将军。","李广武艺高强，射箭特别准，百步之内箭无虚发。有一天晚上，月亮又圆又亮，李广带着士兵们在山间巡逻。忽然，旁边的草丛里传来沙沙的声音，李广警觉地搭弓射箭，嗖的一声，箭射进了草丛里。","士兵们跑过去一看，都惊呆了——箭射中的不是什么野兽，而是一块大石头！可是那箭深深扎进石头里，只露出一点箭尾，这箭法也太神了吧！李广也觉得很奇怪：我再射一次试试。","李广又搭弓射箭，嗖嗖嗖连射几箭，可这些箭都弹开了，根本射不进石头。有人笑着说：也许刚才那一箭是碰巧射进石头缝里了吧？李广想了想，觉得也是，就没有再试。","后来过了很多年，人们才知道，原来李广第一次射箭的时候，正好是月亮最亮的时候，在那一瞬间，李广的眼睛特别亮，力气也特别大，加上他专心致志，所以那一箭的力量特别大，竟然射穿了石头！","李广驻守边关四十多年，和匈奴打了一百多场仗，每次都冲锋在前。士兵们都愿意跟着他打仗，因为他不仅武艺高强，还特别爱护士兵，行军的时候他和士兵们同吃同住，一点架子都没有。","虽然李广那么厉害，可是他一辈子都没有被封侯。有人说他运气不好，可李广从不抱怨，他总是说：只要匈奴人不敢来侵犯，百姓能过上太平日子，我就心满意足了。","李广射虎的故事告诉我们：真正的英雄不一定要被封官加爵，能保护百姓、让人们过上好日子，才是真正的大英雄！"],"luban":["两千五百多年前，中国出了一个超级厉害的工匠，他的名字叫鲁班。鲁班从小就跟爸爸学做木工，他的手可巧了，不管什么木头，到了他手里，都能变成有用的东西。乡亲们都夸他：小小年纪，手艺就超过他爹啦！","有一天，鲁班上山砍木头。山路很陡，到处都是野草和荆棘。鲁班走得满头大汗，一不小心，手被一种野草划破了。鲜血直流，疼得他直吸冷气。鲁班仔细一看，咦？这草叶子边缘有好多小牙齿，怪不得这么锋利！","鲁班忍着疼，心里却冒出了一个奇妙的想法：如果我也用这种带齿的铁片锯木头，是不是也能又快又省力呢？他赶紧跑回家，找铁匠师傅帮忙，打造了一根带齿的铁片。","鲁班拿着这个奇怪的东西去锯木头，嘿！还真管用！木头像豆腐一样被锯开了，又快又省力！这就是锯子的来历。鲁班高兴得像个孩子，逢人就炫耀：看，我发明的锯子！","除了锯子，鲁班还发明了好多好多东西呢！他看到人们用桶去河里提水，太累了，就发明了辘轳——一种利用绳子转圈就能把水桶从井里拉上来的工具。他还发明了墨斗，就是木匠用来画直线的工具，到现在还在用呢！","鲁班还想出了用木头做云梯的方法，帮助士兵们爬城墙打仗。他还用木头做了一只木鸟，据说能在天上飞三天三夜不停！虽然后来没人见过这只木鸟，但大家都相信，以鲁班的手艺，一定能做出这样的神奇东西。","鲁班的名声越传越远，连后来的木匠们都把他叫做祖师爷——就是这一行的老祖宗。现在我们用的很多工具，最早都是鲁班发明的。他的故事告诉我们：多观察、多思考，就能创造出改变世界的东西！"],"libing":["战国时候，四川这个地方可不是现在的天府之国。那时候常常发大水，洪水一来，老百姓的房屋被冲垮，庄稼被淹没，日子苦得没法说。大家年年祈求老天爷保佑，可洪水还是年年都来。","后来，秦国的国王派了一个叫李冰的人来当蜀郡的郡守，就是管理四川的大官。李冰带着他的儿子二郎，来到岷江边考察。他们走遍了千山万水，终于找到了洪水泛滥的原因：原来岷江上游的水流太急了，带着很多泥沙冲到下游，就把河道堵住了！","李冰和二郎想了很久，终于想出了一个绝妙的主意：与其堵住洪水，不如让洪水自己分流！在江中间建一个分水的堤坝，把岷江的水分成两条河，一条流向外江（泄洪道），一条流向内江（灌溉渠）。这样洪水来的时候，就不会全部挤在一起冲毁村庄了。","这个办法说起来容易，做起来可太难了！那时候没有挖掘机，没有起重机，全靠人工一锄头一锄头地挖，一扁担一扁担地挑。李冰带着老百姓，日日夜夜地干活，手上磨出了血泡，血泡又变成了老茧。","最难的是凿穿玉垒山，把水引到东边去。玉垒山坚硬得像铁一样，锤子砸下去只能留下一个小白点。有人泄气地说：这么大的山，什么时候才能凿通啊？李冰坚定地说：只要我们坚持不懈，子子孙孙一代代挖下去，总有一天会挖通的！","就这样，李冰父子带领四川人民，花了好几十年时间，终于建成了都江堰。这个水利工程太神奇了！它不需要大坝，不需要闸门，却能自动分流、自动排沙、自动灌溉。两千多年来，都江堰一直默默地保护着四川平原，让这里变成了天下最富饶的地方。","直到现在，都江堰还在发挥作用，灌溉着上千万亩农田！李冰父子虽然早已不在了，可是他们的智慧和功劳，永远留在了四川人民的心中。都江堰的故事告诉我们：真正的伟大，是为大多数人造福；真正的智慧，是顺应自然、与自然和谐相处！"],"zhangzhongjing":["一千八百多年前，中国出了一位了不起的医生叫张仲景。他从小就是个特别聪明的孩子，妈妈生病的时候，小小的他就开始翻看各种医书，想办法给妈妈治病。慢慢地，他的医术越来越好，远近闻名，大家都叫他医圣。","有一年冬至，张仲景从长沙做官告老还乡，回到家乡河南。路上，他看到很多穷苦百姓，衣裳破破烂烂，脸上冻得发紫，耳朵上长满了冻疮，严重的甚至耳朵都烂掉了。张仲景心里特别难受。","他停下脚步，对随行的人说：这些人太可怜了！冬至是一年最冷的时候，耳朵最容易冻伤。我得想办法帮帮他们！","张仲景回到家乡后，马上让人搭起了一个大棚，支起一口大锅。他亲自配方熬药，这种药汤是用羊肉、辣椒和祛寒的药材一起煮的，煮得香喷喷的。然后他把药汤分成一小碗一小碗，还在每碗汤里包上两个弯弯的面食，形状就像耳朵一样。","张仲景让人在大街上喊：快来喝汤啊！免费的！穷人们听了，半信半疑地走过来。张仲景亲自给他们盛汤、递饺子，笑眯眯地说：趁热喝，喝完再吃这两个耳朵，保你耳朵不冻烂！","人们喝了热汤，吃了饺子，浑身暖和起来，耳朵也不那么疼了。大家感激地说：张大夫真是活菩萨啊！这种药汤和饺子，后来就传了下来。每年冬至吃饺子的习俗，就是为了纪念张仲景。","张仲景不仅发明了饺子，他的医术更是高明得不得了。他把自己一生的行医经验写成了一本书，叫《伤寒杂病论》，这本书后来成了中医最重要的经典之一。直到现在，人们生病了还经常按照这本书的方子抓药呢！","张仲景与饺子的故事告诉我们：真正的医生不只会治病，更会关心病人。在自己有能力的时候，帮助那些需要帮助的人——这份温暖，比任何药方都珍贵！"],"sangu_bio":["东汉末年，天下大乱，英雄豪杰纷纷崛起。有一位叫刘备的王爷，虽然身边有关羽、张飞这样武艺高强的大将，却总是打败仗。他心里着急啊：为什么我总是输呢？后来他听说有个叫诸葛亮的人，住在隆中的草屋里，上知天文，下知地理，聪明得不得了！","刘备决定要去请诸葛亮出山帮忙。第一次，他带着关羽、张飞翻山越岭来到诸葛亮的草屋前。结果呢？诸葛亮出门了，去找朋友玩了！张飞不高兴地说：大哥，这人架子也太大了，不如我把他绑来吧！刘备摇摇头：不不不，咱们下次再来。","第二次，大雪纷飞的冬天，刘备又去请诸葛亮。关、张二人在门口冻得直跺脚，嘴里喷出的白气一团一团的。张飞抱怨说：大哥，外面这么冷，那小子说不定又在睡觉！可他们敲了半天门，诸葛亮的书童说：先生还在睡觉呢，请改天再来吧。","第三次，刘备选了个好日子，斋戒了三天，恭恭敬敬地来到草屋。这一次，诸葛亮终于在家了！刘备一进门，就看见诸葛亮坐在书桌前，正在认真地看书呢。诸葛亮抬起头，看见刘备这么真诚，心里很感动。","两个人坐下来聊天。刘备诚恳地说：现在汉朝快要完了，奸臣当道，百姓受苦。我虽然有点志向，却没什么才能。请先生教教我，该怎么拯救天下啊？","诸葛亮笑了，他站起身，走到墙上挂着的地图前，指着地图说：我有一个计策，叫做隆中对！曹操占了北方，地广兵多，不能硬碰；孙权占了江东三代经营，可以做朋友；咱们应该先拿下荆州，再取益州，然后三分天下！","刘备听了，眼睛越来越亮，他激动地说：先生说得太对了！我找了这么久，终于遇到真正的智囊了！从此，诸葛亮成了刘备最信任的军师，帮他出谋划策，建立了蜀汉政权。三顾茅庐的故事告诉我们：真诚和坚持能打动人心，有志者事竟成！","刘备三顾茅庐的故事告诉我们：真诚和坚持能打动人心，有志者事竟成！"],"zhangqian_bio":["两千多年前的西汉时候，中国人穿的都是用蚕丝做的丝绸。可那时候，中原的人根本不知道，在遥远的西方，还有一个叫做大月氏的国家，那里的人也会做丝绸，而且他们的国王被匈奴人欺负得可惨了！","汉武帝听说后，心想：如果能联合大月氏，一起打匈奴，那不就太好了吗？可是去大月氏，得穿过匈奴的地盘啊，那不是送死吗？汉武帝皱起眉头，张贴告示：谁愿意去出使大月氏？","一个叫张骞的年轻人站了出来，他虽然是朝廷里一个小小的郎官，可胆子大得很！公元前139年，张骞带着一百多人，从长安出发，踏上了这条不归路。","果然，他们刚走到河西走廊，就被匈奴人抓住了。匈奴王把张骞关起来，还派了匈奴姑娘给他做老婆，想让他投降。可张骞心里一直想着自己的使命，他一边放羊，一边偷偷观察匈奴人的地形和兵力，等待逃跑的机会。","整整十年后，张骞终于找到了一个机会，他骑着马，带着几个手下，趁着夜色逃了出来！他们穿过沙漠，翻过雪山，走了好久好久，最后终于来到了大月氏。","可惜啊，大月氏的人已经被迁移得太远太远，早就不想打仗了。张骞虽然没能说服他们联合打匈奴，可他收获了满满一路的见闻——他看到了葡萄、石榴、胡萝卜，还学会了制作毛毯的手艺。","张骞回国后，把他看到的一切都报告给了汉武帝。大家这才知道，原来在遥远的地方，还有那么多奇妙的国家和神奇的物产！汉武帝高兴极了，又派张骞出使西域各国。","从此，一条横跨亚洲的商路被开辟出来了！中国的丝绸、茶叶、瓷器运到了西方，西方的宝马、香料、瓜果也来到了中国。这条路，就是著名的丝绸之路！张骞用他的勇气和坚持，打开了中国人看世界的窗户，他是真正的探险家，也是丝绸之路的奠基人！"],"zhaoyun":["三国时候，刘备的军队被曹操的大军追得四处逃窜。在混乱中，刘备的老婆糜夫人抱着小阿斗（刘备的儿子）躲进了乱军里。赵云是刘备手下最勇猛的将军，他本来负责保护刘备，可他一发现糜夫人和小阿斗走散了，心都提到嗓子眼儿了！","不行！我一定要把他们找回
