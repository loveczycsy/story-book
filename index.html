<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=3,user-scalable=yes">
<title>历史绘本故事集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #e8b87a;
    --primary-light: #f5d9b3;
    --secondary: #8b5a3c;
    --accent: #c75c2c;
    --bg: #fdf8f3;
    --card-bg: #fff;
    --text: #3d2914;
    --text-light: #6b5642;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
    font-family: 'LXGW WenKai','STKaiti','KaiTi','楷体',serif;
    background: var(--bg); color: var(--text); line-height: 1.8; min-height: 100vh;
}
.home-page { padding:20px; max-width:800px; margin:0 auto; }
.home-header { text-align:center; padding:30px 0 10px; }
.home-title { font-size:2rem; color:var(--secondary); margin-bottom:10px; }
.home-subtitle { color:var(--text-light); }
.toolbar {
    display:flex; justify-content:space-between; align-items:center;
    margin:20px 0 10px; flex-wrap:wrap; gap:10px;
}
.filter-tabs { display:flex; gap:8px; flex-wrap:wrap; }
.filter-tab {
    padding:7px 14px; border:2px solid var(--primary); border-radius:20px;
    background:transparent; color:var(--secondary); font-family:inherit;
    font-size:0.9rem; cursor:pointer; transition:all 0.3s;
}
.filter-tab.active { background:var(--primary); color:#fff; }
.view-toggle {
    display:flex; gap:4px; background:var(--primary-light); border-radius:10px; padding:3px;
}
.view-btn {
    padding:6px 12px; border:none; border-radius:8px; background:transparent;
    color:var(--secondary); font-size:1.1rem; cursor:pointer; transition:all 0.2s; font-family:inherit;
}
.view-btn.active { background:#fff; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.refresh-btn {
    padding:6px 14px; border:2px solid var(--primary); border-radius:10px;
    background:transparent; color:var(--secondary); font-size:0.9rem;
    cursor:pointer; transition:all 0.3s; font-family:inherit;
}
.refresh-btn:hover { background:var(--primary-light); }
.refresh-btn:active { transform:scale(0.95); }
.date-section { margin-top:24px; }
.date-header {
    font-size:1.1rem; color:var(--secondary); font-weight:bold;
    padding:10px 0 8px; border-bottom:2px solid var(--primary-light);
    margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.date-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); display:inline-block; }
.date-count { font-size:0.8rem; color:var(--text-light); font-weight:normal; margin-left:4px; }
.stories-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px;
}
.story-card {
    background:var(--card-bg); border-radius:14px; overflow:hidden;
    box-shadow:0 3px 12px rgba(139,90,60,0.08); cursor:pointer;
    transition:transform 0.3s,box-shadow 0.3s;
}
.story-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(139,90,60,0.14); }
.card-img { width:100%; aspect-ratio:3/4; object-fit:cover; background:var(--primary-light); }
.card-content { padding:10px 12px; }
.card-title { font-size:1rem; color:var(--secondary); margin-bottom:4px; line-height:1.4; }
.card-meta { display:flex; justify-content:space-between; font-size:0.78rem; color:var(--text-light); }
.card-tag { background:var(--primary-light); color:var(--secondary); padding:2px 8px; border-radius:8px; font-size:0.75rem; }
.stories-list { display:flex; flex-direction:column; gap:10px; }
.story-list-item {
    display:flex; align-items:center; gap:12px; background:var(--card-bg);
    border-radius:12px; padding:10px 14px; cursor:pointer;
    box-shadow:0 2px 8px rgba(139,90,60,0.06); transition:all 0.2s;
}
.story-list-item:hover { box-shadow:0 4px 14px rgba(139,90,60,0.12); }
.list-img { width:56px; height:72px; border-radius:8px; object-fit:cover; flex-shrink:0; background:var(--primary-light); }
.list-info { flex:1; min-width:0; }
.list-title { font-size:1rem; color:var(--secondary); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.list-era { font-size:0.82rem; color:var(--text-light); }
.list-tag { font-size:0.75rem; color:var(--accent); background:var(--primary-light); padding:1px 8px; border-radius:6px; display:inline-block; margin-top:2px; }
.story-page { display:none; max-width:600px; margin:0 auto; padding:20px; }
.story-page.active { display:block; }
.back-btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:8px 16px; background:var(--primary); color:#fff;
    border:none; border-radius:20px; font-family:inherit;
    font-size:0.95rem; cursor:pointer; margin-bottom:20px;
}
.story-header { text-align:center; margin-bottom:20px; }
.story-title { font-size:1.8rem; color:var(--secondary); margin-bottom:10px; }
.story-era { color:var(--text-light); font-size:0.95rem; }
.story-img {
    width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:12px;
    margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.1); background:var(--primary-light);
}
.story-paragraph { font-size:1.1rem; line-height:2.2; text-indent:2em; margin-bottom:20px; text-align:justify; }
.moral-card {
    background:linear-gradient(135deg,#fff8e7 0%,#ffecb3 100%);
    border-radius:16px; padding:20px; margin-top:30px; border-left:4px solid var(--accent);
}
.moral-title { font-size:1.1rem; color:var(--accent); margin-bottom:10px; font-weight:bold; }
.moral-text { font-size:1.05rem; color:var(--text); line-height:1.8; }
.hidden { display:none !important; }
@media (min-width:768px) { .rb { max-width:600px; margin:0 auto; } }
.fade-in { animation:fadeIn 0.3s ease-in; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="homePage" class="home-page fade-in">
    <div class="home-header">
        <h1 class="home-title">📚 历史绘本故事集</h1>

    </div>

            <button class="filter-tab" data-filter="名人传记">名人传记</button>

        <div style="display:flex;gap:8px;align-items:center;">

                <button class="view-btn" data-view="list" title="列表视图">☰</button>

            <button class="refresh-btn" onclick="location.reload()" title="刷新">🔄 刷新</button>
        </div>
    </div>
    <div id="storiesContainer" class="rb"></div>
</div>
<div id="storyPage" class="story-page rb fade-in">
    <button class="back-btn" onclick="showHome()">← 返回首页</button>
    <div id="storyContent"></div>
</div>

之母，只要平时多观察、多思考，再普通的事物里也可能藏着大秘密！", "n": 0, "c": "名人传记", "imgKey": "watt"}];
const P = {"盘古开天辟地": {"paragraphs": ["很久很久以前，在那个连天和地都还没分开的年代，整个宇宙就像一个大鸡蛋，圆滚滚、黑乎乎的，什么都看不见。在这片混沌之中，躺着一个叫盘古的巨人，他睡得可香啦，足足睡了一万八千年那么久！", "有一天，盘古忽然睁开了眼睛。周围黑漆漆的，什么也看不清，他急得挥起拳头朝四周砸去——轰隆隆！大鸡蛋裂开了一道缝，光透了进来！原来是轻飘飘的东西往上飘，变成了蓝蓝的天空；沉甸甸的东西往下坠，变成了厚厚的大地。", "盘古可高兴了，他站起身，头顶天，脚踩地。为了不让天再塌下来，他每天都努力长高，天就每天升高一丈；地就每天加厚一丈。风儿吹过他的耳边，雨儿落在他的肩头，日复一日，年复一年，又过了一万八千年。", "终于，天变得又高又远，地变得又厚又实。可盘古实在太累太累了，他轰的一声倒在了地上，再也没有起来。他的左眼变成了红红的太阳，右眼变成了白白的月亮。", "他的头发飞上了天，变成了闪闪的星星。他的呼吸变成了轻柔的风，他的血液变成了奔腾的江河，他的骨头变成了地下的矿石，他的汗水变成了滋润万物的雨露。", "盘古用他整个的身体，创造了我们这个美丽的世界。每当我们仰望星空，看到太阳和月亮，都应该感谢这位伟大的巨人——盘古！", "盘古开天辟地的故事告诉我们：伟大的事业需要无私的奉献和坚持不懈的努力！"], "imgKey": "pangu"}, "女娲补天": {"paragraphs": ["传说在很久很久以前，水神共工和火神祝融打起仗来。共工打不过，一气之下撞断了撑天的柱子——不周山。天塌了一半，大地裂开了好多好多口子，洪水到处乱流，大火到处乱烧，野兽也跑出来伤害人们，大家可害怕了！", "女娲是人类的母亲，她看到自己创造的人们受苦受难，心里可疼了。她决定要把天补好，让人们重新过上平安的日子。", "女娲走遍了千山万水，历经千辛万苦，终于在昆仑山上找到了五种颜色的石头——青色的、红色的、黄色的、白色的、黑色的。她架起一口大锅，用神火把这些石头熔化成液体。", "女娲飞到天上，一点一点地补着天上的窟窿。这活儿可真辛苦啊！她的手被烫起了一个个大水泡，肩膀酸得都快抬不起来了，翅膀也累得扑扇扑扇的。可她一刻也不肯停下来，因为她知道人们在等着她。", "终于，天上最后一个大窟窿被补好啦！可是天还是歪歪的，摇摇晃晃的。女娲又四处寻找，最后找来一只巨大的神龟，砍下它的四条腿，竖在大地的四个角落，把天空稳稳地撑住。", "从此，天再也不会塌下来了，洪水也退去了，大火也熄灭了。人们又回到了田野，重新种起了庄稼，过上了平平安安的日子。大家都感激地说：多亏了女娲娘娘啊！", "女娲补天的故事告诉我们：看到别人受苦就要勇敢地帮忙，哪怕再难再累也要坚持到底！"], "imgKey": "nuwa"}, "大禹治水": {"paragraphs": ["很久以前，天下突然发了大洪水，洪水像凶猛的野兽一样冲垮了房屋，淹没了田地，人们无处可逃，四处流浪乞讨。住在岸边的部落首领鲧想了一个办法——用泥土和石块把洪水堵住。", "可是你知道吗？光堵是堵不住的！洪水越堵越高，最后冲破了堤坝，淹没了更多的村庄。鲧的办法彻底失败了，他也因为治水不力被处罚了。", "鲧的儿子大禹长大了，他接过了父亲的重任。大禹想：堵不是办法，得让洪水有地方流走才行！于是他改用疏导的方法，带领百姓挖河开渠，把洪水引向大海。", "大禹每天都和百姓一起干活，风里来雨里去，从不偷懒。他的手上磨出了厚厚的茧子，脚上全是水泡，脸也被太阳晒得黑黑的，但他从不说苦。", "大禹刚结婚才四天，听说洪水还在危害百姓，就告别了新娘子出门治水去了。在接下来的十三年里，他三次路过自己的家门，听到屋里妻子温柔的声音和孩子们嬉闹的笑声，可他一次也没有进去看过。", "他心里多想进去抱抱妻子、亲亲孩子啊！可是他想，如果我回家了，洪水就会继续伤害更多的家庭。最后一次路过时，他听到妻子对孩子们说：你们的爸爸是个英雄，正在保护我们呢！大禹听了，眼泪在眼眶里打转，但他的脚步还是没有停下。", "经过十三年的努力，九条大河终于被疏通了，滔滔的洪水乖乖地流进了大海。田地重新露出了水面，人们又回到了自己的家乡，过上了幸福的生活。大家感激地说：大禹真是我们的救命恩人啊！", "大禹治水的故事告诉我们：遇到问题要动脑筋找对方法；为了大家的幸福，有时要舍小家为大家！"], "imgKey": "dayu"}, "曹冲称象": {"paragraphs": ["三国时候，有人送给曹操一头大象。哇，这头大象可大了！腿像四根粗粗的大柱子，耳朵像两把大大的扇子，身子像一堵高高的墙。大象慢悠悠地走着，鼻子甩来甩去，可威风了！", "曹操和大臣们都想看看这头大象有多重，可是大象那么大，哪有那么大的秤啊？有人说把大象切成一块一块的称，可那大象不就死了吗？大家你看看我，我看看你，谁也想不出好办法。", "这时候，曹操七岁的小儿子曹冲从人群里钻了出来。他眨巴眨巴大眼睛，忽然说：我有一个办法！曹操笑着说：哦？那你说说看。", "曹冲拍拍手说：很简单！先把大象赶上这艘大船，看船身下沉到哪里，就在船舷上画一条线。然后把大象牵上岸，再往船上装石头，装到船沉到画线的地方。最后啊，只要把石头一筐一筐地称出来，加在一起，不就是大象的重量了吗？", "大臣们听了，眼睛都亮了起来！曹操也连连点头：好办法，好办法！于是大家照着曹冲说的做，先把大象赶上船，在船舷上画线，再一块块往船上装石头，最后称石头的重量，果然称出了大象的重量！", "大臣们纷纷竖起大拇指，夸赞道：这孩子才七八岁，怎么这么聪明啊！曹操摸着胡子，得意地笑了：我的冲儿，真是我的好儿子啊！曹冲称象的故事告诉我们：别人说不可能的时候，不要轻易放弃，换个角度想一想，也许办法就出来了！"], "imgKey": "caochong"}, "精卫填海": {"paragraphs": ["在很久很久以前，太阳神炎帝有一个最疼爱的小女儿，名叫女娃。女娃长得漂亮又可爱，她最喜欢到东海去玩耍。蓝色的海水波光粼粼，海鸥在天空飞翔，小鱼在浪花里跳跃，女娃玩得可开心啦！", "可是有一天，灾难突然降临了！东海的上空刮起了狂风，掀起了巨浪，一个比房子还高的浪头猛地扑过来，把女娃的小船打翻了。无情的大海吞没这个可怜的小姑娘。", "女娃不甘心就这样死去，她的灵魂化作了一只小鸟。这只小鸟长得很特别：小小的脑袋上长着花色的羽毛，白白的嘴巴尖尖的，红红的脚爪细细的。它飞在天空中，不断地叫着：精卫！精卫！人们就把它叫做精卫鸟。", "精卫恨透了夺走她生命的大海。她望着无边无际的大海，心里想：都是你害死了我，我一定要把你填平！于是，她每天从西山的树林里衔起小石子，又衔起小树枝，飞到东海上空，把它们投进大海里。", "大海看着这只小小的鸟儿，忍不住嘲笑它：小鸟儿，你这样子，要干一百万年也填不平我呀！还是回家歇着去吧！", "精卫坚定地回答说：就算一千万年！就算一万万年！我也一定要填平你！我绝不放弃！说完，它又扑扇着翅膀，飞向西山，去衔新的石子和树枝了。", "日复一日，年复一年，精卫从不休息，从不间断。虽然它那么弱小，可它那坚定的身影，却成了天空中最美丽的风景。它告诉我们：不管别人怎么说，认定了目标就坚持去做——不放弃本身就是一种了不起的力量！"], "imgKey": "jingwei"}, "神农尝百草": {"paragraphs": ["在远古时候，人们靠打猎和采集野果生活。可是你知道吗？那时候人们还不知道什么植物能治病，生病了只能硬扛着，很多人因为得不到救治就这样失去了生命。", "部落的首领神农看到人们受苦，心里着急极了。他决定要把所有能治病的植物都找出来，教会人们用草药治病。于是，他告别了家人，独自走进了深山老林。", "神农亲自品尝每一种他遇到的植物——甜甜的果子、苦涩的草根、辣辣的叶子、麻麻木木的树皮。他仔细分辨：这种草吃了肚子疼，不能吃；那种花泡水喝可以退烧，可以记下来。", "传说神农有一双神奇的眼睛，他的肚子像水晶一样透明，能清清楚楚地看到吃进去的植物在身体里的变化——哪株草在胃里发热，哪个根在肠子里发凉，一看就知道它们能治什么病。", "可是尝草治病太危险了！有时候一天之中就要中毒好几次。神农的肚子疼得直打滚，脸都变绿了，冷汗直往下流。身边的人赶紧给他吃解毒的草药，他才慢慢缓过来。", "虽然这么辛苦，神农却从不肯停止。因为他心里想着：每多尝出一种有用的药，就能多救一个人的命！就这样，他尝遍了山里的各种植物，最后终于总结出了一百多种可以治病的草药。", "神农把这些草药的形状、颜色、味道、功效都告诉了人们，还画成了图。从那以后，人们生了病就知道该吃什么草药，再也不用害怕了。后人尊称他为：医药之祖！神农尝百草的故事告诉我们：帮助别人需要勇气，更需要行动！"], "imgKey": "shennong"}, "卧薪尝胆": {"paragraphs": ["春秋时候，越王勾践带领着越国的军队和吴国打仗。可是吴国太强大了，越国大败，越王勾践也被抓去当了俘虏。他住在简陋的石屋里，白天养马、喂马，晚上就睡在柴草堆上。堂堂一国之君，现在却要干下人的活儿，吴王夫差还经常羞辱他。", "三年后，吴王终于把勾践放回了越国。勾践一回到自己的国家，就搬出了豪华的王宫。他让人在地上铺上柴草，睡在硬邦邦的柴草上——这哪里是睡觉啊，简直是受罪！", "可是勾践觉得这样还不够。每天吃饭前、睡觉前，他都要舔一舔挂在房梁上的苦胆。那苦胆的味道可真苦啊，苦得舌头发麻、眼泪直流！勾践的心里想着：这苦胆的味道，就是在提醒我——不要忘记在吴国受到的耻辱，不要忘记越国人民的期望！", "勾践不仅自己吃苦耐劳，还和百姓一起下地干活。他的王后也带头织布，养蚕种桑。勾践还鼓励老百姓多开垦荒地、多种粮食，人口也要越来越多。十年生聚，十年教训，越国一天天地强大起来。", "二十年过去了，勾践觉得报仇的时机终于成熟了。他亲自率领越国的精兵，向吴国发起进攻。这一仗打得可激烈了！越国的士兵们一个个奋勇杀敌，因为他们都知道：我们的王卧薪尝胆二十年，就是为了今天！", "最后，越国大获全胜，打败了吴国，彻底洗雪了当年的耻辱！卧薪尝胆的故事告诉我们：失败不可怕，只要记住教训、默默努力变强，总有一天能重新站起来！"], "imgKey": "goujian"}, "完璧归赵": {"paragraphs": ["战国时候，赵国得到了一块天下闻名的宝玉——和氏璧。这块玉洁白无瑕，温润如水，价值连城。秦国的秦昭王听说了，派人给赵王送信说：秦王愿意用十五座城池来换这块和氏璧！赵王又高兴又发愁。高兴的是秦王居然愿意用十五座城来换！发愁的是：秦王一向说话不算话，万一他把玉拿走了，城池却不给怎么办？", "赵国的臣子们议论纷纷，这时候，一个叫蔺相如的小官站了出来。他挺起胸膛说：大王，让我带着和氏璧去秦国吧！如果秦王真的给城，我就把玉给他；如果他耍花招，我一定把玉完好无损地带回来！", "蔺相如到了秦国，把和氏璧恭恭敬敬地献给秦王。秦王接过璧，左看右看，爱不释手，连连赞叹：好玉！好玉！可是他左看右看，就是一个字也不提给城的事。蔺相如看在眼里，心里明白了。他走上前去，假装指着璧上的一个小地方说：大王，这块玉上有一个小斑点，请让我指给您看。", "蔺相如接过和氏璧，退后几步，靠在大柱子上，眼睛瞪得圆圆的，头发都竖起来了——他怒发冲冠！只听他大声说：大王，秦国自恃强大，从来就不讲信用。今天您拿着璧左看右看，却不提给城的事，分明是在骗我！如果您硬要强夺，我就把璧和脑袋一起撞碎在这根柱子上！", "秦王一看急了：这么珍贵的玉撞碎了多可惜啊！他连忙说：别别别，有话好好说。蔺相如趁机说：那请您斋戒五天，举行一个隆重的仪式，我再把玉献给您。秦王只好答应了。蔺相如回到宾馆，连夜让人把和氏璧偷偷送回了赵国。", "五天后，秦王举行仪式，蔺相如空手来了，笑着说：大王，和氏璧已经回赵国了。您要是真心换玉，就先把十五座城交给赵国吧。秦王和大臣们听了，又气又惊。可是蔺相如已经把玉送回去了，秦王杀了他也没用，反而会让天下人笑话。最后，秦王只好放了蔺相如，让他回了赵国。蔺相如凭着勇气和智慧，完好无损地把和氏璧带回了赵国。人们都夸他是：真正的勇士！", "完璧归赵的故事告诉我们：面对强大的对手，不要害怕也不要看轻自己，用智慧和勇气就能保护自己的东西！"], "imgKey": "pangu"}, "孟母三迁": {"paragraphs": ["战国时候，有个大思想家叫孟子，他的名字叫孟轲。可是你知道吗？孟子小时候可调皮了，他能成为大思想家，多亏了他的好妈妈！孟子小时候，他们家住在墓地旁边。什么叫墓地呢？就是埋死人的地方。", "隔壁邻居家里有人去世了，大人们穿着白衣服，又哭又拜的。小孟子觉得有趣极了，就跟着学：跪下磕头，哭哭啼啼，还学人家喊号子。孟子的妈妈看见了，皱起了眉头：这里的环境不行啊！孩子天天学这些，以后还能有什么出息？不行，我们得搬家！", "于是，孟家搬到了集市旁边。集市可热闹了，吆喝声此起彼伏：卖菜啦！新鲜的蔬菜！便宜卖啦！小孟子又觉得新鲜有趣，开始学起商人吆喝叫卖：走过路过不要错过啊！", "孟子的妈妈又皱起了眉头：不行不行，这里也不行！商人整天只想着赚钱，孩子跟着学，以后还能好好读书吗？不行，再搬！", "这一次，孟家搬到了学堂旁边。每天清晨，小孟子都能听到学堂里传来朗朗的读书声。他也跟着咿咿呀呀地念了起来，学堂里的学生见到小孟子，都很有礼貌地行礼问好。小孟子也学着大人的样子，恭恭敬敬地作揖问好。他开始变得懂事起来，也喜欢上了读书学习。", "孟子的妈妈终于满意地笑了：这里才是好地方啊！从那以后，孟子就在学堂旁边住了下来，天天跟着学生们读书，渐渐地成了一个有学问的人。后来，孟子成了中国古代最伟大的思想家之一，和孔子一起被后人称为孔孟之道。大家都说：这可离不开孟妈妈当初三次搬家的决定啊！", "孟母三迁的故事告诉我们：好的环境和朋友会让我们变得更好，选择和谁在一起、住在什么地方，真的很重要！"], "imgKey": "nuwa"}, "铁杵磨针": {"paragraphs": ["唐朝时候，有一个著名的大诗人叫李白。李白的诗写得可好了，后人称他为诗仙。可是你知道吗？李白小时候其实不爱读书，经常逃学出去玩呢！", "有一天，小李白又偷偷溜出了学堂，跑到山间的小河边玩耍。河水哗哗地流着，鸟儿在枝头唱着歌，李白玩得可开心了。忽然，他看见一位白发苍苍的老婆婆坐在河边的石头上，手里拿着一根粗粗的铁棒，正在石头上磨来磨去。老婆婆累得满头大汗，那铁棒却才磨掉了一点点。", "小李白好奇地走过去，歪着脑袋问：老婆婆，您这是在干什么呀？老婆婆抬起头，擦了擦汗，笑眯眯地说：我要把它磨成一根绣花针。小李白瞪大了眼睛：绣花针？这么粗的铁棒要磨成细细的针？那得磨到什么时候啊！", "老婆婆笑了笑，眼睛里闪着光芒：只要功夫深，铁棒也能磨成针。我今天磨一点，明天磨一点，只要每天不停地磨，总有一天能磨成！", "小李白听了老婆婆的话，心里像被什么东西震了一下。他呆呆地站在那里，想了很久很久。老婆婆那么大的年纪了，还这么有耐心，每天坚持磨针。而我呢？读书才读了一点点，就嫌枯燥想放弃……老婆婆看出了小李白的心思，和蔼地说：小娃娃，读书也是一样的道理啊，每天学一点，日积月累，就能成为有学问的人啦！", "小李白听了老婆婆的话，心里一震：老婆婆说得太有道理了！我读书怎么能半途而废呢？从此以后，他发愤苦读，再也不逃学了。后来，李白真的成了中国最伟大的诗人之一，他的诗流传了一千多年，影响了一代又一代的人。", "铁杵磨针的故事告诉我们：再难的事情，只要坚持下去就一定能做到——坚持就是最大的力量！"], "imgKey": "dayu"}, "草船借箭": {"paragraphs": ["三国时候，蜀国和吴国是联合抗曹的盟友。蜀国有个特别聪明的人叫诸葛亮，吴国的大都督周瑜却非常嫉妒他的才能，总想找机会为难他。有一天，周瑜把诸葛亮请来议事。周瑜假惺惺地说：诸葛先生，曹军就在江北，水军是我们的弱项，急需十万支箭。麻烦您在十天内造出来。诸葛亮笑了笑，摇了摇羽毛扇说：十天？不需十天，三天就够！周瑜心里乐开了花：三天？立下军令状吧！诸葛亮二话不说，签了字，转身走了。", "周瑜暗自得意：三天？就算三十天也造不出十万支箭啊！第一天过去了，诸葛亮什么事也没做，只是让士兵们准备船和稻草人。士兵们疑惑不解：都督只给了三天时间，我们不造箭，干什么呢？第二天又过去了，诸葛亮还是在喝酒聊天，好像完全不着急。士兵们急得像热锅上的蚂蚁。", "第三天一大早，天阴沉沉的，江面上起了大雾，白茫茫的一片，什么都看不清。诸葛亮把士兵们召集起来，下令出发！士兵们把二十条小船排成一排，每条船上扎满了稻草人，远远看去，就像真人站在船上一样。船队趁着大雾，向江北的曹营驶去。", "曹操在营中听到报告：东吴的军队趁着大雾杀过来了！曹操心想：雾这么大，一定有埋伏！他连忙下令：弓箭手准备，往江面上射箭！不许让敌人靠近！一时间，万箭齐发，箭像雨点一样飞过来。那些箭全都射在了稻草人身上，密密麻麻，多得像刺猬一样。等稻草人身上的箭射满了，诸葛亮命令士兵们把船调头，另一面也射满了箭。", "天渐渐亮了，雾也开始散了，诸葛亮满载着十万支箭，命令船队凯旋而归。东吴的士兵们高声欢呼：诸葛亮真神人啊！周瑜听说后，惊讶得说不出话来。原来啊，诸葛亮早就算准了三天后会有大雾，他利用曹操多疑的性格，借来了十万支箭。这个计谋，就叫做——草船借箭！", "草船借箭的故事告诉我们：遇到难题不要慌，开动脑筋想办法。有时候换个思路，就能把不可能变成可能！"], "imgKey": "caochuan"}, "纸上谈兵": {"paragraphs": ["战国时候，赵国有一位著名的将军叫赵奢，他打起仗来又勇又猛，立下过很多战功。赵奢有个儿子叫赵括，从小就聪明伶俐，特别爱读兵书。什么孙子兵法、吴子兵法，他都能倒背如流。谈起兵法来，那是头头是道，口若悬河，连他爸爸赵奢都说不过他。", "赵括很骄傲，觉得自己天下无敌，心想：爸爸不过是个武将，没读过几本书，我读了这么多兵书，肯定比他强多了！秦国听说赵奢死了，又听说他儿子赵括熟读兵书，便想了一个计谋。他们故意派人在赵国散布谣言：秦军最怕的，就是赵奢的儿子赵括啊！", "赵王听了谣言，信以为真，就下了一道命令：让赵括代替老将军廉颇，去前线指挥军队。蔺相如听说后，赶紧跑去劝赵王：大王啊，赵括只会纸上谈兵，没有实战经验，可不能让他当将军啊！可惜赵王不听。", "赵括一上任，就骄傲地说：廉颇那个老头子太胆小了，只会躲着不打仗。看我的，我要主动进攻，一定能打败秦军！可是赵括哪里知道，秦国这次派来的将军是大名鼎鼎的白起！白起早就设下了计策。他假装战败撤退，引诱赵括带领大军追上来，等赵括的军队追到秦军的营地，白起一声令下：切断他们的退路！秦军从两翼包抄过来，把赵军围得水泄不通。", "赵括这才知道中计了，可是已经太晚了。白起又派人切断了赵军的粮草通道。赵军被围困了四十多天，粮食吃光了，水也喝光了，有的甚至开始互相残杀。赵括亲自带队冲杀，想杀出一条血路，可每次都失败了。最后，在一次突围中，赵括被秦军的乱箭射死。四十万赵军全部投降了，白起却下令把他们全部活埋。", "赵国从此一蹶不振，再也没有力量和秦国抗衡了。而赵括，也在这场战役中战死沙场，留下了一个千古教训：光会说不一定会做，本事要靠真刀真枪地练出来。只会纸上谈兵，可不行！"], "imgKey": "zhishang"}, "毛遂自荐": {"paragraphs": ["战国时候，赵国的都城邯郸被秦国军队团团包围了。赵王急得像热锅上的蚂蚁，连忙派平原君去楚国求救。平原君是赵国的相国，他要挑选二十个有勇有谋的门客，一起去说服楚国出兵。挑来挑去，只选中了十九个，还差一个。", "这时，一个叫毛遂的门客站出来说：先生，让我一起去吧！平原君看了他一眼，问：你来了几年了？毛遂回答：三年了。平原君摇摇头：你来三年了，我都没听说过你有什么本事，我看还是算了吧。毛遂不慌不忙地说：先生，如果我是埋在土里的锥子，您把我放进口袋，我早就脱颖而出了。现在我还没出头，是因为您没有给我机会啊！", "平原君听了，觉得这个人说话不一般，就答应带他一起去。其他的门客们偷偷笑话毛遂：就他？去了也是白去！到了楚国，平原君和楚王谈判。从早上谈到中午，从中午谈到下午，楚王就是不肯答应出兵。十九个门客急得团团转，可是谁也想不出办法。", "这时候，毛遂站了出来。他按着剑，大步走上前去，对楚王说：楚国的土地有你们赵国的五倍大，兵有你们赵国的十倍多。可是现在邯郸被围，你们却不肯帮忙，这是为什么？楚王听了，脸色变了。毛遂继续说：想当年，楚国被吴国欺负，连国都都被打进了，大王您忘了吗？今天秦国又来欺负我们，如果我们不团结起来，下一个被灭的就是楚国！", "毛遂的话字字句句说到了楚王的心坎上。楚王一拍桌子：说得好！我楚国愿意和赵国联合抗秦！于是，楚王和平原君当场歃血为盟，决定一起出兵救赵。平原君回到赵国后，感叹地说：毛遂的三寸之舌，比百万大军还厉害啊！我看人还是看走眼了！从此，平原君对毛遂刮目相看，把他当作上宾对待。", "毛遂自荐的故事告诉我们：机会是要靠自己争取的，有才能就要勇敢地展现出来！"], "imgKey": "maosui"}, "破釜沉舟": {"paragraphs": ["秦朝末年，天下大乱。陈胜、吴广起义后，各路英雄纷纷响应，其中最厉害的一支队伍是由项羽带领的楚军。有一天，项羽带着军队去救赵国，必须渡过一条叫漳水的河。过了河就是秦军的营地，那里有二十万秦军等着他们呢。", "对岸的秦军看到楚军来了，哈哈大笑：就凭你们这点人马，还想打过长江去？做梦吧！楚军的士兵们听了，心里都有些害怕。项羽站在船头，看着对岸耀武扬威的秦军，眉头紧锁。他知道，如果这次不打赢，士兵们以后就没有勇气了。", "船靠了岸，项羽跳下船，拔出腰间的宝剑，高高举起，大声喊道：弟兄们！我们的粮食不多了，过了河就没有退路！我现在下令：把做饭的锅全部砸碎！把渡河的船全部凿沉！", "士兵们惊呆了：什么？把锅砸了？那我们吃什么？把船凿沉？那我们怎么回去？项羽大声说：没有退路了！只能前进！今天，要么我们打败秦军，要么就死在这里！", "项羽身先士卒，第一个冲向了秦军。士兵们看到主帅这么勇猛，士气大振，一个个嗷嗷叫着跟了上去。楚军士兵们个个以一当十，越杀越勇。九次大战，九次胜利，杀得秦军人仰马翻，血流成河。秦军的主将王离被活捉了，苏角被杀死了，涉间不肯投降，自己跳进火里烧死了。", "这一仗，楚军以少胜多，打败了强大的秦军，威名传遍了天下！楚军士兵们激动地欢呼：霸王万岁！项羽站在尸山血海之中，仰天大笑。从此，项羽有了一个响亮的名号——西楚霸王！", "破釜沉舟的故事告诉我们：下定决心、断了退路，反而能激发全部的勇气和力量！"], "imgKey": "pofu"}, "三顾茅庐": {"paragraphs": ["三国时候，有一个叫刘备的英雄。他虽然姓刘，是汉朝皇室的后代，可是他的日子过得很苦，整天东奔西跑，没有一块属于自己的地盘。后来，刘备听说有一个叫诸葛亮的奇才，人称卧龙先生。这个诸葛亮住在襄阳城外一座小山上的茅草屋里，据说上知天文，下知地理，是个了不起的能人！刘备心想：我要是能得到诸葛亮的帮助，何愁大业不成？于是他带着关羽、张飞两位兄弟，第一次去请诸葛亮出山。三个人骑着马，翻山越岭，好不容易找到了那座小山。可是到了诸葛亮家门口，却发现先生不在家——他出门会友去了。刘备扑了个空，只好失望地留下姓名，转身回去了。", "过了几天，刘备不死心，带着关羽、张飞第二次去请诸葛亮。这一次，诸葛亮还是不在家——他云游去了，不知道什么时候才能回来。张飞不耐烦了，他气呼呼地说：大哥，这个山野村民有什么了不起的？我看他就是个骗子！您等着，我骑快马去把他绑来！刘备赶紧拦住他：翼德，不可无礼！诸葛亮先生是有真本事的人，我们要有诚意！张飞只好作罢。", "又过了一段时间，刘备决定第三次去请诸葛亮。这次张飞都要炸了：大哥，还去？不去不去，去了也是白去！刘备笑着说：不去怎么知道呢？第三次到了诸葛亮家门口，刘备远远就看到门半开着，心想这次一定在家了！谁知进去一看，诸葛亮正躺在草堂里睡午觉呢。张飞气得吹胡子瞪眼：好啊，让我大哥在外面等着，他倒睡大觉！我去把他的草堂点了！关羽赶紧拉住他：大王不是说了吗？要有诚意！刘备站在门外，静静地等着。他等啊等，从上午等到中午，又从中午等到下午。站得腿都酸了，可他一动不动，生怕吵醒了诸葛亮。", "终于，诸葛亮醒了。他睁开眼，看到刘备站在门外，又惊又喜：哎呀，刘皇叔来了，您怎么不叫我呢？刘备说：是我打扰先生休息了，不敢叫啊。诸葛亮被刘备的诚意深深感动了，他知道刘备是真心实意来请自己的，于是答应了出山。从那以后，诸葛亮就成为了刘备身边最重要的军师，帮助刘备建立了蜀国，和魏国、吴国形成了三足鼎立的局面。", "三顾茅庐的故事告诉我们：真诚和耐心能打动人心。想请高人帮忙，就要有放下身段的诚意！"], "imgKey": "sangu"}, "悬梁刺股——刻苦读书": {"paragraphs": ["战国时候，有两个出了名的大学问家——孙敬和苏秦。他们后来都当了大官，可是你知道吗？他们小时候读书可辛苦了，都是靠着自己不懈的努力才成功的！", "先说说孙敬吧。孙敬是洛阳人，他家里穷得叮当响，买不起书。可是他特别爱学习，每天都去村里的学堂门口站着，偷偷地听先生讲课。先生被他感动了，就免费借书给他看。", "孙敬如获至宝，他白天干活，晚上读书。可是他太困了，看着看着书，眼睛就睁不开了。有一天晚上，孙敬又困得不行了，头一歪，脑袋差点撞到墙上。", "他急中生智，找来一根绳子，把自己的头发绑起来，绳子的另一头系在房梁上。这样一打瞌睡，头往下一垂，头发就会被绳子扯住，疼得他一下子清醒过来！孙敬就是这样逼着自己读书的。", "再说说苏秦。苏秦是洛阳人，他也是家里穷，读不起书。可是苏秦不甘心，他决定去各国游说，希望能得到国君的重用。他跑了很多地方，说了很多话，可是没有一个人相信他。", "苏秦灰溜溜地回了家。家里人都嘲笑他：你看你，出去转了一圈，什么官也没当上，还欠了一屁股债！妻子不理他，嫂子不给他做饭，连父母都不想认他了。苏秦又难过又惭愧，他躲在房间里，呜呜地哭了起来。", "哭完了，苏秦擦干眼泪，对自己说：都是我自己没用，怪不得别人！从今天起，我要发愤读书！他从箱子里翻出一本叫《阴符经》的书，每天天不亮就起来读书，一读就是好几个时辰。", "读到困的时候，苏秦实在撑不住了，就拿起锥子，往自己的大腿上扎一下！疼得他倒吸一口凉气，一下子就清醒了。有时候扎得太狠，血都流到了地上，染红了草席。", "就这样，苏秦整整读了一年书。一年后，他再次出门游说各国。这一次，他口若悬河，说得头头是道各国的国君都被他的才华折服了。最后，苏秦当上了六个国家的宰相，佩带着六国相印，风光极了！", "悬梁刺股的故事告诉我们：想要成功就必须付出努力，哪怕条件再艰苦，也不能放弃学习！"], "imgKey": "xuanshencigu"}, "负荆请罪——将相和": {"paragraphs": ["战国时候，赵国有两位大臣——蔺相如和廉颇将军。蔺相如因为完璧归赵和渑池会两件事立了大功，被赵王封为上卿，地位比廉颇将军还要高。", "廉颇将军心里可不服气了。他想：我廉颇在战场上拼死拼活，打了多少胜仗，才当上大将军。这个蔺相如不过是个耍嘴皮子的，凭什么爬到我头上去？", "廉颇逢人就说：蔺相如算什么！如果让我碰见他，我一定要给他点颜色看看！这话传到了蔺相如的耳朵里，他怎么办呢？", "蔺相如的部下知道了这件事，都很生气。有人对蔺相如说：大人，您官居高位，廉颇这样说您，太过分了！您让我们去揍他一顿吧！", "蔺相如笑着摇摇头说：你们想想，是秦王厉害，还是廉颇将军厉害？大家说：当然是秦王厉害。蔺相如说：对啊，秦王那么厉害，我都不怕他，难道我还怕廉颇将军吗？", "蔺相如喝了口茶，继续说：你们知道吗？我和廉颇将军，就像赵国的两只胳膊。如果我和他闹翻了，秦国就会趁机来打我们。我躲着廉颇将军，不是因为怕他，而是为了我们赵国的安宁啊！", "廉颇将军听说这番话后，羞得满脸通红。他想：蔺相如大人真是心胸宽广，处处为国家着想。而我呢？只顾着自己的面子，还到处说他的坏话，我真是太不应该了！", "这一天，廉颇将军脱下战袍，换上一身普通的衣服，扛着一根荆条，大步走向蔺相如的府邸。路人都好奇地看着他，议论纷纷：廉颇将军这是要干什么呀？", "廉颇来到蔺相如家门口，二话不说，扑通一声跪了下来，把荆条高高举过头顶。他说：蔺大人，我以前太傲慢了，说了那么多伤害您的话。今天我来向您请罪，请您用荆条狠狠地打我一顿吧！", "蔺相如连忙跑出来，扶起廉颇将军，说：将军快起来！您是赵国的功臣，我怎么舍得打您呢？两个人的手紧紧握在一起，眼泪都流了下来。", "从此，蔺相如和廉颇将军成了最好的朋友，他们一起帮助赵王治理国家，让赵国越来越强大。这就是千古流传的将相和的故事。", "负荆请罪的故事告诉我们：有错就要勇于承认，真诚道歉不丢人，反而会赢得更多人的尊重！"], "imgKey": "fujingqingzui"}, "煮酒论英雄——英雄识英雄": {"paragraphs": ["三国时候，曹操和刘备都住在许昌。曹操是汉朝的丞相，挟天子以令诸侯，势力可大了。刘备呢，当时还没有什么地盘，只能暂时寄居在曹操门下。", "刘备心里一直有一个梦想：光复汉室，打败曹操。可是曹操势力太大，刘备只好装作胸无大志的样子，每天在后园里种菜浇花，什么也不问。", "有一天，曹操派人来请刘备。刘备心里咯噔一下，不知道曹操找他有什么事。他忐忑不安地跟着来人走了。", "曹操见到刘备，笑着说：玄德啊，你在后园种的菜不错嘛！今天我请你喝酒，来，咱们好好聊聊。两个人面对面坐着，一边喝酒，一边聊天。", "喝着喝着，曹操突然说：玄德，你走南闯北这么多年，见过那么多英雄豪杰，你觉得谁能称得上是真正的英雄呢？", "刘备心里一惊：曹操这是在试探我呀！他故意说了一串名字：袁术兵多粮足，是英雄吧？袁绍家世显赫，是英雄吧？还有那个公孙瓒、刘表、孙策……", "曹操听着，一个劲地摇头：这些算什么英雄？刘备假装糊涂：那我可想不出来了，谁才是英雄呢？", "曹操哈哈大笑，用手指了指刘备，又指了指自己说：天下英雄，只有你和我！刘备听了，手一抖，筷子掉在了地上。", "就在这时，天上突然打了个响雷。刘备趁机说：雷声这么大，我都被吓到了！筷子都掉了。曹操看了看刘备，心想：他连打雷都怕成这样，能是什么英雄？看来是我多心了。", "其实刘备是在演戏呢！他心里暗想：好险啊！差点让曹操看穿了。幸好有雷声帮忙，否则今天可就麻烦了。", "后来，刘备找机会逃出了许昌，建立了蜀国，真的和曹操、孙权三分天下。他用行动证明了：自己才是真正的英雄！", "煮酒论英雄的故事告诉我们：真正有本事的人，往往懂得隐藏实力，等待合适的时机。英雄不问出处，是金子总会发光！"], "imgKey": "zhujiulunyingxiong"}, "孔融让梨": {"paragraphs": ["东汉时候，有个聪明懂事的小男孩叫孔融。孔融的爸爸是朝廷里的大官，妈妈是温柔贤惠的大家闺秀。孔融是家里最小的孩子，上头还有五个哥哥。", "有一天，有人给孔家送来了一筐又大又黄的鸭梨。那筐梨一打开，香味扑鼻，馋得人直流口水。妈妈把梨洗得干干净净，端到桌上，让孩子们来吃。", "最大的哥哥先走过来，伸出手想拿最大的那个。孔融的妈妈看见了，笑着摇摇头说：等等，你们最小的小融还没来呢，等他来了再一起分吧。", "孔融从院子里跑进来，小脸红扑扑的，额头上还冒着汗珠。他看了看桌上的梨，二话不说，伸手拿了一个最小的。妈妈看见了，眼睛一亮，故意问：这么多梨，你为什么拿最小的呀？", "孔融歪着脑袋，认真地说：因为我最小呀，当然应该吃最小的。大的梨应该让给哥哥们吃。", "妈妈又问：那你还有五个哥哥呢，他们都应该比你大呀？孔融眨眨眼睛，笑着说：正因为我有五个哥哥，所以我更应该吃小的呀！这样哥哥们就会觉得我很懂事，会更喜欢我的！", "妈妈听了，感动得眼眶都红了。她把孔融搂在怀里，亲了亲他的小脸蛋：我的好孩子，你真是又聪明又懂事啊！后来，孔融长大后真的成了有名的大官，大家都说他从小就懂得谦让，长大了果然是个有品德的人。", "孔融让梨的故事告诉我们：谦让是一种美德，把好处让给别人，自己也会得到更多的快乐！"], "imgKey": "kongrong"}, "望梅止渴": {"paragraphs": ["三国时候，曹操带着军队去打仗。那是夏天，太阳火辣辣地烤着大地，道路两旁的庄稼都被晒得低下了头。士兵们穿着厚厚的铠甲，背着沉甸甸的武器，走得汗流浃背。", "走了大半天，队伍渐渐慢了下来。士兵们的嘴唇干得起了皮，嗓子眼儿里像着了火一样难受。有人开始小声抱怨：渴死了，哪儿有水喝呀？", "又走了一会儿，士兵们实在走不动了，纷纷停下来，有的坐在地上，有的靠在树上，还有人干脆扔掉了武器，瘫倒在地上。大家你看看我，我看看你，谁也不想再往前走了。", "曹操骑在马上，看见队伍停了下来，士兵们一个个有气无力的样子，心里着急极了。这可怎么办？这里前不着村后不着店，哪儿去找水呢？", "忽然，曹操眼珠一转，想出了一个主意。他扯着嗓子大声喊道：士兵们！前面有一片梅林！那里的梅子又大又酸，咬一口直流口水！咱们快点走，去摘梅子吃！", "士兵们一听有梅子吃，眼睛都亮了起来。梅子？那可是又酸又甜的东西啊！一想到这里，大家的嘴巴里就开始分泌口水，好像真的吃到了酸酸的梅子一样。", "曹操趁热打铁，指挥队伍继续前进。士兵们虽然还是很渴，但一想到前面有酸梅子吃，脚下就像生了风一样，越走越快。", "终于，他们走出了那片没有水源的地方，找到了一条小河。士兵们欢呼着跑过去，咕咚咕咚喝了个痛快。大家这才明白：曹操说的梅林其实是骗人的，可他骗得好啊！要不是他用梅子鼓励大家，说不定真有人会渴死在路上呢！", "望梅止渴的故事告诉我们：遇到困难的时候，要开动脑筋想办法。有时候，善意的谎言也能帮助大家度过难关！"], "imgKey": "wangmei"}, "霸王别姬": {"paragraphs": ["两千多年前，中国正处于秦朝末年。那时候有一个力大无穷的英雄，名叫项羽。他身长八尺，力气大得能举起一口大鼎，大家都叫他西楚霸王。", "项羽身边有一个最最心爱的美人，叫虞姬。虞姬长得漂亮极了，还会唱歌跳舞。她每天陪着项羽，项羽走到哪儿，就把虞姬带到哪儿。", "可是好景不长，项羽遇到了一个强大的对手——刘邦。刘邦虽然不如项羽勇猛，但他会用计谋，身边还有许多聪明的谋士帮他出主意。", "几年打下来，项羽的军队越来越少，刘邦的军队却越来越多。最后，项羽被刘邦的大军包围在了垓下，四面楚歌。", "那天晚上，项羽坐在营帐里，愁眉不展。忽然，四面八方传来了歌声——是刘邦的军队在唱楚国的歌谣。项羽听了，大惊失色：难道楚国的土地都被刘邦占了吗？怎么连我的家乡都在唱敌人的歌？", "虞姬看到项羽忧愁的样子，心里也很难过。她强撑着笑容，为项羽倒了一杯酒，轻声说：大王，喝了这杯酒，解解乏吧。", "项羽接过酒杯，一饮而尽。他看着虞姬，眼泪差点掉下来：虞姬啊虞姬，是我连累了你……说着说着，他唱起了一首歌：力拔山兮气盖世，时不利兮骓不逝……唱着唱着，泪水就流了下来。", "虞姬也跟着唱了起来，唱完了，她忽然拔出项羽腰间的宝剑，在项羽面前翩翩起舞。跳着跳着，她猛地把剑往自己脖子上一抹……", "项羽大惊失色，连忙抱住虞姬。可虞姬已经永远闭上了眼睛，脸上还挂着微笑。项羽抱着虞姬的尸体，放声大哭。", "后来，人们用'霸王别姬'这个故事来形容英雄末路的悲壮，也用来形容一对恩爱的伴侣不得不分离的凄美。", "霸王别姬的故事告诉我们：真正的爱情可以超越生死，哪怕面临困境，也要珍惜身边的人！"], "imgKey": "bawang"}, "祖冲之与圆周率——算出来的秘密": {"paragraphs": ["在一千五百多年前的南北朝时期，有一个叫祖冲之的少年。他从小就特别爱动脑筋，对天上的星星、地上的数字都充满了好奇。别的孩子在外面玩耍的时候，他总是一个人在屋子里算啊算啊，谁也不知道他在算什么。", "祖冲之的爷爷是朝廷里专门管天文历法的官员，从小就教他读书认字。有一天，小冲之问爷爷：'爷爷，圆的东西到底能分成多少份呢？'爷爷捋着胡子说：'古人说圆周一周三，简单说就是三比一，可这不太精确啊。'小冲之眨眨眼睛：'那我来算算看！'", "从此，祖冲之就像着了魔一样，整天对着圆圈研究。他找来一根竹棍当作圆规，在地上画了无数个圆圈，又找来很多小竹棍，一根一根地量。他量了一遍又一遍，算了一天又一天，连吃饭睡觉都在想这个圆周率到底该是多少。", "有人笑话他说：'这孩子是不是傻了？古人都说圆周三，这就是规矩，还费什么劲呢？'可祖冲之却认真地说：'古人的话不一定都对，我就要亲自算出来！'他坚持用'割圆术'的方法，把圆切成越来越多的小块来计算。", "经过无数个日夜的努力，祖冲之终于算出了圆周率在3.1415926和3.1415927之间！他还发明了'密率'355/113，这是当时世界上最精确的圆周率计算！", "你知道吗？祖冲之的这个发明，比欧洲早了整整一千多年呢！直到一千多年后，欧洲的数学家才算出同样的结果。祖冲之的成就让全世界都对中国古代数学刮目相看！", "祖冲之的故事告诉我们：不要迷信权威，要敢于质疑、勇于探索。认真坚持地做一件事，就一定能取得成功！"], "imgKey": "zuchongzhi"}, "张骞出使西域——走出来的丝绸之路": {"paragraphs": ["两千多年前的西汉时期，有一个勇敢的人叫张骞。那个时候，汉武帝想找月氏国一起攻打匈奴，就问大臣们：'谁愿意出使西域，到月氏国去呢？'大臣们你看看我，我看看你，谁也不敢吭声。因为从长安到月氏，要穿过一望无际的沙漠，翻过冰天雪地的高山，还要躲避凶猛的匈奴骑兵，这简直太危险了！", "张骞站出来说：'陛下，臣愿意去！'汉武帝高兴地拍了拍他的肩膀：'好！就派你做使者，带上礼物，出使月氏！'于是，张骞带上100多个随从，踏上了这条充满未知的道路。", "张骞一行人刚走出甘肃，就被匈奴骑兵抓住了。匈奴单于凶巴巴地说：'不许走！你们是汉朝派来的奸细！'张骞被关在匈奴，一关就是十年。可是他始终没有忘记自己的使命，每天都在想办法逃跑，继续完成出使的任务。", "终于有一天，看守放松了警惕，张骞带着随从们逃了出来。他们日夜兼程，穿过火焰山一样的沙漠，翻过像银龙一样的雪山，忍受着饥饿和干渴，终于到达了月氏国。", "月氏国王热情地接待了张骞，听他讲了汉朝的故事。可是月氏已经离匈奴很远，不想回去报仇了。张骞虽然没能说服月氏一起打匈奴，但他成功地建立了汉朝和西域各国的联系。", "张骞这次出使，历经十三年才回到长安。他带回了许多西域的种子和故事，比如葡萄、石榴、胡萝卜，还有各种新奇的文化。后来，人们把他走过的路叫做'丝绸之路'，这条路让中国和世界连在了一起。", "张骞的故事告诉我们：勇敢不是不害怕，而是即使害怕也要坚持前进。有时候，过程中的困难比结果更重要，因为它们会让我们变得更加强大！"], "imgKey": "zhangqian"}, "司马光砸缸——急中生智": {"paragraphs": ["在一千多年前的北宋时期，有一个叫司马光的小朋友，他从小就聪明好动，特别喜欢动脑筋解决问题。司马光和小伙伴们经常在家门口的大花园里玩耍，那里有假山、有池塘，还有一口特别大的水缸。", "有一天，司马光和几个小伙伴又在花园里捉迷藏。一个叫小虎的小伙伴躲得可好了，大家都找不到他。可是，正当小虎得意洋洋地从假山后面探出脑袋时，一不小心，脚下一滑，扑通一声，掉进了那口装满水的大缸里！", "'救命啊！救命啊！'小虎在水里拼命挣扎，水花四溅。其他小伙伴都吓坏了，有的哭了起来，有的跑去叫大人。可是大人们都不在，眼看小虎就要被淹死了！", "司马光急得满头大汗，他看了看四周，又看了看那口大缸。他想：如果我们力气不够大，拉不动小虎；如果爬上去救，自己也会掉下去。他突然灵机一动：'对了！水太多，小虎才浮不起来，那如果把水放掉呢？'", "司马光四处找可以用来砸缸的东西，可是地上只有几块小石头。他想了想，抱起一块大石头，使出全身的力气，猛地朝大缸砸去——'砰！'大缸破了一个大洞，水哗啦啦地流了出来。", "水流光了，小虎得救了！小伙伴们高兴得又蹦又跳，纷纷说：'司马光，你太厉害了！''你真聪明！'司马光挠挠头，笑着说：'其实我只是想了想，水缸破了，水流光了，小朋友自然就不会被淹到了。'", "司马光砸缸的故事告诉我们：遇到危险的时候不要慌张，要冷静地想办法。有时候换一个角度思考问题，就能找到解决问题的办法！"], "imgKey": "simaguang"}, "李时珍与本草纲目——走遍天下的神医": {"paragraphs": ["四百多年前的明朝，有一位了不起的医生叫李时珍。他从小就跟着父亲学医，每天跟着父亲上山采药，回家后帮父亲切药、晒药、磨药。虽然他只有十几岁，但对各种草药已经非常熟悉了。", "李时珍二十多岁的时候，已经成了当地很有名气的医生。可是他发现一个问题：以前的药书里有很多错误，有些药名对不上图片，有些药效写错了，还有些药根本就是毒性很大的，但书里却写着可以随便吃。", "'这样的书会害死人的！'李时珍皱起眉头，决心要重新写一本正确的药书。父亲知道后担心地说：'这可是个大工程啊，你想想清楚！'可李时珍坚定地说：'医生治病救人，不能有半点马虎，我一定要做这件事！'", "从那以后，李时珍背上药筐，带上纸笔，开始了他的寻药之旅。他翻过高山，蹚过河流，走过森林，去过草原。为了找到一种叫'薪蛇'的药蛇，他冒着生命危险跑到深山老林里；为了看清一种草药的生长过程，他在山里住了整整三个月。", "整整二十七年，李时珍走遍了大江南北，尝遍了各种草药，记录了几十万字的笔记。终于在他六十岁那年，一本叫《本草纲目》的书诞生了！书里记载了1892种药物，是当时最全、最准确的药书。", "你知道吗？《本草纲目》后来被翻译成很多国家的文字，传遍了全世界。直到今天，中医还在用这本书里的很多药方呢！", "李时珍的故事告诉我们：做事情要有始有终，不怕困难，坚持到底。把一件平凡的事做到极致，就是不平凡！"], "imgKey": "lishizhen"}, "张衡与地动仪——能捉龙的机器": {"paragraphs": ["一千九百多年前的东汉时期，有一个人叫张衡，他从小就心灵手巧，特别喜欢研究各种机械和天文。别的孩子玩泥巴的时候，他就用木头做小车子、小风车，做得像真的一样会动！大家都叫他'小鲁班'。", "张衡长大后当了官，可他最喜欢的事情还是搞发明创造。那时候，经常发生地震，有时候房子会倒塌，人们会受伤。皇帝问大臣们：'谁能预测地震，好让人们提前躲一躲？'大臣们都说不可能，张衡却站出来说：'陛下，我可以试试看！'", "张衡开始了他的研究。他翻阅了很多古书，观察了很多自然现象，想啊想啊，画了无数张图纸。有一次，他看到有人在酒馆里喝酒，酒杯里的酒因为有人走路引起震动而晃动起来。他眼睛一亮：'对呀！我可以用这个原理来造地动仪！'", "张衡用青铜铸造了一个大圆球，圆球上面有八条龙，每条龙的嘴里都含着一个小铜球。圆球下面有八只青蛙，张着嘴对准每条龙。如果哪个方向发生地震，那条方向的龙嘴就会张开，铜球就会掉进青蛙的嘴里，发出'当'的一声响。", "有一天，地动仪上东边的龙突然'当'的一声，铜球掉进了青蛙嘴里。可是那天洛阳并没有感觉到地震啊！大家都议论纷纷，说张衡的地动仪不灵。可过了几天，陇西那边传来消息：那边发生了大地震！人们这才恍然大悟，原来地动仪真的能提前知道地震的发生！", "张衡还发明了浑天仪，是一个能显示星星位置的仪器，就像一个小小的宇宙。他写的《灵宪》这本书，记载了很多天文知识，比欧洲早了好几百年呢！", "张衡的故事告诉我们：不要因为别人说'不可能'就放弃创造。仔细观察身边的事物，灵感可能就在一杯酒、一阵风中！"], "imgKey": "zhangheng"}, "郑和下西洋——七次远航的大船长": {"paragraphs": ["六百多年前的明朝，有一个叫郑和的人，他是世界上最伟大的航海家之一！你知道吗？在他那个年代，中国的船队是全世界最厉害的，比欧洲那些大航海家还要早几十年呢！", "郑和本来姓马，小时候大家都叫他小马。他家住在云南，是虔诚的伊斯兰教徒。小时候，他最喜欢听老人们讲关于大海和远方国度的故事。海上有什么？有凶猛的鲨鱼吗？有会喷水的大鲸鱼吗？各国的人们长什么样？说着什么样的话？小马听得眼睛发亮，心里暗暗想着：长大了，我一定要去看看！", "后来，小马被送进了皇宫，成了朱棣皇帝身边的小太监。他聪明伶俐，又勇敢又机灵，很快就得到了皇帝的赏识。有一天，皇帝对他说：我有一个重要的任务要交给你——我要派船队出海，去访问那些远方的国家，让他们知道我们大明朝的威名！你敢不敢去？郑和激动得声音都颤抖了：皇上，小人一定完成任务！", "你知道郑和的船有多大吗？说出来吓你一跳！他的船比一个足球场还要长，有九根高高的大桅杆，船上可以住好几百人，还能装下无数的金银珠宝、丝绸瓷器。老百姓们亲切地叫它宝船。出海那天，郑和站在最大的那艘宝船上，看着码头上黑压压的人群，深吸一口气，大声下令：扬帆起航！", "郑和带领着庞大的船队，先后七次出海访问，最远到了非洲东海岸！你能想象吗？在那个没有指南针和GPS的年代，他是怎么找到方向的？郑和使用的是一种叫牵星术的古老方法——晚上看星星，白天看太阳，再加上老水手们代代相传的航海图，就能在茫茫大海中找到正确的方向。", "每到一个国家，郑和都会送上中国精美的丝绸和瓷器，还有会表演的金毛小狮子。当地的人们都看呆了：中国真是太富强了！郑和还会和各国国王友好交谈，邀请他们派使者来中国访问。很多国家都被郑和的真诚打动了，纷纷和中国建立了友好关系。", "郑和一生出海七次，前后整整二十八年！他在船上度过了大半辈子，把一生都献给了航海事业。他不仅是勇敢的航海家，还是出色的外交家、和平的使者。世界人民都敬仰他，科学家们甚至用他的名字给火星上的山命名呢！", "郑和下西洋的故事告诉我们：一个人的梦想有多大，舞台就有多大！只要敢想敢做，就没有到达不了的远方！"], "imgKey": "zhenghe"}, "岳飞抗金——精忠报国的好男儿": {"paragraphs": ["说起南宋时候的英雄好汉，最让人们敬佩的，就是岳飞了。他的母亲在他背上刺了四个字——精忠报国，这四个字像烙印一样刻在他心里，伴随了他短暂而光辉的一生。", "岳飞小时候家里很穷，买不起纸笔，妈妈就用树枝在沙地上教他写字。岳飞学得可认真了，一笔一划，写得端端正正。虽然家里穷得揭不开锅，但岳飞从来不发牢骚，每天天不亮就起来练武，晚上还要读书到深夜。", "那时候，北方的金国经常来侵犯宋朝，烧杀抢掠，无恶不作。岳飞看在眼里，恨在心里：这些坏人，我一定要把他们赶出去！他对母亲说：娘，我要参军保卫国家！母亲含泪点头，在他背上刺下了精忠报国四个大字。", "岳飞武艺高强，又精通兵法，很快就成了一名将军。他带领的军队纪律严明，从不抢老百姓一针一线，老百姓们都亲切地叫他们岳家军。有一句俗话说得好：撼山易，撼岳家军难！意思是说你想把山移走还容易，想打败岳家军可就难喽！", "岳飞打仗特别勇敢，有一次他带着八百骑兵，就敢冲进敌人上万人的大营！敌人被他的气势吓坏了，四散奔逃。还有一次，岳飞让士兵们每人准备两捆柴草，在夜里悄悄堆在敌人城墙下。天亮了，岳飞一声令下：点火！熊熊大火把敌人吓得魂飞魄散，岳家军趁机攻破了城池。", "最让金国害怕的是朱仙镇一战。岳飞带领岳家军一路北上，把金兵打得落花流水，节节败退眼看就要收复中原了！可是就在这个关键时刻，皇帝连下十二道金牌，命令岳飞撤军。", "岳飞捧着金牌，眼泪止不住地流：十年心血，毁于一旦啊！可是皇命不可违，他只能带着遗憾撤军。回到京城后，岳飞被奸臣秦桧陷害，含冤而死，那一年他才三十九岁。", "岳飞虽然被害了，但他的故事流传了一千年又一千年。杭州有座岳王庙，岳飞的塑像就跪在害死他的秦桧旁边，每天都有人去那里，表达对英雄的敬意。", "岳飞的故事告诉我们：精忠报国不是一句空话，而是要用一生去践行的誓言！爱国，是中华民族最珍贵的品质！"], "imgKey": "yuefei"}, "花木兰从军——替父从军的女英雄": {"paragraphs": ["很久很久以前，有个叫花木兰的姑娘，她住在长城脚下的一个小村子里。木兰是个又聪明又漂亮的女孩，织布、做饭、照顾家人，样样都是一把好手。邻居们都夸她：谁家娶了木兰，可真是有福气啊！", "可是这一年，边关告急，朝廷要征兵打仗。征兵的名册上，每家必须有一个男丁去当兵。木兰坐在织布机前，心事重重：爹爹年纪大了，腿脚不好；弟弟还太小，才刚学会走路。谁能替他们去打仗呢？", "那天晚上，木兰翻来覆去睡不着。她咬了咬牙，做了一个大胆的决定：我要女扮男装，替父从军！第二天一早，她去了集市，买了一匹高头大马，一副盔甲，一把锋利的宝剑。回到家，她悄悄把自己的长头发盘起来，藏进了军帽里。", "临行前，木兰来到父亲的房间，跪下来说：爹，女儿不孝，要骗您一次了。父亲惊呆了：什么？你要去当兵？木兰点点头：爹，您的腿不好，弟弟又太小。我是女儿身，但我一样能打仗！父亲老泪纵横，却怎么也拦不住她。", "第二天天刚亮，木兰就骑着马出发了。一路上，她跟着大军跋山涉水，翻过了多少座山，蹚过了多少条河，她都记不清了。晚上睡觉的时候，她不敢脱衣服，总是一个人睡在角落里，生怕别人发现她是女孩。", "战场上，木兰可勇敢了！她武艺高强，骑马射箭样样精通，冲锋陷阵总是跑在最前面。打仗打了十二年，木兰立下了赫赫战功，从一个小士兵变成了威风凛凛的大将军！可是战友们竟然一直没有发现她是女孩子！", "战争终于结束了，皇帝要奖赏木兰，问她想要什么。木兰跪下来说：我不想要高官厚禄，只想骑上千里马，回家看望我的爹娘。皇帝批准了，还派了一队士兵护送她回家。", "回到村子里，木兰脱下战袍，换上了漂亮的裙子，梳理好长发，又变回了那个漂亮的姑娘。当年的战友来看望她，一进门就惊呆了：天哪！原来你是个女孩子！我和你一起打了十二年仗，竟然一点都不知道！", "花木兰的故事传遍了天下，后来还被写成了著名的《木兰诗》，一代又一代的孩子们都读过它。美国的迪士尼还把这个故事拍成了动画片呢！", "花木兰的故事告诉我们：女孩子一样可以勇敢、坚强、有担当！不管是谁，都应该有勇气做自己想做的事！"], "imgKey": "mulan"}, "商鞅变法——让秦国强大起来": {"paragraphs": ["战国时候，秦国是个弱小的国家，经常被别的国家欺负。秦国的国君秦孝公心里着急极了，他到处招揽人才，希望能找到让秦国变强的方法。", "这时候，一个叫商鞅的年轻人从卫国来到了秦国。商鞅虽然年轻，但他满脑子都是变法图强的想法。他听说秦孝公求贤若渴，就信心满满地去求见。", "商鞅对秦孝公说：大王，要让秦国强大起来，就必须进行变法改革！秦孝公问他：怎么变？商鞅说：首先要奖励农业生产，谁种田种得好，就奖励谁。其次要奖励作战立功的人，不管出身高低，只要立了功，就能当官！", "秦孝公听了很高兴，决定让商鞅主持变法。可是，老百姓都不相信啊——这新法令能是真的吗？商鞅想了个办法，他在都城的南门立了一根木头，贴出告示：谁把这根木头搬到北门，赏金十两！", "老百姓都围着看热闹，可是没人敢动。有人说：搬根木头就给十两黄金？这不是骗人吗？忽然，一个大胆的年轻人站出来说：我来试试！他扛起木头，一路小跑到了北门。商鞅立刻兑现承诺，当众把十两黄金奖给了他。", "老百姓这下相信了：商鞅说话算数，新法令是真的！于是，变法很快在秦国推行开来。农民们拼命种田，战士们勇敢杀敌，秦国越来越强大。", "商鞅的变法让秦国从一个弱小的国家，变成了战国七雄中最强的一个。后来，秦国统一了中国，建立了秦朝。商鞅虽然后来被人陷害而死，但他的变法却改变了中国历史的走向！", "商鞅变法的故事告诉我们：诚信是做人的根本，说到就要做到；同时，改革创新才能让国家和社会不断进步！"], "imgKey": "shangyang"}, "张仪连横——靠嘴皮子打天下": {"paragraphs": ["战国时候，七个国家天天打来打去。有个叫张仪的年轻人，满腹才华，口才特别好，可是穷得连饭都吃不起。他有个好朋友叫苏秦，两个人都是靠嘴巴吃饭的说客。", "张仪听说好朋友苏秦在赵国当了大官，就跑去投奔他。可是苏秦呢，不仅不好好招待他，还让他坐在堂下，给他吃仆人的饭菜，言语之中还带着嘲讽：张仪啊，你这么有才华，怎么混成这样？", "张仪气得脸都绿了，他一甩袖子离开了赵国。走在路上，张仪越想越气：苏秦这个家伙，太瞧不起人了！我一定要出人头地，让他看看！", "张仪决定去秦国，因为秦国正在招揽人才。他一路风餐露宿，终于来到了秦国。凭着三寸不烂之舌，张仪很快就得到了秦惠文王的赏识，当上了客卿——就是国王的顾问。", "张仪对秦王说：大王，我有一个计策，可以帮秦国打败其他六国！秦王问：什么计策？张仪说：连横！就是让秦国和几个国家结盟，一个一个地瓦解那些敌对的国家！", "张仪的嘴皮子可真厉害！他一会儿跑到楚国，说服楚国和齐国断交；一会儿跑到魏国，劝说魏国和秦国联盟。他就像一条滑溜溜的泥鳅，在六个国家之间游走，把各国耍得团团转。", "后来，张仪成功说服了楚国和其他几个国家和秦国结盟，秦国的势力越来越大。他用一张嘴，为秦国统一天下立下了大功！", "张仪连横的故事告诉我们：有时候，知识就是最强大的武器。张仪虽然穷困潦倒，但他凭借自己的口才和智慧，最终实现了自己的人生价值！"], "imgKey": "zhangyi"}, "苏武牧羊——十九年的坚守": {"paragraphs": ["西汉时期，匈奴是北方最强大的游牧民族，他们经常侵犯中原。有一年，匈奴又来挑衅，汉武帝派苏武带着使团去谈判，顺便送还扣押的匈奴使者。", "苏武是个正直忠诚的人，他带着一百多人出发了。可是刚到匈奴的地盘，赶上匈奴内部发生叛乱，苏武他们被卷了进去，稀里糊涂地就成了俘虏。", "匈奴的单于听说苏武是个有才能的人，就想劝他投降。单于派了以前的汉朝降将李陵去劝说：苏武啊，你在这里受苦，何必呢？汉朝皇帝早就把你忘了，你投降吧，我们好好对待你！", "苏武听了，气得浑身发抖。他拔出刀来，就要自杀：李陵！你这个叛徒！我苏武宁可死，也不会背叛大汉！幸好旁边的人拼命拦住了他。", "单于见苏武不肯投降，就把他关进了一个大地窖里，不给吃的，不给喝的。那时候正好是冬天，北风呼呼地吹，雪花飘进来，苏武又冷又饿。可是他嚼着毡毛、咽着雪水，硬是撑了下来。", "单于没有办法，就把苏武流放到北海——就是今天的贝加尔湖一带去牧羊。单于对他说：等这些羊生了小羊，你就回中原吧！可苏武一看，那些羊全是公羊，根本不可能生小羊！这是故意刁难他啊！", "就这样，苏武在北海牧羊，一待就是十九年！他的节杖——那根代表汉朝的旌节，上的毛都掉光了，可他还每天拄着它，不曾丢弃。十九年后，汉朝和匈奴关系缓和，苏武终于回到了祖国。", "苏武牧羊的故事告诉我们：无论遇到多大的困难和诱惑，都要坚守自己的信念和节操！苏武用十九年的坚守，诠释了什么叫忠诚！"], "imgKey": "suwu"}, "荆轲刺秦王——风萧萧兮易水寒": {"paragraphs": ["两千多年前的战国末期，秦国的国王秦始皇越来越强大，他想把其他六个国家都灭掉，统一全中国。燕国的太子丹从小和秦始皇一起在秦国当人质，他深知秦始皇的野心，心里害怕极了。", "太子丹回到燕国后，整天发愁：秦国的军队那么厉害，我们怎么能打得过呢？他的谋士田光出了一个主意：与其等秦国来打我们，不如我们先派人去刺杀秦始皇！没了秦始皇，秦国不就乱了吗？", "太子丹觉得这个主意不错，就问田光：谁能担当这个重任呢？田光说：我的朋友荆轲是个勇士，他武艺高强，又有一身正气，一定能完成这个任务！于是，田光把荆轲推荐给了太子丹。", "太子丹见到荆轲，恭敬地说：荆轲啊，秦国就要来灭我们了，我想请你刺杀秦始皇。如果你愿意去，我会给你最好的马车、最锋利的匕首，还让勇士秦舞阳当你的助手。", "荆轲沉默了很久，最后说：太子这么信任我，我愿意去！不过，我要完成这个任务，还需要一样东西——秦国叛将樊於期的人头。秦王一直想抓他，如果你把他的人头给我，秦王一定会很高兴地接见我。", "太子丹虽然不忍心，但为了国家，还是咬牙答应了。樊於期听说后，流着泪说：太子对我这么好，我怎么能贪生怕死呢？说完，他就拔剑自刎了。", "荆轲带着樊於期的人头和燕国的地图，和秦舞阳一起出发了。临走那天，太子丹和所有的朋友都来送行。寒风吹过易水，水面波光粼粼，大家的心情却沉重得像压了一块大石头。", "太子丹给荆轲斟了一杯酒，哽咽着说：荆轲，你一定要成功啊！荆轲接过酒杯，一饮而尽，然后唱道：风萧萧兮易水寒，壮士一去兮不复还！唱完，他头也不回地上了马车，消失在漫天黄沙中。", "荆轲来到秦国，用重金买通了秦王的侍从，终于得到了觐见的机会。秦王听说燕国送来了樊於期的人头，高兴极了，立刻召见荆轲。", "荆轲捧着装有樊於期人头的盒子，秦舞阳捧着地图，一步步走向秦王的大殿。秦舞阳紧张得脸色发白，双腿发抖。秦王的大臣们觉得奇怪：这人怎么这么害怕？荆轲笑着解释道：他是北方蛮夷之地来的粗人，从没见过大王的威严，所以紧张。", "秦王让荆轲上前，把地图慢慢展开。当地图全部展开时，一把锋利的匕首露了出来——这就是太子丹准备的徐夫人匕首，剧毒无比，沾上就死！荆轲眼疾手快，一把抓起匕首，向秦王刺去！", "秦王吓了一跳，赶紧往后退，袖子被荆轲抓住了。秦王挣断袖子，拼命逃跑。荆轲紧追不舍，可秦王的侍从们围了上来。混乱中，秦王拔剑砍断了荆轲的左腿，荆轲摔倒在地。", "荆轲躺在地上，看着秦王，忽然哈哈大笑：哈哈哈！我本来想活捉你，逼你签下协议，把侵占各国的土地还回去。没想到老天不帮我啊！说完，他用力把匕首投向秦王，匕首擦过秦王的耳朵，钉在了柱子上。", "秦王吓得魂飞魄散，侍从们一拥而上，把荆轲和秦舞阳乱剑刺死。荆轲虽然死了，但他的勇气和忠诚，永远被后人记住了。", "荆轲刺秦王的故事告诉我们：虽然荆轲没有成功，但他的勇气和为国捐躯的精神值得我们敬佩。为了正义的事业，哪怕牺牲生命也在所不惜，这种精神叫做'义'！"], "imgKey": "jingke"}, "李广射虎——飞将军的传奇": {"paragraphs": ["一千多年前的西汉时期，有一位威名赫赫的将军叫李广。他武艺高强，箭术更是天下无双，骑马射箭百发百中，匈奴人听到他的名字就害怕，都叫他飞将军。", "李广年轻的时候，在边境当一个小官。有一天，他带着几个士兵去巡逻，忽然看到草丛里蹲着一只老虎！李广二话不说，弯弓搭箭，瞄准老虎嗖的一箭射了过去。", "老虎应声倒下，士兵们跑过去一看，都惊呆了——原来那不是真老虎，是一块像老虎形状的大石头！李广的箭射进了石头里，只剩下箭尾露在外面。大家纷纷赞叹：将军的箭术真是神了！", "可是李广心里在想：是不是真的老虎呢？他又射了几箭，可是石头太硬了，箭都折断了，箭头却怎么也射不进去了。大家奇怪地问：为什么第一次能射进去，后来就不行了呢？", "李广想了想说：大概是我第一次以为射的是真老虎，心里想着一定要射死它，精神高度集中，力量也就特别大吧！后来知道是石头，心里的那股劲就没那么足了。", "这个故事告诉我们：做事要专心致志，全神贯注才能发挥出最大的力量。李广第一次射石入虎，就是因为他把石头当成了真老虎，全力以赴呢！", "李广不仅箭术好，打仗也特别勇敢。有一年，匈奴大军来进攻，李广带着一百名骑兵去侦察敌情。没想到半路上遇到了几千个匈奴兵！", "士兵们吓坏了：将军，敌人那么多，我们快跑吧！李广却镇定地说：别慌！我们离大营还有几十里，如果现在跑，匈奴一定会追上来把我们全部消灭。不如我们装作若无其事的样子，说不定能吓退他们！", "李广下令：大家下马，把马鞍都卸下来，让马儿在草地上吃草！士兵们虽然害怕，但都相信李广的命令。大家坐在地上休息，好像在野餐一样轻松。", "匈奴的将军远远看到这一幕，纳闷极了：汉军怎么这么悠闲？难道有埋伏？他越想越害怕，最后竟然下令全军撤退了！李广就这样用空城计吓退了匈奴大军。", "可是李广的一生并不顺利。他虽然立了很多战功，却始终没有被封侯。和他一起参军的士兵，很多都已经当上了大官，只有他还是一个普通的将军。", "李广心里郁闷，找到了一个叫王朔的人问：我的战功不算少吧？为什么我始终不能封侯呢？王朔想了想说：将军你有没有做过什么后悔的事？李广叹了口气说：当年我打赢了仗，却坑杀了很多俘虏……也许这就是报应吧。", "王朔说：这就是了。坑杀俘虏是不对的，这就是将军不能封侯的原因啊。李广听了，沉默了很久很久。", "李广一生戎马，最后在一次战斗中迷路，没能及时赶到战场支援。他觉得没脸见人，悲愤地拔剑自刎了。那一年，他六十多岁。", "消息传出后，边境的老百姓都哭了：飞将军走了，再也没有人保护我们了！直到今天，人们还在怀念这位英勇的飞将军。", "李广射虎的故事告诉我们：做任何事情都要专心致志、全力以赴。同时，做人要善良，不能做伤害无辜的事情，否则会留下遗憾的！"], "imgKey": "liguang"}, "烛之武退秦师——三寸之舌强于百万之师": {"paragraphs": ["两千六百多年前的春秋时期，有一天，郑国突然来了两支大军——秦国和晋国！这可是两个超级大国，他们联合起来攻打郑国，郑国的国君吓得脸都白了。", "大臣们也都慌了神：完了完了，秦国和晋国一起打我们，我们这么小个国家，怎么打得过啊！有人建议：不如投降吧！有人说：赶紧向其他国家求救吧！可是谁敢来救呢？", "就在大家束手无策的时候，一个七十多岁的老人站了出来。他满头白发，步履蹒跚，可是眼睛里闪着智慧的光。他就是烛之武——郑国一个小小的养马官。", "郑国国君一看，惊讶地问：烛之武？你能退秦晋两国的大军？烛之武捋了捋白胡子，慢悠悠地说：大王，我虽然老了，但还有一张嘴呀。让我去试试吧，说不定能说退秦国的军队呢！", "当夜，月黑风高，郑国的士兵用绳子把烛之武从城墙上放了下去。烛之武摸黑来到了秦国的军营，求见秦穆公。", "秦穆公傲慢地说：你是谁？见我有什么事？烛之武不卑不亢地说：大王，我是郑国的使臣，来给您送一份大礼的。", "秦穆公冷笑一声：送大礼？你们郑国都快被我们灭了，还有什么礼可送？烛之武笑了笑说：大王息怒，且听我说完。您的军队比晋国强大十倍，晋国比郑国强大十倍。如果灭了郑国，晋国占了郑国的土地，不是更加强大了吗？到时候，晋国的实力超过秦国，您不担心吗？", "秦穆公听了，眉头微微一皱，心里开始盘算。烛之武看出了他的犹豫，继续说道：大王，您和晋国虽然是盟友，但盟友也会变成敌人啊。当年晋国的国君重耳流浪各国，是您帮他回到晋国当了国君。可是他当上国君后，答应给您的城池给过吗？", "这句话说到了秦穆公的痛处。当年他确实帮过晋文公重耳，可是晋文公当了国王后，根本没有给他任何好处！秦穆公的脸色越来越难看。", "烛之武趁机说道：大王，您看，晋国这个国家，说话不算话，今天是盟友，明天可能就是敌人。可是郑国不一样，郑国愿意永远做秦国的朋友，您把郑国留着，以后秦国的人到东方办事，郑国可以提供食宿和帮助，这不是更好吗？", "秦穆公越听越觉得有道理，他一拍大腿说：说得太好了！郑国不能灭！我要撤兵！", "大臣们连忙劝阻：大王，我们和晋国约定好了共同伐郑，现在撤兵，晋国怎么办？秦穆公摆摆手说：管他呢！郑国能给我好处，晋国能给我什么？撤兵！", "于是，秦国的大军连夜撤退了。晋国一看秦国跑了，没办法，只好也跟着撤了兵。郑国就这样化险为夷，保住了自己的国家。", "这就是历史上著名的'烛之武退秦师'。一个七十多岁的老人，靠着三寸不烂之舌，不费一兵一卒，就退了秦晋两国的大军，真是太厉害了！", "烛之武的故事告诉我们：知识就是力量！有时候，一个人的智慧可以胜过千军万马。所以小朋友们，要好好读书，学习知识，说不定有一天，你也能用智慧解决大问题呢！"], "imgKey": "zhuzhiwu"}, "萧何月下追韩信——伯乐识千里马": {"paragraphs": ["两千多年前的楚汉争霸时期，有两个大英雄——项羽和刘邦。他们都想当皇帝，于是打来打去，打了好几年。", "刘邦的军队里有一个小士兵叫韩信，他家里很穷，从小就被人看不起。有一次，韩信在街上被一个屠夫欺负，屠夫说：你这么大个子，还整天背着剑，其实就是个胆小鬼！有本事你拿剑刺我啊！不敢刺，就从我的裤裆下钻过去！", "韩信看了屠夫一眼，二话不说，趴在地上，从屠夫的裤裆下面钻了过去。街上的人都笑话他：哈哈哈，这个人真没用！韩信却什么也没说，爬起来拍拍土，头也不回地走了。", "后来，韩信投奔了刘邦的军队，当了一个管仓库的小官。可是他觉得自己的本事没有发挥出来，就偷偷地跑了。", "这一天，刘邦的丞相萧何正在处理公务，忽然有人报告：丞相，大事不好！韩信跑了！萧何一听，急得跳了起来：什么？韩信跑了？不行，我得去追他！", "萧何来不及向刘邦报告，连夜骑马去追韩信。那天晚上，天黑得伸手不见五指，月亮躲在云层后面，路都看不清。萧何骑马跑了很久，终于在一座桥边追上了韩信。", "萧何气喘吁吁地说：韩信，你别跑了！韩信苦笑说：丞相，我在刘邦这里根本没有用武之地，我不跑干什么？萧何认真地说：你错了！刘邦这个人虽然看起来粗粗拉拉的，但他是个做大事的人。他需要你这样的人才！", "韩信摇摇头说：可是刘邦根本看不起我……萧何打断他的话：那是以前！现在我向你保证，我一定向刘邦推荐你，让你当大将军，统领所有军队！", "韩信的眼睛亮了：大将军？萧何郑重地点点头说：对！就是大将军！韩信想了想，最后答应跟萧何回去。", "萧何带着韩信回来，刘邦又惊又喜：什么？你去追一个逃跑的小兵？萧何严肃地说：大王，韩信不是普通的小兵。他是真正的军事天才！普天之下，没有人能比得上他！如果您想夺取天下，就必须重用韩信！", "刘邦半信半疑：真的吗？一个钻过别人裤裆的人，能有多厉害？萧何说：大王，当年齐桓公也钻过别人裤裆，后来不也成了霸主吗？用人要用他的长处，不能计较他的小节！", "刘邦被萧何说动了，于是举行隆重的仪式，封韩信为大将军。韩信穿上大将军的官服，站在高台上，接受将士们的朝拜。大家都惊呆了：这个钻过别人裤裆的人，竟然当上了大将军！", "可是韩信没有让大家失望。他运用自己的军事天才，为刘邦出谋划策，打败了一个又一个敌人。最后，刘邦真的当上了皇帝，建立了汉朝。", "萧何月下追韩信的故事告诉我们：人才是无价之宝，要善于发现和珍惜人才。同时，是金子总会发光的，即使现在被人看不起，只要坚持努力，总有一天会展现出真正的价值！"], "imgKey": "xiaohao"}, "孙武练兵——斩杀吴王爱妃的军事家": {"paragraphs": ["两千五百多年前，齐国有个叫孙武的年轻人，他聪明过人，特别喜欢研究打仗的方法。他写了一本叫《孙子兵法》的书，这本书后来成了全世界最厉害的军事著作。可是那个时候，没有人知道他是个真正的人才。", "有一天，孙武带着自己写的兵法，去见吴国的国王吴王阖闾。吴王接过兵法，翻了几页，越看越喜欢，拍着桌子说：太好了！你的兵法太厉害了！可是光有兵法还不行，得看看你有没有真本事。你能不能用我的宫女们练练兵，让我看看？", "孙武说：当然可以！于是吴王把自己后宫的一百八十名宫女叫来，让孙武训练。孙武把宫女们分成两队，让吴王最宠爱的两个妃子当队长。宫女们嘻嘻哈哈的，觉得好玩极了，拿着兵器左摇右晃，像在跳舞一样。", "孙武一本正经地说：你们听着，向前看！眼睛看着我手指的方向！宫女们还是嘻嘻哈哈的，没人理会他。孙武皱起眉头，提高声音又说了一遍，可宫女们笑得更厉害了。", "孙武沉下脸来，大声说：听令不听宣，是谁的错？是我没说清楚，还是你们不听命令？他转头问吴王：大王，士兵不听命令，按照军法该斩首。宫女们是你的妃子，是斩还是不斩？", "吴王在一边看得正高兴，听到这话吓了一跳：什么？斩首？她们可是我心爱的妃子啊！你就不能放她们一马？孙武严肃地说：既然大王让我当将军，就要听我的！士兵不听命令，这是带兵的大忌！", "孙武一声令下，两名妃子被绑了起来。宫女们吓得脸色煞白，再也不敢笑了。吴王在上面急得直跺脚：别斩啊别斩啊！那可是我的爱妃啊！可是孙武根本不听，手起刀落，两名妃子的人头落地。", "宫女们全都吓傻了，再也不敢嘻嘻哈哈，都认认真真地听令操练。不一会儿，一百八十名宫女就训练得像真正的士兵一样整齐。", "吴王虽然心疼两个爱妃，可心里也不得不佩服：孙武真是个人才啊！从此以后，吴王重用孙武，让他带领吴国军队。孙武帮助吴国成了春秋时期最强大的国家之一。", "孙武练兵的故事告诉我们：无规矩不成方圆，做任何事情都要有纪律。将军没有威严，士兵不听命令，怎么能打胜仗呢？严格要求才是真正的爱护！"], "imgKey": "sunwu"}, "贝多芬——无声的音乐": {"paragraphs": ["两百多年前，德国有一个叫贝多芬的小男孩。他的爸爸是个歌手，整天喝酒，总想着把儿子培养成第二个莫扎特那样的音乐神童。每天晚上，爸爸都要小贝多芬练琴好几个小时，弹不好就挨打。小贝多芬哭着练琴，小手都弹得又红又肿了。有时候他真的很讨厌钢琴，心想：为什么别的小朋友可以出去玩，我却要一直练琴呢？", "可是慢慢地，贝多芬发现钢琴能发出美妙的音乐，能让人快乐，也能让人感动。他开始真正爱上音乐了，每天不用爸爸催，自己就坐到琴凳上练习。渐渐地，他的琴弹得越来越好了。贝多芬长大后成了有名的音乐家，他的音乐让无数人感动。可是正当他最辉煌的时候，灾难降临了——他的耳朵开始听不见声音了！对音乐家来说，这是多么可怕的事情啊！", "贝多芬伤心极了，把自己关在房间里，不吃不喝，也不想见任何人。他绝望地想：完了，我的音乐生涯结束了……那段时间，他的心里充满了黑暗。可是渐渐地，贝多芬想通了：虽然耳朵听不见了，可是我心里的音乐还在啊！我可以用心去感受音乐，把最美妙的旋律写下来！", "就这样，贝多芬在完全听不见的情况下，用牙咬着木棒，木棒顶在钢琴上，靠着振动来感受音乐。他写出了《命运交响曲》、《第九交响曲》等流传千古的伟大作品。《第九交响曲》第一次演奏那天，观众们激动得全体起立，掌声雷动。可是贝多芬自己什么都听不见，直到有人转过他的身子，他才看到观众热烈的掌声——掌声是那样的响亮，响亮得整个大厅都在震动！", "贝多芬的故事告诉我们：真正的坚强，是遇到最大的困难也不放弃。命运可以夺走他的听力，却夺不走他心里的音乐！"], "imgKey": "贝多芬——无声的音乐"}, "程门立雪——尊师重道": {"paragraphs": ["北宋时候，洛阳有两位非常有名的大学问家——程颢和程颐，他们兄弟俩一起创办了理学，被后人称为二程先生。很多人都想拜他们为师，其中有一个叫杨时的年轻人，特别好学。", "有一天，杨时遇到了一个难题，怎么想也想不明白。他想起了程颐先生，心想：程先生一定知道答案！于是，他告别了朋友，冒着大雪，一路跌跌撞撞地往程先生家走去。", "那时候正好是深冬，天冷极了，鹅毛大雪纷纷扬扬地飘落下来。杨时的脸被冻得通红，眉毛上挂着白色的霜珠，鞋子也被雪水浸湿了。可是他顾不上这些，只想着快点见到程先生。", "好不容易到了程家门口，杨时发现程先生正在屋子里睡午觉呢！程先生年纪大了，睡觉总是不太安稳，好不容易睡着了，杨时怎么忍心叫醒他呢？", "杨时想了想，轻轻地脱下帽子，解下围巾，安静地站在门口的屋檐下。他想：我就等一会儿吧，程先生一定会醒的。雪花一片一片地落在他的肩膀上，杨时一动也不动，就像一尊雪人。", "一个时辰过去了，两个时辰过去了……程先生还在睡觉。杨时的脚冻麻了，手冻僵了，鼻涕都快冻成冰棍了！旁边还有一个小同学，也跟着一起站着冻得直跺脚。小同学忍不住小声说：杨时哥哥，我们进去烤烤火吧……", "杨时摇摇头，轻声说：不行，我们不能吵醒先生。再等等吧，再等等他就醒了。说完，他又默默地站好，生怕发出一点点声音。", "又过了好久好久，程先生终于醒了。他伸了个懒腰，推开门往外一看——哇，门口竟然站着两个雪人！仔细一看，才认出是杨时和他的同学。程先生又惊讶又感动：这么大的雪，你们怎么不进来叫我呢？", "杨时恭恭敬敬地说：先生，学生不敢打扰您休息。我们多等一会儿没关系，您睡个好觉比什么都重要。程先生听了，眼眶都红了，心里想：这样的学生，真是太难得了！", "程门立雪的故事告诉我们：真正的求学精神是发自内心的尊敬，哪怕等得再久也不抱怨——这就是尊师重道的道理！"], "imgKey": "程门立雪——尊师重道"}, "居里夫人——发光的石头": {"paragraphs": ["在一百多年前的波兰，有一个叫玛丽的小女孩。她家里很穷，爸爸是教师，妈妈是音乐老师。可是玛丽从小就特别喜欢读书，她觉得书里有一个奇妙的世界，比任何玩具都好玩。", "那时候女孩子很难上大学，可是玛丽不肯认输。她白天打工洗衣服赚钱，晚上就偷偷躲在阁楼里学习。冬天的波兰冷得要命，阁楼里没有暖气，小玛丽的手指冻得通红，可她还是舍不得放下书本。", "功夫不负有心人，玛丽终于考上了大学，还获得了去法国深造的机会。在法国，她遇到了和她一样热爱科学的皮埃尔，两个人结为夫妻，一起研究一种神奇的石头。", "这种石头会发出淡淡的蓝光，还能发出看不见的射线呢！他们在一个简陋的实验室里，一锅一锅地煮矿石，又脏又累又呛人。可是玛丽从不怕脏不怕累不怕苦，因为她的心里装着更大的梦想——要找到能治病的良药！", "经过四年的艰苦研究，玛丽终于从好几吨矿石中提炼出了一丁点儿发光的粉末，她给它取名叫镭。你们知道吗？这么一点点镭，要从好几吨矿石里才能提炼出来呢！", "镭可以用来治疗一种很可怕的病——癌症。很多得了癌症的病人，因为有了镭的治疗，终于能够康复出院，和家人团聚了。", "有人劝玛丽给镭申请专利，这样就能发大财。可是玛丽摇摇头说：镭是属于全人类的，不是属于我一个人的。她把发现的方法无私地告诉了全世界，自己却一辈子住在简陋的小房子里，过着简朴的生活。", "后来，玛丽两次获得了诺贝尔奖，成为了世界上最伟大的科学家之一。可是她从来不骄傲，她说：荣誉就像玩具一样，不值得炫耀。真正的伟大，不是为了自己，而是为了让更多人过得更好！"], "imgKey": "居里夫人——发光的石头"}, "达·芬奇——画蛋的天才": {"paragraphs": ["五百多年前，意大利有一个叫达·芬奇的小男孩。他从小就特别喜欢画画，画什么像什么——画小鸟像要飞起来，画小鱼像在水里游，连蚂蚁画出来都有六条腿呢！邻居们看了都惊叹不已，纷纷夸他是小天才。", "达·芬奇的爸爸看他这么有天赋，高兴极了，就把他送到佛罗伦萨最有名的画家韦罗基奥那里学画。达·芬奇高兴得一蹦三尺高，心想：太好了！终于可以学真正的画画了！", "可是到了老师那里，达·芬奇傻眼了——老师不让他画别的，就让他画鸡蛋。一天画鸡蛋，两天画鸡蛋，三天还是画鸡蛋……小达·芬奇不耐烦了，忍不住问老师：老师，我已经画了这么多蛋了，什么时候才能画别的呀？", "老师笑着摇摇头，指着一个鸡蛋说：你看，这一个鸡蛋，从这个角度看是椭圆的，从那个角度看是扁的，光照过来又不一样了。这一千个鸡蛋，有哪两个是一模一样的呢？画蛋，是训练你的眼睛和手，让你学会认真观察。", "达·芬奇听了老师的话，恍然大悟：原来画画不是画得像不像那么简单，要用心去观察啊！从此他认认真真地画蛋，画了无数个蛋，把基本功练得特别扎实。", "后来，达·芬奇真的成了全世界最著名的画家之一。他画出了《蒙娜丽莎》——那幅微笑着的世界上最神秘的画，还画了《最后的晚餐》，影响了无数人。", "不仅如此，达·芬奇还是个全才呢！他设计过直升机、坦克、潜水艇的图纸，研究过人体解剖，还发明了很多奇妙的机器。那时候人们都叫他：万能的天才！", "达·芬奇的故事告诉我们：打好基础比什么都重要。就像盖房子一样，地基打不牢，房子就盖不高。达·芬奇画了无数个蛋，才成了最伟大的画家。你现在练习的基本功，都是以后成功的基石哦！"], "imgKey": "达·芬奇——画蛋的天才"}, "爱迪生——永不熄灭的灯": {"paragraphs": ["很久很久以前，夜晚的世界是黑漆漆的。人们只能点蜡烛或者油灯，光线很微弱，一不小心还会引发火灾。有一个叫爱迪生的小男孩，从小就特别爱问为什么——为什么天会下雨？为什么鸟会飞？为什么星星会眨眼睛？问得大人们都答不上来，大家都叫他'问题大王'。", "爱迪生长大后，想发明一种又亮又安全的灯，让所有人都能在夜晚看到光明。他找来各种各样的材料做试验：白金试试，碳丝试试，甚至头发丝也试试！可是灯泡总是亮一下就灭了。试验了一次又一次，失败了一次又一次。", "很多人笑话他：你已经失败了几百次了，还是放弃吧！爱迪生的助手们也泄气了，问他还要不要继续试下去。", "可爱迪生不这么想。他笑眯眯地说：我没有失败啊，我只是发现了几百种不能做灯丝的方法！每失败一次，就离成功更近一步！他继续试验，试了竹丝、棉线、纸张……一直试了一千多次！", "终于有一天晚上，实验室里传来一阵欢呼声——灯泡亮了！而且亮了整整四十多个小时！爱迪生激动得跳了起来，眼睛里闪着泪光。", "从此，世界上有了电灯，黑夜变得像白天一样明亮。人们可以在灯下读书、写字、工作、玩耍，再也不用害怕黑暗了。", "爱迪生一生发明了两千多种东西，是世界上最伟大的发明家之一。他用行动告诉我们：只要不放弃，就一定能找到成功的路！失败不可怕，每失败一次，就离成功更近一步！"], "imgKey": "爱迪生——永不熄灭的灯"}, "伽利略——星空的守望者": {"paragraphs": ["四百多年前，意大利有个叫伽利略的小男孩，出生在一个音乐家的家庭里。小伽利略从小就特别爱问问题——天上的星星为什么眨眼睛？月亮为什么会变形状？云为什么会飘来飘去？这些问题问得爸爸都答不上来。", "伽利略长大后，成了一名老师，还发明了很多有用的东西。他听说荷兰有人发明了一种神奇的镜子，可以看到很远很远的地方。伽利略想：如果我能用这个原理做出一个更好的东西，不就可以看到天上的星星了吗？", "于是，伽利略开始日夜不停地研究。他画了很多图纸，做了很多实验，有时候一做就是几天几夜不合眼。终于，他做出了世界上第一台真正的天文望远镜！", "伽利略把望远镜对准天空，哇，他看到了好多好多从前看不到的东西——月亮上有高高的山，金星也会像月亮一样有圆有缺，木星旁边还有四颗小星星在转来转去……这些发现，让所有人都惊呆了！", "可是，当时的人们都说：不对不对！月亮是完美的球，上面的山都是骗人的！伽利略被很多人嘲笑，还有人说他是骗子。", "但伽利略不在乎别人怎么说，他只相信自己的眼睛看到的东西。他把所有的发现都写成了书，告诉全天下的人：看，这就是我看到的！这就是宇宙的真相！", "后来，伽利略被坏人关进了监狱。大家以为他会屈服，可他一直坚持自己的观点。临死前，他还说：地球确实是在转动的！", "伽利略去世后三百多年，人类真的登上了月球，登上了火星探测器，证明了伽利略说的是对的。他用望远镜看到的那些东西，全都是真的！", "伽利略的故事告诉我们：坚持真理需要勇气，哪怕全世界都不相信你，也要相信自己的眼睛和思考！"], "imgKey": "galileo"}, "华佗——神医的故事": {"paragraphs": ["华佗是东汉末年最有名的神医，被后人称为外科的祖师爷。他从小聪明好学，四处拜师学医，走遍了千山万水，医术越来越精湛。", "华佗给人看病可神奇了！他只需要看看病人的脸色、听听病人的声音，就能准确地判断出病情是什么。有时候，他甚至只要把一下脉，就能知道病人肚子里长没长东西。", "有一次，州官倪寻和李延一起来了，两个人都头疼发热。华佗分别给他们把脉后，却开了不同的药方。倪寻奇怪地问：为什么我们症状一样，你开的药却不同呢？", "华佗笑着说：你们两个虽然症状相同，但病因不一样。倪寻是吃多了，肚子里的东西不消化；而李延是受了风寒。治病要治本，不能只看表面症状！果然，两个人吃了药，很快就好了。", "华佗发明了一种独特的健身方法，叫做五禽戏。他模仿虎、鹿、熊、猿、鸟这五种动物的动作，创编了一套体操。华佗的徒弟坚持练习这套体操，活到了九十多岁呢！", "华佗最厉害的是外科手术！当时没有麻醉药，做手术可是非常痛苦的事情。华佗研制出了一种叫麻沸散的中药，病人喝了以后，就像睡着了一样，一点也感觉不到疼。然后华佗再给病人开刀做手术，病人醒过来的时候，手术早就做完了，一点痛苦都没有！", "三国时候的曹操，患有头疼病，听说华佗医术高明，就把他请来。华佗说要用斧头砍开脑袋，把里面的风涎取出来。曹操吓坏了，以为华佗要害他，就把华佗关进了监狱。可怜的神医，最后死在了监狱里。", "华佗去世后，他的医术被弟子们传承了下来。后世的中医外科，一直都在使用华佗发明的很多方法和药物。人们永远怀念这位了不起的神医！", "华佗的故事告诉我们：医者仁心，治病救人是医生的天职。同时，要因人而异、对症下药，不能教条主义！"], "imgKey": "huatuo"}, "牛顿——苹果的秘密": {"paragraphs": ["三百多年前，英国有一个小男孩叫牛顿。他从小就和其他孩子不一样——别的孩子在院子里追逐打闹的时候，他却喜欢蹲在角落里做各种小玩意儿。", "牛顿做的小风车会转，做的小水钟会按时滴水，还会报时呢！他还喜欢爬上屋顶，用三棱镜对着阳光看——哇，阳光居然能变成彩虹的颜色！小伙伴们都说牛顿是个怪孩子，可牛顿才不在乎呢，他觉得这个世界太有意思了，有好多秘密等着去发现。", "有一天傍晚，牛顿坐在苹果树下看书，看得入了迷。忽然，咚的一声，一个又红又大的苹果从树上掉下来，正好砸在他的头上。牛顿揉了揉脑袋，抬头看了看苹果树，心里忽然冒出一个问题：", "苹果为什么会往下掉呢？为什么不往天上飞，也不往旁边跑，偏偏往下掉呢？", "这个问题让牛顿想了好久好久。他想啊想，想到月亮，想到太阳，想到星星……终于有一天，他想明白了：原来地球有一种看不见的吸引力，像一只无形的大手，把所有东西都往下拉！这就是万有引力！月亮绕着地球转，也是因为地球在拉着它呢！", "牛顿后来成了伟大的科学家，发明了数学里的微积分，还发现了许多重要的科学定律。可是他从来都不骄傲，他总是说：我只是像一个在海边捡贝壳的孩子，真理的大海还有太多太多我没有发现。", "牛顿的故事告诉我们：多观察、多思考，再普通的事情里也可能藏着大秘密。一个苹果掉下来，就能让牛顿想到改变世界的大发现。你看，身边的小事是不是也值得我们多问几个为什么呢？"], "imgKey": "牛顿——苹果的秘密"}, "诺贝尔——炸药之父": {"paragraphs": ["一百多年前，瑞典有一个叫诺贝尔的小男孩。他的身体很弱，经常生病，妈妈总是担心他。可是小诺贝尔很勇敢，他最喜欢的事情就是跟着爸爸一起做各种小实验。", "有一天，爸爸把一小块白色的粉末放在火上烤。诺贝尔好奇地凑过去看，突然——砰！火药爆炸了，火星四溅！小诺贝尔吓得摔倒在地上，脸都吓白了。可是他的眼睛里闪着光，他没有被吓退，反而兴奋地说：爸爸，再来一次！我想看看它是怎么炸开的！", "诺贝尔长大后，国家正在大力发展工业，需要很多开矿修路的人。可是那时候的炸药很危险，一不小心就会爆炸伤人。诺贝尔想：如果能发明一种更安全的炸药，该有多好啊！", "于是，诺贝尔开始了他的实验。他把自己关在一间小小的实验室里，一次又一次地尝试，一次又一次地失败。有时候爆炸把他炸得满脸黑灰，有时候把他炸到墙上，可他从来不放弃。", "邻居们都在背后笑话他：这个诺贝尔，整天搞那些危险的实验，早晚要被炸死的！诺贝尔听到了，只是笑笑，继续做他的实验。", "有一次，诺贝尔在做实验的时候，炸药把实验室炸得粉碎，诺贝尔的弟弟和几个助手都被炸死了。诺贝尔难过得哭了很久，他也很害怕：这么危险，还要继续吗？", "可是他想起了那些在矿上辛苦劳动的工人们，他们需要炸药来开山修路，让人们生活得更好。诺贝尔擦干眼泪，又走进了实验室。他对自己说：再试一次，就一次！", "一晃眼，二十多年过去了。诺贝尔失败了无数次，炸毁了自己的实验室，炸伤了无数次。就在他快要绝望的时候，有一天，他终于成功了——他发明了一种叫做硝化甘油的安全炸药！", "这种炸药不会轻易爆炸，只有用雷管才能引爆。工人们可以安全地使用它来开矿、修路、盖房子。诺贝尔高兴得跳了起来，他终于成功了！", "后来，诺贝尔用他发明炸药赚的钱设立了诺贝尔奖，这是全世界最光荣的奖项。诺贝尔奖包括和平奖、物理奖、化学奖、医学奖、文学奖和经济学奖，用来奖励全世界最优秀的人才。", "诺贝尔的故事告诉我们：失败不是终点，而是通往成功的必经之路。只要坚持不懈，总有一天会成功！"], "imgKey": "诺贝尔——炸药之父"}, "司马迁——忍辱负重的史学家": {"paragraphs": ["司马迁是西汉时期著名的史学家，他写的《史记》被称为史书的典范。可是你知道吗？司马迁能写出这么伟大的著作，经历了常人难以想象的苦难！", "司马迁从小就是个爱读书的孩子。他的父亲司马谈是汉朝的史官，专门负责记录历史。司马迁从小跟着父亲，耳濡目染，对历史产生了浓厚的兴趣。他立志要像父亲一样，成为一个记录历史的史官。", "长大后，司马迁当上了史官，开始四处游历，收集历史资料。他爬过巍峨的泰山，去过波涛汹涌的海边，访遍了古代名人故事发生的地方。他访问老人，收集古老的传说，就是为了把历史写得真实可信。", "公元前99年，发生了一件改变司马迁命运的事情。将军李陵在和匈奴打仗的时候，兵败被俘了。司马迁替李陵说了几句公道话，结果惹怒了汉武帝，被关进了大牢，判处了宫刑！", "宫刑是一种非常屈辱的刑罚，司马迁觉得天都要塌下来了。他想过自杀，一了百了。可是他转念一想：我的父亲把写史书的任务交给了我，《史记》还没写完呢！如果我就这样死了，谁来完成这部伟大的著作？", "司马迁咬紧牙关，活了下来。他说：人固有一死，或重于泰山，或轻于鸿毛。我要活下去，把《史记》写完！就这样，他在极其屈辱和痛苦中，继续坚持写作。", "整整十三年，司马迁忍着身体和心灵的巨大痛苦，终于完成了《史记》！这部书记载了从黄帝到汉武帝时期三千多年的历史，共有五十二万多字，是我国第一部纪传体通史！", "司马迁的故事告诉我们：遇到困难和挫折的时候，不要轻易放弃。要像司马迁一样，咬紧牙关坚持下去，完成自己的使命！《史记》至今仍然是中华民族最宝贵的文化遗产之一！", "司马迁的故事告诉我们：人的一生会遇到很多困难，但只要坚持理想、不放弃，就一定能创造出伟大的成就！"], "imgKey": "simaqian"}, "华盛顿——美国的国父": {"paragraphs": ["两百多年前，美国有一个叫华盛顿的男孩，他出生在一个种烟草的农场主家庭里。小华盛顿从小就跟着爸爸在农场里干活学会了骑马、种地，他的眼睛里总是闪着聪明的光。", "有一天，小华盛顿在森林里迷了路，又累又饿。走着走着，他看到一棵大树上刻着一行字：往前走一百步，再往右转。他照着做了，果然走出了森林！后来他才知道，那是他爸爸故意做的标记，为的是教他如何在森林里辨别方向。", "华盛顿长大后，英国国王派总督来管理殖民地。这个总督经常欺负老百姓，让人们交很重的税，却把钱装进自己的口袋。大家都很生气，可又不敢说什么。", "有一天，总督在广场上宣布：每家每户都要交税，不交的就把房子拆了！老百姓们低着头不敢说话。这时候，华盛顿站了出来，他大声说：凭什么要交这么多税？我们的血汗钱，凭什么被你们抢走？", "总督气得脸都绿了：你敢反抗？小心我让人抓你！华盛顿毫不畏惧：我不怕你！你欺负我们老百姓，早晚会受到惩罚的！围观的人们纷纷鼓掌，总督灰溜溜地跑了。", "后来，美国的老百姓实在受不了英国人的欺负，纷纷拿起武器反抗英国统治。华盛顿被选为大陆军的总司令，带领大家和英国人打仗。", "打仗可不是一件容易的事！华盛顿的军队又缺粮食又缺武器，士兵们常常饿着肚子打仗。有时候，他们甚至没有鞋子穿，脚都冻烂了。华盛顿看着士兵们受苦，心里难过极了。", "有一年冬天，华盛顿的军队只剩下两千多人，大家都觉得撑不下去了。可华盛顿却咬牙坚持，他对士兵们说：只要我们团结一心，就一定能打败英国人！只要我们不放弃，自由就一定会来到！", "经过八年的艰苦奋斗，美国人终于打败了英国人，建立了独立的国家。华盛顿被选为美国第一任总统，大家都叫他美国的国父。", "可是，华盛顿只当了八年总统，就主动辞职不干了！原来，他想让大家自己管理国家，不能让一个人永远当总统。从那以后，美国就有了规矩：总统最多当两届。这个规矩，一直到现在还在用呢！", "华盛顿的故事告诉我们：真正的领袖不是想着怎么拥有权力，而是想着怎么为大家服务。华盛顿放弃权力，为美国树立了榜样——真正的伟大，不是当多大的官，而是为多少人做好事！"], "imgKey": "washington"}, "瓦特与蒸汽机——改变世界的水壶盖": {"paragraphs": ["两百多年前，英国有个叫瓦特的小男孩。他的爷爷和爸爸都是心灵手巧的工匠，家里摆满了各种工具和机器。小瓦特最喜欢蹲在角落里，看着爸爸做东西，心里想着：这个东西是怎么转起来的呀？", "有一天，小瓦特病了，躺在床上发着高烧。妈妈端来一碗热汤让他喝，汤上面冒着白色的热气。小瓦特看着那些热气，忽然问：妈妈，为什么热气会往上冒呢？妈妈笑着说：因为热的东西会变轻，轻了就往上飘啊。小瓦特似懂非懂地点点头。", "瓦特长大了，在一家工厂里修理机器。那时候的机器都用蒸汽来推动，可是这些蒸汽机又笨又重，效率很低，经常出问题。工人们都说：这破机器，真难用！", "可瓦特不这么想。他蹲在蒸汽机旁边，左看看右看看，想啊想啊。有一天，他看到茶壶里的水烧开了，壶盖被蒸汽顶得一上一下，噗噗地响。", "瓦特盯着茶壶看了好久，忽然眼睛一亮：哎呀！我知道问题在哪里了！蒸汽机之所以效率低，是因为每推动一次，汽缸就要冷却一次，然后再重新加热。这多浪费啊！", "瓦特开始研究怎么改进蒸汽机。他在汽缸外面加了一个冷凝器，让蒸汽在冷凝器里冷却，汽缸就能一直保持热乎的状态。这样一来，蒸汽机的效率一下子提高了四倍！", "工厂主听说了，嘲笑他说：瓦特，你就是个修理工，还想发明东西？别做梦了！瓦特听了，也不生气，只是笑笑：我会证明给你看的。", "瓦特继续改进他的蒸汽机。他还发明了一种叫做离心调速器的东西，可以让蒸汽机的速度保持稳定。这样，蒸汽机就可以用在各种机器上了。", "瓦特的蒸汽机越做越好，很快就用到了纺织厂、面粉厂、火车上。工厂的机器不再需要马拉或者水车来带动了，农民们也可以用蒸汽机来抽水灌溉农田。整个世界都变了样！", "后来，人们把瓦特发明的这种蒸汽机叫做瓦特蒸汽机。为了纪念他，人们还用他的名字来作为功率的单位。一台机器有多少马力，就是以瓦特的名字来计算的。", "瓦特的故事告诉我们：好奇心是发明之母。瓦特从一个茶壶盖想到了改变世界的大发明。只要我们平时多观察、多思考，再普通的事物里也可能藏着大秘密呢！"], "imgKey": "watt"}, "莱特兄弟——插上翅膀的梦想": {"paragraphs": ["一百多年前，美国有一对兄弟——威尔伯·莱特和奥维尔·莱特。他们小时候家里很穷，爸爸是个牧师，妈妈心灵手巧，常常给孩子们做玩具。有一天，爸爸从外地回来，带给兄弟俩一个神秘的礼物——一个会飞的竹蜻蜓。", "兄弟俩好奇地把竹蜻蜓转了好几圈，竹蜻蜓真的飞了起来！他们高兴得又蹦又跳，心里种下了一颗小小的种子：长大了，我也要造出一个能飞的东西！", "兄弟俩长大后，一个开了一家自行车店修理自行车，一个当了一名老师。虽然工作很忙，但他们始终没有忘记童年的梦想——让人类飞上天空。", "那时候，已经有很多人在尝试造飞机了，可是全都失败了，还有人因为飞机坠落而失去了生命。大家都说：人类怎么可能像鸟儿一样飞上天空呢？", "可是莱特兄弟不信邪。他们买来很多关于鸟和飞行的书，白天修自行车，晚上就研究飞行知识。他们发现，鸟儿飞行的时候翅膀会上下拍打，飞机的翅膀却不能这样拍打——那飞机是怎么飞起来的呢？", "后来，他们想出了一个好办法：让飞机的翅膀稍微弯曲一点，这样空气流过的时候，就会把飞机托起来！这就是飞机能飞的关键——升力原理。", "有了原理，还需要不断地试验。莱特兄弟在自家的空地上搭了一个大风洞，一次又一次地试验。失败了没关系，爬起来再试；摔坏了修一修，继续飞！", "1903年12月17日这一天，天气冷飕飕的，兄弟俩在北卡罗来纳州的基蒂霍克海滩放飞了他们的飞机——飞行者一号。", "这一天，奥维尔坐上了飞机，螺旋桨转了起来，飞机在滑行了一段距离后，真的飞了起来！虽然只飞了12秒钟，飞了36米远，但这却是人类历史上第一次有动力的飞行！", "人们从四面八方赶来观看，消息传遍了全世界。从那以后，飞机越来越先进，飞得越来越高，越来越远。现在，我们可以坐飞机去地球的另一端，只要十几个小时就能到达。", "莱特兄弟的故事告诉我们：梦想是成功的起点，而坚持梦想、不断尝试，才是让梦想成真的关键！"], "imgKey": "wright"}};
const IMG_BASE = 'img/';
let currentFilter = '全部';
let currentView = 'grid';

function getImgPath(imgKey, idx) { return IMG_BASE + imgKey + '_' + idx + '.jpg'; }

function formatDate(dateStr) {
    const d = new Date(dateStr);
    const weekDays = ['日','一','二','三','四','五','六'];
    return (d.getMonth()+1) + '月' + d.getDate() + '日 周' + weekDays[d.getDay()];
}

function renderHome() {
    const container = document.getElementById('storiesContainer');
    const filteredD = currentFilter === '全部' ? D : D.filter(item => item.c === currentFilter);
    const groups = {};
    for (const item of filteredD) {
        const date = item.d || '未知日期';
        if (!groups[date]) groups[date] = [];
        groups[date].push(item);
    }
    const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));
    let html = '';
    for (const date of sortedDates) {
        const items = groups[date];
        html += '<div class="date-section">';
        html += '<div class="date-header"><span class="date-dot"></span>' + formatDate(date) + '<span class="date-count">(' + items.length + '则)</span></div>';
        if (currentView === 'grid') {
            html += '<div class="stories-grid">';
            for (const item of items) {
                const title = item.s;
                const imgKey = item.imgKey || title;
                const imgSrc = getImgPath(imgKey, 0);
                html += '<div class="story-card" onclick="showStory('' + title.replace(/'/g, "\'") + '')">' +
                    '<img class="card-img" src="' + imgSrc + '" alt="' + title + '" loading="lazy" onerror="this.style.background='var(--primary-light)'">' +
                    '<div class="card-content"><h3 class="card-title">' + title + '</h3>' +
                    '<div class="card-meta"><span>' + item.e + '</span><span class="card-tag">' + item.c + '</span></div></div></div>';
            }
            html += '</div>';
        } else {
            html += '<div class="stories-list">';
            for (const item of items) {
                const title = item.s;
                const imgKey = item.imgKey || title;
                const imgSrc = getImgPath(imgKey, 0);
                html += '<div class="story-list-item" onclick="showStory('' + title.replace(/'/g, "\'") + '')">' +
                    '<img class="list-img" src="' + imgSrc + '" alt="' + title + '" loading="lazy" onerror="this.style.background='var(--primary-light)'">' +
                    '<div class="list-info"><div class="list-title">' + title + '</div>' +
                    '<div class="list-era">' + item.e + '</div><span class="list-tag">' + item.c + '</span></div></div>';
            }
            html += '</div>';
        }
        html += '</div>';
    }
    container.innerHTML = html;
}

function showStory(title) {
    const item = D.find(d => d.s === title);
    if (!item) return;
    const data = P[title];
    const paragraphs = data ? data.paragraphs : [];
    const imgKey = data ? data.imgKey : title;
    let html = '<div class="story-header"><h1 class="story-title">' + title + '</h1><p class="story-era">' + item.e + '</p></div>';
    for (let i = 0; i < paragraphs.length; i++) {
        const imgSrc = getImgPath(imgKey, i);
        html += '<img class="story-img" src="' + imgSrc + '" alt="插图' + (i+1) + '" loading="lazy" onerror="this.style.display='none'">';
        html += '<p class="story-paragraph">' + paragraphs[i] + '</p>';
    }
    if (item.m) { html += '<div class="moral-card"><div class="moral-title">💡 小道理</div><p class="moral-text">' + item.m + '</p></div>'; }
    document.getElementById('storyContent').innerHTML = html;
    document.getElementById('homePage').classList.add('hidden');
    document.getElementById('storyPage').classList.add('active');
    window.scrollTo(0, 0);
}

function showHome() {
    document.getElementById('storyPage').classList.remove('active');
    document.getElementById('homePage').classList.remove('hidden');
    window.scrollTo(0, 0);
}

document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active'); currentFilter = tab.dataset.filter; renderHome();
    });
});
document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); currentView = btn.dataset.view; renderHome();
    });
});
renderHome();
</script>
</body>
</html>
