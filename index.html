辞官回了老家，每天钓鱼读书、写写文章，过上了清闲自在的日子。", "刘伯温走的时候，只带走了一箱子书。他把毕生的智慧写进了一本叫《郁离子》的书里。几百年来，民间流传着一句话：三分天下诸葛亮，一统江山刘伯温。刘伯温的故事告诉我们：真正的大智慧，不是靠算命看风水，而是靠用心观察和冷静思考！"], "lijin": ["唐太宗李世民刚当上皇帝那会儿，北方的东突厥就像一把悬在长安城头上的刀。颉利可汗仗着手下十几万精兵，动不动就南下抢掠，还曾经打到离长安只有几里远的渭水边。唐太宗咬着牙答应了和谈，但心里憋着一股劲儿：总有一天，我要收拾你们！", "三年后，东突厥内部出了大乱子——连着好几年下大雪，冻死了无数牛羊，部落里闹起了饥荒。颉利可汗的部下也开始不服他了，一个个闹着要分家。唐太宗觉得时机到了，任命六十四岁的老将军李靖为行军大总管，率领三千精锐骑兵北上征讨。", "出征那天，天寒地冻，大雪纷飞，寒风像刀子一样割在脸上。有将领小声嘀咕：这么大的雪，连路都看不清，怎么打仗啊？李靖却站在雪地里，两眼放光地说：正因为雪大，突厥人才觉得我们不会来！出其不意，才能打他们个措手不及！", "李靖带着三千骑兵在风雪中日夜兼程。为了不暴露行踪，他把马蹄都用布裹了起来，士兵们嘴里含着木棍不许说话。他们翻过了一座又一座雪山，手都冻僵了，脸都冻紫了，但没有一个人掉队。七天七夜之后，他们神不知鬼不觉地摸到了东突厥的王庭——定襄城外。", "深夜，定襄城里灯火通明，突厥士兵们正围着篝火喝酒吃肉。颉利可汗躺在温暖的皮帐篷里，舒舒服服地喝着马奶酒。他嘿嘿笑着说：唐朝人？这么大的雪，他们肯定躲在城里烤火呢！来，兄弟们喝！", "就在这时候，城外忽然火光冲天！李靖一声令下：放火箭！三千支带着火的箭像流星一样飞进城里。帐篷着火了，草料库着火了，突厥士兵们抱头鼠窜，乱成一团。紧接着，震天的喊杀声从四面八方响起——唐朝骑兵如神兵天降，冲进了定襄城！", "颉利可汗从睡梦中惊醒，光着脚冲出帐篷，看到满城火光和横冲直撞的唐军，整个人都蒙了：唐朝人怎么来的？外面不是有斥候守着的吗？他连衣服都来不及穿，骑上马就往后山没命地跑。这一仗，李靖以三千骑兵大破数万突厥兵，还俘虏了颉利可汗的部下五万多人。", "消息传到长安，唐太宗高兴得拍案叫绝：好一个李靖！当年汉代李陵以五千步兵血战匈奴，也不过如此！李靖以三千骑兵雪夜突袭，真是千古名将啊！从此以后，大唐的北方边境安宁了几十年，再也没有人敢南下骚扰了。李靖夜袭定襄的故事告诉我们：勇敢加上智慧，再加上果断出手——再强大的敌人也不可怕！"], "luxun": ["一百多年前，浙江绍兴一个姓周的大家族里，出生了一个小男孩，大人们给他取名叫周树人——他就是后来大名鼎鼎的鲁迅。小鲁迅小时候最爱听故事，每到夏天的夜晚，他就搬着小板凳坐在院子里，听奶奶讲白蛇传、讲美女蛇的故事。天上的星星一闪一闪的，小鲁迅的脑子里装满了问号。", "鲁迅十二岁那年，家里发生了天大的变故——爷爷因为考试作弊的事被抓进了监狱，爸爸又生重病，家里的钱像流水一样花光了。小鲁迅每天跑到当铺里，把家里的东西一件一件地当掉换钱，再跑到药铺去给爸爸抓药。当铺的伙计总是用白眼看他，药铺的老板也爱答不理的。小鲁迅咬着嘴唇想：为什么穷人就要受欺负？", "鲁迅长大后被送去日本学医。他心想：中国人的身体太弱了，学好了医术就能救死扶伤，让中国人强壮起来。在日本仙台医学专门学校，他遇到了一个特别认真负责的老师——藤野先生。藤野先生不光教医术，还把鲁迅画的笔记一页一页地仔细修改，红色的批注密密麻麻的。", "可有一天，学校放了一部幻灯片，彻底改变了鲁迅的人生。幻灯片里放的是日俄战争，一个中国人被当作俄国间谍抓起来要砍头，而旁边围观的也是一群中国人，一个个伸长了脖子傻傻地看着，脸上没有愤怒、没有悲伤，只有麻木。", "鲁迅的心像被针扎了一样疼：那些围观的中国人，身体都很健康啊！可他们的灵魂却已经死了！他们不知道自己被人欺负，不知道自己正在被侮辱，甚至还在旁边看热闹！鲁迅猛地站起来，一拳砸在桌子上：学医救不了中国人！", "从那以后，鲁迅毅然放弃了学医，拿起了笔。他决定要用文字来唤醒沉睡的中国人！他写的第一篇白话小说叫《狂人日记》，讲的是一个疯子发现周围的人都在吃人——表面上是疯子说的话，其实是在说封建社会在吃人！这本书一出，整个中国文坛都震动了！", "鲁迅写文章特别辛辣，像一把把小刀子，专挑那些虚伪的家伙来戳。他说：横眉冷对千夫指，俯首甘为孺子牛。意思是：对敌人绝不低头，对人民甘愿做牛做马！他写的《阿Q正传》讽刺那些自欺欺人的人，《孔乙己》嘲笑那些死要面子活受罪的读书人。每一篇文章读完后，都让人心里像打翻了五味瓶，不是滋味。", "鲁迅一生写了上千万字的文章，直到生命的最后一刻，他还在跟病魔斗争着写作。1936年，鲁迅在上海病逝，成千上万的人赶来为他送行。人们在他的灵柩上盖了一面旗帜，上面写着三个大字：民族魂！鲁迅虽然离开了我们，但他那支犀利的笔、那些振聋发聩的文字，至今还在唤醒着一代又一代的中国人！"], "tuyouyou": ["1930年的冬天，浙江宁波一个小巷子里传来哇哇的婴儿哭声。爸爸翻着《诗经》，念到呦呦鹿鸣，食野之蒿这句诗，眼睛一亮：好！就叫呦呦！他哪里想得到，几十年后，这个叫呦呦的女孩真的和野草——青蒿打了一辈子交道，还因此改变了整个世界！", "小呦呦小时候并不是最聪明的孩子，但有一样特别厉害——一旦钻进一件事里，谁都拉不出来。十六岁那年她得了肺结核，在家休学了两年多。别的孩子生这么重的病早就哭天喊地了，可屠呦呦却觉得这是老天给她的读书时间——她每天趴在窗前，把能找到的书全读了一遍。隔壁阿姨心疼地说：这丫头，病得不轻还这么折腾。可屠呦呦心里想的是：我以后要学医，要帮人们治病。", "1951年，屠呦呦考上了北京大学医学院。全班同学都选了热门的外科、内科，她却选了一个最冷门的专业——生药学。老师好奇地问她为什么，她认真地说：西药用了那么多年，可我总觉得我们中国古代的草药里藏着很多秘密。我想把那些秘密找出来！老师听了，忍不住点了点头。", "1969年，一个艰巨的任务落到了屠呦呦头上。越南战场上，很多士兵因为疟疾死了——这种病让人一会儿发高烧一会儿打寒战，不吃药的话几天就没命了。可现有的疟疾药已经不管用了，虫子产生了抗药性。中国成立了523项目，要找出治疗疟疾的新药。屠呦呦被任命为中医研究组的组长。", "屠呦呦翻遍了古代医书，从东汉到清朝的方子她看了两千多个。她把有用的药方抄在小纸条上，贴满了整面墙。助手们走进她的办公室，就像走进了纸条的海洋。可试了上百种草药，效果都不理想。屠呦呦急得晚上睡不着觉，头发一把一把地掉。", "有一天，她在东晋葛洪的《肘后备急方》里看到了一行字：青蒿一握，以水二升渍，绞取汁，尽服之。屠呦呦的眼睛一下子亮了：等等！为什么古人用青蒿汁，而不是煮汤？是不是高温会破坏青蒿的药效？她一拍大腿：我们以前都是用热水煮的，可能把有效的成分煮坏了！", "1971年10月4日，这是屠呦呦一辈子忘不了的一天。她用乙醚在低温下提取青蒿，把提取物放在显微镜下一看——天哪！疟原虫全死了！她激动得手都在发抖，大声喊来助手：快来看！我们成功了！为了确保安全，她甚至亲自试药，吃下提取物后躺在实验室观察了好几天，确认没事才敢推进到临床试验。", "2015年，屠呦呦获得了诺贝尔生理学或医学奖。她是中国第一个获得诺贝尔科学奖的科学家！在领奖台上，她平静地说：青蒿素是全体中国科学家的成果。台下的掌声经久不息。屠呦呦用一株普普通通的小草，拯救了全世界数百万人的生命。她告诉我们：只要你真的热爱一件事，并且坚持下去，再不起眼的小草也能开出改变世界的花朵！"], "huangdi_chiyou": ["大约五千年以前，在中国的土地上生活着三个大部落。一个部落的首领叫黄帝，他聪明善良，把部落治理得井井有条；一个叫炎帝，他们部落擅长种粮食和草药，大家也过得很不错；还有一个叫蚩尤，他可是个超级大猛人——传说他有八十一个兄弟，每一个都长着铜头铁额，吃沙子石头长大，谁也打不过他们！", "蚩尤性格残暴，动不动就欺负别的部落。他先跑去打炎帝，炎帝打不过他，只好领着族人往黄帝的地盘逃跑。蚩尤在后面紧追不舍，一路上烧杀抢掠，哭喊声震天响。炎帝又急又气，跑得鞋子都掉了，最后见到了黄帝，扑通一声跪下来：'黄帝兄弟，蚩尤太可恶了，求你帮帮我吧！'", "黄帝皱着眉头想了想，点点头说：'炎帝老哥别怕，蚩尤欺负弱小，我早就看不下去了！咱们两个部落联合起来，肯定能打败他！'就这样，黄帝和炎帝的部落合兵一处，在涿鹿这个地方摆开阵势，准备和蚩尤大战一场。", "大战开始的那天，天空忽然变得乌漆嘛黑的。蚩尤使出了他的看家本领——呼风唤雨！只见他挥舞着大旗，念了几句咒语，霎时间狂风大作，暴雨倾盆而下，黄帝的士兵被吹得东倒西歪，什么都看不见了！大家吓得抱头鼠窜，阵脚大乱。", "黄帝一点也不慌，他冷静地想了想，叫来手下说：'快去把指南车推出来！'原来黄帝早就料到蚩尤会玩把戏，提前造了一辆神奇的指南车——车上站着一个小木头人，不管车子怎么转，小木头人的手指永远指着南方！靠着指南车，黄帝的士兵在狂风暴雨中找到了方向，重新列好了阵型。", "接着，黄帝派出了他的秘密武器——应龙！应龙是一条会飞的巨龙，它张开大嘴，呼——地喷出水柱，把蚩尤弄出来的风雨全冲散了！蚩尤气得直跺脚，又放出妖魔鬼怪来捣乱。黄帝的女魃（传说中会干旱的神仙）飞上天，浑身发出炙热的金光，把那些妖魔鬼怪全晒化了。", "经过七天七夜的惊天大战，黄帝终于打败了蚩尤，把他抓了起来。蚩尤跪在地上求饶，黄帝摇摇头说：'你太残暴了，留着你会祸害更多人。'说完，他下令处死了蚩尤。从此以后，天下的部落都佩服黄帝的仁德和勇武，纷纷推举他当了大首领。", "黄帝打败蚩尤之后，教会人们盖房子、做衣裳、造车船，还发明了文字和音乐。炎帝则教大家种庄稼、尝百草、治病救人。炎黄两个部落慢慢融合在一起，形成了中华民族最早的祖先。所以我们中国人到今天还自称'炎黄子孙'呢！"], "yaoshun_shanrang": ["在四千多年前的上古时代，有一个特别贤明的首领叫尧。尧爷爷当首领的时候，天天起得比鸡还早，睡得比狗还晚，穿的是粗布衣裳，吃的是粗茶淡饭。他每天都忙活着帮老百姓解决各种难题——哪家没吃的了，他就派人去送粮食；哪里发大水了，他就亲自跑去治水。老百姓都打心眼里爱戴他。", "可是随着尧爷爷年纪越来越大，他的头发全白了，腰也弯了，眼睛也花了。他心里琢磨着一件大事：我早晚要退休，可谁来接我的班呢？按说应该传给我的儿子丹朱，可是丹朱这孩子被他宠坏了，整天吊儿郎当的，不是跟人打架就是欺负老百姓，要是把天下交给他，那不得乱套了？", "尧爷爷把部落里的长老们召集起来，愁眉苦脸地说：'各位老伙计，我老了，干不动了。你们帮我想想，谁有本事接我的班？'一个长老站起来说：'听说历山脚下有个叫舜的年轻人，虽然出身贫寒，但为人和善又能干，周围的人都愿意跟着他！'尧爷爷眼睛一亮，捋着胡子说：'哦？那我得亲自去瞧瞧！'", "尧爷爷打扮成普通老人，悄悄来到历山脚下。远远地就看见一个年轻人在耕田，牛的脖子上挂着一个大簸箕，牛一低头往前走，簸箕就'哐当'一下弹到牛嘴上。尧爷爷好奇地走过去问：'小伙子，你这样耕田不怕牛偷懒吗？'舜笑呵呵地说：'牛干活够累了，我不忍心抽鞭子，挂着簸箕弹一下提醒提醒就好了。'尧爷爷心里暗暗点头：这孩子心肠真好啊！", "尧爷爷又听说舜的身世特别苦——他亲妈死得早，后妈和弟弟三番五次想害死他。有一次让他去挖井，舜刚刚下到井底，后妈和弟弟就拿起石头往井里砸，想把舜活活埋在井里！幸好舜留了个心眼，在井壁上提前挖了条通道，从小道逃了出来。逃出来后，舜一点儿也不记恨，还是像以前一样孝敬后妈、照顾弟弟。尧爷爷感动得不得了：受了这么多苦还这么善良，这样的人太难得啦！", "为了考验舜的本事，尧爷爷把自己的两个女儿都嫁给了舜，还派舜去处理各种复杂的事务。舜不管做什么都做得漂漂亮亮的——他教大家种地、制作陶器、修补房屋。只要他待过的地方，人们都变得和睦了，吵架的少了，帮忙的多了。三年下来，舜经过了一道又一道的考验，没有一项不及格的！", "尧爷爷终于放心了，他召集所有部落首领，郑重地宣布：'我决定把天下传给舜！他虽然不是我儿子，却是最有德行最能干的人！'丹朱气得跳脚，可尧爷爷说：'把天下给丹朱，只有一个人高兴，其他人都不高兴；把天下给舜，只有一个人不高兴，其他人都高兴！我怎么能为了一个人不高兴，让天下人都受苦呢？'", "舜接替尧爷爷当了首领之后，果然没有让大家失望。他更加勤劳地工作，把天下治理得比尧爷爷在的时候还要好。老百姓过上了安居乐业的日子，连远方的部落都被舜的德行感化，纷纷前来归顺。后来舜老了，又把天下传给了治水有功的大禹——这就是'禅让'的故事，一代传一代，传给最有本事的人，而不是传给自己的儿子！"], "dayunhe": ["一千四百多年前的隋朝，有一个年轻的皇帝叫杨广，也就是历史上赫赫有名的隋炀帝。这位皇帝长得一表人才，又有学问又有胆略，可惜他有一个大毛病——太着急了！他总想着：我当皇帝就得干几件惊天动地的大事，让千秋万代都记住我！", "有一天，隋炀帝站在洛阳的城楼上，往南边远远地望过去，心里琢磨着：江南那边的粮食多得吃不完，丝织品漂亮得晃眼睛，可北方的老百姓却常常饿肚子。如果能有一条河，从北往南直通到江南，那该多好啊！粮船可以直接从南方开到北方来，军队也能快速调动，简直是一举两得！", "隋炀帝说干就干，他下了一道命令：征集几百万民工，从洛阳一直挖到杭州，全长两千多里！全国的壮丁们背着铁锹和篮子，从四面八方赶来开工。工地上人山人海，大家头顶着烈日，挖呀挖呀，手磨出了血泡，脚踩得泥泞不堪。好多人都累倒了，可隋炀帝还在后面催命似的喊着：快挖！快挖！", "传说在挖到汴渠的时候，有一段河道怎么挖也挖不通，眼看工期就要耽误了。隋炀帝暴跳如雷，这时一个大臣上前说：'陛下，这里的土太硬了，不如先用大火烧，再用冷水浇，把岩石烧裂了就好挖了。'隋炀帝一拍大腿：'好主意！'于是工地上燃起了冲天大火，轰隆隆的石头炸裂声震得大地都在颤抖。经过日夜奋战，河道终于一点点地向前延伸了。", "修河的日子有多苦你知道吗？有一户人家，家里只有一个儿子叫王小牛，也被抓去修运河了。他妈妈天天站在村口等他回来，从春天等到冬天，头发都等白了。有一天，她实在忍不住了，背着干粮沿着运河一路找过去。走到一处工棚前，她看见一群瘦得皮包骨头的人在干活，那个领头的是……天哪！真的是她的小牛！母子俩抱头痛哭。隋炀帝知道后，倒也没为难他们，还让王小牛回家照顾老母亲。", "六年之后，大运河终于通航了！这一天，隋炀帝坐着巨大的龙舟，沿着运河一路南下。龙舟长二百多尺，雕龙画凤、金碧辉煌，船头还挂着五颜六色的彩带。两岸的老百姓纷纷跑来围观，大家都惊呆了：天呐，这么大的船竟然能平平稳稳地在河里走？河水哗哗地流着，龙舟缓缓地驶过，隋炀帝站在船头仰天大笑！", "大运河修好之后，南方的米、布匹、茶叶源源不断地运到北方，北方的牛羊、皮毛也运到了南方。沿河两岸还冒出了好多繁华的城镇，比如扬州、苏州、杭州，都变成了热闹的大都市。到了唐朝和宋朝的时候，大运河更是成了国家的'大动脉'，那时候流传着一句话：'天下大计，仰于东南'——意思是整个国家的命脉都靠着这条大运河呢！", "可惜隋炀帝为了修运河、建宫殿，把老百姓折腾得太苦了，全国上下怨声载道。没几年，隋朝就被起义军推翻了。但大运河这条流淌了一千四百多年的'母亲河'，至今还在日夜不息地流淌着，默默诉说着隋炀帝的功过与梦想。"], "qianxuesen": ["1911年，上海一个书香门第家里，出生了一个瘦瘦小小的男婴，取名钱学森。小钱学森从小就特别聪明，最喜欢看各种科普书和飞机模型，总是一个人趴在桌子上画呀画，画着各种各样的飞行器。邻居们都说：'老钱家这孩子将来准有出息！'谁也没想到，这个爱画画的小男孩，后来会成为中国的'航天之父'。", "钱学森二十多岁的时候去了美国留学，考进了全世界最顶尖的大学之一——麻省理工学院。刚开始，他的英语说得磕磕巴巴的，美国同学都笑话他：'中国人连飞机都没见过，还想学航空工程？'钱学森脸上火辣辣的，但他咬着牙不说话，每天晚上熬到凌晨两点，把课本翻来覆去地读。半年之后，他的考试成绩全是A，那些嘲笑他的同学全都傻眼了！", "后来钱学森拜了一个超级厉害的老师——冯·卡门教授，这位教授可是世界航空界的泰斗。师生俩天天在一起研究火箭和导弹，钱学森的脑子特别活，经常提出一些大胆的想法。有一次他和老师为一个公式争得面红耳赤，冯·卡门气得把论文撕了，可第二天一早，教授红着脸来找钱学森：'你对了，我错了！'从此他对这个中国学生佩服得五体投地。", "新中国成立的消息传到美国，钱学森激动得一宿没睡着。他紧紧地攥着报纸，眼睛亮晶晶的：'祖国需要我，我要回去！'他连夜打包行李，订好了回国的船票。可就在这时，一个美国军官拦住了他，冷冷地说：'钱先生，你一个人能顶上五个师，我宁可把你枪毙了，也不能放你回中国！'", "美国联邦调查局的人直接把钱学森关进了监狱。那是一个又黑又小的牢房，连窗户都没有。看守每过十五分钟就把灯猛地打开照他的眼睛，不让他睡觉。钱学森蜷缩在角落里，胡子拉碴，人瘦了一大圈。短短十多天，他的体重骤降了三十斤！后来在朋友们的帮助下，他才被保释出狱，可还是被软禁在家里，出门都有人跟着。", "但钱学森一点儿也没放弃。他白天假装在家里种花养草，晚上悄悄写呀写，把脑子里所有关于火箭的知识都写在了薄薄的小纸条上。为了把信寄出去，他想到了一个绝妙的办法——让妻子去逛商场，趁特务不注意，把信塞进普通信封里，寄去了比利时，再由朋友转寄回中国！周恩来总理收到信后，激动得拍案而起：'一定要把他救回来！'", "经过长达五年的艰苦谈判，中国用十五名在朝鲜战场上俘虏的美国飞行员，终于换回了钱学森。1955年10月，钱学森踏上香港的时候，激动得眼泪哗哗地流。他对着大海深深地鞠了一躬：'祖国啊，你的儿子回来了！'回国后，他马不停蹄地投入到两弹一星的研制中，带领中国科学家们造出了自己的导弹和原子弹，让全世界都对中国刮目相看。", "晚年的钱学森依然精神矍铄，他常常对年轻的学生们说：'我的事业在中国，我的成就在中国，我的归宿在中国！'2009年，钱学森爷爷永远地离开了我们，但他为祖国点燃的航天之火，至今还在熊熊燃烧着。每当我们看到火箭腾空而起的那一刻，都会想起这位历尽艰险回到祖国怀抱的伟大科学家！"], "zhangzeduan": ["九百多年前的北宋时期，山东诸城一个小镇里，有个小男孩特别爱画画。别的孩子在田埂上追着跑、在河里摸鱼虾，他却蹲在地上用树枝画来画去——画飞过的鸟、画路边的花、画赶集的人群。这个小男孩就是张择端。他画画的时候眼睛亮亮的，嘴里还念念有词：'这里再加个人，那里再画条河……'", "张择端的父母早年去世了，家里穷得揭不开锅，哪有钱供他学画画？小择端只好跑到京城汴梁（就是现在的开封），一边打零工糊口，一边偷偷学画。他白天在酒楼里端盘子洗碗，晚上就跑到画馆外面，趴在窗户上偷看师傅们画画。有时候一站就是两三个时辰，腿都站麻了也舍不得走。", "有一天，张择端在街上看到一位老先生在卖画，画摊上的山水画得跟真的一样。他鼓起勇气走过去，恭恭敬敬地鞠了一躬：'老先生，您能收我当徒弟吗？我没有钱，但我可以给您打杂、磨墨、洗笔，什么都干！'老先生抬头看了看这个瘦巴巴的年轻人，见他眼里全是真诚和渴望，便点了点头：'好，明天来我这儿试试吧。'", "张择端高兴得跳了起来，从此他天天跟在老先生身边学画。他特别用心，别人画一遍就会了，他要画十遍。冬天冷得手都冻僵了，他就哈一口热气搓搓手继续画；夏天热得满身大汗，他就往头上浇一瓢凉水接着画。老先生看了直点头：'这孩子，肯下功夫！'", "后来张择端进了北宋的皇家画院——翰林画院，这里聚集了全国最厉害的画师。画院里的规矩可严了，皇帝宋徽宗亲自出题考试，题目竟然是'踏花归去马蹄香'。别的画师都在画马、画花，张择端却画了几只蝴蝶绕着马蹄飞舞。宋徽宗一看，拍手叫好：'妙啊！蝴蝶追着马蹄，不正说明马蹄上还带着花香吗！'就这样，张择端在画院里脱颖而出。", "宋徽宗给张择端下了一个特别的任务：把京城汴梁的繁华景象画成一幅画。这可是一项巨大的工程！汴梁城有上百万人口，街道上人来人往，店铺鳞次栉比。张择端天天背着小画板，在汴梁城里四处转悠。他蹲在桥上观察来来往往的船只，蹲在酒楼门口看进进出出的客人，有时候蹲到天黑，屁股都坐麻了，可他一点儿也不觉得累。", "就这样画了整整两年，一幅长达五米多的巨作终于诞生了——《清明上河图》！画卷上画了八百多个人物，有的在赶集、有的在划船、有的在喝茶、有的在算命。还有六十多头牲畜、二十多艘船只、三十多栋房屋，甚至还有一个小孩子在路边追蝴蝶！每一个人物的表情都不一样，每一艘船的细节都清清楚楚，仿佛整座汴梁城都被搬到了画上。", "可惜的是，张择端画完这幅画没多久，北宋就灭亡了，京城汴梁在战火中变成了一片废墟。好在《清明上河图》被完好地保存了下来，流传至今，成了故宫博物院的镇馆之宝。九百多年后的今天，我们还能通过这幅画，看到宋朝人是怎么生活的——他们穿什么衣服、吃什么食物、坐什么车船，全都清清楚楚。张择端用他的一支画笔，为后人留下了一扇穿越回大宋的窗户！"], "hanwudi": ["汉朝建立以后，北方的匈奴人经常跑到边境来欺负老百姓。他们骑着快马，像一阵风一样冲进村庄，抢走粮食、牛马和女人，然后呼啸而去。边境的老百姓苦不堪言，可前几任皇帝觉得打不过匈奴，只好派公主去和亲，送好多好多的礼物。", "公元前141年，一个十六岁的少年登上了皇位，他就是汉武帝刘彻。小皇帝站在大殿上，听着大臣们报告匈奴又来抢东西了，气得一拳砸在龙椅上：'凭什么我们要年年送礼物给他们？凭什么我们的百姓要受欺负？大汉朝难道就没人能打匈奴了吗？'", "有一天，汉武帝召见了一个叫张骞的年轻人，对他说：'朕听说西域那边有个月氏国，和匈奴也是死对头。你替朕出使西域，联合月氏，一起夹击匈奴！'张骞二话不说就答应了，带上随从就出发了。汉武帝站在城楼上，看着张骞远去的背影，心里默默盼着：一定要成功啊！", "可张骞走了好多年都没消息，汉武帝没闲着。他大胆启用了两个年轻的将军——一个是从奴隶成长起来的卫青，一个是卫青的外甥、才十七八岁的霍去病。朝中老臣们直摇头：'陛下，让俩毛头小子带兵，这不是胡闹吗？'汉武帝摆摆手：'年轻人怎么了？有本事就上！'", "卫青没有辜负汉武帝的信任。公元前129年，他带领一万精兵直捣匈奴祭天的圣地龙城，砍下了好几百匈奴人的脑袋。这可是汉朝建国以来第一次打赢匈奴！消息传回长安，汉武帝激动得跑到太庙里对着祖宗牌位磕了好几个响头。满朝文武都惊呆了：原来我们真能打赢匈奴啊！", "霍去病更是个猛人。他带着八百轻骑兵，钻进大沙漠里，专挑敌人的老巢打。有一次，他连续奔袭了两千多里地，翻过白雪皑皑的高山，穿过滚烫的沙漠，最后直接冲进了匈奴大王的营帐。匈奴的王公贵族们正在喝酒吃肉，忽然看见天兵天将似的汉军杀进来，吓得连靴子都顾不上穿，光着脚丫子就跑！", "最精彩的一仗是漠北之战。汉武帝调集了十万骑兵和几十万步兵，兵分两路，卫青和霍去病各带一路。两路大军在茫茫沙漠里行进了一个多月，终于在漠北找到了匈奴的主力。两军相遇，杀声震天，刀光剑影，战马嘶鸣，鲜血染红了黄沙。这一仗，汉军歼灭了匈奴九万多人！", "从此以后，匈奴元气大伤，再也不敢轻易南下骚扰了。大汉朝的边境终于安宁了下来。汉武帝还开通了丝绸之路，让汉朝和西域各国做起了买卖，中国的丝绸、茶叶传到了西方，西方的葡萄、胡瓜也传到了中国。后人评价汉武帝说：'他让中国人第一次挺起了胸膛！'汉武帝北击匈奴的故事告诉我们：只要有勇气、有远见，就没有战胜不了的敌人！"], "huangchao_qiyi": ["唐朝末年，皇帝昏庸无能，朝廷里的大官们只顾着捞钱享乐，老百姓却吃不饱穿不暖。那年秋天又赶上了大旱灾，田里的庄稼全都枯死了，地上裂开了一道道大缝子。穷人们饿得啃树皮、吃草根，可官府还在催着收税，交不出税就要抓去坐牢。", "在山东曹州，有一个叫黄巢的读书人。他从小喜欢读书写字，还练得一身好武艺，箭法精准，百步穿杨。他本来想考科举当官，好报效国家，可每次考试都被那些有钱有势的人顶替了名额。有一次他明明考了第一名，可发榜的时候名字却变成了某个大官的儿子。黄巢气得把笔一摔：'这天下，还有公道吗！'", "黄巢越想越气，提笔写了一首诗：'待到秋来九月八，我花开后百花杀。冲天香阵透长安，满城尽带黄金甲。'意思是：等到秋天来临，菊花盛开的时候，我要让香气冲进长安城，让整个城里都披上金色的铠甲！这首诗里藏着他的大志向——他要推翻这个不公平的朝廷！", "公元875年，黄巢和族兄黄存在家乡揭竿而起。他振臂一呼：'乡亲们！朝廷不管我们的死活，那我们自己来管！跟我走，我保证大家有饭吃！'周围的穷苦百姓早就饿得受不了了，一听这话，纷纷拿起锄头、菜刀，跟着黄巢走了。几天功夫就聚集了好几万人，队伍像滚雪球一样越滚越大。", "黄巢的队伍从山东打到河南，又从河南打到湖北，一路势如破竹。他们专打那些欺压百姓的贪官污吏，打开官府的粮仓，把粮食分给穷人。老百姓敲锣打鼓地欢迎他们，年轻小伙子争着来参军。黄巢骑在高头大马上，身后跟着几十万大军，浩浩荡荡，黄沙漫天，走在大路上就像一条看不到头尾的巨龙。", "公元880年冬天，黄巢的大军终于打到了长安城下。唐僖宗皇帝吓得连夜带着嫔妃和亲信从后门逃跑了。黄巢骑着战马，率领大军浩浩荡荡地开进了长安城。长安城里的老百姓夹道欢迎，黄巢看着豪华的皇宫和繁华的街道，感慨万千：'我黄巢终于实现了当年的誓言！'他登基当了皇帝，建立了大齐政权。", "可是当上皇帝之后，黄巢慢慢变了。他整天待在深宫里享乐，不再关心老百姓的死活。手下的将领们也争权夺利，互相残杀。唐朝的残余势力趁机反攻，加上黄巢的军队纪律越来越差，开始抢夺百姓的东西，老百姓也不再支持他了。曾经浩浩荡荡的几十万大军，最后只剩下了一万多人。", "公元884年，黄巢兵败退到泰山狼虎谷。他看着身边寥寥无几的残兵败将，想起当年'满城尽带黄金甲'的豪言壮语，苦笑着摇了摇头。最后，他拔剑自刎，结束了自己轰轰烈烈的一生。黄巢起义虽然失败了，但他那句'满城尽带黄金甲'却流传了一千多年，时刻提醒着后人：一个社会如果太不公平，总有一天会被汹涌的力量冲垮。"], "jingnan_zhiyi": ["明朝开国皇帝朱元璋晚年的时候，最疼爱的太子朱标突然病死了。白发人送黑发人，朱元璋哭得老泪纵横。他左思右想，最后把皇位传给了朱标的儿子——二十一岁的皇太孙朱允炆，也就是建文帝。朱元璋担心孙子太年轻镇不住那些手握重兵的叔叔们，临死前拉着建文帝的手说：'孙子啊，要小心你的叔叔们！'", "建文帝登基后，看着一个个叔叔在外面当藩王，手上有兵有权，心里就像揣了一只兔子，七上八下的。他的几个大臣给他出主意：'陛下，您的叔叔们个个虎视眈眈，不如削掉他们的兵权！'建文帝点点头，开始动手削藩。先拿几个势力小的叔叔开刀，有的被贬为平民，有的被关进大牢。消息传到了北方，在北京的燕王朱棣慌了神。", "朱棣是朱元璋的第四个儿子，从小跟着父亲南征北战，打起仗来那叫一个勇猛，满身都是伤疤。他在北京经营了二十多年，把北方边境守得铁桶似的。可建文帝的削藩大刀眼看就要砍到他头上了，朱棣急得像热锅上的蚂蚁：'不行，我不能坐以待毙！'", "朱棣的军师道衍和尚给他出了个主意：'王爷，咱们可以装疯卖傻，麻痹朝廷！'朱棣一听，二话不说就跑到大街上，披头散发，胡言乱语，在大太阳底下烤得满头大汗，又捡起地上的狗屎往嘴里塞（其实是糖做的）。建文帝派来监视的人回去报告：'燕王疯了！'建文帝果然放松了警惕。", "公元1399年七月的一个深夜，朱棣突然起兵。他抓住朝廷派来抓他的两个将领，一刀一个砍了脑袋，然后大声宣布：'皇帝身边有奸臣要害我，我要起兵清君侧！'不过朱棣心里比谁都清楚，什么清君侧啊，他就是想自己当皇帝！这场叔侄大战，历史上叫做靖难之役。", "朱棣的军队一开始人少，建文帝这边人多势众。可是朱棣打仗太厉害了，他亲自上阵杀敌，好几次战马都被射死了，他换一匹马继续冲锋。有一次被几十倍的敌军包围，朱棣挥舞着大刀左冲右突，杀得浑身是血，硬是杀出了一条血路。他的士兵们看王爷这么勇猛，也个个拼了命地打。", "打了整整三年，朱棣的军队终于打到了南京城下。南京城里的大臣们一看大势已去，偷偷打开了城门。朱棣的大军像潮水一样涌进了南京城。皇宫里燃起了大火，建文帝在火光中消失得无影无踪——有人说他自焚了，有人说他换上和尚的衣服逃走了，到底去了哪里，至今还是个千古之谜。", "朱棣进了南京城，登基当了皇帝，年号永乐，他就是明成祖（也叫永乐大帝）。朱棣当上皇帝后，干了好几件了不起的大事：他派郑和七下西洋，把大明国威传遍了南海和印度洋；他还把都城从南京搬到了北京，修建了雄伟的紫禁城，就是我们今天看到的故宫。朱棣从一个被侄子欺负的藩王逆袭成为一代明君，他的一生就是一部大写的绝地反击！"], "tangbohu": ["说起唐伯虎，大家可能马上会想到电影里那个风流倜傥、点秋香的才子。其实啊，真实的唐伯虎比电影里还要精彩一百倍！1470年，唐伯虎出生在苏州一个开小酒馆的家庭，爹妈给他取名唐寅，因为他是寅年寅月寅日寅时出生的——寅就是老虎，所以后来大家叫他唐伯虎。", "小唐伯虎从小就是个神童，背书过目不忘，画画一点就通。他最喜欢趴在酒馆的窗台上，看着来来往往的人群，拿出纸笔画下来。他画的老头儿弯腰驼背，画的小孩儿活蹦乱跳，画的小猫小狗像要从纸上跳出来似的。邻居们都夸：'老唐家这儿子，将来准是个大画家！'", "可唐伯虎的命特别苦。他二十四岁那年，家里一连串出了大事：父亲、母亲、妻子、妹妹，在短短一两年里相继去世了。唐伯虎抱着妹妹冰冷的尸体，哭得撕心裂肺。家道中落，酒馆也倒闭了，只剩下他和年幼的弟弟相依为命。亲戚朋友都躲着他们，怕他们借钱。唐伯虎擦干眼泪，埋头读书画画——他要用才华改变自己的命运。", "二十九岁那年，唐伯虎去南京参加乡试，一举考中了第一名——解元！整个江南都轰动了，都说唐伯虎是'江南第一才子'。唐伯虎得意洋洋，骑着高头大马游街，觉得国家的明天就等着他来改变了。可谁知道，命运的打击还在后面等着他呢。", "第二年，唐伯虎进京参加会试。考试特别难，可唐伯虎胸有成竹，刷刷刷就写完了。结果放榜的时候，他却因为一起考场舞弊案被牵连下了大狱。原来有人告发他和另一个考生事先串通，其实唐伯虎是被冤枉的。可朝廷不管这些，直接取消了他的功名，把他赶回了老家。唐伯虎从云端跌到了谷底，苏州的父老乡亲都在背后指指点点：'看，那个作弊的回来了！'", "唐伯虎的心凉透了，他再也不考科举了。从此以后，他过起了放浪形骸的生活——整天喝酒作画，写诗交友，还给自己取了个号叫'桃花庵主'。他在苏州城外盖了一间小房子，种了一大片桃花，写了一首特别有名的诗：'桃花坞里桃花庵，桃花庵下桃花仙。桃花仙人种桃树，又摘桃花换酒钱。'日子虽然穷，可洒脱得很！", "唐伯虎的画越画越好，他的山水画、人物画、花鸟画都达到了登峰造极的地步。他的画到底有多好呢？有一个故事是这样的：一个朋友请他画扇面，唐伯虎在扇子上画了一枝桃花，结果他刚画完，一只蝴蝶就飞过来停在扇子上不肯走了——画得跟真的一样！唐伯虎哈哈大笑，在扇子上又提了一首诗。", "晚年的时候，唐伯虎的日子越过越穷，经常连饭都吃不饱。可他从不后悔自己选择的路。他临终前写了一首诗：'生在阳间有散场，死归地府也何妨。阳间地府俱相似，只当漂流在异乡。'1524年，五十四岁的唐伯虎在贫困中去世了。可谁也没想到，几百年后，他的画被拍出了上亿元的天价——这位坎坷一生的才子，终于赢得了全世界的尊重！"], "zengguofan": ["1811年，湖南湘乡一个小山村里，一个大胖小子呱呱坠地，取名曾国藩。小曾国藩跟别的小孩可不一样，他从小就是个'笨孩子'——背书背得慢，写字写得丑，连村里的教书先生都叹气：'这孩子怕是读书的料啊。'可曾爸爸不放弃，每天点着油灯，一句一句地教儿子读书。", "有一个流传很广的故事。一天晚上，小曾国藩在家里背一篇课文，背了一遍又一遍，可就是记不住。房梁上蹲着一个小偷，本来想等这家人睡着了再下来偷东西，可曾国藩翻来覆去地背，背到天都快亮了还在背。小偷实在忍不住了，从房梁上跳下来，把那篇课文流利地背了一遍，然后骂了一句：'你这笨脑袋，还读什么书！'说完扬长而去。曾国藩愣在原地，半天没回过神来。", "可曾国藩偏不信邪，他给自己定了个规矩：'人一能之，己百之；人十能之，己千之。'意思是别人一遍就会，我就学一百遍；别人十遍就会，我就学一千遍！他每天天不亮就起床读书，晚上点着油灯学到深夜，困了就站起来走几圈，用冷水洗把脸继续读。一年三百六十五天，没有一天中断过。", "靠着这股笨功夫，曾国藩二十八岁那年终于考中了进士，进了翰林院。到了京城之后，他发现自己的见识太浅了，就给自己立了十二条规矩：每天要读史书、练字、记日记、不抽烟、不睡懒觉……他还给自己取了个号叫'涤生'，意思是洗掉过去的缺点，重新活一个自己。他把日记拿给朋友看，让大家监督他，哪个地方做得不对，让朋友当面骂他。", "这时候，太平天国起义爆发了，起义军从广西一路打过来，势如破竹，攻下了大半个中国。曾国藩奉命组建湘军去镇压。他没打过仗，一开始输得一塌糊涂。有一次在鄱阳湖，他的座船都被太平军抢走了，曾国藩气得跳进湖里要自杀，手下拼了命才把他捞上来。曾国藩浑身湿漉漉地站在岸边，冻得直哆嗦，可他咬着牙说：'输一次算什么？再来！'", "曾国藩总结经验教训，重新练兵。他对士兵要求特别严格：不许骚扰百姓，不许拿老百姓的一针一线。他给湘军制定了一条军规，叫做'结硬寨，打呆仗'——意思是我打得慢没关系，但每一步都要走得稳稳当当的。每到一个地方，先挖战壕、筑堡垒，把自己保护得严严实实的，再慢慢找机会进攻。这种笨办法虽然慢，但特别管用——湘军后来成了太平天国最头疼的对手。", "经过十几年的苦战，曾国藩终于攻下了太平天国的都城天京（现在的南京）。消息传到北京，朝廷上下欢腾一片，慈禧太后亲自下旨封曾国藩为一等侯爵。可曾国藩在庆功宴上却流下了眼泪——为了平定这场战乱，牺牲了太多的人，耗费了太多的钱粮。他回到家做的第一件事，就是解散了大部分湘军，让士兵们回家种田去了。", "晚年的曾国藩成了清朝最有权势的大臣之一，可他生活依然特别简朴。他穿的是粗布衣裳，吃的是家常便饭，住的房子连漏雨都没钱修。他给家人写信说：'家败离不得个奢字，人败离不得个逸字。'他教育子女要勤俭持家、谦虚做人，曾家的子孙后来出了很多有出息的人，比如著名外交家曾纪泽。1872年，曾国藩在南京去世，享年61岁。他给后人留下了一部《曾国藩家书》，里面全是做人做事的道理。这个'笨小孩'用一生的时间证明：笨鸟先飞早入林，勤奋和坚持，就是最厉害的武器！"], "huangjin_qiyi": ["东汉末年，朝廷里一片黑暗。皇帝整天躲在深宫里玩杂耍、养宠物，把国家大事扔给了身边的太监们。这些太监狐假虎威，到处欺压老百姓，还明码标价卖官——想当县长？拿五百万钱来！百姓们被压榨得连饭都吃不上了，路边的树皮都被啃光了。", "这时候，河北巨鹿有一个人叫张角。他原本是个普普通通的读书人，上山采药的时候遇到了一位老神仙，送给他一本叫《太平要术》的书。张角回家打开一看，哇！里面写的全是治病救人的秘方。他照着书上的方子给人看病，居然手到病除！老百姓都说：张角是活神仙啊！", "张角的名声越传越远，成千上万的人赶来拜他为师。他把信徒们分成三十六方，大方一万多人，小方六七千人，还派了亲信去当各方的首领。他教大家念咒语、喝符水治病，其实这些都不是最重要的——张角真正想做的，是推翻那个烂透了的朝廷！", "张角对徒弟们说：如今朝廷腐败，百姓受苦，老天爷已经抛弃了他们！苍天已死，黄天当立！他还编了一句口号：岁在甲子，天下大吉！他让信徒们在各地的官府大门上，都用白石灰写上甲子二字，意思是在告示天下人——起义的日子快到了！", "可是啊，就在起义前一个月，出了一个叛徒。张角的一个徒弟叫唐周，偷偷跑到京城洛阳，把起义计划全抖了出来。官兵连夜抓人，在洛阳城里搜出了好几百个黄巾军的头目，全部砍了脑袋。张角在巨鹿得到消息，又急又气，只好提前起义。", "公元184年二月，张角高喊一声：苍天已死，黄天当立！成千上万的百姓扎起黄色的头巾，举起锄头、镰刀、木棍，像潮水一样涌向官府。他们烧衙门、杀贪官、开粮仓，把粮食分给穷人。不到一个月，七州二十八郡全都燃起了起义的烽火！朝廷上下乱成了一锅粥。", "可惜的是，张角的军队虽然人多，可都是没打过仗的农民，武器也只有锄头和木棍。朝廷派出了皇甫嵩、曹操、刘备这些能征善战的将领，带着正规军来镇压。经过几个月的激战，黄巾军节节败退。更不幸的是，张角在这时候得病去世了，起义军群龙无首，很快就被各个击破了。", "黄巾起义虽然只打了九个月就失败了，但它像一把大火，把东汉王朝的根基烧得摇摇欲坠。那些在镇压起义中崛起的军阀——曹操、刘备、孙权——后来各自割据一方，最终形成了三国鼎立的局面。张角那句苍天已死，黄天当立的口号，至今还在提醒着后人：一个不能让老百姓吃饱饭的朝廷，迟早会被推翻！"], "yapian_zhanzheng": ["两百多年前的清朝，中国是世界上最强盛的国家之一，英国商人跑来买中国的茶叶、丝绸和瓷器，中国的东西在英国可受欢迎了。可是英国人想卖东西给中国，却发现没什么好卖的——中国人自己什么都有！英国人花了好多好多白银买中国货，心里着急得不得了。", "英国商人发现了一样可以赚大钱的东西——鸦片！鸦片是从罂粟花里提炼出来的，吸了会让人上瘾，身体越来越差，最后变成皮包骨的废人。英国人不顾清政府禁止，偷偷把鸦片运到中国。一时间，从官员到百姓，成千上万的人染上了烟瘾，整天躺在床上吞云吐雾，连饭都不吃了，钱全被英国人赚走了。", "道光皇帝急得坐立不安，他派了林则徐去广州禁烟。林则徐是个清官，一到广州就雷厉风行。他让英国商人三天之内把鸦片全部交出来，还拍着桌子说：鸦片一天不禁绝，我一天不回京城！1839年6月3日，林则徐在虎门海滩上，把两万多箱鸦片全部倒入石灰池里销毁。滚滚浓烟升上天空，成千上万的百姓拍手叫好！", "英国人这下可火了！他们的女王维多利亚在议会上气得直跺脚：中国竟然销毁了我们的鸦片！我们要让他们付出代价！1840年，英国派出了四十多艘军舰，载着四千多名士兵，从广州一路打到天津。英国的军舰是用钢铁造的，装备着先进的大炮，而清军用的还是几百年前的大刀长矛和木船。", "最惨烈的一仗是定海之战。英国军舰一字排开，对着定海城猛轰，炮弹像雨点一样落在城墙上。清军士兵们用土炮还击，可土炮射程太短，根本打不着英军的军舰。城墙被轰塌了，士兵们举起大刀冲上去和英军肉搏，一个个倒在血泊中。定海总兵葛云飞身上中了四十多发子弹，至死还握着一把砍卷了刃的大刀。", "英军继续北上，一直打到了天津大沽口，离北京只有三百里了。道光皇帝吓得六神无主，连忙派人求和。1842年，清政府被迫和英国签订了《南京条约》，把香港割让给了英国，还赔了两千一百万两白银！这是中国近代史上第一个不平等条约。", "更糟糕的是，其他列强看到清朝这么软弱，像闻到血腥味的鲨鱼一样扑了上来。法国、美国、俄国、日本……一个个都跑来逼着清政府签不平等条约，割地赔款，开商埠、设租界。中国这块大肥肉，被列强一口一口地啃着。曾经辉煌的大清帝国，就这样一步步走向了衰亡。", "鸦片战争让中国从一个强大的国家变成了任人宰割的羔羊。不过，这场战争也唤醒了部分中国人——他们终于意识到：世界变了，我们不能再做天朝上国的美梦了。落后就要挨打，只有学习先进的技术，改革旧制度，才能让国家重新强大起来！"], "wuxu_bianfa": ["甲午战争中国惨败给日本之后，举国上下一片哗然——连小小的日本都能打败我们？这时候，广东有两个读书人站出来拍案而起：一个叫康有为，一个叫他的学生梁启超。康有为激动地说：日本和德国为什么强大？因为他们变法了！中国要是不变法，迟早要亡国！", "康有为和梁启超到处写文章、办报纸、开学会，号召人们变法图强。康有为还给光绪皇帝写了一封长长的信，信上说：皇上，如果现在变法，中国还有救；如果再拖下去，恐怕连皇上您的皇位都保不住啊！光绪皇帝看了信，激动得手都在抖——他早就想改革了，可一直没胆子。", "光绪皇帝的老师翁同龢也支持变法，他经常在皇帝耳边说：皇上，康有为是个奇才，您一定要重用他！1898年6月11日，光绪皇帝终于下定了决心，颁布了《明定国是诏》，宣布变法！康有为、梁启超、谭嗣同这些维新派人物被提拔重用，一道道改革诏令像雪片一样飞向全国。", "变法的新政一条接一条：废除八股文，改考策论；设立新式学堂，学习西方科学；奖励办工厂、修铁路、开矿山；精简臃肿的政府机构，裁掉那些只拿钱不干事的官员；允许老百姓上书言事，给皇帝提建议……整个北京城都在议论纷纷：变天了！变天了！", "可是改革动了太多人的奶酪。那些被裁掉的官员跑到慈禧太后面前哭诉：太后啊！皇帝听信康有为的妖言，要把祖宗的规矩全改了，这怎么行啊！慈禧太后本来就对光绪皇帝搞改革一肚子火，她冷笑一声：由他闹去，看他能闹出什么花样来！暗地里，她已经开始布局了——她要重新掌握大权！", "康有为他们也知道慈禧太后是最大的阻力，密谋着要杀掉慈禧太后的心腹荣禄，然后派兵包围颐和园，逼慈禧太后交权。可这个计划被袁世凯出卖了！袁世凯表面上答应帮忙，转头就跑去向荣禄告了密。荣禄连夜进京向慈禧太后报告，慈禧太后气得浑身发抖：好你个光绪，居然想杀我！", "1898年9月21日凌晨，慈禧太后从颐和园赶回皇宫。光绪皇帝正在书房里批阅奏章，突然听见外面传来杂乱的脚步声。他抬头一看，慈禧太后带着一群太监和侍卫闯了进来，指着他的鼻子骂道：你这个不孝的东西！你当了这么多年皇帝，也该歇歇了！光绪皇帝被关进了中南海的瀛台，从此失去了自由。", "慈禧太后下令抓捕所有维新派。康有为和梁启超连夜逃往日本，保住了性命。可谭嗣同却不肯走。朋友们劝他：快跑吧！谭嗣同摇了摇头，平静地说：各国变法，没有不流血而成功的。中国还没有人为变法流过血，那就让我来做这第一个吧！1898年9月28日，谭嗣同和另外五位志士在北京菜市口被杀害，史称戊戌六君子。变法只持续了短短一百零三天，却在中国人的心里埋下了改革的种子。"], "fengru": ["1884年，广东恩平一个穷苦的农民家里，一个小男孩呱呱坠地。因为家里穷得揭不开锅，冯如从小就跟着大人到田里放牛。小冯如放牛的时候，总爱躺在草地上看天空——看鸟儿展开翅膀自由自在地飞翔。他的小脑袋里冒出一个天大的问题：为什么鸟儿能飞，人却不能呢？", "十二岁那年，冯如跟着舅舅远渡重洋，来到了美国旧金山。一踏上美国的土地，小冯如就惊呆了——满街跑着不用马拉的铁盒子（汽车），头顶上挂着亮闪闪的电灯，盖房子用的是巨大的钢铁机器！他睁大眼睛看着这一切，心里暗暗发誓：我一定要学会这些本事，带回中国去！", "冯如白天在工厂里打工，晚上偷偷跑去夜校学习。他学的是机器制造，特别用功，别的工友下班了就去喝酒跳舞，冯如却捧着书本读到深夜。他的手被机器划出了一道道口子，可他贴上胶布继续干。渐渐地，他成了厂里技术最棒的工人，能修理各种各样的机器。", "1903年，一个轰动世界的消息传来——美国的莱特兄弟造出了世界上第一架飞机，像鸟儿一样飞上了天空！冯如激动得热血沸腾，他拍着桌子说：外国人能造飞机，我为什么不能？从此，他辞去了工厂的工作，把全部精力都投进了飞机的研制中。", "造飞机哪有那么容易！冯如没有图纸，就自己画；没有材料，就到处找废铁来改造。第一次实验，飞机刚离开地面就摔了个底朝天；第二次，飞机飞了不到十米就栽进了树丛里；第三次、第四次……一次次的失败，让跟着他干的人都灰心了：算了吧，我们根本造不出飞机！冯如抹了一把脸上的汗水说：失败怕什么？莱特兄弟也失败了无数次才成功的！", "1909年9月21日，这是一个值得所有中国人铭记的日子。冯如驾驶着自己研发的飞机，在奥克兰市的天空稳稳地飞了起来。飞机飞了八百多米，比莱特兄弟首飞的距离还要远！当飞机稳稳降落在草地上的时候，围观的人群爆发出震耳欲聋的欢呼声！华侨们激动得热泪盈眶：中国人也能飞了！", "冯如带着他的飞机回到了祖国。当时的清政府给了他一个不小的官位，可冯如根本没兴趣当官，他只想为中国培养更多的飞行员。1912年8月25日，冯如在广州燕塘举行飞行表演，成千上万的百姓都跑来看热闹。可是谁也没想到，意外发生了——飞机在转弯时突然失去控制，从几十米的高空坠落下来。冯如受了重伤，被送到医院已经来不及了。", "临终前，冯如用微弱的声音对身边的人说：我死后，你们不要因此失去飞行的信心……这是千千万万中国人的梦想啊……说完，他永远地闭上了眼睛。那一年，他才二十九岁。冯如虽然只活了短短二十九年，但他用自己的生命点燃了中国航空的星星之火。后来，人们尊称他为中国航空之父——他是第一个让中国人在天上飞翔的人！"], "hualuogeng": ["1910年，江苏金坛一个破旧的小镇上，华罗庚出生在一个小杂货铺里。华罗庚小时候可调皮了，整天在街上跑来跑去，爬树掏鸟窝、下河摸鱼虾，学习不用功，小学毕业的时候连毕业证都没拿到。邻居们都摇着头说：老华家这儿子，长大了怕是个败家子！", "上初中的时候，华罗庚遇到了一位改变他一生命运的老师——王维克。王老师第一次上数学课，就在黑板上出了一道特别难的题。全班同学抓耳挠腮，谁也做不出来。这时候，瘦瘦小小的华罗庚站了起来，不慌不忙地说出了答案。王老师眼睛一亮：这孩子，是个学数学的料！从此，华罗庚对数学着了迷。", "可是家里实在太穷了，华罗庚初中没读完就辍了学，回杂货铺帮爸爸看店。他一边看店一边自学，柜台就是他的书桌，账本的反面就是他的草稿纸。有一回，一个顾客喊了半天：掌柜的，我要一包盐！华罗庚头也不抬，嘴里念叨着：X的平方等于……顾客气得直跺脚：魔怔了！这孩子魔怔了！", "十八岁那年，厄运突然降临了。华罗庚得了一场大病——伤寒。他发着高烧在病床上躺了整整半年，命是保住了，可左腿却落下了终身的残疾。他拄着拐杖一瘸一拐地走路，每走一步都疼得直冒冷汗。邻居们又在背后说闲话：一个瘸子，这辈子还能干什么？华罗庚咬着牙，心里暗暗憋了一口气：你们等着瞧！", "病好之后，华罗庚自学数学更加拼命了。他自学了英文、法文和德文，就为了能看懂国外的数学期刊。他没钱买书，就跑到县立图书馆去抄书，一本厚厚的《微积分》，他一个字一个字地抄了下来。手指磨出了厚厚的茧子，他缠上布条继续抄。一年下来，他抄写的草稿纸堆了满满一麻袋！", "1930年，二十岁的华罗庚在《科学》杂志上发表了一篇论文，指出了一位著名数学教授论文中的错误。清华大学数学系主任熊庆来看到后，惊讶地问：这个华罗庚是哪个大学毕业的？手下的人说：他没上过大学，只是个初中毕业生。熊庆来大吃一惊：什么？赶紧把他请到清华来！", "华罗庚到了清华大学，就像鱼儿游进了大海。他只用了短短几年时间，就从助理员升到了助教，又升到了教授，还去了英国剑桥大学留学。在剑桥的两年里，他发表了十几篇高水平的数学论文，解决了当时数学界好几个悬而未决的难题。剑桥的教授们竖起大拇指：华罗庚的数学水平，全世界能排进前十！", "新中国成立后，华罗庚放弃了美国伊利诺伊大学终身教授的优厚待遇，毅然回到祖国。有人问他：美国条件那么好，为什么要回去？华罗庚笑了笑说：为了国家。回国后，他创立了中国数论学派，培养了一大批顶尖的数学家。晚年的华罗庚还拖着残疾的腿走遍了二十多个省，把优选法和统筹法教给工人农民，用数学帮工厂提高了产量。1985年，七十四岁的华罗庚在日本东京大学做学术报告时突发心脏病，倒在了他热爱的讲台上。这位自学成才的数学家用一生证明了一件事：贫穷和残疾都不是借口，勤奋和坚持才是通往成功的唯一道路！"], "beethoven": ["两百多年前，德国有一个叫贝多芬的小男孩。他的爸爸是个歌手，整天喝酒，总想着把儿子培养成第二个莫扎特那样的音乐神童。每天晚上，爸爸都要小贝多芬练琴好几个小时，弹不好就挨打。小贝多芬哭着练琴，小手都弹得又红又肿了。有时候他真的很讨厌钢琴，心想：为什么别的小朋友可以出去玩，我却要一直练琴呢？", "可是慢慢地，贝多芬发现钢琴能发出美妙的音乐，能让人快乐，也能让人感动。他开始真正爱上音乐了，每天不用爸爸催，自己就坐到琴凳上练习。渐渐地，他的琴弹得越来越好了。贝多芬长大后成了有名的音乐家，他的音乐让无数人感动。可是正当他最辉煌的时候，灾难降临了——他的耳朵开始听不见声音了！对音乐家来说，这是多么可怕的事情啊！", "贝多芬伤心极了，把自己关在房间里，不吃不喝，也不想见任何人。他绝望地想：完了，我的音乐生涯结束了……那段时间，他的心里充满了黑暗。可是渐渐地，贝多芬想通了：虽然耳朵听不见了，可是我心里的音乐还在啊！我可以用心去感受音乐，把最美妙的旋律写下来！", "就这样，贝多芬在完全听不见的情况下，用牙咬着木棒，木棒顶在钢琴上，靠着振动来感受音乐。他写出了《命运交响曲》、《第九交响曲》等流传千古的伟大作品。《第九交响曲》第一次演奏那天，观众们激动得全体起立，掌声雷动。可是贝多芬自己什么都听不见，直到有人转过他的身子，他才看到观众热烈的掌声——掌声是那样的响亮，响亮得整个大厅都在震动！", "贝多芬的故事告诉我们：真正的坚强，是遇到最大的困难也不放弃。命运可以夺走他的听力，却夺不走他心里的音乐！"], "bisheng": ["北宋时候，有一个叫毕昇的普通人，他在杭州的一家书坊里做印刷工人。那时候印书可不容易了——一页书要由刻字工人一个字一个字地刻在木板上，一本书往往要刻好几个月甚至好几年。刻好的木板用坏了，又得重新刻，真是又慢又累又费钱。", "毕昇天天看着工友们辛苦地刻字，心里总在琢磨：要是能有一种又快又省力的办法就好了。有一天，他看到邻居家在用泥巴做砖块盖房子，工匠们把泥巴放进模具里，轻轻一压，一块砖就做好了。毕昇眼睛一亮：要是我把字也做成一个个小块，想印什么内容就拼什么内容，那该多好啊！", "说干就干！毕昇开始用泥土做字块。他先在泥土上刻出字，然后放进火里烧。烧出来的字块又硬又平，印出来的字清清楚楚的。可是第一批字块印完以后，字块就粘在纸上拿不下来了。毕昇皱着眉头想了很久：是泥土太粘了，还是有什么东西没处理好呢？", "毕昇反复试验，终于发现：只要在字块上刷一层薄薄的油，印完后就能轻松揭下来。他高兴得跳了起来：成了！成功了！就这样，活字印刷术诞生了！", "毕昇的活字印刷术大大提高了印书的速度。以前刻一本书要好几个月，用活字印刷，只要排好版，几天就能印出整本书。而且字块可以反复使用，印完这本书，还能用来印下一本书，既省钱又省力。后来，这项技术传遍了全世界，成了人类文明史上最重要的发明之一。直到今天，我们还在使用印刷术呢！"], "chengmen": ["北宋时候，洛阳有两位非常有名的大学问家——程颢和程颐，他们兄弟俩一起创办了理学，被后人称为二程先生。很多人都想拜他们为师，其中有一个叫杨时的年轻人，特别好学。", "有一天，杨时遇到了一个难题，怎么想也想不明白。他想起了程颐先生，心想：程先生一定知道答案！于是，他告别了朋友，冒着大雪，一路跌跌撞撞地往程先生家走去。", "那时候正好是深冬，天冷极了，鹅毛大雪纷纷扬扬地飘落下来。杨时的脸被冻得通红，眉毛上挂着白色的霜珠，鞋子也被雪水浸湿了。可是他顾不上这些，只想着快点见到程先生。", "好不容易到了程家门口，杨时发现程先生正在屋子里睡午觉呢！程先生年纪大了，睡觉总是不太安稳，好不容易睡着了，杨时怎么忍心叫醒他呢？", "杨时想了想，轻轻地脱下帽子，解下围巾，安静地站在门口的屋檐下。他想：我就等一会儿吧，程先生一定会醒的。雪花一片一片地落在他的肩膀上，杨时一动也不动，就像一尊雪人。", "一个时辰过去了，两个时辰过去了……程先生还在睡觉。杨时的脚冻麻了，手冻僵了，鼻涕都快冻成冰棍了！旁边还有一个小同学，也跟着一起站着冻得直跺脚。小同学忍不住小声说：杨时哥哥，我们进去烤烤火吧……", "杨时摇摇头，轻声说：不行，我们不能吵醒先生。再等等吧，再等等他就醒了。说完，他又默默地站好，生怕发出一点点声音。", "又过了好久好久，程先生终于醒了。他伸了个懒腰，推开门往外一看——哇，门口竟然站着两个雪人！仔细一看，才认出是杨时和他的同学。程先生又惊讶又感动：这么大的雪，你们怎么不进来叫我呢？", "杨时恭恭敬敬地说：先生，学生不敢打扰您休息。我们多等一会儿没关系，您睡个好觉比什么都重要。程先生听了，眼眶都红了，心里想：这样的学生，真是太难得了！", "程门立雪的故事告诉我们：真正的求学精神是发自内心的尊敬，哪怕等得再久也不抱怨——这就是尊师重道的道理！"], "curie": ["在一百多年前的波兰，有一个叫玛丽的小女孩。她家里很穷，爸爸是教师，妈妈是音乐老师。可是玛丽从小就特别喜欢读书，她觉得书里有一个奇妙的世界，比任何玩具都好玩。", "那时候女孩子很难上大学，可是玛丽不肯认输。她白天打工洗衣服赚钱，晚上就偷偷躲在阁楼里学习。冬天的波兰冷得要命，阁楼里没有暖气，小玛丽的手指冻得通红，可她还是舍不得放下书本。", "功夫不负有心人，玛丽终于考上了大学，还获得了去法国深造的机会。在法国，她遇到了和她一样热爱科学的皮埃尔，两个人结为夫妻，一起研究一种神奇的石头。", "这种石头会发出淡淡的蓝光，还能发出看不见的射线呢！他们在一个简陋的实验室里，一锅一锅地煮矿石，又脏又累又呛人。可是玛丽从不怕脏不怕累不怕苦，因为她的心里装着更大的梦想——要找到能治病的良药！", "经过四年的艰苦研究，玛丽终于从好几吨矿石中提炼出了一丁点儿发光的粉末，她给它取名叫镭。你们知道吗？这么一点点镭，要从好几吨矿石里才能提炼出来呢！", "镭可以用来治疗一种很可怕的病——癌症。很多得了癌症的病人，因为有了镭的治疗，终于能够康复出院，和家人团聚了。", "有人劝玛丽给镭申请专利，这样就能发大财。可是玛丽摇摇头说：镭是属于全人类的，不是属于我一个人的。她把发现的方法无私地告诉了全世界，自己却一辈子住在简陋的小房子里，过着简朴的生活。", "后来，玛丽两次获得了诺贝尔奖，成为了世界上最伟大的科学家之一。可是她从来不骄傲，她说：荣誉就像玩具一样，不值得炫耀。真正的伟大，不是为了自己，而是为了让更多人过得更好！"], "davinci": ["五百多年前，意大利有一个叫达·芬奇的小男孩。他从小就特别喜欢画画，画什么像什么——画小鸟像要飞起来，画小鱼像在水里游，连蚂蚁画出来都有六条腿呢！邻居们看了都惊叹不已，纷纷夸他是小天才。", "达·芬奇的爸爸看他这么有天赋，高兴极了，就把他送到佛罗伦萨最有名的画家韦罗基奥那里学画。达·芬奇高兴得一蹦三尺高，心想：太好了！终于可以学真正的画画了！", "可是到了老师那里，达·芬奇傻眼了——老师不让他画别的，就让他画鸡蛋。一天画鸡蛋，两天画鸡蛋，三天还是画鸡蛋……小达·芬奇不耐烦了，忍不住问老师：老师，我已经画了这么多蛋了，什么时候才能画别的呀？", "老师笑着摇摇头，指着一个鸡蛋说：你看，这一个鸡蛋，从这个角度看是椭圆的，从那个角度看是扁的，光照过来又不一样了。这一千个鸡蛋，有哪两个是一模一样的呢？画蛋，是训练你的眼睛和手，让你学会认真观察。", "达·芬奇听了老师的话，恍然大悟：原来画画不是画得像不像那么简单，要用心去观察啊！从此他认认真真地画蛋，画了无数个蛋，把基本功练得特别扎实。", "后来，达·芬奇真的成了全世界最著名的画家之一。他画出了《蒙娜丽莎》——那幅微笑着的世界上最神秘的画，还画了《最后的晚餐》，影响了无数人。", "不仅如此，达·芬奇还是个全才呢！他设计过直升机、坦克、潜水艇的图纸，研究过人体解剖，还发明了很多奇妙的机器。那时候人们都叫他：万能的天才！", "达·芬奇的故事告诉我们：打好基础比什么都重要。就像盖房子一样，地基打不牢，房子就盖不高。达·芬奇画了无数个蛋，才成了最伟大的画家。你现在练习的基本功，都是以后成功的基石哦！"], "edison": ["很久很久以前，夜晚的世界是黑漆漆的。人们只能点蜡烛或者油灯，光线很微弱，一不小心还会引发火灾。有一个叫爱迪生的小男孩，从小就特别爱问为什么——为什么天会下雨？为什么鸟会飞？为什么星星会眨眼睛？问得大人们都答不上来，大家都叫他'问题大王'。", "爱迪生长大后，想发明一种又亮又安全的灯，让所有人都能在夜晚看到光明。他找来各种各样的材料做试验：白金试试，碳丝试试，甚至头发丝也试试！可是灯泡总是亮一下就灭了。试验了一次又一次，失败了一次又一次。", "很多人笑话他：你已经失败了几百次了，还是放弃吧！爱迪生的助手们也泄气了，问他还要不要继续试下去。", "可爱迪生不这么想。他笑眯眯地说：我没有失败啊，我只是发现了几百种不能做灯丝的方法！每失败一次，就离成功更近一步！他继续试验，试了竹丝、棉线、纸张……一直试了一千多次！", "终于有一天晚上，实验室里传来一阵欢呼声——灯泡亮了！而且亮了整整四十多个小时！爱迪生激动得跳了起来，眼睛里闪着泪光。", "从此，世界上有了电灯，黑夜变得像白天一样明亮。人们可以在灯下读书、写字、工作、玩耍，再也不用害怕黑暗了。", "爱迪生一生发明了两千多种东西，是世界上最伟大的发明家之一。他用行动告诉我们：只要不放弃，就一定能找到成功的路！失败不可怕，每失败一次，就离成功更近一步！"], "huatuo": ["东汉末年，有一位神医叫华佗，他的医术神奇极了，会做外科手术，还会针灸治病，人们称他为'神医华佗'。传说华佗能看清病人身体里的问题，不管什么奇怪的病，他都能治好。", "有一次，一个姓周的人得了很严重的病，整天拉肚子，看了很多医生都治不好。后来找到华佗，华佗看完后说：'你这病不是吃药能治好的，要先吃我的药，然后……我得先看看你肚子里有什么。'病人和家属都吓坏了：'看肚子里？那不是要把肚子切开吗？'华佗笑着说：'不用怕，我有办法。'", "华佗给病人吃了一包药，然后让他躺下。过了一会儿，病人昏昏沉沉地睡着了。等病人醒来，华佗拿出一根长长的银针，说：'你的病根在这里，我给你扎一针就好了。'说完就把针扎了进去。病人只感觉肚子一疼，然后一阵轻松，病就好了！后来病人才知道，华佗用的其实是全身麻醉的方法，让病人睡着后，再做手术取病灶。这种方法比西方早了一千多年呢！", "华佗不仅会治病，还特别注重预防保健。他观察到，很多人平时不注意锻炼，生病了才来看医生，往往已经晚了。于是他想：能不能发明一种方法，让人们在日常生活中就能锻炼身体、预防疾病呢？", "有一天，华佗去山里采药，看见两只老虎在打架。两只老虎打完架后，竟然开始做起了运动——一会儿像鸟一样张开翅膀，一会儿像熊一样扭动腰身，一会儿像鹿一样伸长脖子……华佗看得入迷，心想：老虎这是在干什么呢？仔细一看，哦！原来老虎是在舒展筋骨、锻炼身体呢！", "华佗受到老虎的启发，创造了一套健身方法，叫做'五禽戏'。'五禽'就是五种动物——虎、鹿、熊、猿、鸟。这套运动模仿老虎的扑跃、鹿的奔跑、熊的笨拙、猿的灵活、鸟的轻盈，让人体的各个部位都能得到锻炼。", "华佗把这个方法教给了他的弟子吴普。吴普每天坚持练习五禽戏，活到了九十多岁，牙齿都没掉，头发也是黑的，眼睛还能看得很清楚！后来，五禽戏传了下来，成了中国传统的健身方法，到现在还有人在练呢！", "华佗的故事告诉我们：预防比治疗更重要。平时多锻炼身体，保持健康的生活方式，比生病了再去找医生好多了！"], "huatuo_wuqinxi": ["东汉末年，有一位特别厉害的大夫叫华佗。华佗的医术有多神呢？他走遍大江南北给人看病，不管什么疑难杂症，到了他手里都能治好。他还会做一种很厉害的外科手术——在手术前给病人喝一种叫\"麻沸散\"的药，病人喝下去就像睡着了一样，一点都不觉得疼。", "有一年春天，华佗回到了老家安徽亳州。他看到邻居们整天待在家里，不爱运动，身子骨弱得很，三天两头就生病。华佗心里着急：有什么好办法，能让大家都身体健康，少生病呢？", "华佗开始仔细观察。他发现，村里的小动物们整天蹦蹦跳跳、跑来跑去，却很少生病。他看了老虎打斗，那虎跃虎扑的动作，刚猛有力；他看了梅花鹿奔跑，那伸颈回头的样子，轻盈优美；他看了狗熊散步，那慢悠悠的步伐，憨态可掬。", "他又看了猴子玩耍，那上蹿下跳的样子，机灵古怪；还看了鸟儿飞翔，那展翅高飞的动作，轻盈自在。华佗越看越兴奋：这些动物每天运动，身体倍儿棒！如果人也能学学它们的动作，不是也能健康长寿吗？", "说干就干！华佗结合自己多年的医学知识，创造了一套模仿五种动物动作的健身操——\"五禽戏\"。第一禽是虎戏，模仿老虎伸展前肢，勇猛有力；第二禽是鹿戏，模仿小鹿伸颈回顾，轻盈优美；第三禽是熊戏，模仿狗熊慢走晃脑，憨态可掬；第四禽是猿戏，模仿猿猴攀援跳跃，灵活机敏；第五禽是鸟戏，模仿仙鹤展翅飞翔，轻盈自在。", "华佗把这套健身操教给了乡亲们。大家跟着练，配合呼吸和动作，果然身体越来越好。村东头的王大爷本来走路都喘，练了三个月五禽戏，现在能挑着担子走十里地不累；村西头的李奶奶本来老感冒，坚持练了半年，现在冬天都不怕冷了！", "华佗有个学生叫吴普，一直跟着师父学医。华佗把这套五禽戏也教给了他。吴普每天练习，从不间断，一直练到九十多岁，耳不聋眼不花，还能给病人看病呢！人们都说：吴普之所以这么长寿，全靠师父教的五禽戏啊！", "后来，曹操听说了华佗的本事，把他请去给自己看病。可惜曹操疑心太重，把华佗关进了监狱。华佗在狱中把自己毕生的医学心得写成了书，可惜被烧毁了。幸好五禽戏流传了下来，一代一代传了两千多年，到现在还有人在练习呢！", "华佗与五禽戏的故事告诉我们：最好的医生不是治病的，而是教人防病的。养成运动的好习惯，比吃什么补药都管用！"], "jianzhen": ["唐朝的时候，日本多次派留学生来中国学习。这些留学生回国后，日本的天皇非常羡慕中国的文化，决定派人去中国请一位高僧到日本去传法。一位叫荣睿的日本和尚来到中国，四处寻访，终于在扬州的大明寺找到了鉴真大师。", "荣睿恭敬地对鉴真说：大师，日本的百姓也渴望学习佛法，您能去日本教教他们吗？鉴真看了看荣睿，又看了看寺外的天空，点了点头：日本虽然远，可是日本人民的心和中国人民的心是连在一起的。去！我一定去！", "第一次出发，鉴真带着弟子们上了船。可是海上起了大风浪，船被吹得东倒西歪，差点翻进海里。大家只好返回陆地。第二次出发，有个弟子偷偷告密，官府把鉴真拦了下来。第三次、第四次、第五次出发，也都因为各种原因失败了。", "五次失败后，鉴真已经五十多岁了，眼睛也因为劳累过度而失明。朋友们都劝他：大师，您年纪大了，眼睛也看不见了，还是别去了吧。鉴真却摇了摇头，坚定地说：只要我还有一口气在，我就一定要把佛法传到日本！", "第六次出发，终于成功了！鉴真坐船在海上漂了十多天，终于到达了日本。那时候他已经六十六岁，双目失明，可他还是一步一步地走上岸来。日本的僧人和百姓夹道欢迎，很多人激动得哭了：鉴真大师，您终于来了！", "鉴真在日本传播佛教、建筑、医学等方面的知识，还设计建造了著名的唐招提寺。他在日本生活了十年，直到去世。他的故事告诉我们：真正的追梦人，不会被任何困难打败，只要坚持，梦想就一定能实现！"], "mozi": ["战国时候，楚国是个超级大国，国君楚惠王野心勃勃，想攻打小小的宋国。他请来了当时最厉害的工匠公输班，造出了攻城用的云梯——这是一种特别高大的梯子，士兵可以踩着它爬上城墙！宋国危在旦夕。", "这个消息传到了鲁国，一位叫墨子的哲学家听说了。墨子是墨家学派的创始人，他主张'兼爱'和'非攻'——意思是要爱天下所有的人，反对不义的战争。他一听说楚国要欺负宋国，立刻决定去阻止这场战争！", "墨子日夜不停地赶路，走了整整十天十夜，鞋底都磨穿了，脚上全是血泡。到了楚国，他先去找公输班，说：'北方有人欺负我，请帮我杀了他！'公输班不高兴了：'我是讲道义的人，怎么能杀人呢？'墨子反问：'你不肯杀一个人，却要帮楚国杀宋国成千上万的人，这算什么道义？'", "公输班被问得哑口无言。墨子又去见楚惠王，打了个比方：'有人放着自家的漂亮马车不坐，偏要去偷邻居的破车；放着自家的锦绣衣裳不穿，偏要去偷邻居的粗布短衣。大王您觉得这人怎么样？'楚王笑了：'这人一定有偷东西的毛病！'", "墨子说：'楚国地大物博，宋国又小又穷。大王去攻打宋国，不就跟那个偷邻居破车的人一样吗？'楚王虽然觉得有道理，但还是不甘心：'公输班已经造好了云梯，一定能攻下宋国！'", "墨子解下腰带放在桌上，当城墙；又拿小木片当攻城和守城的器械，和公输班当场比试起来。公输班用了九种攻城方法，墨子一一化解。公输班急了：'我有办法对付你，但我不说！'墨子笑了：'我知道你的办法——杀了我宋国就没人守了。可我早就派了三百个弟子去宋国帮忙守城了！'", "楚王听罢，终于放弃了攻打宋国的念头。墨子靠着智慧和勇气，一个人阻止了一场大战，救了宋国千千万万的百姓！墨子止楚攻宋的故事告诉我们：和平比战争更珍贵，智慧和勇气可以阻止争端！"], "newton": ["三百多年前，英国有一个小男孩叫牛顿。他从小就和其他孩子不一样——别的孩子在院子里追逐打闹的时候，他却喜欢蹲在角落里做各种小玩意儿。", "牛顿做的小风车会转，做的小水钟会按时滴水，还会报时呢！他还喜欢爬上屋顶，用三棱镜对着阳光看——哇，阳光居然能变成彩虹的颜色！小伙伴们都说牛顿是个怪孩子，可牛顿才不在乎呢，他觉得这个世界太有意思了，有好多秘密等着去发现。", "有一天傍晚，牛顿坐在苹果树下看书，看得入了迷。忽然，咚的一声，一个又红又大的苹果从树上掉下来，正好砸在他的头上。牛顿揉了揉脑袋，抬头看了看苹果树，心里忽然冒出一个问题：", "苹果为什么会往下掉呢？为什么不往天上飞，也不往旁边跑，偏偏往下掉呢？", "这个问题让牛顿想了好久好久。他想啊想，想到月亮，想到太阳，想到星星……终于有一天，他想明白了：原来地球有一种看不见的吸引力，像一只无形的大手，把所有东西都往下拉！这就是万有引力！月亮绕着地球转，也是因为地球在拉着它呢！", "牛顿后来成了伟大的科学家，发明了数学里的微积分，还发现了许多重要的科学定律。可是他从来都不骄傲，他总是说：我只是像一个在海边捡贝壳的孩子，真理的大海还有太多太多我没有发现。", "牛顿的故事告诉我们：多观察、多思考，再普通的事情里也可能藏着大秘密。一个苹果掉下来，就能让牛顿想到改变世界的大发现。你看，身边的小事是不是也值得我们多问几个为什么呢？"], "nobel": ["一百多年前，瑞典有一个叫诺贝尔的小男孩。他的身体很弱，经常生病，妈妈总是担心他。可是小诺贝尔很勇敢，他最喜欢的事情就是跟着爸爸一起做各种小实验。", "有一天，爸爸把一小块白色的粉末放在火上烤。诺贝尔好奇地凑过去看，突然——砰！火药爆炸了，火星四溅！小诺贝尔吓得摔倒在地上，脸都吓白了。可是他的眼睛里闪着光，他没有被吓退，反而兴奋地说：爸爸，再来一次！我想看看它是怎么炸开的！", "诺贝尔长大后，国家正在大力发展工业，需要很多开矿修路的人。可是那时候的炸药很危险，一不小心就会爆炸伤人。诺贝尔想：如果能发明一种更安全的炸药，该有多好啊！", "于是，诺贝尔开始了他的实验。他把自己关在一间小小的实验室里，一次又一次地尝试，一次又一次地失败。有时候爆炸把他炸得满脸黑灰，有时候把他炸到墙上，可他从来不放弃。", "邻居们都在背后笑话他：这个诺贝尔，整天搞那些危险的实验，早晚要被炸死的！诺贝尔听到了，只是笑笑，继续做他的实验。", "有一次，诺贝尔在做实验的时候，炸药把实验室炸得粉碎，诺贝尔的弟弟和几个助手都被炸死了。诺贝尔难过得哭了很久，他也很害怕：这么危险，还要继续吗？", "可是他想起了那些在矿上辛苦劳动的工人们，他们需要炸药来开山修路，让人们生活得更好。诺贝尔擦干眼泪，又走进了实验室。他对自己说：再试一次，就一次！", "一晃眼，二十多年过去了。诺贝尔失败了无数次，炸毁了自己的实验室，炸伤了无数次。就在他快要绝望的时候，有一天，他终于成功了——他发明了一种叫做硝化甘油的安全炸药！", "这种炸药不会轻易爆炸，只有用雷管才能引爆。工人们可以安全地使用它来开矿、修路、盖房子。诺贝尔高兴得跳了起来，他终于成功了！", "后来，诺贝尔用他发明炸药赚的钱设立了诺贝尔奖，这是全世界最光荣的奖项。诺贝尔奖包括和平奖、物理奖、化学奖、医学奖、文学奖和经济学奖，用来奖励全世界最优秀的人才。", "诺贝尔的故事告诉我们：失败不是终点，而是通往成功的必经之路。只要坚持不懈，总有一天会成功！"], "quyuan": ["两千多年前，在楚国有一个特别有学问的人叫屈原。他从小就聪明好学，博览群书，长大后成为了楚国的大臣，为国家出谋划策。屈原特别爱国，他总想着让楚国变得强大起来。", "可是楚国的一些奸臣嫉妒屈原的才能，他们经常在楚王面前说屈原的坏话。楚王听信了谗言，渐渐地疏远了屈原，最后甚至把他流放到了很远的地方。", "屈原被流放后，心里非常难过。他一个人走在江边，看着滔滔的江水，想起了自己的祖国，忍不住痛哭起来。渔夫看见了，问他：你为什么这么伤心？屈原说：大家都浑浑噩噩，只有我一个人清醒；大家都醉生梦死，只有我一个人在坚持真理。我怎么能不难过呢？", "后来，秦国攻打楚国，楚国眼看就要灭亡了。屈原听到这个消息，心如刀割。他不想看到自己的祖国灭亡，却又无能为力。公元前278年的五月初五，屈原抱着一块大石头，跳进了汨罗江。", "人们听说屈原投江了，纷纷划着船去救他，还往江里投米粽喂鱼虾，生怕鱼虾吃掉屈原的身体。这就是端午节划龙舟、吃粽子的由来。", "屈原虽然死了，但他的爱国精神永远留在了人们心中。他写的诗《离骚》、《九歌》等，成了千古传颂的经典。有一句诗说：路漫漫其修远兮，吾将上下而求索。意思是：追求真理的路虽然漫长，但我会一直努力探索。这句话激励了无数后人。", "屈原的故事告诉我们：爱国是一种崇高的感情，无论身在何处，都不要忘记自己的祖国！"], "sangu_bio": ["东汉末年，天下大乱，英雄豪杰纷纷崛起。有一位叫刘备的王爷，虽然身边有关羽、张飞这样武艺高强的大将，却总是打败仗。他心里着急啊：为什么我总是输呢？后来他听说有个叫诸葛亮的人，住在隆中的草屋里，上知天文，下知地理，聪明得不得了！", "刘备决定要去请诸葛亮出山帮忙。第一次，他带着关羽、张飞翻山越岭来到诸葛亮的草屋前。结果呢？诸葛亮出门了，去找朋友玩了！张飞不高兴地说：大哥，这人架子也太大了，不如我把他绑来吧！刘备摇摇头：不不不，咱们下次再来。", "第二次，大雪纷飞的冬天，刘备又去请诸葛亮。关、张二人在门口冻得直跺脚，嘴里喷出的白气一团一团的。张飞抱怨说：大哥，外面这么冷，那小子说不定又在睡觉！可他们敲了半天门，诸葛亮的书童说：先生还在睡觉呢，请改天再来吧。", "第三次，刘备选了个好日子，斋戒了三天，恭恭敬敬地来到草屋。这一次，诸葛亮终于在家了！刘备一进门，就看见诸葛亮坐在书桌前，正在认真地看书呢。诸葛亮抬起头，看见刘备这么真诚，心里很感动。", "两个人坐下来聊天。刘备诚恳地说：现在汉朝快要完了，奸臣当道，百姓受苦。我虽然有点志向，却没什么才能。请先生教教我，该怎么拯救天下啊？", "诸葛亮笑了，他站起身，走到墙上挂着的地图前，指着地图说：我有一个计策，叫做隆中对！曹操占了北方，地广兵多，不能硬碰；孙权占了江东三代经营，可以做朋友；咱们应该先拿下荆州，再取益州，然后三分天下！", "刘备听了，眼睛越来越亮，他激动地说：先生说得太对了！我找了这么久，终于遇到真正的智囊了！从此，诸葛亮成了刘备最信任的军师，帮他出谋划策，建立了蜀汉政权。三顾茅庐的故事告诉我们：真诚和坚持能打动人心，有志者事竟成！", "刘备三顾茅庐的故事告诉我们：真诚和坚持能打动人心，有志者事竟成！"], "shenkuo": ["沈括是北宋时期一个大科学家，他简直是个全才！天文、地理、数学、化学、医学，什么都懂，被后人称为「中国科学史上的坐标人物」。", "沈括小时候就特别爱问问题。看到蚂蚁搬家，他要问蚂蚁怎么认路；看到月亮在不同时间位置不一样，他要问月亮为什么会移动。他的脑袋里装满了「为什么」。", "有一次，沈括发现指南针总是指向南边，他很好奇，就研究了很久，最后写文章记录了磁针偏角的现象。这个发现比欧洲早了四百多年呢！", "沈括还特别会观察大自然。他在山里看到一层层叠起来的石头，就想：这些石头是怎么形成的呢？他跑去问老农，又自己研究，最后推断出这些岩石是古代的泥沙一层层堆积形成的。这就是最早的「地质学」思想。", "沈括还发明了「隙积术」，这是一种计算酒坛子堆起来有多少个的方法。这可是世界上最早的等差数列研究哦，比欧洲早了好几百年！", "晚年的时候，沈括住在一个叫梦溪园的地方，在这里写了很多很多科学笔记。后来这些笔记被整理成一本书叫《梦溪笔谈》，被誉为「中国科学史上的里程碑」。", "沈括的故事告诉我们：大自然里藏着很多秘密，只要我们像他一样多看、多问、多想，就能发现很多有趣的事情，说不定你也能成为小科学家呢！"], "simaqian": ["司马迁是西汉时期著名的史学家，他写的《史记》被称为史书的典范。可是你知道吗？司马迁能写出这么伟大的著作，经历了常人难以想象的苦难！", "司马迁从小就是个爱读书的孩子。他的父亲司马谈是汉朝的史官，专门负责记录历史。司马迁从小跟着父亲，耳濡目染，对历史产生了浓厚的兴趣。他立志要像父亲一样，成为一个记录历史的史官。", "长大后，司马迁当上了史官，开始四处游历，收集历史资料。他爬过巍峨的泰山，去过波涛汹涌的海边，访遍了古代名人故事发生的地方。他访问老人，收集古老的传说，就是为了把历史写得真实可信。", "公元前99年，发生了一件改变司马迁命运的事情。将军李陵在和匈奴打仗的时候，兵败被俘了。司马迁替李陵说了几句公道话，结果惹怒了汉武帝，被关进了大牢，判处了宫刑！", "宫刑是一种非常屈辱的刑罚，司马迁觉得天都要塌下来了。他想过自杀，一了百了。可是他转念一想：我的父亲把写史书的任务交给了我，《史记》还没写完呢！如果我就这样死了，谁来完成这部伟大的著作？", "司马迁咬紧牙关，活了下来。他说：人固有一死，或重于泰山，或轻于鸿毛。我要活下去，把《史记》写完！就这样，他在极其屈辱和痛苦中，继续坚持写作。", "整整十三年，司马迁忍着身体和心灵的巨大痛苦，终于完成了《史记》！这部书记载了从黄帝到汉武帝时期三千多年的历史，共有五十二万多字，是我国第一部纪传体通史！", "司马迁的故事告诉我们：遇到困难和挫折的时候，不要轻易放弃。要像司马迁一样，咬紧牙关坚持下去，完成自己的使命！《史记》至今仍然是中华民族最宝贵的文化遗产之一！", "司马迁的故事告诉我们：人的一生会遇到很多困难，但只要坚持理想、不放弃，就一定能创造出伟大的成就！"], "taoyuanming": ["东晋时候，有一位大诗人叫陶渊明。他从小爱读书写字，更喜欢在田野间漫步，看花开花落、听鸟儿歌唱。他心里觉得，这世上最美的日子就是种田读书、自由自在。", "可是家里太穷了，陶渊明不得不去做官养家糊口。他当了一个叫彭泽县令的小官，每天要处理各种烦心事，还要应付那些不讲道理的上司，心里别提多难受了。", "有一天，上面派了一个督邮来检查工作。这个督邮是个傲慢无礼的人，他一到就大摆架子。手下人赶紧跑来告诉陶渊明：'大人，您快穿戴整齐去迎接督邮大人！要恭恭敬敬地行礼才行！'", "陶渊明的脸一下子沉了下来。他沉默了好一会儿，忽然仰起头，大声说道：'我堂堂七尺男儿，怎么能为了五斗米的俸禄，就去向那种人卑躬屈膝！'五斗米就是他当县令的工资，他宁可不要这工资，也不愿意弯下腰来！", "说完，陶渊明解下官印放在桌上，头也不回地走了。他只当了八十多天的县令，就这样辞官回家了。从那以后，他再也不做官了，回到乡下种田写诗，过起了自由自在的日子。", "陶渊明回家后写了很多诗。他写采菊东篱下、悠然见南山的闲适，写种豆南山下、草盛豆苗稀的田园趣事。他还写了一篇《桃花源记》，想象了一个没有战乱、人人快乐的世外桃源，这篇故事流传千古。", "虽然日子过得清苦，有时候连饭都吃不饱，但陶渊明从不后悔。他说：衣沾不足惜，但使愿无违——衣服弄脏了没什么可惜的，只要不违背自己的心意就好！陶渊明告诉我们：真正的快乐不是做官发财，而是做真实的自己！"], "wangxizhi_lanting": ["东晋时候，有个超级厉害的大书法家叫王羲之，他的字写得漂亮极了！人们说他的字像行云流水，又像龙飞凤舞，看一眼就忘不了。可是你知道吗？王羲之小时候字写得可丑了，还因为字太丑，差点被人笑话了一辈子呢！", "王羲之七岁的时候开始学写字。刚开始，他握笔都握不稳，写的字歪歪扭扭的，像一条条小蚯蚓在纸上爬。他的启蒙老师看了直摇头：这孩子，怕不是学书法的料啊！王羲之听了，小脸涨得通红，暗暗下决心：我一定要把字写好！", "从那以后，王羲之每天一大早就爬起来练字，写啊写啊，写到太阳落山。他练习的时候特别认真，一笔一划都要写到最好。有时候写得入神了，连吃饭都忘了。他的母亲心疼地说：孩子，先吃饭吧，饭都凉了！王羲之摆摆手：等我写完这一页！", "王羲之练习书法有个习惯——他喜欢在池子里洗毛笔。天长日久，他家院子里的池子都被墨汁染黑了！人们把这个池子叫做墨池，还编了句顺口溜：羲之之书晚乃善，一池墨水尽天机。后来王羲之成了大书法家，还有人专门去参观那口墨池呢！", "有一天，王羲之路过一个小村子，看见一位老婆婆在卖扇子。扇子上写着字，可是写得歪歪扭扭的，根本卖不出去。老婆婆愁眉苦脸：唉，这可怎么活啊！王羲之看了心里不忍，就拿起笔，在每把扇子上认认真真地写起字来。", "老婆婆急坏了：小伙子，你把我的扇子弄脏了，这可怎么卖啊！王羲之笑着说：老婆婆，您就吆喝说是王羲之写的，保证卖光！老婆婆半信半疑地一试，果然，人们一听是王羲之写的字，呼啦一下全围上来了，扇子一下子就被抢光了！", "公元353年春天，王羲之和朋友们在会稽山阴的兰亭聚会，大家喝酒写诗，玩得可开心了。喝到高兴处，有人提议：今天这么高兴，不如把大家写的诗编成一本诗集，再请王羲之写个序！大家都说好。", "王羲之借着酒兴，提笔一挥而就，写下了《兰亭序》这篇文章。这篇文章写得文采飞扬，字更是漂亮得不得了！据说王羲之后来又写了好几遍，可是怎么写都赶不上第一遍那一份。他说：这一份是神来之笔，再也写不出来了！", "《兰亭序》被称为天下第一行书，是中国书法的最高典范。后来的大书法家如颜真卿、柳公权，都专门临摹学习《兰亭序》。就连唐朝的皇帝唐太宗，都把《兰亭序》当作宝贝一样收藏，还让大臣们学习它的书法呢！", "王羲之的故事告诉我们：想要做好一件事，没有捷径，只有日复一日地练习。只要肯下功夫，笨小孩也能变成大书法家！"], "wright": ["一百多年前，美国有一对兄弟——威尔伯·莱特和奥维尔·莱特。他们小时候家里很穷，爸爸是个牧师，妈妈心灵手巧，常常给孩子们做玩具。有一天，爸爸从外地回来，带给兄弟俩一个神秘的礼物——一个会飞的竹蜻蜓。", "兄弟俩好奇地把竹蜻蜓转了好几圈，竹蜻蜓真的飞了起来！他们高兴得又蹦又跳，心里种下了一颗小小的种子：长大了，我也要造出一个能飞的东西！", "兄弟俩长大后，一个开了一家自行车店修理自行车，一个当了一名老师。虽然工作很忙，但他们始终没有忘记童年的梦想——让人类飞上天空。", "那时候，已经有很多人在尝试造飞机了，可是全都失败了，还有人因为飞机坠落而失去了生命。大家都说：人类怎么可能像鸟儿一样飞上天空呢？", "可是莱特兄弟不信邪。他们买来很多关于鸟和飞行的书，白天修自行车，晚上就研究飞行知识。他们发现，鸟儿飞行的时候翅膀会上下拍打，飞机的翅膀却不能这样拍打——那飞机是怎么飞起来的呢？", "后来，他们想出了一个好办法：让飞机的翅膀稍微弯曲一点，这样空气流过的时候，就会把飞机托起来！这就是飞机能飞的关键——升力原理。", "有了原理，还需要不断地试验。莱特兄弟在自家的空地上搭了一个大风洞，一次又一次地试验。失败了没关系，爬起来再试；摔坏了修一修，继续飞！", "1903年12月17日这一天，天气冷飕飕的，兄弟俩在北卡罗来纳州的基蒂霍克海滩放飞了他们的飞机——飞行者一号。", "这一天，奥维尔坐上了飞机，螺旋桨转了起来，飞机在滑行了一段距离后，真的飞了起来！虽然只飞了12秒钟，飞了36米远，但这却是人类历史上第一次有动力的飞行！", "人们从四面八方赶来观看，消息传遍了全世界。从那以后，飞机越来越先进，飞得越来越高，越来越远。现在，我们可以坐飞机去地球的另一端，只要十几个小时就能到达。", "莱特兄弟的故事告诉我们：梦想是成功的起点，而坚持梦想、不断尝试，才是让梦想成真的关键！"], "xuxiake": ["徐霞客是明代一个大旅行家，他一辈子就喜欢做一件事——出门旅游。不过他可不是那种坐车坐船的普通游客，而是专门走路、爬山，睡野外的那种超级旅行者！", "徐霞客小的时候就特别爱看地理书，书上说哪座山高、哪条河长，他都记得清清楚楚。他常常站在家门口望着远方的山，心想：那些山到底长什么样呢？", "二十岁那年，徐霞客开始了他的旅行生涯。他背着干粮和换洗衣服，一个人出发了。一路上遇到很多困难，有时迷路了，有时生病了，有时差点掉进山崖。", "可是徐霞客从来不后悔。他说：「山再高也有顶，水再深也有底，我要亲眼去看看！」他登过陡峭的华山，划过波涛汹涌的洞庭湖，还去过热带森林探险。", "徐霞客旅行有个好习惯，就是把看到的东西都记下来。他写了几百万字的日记，记录了各种奇怪的山形地貌、植物动物，还有各地老百姓的生活。", "有一年，他去云南探险，路上生了重病，走不动路。当地的好心人把他抬回了家。他的家人劝他不要再出去旅游了，可徐霞客摇摇头说：「我的腿还能走，我的心还想去看世界。」", "徐霞客去世后，他的日记被整理成一本书叫《徐霞客游记》，成为了中国古代最著名的地理学著作。现在我们读这本书，还能感受到他那颗热爱大自然的心呢！"], "zhangqian_bio": ["两千多年前的西汉时候，中国人穿的都是用蚕丝做的丝绸。可那时候，中原的人根本不知道，在遥远的西方，还有一个叫做大月氏的国家，那里的人也会做丝绸，而且他们的国王被匈奴人欺负得可惨了！", "汉武帝听说后，心想：如果能联合大月氏，一起打匈奴，那不就太好了吗？可是去大月氏，得穿过匈奴的地盘啊，那不是送死吗？汉武帝皱起眉头，张贴告示：谁愿意去出使大月氏？", "一个叫张骞的年轻人站了出来，他虽然是朝廷里一个小小的郎官，可胆子大得很！公元前139年，张骞带着一百多人，从长安出发，踏上了这条不归路。", "果然，他们刚走到河西走廊，就被匈奴人抓住了。匈奴王把张骞关起来，还派了匈奴姑娘给他做老婆，想让他投降。可张骞心里一直想着自己的使命，他一边放羊，一边偷偷观察匈奴人的地形和兵力，等待逃跑的机会。", "整整十年后，张骞终于找到了一个机会，他骑着马，带着几个手下，趁着夜色逃了出来！他们穿过沙漠，翻过雪山，走了好久好久，最后终于来到了大月氏。", "可惜啊，大月氏的人已经被迁移得太远太远，早就不想打仗了。张骞虽然没能说服他们联合打匈奴，可他收获了满满一路的见闻——他看到了葡萄、石榴、胡萝卜，还学会了制作毛毯的手艺。", "张骞回国后，把他看到的一切都报告给了汉武帝。大家这才知道，原来在遥远的地方，还有那么多奇妙的国家和神奇的物产！汉武帝高兴极了，又派张骞出使西域各国。", "从此，一条横跨亚洲的商路被开辟出来了！中国的丝绸、茶叶、瓷器运到了西方，西方的宝马、香料、瓜果也来到了中国。这条路，就是著名的丝绸之路！张骞用他的勇气和坚持，打开了中国人看世界的窗户，他是真正的探险家，也是丝绸之路的奠基人！"], "zhaoyun": ["三国时候，刘备的军队被曹操的大军追得四处逃窜。在混乱中，刘备的老婆糜夫人抱着小阿斗（刘备的儿子）躲进了乱军里。赵云是刘备手下最勇猛的将军，他本来负责保护刘备，可他一发现糜夫人和小阿斗走散了，心都提到嗓子眼儿了！", "不行！我一定要把他们找回来！赵云骑上他的白马，头也不回地冲进了曹军的包围圈。曹操的兵多得像蚂蚁一样，密密麻麻，赵云左冲右突，长枪挥舞得像风车一样，杀了一个又一个，身上都沾满了血。", "找了半天，赵云终于在一堵破墙后面找到了糜夫人和小阿斗。糜夫人受了伤，脸色苍白，可她看见赵云来了，眼泪一下子流了下来：赵将军，你还敢回来找我们？", "赵云跳下马，单膝跪地说：夫人，快跟我走！曹兵就在后面，我一定保护你们杀出去！可是糜夫人看了看赵云，又看了看怀里的阿斗，摇摇头说：将军，你带着阿斗走吧。我受了伤，只会拖累你们……", "话音刚落，远处传来曹兵的马蹄声，越来越近了！糜夫人突然挣脱赵云，一转身跳进了旁边的一口枯井里！赵云想去拉，却只抓住了一片衣角……他愣住了，眼泪在眼眶里打转。", "可现在不是哭的时候！赵云咬咬牙，解下腰带把小阿斗绑在怀里，翻身上马。他大喊一声：主公的孩子，我来保护！然后像一阵旋风一样冲向曹军！", "曹操在远处看见了赵云，心里暗暗称赞：好一个孤胆英雄！他对身边的将领说：务必活捉这个人！曹军一听，纷纷围过来想抓活的。可赵云武艺高强，一杆长枪使得出神入化，七进七出，杀得曹兵人仰马翻！", "最后，赵云浑身是血地冲出了包围圈，成功把小阿斗带回了刘备身边。刘备接过阿斗，感动得热泪盈眶：为了我的孩子，差点损失一员大将啊！后来，赵云被人们称为常胜将军，他的故事也告诉我们：勇敢和忠诚，是最可贵的品质！"], "zuchongzi": ["在一千五百多年前的南北朝，有一个叫祖冲之的科学家。他从小就特别喜欢数学和天文，常常捧着数学书看到忘记吃饭，晚上还会爬到屋顶上观察星星。", "那时候，数学书上记载的圆周率是'径一周三'，意思是说圆的周长是直径的三倍。可是祖冲之觉得这个数字不太准确，他决定自己算一算，精确地量出圆周率的真正数值。", "为了计算准确，祖冲之用竹子做了一些小棍子，叫做'算筹'。他把一根圆木棍截成两段，量出直径的长度，再用算筹一点一点地测量周长。白天量，晚上量，量了一遍又一遍。", "那时候可没有计算器，所有的计算都要用算筹一根一根地摆。祖冲之摆了几万根算筹，算了几个月，终于算出了圆周率在3.1415926和3.1415927之间。", "你知道吗？祖冲之算出的这个数字，西方人要等到一千年以后才能算出来呢！而且他还发明了一种新的计算方法，叫做'割圆术'，这种方法至今还被数学家们使用。", "除了圆周率，祖冲之还发明了很多东西。他造出了指南车，让人在迷路的时候也能找到方向；他还制定了《大明历》，这是当时最先进的历法。", "祖冲之的故事告诉我们：科学需要认真和坚持，不怕困难、追求真理的科学家最了不起！"], "suiwendi": ["南北朝的时候，中国分成了好多小国家，你打我我打你，打了快三百年。老百姓的日子苦极了，今天要交这个税，明天又要去打仗，庄稼都没人种了。这时候，北周有个叫杨坚的大臣，他的女儿是皇后，权势可大了。", "北周的小皇帝才八岁，什么都不懂。杨坚帮着处理国家大事，他办事特别认真，每天天不亮就起床批阅奏章，常常忙到深夜。他看那些贪官污吏欺负老百姓，气得直拍桌子。他心想：这天下早就该统一了，不能再让老百姓受苦了！", "公元581年，杨坚让小皇帝把皇位让给他，建立了隋朝，他就是隋文帝。隋文帝登基后第一件事就是消灭南方的陈朝。他派了五十万大军，兵分八路，浩浩荡荡地杀向江南。陈朝的后主陈叔宝整天就知道喝酒写诗，还在宫里养了一群歌女跳舞。", "隋军打过来的时候，陈后主急得团团转，他躲进了一口枯井里，想逃过一劫。隋军在井口喊：再不出来就扔石头啦！陈后主吓得大喊：别扔别扔，我出来！结果他被拉上来的时候，连他最喜欢的两个妃子都一起从井里拽了出来，狼狈极了。", "南北统一了！隋文帝开心极了，他开始大刀阔斧地改革。他废除了那些乱七八糟的苛捐杂税，把官制也简化了。他还发明了科举制度——读书人不用靠关系，只要考试考得好就能当官。这下子，穷人家的孩子也有机会施展才华了。", "隋文帝自己特别节俭，衣服破了补补接着穿，吃饭每顿只有几个菜。他规定宫里不许用金银珠宝做装饰，甚至把皇宫里多余的铜器都融化了铸成钱。大臣们见他这么朴素，谁也不敢再铺张浪费了。", "在隋文帝的治理下，隋朝变得特别富裕。粮仓里的粮食堆得满满的，有的都放了好多年发了霉。老百姓终于过上了安稳的日子，人口也翻了一倍。这段太平盛世，历史上叫做「开皇之治」。隋文帝用他的勤奋和节俭，开创了一个伟大的时代。"], "lizicheng": ["明朝末年，陕西连着好几年闹旱灾，地里的庄稼全枯死了，裂开了一道道大口子。老百姓饿得没办法，只能吃树皮、啃观音土。可朝廷不但不管，还不停地催着交税。李自成就是陕西人，他从小给地主放羊，饿得皮包骨头，对穷人的苦最清楚不过了。", "有一天，李自成实在饿得受不了，就跑到县衙去讨口饭吃，结果被衙役毒打了一顿。他气得浑身发抖，一拳砸在墙上：这世道，不是逼着人造反吗！他干脆加入了起义军，因为打仗勇敢又有谋略，很快就被大家推举为「闯王」。", "李自成带着起义军四处打仗，每到一个地方，他就打开粮仓，把粮食分给穷人。他还喊出了一个响亮的口号：「吃他娘，穿他娘，开了大门迎闯王，闯王来了不纳粮！」老百姓一听不要交税了，高兴得不得了，纷纷拿着锄头、镰刀跑来加入他的队伍。", "李自成的队伍越滚越大，从几千人发展到了一百多万人。公元1644年，他带领大军浩浩荡荡地杀向北京城。明朝的军队早就没了斗志，一触即溃。崇祯皇帝在煤山上长叹一声，用腰带自尽了。李自成骑着高头大马，威风凛凛地进了紫禁城。", "可是进了北京城之后，李自成和他的手下们就变了样。他们住进了皇宫，穿上了绫罗绸缎，天天大吃大喝，还抢老百姓的东西。李自成对部下说：「天下太平了，大家好好享受享受吧！」谁要是劝他，他就嫌烦，把人家赶走。", "更糟糕的是，李自成的手下抓了明朝的将领吴三桂的爸爸，还抢了他的爱妾陈圆圆。吴三桂本来打算投降李自成的，气得火冒三丈，干脆打开山海关，把关外的清军请了进来。李自成在清军和吴三桂的夹击下，打得大败，只好匆匆忙忙地退出北京城。", "李自成在北京只当了四十二天的皇帝，就从顶峰跌到了谷底。他带着残兵败将一路逃到九宫山，最后被当地的地主武装杀害了。闯王的兴衰告诉我们：打天下靠的是民心，失了民心，江山就坐不住了。"], "gongcheshangshu": ["1895年，清朝和日本打了一场甲午战争，结果输得一塌糊涂。北洋水师全军覆没，军舰沉入了海底，士兵们的尸体漂满了海面。朝廷没办法，只好派李鸿章去日本马关和日本人谈判，准备签一个丧权辱国的条约，把台湾和辽东半岛都割让给日本。", "消息传到北京，整个京城都炸了锅！正好这时候，全国各地的读书人正在北京参加科举考试，有一千三百多人。他们听到这个消息，气得饭都吃不下。广东考生康有为更是急得拍着桌子大喊：不能签！签了这条约，咱们中国就完了！", "康有为连夜写了一封长长的请愿书，足足有一万八千多字。他写得声泪俱下，从变法图强写到富国强兵，从废除割地写到迁都再战。他写一句，弟子梁启超就在旁边誊抄一句，两人一直写到天亮，蜡烛都烧光了好几根。", "第二天，康有为和梁启超把请愿书拿给各省的考生看。大家传阅着，越看越激动。湖南考生举着拳头说：写得好！我们联名签字！广东考生也说：算我一个！不到半天功夫，就有六百多个考生在上面签了名。", "因为那时候读书人去京城考试，官府会给他们提供公家的马车，所以大家叫他们「公车」。这次联名上书，就被称为「公车上书」。考生们抬着请愿书，浩浩荡荡地来到都察院门口，要求把请愿书转交给光绪皇帝。", "可惜的是，请愿书最终还是没能送到皇帝手里。那些顽固的大臣们害怕变法，把请愿书扣了下来。但公车上书的消息却像一阵风似的传遍了全国。大家这才知道，原来有这么多读书人在为国家操心。", "虽然公车上书没有成功，但它开启了中国变法维新的序幕。从那以后，越来越多的读书人开始思考：中国为什么落后？怎样才能让国家富强起来？康有为和梁启超的名字，也从此被全国人民记住了。"], "sunzhongshan": ["1866年，孙中山出生在广东香山县的一个小村庄里。他家里穷得叮当响，连双像样的鞋都买不起，小时候他经常光着脚丫子满山跑。他最爱听村里老人讲太平天国的故事，每当听到洪秀全带领穷人反抗清朝，他就激动得攥紧小拳头，眼睛闪闪发亮。", "长大后，孙中山去了香港和澳门读书。他第一次看到西方的轮船、电报和医院，惊讶得嘴巴都合不拢。他忍不住问自己：同样是中国人，为什么在外国人的租界里，中国人连走路都要被管着？他越想越不服气，心里萌生了要改变中国的想法。", "孙中山本来学的是医学，他医术很好，给人看病特别认真，很多病人都喜欢他。可他渐渐发现，给一个人治病，只能救一个人；如果国家生病了，那得治整个国家的病才行！于是他放下手术刀，拿起了笔，开始写文章宣传革命。", "1894年，孙中山在檀香山成立了兴中会。他举起拳头，对大家说：我们要推翻清朝，建立一个新的中国！说完他带头喊出了「驱除鞑虏，恢复中华」的口号。大家被他感染了，纷纷举起手来宣誓加入。", "孙中山的革命道路特别艰难。他组织了十次起义，可十次都失败了。有一次起义失败后，清朝悬赏十万两白银要他的人头，他只好逃到国外去。在逃亡的路上，他在日本、英国、美国到处宣传革命，跟留学生们讲救国的道理，嗓子都讲哑了。", "有一次在英国伦敦，清朝的密探把孙中山骗进了大使馆，把他关了起来，准备偷偷运回中国处死。幸好孙中山以前的老师赶到警察局去告状，又让报纸登了这件事，英国政府才出面救了他。孙中山出来后，更加坚定了革命的决心。", "1911年10月10日，武昌起义终于成功了！孙中山激动得热泪盈眶。第二年元旦，他在南京就任临时大总统，中国两千多年的封建帝制终于被推翻了！虽然后来革命果实被袁世凯抢走，但孙中山从未放弃，他奋斗到生命的最后一刻，被尊称为「国父」。"], "dengjiaxian": ["1924年，邓稼先出生在安徽怀宁县的一个书香门第。他爸爸是北京大学教授，家里书多得堆成了山。小邓稼先最爱看书，遇到不懂的问题就问个不停，有时候问得爸爸都答不上来。他爸爸摸着儿子的头说：好问的孩子，将来一定有出息。", "1941年，邓稼先考上了西南联大，那时候正是抗日战争时期，学校破破烂烂的，教室是茅草棚，窗子连玻璃都没有。冬天冷得直打哆嗦，他就披着破棉被继续看书。他心想：中国这么穷，就是因为我们科学落后。我一定要学好科学，让中国强大起来！", "1948年，邓稼先去了美国留学，只用了一年多就拿到了博士学位。那时候他才26岁，大家都说他前途无量，留在美国肯定能赚大钱。可就在他拿到博士学位的第9天，他登上了一艘轮船，头也不回地回到了新中国。同学们都惊呆了：你怎么回来了？", "回国后，邓稼先一头扎进了核物理研究。1958年，国家交给他一个绝密任务——造原子弹。他对妻子说：我要去做一件大事，以后可能很少回家了。妻子问：什么事？他摇摇头：不能说。从此，邓稼先的名字就从科学界消失了，连家人都不知道他在哪里。", "邓稼先带着一群年轻的科学家，在荒凉的戈壁滩上建起了研究基地。那里风沙漫天，喝的水都是苦的，住的是土坯房。没有计算机，他们就用算盘珠子一颗一颗地算，算盘打得噼里啪啦响，一天下来手指都磨肿了。邓稼先和大家同吃同住，从不搞特殊。", "1964年10月16日，中国第一颗原子弹在罗布泊爆炸成功！巨大的蘑菇云腾空而起，邓稼先激动得眼泪夺眶而出。但他没有庆祝，而是冲进爆炸现场收集数据。因为辐射太强，身体受到严重损伤。后来他又投入氢弹研究，只用了两年零八个月，氢弹也爆炸成功了！", "因为长期接触放射性物质，邓稼先的身体越来越差，最后患上了癌症。临终前，他对朋友说了一句让人泪目的话：我不后悔，如果有来生，我还选择去搞原子弹，让中国更强大。1986年，这位默默奉献了一辈子的科学家永远离开了我们，但他永远是我们心中的英雄。"], "muye": ["商朝末年，纣王荒淫残暴，整天和妃子们在酒池肉林里享乐，根本不管老百姓的死活。百姓们吃不饱穿不暖，还要被拉去修建豪华的宫殿，大家心里积满了怨气，却敢怒不敢言。", "西方的周部落却不一样，首领姬昌待人宽厚，关心百姓疾苦。他听说纣王的暴行后，长长叹了口气说：这样的君王，怎么配统治天下呢？他偷偷招揽贤才，发展生产，为推翻暴政做准备。", "姬昌去世后，他的儿子姬发——也就是周武王，继承了父亲的遗志。武王在姜子牙的辅佐下，联合了八百多个诸侯部落，在盟津举行誓师大会。各路诸侯群情激愤，纷纷表示：愿随武王讨伐暴君！", "公元前1046年，武王率领五万大军，浩浩荡荡地向商朝的首都朝歌进发。纣王听到消息，大吃一惊，但此时商朝的主力军队还在东边打仗，一时赶不回来。纣王只好把大批奴隶和俘虏临时编成军队，号称七十万人，开赴牧野迎战。", "牧野之战的战场上，两边军队对峙着。周武王的军队虽然人数少，但个个精神抖擞，战鼓声震天动地。而商军中的奴隶们早就对纣王恨之入骨，他们暗地里交换着眼神：咱们为什么要替暴君卖命？", "战斗刚一开始，让人意想不到的事情发生了——商军前排的奴隶们突然掉转矛头，朝着自己的后方冲杀过去！他们一边跑一边大喊：周武王是来救我们的！商军阵脚大乱，七十万大军瞬间土崩瓦解。", "纣王逃回朝歌城，登上鹿台，看着远处越来越近的周军，知道自己大势已去。他穿上最华丽的衣服，在鹿台上放了一把火，结束了自己的生命。商朝六百年的江山，就这样在烈火中化为灰烬。", "周武王进入朝歌后，打开粮仓救济百姓，释放了被纣王囚禁的大臣。百姓们夹道欢呼，迎接新君主的到来。从此，周朝建立了，历史翻开了新的一页。"], "jiawu": ["1894年，清朝和日本在海上爆发了一场大战，因为那年是甲午年，所以叫甲午海战。当时清朝有一支号称亚洲第一的北洋水师，装备了从德国买来的先进战舰，威风凛凛。", "北洋水师里有一位叫邓世昌的管带，他指挥着致远号巡洋舰。邓世昌从小在海边长大，十二岁就考入了福州船政学堂，学习航海技术。他常常对官兵们说：我们吃国家的俸禄，就要以死报国！", "9月17日那天，黄海海面上炮声隆隆，硝烟弥漫。日本舰队像一群恶狼一样扑了上来，北洋水师奋勇还击。战斗中，邓世昌的致远号表现得异常勇猛，炮弹一发接一发地射向敌舰。", "然而，敌人实在太多了。致远号被四艘日舰团团围住，炮弹像雨点般砸来，船身多处起火，甲板上满是弹片。邓世昌站在指挥台上，衣服被烧破了，脸上全是烟灰，但他的眼神依然坚定。", "眼看炮弹快打光了，邓世昌咬紧牙关，对全舰官兵大声说：弟兄们，我们弹尽粮绝了，但还有最后一招——撞沉吉野号！吉野号是日本最先进的军舰，如果能撞沉它，就能扭转战局！", "致远号开足马力，像一头发怒的雄狮，朝着吉野号猛冲过去。海面上画出一道白色的浪花，全舰官兵齐声高呼，气势如虹。日本水兵吓得惊慌失措，纷纷往海里跳。", "可惜，就在距离吉野号不到一百米的时候，一枚日军鱼雷击中了致远号的船底。随着一声巨响，致远号开始下沉。邓世昌落入海中，他的部下递给他一个救生圈，他却推开说：我立志以死报国，今天就是我的归宿！", "邓世昌沉入大海，和他心爱的战舰一起长眠在黄海深处。全舰二百多名官兵，无一生还。消息传回国内，全国百姓痛哭流涕，纷纷为这位民族英雄举行悼念活动。"], "wangmian": ["元代的时候，浙江诸暨有个叫王冕的穷孩子。他七岁那年，父亲去世了，家里穷得揭不开锅，母亲只好让他去给地主家放牛。每天天不亮，王冕就牵着牛出门，晚上才回来，累得倒头就睡。", "王冕特别羡慕那些能上学读书的孩子。每次路过学堂，听到里面传来朗朗的读书声，他就忍不住停下脚步，趴在窗户上偷偷听。有一次，他听得入了迷，忘了看牛，结果牛跑到田里把庄稼给踩坏了。", "地主气得破口大骂，还打了王冕一顿。王冕含着眼泪，心想：我什么时候才能像他们一样读书识字呢？他买不起书和纸笔，就用树枝在地上写字，用草棍当笔，把沙地当纸，一遍又一遍地练习。", "一个夏天的傍晚，王冕放牛来到湖边。忽然，天上的乌云散了，夕阳照在湖面上，满池的荷花在微风中轻轻摇摆，粉红的花瓣上挂着晶莹的水珠，美得像一幅画！王冕看呆了，心想：要是能把这美景画下来该多好！", "从那天起，王冕开始学画画。他买不起纸和颜料，就用树枝在地上画，用荷叶上的露珠调色。他每天对着荷花仔细观察：花瓣有多少片？花蕊是什么颜色？叶子上的纹路是怎样的？他画了又擦，擦了又画，手指都磨出了老茧。", "有一次下大雨，别人都往屋里跑，王冕却撑着破伞蹲在湖边，一动不动地看雨中的荷花。雨水打在他的脸上，顺着脖子往下流，他浑然不觉。母亲心疼地说：这孩子，画画都画痴了！", "就这样日复一日，年复一年，王冕的画技越来越精湛。他画的荷花简直像真的一样，连蜜蜂都飞过来想采蜜！人们纷纷来买他的画，王冕终于靠画画赚了钱，买来了书本和笔墨，实现了读书的梦想。", "后来，王冕成了元代最著名的画家和诗人，他画的墨梅尤其出名。皇帝想请他去做官，他却拒绝了，宁愿隐居在山林里，一边种田一边画画。他留下一句名言：不要人夸好颜色，只留清气满乾坤。"], "napolun": ["1769年，拿破仑出生在法国科西嘉岛上一个小贵族家庭。他小时候个子矮矮的，说话带着浓重的口音，经常被其他孩子嘲笑。但拿破仑可不在乎，他整天埋头读书，尤其喜欢读军事和历史方面的书，脑子里装满了各种作战策略。", "九岁那年，拿破仑被送到法国本土的军校读书。在学校里，同学们都欺负他，叫他矮个子科西嘉人。拿破仑气得攥紧拳头，暗暗发誓：总有一天，我会让你们刮目相看！他更加刻苦地学习，各门功课都名列前茅。", "十六岁那年，拿破仑从军校毕业，成了一名炮兵少尉。他整天和大炮待在一起，研究炮弹的飞行轨迹、火药的最佳配比。别人休息的时候，他还在写写算算，把大炮的射程和角度算得清清楚楚，误差不超过一厘米。", "机会终于来了！1793年，法国南部的土伦港被英国军队占领了。上级派拿破仑去收复土伦。拿破仑仔细观察了地形，发现只要占领一个小炮台，就能用大炮轰击英国舰队。他亲自指挥炮兵，一炮就命中了英军的弹药库，轰的一声巨响，英军吓得屁滚尿流，连夜逃跑了。", "这一仗让拿破仑一战成名，二十四岁就当上了将军！消息传遍法国，士兵们都敬佩地称他为小个子将军。拿破仑后来带领军队南征北战，打了一个又一个胜仗，几乎征服了整个欧洲。", "1804年，拿破仑在巴黎圣母院加冕称帝。他接过皇冠，没有让教皇给他戴上，而是自己把皇冠高高举过头顶，然后稳稳地戴在头上。这个举动告诉全世界：我的皇位是我自己挣来的！", "然而，成功让拿破仑变得越来越骄傲。1812年，他贸然进攻俄国，六十万大军浩浩荡荡地开进冰天雪地的俄罗斯。结果俄军采取了坚壁清野的战术，把能烧的都烧了，能搬的都搬走了。法军又冷又饿，冻死冻伤无数，最后只有两万多人活着回来。", "1815年，拿破仑在滑铁卢战役中彻底失败，被流放到大西洋上的圣赫勒拿岛。他在岛上度过了生命最后的六年，1821年因病去世。但他留下的《拿破仑法典》至今仍是许多国家法律的蓝本，他的故事也激励着无数人去追求梦想。"], "fangao": ["1853年，文森特·梵高出生在荷兰一个牧师家庭。他从小性格内向，不爱说话，却特别喜欢大自然。他常常一个人跑到田野里，蹲在花丛边看蝴蝶飞舞，躺在地上看云朵飘过，一看就是大半天。", "梵高长大后做过很多工作：在画店里卖过画，在学校里教过书，还去矿区当过传教士。他看到矿工们生活得那么辛苦，就把自己的衣服和食物都分给他们，自己却饿得面黄肌瘦。老板觉得他太奇怪了，把他开除了。", "二十七岁那年，梵高终于决定：我要当画家！他拿起画笔，开始疯狂地画画。他没有钱请模特，就画自己，对着镜子画了一幅又一幅自画像。他画农民、画田野、画星空，把所有的热情都倾注在画布上。", "梵高画得最快的画叫《向日葵》。他租了一间小黄房子，买了十二把椅子，专门等着好朋友高更来做客。为了迎接高更，他画了一幅又一幅向日葵，金灿灿的花朵在蓝色的背景上怒放，像是在燃烧。", "可是，梵高的画在当时根本没人买。他穷得连饭都吃不上，颜料也买不起，只能靠弟弟提奥每月寄来的钱维持生活。邻居们觉得他疯疯癫癫的，小孩们跟在他后面喊疯子。", "梵高心里很难过，但他从不停下画笔。他跑到法国南部的阿尔勒，那里阳光灿烂，色彩绚烂。他站在麦田里，顶着烈日画画，画麦浪、画星空、画咖啡馆。他说：我想用画让人感受到温暖，就像向日葵永远向着太阳。", "梵高在生命的最后十年里，创作了两千多幅作品，平均每两天就画一幅！可惜他生前只卖出去过一幅画。1890年七月的一个夜晚，梵高在麦田里画完最后一幅画，开枪结束了自己三十七岁的生命。", "他去世后，弟弟提奥也因悲伤过度，半年后追随他而去。但梵高的画作渐渐被人们发现，成为世界上最珍贵的艺术品。《向日葵》在拍卖会上拍出了近四亿人民币的天价！可惜梵高再也看不到了，但他用生命画出的向日葵，永远在阳光下绽放。"], "xiaowen": ["南北朝时期，北方有一个强大的王朝叫北魏，他们是鲜卑族建立的。北魏的皇帝叫拓跋宏，也就是历史上著名的孝文帝。他五岁就当了皇帝，从小在汉族老师的教导下长大，对汉文化特别着迷。", "孝文帝十九岁那年，决定干一件大事——把首都从偏远的平城迁到中原的洛阳。他为什么非要迁都呢？因为平城太冷了，又远离中原文化中心，很难推行改革。", "可是大臣们一听要搬家，纷纷反对：我们在平城住了好几代了，凭什么说搬就搬？孝文帝知道直接说迁都大家肯定不答应，就想了个妙计。他假装要带兵南征，率领三十万大军浩浩荡荡南下。", "走到洛阳的时候，天降大雨，道路泥泞不堪，士兵们又累又冷，叫苦连天。大臣们赶紧拦住孝文帝的马，跪在地上说：陛下，雨太大了，我们走不动了！孝文帝皱着眉头说：既然你们不想南征，那就把首都迁到洛阳吧！大臣们这才恍然大悟，原来皇帝是在耍心眼呢！", "迁都之后，孝文帝开始大刀阔斧地改革。他下令：所有鲜卑人都必须穿汉族的衣服，说汉语，和汉族通婚。他还把鲜卑人的姓氏也改成了汉姓，自己的姓拓跋改成了元，所以也叫元宏。", "为了推行改革，孝文帝自己带头穿上了汉族的龙袍。有一次上朝，他看见还有大臣穿着鲜卑族的窄袖胡服，立刻板起脸说：你难道没接到命令吗？回去换衣服！吓得那个大臣连滚带爬地跑了出去。", "改革遇到了很多阻力，王公贵族们背地里骂他：皇帝忘了本！太子拓跋恂甚至偷偷跑回平城，企图发动叛乱。孝文帝流着眼泪把太子废掉了，说：为了改革，我连儿子都可以不要！", "在孝文帝的坚持下，北魏逐渐强大起来，洛阳成了当时世界上最繁华的城市之一。鲜卑族和汉族融合在一起，共同创造了灿烂的中华文明。孝文帝的改革告诉我们：勇于学习先进文化，才能不断进步！"], "tumubao": ["明朝正统年间，北方的瓦剌部落日益强大，经常来骚扰边境。二十出头的明英宗朱祁镇年轻气盛，一心想要像祖先那样建功立业，让敌人闻风丧胆。", "这时候，明朝有个大太监叫王振，很受英宗信任。王振没什么真本事，却总想出风头，他怂恿英宗说：陛下，瓦剌那帮小贼竟敢欺负我们，不如您御驾亲征，把他们打得落花流水！英宗一听，热血沸腾，当即决定出征。", "大臣们听说皇帝要亲征，纷纷跪在大殿上劝阻：陛下，打仗可不是儿戏！大军未动，粮草先行，现在什么都没准备，怎么能贸然出兵呢？可英宗已经被王振说得飘飘然了，谁的话都听不进去。", "英宗两天之内召集了二十万大军，仓促上路。由于准备不足，军队走了没几天就断粮了，士兵们饿着肚子，怨声载道。更糟糕的是，天公不作美，接连下了好几天大雨，道路泥泞，行军异常艰难。", "大军一路跌跌撞撞地走到大同，王振听说瓦剌军队已经逼近，吓得脸色发白，赶紧劝英宗撤退。英宗也害怕了，连忙下令往回走。王振想趁机炫耀自己，非要绕道经过他的家乡蔚州，结果白白耽误了时间，被瓦剌骑兵追了上来。", "明军退到土木堡时，王振又犯了糊涂。他让大军在离水源很远的地方扎营，结果被瓦剌军队团团围住。明军又渴又累，战斗力大减，瓦剌军队趁机发动进攻，明军兵败如山倒。", "混战中，英宗身边的护卫纷纷倒下，他坐在马车上不知所措。瓦剌士兵冲上来，一把抓住英宗的衣袖，喊道：这是个当官的，抓活的！就这样，堂堂大明天子成了俘虏，被带到了瓦剌大营。", "消息传到北京，朝廷一片混乱。幸亏有大臣于谦挺身而出，组织了北京保卫战，瓦剌见捞不到好处，只好把英宗放了回来。这次惨痛的教训让明朝上下深刻认识到：做事不能冲动，一定要三思而后行！"], "wangwei": ["唐代出了个了不起的大才子叫王维，他九岁就会写诗，十五岁就离开家乡到长安闯荡。小小年纪的王维站在长安城门前，看着巍峨的城墙，心里又激动又紧张，他暗暗给自己打气：我一定要在这里闯出名堂！", "王维不仅会写诗，还精通音乐和绘画。有一次，有人拿了一幅画请他看，画上是一群乐师在演奏。王维只看了一眼就笑着说：这画的是《霓裳羽衣曲》第三叠第一拍。大家不信，找来乐师现场演奏，果然分毫不差！从此，大家都叫他诗画双绝。", "二十一岁那年，王维考中了状元，被派到朝廷做官。可是官场上的事情太复杂了，正直的王维不愿意讨好那些有权有势的人，结果得罪了宰相，被贬到了偏远的凉州。", "王维骑着马，孤零零地走在去凉州的路上。大漠黄沙漫天，夕阳把天空染成了血红色。他望着辽阔的戈壁滩，心中感慨万千，写下了千古名句：大漠孤烟直，长河落日圆。这十个字，把大西北的苍凉壮美写得淋漓尽致！", "后来又发生了一场大叛乱，安禄山的军队攻陷了长安，王维被叛军抓住了。叛军逼他做官，王维不愿意，就偷偷吃了一种药，让自己嗓子哑得说不出话来。可叛军还是不放过他，把他关在一座寺庙里软禁起来。", "在寺庙里，王维写下了万户伤心生野烟，百僚何日再朝天的诗句，表达了对国家的思念。他每天对着墙壁作画，把心中的郁闷都化作了笔下的山水。据说他画的石头能让人感觉冰凉，画的流水好像能听到声响。", "叛乱平定后，王维因为曾经被迫在叛军手下做过事，差点被治罪。幸好他弟弟王缙拼死求情，再加上朋友们作证说他是被迫的，才保住了性命。王维对官场彻底失望了，从此隐居在终南山的辋川别业里。", "王维在山里过着悠闲的生活，写诗画画，参禅悟道。他诗中的行到水穷处，坐看云起时流传至今，成了无数人追求的人生境界。王维去世后，人们称他为诗佛，他的诗和画一样，都是中国文化的瑰宝。"], "linken": ["1809年，亚伯拉罕·林肯出生在美国肯塔基州一个穷苦的农民家庭。他家住的是四面透风的小木屋，晚上睡觉时能透过木板缝看到天上的星星。母亲在他九岁那年就去世了，小林肯伤心极了。", "林肯只上过不到一年的学，但他特别爱读书。家里没有书，他就到处去借，有时候要走几十里路去借一本书。他借到书后如获至宝，晚上在昏暗的油灯下一遍又一遍地读，直到把书的内容都背下来。", "林肯长大后，当过伐木工、店员、邮递员，什么苦活累活都干过。他干活的时候口袋里总揣着一本书，休息的时候就拿出来读。有一次，他给别人砍木头，砍了一整天累得腰都直不起来了，晚上却还在借来的烛光下读《华盛顿传》。", "林肯通过自学，考取了律师资格证，成了一名律师。他为人正直，帮穷人打官司从来不收钱。有一次，一个穷苦的黑人妇女来找他，说她女儿被奴隶贩子抓走了。林肯听完后，眼睛里闪着泪光，他握紧拳头说：奴隶制是世界上最邪恶的制度，我一定要改变它！", "1860年，林肯当选为美国总统。这个消息一传开，南方那些靠奴隶种地的庄园主们急得跳脚，纷纷宣布脱离联邦，南北战争爆发了！林肯面临着建国以来最大的危机。", "战争初期，北方军队节节败退。林肯愁得整夜睡不着觉，头发都白了一大片。但他没有退缩，1863年1月1日，他正式签署了《解放黑人奴隶宣言》，宣布所有奴隶都获得自由！消息传开后，黑人们纷纷加入北方军队，为自由而战。", "在著名的葛底斯堡战役后，林肯发表了一篇只有两分钟的演讲，却成了美国历史上最伟大的演讲之一。他说：我们要让这个由人民、选人民、为人民服务的政府，永远不能从地球上消失。在场的许多人感动得热泪盈眶。", "战争胜利了，奴隶制度被废除了。可是1865年4月14日晚上，林肯在华盛顿的福特剧院看戏时，被一个奴隶制的支持者刺杀了。第二天早上，林肯永远闭上了眼睛，全国人民陷入了巨大的悲痛之中。他留给世界最宝贵的遗产就是：人人生而平等。"], "tesila": ["1856年，尼古拉·特斯拉出生在克罗地亚一个塞尔维亚家庭。他小时候是个特别古怪的孩子，脑子里总有各种奇奇怪怪的念头。他能在脑海中想象出一台完整的机器，每一个零件都清清楚楚，就像真的在眼前一样。", "特斯拉十七岁那年，得了可怕的霍乱，在床上躺了九个月，差点死掉。父亲为了鼓励他，答应他病好后送他去最好的工学院读书。特斯拉听了这话，眼睛里突然有了光，他咬紧牙关，奇迹般地活了下来。", "大学毕业后，特斯拉来到巴黎，在一家电话公司工作。他设计了一种新型的发电机，老板很满意，说：小伙子，你很有前途！可特斯拉却做了一个让所有人都吃惊的决定——他要去美国，去找当时最伟大的发明家爱迪生。", "1884年，特斯拉带着仅有的四分钱硬币，登上了开往美国的轮船。他找到爱迪生，爱迪生让他修理一台出了故障的发电机。特斯拉只花了一天时间就把机器修好了，爱迪生惊讶地张大了嘴巴：你真是个天才！", "可是，两个天才很快就闹翻了。爱迪生坚持用直流电，而特斯拉发明了更安全、更高效的交流电。爱迪生为了证明交流电危险，竟然用交流电电死了一头大象！特斯拉却坚信自己的发明是对的，他说：交流电能照亮整个世界！", "特斯拉的交流电系统最终赢得了胜利，被用来建造尼亚加拉大瀑布水电站，点亮了整个纽约城。更让人敬佩的是，特斯拉没有申请专利收钱，而是把交流电的专利无偿送给了全世界。他说：如果这是为了全人类的利益，那么它就不该属于我一个人。", "特斯拉一生发明了无数东西：无线电遥控器、荧光灯、特斯拉线圈……他甚至早在手机出现之前一百年就设想出了无线通信！他每天只睡两个小时，其他时间都在实验室里工作，像一个不知疲倦的机器人。", "晚年的特斯拉却穷困潦倒，孤独地住在纽约一家小旅馆里，靠赊账过日子。1943年，八十六岁的特斯拉在房间里安静地去世了。他死后，人们才发现他留下了一大堆超前百年的发明手稿。今天，我们用的每一度电里，都有特斯拉的功劳！"], "wusi": ["1919年，第一次世界大战结束了。中国作为战胜国之一，派代表参加了在巴黎召开的和平会议。大家本以为可以收回被德国占领的山东，没想到会议竟然决定把山东的权益转让给日本！消息传回国内，全国人民都气炸了。", "5月3日晚上，北京大学的学生们聚集在一间大教室里，情绪激动得像一团火。一个叫谢绍敏的学生跳上讲台，咬破手指，用鲜血在白布上写下了还我青岛四个大字！同学们群情激昂，决定第二天上街游行抗议。", "5月4日，天气晴朗。下午一点，北京十几所学校的三千多名学生，举着各色旗帜和标语，浩浩荡荡地向天安门广场进发。他们一路高喊着口号：外争主权，内除国贼！取消二十一条！还我青岛！", "游行队伍来到东交民巷外国使馆区，却被警察拦住了。学生们愤怒地转向赵家楼——那里住着亲日派官员曹汝霖。大家冲进曹宅，却找不到曹汝霖，一气之下放火烧了赵家楼。北洋政府派来大批军警，抓走了三十二名学生。", "被抓的学生们被关在警察局里，但他们一点都不害怕。一个叫许德珩的学生在牢房里用铅笔写诗：为雪心头恨，而今作楚囚。其他学生也跟着唱起了歌，歌声从牢房里传出来，反而激励了更多人的斗志。", "全国各地纷纷响应，上海的学生罢课、工人罢工、商人罢市，整个中国都沸腾了！大街上到处是抗议的人群，工厂的烟囱不再冒烟，商店的大门紧紧关闭。北洋政府这才慌了手脚，不得不释放了被捕的学生。", "6月28日，中国代表最终拒绝在巴黎和约上签字，这是中国近代史上第一次对列强说不！消息传来，全国人民欢呼雀跃，北京的大街小巷响起了鞭炮声。", "五四运动就像一声春雷，唤醒了沉睡的中华民族。从此，中国的青年一代开始勇敢地站出来，为国家的命运而奋斗。这场运动也催生了新文化运动，白话文开始流行，科学和民主的思想传遍了中国大地。"], "changcheng": ["秦始皇统一六国后，北方的匈奴人经常骑着快马南下抢劫，抢粮食、抢牲口、抢人，边境的百姓苦不堪言。秦始皇坐在龙椅上，皱着眉头说：这群草原上的狼，非要想个办法挡住他们不可！", "丞相李斯建议说：陛下，不如把原来各国修的城墙连起来，再往西边延伸，建一道坚固的防线。这样匈奴人的骑兵就过不来了！秦始皇一听，拍案叫绝：好！就这么办！", "修长城的命令一下，全国立刻忙了起来。秦始皇派大将蒙恬率领三十万大军，又征调了上百万的民夫。命令传达到每个村庄：每家每户，十八岁以上五十岁以下的男子，全部去修长城！", "有一个叫范喜良的年轻人，刚娶了媳妇孟姜女没几天，就被抓去修长城了。孟姜女站在村口，看着丈夫被官兵带走，眼泪止不住地往下流。她怎么也没想到，这一别就是永别。", "修长城的条件极其艰苦。民夫们被赶到荒山野岭，从早到晚地搬石头、砌城墙，吃不饱穿不暖，还要挨监工的鞭子。很多人累倒了，再也爬不起来。传说修长城的人太多，有些地段甚至是用白骨垒起来的！", "长城蜿蜒曲折，翻过崇山峻岭，穿过茫茫戈壁，从东边的山海关一直修到西边的嘉峪关，全长一万多里！修长城的那些年，无数家庭失去了丈夫和父亲，路边经常能听到孤儿寡母的哭声。", "但长城确实起到了防御作用。匈奴人骑着马来到长城脚下，抬头一看，一道高墙像巨龙一样横在面前，怎么也翻不过去。他们只好摇摇头，调转马头走了。边境的百姓终于过上了安稳的日子。", "两千多年过去了，长城依然屹立在中国的土地上，成了世界八大奇迹之一。从太空看地球，长城是唯一能用肉眼看到的人造建筑。每当我们登上长城，摸着一块块古老的砖石，仿佛能听到千百年前修城人的呐喊声和号子声。"], "dumu": ["晚唐时期，京兆出了个神童叫杜牧。他十三岁就能写一手好文章，尤其喜欢研究兵法，还专门为《孙子兵法》写过注解。他爷爷是宰相，家里藏书万卷，杜牧整天泡在书堆里，像一块海绵一样吸收着各种知识。", "二十三岁那年，杜牧考中了进士，兴高采烈地准备大干一场。他写了一篇《阿房宫赋》，文章气势磅礴，其中秦人不暇自哀而后人哀之，后人哀之而不鉴之亦使后人而复哀后人的句子，连宰相读后都拍案叫绝。", "然而，晚唐的朝廷已经腐败不堪，到处是拉帮结派、勾心斗角。正直的杜牧不愿意同流合污，结果被排挤到了外地做官。他先是被派到江西，后来又辗转到扬州。", "扬州是当时最繁华的城市，大街上车水马龙，夜市里灯火通明。杜牧白天在衙门里处理公务，晚上就独自一人到街上漫步。他走在二十四桥边，看着月亮倒映在运河的水面上，忍不住写下了青山隐隐水迢迢，秋尽江南草未凋的诗句。", "在扬州的日子，杜牧表面上看很潇洒，整天游山玩水、饮酒作诗。可他的内心其实很苦闷，他觉得自己空有一身才华，却只能当个无所作为的小官。他写道：十年一觉扬州梦，赢得青楼薄幸名。", "四十岁那年，杜牧被调回京城，担任了史馆修撰，负责编写历史。他非常重视这个工作，认认真真地查阅资料，一丝不苟地记录历史。他说：写历史要对得起后人，不能说假话。", "晚年的杜牧越来越消极，他看透了官场的黑暗，开始整理自己的诗文集。他把从少年时代到现在的诗作一篇篇地翻出来，删掉了不满意的，留下了两百多首。他叹了口气说：希望后人能通过这些诗，认识一个真实的杜牧。", "公元852年，杜牧在病中去世，享年五十岁。他留下的诗作清丽俊逸，和李白的诗、杜甫的诗、李商隐的诗并称为唐代诗歌的巅峰。每当我们读到停车坐爱枫林晚，霜叶红于二月花时，眼前就会浮现出那个在夕阳下欣赏红叶的诗人身影。"], "shashibiya": ["1564年，莎士比亚出生在英国埃文河畔的斯特拉特福镇。他的父亲是个手套匠，母亲是个农民的女儿。小莎士比亚经常骑在父亲店铺的柜台上，好奇地看着来来往往的人群，心里琢磨着每个人背后都有什么故事。", "莎士比亚七岁进了当地的文法学校，学习拉丁文和诗歌。他特别喜欢看戏，每当有剧团来镇上演出，他总是第一个跑去占位置，蹲在舞台前面，眼睛一眨不眨地盯着演员们。回到家后，他就把看到的剧情讲给弟弟妹妹听，还加上自己的想象。", "十四岁那年，家里破产了，莎士比亚不得不辍学回家帮忙。他年纪轻轻就开始打工，教过书、当过律师的书记员，什么杂活都干。但他一直没有放弃对戏剧的热爱，晚上躲在被窝里点着蜡烛偷偷写剧本。", "二十二岁那年，莎士比亚告别了妻子和三个孩子，独自一人来到伦敦闯荡。他先是在剧院里给来看戏的有钱人看马，后来在后台打杂，帮忙搬道具、提词。他什么苦活累活都干，就为了偷偷学习舞台上的每一个细节。", "机会终于来了！有一次，剧团的一个演员突然生病了，莎士比亚被临时拉上去救场。他上台后一点儿也不紧张，把台词念得声情并茂，观众们热烈地鼓掌。从此，他正式成了一名演员，也开始修改剧本，他的才华渐渐被人发现。", "莎士比亚的剧本和别人的不一样，他写的人物有血有肉，就像活生生站在你面前一样。他写的《罗密欧与朱丽叶》让无数人感动落泪，《哈姆雷特》中的生存还是毁灭成了千古名句，连女王伊丽莎白一世都成了他的粉丝。", "莎士比亚不仅会写悲剧，还写了很多喜剧。《威尼斯商人》里的聪明女律师、《仲夏夜之梦》中的精灵，都让人捧腹大笑。他一生写了三十七部戏剧、一百五十四首十四行诗，成了英国文学史上最耀眼的明星。", "1616年，五十二岁的莎士比亚在故乡去世。他留下的最后一句话是：上帝保佑你们。四百年过去了，他的作品仍然在被全世界各地的人们阅读和演出。他的故事告诉我们：没有上过大学，也可以成为最伟大的作家！"], "gandi": ["1869年，甘地出生在印度一个普通的家庭。他小时候特别害羞，胆小怕事，连和陌生人说话都会脸红。有一次，学校老师让他抄写单词，他抄错了，老师踢了他一脚，他吓得跑回家哭了半天。", "十九岁那年，甘地坐船去英国伦敦学习法律。到了英国后，他发现自己什么都不懂，不会用刀叉吃饭，不会穿西装，同学们都笑话他。但甘地咬牙坚持，努力学习英国的法律和文化，通过了律师资格考试。", "从英国回来后，甘地去了南非当律师。在那里，他亲眼看到印度人受到多么不公平的待遇：不能坐头等车厢，不能进白人教堂，连走路都要给白人让道。有一次，他买了头等车厢的车票，却被一个白人乘客赶下了火车。", "甘地坐在冰冷的火车站台上，冻得瑟瑟发抖，但心里却燃起了一团火。他下定决心：一定要改变这种不公平！他没有暴跳如雷，而是开始组织印度人进行和平抗议，用法律来维护自己的权利。", "回到印度后，甘地发现同胞们正被英国殖民者压迫着。英国人控制了印度的盐，印度人连自己海边的盐都不能采。甘地决定带领人民进行食盐进军——他要步行到海边，自己动手晒盐！", "1930年3月12日，六十岁的甘地拄着一根竹杖，带着七十八名追随者，开始了长达三百多公里的步行。一路上，越来越多的人加入他们，队伍像滚雪球一样，到海边时已经达到了好几万人！甘地弯腰捧起一把海盐，微笑着说：我们终于自由了！", "英国殖民当局气急败坏，把甘地抓进了监狱。但甘地在监狱里也不老实，他绝食抗议，用自己的身体作武器。英国首相没办法，只好把他放了。甘地的非暴力不合作思想像星星之火，点燃了整个印度。", "1947年，印度终于独立了！可惜，第二年甘地就被一个极端分子刺杀，永远离开了他的祖国。他穿着自己纺的粗布衣服，安详地倒在血泊中。他留给世界最宝贵的财富是：用爱和和平，也能战胜一切仇恨和暴力。"]};;;;;;;;;;;
const IMG_BASE='img/';
const PAGE_SIZE=20;
let currentFilter='全部';
let currentView='grid';
let displayCount=PAGE_SIZE;
let filteredData=[];
function getImgPath(k,i){return IMG_BASE+k+'_'+i+'.jpg'}
function formatDate(s){const d=new Date(s);const w=['日','一','二','三','四','五','六'];return(d.getMonth()+1)+'月'+d.getDate()+'日 周'+w[d.getDay()]}
function updateFilteredData(){filteredData=currentFilter==='全部'?D:D.filter(i=>i.c===currentFilter);}
function renderHome(){
  updateFilteredData();
  const c=document.getElementById('storiesContainer');
  const showing=filteredData.slice(0,displayCount);
  const g={};
  for(const i of showing){const d=i.d||'?';if(!g[d])g[d]=[];g[d].push(i)}
  const dates=Object.keys(g).sort((a,b)=>b.localeCompare(a));
  let h='';
  for(const d of dates){
    const items=g[d];
    h+='<div class="date-section"><div class="date-header"><span class="date-dot"></span>'+formatDate(d)+'<span class="date-count">('+items.length+'则)</span></div>';
    if(currentView==='grid'){
      h+='<div class="stories-grid grid-view">';
      for(const i of items){const t=i.t,k=i.k,src=getImgPath(k,0);
        h+='<div class="story-card" onclick="showStory(\''+t.replace(/'/g,"\\'")+'\')"><img class="card-img" src="'+src+'" alt="'+t+'" loading="lazy" onerror="this.style.background=\'var(--primary-light)\'"><div class="card-content"><h3 class="card-title">'+t+'</h3><div class="card-meta"><span>'+i.e+'</span><span class="card-tag">'+i.c+'</span></div></div></div>'}
      h+='</div>';
    }else{
      h+='<div class="stories-list list-view">';
      for(const i of items){const t=i.t,k=i.k,src=getImgPath(k,0);
        h+='<div class="story-card" onclick="showStory(\''+t.replace(/'/g,"\\'")+'\')"><img class="card-img" src="'+src+'" alt="'+t+'" loading="lazy" onerror="this.style.background=\'var(--primary-light)\'"><div class="card-content"><div class="card-title">'+t+'</div><div class="card-meta"><span>'+i.e+'</span><span class="card-tag">'+i.c+'</span></div></div></div>'}
      h+='</div>';
    }
    h+='</div>';
  }
  const hasMore=displayCount<filteredData.length;
  h+='<div class="load-more-wrap">';
  if(hasMore){h+='<button class="load-more-btn" onclick="loadMore()">加载更多</button>';h+='<div class="story-counter">已显示 '+displayCount+' / '+filteredData.length+' 则</div>'}
  else{h+='<div class="story-counter">共 '+filteredData.length+' 则故事</div>'}
  h+='</div>';
  c.innerHTML=h;
}
function loadMore(){displayCount+=PAGE_SIZE;renderHome();}
function showStory(title){
  const item=D.find(d=>d.t===title);if(!item)return;
  const ps=P[item.k]||[];const k=item.k;
  let h='<div class="story-header"><h1 class="story-title">'+title+'</h1><p class="story-era">'+item.e+'</p></div>';
  for(let i=0;i<ps.length;i++){
    h+='<img class="story-img" src="'+getImgPath(k,i)+'" alt="插图'+(i+1)+'" loading="lazy" onerror="this.style.display=\'none\'">';
    h+='<p class="story-paragraph">'+ps[i]+'</p>';
  }
  if(item.m){h+='<div class="moral-card"><div class="moral-title">💡 小道理</div><p class="moral-text">'+item.m+'</p></div>'}
  document.getElementById('storyContent').innerHTML=h;
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('storyPage').classList.add('active');
  window.scrollTo(0,0);
}
function goHome(){
  document.getElementById('storyPage').classList.remove('active');
  document.getElementById('homePage').classList.remove('hidden');
  window.scrollTo(0,0);
}
function filterStories(f){
  currentFilter=f;displayCount=PAGE_SIZE;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');renderHome();
}
function setView(v){
  currentView=v;
  document.getElementById('gridBtn').classList.toggle('active',v==='grid');
  document.getElementById('listBtn').classList.toggle('active',v==='list');
  renderHome();
}
renderHome();
</script>
</body>
</html>
