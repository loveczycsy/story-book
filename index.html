之内作出一首诗，作不出来，就治你的死罪！", "在场的大臣们都倒吸了一口凉气：七步作一首诗，这怎么可能？大家都为曹植捏了一把汗。可是曹植却一点也不慌张，他低着头，一边走一边想。", "一步、两步、三步……曹植慢慢走着，刚走到第七步，他就停下脚步，大声吟诵起来：\"煮豆持作羹，漉菽以为汁。萁在釜下燃，豆在釜中泣。本自同根生，相煎何太急？\"", "这首诗的意思是：煮豆子的时候，豆秸在锅底下燃烧，豆子在锅里面哭泣。我们本来是同一条根上长出来的，为什么要这么急切地互相迫害呢？曹丕听了，脸一下子红了。", "他想起了小时候和弟弟一起读书玩耍的日子，心里很惭愧。于是他放过了曹植，只是把他贬到了外地。\"七步成诗\"的故事就这样流传了下来。它告诉我们：平时多读书多积累，关键时刻就能展现出才华；同时也要珍惜兄弟情谊，不要手足相残。"], "zaobitouguang": ["西汉时候，有个叫匡衡的孩子。他特别喜欢读书，可是家里很穷，连买蜡烛的钱都没有。白天他要帮家里干活，只有晚上才有时间读书，可是没有灯怎么读呢？", "匡衡的邻居家很有钱，每天晚上都点着蜡烛，屋子里亮堂堂的。可是匡衡家和邻居家中间隔着一堵墙，光亮照不过来。小匡衡盯着那堵墙，心想：要是能有一点光就好了。", "突然，他想到了一个好办法！他拿起一把小凿子，在墙上轻轻地凿呀凿。凿了好久好久，终于在墙上凿出了一个小小的洞。", "哇！一道光亮从洞里透了过来！匡衡高兴极了，赶紧把书凑到洞口，借着这一点点光读了起来。虽然光线很暗，但是匡衡已经很满足了。", "从那以后，每天晚上匡衡都靠在墙上，借着邻居家透过来的光读书。他读了一本又一本，常常读到深夜，有时候读得太入迷，连邻居家熄灯了都不知道。", "可是书不够读啊！匡衡听说村里有个大户人家有很多书，就跑去对主人说：我愿意给您家干活，不要工钱，只求您能把书借给我读。主人很感动，就答应了他的请求。", "匡衡就这样一边干活一边读书，读的书越来越多，学问也越来越大。后来他成了西汉著名的大学问家，还当上了丞相。\"凿壁偷光\"的故事告诉我们：只要有一颗爱学习的心，再大的困难也能克服。贫穷不是不努力的借口，刻苦学习终会有回报！"], "zhugeliang": ["三国时期，有个叫诸葛亮的人，他是中国历史上最聪明的人之一。他从小就失去了父母，跟着叔叔生活。诸葛亮特别爱读书，不管是天文地理还是兵法历史，他都读得津津有味。", "诸葛亮长大后，隐居在南阳的卧龙岗，一边种田一边读书。虽然他住在乡下，但是他对天下大事了如指掌，大家都叫他\"卧龙先生\"，意思是藏在山里的一条龙。", "那时候刘备正在打天下，他听说诸葛亮很厉害，就亲自去请他出山。第一次去，诸葛亮不在家；第二次去，诸葛亮出门了；第三次去，诸葛亮正在午睡。刘备就站在门口等，一直等到诸葛亮醒来。", "诸葛亮被刘备的诚意打动了，就决定帮助刘备。他给刘备分析了天下形势，制定了三分天下的计划。刘备听了高兴极了，说：我得到诸葛亮，就像鱼儿得到了水一样！", "诸葛亮果然厉害！他用草船借箭，不费吹灰之力就从曹操那里\"借\"来了十万支箭；他用空城计，坐在城楼上弹琴，就吓退了司马懿的十五万大军；他还发明了木牛流马，运送粮草特别方便。", "诸葛亮不仅聪明，还特别忠心。刘备去世后，把儿子刘禅托付给诸葛亮。诸葛亮尽心尽力地辅佐刘禅，每天都工作到很晚，大小事情都亲自处理，从来没有偷懒过。", "为了完成刘备统一国家的愿望，诸葛亮好几次带兵北伐。可是因为太辛苦了，他在五丈原的军营里生病了，最后永远地闭上了眼睛。去世前，他还在为军队的撤退做安排。", "诸葛亮的故事流传了一千多年，人们都很敬佩他的智慧和忠诚。他写的《出师表》感动了无数人，\"鞠躬尽瘁，死而后已\"这八个字，就是他一生的写照。诸葛亮的故事告诉我们：真正的聪明来自于勤奋学习和不断思考，知识就是力量！"], "dufu": ["唐朝有个伟大的诗人叫杜甫。他和李白是好朋友，两个人都特别会写诗，李白被称为\"诗仙\"，杜甫被称为\"诗圣\"。杜甫的诗特别真实，就像照相机一样，记录了唐朝由盛转衰的历史。", "杜甫小的时候特别聪明，七岁就能写诗了。他读书特别用功，\"读书破万卷，下笔如有神\"就是他说的。意思是书读得多了，写起文章来就像有神仙帮忙一样。", "年轻的时候，杜甫也想像李白一样到处游历，过自由自在的生活。他爬过泰山，写下了\"会当凌绝顶，一览众山小\"的名句。那时候的杜甫，对未来充满了希望。", "可是后来，杜甫参加科举考试没考上，在长安住了十年，日子过得越来越穷。他看到了很多老百姓的苦难生活，心里特别难过。他写了很多诗，记录下老百姓的悲惨遭遇。", "安史之乱爆发了，战争让老百姓流离失所。杜甫亲眼看见官兵抓壮丁，连老人和孩子都不放过。他含着眼泪写下了《三吏》《三别》，把战争的残酷和人民的痛苦都写进了诗里。", "杜甫自己的日子也很苦。他在成都盖了一间茅草屋，有一天刮大风，把屋顶的茅草都吹走了。他又冷又饿，可是他想到的不是自己，而是天下所有受苦的读书人。", "他大声说：\"安得广厦千万间，大庇天下寒士俱欢颜！\"意思是：怎么才能得到千万间宽敞的大房子，让天下所有穷苦的读书人都能开开心心地住进去呢？哪怕只有我的房子破了，我冻死也心甘情愿！", "杜甫的一生很坎坷，经常吃不饱穿不暖，可是他心里始终装着国家和人民。他的诗被称为\"诗史\"，因为每一首都真实地记录了那个时代。杜甫的故事告诉我们：真正伟大的人，心里装着别人。这种善良和大爱，会永远被人们记住。"], "gaoshanliushui": ["春秋时期，有个叫伯牙的人，他弹琴弹得特别好，是当时最有名的琴师。可是伯牙心里总是有点孤单，因为他觉得没有人能真正听懂他的琴声。", "有一天，伯牙乘着小船去游玩，走到半路突然下起了大雨，他就把船停在山边避雨。听着哗啦啦的雨声和哗哗的流水声，伯牙心里特别有感觉，就拿出琴弹了起来。", "他先弹了一首描写高山的曲子。琴声雄壮有力，就像巍峨的泰山一样。弹着弹着，忽然听到岸上有人鼓掌：\"好啊！弹得真好！这琴声就像巍峨的泰山一样雄伟！\"", "伯牙心里一惊，抬头一看，岸上站着一个打柴的樵夫，叫钟子期。伯牙又弹了一首描写流水的曲子，琴声哗啦啦的，就像奔腾的江河。钟子期又拍手称赞：\"太好了！这琴声就像滔滔的江水一样奔流不息！\"", "伯牙高兴极了，他弹什么，钟子期都能听出他心里想的是什么。伯牙心里想着高山，钟子期就说：\"巍巍乎若泰山！\"伯牙心里想着流水，钟子期就说：\"洋洋乎若江河！\"", "伯牙激动地说：\"你真是我的知音啊！我弹了一辈子琴，从来没有人能这么懂我！\"两个人越聊越投机，成了最好的朋友。他们约好明年的今天还在这里见面。", "可是第二年，钟子期却病死了。伯牙听说后，伤心极了。他来到钟子期的坟前，最后弹了一曲《高山流水》，然后把琴摔碎了，说：\"我的知音已经不在了，我还弹琴给谁听呢？\"从此以后，伯牙再也没有弹过琴。高山流水遇知音的故事告诉我们：人生得一知己足矣，真正的友谊是心灵的相通！"], "yuefasanzhang": ["秦朝末年，天下大乱，各路英雄都起来反抗秦朝的暴政。其中有两支最强大的队伍，一支是项羽带领的，另一支是刘邦带领的。他们约定：谁先打进咸阳，谁就当关中王。", "刘邦的军队一路势如破竹，很快就打到了咸阳城下。秦朝的最后一个皇帝子婴，穿着白衣服，脖子上系着绳子，捧着皇帝的大印，乖乖地投降了。咸阳城就这样被刘邦拿下了。", "进了咸阳城，士兵们都高兴坏了，纷纷跑去皇宫里抢金银财宝。刘邦自己也被皇宫里的宝贝迷住了——那么多珍珠玛瑙，那么多美酒美女，他想干脆就住在这里不走了。", "这时候，刘邦的谋士张良和大将樊哙站了出来。樊哙说：\"大王，您是想得天下，还是想当富翁呢？这些奢华的东西，就是秦朝灭亡的原因啊！您可不能学秦朝的样子！\"", "刘邦听了，一下子就清醒了。他马上下令：把所有的财宝都封起来，军队撤出咸阳，驻扎在霸上。然后，他把附近的老百姓都召集起来，对他们说：", "\"父老乡亲们，秦朝的法律太残酷了，你们受苦了！今天我和大家约法三章：第一，杀人的要偿命；第二，伤人的要受罚；第三，偷东西的要判刑。除了这三条，其他所有秦朝的法律统统废除！你们该怎么过日子就怎么过日子！\"", "老百姓听了，都高兴得跳了起来。他们纷纷送来了牛羊酒食，犒劳刘邦的军队。刘邦却推辞说：\"我们仓库里有的是粮食，不能让大家破费。\"就这样，刘邦得到了老百姓的拥护和爱戴。约法三章的故事告诉我们：说到就要做到，讲信用、守规矩的人才能得到大家的信任和支持！"], "guanbaozhijiao": ["春秋时期，齐国有两个非常好的朋友，一个叫管仲，一个叫鲍叔牙。管仲家里很穷，还要奉养老母亲，生活特别不容易。鲍叔牙家里很有钱，但他从来不看不起管仲。", "两个人一起合伙做生意。因为管仲没钱，所以本钱大部分都是鲍叔牙出的。可是到了年底分红的时候，管仲总是要拿一大半。别人看了都替鲍叔牙抱不平：\"管仲怎么这么贪心啊！出的钱少，拿的钱却多！\"", "鲍叔牙却笑着说：\"你们不知道，管仲家里穷，还有老母亲要养，多拿一点是应该的。他不是贪心，是真的需要钱。\"管仲听了，心里特别感动。", "后来，两个人一起去当兵打仗。每次冲锋的时候，管仲都躲在最后面；每次撤退的时候，管仲又跑在最前面。大家都笑话管仲是个胆小鬼。鲍叔牙却替管仲说话：\"你们误会他了，他不是胆小，他家里还有老母亲要照顾啊！他要是死了，老母亲怎么办呢？\"", "管仲听了，眼泪都流下来了。他叹了口气说：\"生我的人是父母，可是真正懂我的人，是鲍叔牙啊！\"这句话就叫做\"生我者父母，知我者鲍叔也\"。", "再后来，齐国发生了内乱，管仲辅佐公子纠，鲍叔牙辅佐公子小白。两个公子争夺王位，最后公子小白赢了，当上了国君，就是齐桓公。齐桓公想让鲍叔牙当丞相，鲍叔牙却推荐了管仲。", "齐桓公很惊讶：\"管仲是我的仇人啊！他曾经用箭射过我！\"鲍叔牙说：\"那是各为其主嘛！如果您想称霸天下，就一定要用管仲当丞相！他的才能比我强一百倍！\"齐桓公真的听了鲍叔牙的话，重用了管仲。管仲果然把齐国治理得非常强大，让齐桓公成了春秋时期的第一个霸主。管鲍之交的故事告诉我们：真正的朋友要互相理解、互相信任，这样的友谊才是最珍贵的！"], "kongzi": ["春秋时期，鲁国有一个叫孔子的人。他的名字叫孔丘，字仲尼。孔子小的时候家里很穷，三岁的时候父亲就去世了，全靠妈妈一个人把他抚养长大。", "孔子从小就特别爱学习。别的小孩子都在玩游戏，小孔子却喜欢摆上小盘子小碗，模仿大人祭祀的样子。他读书特别用功，遇到不懂的问题就一定要问个明白，这叫\"每事问\"。", "孔子长大以后，成了一个非常有学问的人。他收了很多学生，开创了儒家学派。孔子教学生特别有耐心，不管学生是有钱人家的孩子还是穷人家的孩子，他都一视同仁，这叫\"有教无类\"。", "孔子教学生有很多好方法。他会根据每个学生的特点来进行不同的教育，这叫\"因材施教\"。他还告诉学生：\"三人行，必有我师焉。\"意思是说，几个人一起走路，其中一定有可以当我老师的人。", "孔子还当过鲁国的大官，把鲁国治理得特别好。可是后来，鲁国的国君贪图享乐，不再关心国家大事。孔子很失望，就带着学生们离开了鲁国，周游列国，去宣传自己的政治主张。", "这一走就是十四年。一路上，孔子遇到了很多困难，有时候被人追杀，有时候被困在半路上没饭吃，还有人嘲笑他是\"丧家之犬\"。可是孔子从来没有放弃过自己的理想。", "晚年的时候，孔子回到了鲁国，专心整理古代的典籍和教育学生。他教过的学生有三千多人，其中特别优秀的有七十二个，被称为\"七十二贤人\"。孔子的思想被弟子们记录下来，编成了《论语》这本书。", "孔子去世后，他的思想影响了中国两千多年。人们尊称他为\"至圣先师\"、\"万世师表\"，意思是说，他是所有老师的榜样。直到今天，孔子的很多话还在被人们传诵，比如\"己所不欲，勿施于人\"、\"学而时习之，不亦说乎\"。孔子的故事告诉我们：学习是一辈子的事，做一个有道德、有学问的人，比什么都重要！"], "wuzetian": ["唐朝的时候，有一个了不起的女人，她叫武则天。她是中国历史上唯一一个真正当皇帝的女人。武则天小的时候就特别聪明，长得也很漂亮，十四岁的时候就被选进了皇宫，当了唐太宗的才人。", "唐太宗去世后，按照当时的规矩，武则天被送到了感业寺当尼姑。可是新皇帝唐高宗李治早就喜欢上了武则天，他把武则天又接回了皇宫，还封她做了昭仪。", "武则天不仅聪明，而且很有政治才能。她一步步往上走，最后竟然当上了皇后。当上皇后之后，武则天开始帮助唐高宗处理国家大事。她把事情处理得井井有条，比很多男人都能干。", "唐高宗去世后，武则天先后废掉了自己的两个儿子，最后干脆自己当了皇帝，改国号为\"周\"。这一年，武则天已经六十七岁了。一个女人当皇帝，在当时可是破天荒的大事！很多人都反对她，说女人不能当皇帝。", "可是武则天根本不在乎别人怎么说。她当皇帝期间，做了很多好事。她特别重视选拔人才，开创了殿试和武举，让很多有才能的普通人也有机会当官。她还重视农业生产，减轻老百姓的负担，让国家越来越富强。", "当然，武则天也有很残酷的一面。她重用了一些酷吏，杀害了很多反对她的人，连自己的亲生儿子都不放过。但是总的来说，武则天当皇帝的时候，国家还是很安定的，为后来的\"开元盛世\"打下了基础。", "武则天活了八十二岁，当了十五年皇帝。她去世前，留下了一道遗诏：把自己的皇位还给李家，自己还当回大唐的皇后。她还为自己立了一块\"无字碑\"——碑上一个字都没有，让后人去评价她的功过是非。", "武则天是一个很有争议的历史人物。有人说她是个好皇帝，把国家治理得很好；也有人说她心狠手辣，为了权力不择手段。但是无论如何，她都是中国历史上唯一一个女皇帝，她用自己的一生证明了：女人也能做皇帝，也能治理好国家。武则天的故事告诉我们：谁说女子不如男？只要有才能、有魄力，女孩子也能做出惊天动地的大事业！"], "jiminggoudao": ["战国时期，齐国有个贵族叫孟尝君。他最喜欢招贤纳士，家里养了三千多个门客。不管你是有大学问的人，还是只会一点小本事的人，只要来投奔他，他都好吃好喝招待着。", "有一年，孟尝君带着门客们去秦国访问。秦王很欣赏他的才能，想留他在秦国做宰相。可是秦国的大臣们都嫉妒孟尝君，纷纷在秦王面前说他的坏话。秦王听得多了，就把孟尝君软禁了起来，还想找机会杀掉他。", "孟尝君急得像热锅上的蚂蚁。他听说秦王有个最宠爱的妃子，就派人去求她帮忙说情。妃子说：'帮忙可以，但我要孟尝君那件天下无双的白狐皮大衣。'孟尝君一听就犯了难——那件大衣刚到秦国时，已经献给秦王了呀！", "这时，一个平时最不起眼的门客站了出来。这个人没什么别的本事，就会学狗叫、偷东西。他说：'大人别急，我有办法！'当天夜里，他偷偷溜进秦王的宫殿，学着狗叫骗过了守卫，把那件白狐皮大衣偷了出来。", "妃子拿到大衣，果然在秦王面前替孟尝君说了好多好话。秦王耳根子软，就答应放孟尝君回国。孟尝君生怕秦王反悔，赶紧带着门客们连夜逃跑。他们一路狂奔，跑到函谷关时，天还没亮呢。", "按照秦国的规矩，函谷关要等到鸡叫了才会开门。这可怎么办？后面秦王的追兵说不定马上就到了！就在这千钧一发的时刻，又一个门客站了出来。这个人别的不会，就会学鸡叫。只见他伸长脖子'喔喔喔'一叫，附近的公鸡都跟着叫了起来。", "守关的士兵听到鸡叫，迷迷糊糊地打开了城门。孟尝君一行人赶紧冲出函谷关，飞快地逃回了齐国。后来秦王果然后悔了，派兵来追，可是已经来不及了。", "回到齐国后，大家都对那两个'没本事'的门客刮目相看。以前看不起他们的人，现在都竖起大拇指说：'原来每个人都有自己的用处啊！'从此以后，孟尝君对门客们就更加一视同仁了。"], "anduchencang": ["秦朝灭亡后，项羽和刘邦开始争夺天下。项羽势力大，就把刘邦封到了偏僻的汉中当汉王。刘邦心里很不服气，但打不过项羽，只好带着人马去汉中上任。临走的时候，他还故意把连接汉中跟中原的栈道都烧了，意思是'我就待在汉中，不出来跟你抢天下'。", "刘邦到了汉中后，得到了一位了不起的大将军——韩信。韩信可厉害了，他帮刘邦训练军队，还偷偷计划着打回中原去。可是要打出去，就得先通过关中地区，而把守关中的是项羽的三个大将，都很厉害。", "有一天，韩信派了几百个老弱残兵去修复之前烧掉的栈道。关中的守将章邯听说了，哈哈大笑：'就这么点人，修到猴年马月才能修好啊？刘邦这小子也太没用了！'于是他就放松了警惕。", "其实章邯哪里知道，这都是韩信的计策。表面上，韩信派老弱残兵大张旗鼓地修栈道，让敌人以为汉军要从栈道打过来；暗地里，韩信却带着主力部队，悄悄地从另一条小路出发，直奔关中的军事重镇——陈仓。", "韩信的部队在山里走了好多天，每个人都小心翼翼，不敢发出一点声音。终于，他们神不知鬼不觉地来到了陈仓城下。这时候，陈仓的守军还在睡觉呢，根本没想到汉军会从天而降。", "韩信一声令下，汉军像潮水一样冲向陈仓城。守城的士兵从睡梦中惊醒，慌慌张张地应战，哪里是汉军的对手？很快，陈仓就被韩信打下来了。汉军士气大振，乘胜追击，很快就占领了整个关中地区。", "章邯得到消息，大吃一惊：'什么？汉军已经打到陈仓了？他们的栈道不是还没修好吗？'他赶紧带兵去救，可是已经晚了。最后章邯打了败仗，只好自杀了。", "这就是历史上有名的'明修栈道，暗度陈仓'的故事。韩信表面上假装要从栈道进攻，实际上却偷偷走小路袭击陈仓，打了敌人一个措手不及。这个故事告诉我们，有时候换个思路，声东击西，就能出奇制胜哦。"], "liangxiufeng": ["明朝的时候，有个大名鼎鼎的清官叫于谦。他从小就志向远大，读书非常用功，特别崇拜那些有气节的英雄人物。他写过一句很有名的诗：'粉骨碎身浑不怕，要留清白在人间。'这也是他一生的写照。", "于谦长大以后做了大官，可是他一点也不摆官架子，生活非常俭朴。那时候，朝廷里有个大贪官叫王振，他是皇帝身边的红人，掌握着很大的权力。很多官员为了升官发财，都争着给王振送礼、拍马屁。", "每次地方官进京办事，都要带上金银财宝和当地的土特产，去孝敬王振和朝中的权贵们。有人甚至说：'不送礼的话，肯定会被王振穿小鞋的！'可是于谦每次进京，什么礼物都不带，两手空空就去了。", "有一次，于谦又要进京了。他的下属们都替他担心，纷纷劝他：'大人，您就算不送金银珠宝，也带点土特产吧，比如手帕、蘑菇、线香什么的，也算个意思呀！不然那些权贵们会不高兴的。'", "于谦听了，哈哈大笑。他甩了甩自己的两只袖子，风趣地说：'你看，我这两只袖子里，除了清风，什么都没有！谁说我没带东西？我带了两袖清风呀！'下属们听了，都既佩服又担心。", "后来，于谦还专门写了一首诗来表明自己的态度：'绢帕蘑菇与线香，本资民用反为殃。清风两袖朝天去，免得闾阎话短长。'意思是说，那些土特产本来是老百姓用的，搜刮来送礼反而害了百姓。我就带着两袖清风去见皇上，免得老百姓说闲话。", "王振听说于谦不给他送礼，心里很不爽，就找了个借口把于谦关了起来。可是老百姓听说了，都纷纷为于谦求情。王振一看于谦这么得人心，也不敢随便害他，只好把他放了。", "后来，于谦为国家做了很多大事，成了明朝的大功臣。'两袖清风'这个成语也一直流传到今天，用来形容那些为官清廉、不贪不占的好官。小朋友们，我们也要学习于谦这种正直清廉的好品质哦。"], "mengzi": ["孟子名叫孟轲，是战国时期邹国人。他是继孔子之后，儒家学派最伟大的思想家，被后人尊称为'亚圣'。可是你知道吗？孟子小时候也是个调皮捣蛋的孩子，要不是有位好妈妈，他可能成不了大学问家呢。", "孟子三岁的时候，爸爸就去世了，全靠妈妈一个人抚养他。一开始，他们家住在墓地旁边。小孟子每天看见人家哭哭啼啼地办丧事，觉得挺好玩，就和邻居的小朋友一起学着大人的样子磕头、哭丧。孟妈妈看了，皱着眉头说：'这个地方不适合我们的孩子住。'", "于是孟妈妈就搬家了，这次搬到了集市旁边。可是集市里都是做生意的，小孟子又学着商人的样子，一会儿吆喝叫卖，一会儿跟人讨价还价，还学屠夫杀猪的样子。孟妈妈又摇摇头说：'这个地方也不好，我们再搬吧。'", "这一次，他们搬到了学校旁边。每天都能听见学生们朗朗的读书声，还能看见老师们彬彬有礼的样子。小孟子也学着学生们的样子，读书、写字、讲礼貌。孟妈妈这才满意地说：'这才是我儿子应该住的地方呀！'这就是著名的'孟母三迁'的故事。", "虽然搬到了好环境，可是小孟子还是很贪玩。有一天，孟子上学上到一半就偷偷跑回了家。孟妈妈正在织布，看见儿子逃学，非常生气。她拿起剪刀，'咔嚓'一声就把织布机上的布剪断了。孟子吓坏了，赶紧问妈妈为什么要这样做。", "孟妈妈语重心长地说：'你读书就像我织布一样。织布要一根线一根线地织，才能织成一匹完整的布。读书也要一天天积累，才能成为有学问的人。你现在逃学，就像我剪断这匹布一样，前功尽弃了！'孟子听了妈妈的话，惭愧地低下了头。", "从那以后，孟子发愤读书，再也不偷懒了。他跟着孔子的孙子子思学习，把孔子的思想学的透透的。长大以后，孟子也像孔子一样，周游列国，宣传自己的思想。他主张'仁政'，告诉国君们要爱护老百姓。", "孟子还说过很多有名的话，比如'富贵不能淫，贫贱不能移，威武不能屈'，还有'生于忧患，死于安乐'。他的思想都记录在《孟子》这本书里，直到今天还在影响着我们。孟子用自己的努力，从一个调皮的小男孩，变成了受人尊敬的'亚圣'。"], "antusheng": ["在丹麦的一个小城市里，住着一个叫安徒生的小男孩。他的爸爸是个穷鞋匠，妈妈是个洗衣工，家里非常穷。可是小安徒生从小就有一个大大的梦想——他想当一名演员，站在舞台上表演。", "安徒生的爸爸虽然穷，但是很爱读书。每天晚上，爸爸都会给小安徒生讲故事，还教他读书认字。有时候，爸爸还会给他做木偶玩具。小安徒生就拿着木偶，自己编故事、演木偶戏，玩得可开心了。", "可是不幸的是，在安徒生十一岁那年，爸爸生病去世了。家里的日子更难过了，妈妈只好一个人拼命干活，才能勉强养活他。有人劝妈妈：'让安徒生去当学徒吧，好歹能学门手艺。'可是安徒生不愿意，他的心里还装着那个当演员的梦想。", "十四岁那年，安徒生做出了一个大胆的决定——他要去首都哥本哈根闯一闯，去实现自己的演员梦。妈妈哭着说：'孩子，你一个人去那么远的地方，可怎么办呀？'安徒生却坚定地说：'妈妈，我一定会成功的！'", "可是到了哥本哈根，安徒生的日子可不好过。他长得又高又瘦，说话还有口音，很多人都看不起他。他去剧院面试，人家说他长得不好看，又不会跳舞，不适合当演员。安徒生没有气馁，他一边打工养活自己，一边学习唱歌和表演。", "后来，安徒生得了一场大病，嗓子坏了，唱歌也不行了。当演员的梦想破灭了，他非常难过。但是他没有放弃，他想：'既然不能当演员，那我就写故事吧，让读者在我的故事里看到精彩的表演！'", "于是安徒生开始写童话。他把小时候听来的故事，还有自己的想象，都写进了童话里。一开始，没有人愿意发表他的作品，有人甚至嘲笑他：'一个鞋匠的儿子，也想当作家？'可是安徒生不在乎，他还是不停地写呀写。", "终于，安徒生的童话被越来越多的人喜欢了。《丑小鸭》《卖火柴的小女孩》《皇帝的新装》《海的女儿》……一个个精彩的故事，打动了全世界的孩子和大人。安徒生从一个穷鞋匠的儿子，变成了大名鼎鼎的'童话大王'。他用自己的经历告诉我们：只要有梦想，并且肯坚持，就一定能实现！"], "zhilu": ["秦朝的时候，有个叫赵高的人，他是秦二世身边的大红人。赵高心里一直想造反，可又不知道大臣们服不服他，于是想出了一个坏主意。", "这天上朝的时候，赵高让人牵来一只鹿，笑着对秦二世说：'陛下，这是我献给您的一匹好马。'秦二世看了看，奇怪地说：'丞相搞错了吧？这明明是一只鹿啊！'", "赵高却一本正经地说：'请陛下看清楚，这的确是一匹千里马。'秦二世又看了看那只鹿，将信将疑地说：'马的头上怎么会长角呢？'", "赵高转过身，大声问大臣们：'你们说，这是鹿还是马？'大臣们你看看我，我看看你，都害怕赵高的权势。有些人不敢说话，有些人为了讨好赵高，连忙说：'对对对，这是马！'", "只有几个正直的大臣，勇敢地说：'这是鹿，不是马！'赵高心里暗暗记住了那些说真话的人，后来就找借口把他们都害了。", "从此以后，大臣们都害怕赵高，再也不敢说真话了。秦朝也因为有这样的坏人，很快就灭亡了。", "小道理：小朋友们，这个故事告诉我们，要坚持真理，明辨是非，不能因为害怕就跟着说假话。真正勇敢的人，会说真话、做实事。"], "nangying": ["晋朝的时候，有两个特别爱读书的孩子，一个叫车胤，一个叫孙康。他们家里都很穷，连灯油都买不起，晚上没法读书。", "夏天的晚上，车胤坐在院子里，看着飞来飞去的萤火虫，忽然想出了一个好办法。他捉了好多萤火虫，装在白纱布口袋里。", "口袋被萤火虫照得亮闪闪的，就像一盏小灯笼！车胤高兴极了，每天晚上都借着萤火虫的光认真读书。", "冬天的时候，孙康也想出了另一个办法。有一天夜里，他从睡梦中醒来，发现窗外特别亮。原来是下了一场大雪，白茫茫的一片。", "孙康想：雪光比油灯还亮呢！他立刻拿出书，跑到院子里，就着雪光读起来。天寒地冻，他的手都冻红了，可他一点儿也不觉得冷。", "就这样，车胤和孙康都通过刻苦学习，后来都成了很有学问的人。人们用'囊萤映雪'来形容刻苦读书的精神。", "小道理：小朋友们，现在我们有明亮的电灯、温暖的教室，更应该珍惜学习的机会。只要有心学习，什么困难都难不倒我们。"], "beishui": ["秦朝末年，韩信带领军队去攻打赵国。赵王听说韩信只有几万人马，而赵国有二十万大军，根本不把韩信放在眼里。", "韩信让士兵们在河边列阵，背对着河水摆开阵势。赵军见了都哈哈大笑：'韩信不会打仗，背水列阵，那不是找死吗？'", "战斗开始了，赵军倾巢而出，想把韩信的军队全部消灭。韩信的士兵们背对着河水，没有退路，只能拼命往前冲。", "士兵们心里想：反正退也是死，不如拼了！他们一个个像猛虎下山一样，奋勇杀敌，以一当十。", "赵军打了半天，打不赢，想退回营寨，却发现自己的营寨已经被韩信事先派去的两千骑兵占领了！", "原来韩信早就偷偷派骑兵趁赵军倾巢出动的时候，冲进赵营，把赵军的旗帜都换成了汉军的旗帜。", "赵军一看营寨丢了，顿时乱作一团，纷纷逃跑。韩信乘胜追击，大获全胜。这就是著名的'背水一战'。", "小道理：小朋友们，有时候没有退路的时候，反而能激发出我们最大的潜力。遇到困难不要退缩，勇敢面对，说不定能创造奇迹呢！"], "zhangliang": ["张良是汉朝初年最聪明的人，被人们称为'谋圣'。他帮助刘邦打败了项羽，建立了汉朝。可是你知道吗？张良年轻时也有一个神奇的故事。", "张良年轻的时候，有一天在桥上散步，遇到一个老爷爷。老爷爷故意把鞋扔到桥下，对张良说：'小伙子，下去把鞋给我捡上来！'", "张良心里很生气，但看老爷爷年纪大了，还是忍住气，下去把鞋捡了上来。没想到老爷爷又说：'给我穿上！'张良就跪下来，恭恭敬敬地给老爷爷穿上鞋。", "老爷爷笑着说：'你这个孩子值得教。五天后早上，你再来这里见我。'五天后，张良天刚亮就去了，可是老爷爷已经在那里了。", "老爷爷生气地说：'和老人约会，怎么能迟到？再过五天来！'又过了五天，张良鸡一叫就去了，可老爷爷又先到了，又让他五天后再来。", "第三次，张良半夜就去了，等了好一会儿，老爷爷才来。这次老爷爷高兴地说：'这就对了！'他拿出一本书送给张良，说：'读了这本书，你就能做帝王的老师。'", "张良日夜研读这本书，后来果然成了一个非常有智慧的人。他为刘邦出了很多好主意，帮助刘邦建立了汉朝。", "小道理：小朋友们，尊敬老人、虚心学习的人，才能得到别人的帮助和教导。张良的故事告诉我们，智慧的力量比武力更强大。"], "hailun": ["海伦·凯勒出生在美国，她小的时候生了一场重病，病好以后，她再也看不见东西，也听不见了。她生活在一个黑暗又寂静的世界里。", "可怜的海伦变得脾气越来越暴躁，她常常摔东西、大喊大叫。爸爸妈妈很担心她，给她请了一位老师，叫安妮·沙利文。", "沙利文老师很有耐心，她在海伦的手心里写字母，教她认字。有一天，老师带海伦来到水井边，让冰凉的水流过海伦的手。", "老师在海伦的另一只手上写下了'water'（水）这个单词。海伦突然明白了：原来每样东西都有名字！她兴奋极了，那天她学会了很多单词。", "海伦每天都努力学习，她用手摸老师的嘴唇，学习说话。她还学会了读书、写字，甚至考上了大学，成了一位了不起的作家和演说家。", "海伦走遍了全世界，帮助其他像她一样的残疾人。她写了很多书，鼓励人们勇敢地面对生活。", "海伦·凯勒说：'虽然我看不见听不见，但我的世界因为有了爱和希望，变得无比光明。'", "小道理：小朋友们，海伦·凯勒在那么困难的情况下都没有放弃，我们遇到的困难又算什么呢？只要不放弃，每个人都能创造属于自己的奇迹。"], "lebusishu": ["三国时期，蜀国的刘备去世后，他的儿子刘禅当上了皇帝。刘禅小名叫阿斗，是个不太聪明的皇帝。他整天吃喝玩乐，根本不关心国家大事。幸好有诸葛亮这样的大臣辅佐，蜀国才勉强维持着。", "后来，诸葛亮去世了，魏国的军队打了过来。刘禅吓得赶紧投降，带着文武百官搬到了洛阳居住。魏国的皇帝司马昭封他为安乐公，给了他大房子、好多钱，还有一百多个仆人伺候着。", "有一天，司马昭请刘禅吃饭。宴会上，司马昭故意安排表演蜀国的歌舞。旁边的蜀国旧臣们看了，想起自己的国家灭亡了，都难过地掉下了眼泪。可是刘禅呢？他看得津津有味，还拍着手叫好，一点都不难过。", "司马昭看了，心里暗暗好笑。他问刘禅：'你在这里住得习惯吗？想不想念蜀国呀？'刘禅乐呵呵地说：'这里有吃有喝，还有歌舞看，我快乐极了，才不想蜀国呢！'（原文：此间乐，不思蜀）", "过了一会儿，刘禅起身去上厕所。他的旧臣卻正赶紧跟了出去，对他说：'陛下，等会儿司马昭再问您想不想蜀国，您就哭着说：我祖先的坟墓都在蜀国，我天天都在想念。这样他说不定会放我们回去。'", "刘禅点点头，记住了卻正的话。他回到座位上，司马昭果然又问了同样的问题。刘禅就照着卻正教他的话说了一遍，还闭上眼睛，装出要哭的样子。司马昭听了，笑着说：'这话怎么听起来像是卻正说的呀？'", "刘禅一听，惊讶地睁开眼睛，说：'对对对！就是他教我的！你怎么知道的？'旁边的人听了，都忍不住笑了起来。司马昭也哈哈大笑，从此再也不防备刘禅了。", "小道理：小朋友们，这个故事告诉我们，做人不能忘本，要记得自己的家乡和根。同时，我们也要努力学习，不能像刘禅一样，只知道吃喝玩乐，把国家都给丢了。"], "saiwengshima": ["很久以前，在边塞的山脚下，住着一位老爷爷，大家都叫他塞翁。塞翁养了好多匹马，他每天都骑着马去放羊，日子过得逍遥自在。塞翁是个很有智慧的老人，看待事情总是和别人不一样。", "有一天，塞翁的一匹马跑丢了。邻居们听说了，都来安慰他：'老人家，别太伤心了，丢了一匹马不算什么。'可是塞翁却笑着说：'丢了马怎么就一定是坏事呢？说不定还是好事呢！'", "邻居们听了，都觉得这个老头真奇怪，马丢了明明是坏事，怎么还说是好事呢？他们摇摇头，都走了。没想到过了几个月，那匹跑丢的马居然自己回来了，还带回来了一群野马！数一数，足足有十几匹呢！", "邻居们听说了，又都来祝贺塞翁：'哎呀，老人家您真是有福气！丢了一匹马，带回来一群马，真是太好了！'可是塞翁却皱着眉头说：'白得了这么多马，怎么就一定是好事呢？说不定还是坏事呢！'", "邻居们听了，又觉得这个老头真奇怪，得了这么多马，明明是天大的好事，怎么还说是坏事呢？可是没过多久，塞翁的儿子因为骑野马，不小心从马上摔了下来，把腿给摔断了，成了瘸子。", "邻居们听说了，又都来安慰塞翁：'唉，真是太不幸了，好端端的一个小伙子，腿摔断了，以后可怎么办呀？'可是塞翁又说：'腿摔断了怎么就一定是坏事呢？说不定还是好事呢！'", "邻居们听了，都觉得这个老头疯了，儿子腿都断了，还说是好事。一年后，边境发生了战争，所有年轻力壮的小伙子都被抓去当兵了，大部分都死在了战场上。只有塞翁的儿子，因为腿瘸了，不用去当兵，保住了性命。", "小道理：小朋友们，这个故事告诉我们，遇到坏事的时候不要太难过，遇到好事的时候也不要太得意。因为好事和坏事是可以互相转化的。我们要用平常心去看待生活中的每一件事。"], "beigongsheying": ["晋朝的时候，有个叫乐广的人，他特别喜欢交朋友，经常请朋友到家里来喝酒聊天。乐广家的客厅里挂着一张弓，弓上画着五颜六色的花纹，远远看去，就像一条蛇盘在那里。", "有一天，乐广又请了一位好朋友来家里喝酒。两人边喝边聊，聊得可开心了。可是喝着喝着，那位朋友突然脸色发白，皱起了眉头，好像很难受的样子。乐广赶紧问：'你怎么了？不舒服吗？'", "朋友支支吾吾地说：'没...没什么...'其实啊，这位朋友刚才喝酒的时候，低头一看，发现酒杯里居然有一条小蛇！可是他不好意思说，硬着头皮把酒喝了下去。现在越想越害怕，觉得那条小蛇在肚子里游来游去。", "回到家以后，这位朋友越想越害怕，觉得肚子里真的有一条蛇。他吃不下饭，睡不着觉，没过几天就病倒了，而且病得越来越重。家里人请了好多医生来看，都查不出是什么病。", "乐广听说朋友病了，赶紧去看望他。问了半天，朋友才说出实情：'上次在你家喝酒，我看到酒杯里有一条小蛇，我把酒喝下去了，现在那条蛇在我肚子里，我快要死了！'说完，朋友就呜呜地哭了起来。", "乐广听了，觉得很奇怪：酒杯里怎么会有蛇呢？他回到家，坐在上次喝酒的地方，倒了一杯酒，低头一看——呀！酒杯里真的有一条小蛇！乐广抬头一看，墙上挂着那张弓，顿时明白了。", "原来啊，酒杯里根本不是什么蛇，而是墙上那张弓的影子，倒映在酒杯里，看起来就像一条小蛇！乐广赶紧跑到朋友家，把事情的真相告诉了他，还把他请到家里，让他亲眼看看墙上的弓和酒杯里的影子。朋友一看，恍然大悟，病立刻就好了。", "小道理：小朋友们，这个故事告诉我们，遇到事情不要慌张，也不要自己吓自己。要多动脑筋想一想，弄清楚事情的真相。很多时候，让我们害怕的不是事情本身，而是我们自己的胡思乱想。"], "chengjisihan": ["成吉思汗名叫铁木真，他是蒙古帝国的开创者，被人们称为'一代天骄'。可是你知道吗？铁木真小时候也吃过很多苦，经历过很多磨难。", "铁木真出生在一个蒙古部落首领的家里。他的爸爸也速该是部落的首领，英勇善战。可是在铁木真九岁那年，爸爸被敌人毒死了。部落里的人见首领死了，都纷纷离开，还抢走了他们家的牛羊和财物。", "铁木真和妈妈、弟弟妹妹们一下子从贵族变成了穷人。他们住在蒙古包里，靠挖野菜、打野兔过日子。有时候，他们甚至连饭都吃不饱。可是妈妈总是对铁木真说：'孩子，你要坚强，你爸爸是英雄，你将来也要像爸爸一样！'", "有一次，铁木真被仇人抓住了。仇人给他戴上沉重的枷锁，拉着他到处游行示众。铁木真心里充满了愤怒和屈辱，但是他没有放弃。他趁看守不注意，用枷锁砸晕了看守，成功地逃了出来。", "长大以后，铁木真凭着自己的勇敢和智慧，一点点地把散落的部落重新聚集起来。他和兄弟们一起打仗，打败了一个又一个敌人。他对士兵们特别好，打了胜仗总是把战利品分给大家，所以大家都愿意跟着他。", "慢慢地，铁木真的部落越来越强大。他统一了蒙古各个部落，建立了蒙古帝国。大家尊称他为'成吉思汗'，意思是'拥有四海的大汗'。成吉思汗还带领军队打到了很远很远的地方，建立了世界上最大的帝国。", "成吉思汗虽然是个大英雄，但他也很爱学习。他让人为蒙古人创造了文字，还制定了法律。他常说：'一个人可以没有金银财宝，但不能没有智慧和勇气。'", "小道理：小朋友们，成吉思汗小时候经历了那么多苦难，但他没有被困难打倒，反而变得更加坚强。我们也要像他一样，遇到困难不退缩，勇敢地面对挑战，做一个坚强、勇敢的人。"], "qibaishi": ["齐白石是中国最著名的国画大师之一。他画的虾栩栩如生，就像活的一样，在纸上游来游去。可是你知道吗？齐白石小时候是个穷孩子，长大以后还当过木匠呢。", "齐白石出生在湖南的一个小山村里。家里很穷，他只上了半年学，就因为交不起学费辍学了。小小的齐白石只好去给人家放牛、砍柴，帮家里干活。可是他特别喜欢画画，每天放牛的时候，都要用树枝在地上画画。", "十二岁那年，齐白石去学做木匠。他学的是雕花木匠，就是在木头家具上刻花。齐白石学得特别认真，他刻的花比别人都好看。白天干活，晚上就在油灯下练习画画。他把家里的草稿纸画得满满的，一张纸都舍不得扔。", "二十七岁那年，齐白石遇到了一位叫胡沁园的老师。胡老师发现齐白石很有画画天赋，就收他为学生，教他画画和写诗。齐白石高兴极了，他学得特别刻苦。因为他是从二十七岁才开始正式学画画的，所以他给自己起了个外号叫'鲁班门下'。", "齐白石画画有个特点，就是特别认真。为了画好虾，他在家里养了好多虾，每天都趴在鱼缸旁边，观察虾是怎么游的、怎么跳的、怎么打架的。他看呀看呀，画呀画呀，终于把虾画活了。", "齐白石还特别勤奋。他每天早上天不亮就起床画画，一直画到晚上。他说：'不教一日闲过。'意思是说，不能让一天白白地过去。就算到了晚年，他也坚持每天画画，从来都不偷懒。", "有一次，齐白石过生日，来了好多客人。他忙着招待客人，一天都没画画。到了晚上，客人都走了，齐白石觉得特别难受。他说：'今天的画还没画呢，不能就这么算了！'于是他拿起画笔，一口气画了四幅画，才去睡觉。", "小道理：小朋友们，齐白石爷爷从一个小木匠变成了大画家，靠的就是勤奋和坚持。不管我们学什么，只要认真、努力、坚持，就一定能学好。记住：天才是用勤奋换来的！"], "chibi_zhan": ["三国时期，曹操率领八十万大军南下，想一举消灭孙权和刘备。孙权的手下大多害怕极了，纷纷劝说孙权投降。只有周瑜和鲁肃坚持要打，他们说：曹军虽然人多，但都是北方人，不擅长水战，而且长途跋涉肯定很累。", "孙权听了他们的话，决定和刘备联合起来对抗曹操。周瑜派黄盖老将想了一个好主意——用火攻！可是冬天只有西北风，没有东南风，怎么放火呢？诸葛亮说：我有办法！他搭起一座七星坛，装作要借东风。", "其实诸葛亮上知天文下知地理，他算准了这几天会刮东南风。果然，到了交战那天，真的刮起了大大的东南风！黄盖带着十艘装满干草的大船，船上浇上油，假装投降曹操。", "曹操的士兵们都跑出来看，以为黄盖真的来投降了，一点防备都没有。黄盖的船离曹军越来越近，突然！十艘大船同时点着了火！火船像箭一样冲向曹军的大船。", "曹军的大船都用铁链连在一起，一烧就是一大片！火借风势，风助火威，整个江面都成了一片火海。士兵们哭爹喊娘，有的被烧死，有的掉进水里淹死，死伤不计其数。", "曹操看到大势已去，只好带着残兵败将逃跑。周瑜和刘备的军队乘胜追击，把曹操打得落花流水。这就是历史上有名的赤壁之战，孙刘联军只用了几万人，就打败了曹操的八十万大军。", "赤壁之战告诉我们：团结起来力量大，有时候智慧比蛮力更重要。只要动脑筋想办法，弱小的一方也能战胜强大的敌人！"], "yizi_qianjin": ["战国时候，有一个叫吕不韦的大商人。他做生意很有钱，还帮助秦国的王子当上了国王，也就是秦庄襄王。秦庄襄王很感激吕不韦，封他做了丞相，还给他很多很多的赏赐。", "可是那些贵族大臣们心里不服气，他们私下议论纷纷：吕不韦算什么呀？一个做生意的，也配当丞相？还有人说他没读过什么书，肯定没什么本事。吕不韦听了这些话，心里很不舒服。", "吕不韦想：我得做出点成绩让大家看看。他召集了好多好多有学问的人，养了三千多门客。这些人来自四面八方，各有各的本事。吕不韦让他们把自己知道的事情都写下来。", "大家你写一篇，我写一篇，有的写历史，有的写地理，有的写打仗，有的写做人的道理。写了好多年，终于编成了一本厚厚的书，名叫《吕氏春秋》。全书一共有二十多万字呢！", "吕不韦把这本书挂在咸阳城的城门上，旁边还挂着一千两黄金。他对大家说：谁要是能在这本书里增加一个字，或者删掉一个字，让这本书变得更好，我就把这一千两黄金赏给他！", "消息传开了，人们从四面八方赶来看书。可是大家看了又看，读了又读，没有一个人能找出一个字来修改。因为这本书写得实在太好了！吕不韦的名气也越来越大，再也没有人敢小看他了。", "一字千金的故事告诉我们：说话算数、信守承诺的人，才能得到别人的尊重。同时，只有真正有本事的人，才能经得起别人的考验！"], "bantu_erfei": ["东汉时候，有一个叫乐羊子的人。他娶了一位非常贤惠又聪明的妻子。乐羊子觉得自己学问不够，就告别了妻子，出门去拜师求学。妻子送他到门口，说：你要好好读书，不要惦记家里。", "可是乐羊子在外面读书读了才一年，就想家了。他收拾好行李，偷偷地跑回了家。妻子正在织布，看见丈夫回来了，先是吃了一惊，然后问：你怎么这么快就回来了？学业完成了吗？", "乐羊子挠挠头，不好意思地说：也没什么事，就是离家太久了，想你了，所以回来看看。妻子听了，拿起一把剪刀，走到织布机前，咔嚓一下，把快要织好的布剪断了。", "乐羊子吓了一大跳，赶紧拦住妻子：你这是干什么呀？多可惜啊！这布眼看就要织好了！妻子说：这布是我一根丝一根丝织起来的，一根丝虽然细，但一根一根积累起来，就能变成一匹布。现在我把它剪断了，以前的功夫就全都白费了。", "妻子接着说：读书也是一样的道理啊！你每天学一点知识，日积月累，就能成为有学问的人。可是你现在半途就回来了，就像我剪断这匹布一样，以前的努力不就白费了吗？", "乐羊子听了妻子的话，惭愧地低下了头。他说：妻子你说得对，我错了！我不应该半途而废。说完，他马上收拾好行李，又出门继续读书去了。这一去，就是七年。", "七年以后，乐羊子终于学成归来，成了一个很有学问的人。大家都夸奖他，也夸奖他有一个好妻子。半途而废的故事告诉我们：做任何事情都要有始有终，坚持到底才能成功，千万不能做到一半就放弃呀！"], "zhuangzi": ["战国时期，宋国有一个叫庄子的人。他的名字叫庄周，是道家学派的代表人物。庄子特别聪明，也特别有个性。他不喜欢做官，只喜欢自由自在地思考和写作。", "有一次，楚国的国王听说庄子很有本事，就派了两个大夫带着厚礼去请他来当相国。庄子正在河边钓鱼，头也不回地说：我听说楚国有一只神龟，死了已经三千年了，国王把它的骨头包得好好的供在庙里。你们说，这只乌龟是愿意死了被供起来，还是愿意活着在泥水里打滚呢？", "两个大夫说：当然是愿意活着在泥水里打滚啦！庄子笑着说：那你们回去吧，我也愿意在泥水里打滚，自由自在的，不想被当官困住。庄子就是这样一个不追求名利的人。", "庄子还特别会讲故事。他写了一本叫《庄子》的书，里面有好多好多有趣的寓言故事。比如《逍遥游》里的大鹏鸟，翅膀展开有几千里那么大，一飞就能飞到九万里的高空。还有《庖丁解牛》的故事，告诉我们做事情要掌握规律。", "有一天，庄子的妻子去世了。他的朋友惠子去吊丧，却看见庄子坐在地上，敲着盆子唱歌。惠子很生气：你不哭也就算了，怎么还唱歌？太过分了！庄子说：不是的，我刚开始也很伤心。可是我想想，人本来就没有生命，也没有形体，是从无到有来的。现在她又回到了自然中，就像春夏秋冬四季轮回一样。她安安静静地睡在天地之间，我要是哇哇大哭，不是太不懂道理了吗？", "庄子的思想特别有意思。他说：道在屎溺，意思是说道无处不在，连屎尿里都有道。他还说：子非鱼，安知鱼之乐？你不是鱼，怎么知道鱼快不快乐呢？这些话都充满了智慧。", "庄子虽然生活在两千多年前，但他的思想直到今天还在影响着我们。他告诉我们：不要被金钱和地位困住，要保持一颗自由的心，乐观豁达地面对生活。只有内心自由的人，才能真正地快乐！"], "hanxin": ["秦朝末年，有一个叫韩信的年轻人。他从小父母双亡，家里特别穷，连饭都吃不上。他只好去别人家蹭饭吃，大家都很讨厌他。有个漂洗棉絮的老婆婆看他可怜，就经常把自己的饭分给他吃。韩信很感动，说：我以后一定会好好报答您的！", "韩信虽然穷，但他胸怀大志。他每天都带着一把剑，梦想着有一天能成就一番大事业。有一天，韩信走在街上，突然被一个年轻的屠夫拦住了。屠夫挑衅说：韩信，你虽然长得人高马大，还带着剑，其实你胆子小得很！有本事你就刺我一剑，没本事你就从我裤裆底下钻过去！", "韩信看了看那个屠夫，心里想：我要是杀了他，我也得偿命，那我的理想就没法实现了。为了这点小事死了，不值得。于是，他真的趴在地上，从屠夫的裤裆底下钻了过去。街上的人都哈哈大笑，说韩信是个胆小鬼。这就是胯下之辱的故事。", "后来，韩信投奔了项羽的军队，可是项羽不重用他。他又去投奔刘邦，刚开始刘邦也不把他当回事。韩信很失望，就偷偷地跑了。萧何知道韩信是个难得的人才，听说他跑了，赶紧骑上马去追，追了两天两夜才把韩信追回来。这就是萧何月下追韩信的故事。", "萧何对刘邦说：韩信是国士无双的大人才，你要是想争夺天下，就一定要重用他！刘邦听了萧何的话，专门选了一个好日子，搭了个高高的台子，拜韩信为大将军。全军上下都大吃一惊，谁也没想到这个默默无闻的年轻人居然能当大将军。", "韩信当上大将军后，果然厉害极了。他明修栈道，暗度陈仓，帮刘邦打出了关中；他背水一战，用一万人打败了二十万赵军；他还设下十面埋伏，最后逼得项羽在乌江自刎。韩信打仗特别厉害，几乎百战百胜，人们都叫他兵仙。", "可惜的是，韩信后来因为功劳太大，被刘邦的妻子吕后害死了。临死前，韩信感叹说：我真后悔当初没有听蒯通的话，现在居然死在一个女人手里，真是天意啊！", "韩信的一生充满了传奇。他受过胯下之辱，也拜过大将军；他打过无数胜仗，最后却死得很惨。他的故事告诉我们：能屈能伸才是真正的勇敢，有真本事的人不怕暂时的委屈。但同时也要记住，功高震主的时候，要学会低调和自保！"], "kongchengji": ["三国时期，诸葛亮派马谡去守街亭，可是马谡骄傲自大，不听劝告，把营寨扎在了山上。司马懿趁机带兵打了过来，街亭失守了。诸葛亮听到消息，拍着大腿说：大事不好了！", "这时候，诸葛亮身边没有多少兵，大部分都是文官。司马懿带着十五万大军，眼看就要打到西城了。文官们吓得脸色发白，有的说要投降，有的说要收拾东西逃跑。", "诸葛亮却不慌不忙。他下令：把所有的旗帜都藏起来，士兵们都不许说话，不许随便走动。然后，他让人把四个城门都打开，每个门口派二十个士兵扮成老百姓，安安静静地扫地。", "诸葛亮自己呢？他披上鹤氅，戴上纶巾，带着两个小书童，搬了一张琴，坐在城楼上焚香弹琴。那琴声悠扬婉转，一点都听不出慌乱，就像在自己家里开音乐会一样。", "司马懿的大军来到城下，一看这情景，都愣住了。城门大开着，诸葛亮在城楼上悠闲地弹琴，几个老百姓在门口慢悠悠地扫地，连个守门的士兵都没有。这也太奇怪了吧？", "司马懿心里想：诸葛亮一生谨慎，从来不做冒险的事。今天他打开城门，这么镇定，里面一定有埋伏！如果我们冲进去，不就上当了吗？不行，绝对不能进去！", "于是，司马懿下令：全军撤退！十五万大军哗啦啦地撤走了。诸葛亮看着魏军远去的背影，哈哈大笑起来。旁边的人都惊呆了，竖起大拇指说：丞相，您真是太神了！", "小道理：小朋友们，空城计的故事告诉我们，遇到危险的时候不要慌张，要冷静思考想办法。有时候，智慧和勇气比千军万马还要厉害！但也要记住，这只是个特别的计谋，平时可不能随便骗人哦！"], "xuanwumen": ["唐朝初年，唐高祖李渊有三个儿子：太子李建成、秦王李世民和齐王李元吉。三个人里面，李世民最能干，他带兵打了很多胜仗，立下了赫赫战功，老百姓都很喜欢他。", "太子李建成心里很嫉妒李世民。他想：我是太子，可是功劳和威望都比不上二弟，将来父皇百年之后，我这个皇帝能坐稳吗？于是他和三弟李元吉联合起来，处处排挤李世民。", "有一次，李建成请李世民喝酒，居然在酒里下了毒。李世民喝了之后肚子疼得厉害，吐了好多血，差点就死了。还有一次，李元吉想趁乱杀死李世民，幸好被人拦住了。", "李世民的手下都很生气，纷纷劝他：太子和齐王心太狠了，您要是再不动手，早晚被他们害死！长孙无忌和尉迟恭都说：大王，您快下决心吧，我们都跟着您干！", "李世民叹了口气说：都是亲兄弟，我怎么下得了手呢？可是手下们说：大王，您不忍心害他们，他们可忍心害您啊！您要是再犹豫，我们都要跑了！李世民终于下定了决心。", "公元626年的一天，李世民在玄武门设下了埋伏。李建成和李元吉骑马进宫，走到临湖殿的时候，感觉气氛不对，转身就想跑。李世民大喊一声：站住！一箭就射死了李建成。", "尉迟恭也冲了上去，一刀杀死了李元吉。这就是历史上有名的玄武门之变。后来，唐高祖李渊把皇位传给了李世民，李世民就是大名鼎鼎的唐太宗。", "小道理：小朋友们，玄武门之变是一个很复杂的历史故事。它告诉我们，权力有时候会让人变得很可怕。但更重要的是，唐太宗当上皇帝后，勤政爱民，开创了贞观之治，让老百姓过上了好日子。所以判断一个人，不仅要看他做过什么，还要看他为大家带来了什么。"], "beijiu_shibingquan": ["北宋初年，赵匡胤通过陈桥兵变当上了皇帝，就是宋太祖。可是他当上皇帝之后，心里总是不踏实。他想：我是被手下的大将们黄袍加身才当上皇帝的，万一哪天他们的手下也这么干，我的皇位不就保不住了吗？", "有一天，赵匡胤问宰相赵普：自从唐朝末年以来，几十年间换了那么多皇帝，战争从来没停过，老百姓苦不堪言。这到底是为什么呀？我想让天下长治久安，有什么好办法吗？", "赵普回答说：陛下，问题的关键就在于藩镇权力太大，君弱臣强。只要把他们的兵权收回来，天下自然就太平了。赵匡胤听了，连连点头：你说得对，我明白该怎么做了。", "过了几天，赵匡胤在宫里设宴，请石守信、王审琦等几位老将军喝酒。大家都是跟着赵匡胤一起打天下的好兄弟，喝着喝着，气氛非常热闹，你一言我一语，聊得可开心了。", "喝到兴头上，赵匡胤突然叹了口气，皱起了眉头。大家都很奇怪：陛下今天怎么不高兴了？赵匡胤说：唉，要是没有你们，我也当不上皇帝。可是当皇帝也太难了，我整夜整夜睡不着觉啊！", "石守信等人连忙问：陛下，这是为什么呀？赵匡胤说：这还不明白吗？皇帝这个位置，谁不想坐啊？大家一听，吓得赶紧跪下：陛下，天命已定，谁还敢有二心呢？", "赵匡胤说：你们当然不会有二心，可是万一你们的手下贪图富贵，把黄袍加在你们身上，你们就算不想当皇帝，也身不由己了呀！大家一听，都吓哭了，求陛下给他们指条明路。", "赵匡胤说：人生苦短，不如多攒点钱，买些好房子好地，快快乐乐过一辈子。你们把兵权交出来，我保你们荣华富贵，咱们君臣之间也不用互相猜疑了。第二天，将军们都主动交出了兵权。这就是杯酒释兵权的故事。"], "kangxi": ["康熙皇帝名叫爱新觉罗·玄烨，他是清朝的第四位皇帝，也是中国历史上在位时间最长的皇帝，一共当了六十一年皇帝。康熙小的时候特别聪明好学，而且很勇敢。", "康熙八岁就当上了皇帝。那时候他还是个小孩子，国家大事由四个辅政大臣帮忙处理。其中有个叫鳌拜的大臣，权力特别大，经常欺负小皇帝，不把康熙放在眼里。", "康熙心里很生气，但他知道自己还小，硬拼是不行的。于是他表面上装作贪玩，天天和一群小侍卫在一起摔跤玩耍，暗地里却在训练这些侍卫，准备对付鳌拜。", "康熙十六岁那年，机会终于来了。他把鳌拜召进宫，一声令下，那群练了好久摔跤的小侍卫们一拥而上，七手八脚就把鳌拜给抓住了。就这样，小康熙智擒了鳌拜，亲自掌握了大权。", "康熙皇帝特别能干。他平定了三藩之乱，统一了台湾，还打退了沙俄的侵略，签订了《尼布楚条约》。他还多次到边疆巡视，巩固了我们国家的统一，真是个了不起的皇帝。", "康熙不仅会打仗，还特别重视文化和农业。他组织人编了《康熙字典》，还亲自学习数学、天文、医学等知识。他关心老百姓的生活，多次减免赋税，让大家过上了好日子。", "康熙皇帝一生勤政爱民，每天天不亮就起床处理政务，从来都不偷懒。他开创了康乾盛世，让清朝成为当时世界上最强大的国家之一。大家都尊称他为康熙大帝。", "小道理：小朋友们，康熙皇帝八岁登基，十六岁就智擒鳌拜，靠的是智慧和勇气。他一辈子都在努力学习、努力工作，为国家和人民做了很多好事。我们也要像康熙一样，从小努力学习，长大了做一个对社会有用的人！"], "direnjie": ["狄仁杰是唐朝武则天时期的一位大官，他特别聪明，断案如神，被人们称为狄青天。你知道吗？他一年就处理了一万七千多件案子，而且没有一个人喊冤，真是太厉害了！", "狄仁杰小时候就特别爱读书，而且遇到事情喜欢动脑筋。有一次，他家的门人被人害死了，县吏来查案，大家都争先恐后地为自己辩解，只有狄仁杰一声不吭地坐在那里继续读书。", "县吏很生气，就质问狄仁杰：你这孩子怎么回事？大人问话你都不回答吗？狄仁杰抬起头，不慌不忙地说：我正在和书中的圣贤对话呢，哪有时间理你们这些普通的官吏呀？县吏听了，又惊讶又佩服。", "狄仁杰当官以后，特别正直，从来不怕得罪权贵。有一次，武卫大将军权善才不小心砍了昭陵的一棵柏树。昭陵是唐太宗的陵墓，唐高宗知道后特别生气，下令要杀掉权善才。", "狄仁杰站出来说：陛下，法律上规定砍陵树的罪不至死。如果您因为一棵树就杀一个将军，后人会怎么说您呢？唐高宗听了，觉得很有道理，就免了权善才的死罪。", "武则天当皇帝的时候，狄仁杰被人诬告谋反，关进了大牢。审讯的时候，狄仁杰居然马上承认了：没错，我就是要谋反！判官听了很高兴，就放松了警惕。", "狄仁杰偷偷把自己的冤情写在一块布上，塞进棉衣里，让人送回家。他儿子看到了，就去告诉武则天。武则天亲自审问，才知道狄仁杰是冤枉的，就把他放了。", "武则天很欣赏狄仁杰的才干，封他做了宰相。狄仁杰也没有辜负武则天的信任，他推荐了很多有本事的人，这些人后来都成了唐朝的栋梁之才。小道理：小朋友们，狄仁杰的故事告诉我们，遇到事情要冷静思考，用智慧解决问题。同时，做人要正直勇敢，敢于坚持真理，不害怕权势。只有这样，才能成为一个受人尊敬的人！"], "huangxiang_wenxi": ["东汉时期，有个叫黄香的孩子，他九岁的时候妈妈就去世了，和爸爸相依为命。黄香是个特别懂事的孩子，他知道爸爸又当爹又当妈，辛辛苦苦把自己养大，心里特别感激。", "夏天的时候，天气特别炎热，屋子里像个大蒸笼。黄香担心爸爸热得睡不着觉，每天晚上都拿着蒲扇，在爸爸的床边使劲扇风，把枕头和席子都扇得凉凉的，还把蚊子都赶跑，然后才请爸爸去睡觉。", "到了冬天，天寒地冻的，被窝里冷得像冰窖。小黄香可心疼爸爸了，他想：爸爸忙了一天，晚上再睡凉被窝，多难受啊！于是他想出了一个好办法。", "每天晚上，黄香都先钻进爸爸的被窝里，用自己小小的身体把冰冷的被子捂得暖暖的。等被窝暖和了，他才爬出来，把爸爸扶到床上睡觉。爸爸感动得直掉眼泪，摸着黄香冻红的小脸蛋说：'我的好孩子，你真是爸爸的小棉袄啊！'", "黄香不仅孝顺，还特别爱学习。他白天帮爸爸干活，晚上就点着油灯刻苦读书。他读了很多书，学问越来越大，后来成了一个很有学问的人，还当了大官呢。", "黄香温席的故事传开了，大家都夸他是个孝顺的好孩子。当时的太守还特别表彰他，说他是'天下无双，江夏黄香'。后来这个故事被收录在《二十四孝》里，流传了几千年。", "小朋友们，黄香九岁就知道孝敬父母，用自己的方式表达对爸爸的爱。我们也要向黄香学习，帮爸爸妈妈做力所能及的事，做一个孝顺懂事的好孩子。"], "yiling_zhan": ["三国时期，蜀汉的大将关羽被东吴害死了。刘备知道后，气得不得了，他发誓要为关羽报仇。诸葛亮和赵云都劝他不要冲动，说当前的大敌是曹魏，不是东吴。可是刘备根本听不进去。", "刘备亲自率领七十万大军，浩浩荡荡向东吴杀去。一路上势如破竹，很快就打到了夷陵（现在的湖北宜昌一带）。东吴的孙权吓得赶紧派人来讲和，愿意把荆州还给刘备，可是刘备还是不答应。", "这时候，东吴出了一个年轻的将军叫陆逊。孙权任命陆逊为大都督，带领五万人马去抵挡刘备。陆逊虽然年轻，但是很有谋略。他仔细分析了形势，决定先坚守不出，等蜀军疲惫了再出击。", "刘备的军队从春天一直打到夏天，士兵们又热又累，士气越来越低落。刘备为了让士兵们凉快些，就命令大军在树林里扎营，营寨一个接一个，连起来有七百多里长，就像一条长长的蛇。", "陆逊观察到这个情况，高兴地说：'打败刘备的机会来了！'他制定了一个火攻的计划。在一个刮着大风的夜晚，陆逊命令士兵们每人拿着一把茅草，偷偷摸到蜀军营寨边，同时放火。", "火借风势，风助火威，蜀军的营寨一下子就变成了一片火海。士兵们惊慌失措，四散逃跑，被烧死的、踩死的、被东吴兵杀死的，数都数不清。刘备在将士们的保护下，好不容易才逃了出来。", "这一战，刘备的七十万大军几乎全军覆没，损失惨重。刘备又气又悔，病倒在白帝城。他后悔没有听诸葛亮的劝告，结果落得这么惨的下场。", "夷陵之战是三国时期著名的战役，陆逊火烧连营的计策也成为了军事史上的经典。这个故事告诉我们，千万不能在气头上做决定，冷静和理智比什么都重要。"], "anshi_zhiluan": ["唐朝的时候，有个皇帝叫唐玄宗。他年轻的时候特别能干，把国家治理得井井有条，出现了'开元盛世'的繁荣景象。可是到了晚年，唐玄宗渐渐骄傲起来，整天只顾着享乐，不理朝政。", "当时有个叫安禄山的节度使，他是个大胖子，肚子特别大，看起来傻乎乎的，其实可狡猾了。他特别会拍马屁，每次见到唐玄宗都装得很忠诚的样子。唐玄宗越来越信任他，让他掌管了三个藩镇的兵权。", "安禄山见唐玄宗昏庸无能，朝廷内部又有矛盾，就暗暗起了坏心思。他偷偷招兵买马，积蓄力量，准备造反。有一些大臣提醒唐玄宗要提防安禄山，可是唐玄宗根本不相信，还说：'安禄山对我忠心耿耿，怎么会造反呢？'", "公元755年，安禄山果然以'讨伐奸臣'为借口，在范阳起兵造反了。十五万叛军一路南下，很快就攻下了洛阳和长安。唐玄宗吓得带着杨贵妃和大臣们仓皇逃跑，一直逃到四川才停下来。", "半路上，士兵们又饿又气，都把罪过算在杨贵妃和她哥哥杨国忠头上。他们逼着唐玄宗处死了杨贵妃，不然就不肯再往前走。唐玄宗没办法，只好含泪让杨贵妃自缢了。这就是著名的'马嵬坡之变'。", "后来，安禄山被他的儿子安庆绪杀死了，安庆绪又被另一个叛将史思明杀死了，史思明又被他儿子史朝义杀死了。叛军内部互相残杀，力量越来越弱。唐朝大将郭子仪、李光弼等人终于把叛乱平定了。", "这场持续了八年的叛乱，历史上叫'安史之乱'。经过这场战乱，唐朝的人口减少了很多，经济遭到了严重破坏，曾经辉煌的大唐王朝从此由盛转衰，再也恢复不到以前的繁华了。", "安史之乱给我们留下了深刻的教训：一个人如果骄傲自满、贪图享乐，就会看不清真相；一个国家如果放松警惕、任用奸臣，就会面临危险。我们要时刻保持清醒的头脑。"], "xinqiji": ["辛弃疾是南宋时期著名的词人，也是一位了不起的抗金英雄。他出生在山东济南，那时候北方已经被金兵占领了。辛弃疾从小就听爷爷讲宋朝的故事，心里埋下了一颗爱国的种子，发誓要把金兵赶出去。", "辛弃疾二十一岁那年，聚集了两千多人，参加了一支抗金起义军。他在起义军中表现得特别勇敢，有一次，他只带了五十个骑兵，就冲进了五万人的敌营，活捉了叛徒，还全身而退。大家都夸他是'飞虎将军'。", "后来，辛弃疾来到了南方，投奔南宋朝廷。他一心想着北伐中原，收复失地，给皇帝上了很多奏章，提出了很多抗金的好办法。可是南宋的大官们都不想打仗，只想着偏安一隅，所以辛弃疾一直没有得到重用。", "虽然没能实现北伐的理想，辛弃疾从来没有放弃过。他把满腔的爱国热情都写进了词里。他的词写得特别豪迈，充满了英雄气概，比如'醉里挑灯看剑，梦回吹角连营'，读起来让人热血沸腾。", "辛弃疾不仅会打仗、会写词，当地方官也很能干。他在湖南当安抚使的时候，创建了一支'飞虎军'，纪律严明，战斗力特别强，金兵都很害怕。他还修建了很多水利工程，为老百姓做了不少好事。", "辛弃疾和苏轼都是豪放派词人的代表，人们把他们合称为'苏辛'。辛弃疾一生写了六百多首词，有'词中之龙'的美称。他的词既有'金戈铁马，气吞万里如虎'的豪迈，也有'蓦然回首，那人却在灯火阑珊处'的柔情。", "辛弃疾六十八岁那年，朝廷终于决定北伐，派人来请他出山。可是辛弃疾已经病重卧床不起了。他在临终前，还大喊着'杀贼！杀贼！'，心里始终想着收复中原的大业。", "辛弃疾的一生，是爱国的一生。他虽然没能实现自己的理想，但是他的诗词和精神永远流传了下来。小朋友们，我们也要像辛弃疾一样，从小树立远大的理想，热爱自己的祖国。"], "linzexu": ["林则徐是清朝时期著名的大臣，也是我国近代史上伟大的民族英雄。他出生在福建福州一个贫苦的教书先生家里，从小就刻苦读书，立志要做一个对国家有用的人。", "林则徐当官以后，特别清正廉洁，为老百姓做了很多好事。他在江苏做官的时候，遇到了大水灾，他不顾个人安危，亲自到灾区指挥救灾，还打开官仓放粮，救活了很多灾民。老百姓都亲切地叫他'林青天'。", "那时候，英国商人偷偷把鸦片运到中国来卖。鸦片是一种很可怕的毒品，人一旦吸上就会上瘾，身体会越来越差，最后变得骨瘦如柴，什么活都干不了。很多中国人因为吸食鸦片，倾家荡产，家破人亡。", "林则徐看到这种情况，心里特别着急。他给皇帝上书说：'如果再不禁烟，再过几十年，中国就没有能打仗的士兵了，也没有银子了。'皇帝听了也很害怕，就派林则徐去广州禁烟。", "林则徐到了广州以后，态度特别坚决。他命令外国商人必须把所有鸦片都交出来，还郑重地说：'只要鸦片一天没禁绝，我就一天不回去！'外国商人一开始还想耍赖，后来见林则徐态度坚决，只好乖乖地交出了鸦片。", "1839年6月3日，林则徐在虎门海滩当众销毁收缴来的鸦片。他让人挖了两个大池子，里面放满海水和生石灰，把鸦片倒进去，不一会儿就冒起了滚滚浓烟。销烟一共持续了二十三天，销毁了两百多万斤鸦片。", "虎门销烟的消息传开后，老百姓们都拍手称快，大家的爱国热情也被激发起来了。这是中国人民禁烟斗争的伟大胜利，显示了中华民族反抗外来侵略的坚强意志。林则徐也因此成为了受人尊敬的民族英雄。", "小朋友们，林则徐虎门销烟的故事告诉我们，面对危害国家和人民的坏事，要勇敢地站出来斗争。我们要学习林则徐的爱国精神和坚定意志，做一个有骨气、有担当的中国人。"], "changping_zhan": ["战国末年，秦国和赵国为了争夺上党地区，在长平展开了一场惊天动地的大战。赵国老将廉颇坚守不出，秦军久攻不下，两国就这样对峙了三年之久。", "秦国丞相应侯想出了一条反间计，他派人到赵国散布谣言说：'秦军最怕的是赵括，要是赵括当了将军，秦军早就被打跑了。'赵王本来就对廉颇坚守不战很不满，听了谣言果然动了心。", "赵括是赵国名将赵奢的儿子，从小熟读兵书，谈起兵法来头头是道，连他父亲都辩不过他。但赵奢临终前却对妻子说：'赵括把打仗看得太容易了，将来赵国要是用他为将，一定会吃大亏。'", "赵王不听劝告，执意任命赵括为大将。赵括一到长平，就改变了廉颇的战略，下令全线出击。秦军主帅白起听说赵括来了，心里暗暗高兴，他故意假装败退，引诱赵军追击。", "赵括率领四十万大军追了上去，没想到正中白起的圈套。秦军从两边包抄，把赵军团团围住，还切断了赵军的粮道。赵军被困了四十六天，粮食吃光了，士兵们饿得互相残杀吃人肉。", "赵括没有办法，只好亲自率领精锐部队突围，结果被秦军乱箭射死。主将一死，四十万赵军群龙无首，只好全部投降。心狠手辣的白起担心降卒造反，竟然把他们全部活埋了。", "长平一战，赵国元气大伤，从此再也无力与秦国抗衡。四十万生命化作了累累白骨，只留下'纸上谈兵'的教训，让后世人深深感叹：理论固然重要，但没有实践经验，终究是要吃大亏的。"], "wang_anshi_bianfa": ["北宋神宗年间，国家看起来繁华，其实隐藏着很多问题：官员太多、军队太弱、老百姓赋税太重。年轻的宋神宗很想有一番作为，他听说江宁有个叫王安石的人，学问大、主意多。", "王安石是个很有个性的人，他从小聪明好学，读书过目不忘。他做官的时候，常常提出一些与众不同的想法，别人觉得他古怪，可他毫不在意。他写了一篇《上仁宗皇帝言事书》，主张全面改革。", "宋神宗把王安石召到京城，两人一见如故，聊得非常投机。神宗问：'你觉得治理国家最重要的是什么？'王安石说：'最重要的是变法，改变旧的法度，让国家富强起来。'", "公元1069年，王安石开始了轰轰烈烈的变法运动。他推出了青苗法、免役法、方田均税法等十几项改革，有的让农民在青黄不接时能借到粮食，有的让富人也要交税，有的让军队更有战斗力。", "但是变法遇到了很大的阻力。很多老臣反对，说王安石'乱了祖宗家法'。司马光、苏轼这些大文豪也不支持，他们觉得变法太急了，会让老百姓受苦。王安石的好朋友也纷纷离他而去。", "王安石没有退缩，他说：'天变不足畏，祖宗不足法，人言不足恤。'意思是天象变化不用怕，祖宗规矩不必死守，别人的闲话不用在意。他顶着压力，坚持推行新法。", "可惜，变法最终还是失败了。宋神宗死后，高太后临朝听政，把新法全部废除。王安石听说后，伤心地一病不起。这场十一世纪的大改革，虽然失败了，但它的勇气和智慧，永远值得后人敬佩。"], "kaiyuan_shengshi": ["公元713年，唐玄宗李隆基改年号为'开元'，从此开启了唐朝最辉煌灿烂的时代——开元盛世。那时候的唐朝，是世界上最强大、最富裕的国家，长安是世界上最大的城市。", "唐玄宗刚即位的时候，非常勤奋节俭。他把后宫里多余的宫女放回家，禁止各地进献珍宝，还烧掉了宫里的珠玉锦绣，表示不追求奢侈。他说：'我要让老百姓都过上好日子。'", "唐玄宗特别会用人，他选拔了很多有才能的人当宰相。姚崇善于应变，宋璟守法持正，张说文采飞扬，张九龄正直敢言。这些贤相齐心协力，把国家治理得井井有条。", "那时候的长安，到处都是热闹的景象。东市和西市商店林立，有卖丝绸的、卖瓷器的、卖茶叶的，还有来自波斯、阿拉伯、日本的商人。街上有汉人、胡人、突厥人、日本人，各种肤色的人来来往往。", "农业也很发达，粮食年年丰收，仓库里堆满了粮食，便宜得几乎不值钱。杜甫写诗说：'忆昔开元全盛日，小邑犹藏万家室。稻米流脂粟米白，公私仓廪俱丰实。'可见当时有多富裕。", "文化艺术更是百花齐放。李白、杜甫、王维这些大诗人写出了千古流传的诗篇，吴道子的画、张旭的字、李龟年的歌，都是天下一绝。大雁塔下，文人雅士饮酒作诗，好不快活。", "可惜好景不长，唐玄宗晚年渐渐骄傲自满，沉迷于享乐，重用奸臣李林甫、杨国忠，还爆发了安史之乱。开元盛世就这样结束了。它告诉我们：无论多么辉煌的时代，都要居安思危，不能忘记初心。"], "zhuyuanzhang": ["元朝末年，濠州钟离有个叫朱重八的孩子，他家世代都是农民，穷得叮当响。朱重八从小就给地主家放牛，经常饿肚子，还挨地主的打骂。但他特别聪明，也很有主见，小伙伴们都听他的。", "十六岁那年，家乡发生了特大旱灾和蝗灾，接着又闹瘟疫。短短半个月，朱重八的父亲、大哥、母亲都先后病死了，连棺材都买不起，只能用破衣服裹着，埋在邻居送的一小块地里。", "走投无路的朱重八只好到皇觉寺当和尚，混口饭吃。可是没过多久，寺里也没粮了，他只好拄着拐杖、托着钵盂，到处流浪化缘。这一走就是三年，他走遍了安徽、河南的山山水水。", "流浪的日子虽然苦，但朱重八长了见识，认识了很多朋友，也锻炼了坚强的意志。后来，他投奔了郭子兴的红巾军，改名叫朱元璋，意思是'诛灭元朝的美玉'。", "朱元璋作战勇敢，又有谋略，很快就从一个小兵当上了将军。他知人善任，招揽了徐达、常遇春、刘伯温等一大批人才。他的队伍纪律严明，不抢老百姓的东西，所以越来越壮大。", "经过十几年的南征北战，朱元璋先后消灭了陈友谅、张士诚等对手，然后派出大军北伐，把元朝统治者赶回了蒙古大草原。公元1368年，朱元璋在应天府称帝，建立了明朝，年号洪武。", "当了皇帝的朱元璋依然很勤奋，他每天天不亮就起床处理朝政，一直忙到深夜。他痛恨贪官污吏，制定了严厉的法律。虽然他也有很多缺点，但从一个放牛娃到开国皇帝，他的一生真的很了不起。"], "liqingzhao": ["北宋年间，济南章丘出了一位了不起的女词人，她叫李清照。她的父亲李格非是著名的文学家，也是苏东坡的学生，母亲也很有文化。在这样的家庭里，李清照从小就饱读诗书。", "少女时代的李清照活泼可爱，她写的词清新自然。'常记溪亭日暮，沉醉不知归路。兴尽晚回舟，误入藕花深处。争渡，争渡，惊起一滩鸥鹭。'短短几句，就把一个贪玩的小姑娘写活了。", "十八岁那年，李清照嫁给了太学生赵明诚。两人志趣相投，都喜欢收集金石书画。他们经常一起喝茶、猜书、研究古董，日子过得又甜蜜又充实。赵明诚做官后，聚少离多，李清照写下了'莫道不销魂，帘卷西风，人比黄花瘦'的名句。", "可惜好景不长，金兵南下，北宋灭亡了。李清照和赵明诚只好带着满满的收藏逃到南方。一路上颠沛流离，很多珍贵的金石书画都丢失了。更不幸的是，赵明诚在赴任途中生了重病，不治身亡。", "丈夫去世后，李清照一个人孤苦伶仃地在江南漂泊。她尝尽了国破家亡的痛苦，词风也从以前的清新婉丽，变得深沉悲凉。'寻寻觅觅，冷冷清清，凄凄惨惨戚戚。'这十四个字，写尽了她晚年的孤寂。", "虽然生活很苦，但李清照没有放弃写作和研究。她把赵明诚生前写的《金石录》整理完成，还写了《金石录后序》，记录了他们夫妻的收藏经历和遭遇，读来让人心酸不已。", "李清照被称为'婉约派宗主'，也被称为'千古第一才女'。她的词既有女性的细腻，又有男子的豪气。'生当作人杰，死亦为鬼雄。至今思项羽，不肯过江东。'这样豪迈的诗句，谁能想到是出自一位弱女子之手呢？"], "jingkang_zhichi": ["公元1127年的冬天，北宋都城开封格外寒冷。鹅毛大雪下了整整三天三夜，城里的柴火都快烧完了。就在这时，金兵的铁蹄冲破了城墙，繁华的汴京城瞬间变成了人间地狱。两个皇帝——宋徽宗和宋钦宗，都披着破羊皮，成了金人的俘虏。", "宋徽宗可是个大名鼎鼎的艺术家，写得一手漂亮的瘦金体，画得一手好花鸟，还特别喜欢奇花异石。他在位的时候，专门设立了'应奉局'，从全国各地搜刮花石纲，用大船运到开封来修建豪华的皇家园林'艮岳'，老百姓被折腾得叫苦连天。", "其实有好多忠臣都提醒过皇帝，金国狼子野心，一直在训练军队准备南下，一定要加强边防。可宋徽宗根本听不进去，他以为签了'海上之盟'就万事大吉，整天只顾着写字画画、欣赏奇石，还和蔡京、童贯这些奸臣一起吃喝玩乐。", "金兵第一次南下的时候，宋徽宗吓得直接晕了过去。醒来后他赶紧把皇位传给儿子宋钦宗，自己带着一帮人想逃到南方去。幸好有李纲等忠臣坚守开封，老百姓也纷纷拿起武器保卫家园，金兵才暂时退走。", "可金兵一走，宋朝君臣又开始了醉生梦死的生活。他们把李纲贬出了京城，还遣散了很多从各地赶来的援军。宋钦宗以为和平了，又开始在皇宫里大摆宴席，听戏看舞。结果第二年金兵又打了过来，这次开封城再也守不住了。", "金兵把两个皇帝、皇后、公主、皇子、大臣还有工匠一万多人都押往北方的金国。路上风雪交加，俘虏们穿着单薄的衣服，吃不饱穿不暖，很多人冻死饿死在路上。到了金国，两个皇帝还被强迫行'牵羊礼'，受尽了侮辱。这就是历史上有名的'靖康之耻'。", "曾经繁华无比、富甲天下的北宋，就这样灭亡了。很多老百姓不愿意做亡国奴，纷纷逃到南方。后来赵构在杭州建立了南宋，岳飞、韩世忠这些爱国将军，一直在为收复中原而战斗。"], "guangwu_zhongxing": ["西汉末年，外戚王莽篡夺了汉朝的天下，建立了新朝。可是他的改革搞得一团糟，一会儿改币制，一会儿改官名，老百姓越活越穷。再加上连年闹蝗灾，地里颗粒无收，百姓们活不下去，各地都爆发了农民起义。刘秀和哥哥刘縯也在南阳舂陵起兵。", "刘秀年轻的时候是个老实巴交的农民，特别喜欢种庄稼。他每天天不亮就起床去田里干活，除草、施肥、浇地，样样都干得很起劲。他哥哥刘縯却豪爽仗义，喜欢结交英雄好汉，还经常嘲笑刘秀只会种地，像个没出息的庄稼汉。", "起义军刚起步的时候装备特别差，刘秀连一匹战马都没有，只能骑一头黄牛上战场。后来打了胜仗，抢了敌人的战马，他才终于骑上了马。大家都笑着叫他'牛背上的开国皇帝'，刘秀听了也不生气，还跟着大家一起笑。", "昆阳之战是刘秀的成名之战。王莽派了四十万大军围攻小小的昆阳城，城里只有八九千守军。很多将领都想弃城逃跑，刘秀却站出来说：'现在我们齐心合力，还有机会打赢；如果各自逃命，只会被敌人一个个消灭。'他的话鼓舞了大家。", "当天夜里，刘秀带着十三名勇士，骑着快马冲出了敌人的包围圈，去附近搬救兵。救兵赶到后，刘秀亲自率领三千名敢死队，像一把尖刀一样直冲敌人的中军大营。敌军阵脚大乱，城里的守军也趁机冲了出来，里外夹击，把四十万大军打得落花流水。", "后来哥哥刘縯被嫉妒他的更始帝害死了，刘秀心里特别难过，常常一个人偷偷哭。但他表面上却装作没事一样，不给哥哥服丧，吃饭喝酒和平常一样谈笑风生。他知道现在还不是翻脸的时候，只能忍着，等待时机。", "后来刘秀找机会去了河北发展势力。他每到一个地方，就废除王莽的苛政，平反冤狱，还把粮食分给穷苦的老百姓。很快就有很多人来投奔他，队伍越来越壮大。他先后消灭了各地的割据势力，终于在公元25年当上了皇帝，重建了汉朝，历史上称为东汉。刘秀就是汉光武帝。"], "chanyuan_zhimeng": ["北宋建立后，和北方的辽国一直打打停停。辽国是契丹人建立的国家，他们的骑兵特别厉害，骑着高头大马，来去如风。宋朝一直想收复被辽国占去的燕云十六州，可打了好几次都没打赢，还损失了好多士兵。", "宋真宗景德元年，辽国的萧太后和辽圣宗亲自率领二十万大军南下，绕过了宋军把守的城池，一直打到了黄河北岸的澶州城。消息传到开封，整个朝廷都吓坏了，大臣们议论纷纷，有的主战，有的主和，乱成了一锅粥。", "很多胆小的大臣劝宋真宗赶紧逃跑，有的说去江南避难，有的说去四川躲起来。只有宰相寇准站出来，大声说：'谁再说逃跑，就砍谁的头！陛下应该御驾亲征，到前线去鼓舞士气，这样才能打退敌人。'", "宋真宗心里特别害怕，双腿都在发抖，但又没办法反驳寇准，只好硬着头皮答应了。他磨磨蹭蹭地走了好多天才到澶州。当皇帝的黄龙旗出现在澶州城楼上的时候，士兵们齐声欢呼，声音传出去几十里远，士气一下子就高涨起来。", "刚好这时候，辽国的大将萧挞凛带着几个亲兵在前线视察地形。宋军的士兵发现了他，就转动床子弩，'嗖'的一箭射过去，正好射中了萧挞凛的额头，当场就死了。辽军失去了主将，士气低落，萧太后也有点害怕了，就派人来讲和。", "宋真宗一听要议和，高兴得不得了。他派曹利用去谈判，说：'只要不割地，每年给辽国一百万钱也行。'寇准偷偷把曹利用叫过来，板着脸说：'要是超过三十万，回来我就砍你的脑袋！'曹利用吓得连连点头。", "最后谈成的条件是：宋朝每年给辽国白银十万两、绢二十万匹，两国约为兄弟之国，宋真宗是哥哥，辽圣宗是弟弟。这就是历史上有名的'澶渊之盟'。从此以后，宋辽两国一百多年没有打过仗，边境上的老百姓终于过上了安稳的日子。"], "wangyangming": ["王阳明出生在明朝浙江余姚的一个大官家庭，他的爸爸王华是状元郎。王阳明从小就很特别，别的孩子都想着考科举做官，他却一本正经地说自己要当'圣人'。大家听了都哈哈大笑，觉得这孩子在说大话。", "王阳明年轻的时候特别喜欢研究军事，还喜欢谈论兵法。他十五岁的时候，就一个人骑着马跑到山海关外去考察地形，差点在草原上迷路回不来。他还试着给皇帝上书，提出平定农民起义的办法，大家都觉得这孩子胆子真大。", "考中进士后，王阳明当了官。那时候大太监刘瑾专权，好多正直的大臣都被他抓了起来。王阳明看不下去，就上书为忠臣求情。结果惹怒了刘瑾，被打了四十大板，贬到贵州龙场去当驿丞。那地方特别偏僻，都是深山老林，连房子都没有。", "在龙场的日子特别苦，王阳明和随从们都生病了。没有药，他就自己采草药；没有房子，他就教大家搭草棚。他每天都在思考学问，还造了个石棺材，天天躺在里面想问题。终于有一天夜里，他突然想通了'心即理'的道理，高兴得手舞足蹈，这就是著名的'龙场悟道'。", "后来刘瑾倒台了，王阳明又被重新起用。他不仅学问好，打仗也特别厉害。宁王朱宸濠在江西造反，声势浩大。王阳明手上没兵没粮，却一点都不慌。他用计策迷惑宁王，又临时招募民兵，只用了四十多天，就平定了叛乱，活捉了宁王，挽救了整个江南。", "王阳明提出了'知行合一'的著名学说，他说知道道理却不去做，就不是真的知道。他还说每个人心里都有良知，就像太阳一样，只是有时候被乌云遮住了。只要我们听从良知的指引，多做好事，就能成为像圣人一样的人。", "王阳明是中国历史上少有的'立德、立功、立言'都做到的人，被人们尊称为'阳明先生'。他的学说影响了好几百年，还传到了日本、朝鲜等国家。直到今天，还有很多人在学习他的思想，从中获得智慧和力量。"], "yuanlongping": ["袁隆平出生在1930年的北京。小时候他跟着父母到处搬家，见过很多饿得面黄肌瘦的人。有一次，他看到路边躺着几个饿晕的人，心里特别难受。那时候他就暗暗想：如果能让所有人都吃饱饭，那该是一件多么伟大的事情啊！", "长大后，袁隆平考上了西南农学院。毕业以后，他去了湖南安江的一所农校当老师。那时候中国很多地方粮食都不够吃，大家只能吃野菜、啃树皮。袁隆平看在眼里，急在心里，他下定决心要研究出高产的水稻。", "有一天，袁隆平在稻田里散步，突然发现了一株特别大的稻穗，颗粒饱满，沉甸甸的，比别的稻穗大好多。他小心翼翼地把稻穗摘下来，带回实验室研究。他想：如果能培育出这样的高产水稻，那不就能多打好多粮食了吗？", "那时候全世界的科学家都觉得水稻是自花授粉的植物，不可能培育出杂交品种。但袁隆平不相信这个说法，他顶着炎炎烈日，弯着腰在稻田里一株一株地寻找，汗水浸透了衣服，皮肤也晒得黝黑。终于，他找到了雄性不育的水稻植株。", "研究的过程特别辛苦。为了加快实验进度，袁隆平每年冬天都要跑到海南去种水稻，因为那里暖和，一年能种三季。他在野外四处寻找野生稻，脚被泥水泡得发白，腿上被蚊子叮得全是包，但他一点都不在乎。", "经过十多年的努力，做了无数次实验，失败了一次又一次，袁隆平终于成功培育出了杂交水稻。这种水稻比普通水稻产量高百分之二十多，一下子就让中国的粮食产量翻了番，好多好多人终于能吃上白米饭了。大家都亲切地叫他'袁隆平爷爷'。", "袁隆平爷爷被称为'杂交水稻之父'，他获得了好多好多大奖，包括国家最高科学技术奖。但他还是天天泡在稻田里，九十多岁了还在研究超级水稻。他有两个著名的梦想：一个是禾下乘凉梦，就是水稻长得像树一样高，他能坐在稻穗下乘凉；另一个是杂交水稻覆盖全球梦，让全世界的人都能吃饱饭。"], "guandu_zhan": ["东汉末年，天下大乱。袁绍和曹操是两个最强大的军阀，他们都想统一天下。袁绍兵多将广，有七十万大军，粮草充足；曹操只有七万兵马，实力相差一大截。", "袁绍率领大军浩浩荡荡杀向许昌，连营几十里，战鼓声震得大地都在发抖。曹操手下的将士们都很害怕，有些人偷偷地收拾包袱，准备随时逃跑。", "可是曹操一点也不慌。他拍拍胸脯对大家说：\"袁绍虽然兵多，但他优柔寡断，不会用兵。我们虽然人少，但我们齐心协力，一定能打胜仗！\"", "两军对峙了好几个月，曹操的粮食快吃完了。正在发愁的时候，袁绍的谋士许攸因为和袁绍闹别扭，连夜跑来投降。曹操高兴得连鞋子都来不及穿，光着脚就跑出去迎接。", "许攸出了个好主意：\"袁绍的粮草都囤在乌巢，守兵不多。烧了他的粮草，袁军不战自乱！\"曹操一听，拍手叫好！当天夜里，他亲自率领五千精兵，打着袁军的旗号，悄悄摸到乌巢。", "曹军把袁绍的粮草烧得一干二净，火光冲天，把黑夜都照成了白天。袁绍听说粮草被烧，顿时慌了神。将士们没饭吃，哪还有心思打仗？", "曹操趁机发起总攻，七万曹军把七十万袁军打得落花流水。袁绍只带了八百骑兵，狼狈地逃回了北方。", "官渡之战是历史上有名的以少胜多的战役。它告诉我们：实力不是决定胜负的唯一因素，智慧和勇气有时候比千军万马更重要！"], "zhenguan_zhizhi": ["唐朝初年，唐太宗李世民当上了皇帝。他亲眼看到隋朝因为皇帝太霸道而亡国，所以他经常对大臣们说：\"君主就像船，百姓就像水。水能载船，也能把船打翻。\"", "唐太宗特别虚心，喜欢听大臣们的批评意见。有个叫魏征的大臣，特别敢说话，经常当着满朝文武的面指出唐太宗的错误，有时候说得唐太宗脸一阵红一阵白的。", "有一次，魏征在朝廷上和唐太宗争得面红耳赤。唐太宗气呼呼地回到后宫，对皇后说：\"气死我了！我一定要杀了这个乡巴佬！\"", "皇后听了，赶紧换上漂亮的礼服，向唐太宗深深鞠了一躬。唐太宗纳闷极了：\"你这是干什么呀？\"皇后笑着说：\"我听说君主英明，大臣才敢直言。魏征这么敢说话，不正说明陛下是个英明的君主吗？\"", "唐太宗听了，转怒为喜，不但不怪魏征，反而更加重用他了。魏征去世的时候，唐太宗伤心地哭了。他说：\"用铜做镜子，可以正衣冠；用历史做镜子，可以知道朝代兴亡；用人做镜子，可以明白自己的对错。魏征死了，我失去了一面好镜子啊！\"", "在唐太宗的治理下，唐朝越来越强大。老百姓安居乐业，路上掉了东西都没人捡，监狱里常常空空的，因为犯罪的人太少了。", "那时候的唐朝，是世界上最强大的国家。四面八方的国家都来朝拜学习，外国人都把中国人叫\"唐人\"。直到现在，国外的华人街还叫\"唐人街\"呢。", "贞观之治告诉我们：虚心听取别人的意见，才能不断进步，才能把事情做得更好！"], "lixue_xiye": ["唐朝中期，有个叫吴元济的节度使在蔡州造反，朝廷派了好多将军去讨伐，都打了败仗。后来，皇帝派了一个叫李愬的将军去平定叛乱。", "李愬到了前线，不练兵、不打仗，整天和士兵们聊天开玩笑。他还到处散播谣言：\"皇上知道我胆小，派我来只是安抚大家罢了。\"吴元济听说后，哈哈大笑：\"这个李愬是个胆小鬼，有什么好怕的！\"", "其实李愬是在麻痹敌人。他暗中训练精兵，打探敌情，等待最佳时机。他还善待俘虏，让他们心甘情愿地为自己做事，收集情报。", "有一天，天空飘起了鹅毛大雪，北风呼呼地刮着，冷得滴水成冰。李愬突然召集将士：\"今夜突袭蔡州！\"将士们都惊呆了：这么大的雪，路都看不见，怎么打仗？", "但军令如山，大家只好冒着大雪出发了。雪越下越大，路越来越滑，好多士兵和战马都冻死了。将领们问李愬：\"我们这是去哪儿啊？\"李愬说：\"只管往前走！\"", "半夜时分，李愬的军队神不知鬼不觉地来到了蔡州城下。守城的士兵正缩在被窝里打呼噜呢，他们做梦也想不到大雪天会有敌军来偷袭。", "李愬指挥士兵们爬上城墙，悄无声息地干掉了守门的士兵，然后打开城门。大军像潮水一样涌进了蔡州城。等吴元济从睡梦中惊醒的时候，他的帅府已经被团团围住了。", "雪夜袭蔡州成了历史上最经典的奇袭战之一。它告诉我们：出其不意，攻其不备，是取胜的好办法。但更重要的是，机会总是留给有准备的人！"], "guoshoujing": ["元朝的时候，出了一位了不起的科学家，名叫郭守敬。他从小就对天上的星星特别感兴趣，经常晚上不睡觉，仰着小脖子看星星，还喜欢自己动手做各种小玩意儿。", "郭守敬的爷爷郭荣是个大学问家，他发现孙子很有天赋，就把他送到了著名学者刘秉忠那里去学习。郭守敬如饥似渴地读书，天文、地理、数学、水利，什么都学，而且学得特别快。", "长大后，郭守敬成了一位出色的水利专家。他修复了好多古运河，还在西夏一带修了几十条灌溉渠道，让贫瘠的土地变成了肥沃的良田。老百姓都感激地称他为\"活龙王\"。", "后来，元世祖忽必烈让郭守敬负责修订新历法。郭守敬说：\"要修订历法，必须先有准确的观测数据。\"于是，他发明了好多精密的天文仪器，比如简仪、高表、仰仪等等。", "简仪可厉害了！它是当时世界上最先进的天文观测仪器，比西方类似的仪器早了三百多年！郭守敬用这些仪器，测出了一年有365.2425天，这个结果和现在的精确值只差了26秒！", "郭守敬还主持了规模空前的天文观测。他在全国各地设立了27个观测站，北到西伯利亚，南到南海，收集了大量珍贵的天文数据。", "经过四年的努力，郭守敬终于编成了新的历法——《授时历》。这部历法非常准确，是当时世界上最先进的历法，一直沿用了三百六十多年。", "郭守敬的故事告诉我们：兴趣是最好的老师，只要对一件事充满热爱，并且坚持不懈地努力，就一定能取得了不起的成就！"], "hanyu": ["唐朝的时候，有个大文学家叫韩愈。他三岁的时候父亲就去世了，由哥哥嫂子抚养长大。韩愈从小就聪明好学，每天都要读好多好多书，有时候读到半夜都不肯睡觉。", "可是韩愈的运气不太好，他连续考了四次科举都没考上。换了别人可能早就灰心了，但韩愈不放弃。他说：\"我就是要考，考到考上为止！\"第五次考试，他终于考中了进士。", "韩愈不仅文章写得好，人品也特别正直。他当监察御史的时候，看到关中地区闹旱灾，老百姓饿得吃不上饭，而官员们却隐瞒灾情，照样征税。", "韩愈气愤极了，连夜写了奏章给皇帝，如实报告灾情，请求减免赋税。这下可得罪了那些贪官污吏，他们在皇帝面前说韩愈的坏话。结果，韩愈被贬到了偏远的阳山当县令。", "但韩愈一点也不后悔。到了阳山，他还是认认真真地为老百姓办事，教孩子们读书识字，帮助农民发展生产。阳山的老百姓都很爱戴他，很多人家生了儿子都取名叫\"韩\"。", "后来，韩愈又被召回了京城。有一次，皇帝要把佛骨迎进宫中供奉，全京城都跟着疯狂。韩愈却站出来反对，写了一篇《论佛骨表》，劝皇帝不要迷信。", "皇帝看了勃然大怒，差点把韩愈处死。幸亏有大臣求情，韩愈才保住了性命，又一次被贬到了更远的潮州。在潮州，他依然为老百姓做好事，潮州的鳄鱼为害，韩愈还写了《祭鳄鱼文》呢。", "韩愈是唐宋八大家之首，他的文章写得特别有气势，人们称赞他\"文起八代之衰\"。他的故事告诉我们：做人要正直，做学问要勤奋，哪怕遇到再多挫折，也不能放弃自己的原则！"], "baidicheng_tuogu": ["话说夷陵之战后，刘备打了个大败仗，带着残兵败将退到了白帝城。这时候的刘皇叔，已经六十三岁了，又累又气，一下子就病倒了，而且病得越来越重。", "刘备知道自己快不行了，赶紧派人去成都，请诸葛亮来见最后一面。诸葛亮接到消息，星夜兼程赶了过来。当他看到病床上瘦得皮包骨头的刘备时，眼泪唰地就流了下来。", "刘备拉着诸葛亮的手，虚弱地说：'丞相啊，你的才能比曹丕强十倍，一定能安定国家，成就大事。如果我的儿子刘禅可以辅佐，你就辅佐他；如果他实在不行，你就自己当皇帝吧！'", "诸葛亮一听，吓得赶紧跪在地上，头磕得咚咚响，哭着说：'陛下放心！臣一定竭尽全力，辅佐太子，鞠躬尽瘁，死而后已！'刘备听了，欣慰地点了点头。", "刘备又把两个小儿子叫到身边，对他们说：'你们要记住，我死之后，你们要像对待父亲一样对待丞相，不可怠慢。'两个孩子流着眼泪，乖乖地点头答应。", "安排完后事，刘备又对身边的大臣们一一嘱托。最后，他长叹一声，慢慢闭上了眼睛。这一年，是公元223年，一代枭雄刘备就这样离开了人世。", "后来，诸葛亮果然没有辜负刘备的信任。他尽心尽力辅佐刘禅，治理蜀国，还六出祁山北伐中原，直到病死在五丈原的军营里，真正做到了'鞠躬尽瘁，死而后已'。"], "hairui_baguan": ["明朝嘉靖年间，有一个叫海瑞的官，他可是出了名的清官和直臣。海瑞当官的时候，穿布袍，吃粗粮，家里的菜都是老仆人自己种的，连肉都很少吃。", "那时候的嘉靖皇帝，天天躲在皇宫里求仙问道，想长生不老，几十年都不上朝处理政事。大臣们谁都不敢说真话，都顺着皇帝的意思来。海瑞看在眼里，急在心里。", "有一天，海瑞下定了决心。他买好了一口棺材，把家人都托付给了朋友，然后给皇帝上了一道奏折，把皇帝狠狠地骂了一顿！说他昏庸无道，害得百姓苦不堪言。", "嘉靖皇帝看完奏折，气得浑身发抖，把奏折扔在地上，大声喊：'快把这个人抓起来！别让他跑了！'旁边的太监说：'陛下，这个人是出了名的傻，他早就买好棺材在家等死了，不会跑的。'", "皇帝一听，愣住了。他把奏折捡起来，又读了一遍，叹了口气说：'这个人啊，就像是比干一样的忠臣。可是，他把朕说得也太不堪了！'最后，皇帝还是把海瑞关进了大牢。", "过了没多久，嘉靖皇帝就死了。监狱里的狱卒听说新皇帝要登基，海瑞肯定会被放出来，就准备了好酒好菜招待他。海瑞以为皇帝要杀他了，吃饱喝足准备受死。", "狱卒小声告诉他：'皇上驾崩了，先生您马上就要出狱升官啦！'海瑞一听，哇的一声大哭起来，把刚才吃的东西都吐了出来，哭得昏过去好几次。原来他虽然被皇帝关起来，心里还是忠诚的呀。", "后来，海瑞果然被放了出来，继续当他的清官。他走到哪里，哪里的贪官污吏就吓得瑟瑟发抖。老百姓都亲切地叫他'海青天'。"], "wobing_qiuli": ["晋朝的时候，有一个叫王祥的孩子。他很小的时候，亲生妈妈就去世了，爸爸又给他娶了个后妈。后妈对王祥可不好了，经常在爸爸面前说他的坏话，害得王祥经常挨骂。", "可是王祥一点也不恨后妈。他想，后妈也是妈妈呀，只要我好好孝顺她，她总有一天会喜欢我的。所以不管后妈怎么对他，他都恭恭敬敬的，有好吃的先给后妈吃。", "有一年冬天，天气特别特别冷，河面都结了厚厚的冰。后妈突然生病了，什么东西都不想吃，就想吃新鲜的鲤鱼。可是河里都冻住了，哪里能抓到鱼啊？", "王祥急得团团转。他跑到河边，看着结了冰的河面，忽然想出了一个办法。他解开衣服，躺在了冰冷的冰面上！刺骨的寒冷像无数小针一样扎进他的身体，他冻得浑身发抖，牙齿打颤。", "可是王祥咬牙坚持着，他心里想：妈妈想吃鱼，我一定要抓到鱼！冰面被他的体温慢慢融化了，忽然，冰裂开了一个口子，两条活蹦乱跳的鲤鱼从里面跳了出来！", "王祥高兴极了，赶紧把鱼抱回家，给后妈做了鲜美的鱼汤。后妈喝着热乎乎的鱼汤，知道了王祥卧冰求鲤的事，感动得流下了眼泪。从那以后，后妈把王祥当成亲生儿子一样疼爱。", "村里人听说了这件事，都夸王祥是个孝顺的好孩子。有人还写诗称赞他：'继母人间有，王祥天下无。至今河水上，一片卧冰模。'意思是说，后母很多，但像王祥这么孝顺的孩子，天下找不出第二个。"], "zhouyu": ["周瑜是三国时期东吴的大将军，他字公瑾，长得英俊潇洒，一表人才，所以大家都叫他'周郎'，也就是'周帅哥'的意思。周瑜不但人长得帅，还特别有才华，文武双全。", "周瑜和孙策是好朋友，两人同岁，从小一起长大。后来孙策带着人马打天下，周瑜就来投奔他。孙策高兴极了，说：'我有公瑾相助，大事一定能成！'两人还分别娶了大乔和小乔，成了连襟。", "可惜孙策年纪轻轻就死了，临死前把弟弟孙权托付给周瑜和张昭。周瑜跪在孙权面前，郑重地说：'主公放心，臣一定竭尽全力辅佐少主！'从那以后，周瑜就忠心耿耿地辅佐孙权。", "最有名的要数赤壁之战了。当时曹操带着八十万大军南下，想一举消灭东吴。东吴的大臣们都吓破了胆，纷纷劝孙权投降。只有周瑜站出来，坚决主张抗曹。", "周瑜给孙权分析了曹操的四大弱点，说得头头是道。孙权听了，拔出宝剑砍在桌子上，说：'谁再敢说投降，就和这张桌子一样！'然后任命周瑜为大都督，带领三万兵马迎战曹操。", "周瑜用黄盖的苦肉计，又用庞统的连环计，最后一把大火，把曹操的战船烧了个精光。这就是历史上赫赫有名的'火烧赤壁'。周瑜以少胜多，创造了战争史上的奇迹。", "可惜的是，周瑜身体不好，三十六岁就病死了，真是'天妒英才'。临死前，他还上书孙权，推荐鲁肃接替自己的位置。孙权听说周瑜死了，痛哭流涕：'公瑾走了，我以后依靠谁啊？'", "周瑜不但会打仗，还精通音乐。据说他喝醉了酒，也能听出弹奏中的错误，所以有'曲有误，周郎顾'的说法。这样一个又帅又有才又忠诚的人，难怪大家都喜欢他！"], "ouyangxiu": ["欧阳修是北宋时期的大文学家，'唐宋八大家'之一。他字永叔，号醉翁，晚年又号六一居士。欧阳修小时候家里很穷，四岁的时候父亲就去世了，妈妈带着他过日子。", "因为家里没钱买纸笔，欧阳修的妈妈就用芦苇杆在沙地上教他写字。欧阳修学习可刻苦了，每天都趴在地上写啊写啊，很快就认识了好多字，还能背诵好多古人的文章。", "欧阳修长大以后，参加科举考试，考了第一名，当上了官。他不但文章写得好，还特别喜欢提拔年轻人。唐宋八大家里，苏轼、苏辙、王安石、曾巩都是他发现和推荐的，他可真是个'伯乐'啊。", "欧阳修最有名的文章是《醉翁亭记》。那时候他被贬到滁州当太守，心情不太好，就常常去山里的醉翁亭喝酒。他说'醉翁之意不在酒，在乎山水之间也'，意思是他喝酒不是为了醉，而是为了欣赏美丽的山水。", "在滁州的时候，欧阳修虽然被贬了，但他一点也不消沉。他把滁州治理得井井有条，老百姓都安居乐业。他还喜欢和老百姓一起游玩，大家都很喜欢这位平易近人的太守。", "欧阳修不但是文学家，还是个历史学家。他主持编写了《新唐书》和《新五代史》，为后人研究历史留下了宝贵的资料。他还改革了科举考试的内容，让考试更注重真才实学。", "晚年的时候，欧阳修回到京城，当上了副宰相。但他不贪图荣华富贵，多次请求退休。退休后，他在颍州定居，每天读书写字，过得逍遥自在。他给自己取号'六一居士'，意思是有一万卷书、一千卷金石遗文、一张琴、一局棋、一壶酒、一个老翁，正好六个'一'。", "欧阳修活了六十六岁，死后谥号'文忠'。他的文章平易流畅，感情真挚，影响了一代又一代的人。他那种乐观豁达、随遇而安的人生态度，也值得我们学习。"], "qiqinenghuo": ["三国时期，蜀国的南方有个叫孟获的蛮王，他长得虎背熊腰，力大无穷，骑着大象打仗，手下的士兵都赤着脚、披散着头发，特别勇猛。孟获不服诸葛亮管，经常带着人来捣乱。", "诸葛亮心想：光靠打仗打赢了没用，得让孟获真心服气才行。于是他定下计策，要活捉孟获。第一次交战，蜀军假装打不过，往后逃跑。孟获哈哈大笑，追了上来，结果掉进了陷阱里，被活捉了。", "孟获被押到诸葛亮面前，昂着头说：要杀就杀，我不服！诸葛亮笑了笑，亲自给他松绑，还请他喝酒吃肉，说：不服没关系，我放你回去，下次再抓你。孟获瞪大眼睛，不敢相信自己的耳朵。", "第二次，孟获学聪明了，躲在山洞里不出来。诸葛亮派士兵从后山爬上去，偷偷摸到洞里，又把孟获抓了出来。孟获还是不服气，说：这次是你们偷袭，不算本事！诸葛亮又把他放了。", "就这样，抓了放，放了抓，一直抓到第七次。第七次被抓时，孟获的妻子、弟弟、手下的大将都被蜀军俘虏了。诸葛亮还是笑着说：孟获啊，我再放你回去，咱们接着打。", "孟获扑通一声跪在地上，流着眼泪说：丞相，您七次抓我又七次放我，这是多大的恩情啊！我再也不造反了，我真心服您！他还主动去说服其他部落的首领，一起归顺蜀国。", "从那以后，南方再也没有发生过叛乱。诸葛亮不用留一兵一卒镇守，南方反而成了蜀国稳固的大后方。当地的老百姓都很感激诸葛亮，说他是真正的智慧之神。"], "zhaoshiguer": ["春秋时期，晋国有个大奸臣叫屠岸贾，他特别坏，陷害了忠良赵氏全家，三百多口人都被杀害了。只有赵朔的妻子，也就是晋景公的姑姑，怀着身孕躲在王宫里，才逃过一劫。", "不久后，她生下了一个男孩，取名叫赵武。屠岸贾听说后，立刻派兵包围王宫，要斩草除根。赵家的两个门客——程婴和公孙杵臼，急得像热锅上的蚂蚁，商量着怎么救这个孩子。", "程婴家里正好也有个刚出生的儿子。他咬咬牙说：我用自己的儿子替赵家的孩子死，你去告密，就说我把孩子藏起来了。公孙杵臼流着眼泪说：死容易，抚养孤儿长大难，这个难的任务就交给你吧。", "计划开始了。公孙杵臼带着程婴的儿子躲进了山里，程婴则去告密。屠岸贾信以为真，带着士兵追上山，杀死了公孙杵臼和那个孩子。他以为赵家真的绝后了，得意洋洋地回去了。", "程婴抱着真正的赵氏孤儿，躲进了深山里。他隐姓埋名，一边当农民种地，一边悉心抚养赵武长大。程婴的妻子因为失去了亲生儿子，眼睛都哭瞎了，但她从来没有埋怨过程婴。", "十五年后，赵武长成了一个英俊勇敢的少年。这时候，晋景公生了大病，找人占卜，说是因为错杀了忠臣赵家。大臣韩厥趁机说出了真相，晋景公恍然大悟，下令为赵家平反，还让赵武继承了爵位。", "大仇得报的那天，程婴却拔出剑来自杀了。他说：我要去告诉公孙杵臼，任务完成了。赵武伤心极了，为两位恩人守孝三年。后来人们把这个悲壮的故事叫做赵氏孤儿，代代流传。"], "wuzixu": ["春秋时期，楚国有个忠臣叫伍奢，被奸臣费无忌陷害，和大儿子伍尚一起被楚平王杀死了。小儿子伍子胥特别聪明，他提前得到消息，连夜逃跑了。楚平王下令全国通缉伍子胥，画像贴得到处都是。", "伍子胥逃到了昭关，这是通往吴国的必经之路。关上挂着他的画像，士兵们盘查得特别严，每个人都要对照画像检查。伍子胥躲在关下的小树林里，愁得吃不下饭，睡不着觉。", "他摸了摸怀里的宝剑，心想：难道我伍家的仇就没法报了吗？他一夜都没合眼，翻来覆去想办法。天快亮的时候，他坐起来，用手一摸头发，呀！全白了！伍子胥又惊又怕，难道自己变老了？", "这时候，一个叫东皋公的老人发现了他。东皋公是个好心人，他把伍子胥请到家里，说：将军，我有办法帮你过关。正好我有个朋友叫皇甫讷，长得和你很像。让他假扮成你，你趁着混乱混过去。", "第二天，皇甫讷穿上伍子胥的衣服，大摇大摆地走向昭关。守关的士兵一看，大喊：抓住伍子胥！士兵们一拥而上，把皇甫讷围了起来。关前一下子乱成了一锅粥。", "伍子胥趁机混在人群里，低着头慢慢往关口走。因为他的头发全白了，看起来像个老头子，士兵们谁也没怀疑。就这样，伍子胥顺利地通过了昭关，来到了吴国。", "后来，伍子胥帮助吴王阖闾强大起来，还带兵打败了楚国。那时候楚平王已经死了，伍子胥把他的尸体挖出来，抽了三百鞭子，终于报了父兄的大仇。伍子胥过昭关，一夜白了头的故事也流传千古。"], "aiysistan": ["1879年，爱因斯坦出生在德国一个犹太人家庭。小时候的他看起来一点也不聪明，三岁了还不会说话，爸爸妈妈都很着急。直到七岁那年，他才终于开口说话，但还是比别的孩子慢半拍。", "上学后，爱因斯坦也不是老师喜欢的学生。他总是问一些奇怪的问题，比如光为什么会跑那么快？如果我骑着光会看到什么？老师们觉得他胡思乱想，甚至说他将来肯定没出息。", "有一次，爸爸给了他一个指南针。小爱因斯坦拿着它，翻来覆去地看，发现不管怎么转，针总是指着南方。他惊呆了，心里想：看不见摸不着的力量，怎么能让针动起来呢？这个问题让他着迷了一辈子。", "长大后的爱因斯坦还是爱胡思乱想。有一天，他坐在专利局的办公室里，看着窗外发呆，突然想到：如果一个人在自由下落的电梯里，他会感觉不到重力。这个念头一闪，他就抓住不放，想了整整十年。", "就靠着这样的思考，爱因斯坦提出了相对论。他说时间和空间不是分开的，而是连在一起的；光会被引力弯曲；物体运动越快，时间就过得越慢。这些想法太奇怪了，当时很多科学家都不相信。", "后来，科学家们通过观测日食，证明了爱因斯坦是对的——光真的会被太阳的引力弯曲！消息传开，全世界都轰动了。爱因斯坦一下子成了名人，但他还是穿着旧毛衣，乱蓬蓬的头发，每天吃冰淇淋和拉小提琴。", "有人问爱因斯坦成功的秘诀是什么，他笑着说：想象力比知识更重要。知识是有限的，而想象力能拥抱整个世界。这个小时候说话晚、被老师看不起的孩子，成了人类历史上最伟大的科学家之一。"], "xuguangqi": ["明朝万历年间，上海有个叫徐光启的孩子。他家里很穷，爸爸靠种庄稼、做生意养家。徐光启从小就爱读书，白天帮家里干活，晚上就着昏暗的油灯看书，经常读到半夜三更。", "长大后，徐光启考中了进士，到北京做官。那时候，有个意大利传教士叫利玛窦来到了中国，他带来了很多西方的科学知识，比如数学、天文、地理。徐光启听说后，特别感兴趣，主动去拜访利玛窦。", "利玛窦给徐光启看了一本欧几里得的《几何原本》。徐光启翻了翻，眼睛都亮了：这书太好了！咱们中国就缺这样的学问！他决定和利玛窦一起，把这本书翻译成中文。", "那时候翻译可不容易。徐光启每天下午一下班，就跑到利玛窦住的地方，两个人对着书，你一句我一句地翻译。什么点、线、面、三角形、正方形，这些词都是徐光启第一次想出来的，一直用到今天。", "除了数学，徐光启还学了天文、历法、水利、军事。他把西方的科学知识和中国的传统学问结合起来，写了很多书。他还引进了甘薯，就是红薯，告诉老百姓怎么种植，解决了很多人的吃饭问题。", "最有名的是他写的《农政全书》，里面记录了各种农业生产技术，从种庄稼到养牲口，从修水利到造农具，样样都有。这本书是中国古代最完整的农业百科全书，后来还传到了日本和朝鲜。", "徐光启活了七十一岁，一辈子都在学习和探索。他不因为是中国传统的就觉得好，也不因为是外国传来的就排斥。这种开放包容、虚心学习的精神，让他成了中国历史上了不起的大科学家。"], "fenglangjuxu": ["在两千多年前的西汉，有一个叫霍去病的少年，他是大将军卫青的外甥。霍去病从小就喜欢骑马射箭，练就了一身好本领。汉武帝见他聪明勇敢，非常喜欢他，经常把他带在身边。", "霍去病十七岁那年，匈奴又来侵犯汉朝边境。他主动请缨，要求带兵去打仗。汉武帝笑着说：'你还小呢，再等几年吧。'霍去病挺起胸膛说：'陛下，匈奴欺人太甚，我愿率八百骑兵，直捣匈奴大营！'汉武帝被他的勇气打动了，同意了他的请求。", "第一次上战场，霍去病就展现出了惊人的军事才能。他带着八百骑兵，抛开大部队，深入大漠几百里，找到了匈奴的一个营地。士兵们都有些害怕，霍去病却拔出宝剑大喊：'兄弟们，立功的机会到了！跟我冲！'", "他们像一阵旋风一样冲进敌营，匈奴人根本没料到汉军会来得这么快，顿时乱作一团。这一仗，霍去病他们斩杀了匈奴两千多人，还活捉了匈奴单于的叔叔。消息传回长安，汉武帝龙颜大悦，封霍去病为'冠军侯'。", "十九岁时，霍去病被任命为骠骑将军，率领一万骑兵出征河西。他六天转战五个匈奴部落，打得敌人落花流水。在祁连山脚下，他指挥大军与匈奴主力展开激战，斩杀敌军三万多人，俘虏了匈奴王五十九人。", "最辉煌的一仗发生在霍去病二十一岁那年。他率领大军深入漠北，追击匈奴直到狼居胥山。在狼居胥山上，霍去病命人堆起一座土山，他登上山顶，面向南方举行了祭天仪式，宣告这里是大汉的疆土。这就是'封狼居胥'的由来。", "可惜的是，这位天才的少年将军在二十四岁那年就病逝了。汉武帝非常伤心，命人把霍去病的墓修成了祁连山的样子，来纪念他的赫赫战功。直到今天，人们还在传颂着这位少年英雄的传奇故事。", "小道理：霍去病十七岁出征，二十四岁就走完了短暂而辉煌的一生。他告诉我们，年龄不是成功的障碍，只要有远大的志向和敢于拼搏的勇气，年轻人一样可以创造了不起的成就。我们要像霍去病一样，从小树立远大理想，努力学习本领，将来为国家做贡献。"], "mageguoshi": ["在东汉时期，有一位叫马援的将军。他身材高大，留着漂亮的胡须，说话声音洪亮，特别有男子汉气概。马援从小就有远大的志向，他常说：'大丈夫就要志在四方，建功立业！'", "马援年轻的时候，因为放走了一个囚犯，不得不逃到北方去避难。在那里，他一边放牧一边读书，日子虽然辛苦，但他从不气馁。他经常对身边的人说：'丈夫为志，穷当益坚，老当益壮！'意思是说，越穷越要坚强，越老越要有壮志。", "后来，马援投奔了汉光武帝刘秀。他为刘秀出谋划策，南征北战，立下了赫赫战功。有一次，马援从外地打仗回来，朋友们都来迎接他。其中有个叫孟冀的人，说了很多恭维的话。", "马援听了却皱起眉头说：'我以为你会说些有用的话，怎么也跟着说这些奉承话呢？现在匈奴和乌桓还在北方骚扰，我正想请求皇上让我去征讨他们。男子汉大丈夫，就应该战死在边疆的沙场上，用马皮裹着尸体回来安葬，怎么能躺在床上，死在儿女们的身边呢？'", "孟冀听了，羞愧地低下头说：'将军说得对，真正的烈士就应该是这样的！'马援的这番话，后来就演变成了'马革裹尸'这个成语，用来形容为国家英勇作战、视死如归的精神。", "马援六十二岁那年，南方又发生了叛乱。前面派去的将领都打了败仗，汉光武帝急得团团转。马援知道后，立刻穿上铠甲，骑上战马，跑到皇宫里请求出战。光武帝看着白发苍苍的老将军，心疼地说：'马爱卿，你年纪大了，还是在家好好休息吧。'", "马援一听就急了，他在马上挺直腰板，手握长枪说：'陛下，我虽然年纪大了，但身体还硬朗得很！不信您看！'说着，他骑着战马在殿前跑了一圈，还做了几个刺杀的动作。光武帝笑着说：'好一个精神矍铄的老将军！那就派你去吧！'", "小道理：马援六十多岁还主动请缨出征，他的'老当益壮'和'马革裹尸'精神激励了一代又一代人。这个故事告诉我们，年龄从来不是放弃理想的理由。真正有志向的人，永远不会因为年纪大了就停止奋斗。无论我们多大年纪，都要保持一颗积极向上的心。"], "luoyangzhigui": ["在西晋时期，有个叫左思的年轻人。他长得不怎么好看，说话还有点口吃，性格也很内向。左思小时候学过书法和弹琴，可都没学成。他爸爸左雍经常对朋友说：'唉，我这个儿子啊，真是笨得很，还不如我小时候呢。'", "左思听了爸爸的话，心里很不是滋味。他暗暗下定决心：我一定要做出点成绩来，让大家刮目相看！从那以后，左思就发愤读书，每天天不亮就起来背诵文章，晚上还要写到深夜。日子一天天过去，左思的文章越写越好。", "后来，左思读了班固写的《两都赋》和张衡写的《二京赋》，觉得写得真好，但又觉得不够精彩。他想：我也要写一篇这样的文章，就写魏、蜀、吴三国的都城吧，名字就叫《三都赋》。", "说起来容易做起来难。为了写好这篇文章，左思简直拼了命。他专门去实地考察三国都城的历史地理，收集了大量的资料。他在家里的走廊里、院子里、甚至厕所里都放着纸和笔，想到什么好句子就立刻写下来。", "日子一天天过去，一年、两年、三年......左思写啊写，改啊改，整整写了十年！十年啊，三千六百五十天，左思的头发都多了几根白丝。可他还是不满意，改了一遍又一遍，直到自己觉得满意为止。", "《三都赋》写成后，一开始并没有人重视。有些文人听说左思写了这么一篇文章，都嗤之以鼻：'就他？也配写赋？写出来肯定不怎么样。'左思听了这些话，心里很委屈，但他相信自己的文章是好的。", "后来，左思把文章拿给当时著名的文学家皇甫谧看。皇甫谧读完后，拍案叫绝：'写得太好了！这篇文章一定会流传千古！'他还亲自为《三都赋》写了序言。消息传开后，整个洛阳城都轰动了。", "小道理：左思花了十年时间才写成《三都赋》，最终让整个洛阳城的人争相抄写，纸张都涨价了。这个故事告诉我们：做任何事情都要有恒心和毅力，不能急于求成。只要我们认准目标，坚持不懈地努力，就一定能获得成功。别人的嘲笑和质疑都不可怕，可怕的是自己先放弃。"], "luyou": ["陆游是南宋时期最伟大的爱国诗人之一。他出生在一个战乱的年代，小时候亲眼看到金兵入侵，百姓流离失所。爸爸陆宰是个很有骨气的文人，经常给小陆游讲爱国英雄的故事。陆游从小就立下了志愿：长大后一定要收复中原，让百姓过上好日子。", "陆游非常喜欢读书，他给自己取了个别号叫'书巢'，意思是自己的书房像鸟巢一样，到处都是书。他也喜欢练武，十岁那年就跟着一位叫李光的大侠学习剑术。陆游梦想着有一天能穿上铠甲，骑上战马，到战场上杀敌报国。", "二十九岁那年，陆游参加科举考试，考了第一名。可是因为他得罪了大奸臣秦桧，被取消了名次。陆游并没有因此气馁，他还是天天关心国家大事，写了很多爱国的诗篇。后来秦桧死了，陆游才终于有机会做官。", "陆游四十八岁那年，终于有机会来到了抗金前线——南郑。在这里，他穿着军装，骑着战马，和士兵们一起巡逻、打猎。他曾经一个人刺死过一只猛虎。这段军旅生活让陆游的诗歌更加豪迈奔放，充满了战斗的激情。", "可是好景不长，南宋朝廷里的主和派占了上风，陆游被调回了后方。他的北伐梦想又一次破灭了。陆游心里很难过，但他没有放弃希望。他写下了'山重水复疑无路，柳暗花明又一村'的名句，鼓励自己也鼓励别人，不要失去信心。", "陆游的一生都在为收复中原而奔走呼号，可是直到他老了，这个愿望也没有实现。晚年的陆游退居家乡山阴，每天耕田读书，可是他心里想的还是国家大事。他写下了著名的《示儿》诗：'死去元知万事空，但悲不见九州同。王师北定中原日，家祭无忘告乃翁。'", "公元1210年，八十五岁的陆游走到了生命的尽头。在弥留之际，他已经说不出话来了，只是用颤抖的手指着北方。孩子们都明白，爷爷还在惦记着中原的故土。陆游虽然去世了，但他的九千多首诗词流传了下来，他的爱国精神永远激励着后人。", "小道理：陆游活了八十五岁，一辈子都没忘记收复中原的理想。即使一次次失望，他也从来没有放弃过。这个故事告诉我们：真正的理想是值得用一生去追求的。无论遇到多少困难和挫折，我们都要坚持自己的信念，做一个有理想、有担当的人。"], "yanzhenqing": ["颜真卿是唐代最伟大的书法家之一。他小时候家里很穷，没有钱买纸练字。颜真卿就用刷子蘸着黄泥水，在墙上练字。写满了一墙，就用水冲掉，再重新写。就这样日复一日，年复一年，他的字越写越好，终于练出了一手好书法。", "颜真卿不仅字写得好，人品也非常正直。他当官的时候，从来不巴结权贵。当时有个大奸臣叫杨国忠，是杨贵妃的哥哥，很多人都讨好他，可是颜真卿偏不。杨国忠很生气，就把颜真卿贬到外地去做官。", "颜真卿到了地方上，一点也不抱怨。他认认真真地为老百姓办事，打击坏人，兴办学校，还修建了很多水利工程。老百姓都很爱戴他，说他是个大清官。后来，颜真卿又被调回了京城。", "公元755年，安禄山发动了叛乱，这就是历史上著名的'安史之乱'。叛军很快就打到了黄河边，很多地方官都吓得投降了。当时颜真卿在平原郡当太守，他立刻召集人马，加固城墙，准备粮草，决心和叛军决一死战。", "颜真卿还写信给各个郡县的官员，号召大家联合起来抵抗叛军。大家都推举颜真卿为盟主，一共有二十多万军队聚集在他的旗下。唐玄宗本来以为河北都沦陷了，听说颜真卿还在坚持抵抗，高兴地说：'我都不知道颜真卿长什么样，他竟然能做得这么好！'", "颜真卿最让人敬佩的是他的晚年。当时有个叫李希烈的人发动了叛乱，皇帝派颜真卿去劝降。大家都知道这一去凶多吉少，都劝他不要去。颜真卿却坦然地说：'君命也，焉避之？'意思是说，这是皇上的命令，我怎么能逃避呢？", "到了李希烈那里，叛军又是威胁又是利诱，颜真卿都坚决不投降。他指着叛贼们说：'我颜真卿快八十岁了，死就死了，你们别想让我屈服！'最后，颜真卿被叛军杀害了，享年七十七岁。他用自己的生命，证明了什么叫'宁死不屈'。", "小道理：颜真卿不仅是一位伟大的书法家，更是一位爱国忠臣。他的字端庄雄伟，气势磅礴，被称为'颜体'。人们常说'字如其人'，颜真卿的字就像他的人品一样，刚正不阿，顶天立地。这个故事告诉我们：一个人光有才华还不够，还要有高尚的品格。只有品德高尚的人，才能真正受到人们的尊敬。"], "zhouchu": ["西晋的时候，义兴县有一个叫周处的年轻人。他长得虎背熊腰，力大无穷，胳膊比别人的大腿还粗，一拳能打死一头牛。可周处脾气暴躁，经常欺负乡亲，大家见到他就躲得远远的，暗地里都叫他'义兴一霸'。", "有一天，周处在路上溜达，看到几个老人唉声叹气，就上前问道：'老人家，你们愁什么呢？'老人们你看看我，我看看你，谁也不敢说实话。周处急了，一把拽住一个老伯的袖子：'说！不说我可不放你走！'", "老伯只好战战兢兢地说：'我们愁的是'三害'啊！山上有只白额吊睛猛虎，经常下山吃人；长桥底下有条大蛟龙，掀翻渔船吞吃渔民；还有一害......'老伯偷眼看了看周处，不敢往下说了。", "周处一拍大腿：'我当是什么事！不就是老虎和蛟龙吗？我这就去替你们除掉它们！'说完，他回家取了弓箭和钢叉，直奔南山而去。乡亲们见他走了，都松了口气，可是又不放心地跟在后头看。", "周处钻进南山，果然遇上了那只白额虎。老虎张开血盆大口朝他扑过来，周处不慌不忙，闪身躲过，一箭射中了老虎的咽喉！老虎惨叫一声，倒地不起。乡亲们远远看到，都欢呼起来。", "第二天，周处又拿着钢叉来到长桥边。大蛟龙从水里窜出来，张牙舞爪地扑向周处。周处跳进水里，和蛟龙搏斗起来！他们从水里打到岸上，又从岸上打回水里，整整打了三天三夜，翻腾的江水都变红了。", "乡亲们见三天过去了，周处还没回来，都以为他和蛟龙同归于尽了。大家放鞭炮庆祝：'太好了！三害都除掉啦！'没想到第四天，周处浑身伤痕累累地回来了，他听到乡亲们的话，这才恍然大悟——原来在大家心里，自己比猛虎和蛟龙还要可怕！他羞愧得无地自容。", "周处翻山越岭去找当时最有学问的陆机、陆云兄弟求学。他对陆云说：'我过去做了太多错事，现在想改过自新，可又怕年纪大了，来不及了。'陆云笑着说：'孔子说过，朝闻道，夕死可矣。只要能改正，什么时候都不晚！'从此周处发愤读书，后来真的成了一个正直的好官，还被百姓称为'忠臣孝子'！"], "ximenbao": ["战国的时候，魏国的国君派一个叫西门豹的人去管理邺城。西门豹到了邺城一看，愣住了！这里田地荒芜，村庄破败，街上冷冷清清的，老百姓都愁眉苦脸，完全没有生气。", "西门豹把当地的老人请来，和颜悦色地问：'老人家，这里怎么这么荒凉啊？'老伯叹了口气说：'大人有所不知，我们这里有条漳河，每年夏天都会发大水，淹了庄稼。巫师和乡绅们说，这是河伯在发怒，必须每年给他娶一个年轻漂亮的媳妇，才能保平安。'", "西门豹眉头一皱，问：'那新娘从哪来？'老伯眼泪都掉下来了：'他们每年都挑穷人家的女孩，选中最漂亮的，让她梳洗打扮后扔进漳河里。那些女孩子哭着喊着叫爹娘，可还是被活活淹死了。老百姓交不起河伯娶亲的钱，好多人都逃走啦！'", "西门豹听完，心里明白了七八分。他对老伯说：'原来是这样啊。下次河伯娶亲，请务必叫上我。'到了河伯娶亲那天，漳河边挤满了人。巫师是一个七十多岁的老太婆，带着十来个女弟子，正忙前忙后。一个十几岁的小姑娘被按在河边，哭得撕心裂肺。", "西门豹走到河边，说道：'这个姑娘不够漂亮，河伯会不高兴的。麻烦巫师去跟河伯说一声，我们换个漂亮的！'说完，他命令士兵把老巫师扔进了漳河。老巫师在河里扑腾了几下，就沉了下去。过了好一会儿，西门豹说：'巫师怎么还不回来？让她的弟子去催催！'又把一个女弟子扔进了河里。", "这下子，乡绅和官员们都吓得脸色煞白，跪在地上磕头如捣蒜：'大人饶命！大人饶命！'西门豹冷笑着说：'原来你们也知道害怕啊？那河伯娶亲的事，你们怎么不怕？从今天起，谁再敢说河伯娶亲，就让他去当使者！'", "从此以后，再也没人敢提河伯娶亲的事了。西门豹带着百姓开凿了十二条水渠，把漳河的水引到田里。河水乖乖地顺着渠道流，浇灌着庄稼，既不泛滥也不短缺。田地变得肥沃了，荒芜的邺城又热闹起来了，逃走的百姓也纷纷回来了。", "西门豹治邺的故事告诉我们：遇到不好的风俗习惯，不要盲从，要用智慧和勇气去改变它，让大家过上更好的生活！"], "chenshengwuguang": ["秦朝末年，为了修长城、修宫殿，百姓都被抓去当苦力，苦不堪言。公元前209年，秦二世下令征调九百名贫苦农民去渔阳守边关，其中有两个小头目，一个叫陈胜，一个叫吴广，他们负责带队。", "陈胜年轻的时候给地主种地，有一天干完活坐在田埂上歇息，他对伙伴们说：'以后谁要是富贵了，可别忘了大家啊！'伙伴们笑他：'你一个种地的，哪来的富贵？'陈胜叹了口气说：'唉，燕雀安知鸿鹄之志哉！'小麻雀怎么能知道天鹅的志向呢！", "这九百人从家乡出发，顶着狂风暴雨赶路。走到大泽乡的时候，天降倾盆大雨，山洪冲垮了道路，前面一片汪洋。大家被困住了，怎么也走不了。陈胜算了算日子，心里一沉——按规定，误了到达的期限，所有人都要杀头！", "陈胜悄悄找到吴广商量：'现在赶路是死，逃跑也是死，造反也是死，同样是死，为什么不拼一把干一番大事呢？'吴广一拍大腿：'说得对！反正都是死，死也要死得轰轰烈烈！'两人一拍即合，开始秘密筹划起义。", "为了让大家相信这是天意，他们用朱砂在帛布上写了'陈胜王'三个字，塞进渔民网到的鱼肚子里。伙夫杀鱼的时候发现了这块帛布，惊叫起来：'鱼肚子里有字！'消息传开，大家都觉得陈胜是老天爷选中的人。", "第二天一早，吴广故意激怒押送的军官，军官拔出剑要砍吴广。吴广眼疾手快，一把夺过剑，砍倒了军官！陈胜也冲上来，杀死了另一个军官。陈胜站在土台上，振臂高呼：'王侯将相宁有种乎！'——那些王侯将相难道是天生的贵种吗？", "九百人热血沸腾，齐声呐喊：'我们愿听您的号令！'陈胜和吴广砍下木棍当兵器，举起竹竿当旗帜，这就是著名的'揭竿而起'。起义军势如破竹，攻占了一座又一座县城。陈胜在陈县称王，建立了'张楚'政权，拉开了推翻秦朝的序幕。", "虽然陈胜吴广的起义后来失败了，但他们那句'王侯将相宁有种乎'的呐喊，震动了整个中国。他们告诉世人：不要因为出身卑微就认命，勇敢反抗不公，才能创造属于自己的命运！"], "gelunbu": ["在五百多年前，欧洲人只知道亚洲有丝绸和香料，但陆路太远太难走了。一个叫哥伦布的意大利水手冒出了一个疯狂的想法——地球是圆的，如果从西边一直往西走，不是也能到东方吗？这个想法让哥伦布兴奋得睡不着觉。", "哥伦布从小就在海边长大，爸爸是织布匠，可他一点也不喜欢织布。他最喜欢做的事就是跑到港口，看大船来来往往，听水手们讲海外的奇闻异事。十岁那年，他就坚定地说：'我长大了要去海上冒险！'", "为了凑钱买船出海，哥伦布跑了八个国家，找国王和女王们求助。葡萄牙国王说他是'疯子'，英国国王不信他的话，法国国王笑他异想天开。接二连三的拒绝没有打倒哥伦布，他整整跑了八年！", "最后，西班牙女王伊莎贝拉被哥伦布的执着打动了。她摘下自己的王冠说：'我用我的王冠做担保，支持你的航行！'哥伦布感动得热泪盈眶。1492年8月3日，他带着三条小船和八十七名水手，从西班牙港口出发了。", "船队在大海上航行了一个多月，四周全是望不到边的海水。水手们开始害怕了，有人哭着说：'再往前走就要掉到世界尽头去了！'有人甚至想把哥伦布捆起来扔到海里。哥伦布拿着望远镜坚定地看着远方：'再坚持几天！我向你们保证，很快就能看到陆地！'", "就在水手们快要绝望的时候，瞭望台上的水手突然大喊：'陆地！陆地！'大家挤到船头，看到一个绿色的小岛浮现在海平面上。哥伦布跪在甲板上，泪流满面地祷告：感谢上帝！水手们也欢呼着互相拥抱。哥伦布登上了这个小岛，给当地土著取名为'印第安人'。", "哥伦布一共进行了四次远航，发现了美洲大陆。虽然他至死都以为自己到的是印度，但他的发现彻底改变了世界的面貌。美洲的玉米、土豆、番茄传到了全世界，欧洲的文明也传到了新大陆。", "哥伦布的故事告诉我们：当所有人都不敢出发的时候，敢于迈出第一步的人，就能发现一个全新的世界。有梦想就勇敢去追，哪怕全世界都说你疯了！"], "zhantianyou": ["清朝末年，中国落后挨打，列强把中国欺负得喘不过气来。12岁的詹天佑被清政府选中，作为第一批留美幼童，远渡重洋去美国学习。上船那天，妈妈拉着他的手哭着说：'孩子，到了那边要好好读书，给咱中国人争口气！'小詹天佑用力点了点头。", "到了美国，詹天佑发现这里的高楼大厦、火车轮船什么都比国内先进。他暗下决心：一定要把最厉害的技术学到手！在学校里，他刻苦学习数理化，每次考试都名列前茅。最让他着迷的就是火车，他在日记里写道：'中国什么时候也能有自己的铁路呢？'", "1881年，詹天佑以优异的成绩从耶鲁大学毕业，满怀激动地回到祖国。可当时的清政府根本不信中国自己人能修铁路，只让他去当兵船驾驶，教英文。詹天佑有劲使不出来，只能干着急。他在给朋友的信里说：'空有一身本领，却不能为国效力，真是无比痛苦！'", "机会终于来了！1905年，清政府决定修建从北京到张家口的京张铁路。这条铁路要穿过崇山峻岭，地势非常险要，英俄两国都争着想修，因为他们想控制中国的铁路。詹天佑站了出来说：'这条路，中国人自己能修！'", "最难的就是八达岭隧道，长达一千多米，山高坡陡，普通的火车根本爬不上去。外国工程师嘲笑说：'没有我们帮忙，你们中国十年也修不通！'詹天佑没有退缩，他亲自带着测量队翻山越岭，风吹日晒也不休息，晚上就点着油灯在帐篷里画图纸。", "詹天佑想出了一个绝妙的办法：在八达岭的陡坡上设计了一个'之'字形线路，让火车先开到交叉点，然后掉头倒着往上爬。这样一来，火车就像爬楼梯一样，一折一折地爬上了高高的山峰。这个设计让外国专家们目瞪口呆！", "四年后，京张铁路提前两年全线通车！通车那天，北京城万人空巷。詹天佑站在火车头前，看着第一列由中国自己设计、自己建造的火车轰隆隆地驶过八达岭，眼泪止不住地往下流。前来参观的外国工程师们纷纷竖起大拇指：'了不起！太了不起了！'", "詹天佑用他的一生证明了：外国人能做到的事，中国人不仅能做到，还能做得更好！我们在学习和生活中遇到困难时，也要像詹天佑一样——不畏艰难，用自己的努力为国争光！"], "tiying": ["西汉的时候，有个叫淳于意的人，他以前当过管粮仓的小官，后来拜名师学医，成了远近闻名的好大夫。可天有不测风云，有一次他给一个有钱人看病，那人病太重了没救过来，有钱人的家人就告到了官府，说他治死了人。按照当时的法律，淳于意要被押送到京城长安受刑。", "淳于意被衙役们押走了，家里五个女儿哭成一团。淳于意叹了口气说：'唉，我生了五个女儿，关键时刻一个也帮不上忙！'最小的女儿缇萦听了，心里又难过又不服气。她擦干眼泪，拉着姐姐们的袖子说：'让我去京城救爹爹！'姐姐们都愣住了：你一个才十五岁的小姑娘，怎么救啊？", "缇萦收拾了一个小包袱，跟着押送父亲的队伍出发了。从山东到长安路途遥远，要走好几千里。缇萦一步也没落下，脚上磨出了血泡，她就用布包一包继续走；肚子饿了，就啃啃干粮。她心里只有一个念头：一定要救爹爹！", "到了长安城，缇萦打听到皇帝汉文帝正在宫殿里处理政务。她鼓起勇气，跑到皇宫门口，跪在地上，举起写好的状纸，大声喊：'民女有冤情求见皇上！'守卫的士兵想赶她走，可缇萦死死跪在地上不肯起来，哭得撕心裂肺。", "汉文帝听说有个小姑娘在宫门外跪着喊冤，觉得稀奇，就让人把状纸呈了上来。缇萦在状纸上写道：'我父亲一生清廉行医，如今被冤枉判了肉刑。肉刑太残忍了，砍掉的手脚再也长不回来，割掉的鼻子也再长不出来。就算犯人想改过自新，也没有机会了。我愿卖身为奴，替父赎罪，求皇上开恩！'", "汉文帝看完缇萦的状纸，心里深受触动。他想：这个十五岁的小姑娘，小小年纪就敢千里迢迢来为父亲申冤，句句在理，句句感人。文帝越想越觉得肉刑确实太残忍了，当天就下令废除了肉刑，改用打板子来代替，还免了淳于意的罪。", "缇萦救父的消息传遍天下，大家都称赞这个小姑娘的勇气。千百年来，'缇萦救父'的故事一直被传颂着。它告诉我们：不要因为自己年纪小就小看了自己，只要有勇气和智慧，孩子也能做出惊天动地的大事情！"], "xunguanniang": ["西晋末年，天下大乱，到处都在打仗。有一个叫荀灌的小姑娘，才十三岁，可她从小就跟着父亲习武，爬树翻墙、骑马射箭样样在行，胆子比男孩子还大。她父亲荀崧是宛城的太守，带着全城军民守护着这座城。", "这一天，数万叛军突然包围了宛城！叛军人山人海，把宛城围得水泄不通。荀崧带着将士们拼命抵抗，可城里粮草一天天少了，士兵们也越战越累。荀崧急得团团转：再这样下去，城迟早会破的！", "荀崧想派人去襄阳求救兵，可叛军把城围得铁桶一般，插翅难飞。荀灌看到父亲愁眉不展，走上前说：'爹爹，让我去搬救兵吧！'荀崧吃了一惊，连连摇头：'你一个小女孩，外面全是敌人，太危险了！'", "荀灌坚定地说：'爹爹放心！我从小骑马射箭，夜里出城敌人看不清我，我一定能冲出去！'荀崧看着女儿坚定的眼神，心里又担心又感动，最后咬了咬牙答应了。他挑选了几十个精壮的士兵，让他们保护荀灌突围。", "当天夜里，黑漆漆的，伸手不见五指。荀灌换上轻便的衣裳，背着弓箭，翻身上马。她轻声对士兵们说：'跟紧我，不要出声！'等到夜深了，守城的士兵们悄悄打开西门，荀灌一马当先冲了出去！叛军的哨兵看到有黑影闪过，正要喊叫，荀灌一箭射去，哨兵应声倒地。", "荀灌带着队伍在夜色中飞奔，叛军发现有人突围，举着火把追了上来。箭像雨点一样射过来，几个士兵中箭落马。荀灌伏在马背上，一边奔跑一边回头射箭，她拉弓如满月，箭无虚发，接连射倒了几个追兵。她的马跑得飞快，渐渐地，追兵的喊声越来越远了。", "荀灌日夜兼程赶到襄阳，见到了襄阳太守石览。她行礼说：'石叔叔，宛城危在旦夕，请您出兵相助！'石览看着这个气喘吁吁的小姑娘，又看了看她身上的血迹，心中大为感动：'一个小姑娘都这么勇敢，我怎能不救？'他立刻派精兵去救援宛城。", "救兵赶到，里应外合，叛军被打得落花流水，宛城得救了！全城百姓都欢呼着迎接小英雄荀灌。荀灌娘突围救城的故事告诉我们：危急时刻不要害怕，勇敢冷静地想办法，小小的身体也能爆发出大大的能量！"], "guanning": ["东汉末年，有两个年轻人是一对好朋友，一个叫管宁，一个叫华歆。他们经常在一起读书学习，一起下地种菜，形影不离。可是，两个人的性格却大不相同——管宁一心向学，对钱财名利毫不动心；而华歆却对富贵权势充满了羡慕。", "有一天，管宁和华歆一起在菜园里锄草。管宁一锄头下去，只听'铛'的一声，锄头碰到了一块硬邦邦的东西。他挖出来一看，竟是一块黄澄澄的金子！管宁看都没多看一眼，就像捡起一块石头一样，随手把它扔到了一边，继续锄他的草。", "华歆在旁边看到了，眼睛一亮，赶紧跑过来捡起金子，翻来覆去地看，还用衣袖擦了擦上面粘的泥土。他刚要往怀里揣，一抬头却看到管宁正淡淡地看着他，华歆的脸一下就红了，只好不情愿地把金子也扔了。可他心里还在嘀咕：这金子可真漂亮啊！", "又有一次，管宁和华歆正坐在屋里读书。外面忽然传来一阵热闹的锣鼓声和马蹄声，越来越近。原来是一个大官坐着豪华的马车从门口经过，前面有士兵开道，后面跟着一群仆人，威风极了！", "华歆一听到外面的动静，屁股就像装了弹簧一样跳起来，扔下书就往门口跑。他扒着门框探出脑袋，羡慕地看着那豪华的马车，口水都快流出来了。直到马车走远了，锣鼓声都听不见了，他才依依不舍地回到屋里。", "华歆回到书桌前，兴奋地对管宁说：'刚才那个大官可太威风啦！要是哪天我也能像他一样......'他话还没说完，就看见管宁默默地拿起小刀，把两人一起坐的草席从中间划开，一分为二。", "管宁放下小刀，平静地对华歆说：'你不是我真正的朋友。读书求学问的人，应该专心致志，不被外面那些花花世界所干扰。而你总是为钱财和权势分心，我们志向不同，还是分开坐吧！'华歆听了，羞愧得一句话也说不出来。", "后来，管宁果然成了一个大学问家，他避世隐居，专心治学，写了很多重要的著作。而华歆虽然也做了官，可后人提起他，总会想起管宁割席的故事。这个故事告诉我们：交朋友要找志同道合的人，读书做事要专心致志，不为外物所动！"], "daerwen": ["查理·达尔文出生在英国的一个小镇上。他从小就是个'怪孩子'——别的孩子喜欢追跑打闹，他却喜欢蹲在地上看蚂蚁搬家，趴在水边看小蝌蚪游来游去。他还特别喜欢收集东西：石头、贝壳、蝴蝶标本，他把房间堆得满满当当的，活像一个小博物馆。", "达尔文的爸爸是个医生，希望儿子也学医。可达尔文一看到手术台上的鲜血就晕过去了，吓得再也不敢进手术室。爸爸气得直跺脚：'你整天就知道捉虫子、捡石头，将来能有什么出息！'可妈妈却鼓励他说：'孩子，你对大自然的好奇心就是最大的财富。'", "后来，达尔文去了剑桥大学读书，在那里他遇到了一个改变他一生的机会。一艘叫'小猎犬号'的军舰要去南美洲做科学考察，需要一名博物学家同行。达尔文激动得跳了起来——这正是他梦寐以求的旅行！", "二十二岁的达尔文登上了小猎犬号，开始了长达五年的环球航行。这趟旅行充满了危险和艰辛：在风暴中，帆船被吹得像一片树叶，达尔文吐得昏天黑地；在南美洲的丛林里，他遭遇过毒蛇和鳄鱼；在安第斯山上，他被冻得手脚发麻。可是不管多艰苦，他每到一个地方就兴奋地采集标本。", "最让达尔文难忘的是加拉帕戈斯群岛。他发现同一个岛上的乌龟长得差不多，可不同岛上的乌龟脖子有长有短，龟壳也长得不一样。他还抓了各种各样的小鸟来研究，发现它们的嘴巴有的尖尖的像钳子，有的弯弯的像钩子。达尔文好奇极了：为什么会这样呢？", "回到英国后，达尔文花了二十多年时间来整理他的发现。他提出了一个石破天惊的理论——'进化论'。原来，生物不是一成不变的，它们会为了适应环境慢慢变化。就像长颈鹿的脖子越变越长，是因为脖子短的长颈鹿吃不到树叶就饿死了。这个理论彻底改变了人们对生命的认识。", "1859年，达尔文出版了《物种起源》，这本书一出版就引起了巨大的轰动。有人说他是揭开生命奥秘的伟人，也有人骂他是'猴子变的'。达尔文面对各种质疑和嘲笑，从来不动摇，因为他相信自己亲眼看到的事实。", "小道理：达尔文的故事告诉我们，对世界充满好奇心是最好的老师。伟大的发现往往始于一个小小的疑问。不管别人怎么说，只要你用眼睛观察、用头脑思考，你就能发现别人看不到的秘密！"], "nandinggeer": ["弗洛伦斯·南丁格尔出生在英国一个非常富有的家庭。她家的房子比城堡还大，花园里种满了各种鲜花，仆人们跑来跑去伺候着。在那个时代，有钱人家的小姐就应该穿着漂亮的裙子参加舞会，弹弹钢琴，等着嫁个好人家。可是南丁格尔却从小就有一个与众不同的想法。", "南丁格尔发现，穷人生病了根本没有医生看，只能在家里硬扛着。她心里很难过。十七岁那年，她在一本小本子上悄悄写下：'上帝召唤我去做护士。'在那个时候，医院又脏又臭，护士被人们看作是和佣人差不多的低等工作。南丁格尔的父母知道她的想法后，气得大发雷霆。", "南丁格尔没有放弃。她偷偷地读医学书籍，研究医院的管理方法。她还悄悄去医院参观，学习护理知识。有一次她甚至一个人去了法国，在那里学习照顾病人的技巧。她告诉自己：只要是为了帮助别人，再难的路我也要走！", "机会终于来了！1854年，英国和俄国打起了克里米亚战争。战场上受伤的士兵成千上万，可战地医院又脏又乱，老鼠到处乱窜，药品和绷带都不够。伤员们躺在冰冷的地上，伤口化脓长满了蛆，很多人不是被敌人打死的，而是被糟糕的医疗条件害死的。", "南丁格尔收到前线发来的求救信，她立刻组织了一支三十八人的护士队，赶往战地医院。当她走进医院时，眼前的场景让她惊呆了：伤员们挤在走廊里，连转身的地方都没有，地上全是血水......南丁格尔二话不说，挽起袖子就开始干活。", "她带着护士们清洗地板、换洗床单、包扎伤口、熬汤煮饭。每天晚上，南丁格尔都要举着一盏油灯，在漆黑的走廊里巡视病房。她轻轻地走到每个伤员床边，看看他们有没有发烧，伤口有没有恶化，被子盖好了没有。伤员们看到那个提着灯的身影，就像看到了天使，他们亲切地称她为'提灯女神'。", "在南丁格尔的努力下，战地医院的死亡率从42%降到了2%！消息传回英国，全国人民都把她当作英雄。战争结束后，南丁格尔用大家捐的钱创办了世界上第一所正规的护士学校。从此，护士成了一项受人尊敬的职业，她也被誉为'现代护理之母'。", "小道理：南丁格尔原本可以过着锦衣玉食的生活，但她选择了最艰苦的护理之路。她提着油灯走进黑暗的病房，也走进了千万人的心里。她告诉我们：真正的勇敢不是去伤害别人，而是去救人。心中有爱的人，无论在哪里都能发出温暖的光芒！"], "lijizhenshe": ["东晋的时候，福建闽中地区有一座大山，名叫庸岭。山脚下有一条很深很深的山洞，里面藏了一条巨大的蟒蛇。这条蛇有多大呢？身子比水桶还粗，脑袋比脸盆还大，一口能吞下一头小羊羔！它经常跑出来祸害百姓，吞吃牛羊，吓得大家都不敢上山砍柴了。", "当地的官员没办法，只好每年用整只的牛羊去祭拜它。可是巨蟒还不满足，它托梦给巫师说：我要吃童女！你们每年必须送一个十二三岁的小女孩给我，否则我就下山吃光全村的人！官府和百姓们都吓坏了，只好每年买来穷人家的女孩，梳洗干净，送到洞口给巨蟒吃。", "这一年，轮到县令出钱去买女孩。可附近的穷人家都带着女儿逃走了，没人愿意卖女儿。眼看着期限快到了，一个叫李寄的小姑娘却自己跑到县衙来了。她拍着胸脯说：让我去吧！李寄家里有六个姐妹，她是最小的，父亲是个穷苦的猎人，家里穷得揭不开锅。", "李寄对爹娘说：爹、娘，你们养我已经很不容易了，反正每年都要送人，不如让我去！我去了说不定还能给家里挣点钱。她爹娘哭着不肯答应，可李寄心意已决。她偷偷准备了一把锋利的宝剑、一条凶猛的猎狗，还有好多好多拌了蜜糖的糯米团子。", "被送到洞口那天，李寄一点都不慌张。她把糯米团子放在洞口，自己躲在旁边的大树上，一手握着狗绳，一手握着宝剑。过了一会儿，洞里传来一阵腥臭无比的风，那条巨蟒慢悠悠地爬出来了。它的眼睛像两盏绿色的灯笼，嘶嘶地吐着信子，可吓人了！", "巨蟒闻到了糯米团子的甜味，张开血盆大口，一口就把团子吞了下去。那些团子又甜又粘，巨蟒吃得正开心，根本没留意树上还躲着一个小姑娘。李寄看准时机，一松手，猎狗猛地扑上去，一口咬住了巨蟒的脖子！", "巨蟒疼得疯狂扭动，粗大的尾巴甩来甩去，把周围的树木都扫断了。李寄顾不上害怕，她从树上跳下来，举起宝剑，对准巨蟒的七寸——蛇最脆弱的地方——狠狠刺了下去！噗嗤！宝剑刺穿了蛇皮，鲜血喷涌而出。巨蟒挣扎了几下，终于不动了。", "李寄走进蛇洞，发现里面堆着前几年被吃掉的女孩子的头骨。她叹了口气说：你们太胆小啦，所以才会被吃掉。从此以后，闽中地区再也没有巨蟒害人了，大家都称李寄是女中豪杰。李寄斩蛇的故事告诉我们：不管男孩女孩，只要勇敢机智，就能保护自己和身边的人！"], "weizheng": ["唐朝的时候，有个特别厉害的皇帝叫唐太宗李世民。他开创了贞观之治，国家强盛，百姓安居乐业。可李世民身边有个大臣，不但从来不拍马屁，还经常当着满朝文武的面批评皇帝，这个人的名字叫魏徵。", "魏徵以前是李世民的哥哥李建成的谋士，还曾经劝李建成早点除掉李世民。李世民当了皇帝后，不但没有杀他，反而重用他，因为他知道魏徵是个正直又有本事的人。魏徵很感动，但该批评的时候照样毫不客气。", "有一次，李世民要去南山打猎游玩，车马都准备好了。可等了好久不见魏徵来上朝，李世民以为他病了，就派人去打探。探子回来说：魏大人正在家准备朝服，说要进宫劝谏呢！李世民一听，哈哈大笑：算了算了，他知道我要去玩，肯定又要长篇大论地讲道理，不去了！于是下令取消了出游。", "还有更厉害的呢。有一次李世民兴致勃勃，想给十六岁的小女儿长乐公主办一场盛大隆重的婚礼。魏徵却站出来说：陛下，公主的嫁妆不能超过姑姑的规格！按照礼法，姑姑是长辈，不能越过这个规矩。李世民听了，心里虽然不高兴，可知道魏徵说得有道理，只好照着办了。", "这件事让李世民心里憋着一股气。散朝后，他回到后殿，气呼呼地对皇后长孙氏说：魏徵这个乡巴佬，动不动就当众给我难堪，我非要杀了他不可！长孙皇后一听，没有搭话，转身回屋换上了一身最隆重的礼服，出来朝李世民行大礼。", "李世民愣住了：你干什么呀？长孙皇后笑着说：恭喜陛下！我听说皇上圣明，臣子才会正直敢言。如今魏徵这样直言不讳，正是因为陛下是个开明的明君啊！我是皇后，当然要恭喜您了！李世民一拍脑门，恍然大悟：你说得对！魏徵是我的镜子，能帮我看到自己的错误！", "魏徵就这样批评了皇帝一辈子，李世民虽然有时候气得牙痒痒，却始终重用他。魏徵去世的时候，李世民伤心地哭了，他说了一段流传千古的话：以铜为镜，可以正衣冠；以史为镜，可以知兴替；以人为镜，可以明得失。如今魏徵一死，我失去了一面镜子啊！", "魏徵直谏的故事告诉我们：真正的朋友不是只会说好听话的人，敢于指出你的缺点和错误，才是真正为你着想！而能接受批评的人，才能不断进步！"], "fanshi": ["东汉的时候，有两个年轻人，一个叫范式，一个叫张劭。他们一起在洛阳的大学里读书，同吃同住，感情好得就像亲兄弟一样。每天一起温习功课，一起讨论学问，一起在院子里散步聊天。", "可是天下没有不散的宴席。两年后学业结束了，两人要各回各家了。范式是山阳金乡人，张劭是汝南人，相隔好几百里路呢！分别那天，两人依依不舍，张劭的眼眶都红了。", "范式拉着张劭的手说：兄弟，后会有期！两年以后的秋天，我会去你家看望你，到时候我们再好好聚一聚！张劭擦了擦眼泪，点了点头，心里却没太当真。毕竟两年的时间那么长，相隔的路那么远，谁会为了一个约言，真的走上几百里路呢？", "时间过得飞快，两年很快就要到了。这天，张劭忽然对母亲说：娘，范式快来了，咱们赶紧准备一下，杀只鸡，做点好菜！张劭的母亲笑着说：傻孩子，那是两年前随便说的一句话，他又不知道咱们家住在哪，怎么可能真的来？几百里路呢，别当真啦！", "可张劭坚定地说：娘，范式是个讲信用的人，他说过的话一定会做到的！张妈妈看儿子这么认真，半信半疑地说：好吧好吧，那咱们准备准备。虽然嘴上这么说，可心里还是觉得不太可能。", "约定的日期到了。张妈妈一大早就起来杀鸡、煮饭、备酒，忙得满头大汗。张劭站在村口的大树下，伸长脖子望着远方的路。太阳越升越高，路上的行人来来往往，可就是不见范式的影子。张妈妈等得也着急了，悄悄对儿子说：是不是不来了？", "就在这时候，远方的大路上扬起了一团尘土。一个背着包袱的身影正大步走来。那不是范式是谁！范式走了好几百里路，风尘仆仆，鞋子都磨破了，衣服上全是灰，可他脸上却挂着灿烂的笑容。张劭激动地跑过去，两个好兄弟紧紧拥抱在一起。张妈妈看着这一幕，感动得眼泪都掉下来了：真是天底下最守信用的朋友啊！", "范式千里赴约的故事告诉我们：答应别人的事情，无论如何都要做到！守信是做人的根本，说到做到的人，永远不会缺少真心朋友。"], "ajimide": ["两千多年前，在古希腊西西里岛上有一个叫叙拉古的城市，住着一位全世界最聪明的科学家——阿基米德。他整天不是画图就是做实验，脑袋里装满了稀奇古怪的想法。邻居们都叫他疯子，可他知道自己在做世界上最有趣的事。", "阿基米德年轻的时候去埃及的亚历山大城学习，那里是当时全世界知识最集中的地方。他跟着一位大学问家学习数学、天文和物理，如饥似渴地吸收着各种知识。回到叙拉古后，他把全部精力都投入到了科学研究中，废寝忘食地钻研。", "有一次，叙拉古的国王请金匠做了一顶纯金的王冠。王冠做好后，国王怀疑金匠偷了金子掺了银子，可又拿不出证据。国王把阿基米德叫来，命令他想出一个办法，既不能破坏王冠，又能查出里面有没有掺假。阿基米德绞尽脑汁，想了三天三夜也没想出来。", "阿基米德太累了，决定去澡堂子泡个澡放松一下。当他跨进装满水的浴缸时，水哗啦一下溢了出来，他的身体也感觉到了一种往上浮的力量。阿基米德眼前一亮，猛地从浴缸里跳了出来，光着身子就冲到了大街上，一边跑一边大喊：尤里卡！尤里卡！——这是希腊语，意思是：我找到了！我找到了！", "原来阿基米德想出了辨别王冠真假的办法：把王冠放进水里，测量它排开的水量，再和同等重量的纯金排开的水量相比。如果排开的水量不一样，就说明王冠掺了假！这个发现就是著名的浮力定律。后来经过测试，那个金匠果然偷了金子，被国王重重处罚了。", "阿基米德还发现了一个更神奇的道理：只要给我一个支点，我就能撬起整个地球！他发现杠杆可以放大力量，一根足够长的杠杆，配合一个支点，再重的东西也能轻松撬动。国王不信，阿基米德就做了一套滑轮和杠杆装置，让国王一个人轻松地把一艘装满货物的大船拉到了岸上。国王看得目瞪口呆，下令全城人向阿基米德学习！", "后来，罗马军队攻打叙拉古。阿基米德为了保护自己的城市，发明了许多神奇的武器：巨大的投石机能把石头抛到敌船上；弯曲的镜面能聚焦阳光，点燃敌人的帆布。罗马将军吓得直哆嗦：我们是在和神仙打仗吗？", "阿基米德的一生成就无数，他是数学之神，是物理学的开创者。他告诉了我们一个最朴素的道理：再多华丽的赞美，也比不上一个问题被解开时的那句尤里卡！在生活中，只要我们多观察多思考，每个人都能拥有自己的尤里卡时刻！"], "jialilue": ["四百多年前，意大利有一个小男孩叫伽利略。他从小就喜欢问为什么：为什么苹果会往下掉？为什么月亮会亮？为什么钟摆会左右摆动？周围的大人被他问得不耐烦了，可他一点也不在乎，继续问他的问题。", "伽利略的爸爸是个音乐家，希望儿子去学医，以后当个医生赚钱养家。伽利略只好去了比萨大学学医。可他对医学一点兴趣都没有，上课的时候偷偷在底下看数学书和物理书，还自己动手做各种小实验。同学们都笑他：不好好背医书，捣鼓这些东西有什么用？", "一天，伽利略在比萨大教堂里做礼拜，一阵风吹来，头顶上的吊灯开始来回摆动。他盯着吊灯看了好久，忽然发现一个有趣的现象：吊灯摆动的幅度越来越小了，可每次摆动用的时间竟然是一样的！他兴奋地用手按住自己的脉搏数数，验证了自己的发现。这就是钟摆等时性的原理，后来被用来制造了世界上第一台精准的摆钟。", "伽利略最出名的一个故事是在比萨斜塔上做的实验。当时所有人都相信古希腊学者亚里士多德的理论：重的物体比轻的物体落得快。伽利略却觉得不对，他决定做一个实验来证明自己的想法。", "他拿着两个大小一样的铁球——一个重十磅，一个重一磅——爬上了比萨斜塔的顶端。塔底下围满了来看热闹的人，有人嘲笑他，有人等着看笑话。伽利略大声说：看好了，我要放手了！他同时松开了两只手，两个铁球一起落了下去，砰！它们竟然同时撞到了地面！", "人群一下子炸开了锅！大家都惊呆了：亚里士多德说了两千年的理论竟然错了！可那些老教授们却气急败坏地说：伽利略一定施了什么魔法！他们宁愿相信古人的话，也不肯相信自己的眼睛。伽利略却不在乎，他坚信：事实就是事实！", "后来，伽利略自己动手打磨镜片，造出了世界上第一台天文望远镜。他把望远镜对准夜空，看到了月球表面的环形山、木星的四颗卫星、太阳的黑子，还发现银河原来是由无数颗星星组成的！这些发现彻底改变了人类对宇宙的认识。可当时的教会却威胁他说：地球是宇宙的中心，你不能胡说八道！伽利略被判处终身软禁，可他仍然坚持说：可地球确实在动啊！", "伽利略用他的一生告诉我们：权威说的话不一定都是对的，科学不相信眼泪，也不相信名气。用自己的眼睛去看，用自己的脑子去想，勇敢地追求真相，这才是最了不起的事情！"], "huangdaopo": ["宋朝末年，兵荒马乱，松江乌泥泾（今天的上海地区）有一个叫黄道婆的小女孩，家里穷得连饭都吃不饱。她很小就被卖到别人家当童养媳，每天从早干到晚，吃不饱穿不暖，还要挨打挨骂。十三岁那年，瘦小的黄道婆再也受不了了，她咬咬牙，偷偷爬上了一艘开往海外的商船。", "商船一路南下，来到了遥远的海南岛崖州（今天的海南三亚）。黄道婆踏上这片陌生的土地时，心里又害怕又迷茫——这里的人说着她听不懂的话，种着她从没见过的庄稼。可黎族的姐妹们看到她瘦弱可怜的样子，热情地收留了她，教她住茅草屋、吃山竹米。", "黄道婆发现黎族姐妹们个个都会纺织。她们种出来的棉花又白又软，纺出来的纱又细又匀，织出来的布又密又漂亮，上面还有各种各样的彩色花纹。黄道婆看得眼睛都亮了，她缠着黎族的大姐们说：教教我吧！于是她从剥棉花开始学起，天天跟在大姐们后面，一看就是大半天。", "黎族的织布机跟家乡的完全不一样！她们的脚踏纺车能同时纺好几根纱，轧棉机能把棉籽和棉花分得干干净净，弹棉花的弓又大又弹。黄道婆一边学一边想：这些好东西要是能带回松江老家就好了！她在海南一待就是三十多年，从一个瘦弱的小女孩变成了纺纱织布的高手。", "黄道婆老了，她越来越想念家乡。她背着黎族姐妹们送的纺车和织机，搭船回到了松江。可是回到家乡，她发现乡亲们还在用最原始的方法捻纱：用手搓，一天搓不出一丈纱。织出来的布又粗又硬，穿在身上扎得皮肤生疼。", "黄道婆二话不说，挽起袖子就开始改造旧织机。她把从海南带来的脚踏纺车改成了三锭脚踏纺车——一个人同时能纺三根纱！她又改良了轧棉机，把弹棉花的弓做得又大又轻。她还把自己学来的错纱、配色、综线、挈花等技术，手把手地教给村里的姐妹们。", "消息像风一样传开了，十里八乡的人都跑来学。黄道婆织出来的布又细又软、又好看又好穿，大家都叫它乌泥泾被。松江的棉布很快就卖到了全国各地，松江也成了全国最大的棉纺织中心，有了松江棉布、衣被天下的美名。", "黄道婆去世的时候，乡亲们都哭得稀里哗啦的，大家自发凑钱给她修了祠堂。直到今天，上海人还在纪念这位把纺织技术带给千家万户的黄道婆。她告诉我们：学到本事就要带回家乡，一个人的智慧可以让千万人都过上好日子！"], "yangye": ["北宋初年，北方的辽国经常南下欺负大宋的老百姓。宋太宗派出大军北伐辽国，要收复被辽国占领的燕云十六州。大军中有一位白发苍苍的老将军，他叫杨业。杨业从小就练得一身好武艺，骑的马是最好的，射的箭最准，辽国士兵一听杨无敌来了，吓得腿都软了。", "杨业打仗不光靠勇猛，更靠智慧。他熟悉雁门关一带的地形，哪里是山谷、哪里是险道，闭着眼睛都能走。在雁门关一战中，他带着几百名骑兵从小路绕到辽军背后，杀得辽军溃不成军，大获全胜。宋太宗高兴极了，封他做了大官。", "可这一次北伐，事情没那么顺利。其他几路宋军都打了败仗，只有杨业这一路还算顺利。主帅潘美和监军王侁商量后决定撤军，让杨业断后掩护百姓撤退。杨业查看了一下地形，皱着眉头说：辽军兵多将广，我们得在陈家谷设好埋伏接应，否则太危险了。", "王侁是个不懂打仗的文官，他不耐烦地摆摆手说：杨将军你尽管去，接应的事包在我身上！杨业出发前，回头看了看身后的将士们，眼眶红了。他知道这一去凶多吉少，可军令如山，不得不去。他骑上战马，带着儿子杨延玉和将士们冲向了战场。", "杨业带着队伍边打边撤，把辽军一步步引向陈家谷。可是打到谷口时，他惊呆了——陈家谷空无一人！原来王侁等了好久没看到杨业回来，以为杨业打了胜仗抢功劳去了，竟然带着接应的军队撤走了！杨业的心凉了半截，他知道自己已经陷入了绝境。", "辽军像潮水一样涌了上来，把杨业和他的儿子们团团围住。杨延玉挥舞着长枪冲在最前面，一枪挑翻了三个辽兵，却被一箭射中了胸口，倒在了血泊中。杨业看到儿子倒下，老泪纵横，可他来不及悲伤，拼了命地挥舞着大刀。身上的伤越来越多，血越流越多，箭袋也空了。", "杨业身边的将士一个接一个倒下，最后只剩下他一个人了。他身上中了十几箭，手臂已经抬不起来了。辽兵大喊着抓活的！抓活的！步步逼近。杨业仰天长叹：皇上待我不薄，本想杀敌报国，不想却被奸臣所害，遭受屈辱！他宁死不降，一头撞在了路边的巨石上。", "杨业去世后，他的故事在民间广为流传，被编成了杨家将的故事，一代代传颂至今。人们永远不会忘记这位白发苍苍仍血战沙场的老将军。杨业的故事告诉我们：真正的勇气不是不害怕，而是明知前面是死路，为了忠诚和责任，依然昂首挺胸地往前走！"], "hanwendi": ["西汉的时候，有一个特别孝顺的皇帝叫刘恒，后人称他为汉文帝。他是汉高祖刘邦的儿子，原本不是太子，可因为他为人宽厚仁慈，大臣们一致推举他当了皇帝。当上皇帝后，他没有像别的皇帝那样住在豪华的宫殿里享福，而是每天惦记着天下百姓和年迈的母亲。", "汉文帝的母亲薄太后身体一直不太好。有一年，薄太后生了一场大病，卧床不起。御医们轮番来看，开了各种各样的药方，可太后的病就是不见好转。汉文帝急得饭也吃不下，觉也睡不好，每天守在母亲的床前，握着她的手轻声安慰。", "朝中的大臣们劝他说：陛下，您是一国之君，有很多国家大事要处理，照顾太后的事就交给宫女和御医吧！汉文帝摇摇头说：治理国家是我的责任，照顾母亲同样是我的责任。天下没有不孝顺父母还能治理好国家的皇帝。", "每天，宫女们把熬好的汤药端上来，汉文帝都要亲自接过药碗。他没有直接递给母亲，而是先舀起一小勺，送到自己嘴边轻轻嘬了一口。他仔细地尝：嗯，太烫了，再凉一会儿；嗯，有点苦，太医能不能加点甘草？旁边伺候的宫女们看到这个场景，都感动得偷偷抹眼泪。", "薄太后生病整整三年，汉文帝就在床前守护了三年。每天晚上，他都要起来好几次，去看看母亲睡得好不好，被子有没有踢开，额头烫不烫。有时候半夜薄太后咳嗽几声，汉文帝立刻从凳子上跳起来，轻声问：母亲，您要喝水吗？", "三年里，汉文帝几乎没有睡过一个囫囵觉。他的眼圈总是黑黑的，人也瘦了一大圈。大臣们看着心疼，可谁也劝不动他。汉文帝说：母亲生我养我，吃了多少苦？我现在为一碗药多操点心，有什么辛苦的？", "在汉文帝的精心照料下，薄太后的病终于一天天好转了。御医说：太后的病能好，一是药对症，二是有皇上这份孝心的感动啊！后来汉文帝在位二十三年，把国家治理得井井有条，百姓安居乐业，开创了著名的文景之治。", "汉文帝亲尝汤药的故事被编入了二十四孝，千百年来流传不绝。每次读到这个故事，我们都会想起那个守在母亲床前亲手尝药的皇帝。他告诉我们：孝顺没有理由，更没有借口。无论多忙多累，对父母的爱永远不能打折扣！"], "mozart": ["两百多年前，在奥地利美丽的萨尔茨堡，有一个小男孩降生了，他的名字叫沃尔夫冈·阿马德乌斯·莫扎特。他爸爸是个宫廷乐师，每天在家里教姐姐弹钢琴。三岁的小莫扎特总是趴在琴边，歪着小脑袋看姐姐弹琴，眼睛里闪着好奇的光。", "有一天，爸爸和姐姐出去了，小莫扎特踮起脚尖爬上琴凳，伸出胖乎乎的小手，咚地按了一下琴键。咦？这个声音好好听！他又按了一下，再按一下，很快就能把听过的曲子一个音都不差地弹出来。爸爸回来听到后，惊讶得差点把下巴掉下来：这孩子是个天才！", "莫扎特四岁那年，爸爸开始正式教他弹琴和作曲。别的小朋友还在玩泥巴，莫扎特已经能写出像模像样的曲子了。他写曲子跟别人不一样——他不需要坐在琴前试来试去，而是在脑子里想好了，直接写到纸上，一挥而就，一个音符都不用改！", "六岁的时候，爸爸带着莫扎特和姐姐开始了漫长的巡回演出。他们去了维也纳、慕尼黑，还翻过了阿尔卑斯山去了巴黎和伦敦。小莫扎特穿着镶金边的演出服，站在皇宫的大厅里弹奏。皇帝和皇后们听完他的演奏，掌声雷动，连连叫好！", "有一次在维也纳，小莫扎特在皇帝面前演奏。皇帝拿来一块布盖住琴键，想考考他：你能在看不见琴键的情况下弹奏吗？小莫扎特微微一笑，用小手摸索着琴键，竟然弹出了一首完整的曲子！在场的所有人都惊呆了，皇后把他抱在腿上亲了又亲。", "可是你知道吗？莫扎特虽然是个天才，但他并不是光靠天赋吃饭的。他每天练琴的时间比谁都长，手指练得又酸又疼。他在一封信里写道：人们以为我的本事是天上掉下来的，可他们不知道，没有人比我更用功！天才就是百分之九十九的汗水。", "长大后，莫扎特创作了大量美妙绝伦的音乐，歌剧《费加罗的婚礼》《魔笛》《唐璜》，还有数不清的交响曲和小夜曲。他的音乐像阳光一样灿烂，像流水一样清澈，听过的人都说：这一定是天使在唱歌！可惜莫扎特一生穷困潦倒，三十五岁就离开了人世。", "莫扎特的故事告诉我们：天赋固然重要，但如果没有日复一日的刻苦练习，再好的天赋也会白白浪费。所谓天才，就是找到自己最爱的事情，然后用尽全力去把它做到最好！"], "franklin": ["三百多年前，在美国波士顿的一个穷苦家庭里，本杰明·富兰克林出生了。他是家里第十五个孩子，家里穷得揭不开锅。富兰克林只上了两年学就被迫辍学了，十岁就开始在爸爸的蜡烛店里干活——切烛芯、灌蜡油，又脏又累。", "富兰克林的哥哥开了一家印刷店，小富兰克林被送去当学徒。印刷店里堆满了各种书和报纸，这可乐坏了他。每天干完活，别的学徒倒头就睡，富兰克林却偷偷点起蜡烛看起书来。他把吃饭的钱省下来买书，一本书看完就和别人换着看，看得如痴如醉。", "富兰克林不仅爱看书，还爱动脑筋。他发现蜡烛店的生意不好做，就琢磨着发明了更亮的油灯。印刷时墨水太容易干，他就改良了配方。看到人们在大海上漂流时容易迷路，他就想着：能不能用一种什么东西来测量洋流呢？他走到哪里都带着小本子，随时记下自己的想法。", "十七岁那年，年轻的富兰克林离开了家乡，独自跑到费城闯荡。他口袋里只有一块钱，饿得前胸贴后背。可他凭着一手过硬的印刷技术，很快找到了工作。他每天干活比谁都认真，印出来的报纸字迹清晰，排版漂亮，老板逢人就夸：这孩子将来一定有出息！", "后来，富兰克林自己开了一家印刷所，还创办了美国第一家公共图书馆。他说：知识就像火种，一个人拿着火把，不会让别人的火把变暗，反而会照亮更多的人。他的图书馆让穷人家的孩子也能借到书，改变了无数人的命运。", "但富兰克林最出名的故事还在后头。一个雷雨交加的下午，富兰克林做了一个疯狂的决定——他要证明闪电就是电！他做了一个丝绸风筝，在风筝线上挂了一把铁钥匙，冒着大雨把风筝放上了天空。轰隆隆！一道闪电劈下来，沿着湿漉漉的线传到了铁钥匙上——钥匙上闪过一串蓝色的火花！富兰克林的手指被电击了一下，疼得他龇牙咧嘴，可他却兴奋得大喊：我抓住闪电了！", "富兰克林后来用这个发现发明了避雷针，从此高楼大厦再也不用担心被雷劈了。他还发明了富兰克林炉——一种特别省柴又暖和的炉子；发明了双焦距眼镜——既能看远又能看近；还绘制了第一张墨西哥湾洋流图。同时他还参加了美国独立宣言的起草，是美国的开国元勋之一。", "富兰克林去世的时候，两万多人参加了他的葬礼。他用一生告诉我们：贫穷不可怕，没上过学也不可怕。只要有一颗好学的心，肯动脑筋，谁都能成为了不起的人。知识就像一把钥匙，能打开任何一扇门！"], "mengjiangnv": ["在秦朝的时候，有个叫孟姜女的姑娘，长得特别好看，心灵手巧，绣花绣得栩栩如生。她和一个叫范喜良的书生成亲了。成亲那天，红灯笼挂满了院子，鞭炮噼里啪啦响了一整天，街坊邻居都来道喜，小两口甜蜜极了。", "可老天爷偏偏不让人过好日子！新婚才三天，门外的官兵就冲了进来，一把推开孟姜女，拿出绳索往范喜良身上一套，说：奉皇上旨意，征你去修长城！范喜良拼命挣扎，孟姜女哭喊着追出去，可哪里追得上？官兵们押着范喜良，头也不回地走了。", "从那以后，孟姜女每天都在门口张望，盼着丈夫回来。春去秋来，树叶黄了又绿、绿了又黄，可范喜良连一封信都没寄回来。孟姜女心里越来越不安：北方的冬天那么冷，长城边风沙那么大，他有没有厚衣服穿？有没有吃饱饭？她越想越急，整夜睡不着觉。", "冬天快到了，孟姜女亲手缝了一件厚厚的棉衣，一针一线都缝进了她的思念。她把棉衣揣在怀里，踏上了去长城的路。这一路上可太苦了！她翻过了一座又一座高山，趟过了一条又一条大河，饿了啃干粮，渴了喝溪水，晚上就找个破庙或大树底下打个盹。鞋子磨破了，脚上全是血泡，可她咬着牙，一步也不肯停。", "走了不知道多少天，孟姜女终于看到了远处蜿蜒起伏的长城。她高兴得眼泪都要掉下来了：喜良，我来了！我给你送棉衣来了！她跌跌撞撞地跑过去，在修长城的民夫中一个接一个地找。可找来找去，怎么也找不到范喜良的身影。", "孟姜女拉住一个老伯，焦急地问：大叔，您认识范喜良吗？他是我丈夫，三年前被征来修长城的。老伯叹了口气，指了指远处一片荒坡：姑娘……范喜良他……他已经累死在长城脚下了，和成千上万的民夫一起被埋在了城墙底下……", "孟姜女听了，像被雷劈了一样，手里的棉衣掉在地上，整个人都傻了。过了好一会儿，她哇的一声扑到长城脚下，放声大哭起来。那哭声啊，凄惨得连天上的飞鸟都停了下来，连山风都不敢再吹了。她哭了三天三夜，哭得眼睛流出了血，哭得天地都为之变色。", "突然——轰隆隆！长城的一段轰然倒塌了！坍塌的城墙下，露出了累累白骨。孟姜女扑上去，一具一具地辨认，终于在一副白骨上看到了范喜良的衣服碎片。她抱着白骨，又哭又笑：喜良，我终于找到你了……虽然孟姜女最后没有和丈夫团聚，但她用真情哭倒长城的故事，却世世代代流传了下来。它告诉我们：真情的力量足以撼动天地！"], "yangxiu": ["三国时期，曹操手下有一个叫杨修的谋士。这个人可聪明了！读过的书过目不忘，别人说上句他能接下句，脑子转得比谁都快。可他的聪明，有时候却让曹操很不舒服。", "有一次，曹操命人造了一座花园。花园建好后，曹操去看了看，什么也没说，只在门上写了一个「活」字就转身走了。工匠们面面相觑：丞相这是什么意思啊？杨修正好路过，哈哈大笑说：这还不简单？门里加个活字，不就是「阔」字吗？丞相嫌门太宽了！工匠们恍然大悟，赶紧把门改窄了。", "曹操再来看时，发现门变窄了，就问是谁猜中了他的心思。听是杨修猜的，曹操心里咯噔了一下：这小子，竟然把我的心思摸得这么透！他嘴上夸了杨修几句，可心里却暗暗生出了一丝戒备。", "还有一回，有人给曹操送来一盒酥糖。曹操在盒子上写了「一合酥」三个字，就放在桌子上。杨修看到后，二话不说，打开盒子就和同事们把酥糖分着吃了。曹操回来一看，酥糖没了，板起脸问：谁吃了我的酥糖？杨修笑嘻嘻地说：丞相您自己写了「一合酥」——一人一口酥，我们一人一口分着吃了呀！曹操气得胡子都翘起来了，可杨修说得确实有道理，他也不好发作。", "曹操这人疑心特别重，总担心有人会害他。他对身边侍卫说：我睡着的时候会做梦杀人，你们千万别靠近我！有一天，曹操在午睡，被子掉到了地上。一个侍卫好心过来帮他盖被子，曹操突然跳起来，拔出剑一剑就把侍卫刺死了。然后他装作刚刚睡醒的样子，惊讶地问：谁杀了我的侍卫？大家说：丞相您在梦中杀人啊！曹操假装很难过，厚葬了那个侍卫。", "别人都以为曹操真会梦中杀人，只有杨修看穿了曹操的把戏。在下葬那个侍卫的时候，杨修叹了口气说：丞相不在梦中，是你在梦中啊！这话很快传到了曹操的耳朵里，曹操气得咬牙切齿：好你个杨修，竟然敢揭穿我！从此，曹操心里就对杨修动了杀念。", "后来曹操和刘备在汉中打仗，双方僵持不下。进，打不过去；退，面子上又过不去。曹操正坐在大帐里发愁，士兵进来问今晚的口令。曹操看着碗里的鸡肋，随口说道：鸡肋。口令传下去后，杨修一听，马上收拾行李准备撤退。其他将领问他为什么，杨修说：鸡肋这东西，吃吧没肉，扔吧可惜——丞相想撤军了！", "曹操知道了这件事，再也忍不住了！他怒不可遏地说：杨修竟敢扰乱军心，动摇士气！来人，把杨修推出去斩了！杨修就这样因为他的聪明和张扬，断送了自己的性命。临死前他才明白：有时候，懂得该闭嘴的时候闭嘴，比懂得该说什么更难。"], "laomashitu": ["春秋时候，北方的山戎国跑来攻打燕国。燕国打不过，赶紧派人向齐国的霸主齐桓公求救。齐桓公是个讲义气的人，一口答应下来，亲自带着大军，和相国管仲一起，浩浩荡荡地向北方出发了。", "齐国的军队可厉害了！到了战场，山戎国的士兵一看齐国的大旗，吓得抱头鼠窜。齐桓公一挥令旗，将士们像猛虎下山一样冲了上去，山戎兵被打得落花流水，扔下武器的、四处逃命的，乱成了一锅粥。燕国的百姓们夹道欢迎，高呼齐侯万岁！", "山戎国的残兵败将逃向了更北边的孤竹国。齐桓公说：斩草要除根！追！他带着大军一路向北，越追越远。山路越来越难走，野草越来越密，周围的大树遮天蔽日，连太阳都看不到了。将士们热得满头大汗，累得直喘粗气。", "齐桓公终于打败了孤竹国，大获全胜。他得意洋洋地下令：收兵，回家！大军掉头往南走。可走着走着，齐桓公发现不对劲了——周围全都是差不多的山、差不多的树、差不多的路，越走越觉得像是在原地打转。", "派出去的探子回来报告说：大王，不好了！这大雾一起来，东南西北全都分不清了！咱们迷路了！原来北方的春天山里经常起大雾，白茫茫一片，五步之外就什么都看不见了。齐国的士兵都是中原人，从没到过这么北的地方，完全辨不出方向。", "士兵们又冷又饿，士气低落。有人提议：要不先扎营，等雾散了再走？可粮食已经快吃完了，等下去也是死路一条。齐桓公急得团团转：这前不着村后不着店的，难道我们堂堂齐国的军队，就要困死在这荒山野岭里吗？", "这时候，管仲不慌不忙地走到齐桓公面前，说：大王，我听说老马认识回家的路。动物比我们更熟悉大自然，不如放开几匹老马，让它们带路吧。齐桓公将信将疑：马还能认路？可眼下也没什么别的办法，只好下令：把几匹老马放开，跟着它们走！", "几匹老马被解开了缰绳，打了几个响鼻，左右闻了闻，就迈开步子朝一个方向走了起来。大军跟在老马后面走啊走啊，穿过了一片片密林，翻过了一座座山丘。走了整整一天，雾也渐渐散了，眼前豁然开朗——前面不正是他们来的时候经过的那条大路吗？将士们欢呼起来：我们找到回家的路了！老马识途的故事从此传遍了天下。它告诉我们：经验最宝贵，有时候多听老人的话，能让我们少走很多弯路！"], "wudaozi": ["一千三百多年前，在唐朝的阳翟（今天的河南禹州），有一个小男孩出生了。他姓吴，父母给他取名叫道玄，后来人们都叫他吴道子。小吴道子家里穷得叮当响，父亲很早就去世了，母亲一个人拉扯他长大，日子过得紧巴巴的。", "吴道子从小就喜欢画画。别的小孩在街上追着玩、爬树掏鸟窝，他却蹲在墙角，捡起树枝在地上画来画去。画只小鸟、画朵小花、画条小鱼，画出来的东西活灵活现，路过的大人都忍不住停下来看两眼：这孩子画得可真像啊！", "因为家里太穷，吴道子很小就跟着村里的老画工学手艺，给寺庙和道观画壁画。那时候没有铅笔、没有橡皮，画画全靠一支毛笔。画错一笔就要全部重来，颜料也都是自己调制的。吴道子每天天不亮就起来练笔，晚上点上油灯继续画，画得手腕酸得抬不起来也不肯停。", "二十岁左右的时候，吴道子的画技已经很厉害了。他听说洛阳是个人才汇聚的好地方，就背起行囊，徒步走到了洛阳。到了洛阳，他发现这里遍地是高手！他不敢自满，找了份给寺庙画壁画的工作，继续苦练。白天画、晚上想，连吃饭的时候都在琢磨线条的走势。", "机会终于来了！唐玄宗李隆基听说了吴道子的名气，把他召进了皇宫，封他为内教博士，专门给皇帝画画。有一次，唐玄宗想看嘉陵江山水，就派吴道子去实地写生。吴道子去了嘉陵江边，走了好几个月，把沿途的山水都看在了眼里、记在了心里。回到长安后，唐玄宗问他：画稿呢？吴道子两手一摊：陛下，我没有画稿，嘉陵江的山水都在我的心里。", "唐玄宗半信半疑，让吴道子在大同殿的墙上当场作画。吴道子拿起画笔，站在墙前闭目沉思了一会儿，然后突然睁眼，挥毫泼墨。他的笔法如狂风暴雨，线条飘逸灵动，画中的人物衣带飘飘，就像被风吹起来一样。短短一天之内，一幅三百里嘉陵江的壮丽山水就跃然墙上！唐玄宗看得目瞪口呆，连连拍手：李思训画了几个月，吴道子一天就画完了，真是天才啊！", "吴道子的画最厉害的地方是线条。他画的线条叫「莼菜条」，粗细变化自如，流畅得像被风吹动的丝带。他画的人物衣带飘飘，好像随时要飞起来一样，人们用了一个特别美的词来形容——吴带当风！他还在长安和洛阳的寺庙里画了三百多幅壁画，最有名的是《地狱变相图》。据说这幅画一画出来，长安城里杀猪宰羊的屠夫看了，都吓得扔下屠刀改行去了！", "吴道子被称为画圣，千百年来没有人能超越。可是你知道吗？他并不是生下来就会画画的。他小时候捡树枝在地上画，年轻时天不亮就起来练笔，成名后还在不断苦练。画圣不是天生的，是千千万万条线条练出来的。他告诉我们：再平凡的事，做到极致就是不平凡！"], "caoxueqin": ["三百多年前，清朝康熙年间，南京城里有一户超级显赫的人家——曹家。曹家的老祖宗是康熙皇帝的奶妈，所以曹家和皇帝的关系特别铁。曹雪芹的爷爷、父亲接连三代都担任江宁织造这个大官，掌管着整个江南的丝绸生产和贸易，富可敌国。", "曹雪芹就出生在这样一个富贵之家。小时候的曹雪芹可幸福了！他家的花园比公园还大，亭台楼阁、小桥流水，春天赏花、夏天乘凉、秋天赏月、冬天看雪。家里藏书万卷，他想看什么书就有什么书。仆人们前呼后拥地伺候着，他衣来伸手、饭来张口，整天在花园里和姐妹们一起玩耍、作诗、猜谜。", "可天有不测风云。曹雪芹十二岁那年，曹家因为牵扯到朝廷的政治斗争，被抄家了！官兵们冲进曹府，把金银财宝、古玩字画全都查抄一空。曹雪芹和家人们被赶出了大宅院，一夜之间从锦衣玉食的公子哥变成了身无分文的穷光蛋。", "曹家举家搬到了北京，住进了北京西郊一个破旧的小村庄里。四面透风的茅草屋，墙上的泥巴一块一块往下掉。冬天寒风从缝隙里钻进来，冷得像冰窖。曹雪芹一家饥一顿饱一顿，常常连粥都喝不上，只能喝点稀得能照见影子的米汤充饥。", "可就是在这样的困境里，曹雪芹拿起笔，开始写一部书。这部书讲的是一个大家族从兴盛到衰落的故事，里面有诗词歌赋，有人间冷暖，有悲欢离合。他把小时候在曹府里看到的一切——那些亭台楼阁、那些美丽聪慧的姐妹、那些热闹的节日宴会——都写进了书里。他一边写一边流泪，因为书里写的每一个字，都是他再也回不去的童年。", "写书可真不容易啊！曹雪芹没有钱买纸，就用别人用过的废纸、旧账本的背面来写。没有墨，就把锅底的黑灰刮下来兑水当墨。白天他要干活挣钱养家，只能晚上点起一盏昏暗的油灯，在豆大的灯火下伏案写作。寒冬腊月，他的手冻得裂开了口子，就用布条缠一缠继续写。夏天蚊子嗡嗡叫，他就把脚泡在水盆里，一边赶蚊子一边写。", "就这样苦写了十年，曹雪芹把书写完了，取名叫《石头记》。可惜他太穷了，连把书刻成木版印刷的钱都没有，只能靠朋友传抄。更令人痛心的是，曹雪芹写完书后没几年，就因为贫穷和病痛去世了，当时他的小儿子也夭折了，他走的时候孤苦伶仃，连口像样的棺材都买不起。", "可曹雪芹用生命写出来的这本书——《红楼梦》，后来成了中国文学史上最伟大的小说之一。无数人读它、研究它、讨论它，甚至形成了一门专门的学问叫「红学」！曹雪芹的故事告诉我们：富贵时不要得意，穷困时不要气馁。只要有才华和坚持，最苦的日子里也能开出最美的花！"], "yugongyishan": ["很久很久以前，在冀州的南边、河阳的北边，有两座又高又大的山——太行山和王屋山。两座山方圆七百里、高万丈，像两个巨大的巨人，挡住了去路。山脚下住着一位近九十岁的老汉，大家叫他愚公。每次出门，他都要绕一个超级大的弯儿，累得腰都直不起来。", "一天，愚公把全家人召集起来，认真地说：家人们，这两座山堵在家门口，出门太难了！我想和你们一起把山挖平，开出一条直通南方的大路，你们说怎么样？儿孙们听了，都兴奋地拍手说：好啊好啊！可是愚公的老伴却皱着眉头说：老头子，你都这把年纪了，连魁父那个小土丘都挖不动，还想挖太行王屋两座大山？挖出来的土石往哪儿放啊？", "大家商量了半天，最后决定把土石运到渤海边上。第二天一早就开工！愚公带着三个身强力壮的子孙，扛起锄头、挑起扁担，叮叮当当地挖起了山来。邻居家有个七八岁的小男孩，刚换完牙齿，也蹦蹦跳跳地跑来帮忙，一趟一趟地帮着搬运土石。", "从太行山到渤海，来回一趟要走大半年！寒来暑往，他们只穿着单衣去，穿着棉袄回，路上带的干粮早就吃完了，渴了就喝山泉水，饿了就啃野果子。可愚公从不气馁，他每天第一个拿起锄头，最后一个收工。他一边挖山一边对儿孙们说：别着急，一天挖一点，总有一天能挖完！", "有个叫智叟的老头看到了，忍不住哈哈大笑起来：愚公啊愚公，你可真是糊涂到家了！你都快要入土的人了，连山上的一根草都拔不掉，还想把整座山挖平？做梦呢吧！愚公放下锄头，捋了捋白花花的胡子，不慌不忙地说：智叟啊，你说得对，我是老了。可是我死了还有儿子，儿子死了还有孙子，子子孙孙无穷无尽。而山呢？不会长高也不会变粗，为什么挖不平呢？", "智叟被堵得哑口无言，摇着头走了。愚公擦了擦汗，又继续挥起锄头挖了起来。山神听到愚公的话，吓得心惊肉跳——这老头儿说的对啊，子子孙孙挖下去，总有一天山会被挖平的！他赶紧跑去报告了天帝。天帝被愚公的坚强毅力深深感动了，就派了两个力大无比的神仙，在一天夜里，把太行山和王屋山搬走了。", "第二天一早，愚公和儿孙们来到工地，惊讶地发现两座大山不见了！眼前是一马平川的大路，阳光洒在田野上，暖洋洋的。愚公哈哈大笑：老天爷也怕有心人呢！从此，大家出门再也不用绕远路了。愚公移山的故事告诉我们：看起来再难的事，只要你肯坚持，就一定能做成！"], "kuafuzhuuri": ["在远古的北方大地上，生活着一个巨人部落，他们的首领叫夸父。夸父的身材高得像一座小山，双臂有力得像两根大树干，双腿一迈就能跨过好几座山头。他最喜欢做的事，就是每天站在最高的山顶上，看着太阳从东边升起，慢慢划过天空，又落到西边。", "太阳啊太阳，你每天都从东方升起、西方落下，从不偷懒。可我呢？我跑得再快，也追不上你！夸父望着火红的太阳，心里突然冒出一个大胆的念头：我要追上太阳！我要好好看看它到底长什么样！", "第二天清晨，太阳刚从东海里探出红扑扑的脸蛋，夸父就迈开大步追了上去。他跑得像一阵风，呼——耳边全是风声，两旁的树木飞快地向后退去。他翻过了一座又一座高山，趟过了一条又一条大河，汗水像雨一样从身上哗哗地往下流。", "夸父越跑越快，越追越近。太阳越来越大了，红彤彤的，像一个大火球挂在天边。夸父能感觉到它灼热的温度，烤得他的皮肤火辣辣地疼。可他一点也不害怕，反而跑得更起劲了：等等我！太阳！我一定要追上你！", "跑了整整一天，夸父离太阳越来越近了。可是太阳的温度也越来越高了，像一个大熔炉，烤得夸父口干舌燥，喉咙像着了火一样。他实在太渴了，弯下腰，一口气喝干了黄河的水。黄河干了，可他还觉得渴，又跑到渭河边，把渭河的水也喝干了。", "两条大河的水都喝光了，可夸父还是渴得受不了。他想起北方有一片大泽，那里的水又清又甜，无边无际。他挣扎着朝北走去，可实在太累太渴了，两条腿像灌了铅一样沉重，每一步都无比艰难。走着走着，他的身体越来越虚弱，最后轰的一声倒在了地上。", "临死前，夸父用尽最后的力气，把手里的木杖扔了出去。木杖落在了一片荒凉的原野上，立刻变成了一片茂密的桃林。桃子又大又红，汁水饱满，给后来路过的人们解渴充饥。夸父虽然没能追上太阳，但他那勇敢追逐梦想的精神和留给后人的桃林，却世世代代被人们传颂。", "夸父逐日的故事告诉我们：有些目标也许很难实现，但只要勇敢地追逐过、努力过，这份勇气本身就闪闪发光，能照亮后来人前进的路！"], "jielaizhishi": ["春秋时期，齐国有一年遭遇了百年不遇的大旱灾。田里的庄稼全都枯死了，土地干裂得像乌龟壳，老百姓饿得面黄肌瘦，到处都有人饿倒在路边。这时候，齐国有一个叫黔敖的大财主，家里堆满了粮食。他想：我要是施舍点吃的，肯定能落个好名声！", "于是，黔敖在村口的大路边摆了一个粥摊，煮了满满几大锅热粥。他站在路边，伸长脖子等着饿肚子的人过来领粥。不一会儿，远处摇摇晃晃地走来一个饿汉。这人瘦得皮包骨头，衣服破破烂烂，脸上全是灰，脚上连鞋子都没有，走几步就要停下来喘口气，看起来已经好几天没吃过东西了。", "黔敖左手端着粥碗，右手盛了一大勺热粥，朝着那个饿汉大声吆喝道：喂！过来！来吃啊！他的语气高高在上，就像在呼唤一只流浪狗一样，眼睛斜着看人，嘴角满是不屑。那饿汉听了，脚步顿了顿，抬起头来看了黔敖一眼。", "饿汉站稳了身子，理了理破烂的衣领，挺直了腰板。他虽然饿得头晕眼花，但眼睛里却闪着倔强的光。他冷冷地看着黔敖，一字一顿地说：哼！我正是因为不吃这种无礼的施舍，才饿成这个样子的！", "黔敖一听，愣住了。他没想到一个饿得快要死的人，居然还敢这么硬气地跟他说话。黔敖的脸一下子涨红了，周围的围观者也都窃窃私语起来。黔敖有点后悔，连忙换了一副笑脸，端着粥碗走上前去道歉说：对不起对不起，是我态度不好，请别见怪，这碗粥您先喝了吧。", "可那饿汉挺起胸膛，坚决地摇了摇头，转过身去，一步一步艰难地走远了。他的背挺得直直的，虽然每走一步都摇摇欲坠，但头始终没有低下来。后来，这个饿汉再也没有出现在村口，人们都说他饿死在了路边。", "这个故事传遍了齐国，传遍了天下。孔子听说后，感慨地说：太刚烈了！宁可饿死，也不受侮辱！这就是气节啊！齐国的百姓们也都记住了这个故事，一代一代地讲下去。嗟来之食的故事告诉我们：人有尊严，有骨气，哪怕在最困难的时候，也不能丢掉做人的底线！"], "gebani": ["五百多年前，在波兰的托伦城，一个小男孩出生了，爸爸妈妈给他取名叫尼古拉·哥白尼。小哥白尼从小就喜欢趴在窗台上看星星。夏天的夜晚，满天繁星一闪一闪的，他一看就是大半夜，看得脖子都酸了也不肯走。妈妈喊他吃饭，他总是说：再等一下，我再数数那颗星星！", "哥白尼长大后在大学里学了很多知识。那时候，所有人都相信一个古老的观念：地球是宇宙的中心，太阳、月亮和星星都围着地球转。这个观念已经流传了一千多年，从来没有人怀疑过。课本上这么写，老师这么教，教会也这么说，所有人都觉得这是天经地义的事。", "可是哥白尼在学习中发现了一个大问题：按照地球是中心的理论，天上的星星运行的轨道得绕很多很多复杂的弯儿才能解释得通。就像你画一个圆画不好，得不停地修修改改。哥白尼皱起了眉头：难道大自然真的这么复杂吗？会不会……我们搞错了？", "这个念头一冒出来，就再也压不下去了。哥白尼开始废寝忘食地观察天空。每天晚上，他爬上教堂的塔楼，架起自己做的简陋仪器，仔细记录星星的位置。白天他困得眼皮直打架，可一到晚上就又精神百倍地爬上塔楼。手冻僵了就搓一搓，眼睛酸了就揉一揉，观察记录写了一摞又一摞。", "整整三十年的观察和计算之后，哥白尼大胆地提出了一个石破天惊的观点：根本不是太阳围着地球转，而是地球围着太阳转！所有的星星不动，是地球自己在转动！这个想法在当时简直是疯了！因为这意味着，教会和所有人信奉了一千多年的观念是错的！", "哥白尼很害怕，因为他知道这个观点一旦公布，肯定会遭到所有人的嘲笑和攻击。他身边的学者朋友劝他：你可千万别乱说，这话要是传出去，教会不会放过你的！哥白尼犹豫了很长时间，把手稿锁在箱子里，一锁就是二十多年。他一遍又一遍地核对数据，生怕自己算错了。", "直到他七十岁那年，生命快要走到尽头的时候，哥白尼终于下定了决心：真理不该被埋没！他把毕生研究写成了一本书，名叫《天体运行论》。当第一本印刷好的书送到他床前时，他已经病得说不出话了。他颤抖着摸了摸书的封面，嘴角露出了一丝微笑，第二天就安详地离开了人世。", "哥白尼的日心说后来被伽利略、开普勒等科学家证实和发展，彻底改变了人类对宇宙的认识。人们终于知道了：原来我们住的地球只是宇宙中一颗普通的行星，围着太阳转圈呢！哥白尼告诉我们：就算全世界都说你错了，只要有真凭实据，就要敢坚持——真理往往掌握在少数敢于思考的人手中！"], "baside": ["将近两百年前，在法国东部的小城多勒，一个叫路易·巴斯德的男孩出生了。他爸爸是个皮匠，天天跟动物皮打交道，家里穷得叮当响。小巴斯德并不聪明，学习成绩也只能算中等。但他有一个别人都比不上的优点——做什么事都特别认真，喜欢追根究底地问为什么。", "巴斯德长大后当了化学教授，整天泡在实验室里。那时候，人们有个大困惑：为什么牛奶放几天就会变酸变臭？为什么酒桶里的葡萄酒会变苦变酸？当时有人说这是因为空气里的「坏东西」跑进去了，可谁也说不清楚到底是什么。", "巴斯德决定把这个谜题解开。他拿来一瓶新鲜的牛奶，每天用显微镜观察。有一次他惊喜地发现：牛奶里有好多好多小东西在动！有的像小棍子，有的像小圆球，密密麻麻的！他赶紧叫来助手：你快来看！这些小家伙是什么？助手看了也惊呆了。", "巴斯德兴奋极了，他做了很多实验，终于证明：牛奶变酸、酒变苦，都是因为一种肉眼看不见的微生物在作怪！他发明了一种方法——把牛奶或酒加热到六十多度，保持一段时间，就能把那些捣乱的微生物杀死，同时又不会破坏牛奶的味道。这个方法就是著名的巴氏消毒法！全世界的牛奶厂到今天还在用呢！", "巴斯德的发现可不止这些。他后来研究了一种可怕的病——狂犬病。被疯狗咬到的人会发疯、怕水，最后痛苦地死去。那时候人们一听到狂犬病就吓得发抖。巴斯德下定决心要找到治疗的方法。他日日夜夜在实验室里研究，被感染的动物咬了也不怕，打了上百次疫苗实验。", "1885年的一天，一个叫约瑟夫的九岁小男孩被疯狗咬伤了，浑身是伤，被咬的地方有十四处！医生说他活不了几天了。绝望的妈妈抱着孩子找到了巴斯德，哭着跪在地上说：求求您救救我的孩子！巴斯德也很紧张，他研制的疫苗只在狗身上试验过，还从来没给人用过。万一失败了呢？", "可看着孩子痛苦的脸和妈妈期盼的眼神，巴斯德咬咬牙，做出了一个勇敢的决定。他颤抖着给约瑟夫注射了第一针疫苗。那一晚，他一夜没睡，守在孩子床边。一天、两天、三天……约瑟夫没有发病，活蹦乱跳地康复了！巴斯德激动得热泪盈眶，抱着孩子说：我们成功了！狂犬病可以治了！", "消息传遍了全世界，人们从四面八方跑来感谢巴斯德。为了纪念他的伟大贡献，人们建立了巴斯德研究所。巴斯德一生都在和看不见的敌人战斗，他让牛奶可以放心喝，让狂犬病不再可怕。他告诉我们：当你用科学为人类做好事的时候，再小的研究也能改变世界！"], "sunshuao": ["春秋时期，楚国有一个叫孙叔敖的小男孩。他活泼好动，聪明懂事，村里的老老小小都喜欢他。一天，小孙叔敖蹦蹦跳跳地跑到后山去玩耍。阳光暖暖地照在身上，山间的小路上开满了野花，小鸟叽叽喳喳地唱着歌，一切都是那么美好。", "突然，路边的草丛里传来一阵沙沙声。孙叔敖好奇地拨开草丛一看，吓得一屁股坐在了地上——一条浑身乌黑的大蛇正盘在那里，更吓人的是，它的头顶上竟然有两个脑袋！两个脑袋吐着红红的信子，四只绿幽幽的眼睛死死地盯着他。", "孙叔敖的心怦怦直跳，手脚都在发抖。他从小就听大人们说过：两头蛇是传说中的妖物，谁要是看到它，谁就活不过三天！他脑子里嗡的一声：完了完了，我就要死了！", "可他刚想转身逃跑，又突然停住了。他回头看了看那条蛇，心里冒出一个念头：如果我就这么跑了，别人要是再路过这里，看到了它，不也要白白丧命吗？不行！反正我都要死了，不如把这条蛇打死埋掉，不让它再害别人！", "孙叔敖深吸一口气，捡起路边一块大石头，用力朝两头蛇砸去。砰！一石头下去，蛇被砸晕了。他又捡起几块石头，一下接一下地砸，直到那条蛇一动也不动了。他虽然害怕得眼泪都快掉下来了，但手上的动作一点没停。", "然后，他在地上挖了一个深深的坑，把死蛇埋了进去，还用脚踩了踩土，把地面弄得平平整整的，确保谁也看不出来。做完这一切，他才擦了擦满脸的汗水和泪水，拖着沉重的脚步回了家。", "一进家门，孙叔敖扑到妈妈的怀里，哇地一声大哭起来：妈妈，我今天看到两头蛇了！我就要死了！可是……可是我已经把它打死了埋掉了，这样别人就不会再看到它了……妈妈你先让我跟您和爸爸道个别吧！妈妈听了，先是一惊，然后紧紧抱住他说：好孩子，你做得对！遇到危险还想到别人，像你这样的好心肠，老天爷是不会让你死的！", "果然，孙叔敖平安无事地长大了。后来他成了楚国的令尹（相当于宰相），他把国家治理得井井有条，楚国人人都爱戴他。孙叔敖杀两头蛇的故事，一直流传到了今天。它告诉我们：真正的勇敢，是在最害怕的时候，还能为别人着想！"], "donghu": ["春秋时期，晋国有一位了不起的史官叫董狐。史官是做什么的呢？就是专门为国家写历史的人。皇帝做了什么事、大臣说了什么话、国家打了什么仗，史官都要一笔一画地记下来，留给后人看。这可是个天大的重任！", "有一年，晋国出大事了。晋灵公是个残暴的国君，整天只知道吃喝玩乐。大臣赵盾实在看不下去了，就跑去劝谏，让国君好好治理国家。晋灵公不但不听，反而派刺客去暗杀赵盾。赵盾没办法，只好逃出了都城。", "没过多久，晋灵公被赵盾的族弟赵穿给杀了。晋国的大臣们把赵盾请回来继续当大臣。新国君问赵盾：赵穿杀了我父亲，你说该怎么处置他？赵盾叹了口气说：他造反杀了国君，按律法该杀！于是赵穿被处死了。事情到这里，看起来好像一切都有了交代。", "可是，董狐却做了一件所有人都没想到的事。他拿起笔，在晋国的史书上写下了一行字：赵盾弑其君！意思是说，杀国君的人是赵盾，不是赵穿。这一写，可把赵盾给吓坏了！", "赵盾赶紧跑去找董狐，着急地说：董大人，你怎么能这样写呢？杀国君的是赵穿，又不是我！我当时都逃到别的国家去了，根本不在场啊！你怎么能把杀国君的罪名安在我的头上呢？他的额头冒出了冷汗，握着董狐的手求他改一改。", "董狐不慌不忙地放下笔，看着赵盾的眼睛说：赵大人，您是晋国最重要的大臣。您虽然逃跑了，可您并没有逃出国境；您回来了，也没有处置杀国君的凶手。按照职责来说，国君被杀，您身为正卿，难道没有责任吗？我董狐写史书，只写真相！", "赵盾听了，哑口无言。他站在那里想了好久好久，最后叹了口气说：董狐说得对，我确实有责任……您写的是真话。周围的臣子们议论纷纷，有人觉得董狐太死板，可更多的人暗暗竖起了大拇指。", "孔子后来听说了这件事，非常敬佩地说：董狐，是古代的好史官啊！他坚持写真相，不偏不倚，不怕得罪人！这就是董狐直笔的故事。它告诉我们：无论做什么事，都要坚持说真话、写真相，哪怕会得罪人——真相永远比谎言更有力量！"], "zhaoshe": ["战国时期，赵国有一个叫赵奢的年轻人。他最开始做一个小小的田部吏，就是负责收田地税的小官。这官不大，管的事却不小——要一个一个地去跟老百姓收税，遇到有钱有势的人家，人家根本看不上他。", "这天，赵奢来到平原君家门口。平原君是谁啊？那可是赵国的丞相，赵王的亲弟弟，家里有钱有势，院子里楼阁层层，门口车马排得老长。平原君家的管事人斜着眼睛看着赵奢，没好气地说：收税？你知不知道这是谁的家？平原君家的地，还用得着交税？", "赵奢不慌不忙地从怀里掏出国君的诏令，大声说：国家的法令写得清清楚楚，不论是谁，种了地就得交税！平原君是大王的亲弟弟，更应该带头遵守法令！可那管事的把门一关，把赵奢晾在了门外。", "赵奢没有气馁，第二天又来了，第三天还来。平原君家的管事人火了，带着一群家丁堵在门口，推推搡搡就是不让他们进门。赵奢的随从劝他：算了吧，咱们得罪不起平原君啊！可赵奢想了想，攥紧了拳头说：不行！今天不把税收到，我就不配做这个田部吏！", "赵奢一咬牙，转身回到官府，叫来衙役，把平原君家那几个带头抗税的管事全抓了起来。按照赵国的法律，抗税不交，还聚众闹事，按律当斩！赵奢二话不说，依法将九个为首闹事的管事全部处斩。这一下，整个邯郸城都震动了！", "平原君听说后，气得暴跳如雷，拍着桌子吼道：一个小小的田部吏，竟敢杀我的人！他拔出剑就要去找赵奢算账。可走到门口，他忽然冷静了下来。仔细一想：赵奢秉公执法，不徇私情，这不正是治理国家最需要的人才吗？", "平原君收回了剑，整理好衣冠，亲自去见赵奢。他不但没有责备赵奢，反而拱手行礼说：赵大人，您依法办事，是我的人不对在先。您这样的人才，怎么能只做个收税的小官呢？他马上向赵王推荐了赵奢。", "赵王听了平原君的介绍，也十分欣赏赵奢的公正无私，封他做了管理全国赋税的大官。赵奢上任后，把赋税管得井井有条，老百姓缴税公平，国家富足了起来。后来，赵奢还成了赵国的大将军，在阏与之战中大败秦军！赵奢秉公执法的故事告诉我们：真正的公正，就是对所有人都一视同仁！"], "makeboluo": ["七百多年前，在意大利美丽的威尼斯城，有一个叫马可·波罗的小男孩。威尼斯是个水上城市，出门就要坐船，小马可最喜欢趴在桥上看来来往往的商船，听水手们讲远方国家的故事。蔚蓝的海水倒映着岸边的宫殿，远处的桅杆像森林一样密密麻麻。", "马可十七岁那年，他的父亲和叔叔从遥远的东方回来了。他们带回了许多稀奇古怪的东西：闪着光泽的丝绸、香气扑鼻的香料、晶莹剔透的瓷器。小马可听得眼睛都直了：爸爸，你们去的那个中国，真的有那么大、那么富饶吗？父亲摸着他的头说：百闻不如一见，孩子，你敢跟我们一起再去一次吗？", "马可毫不犹豫地点了点头。于是，十七岁的马可·波罗告别了妈妈，跟着父亲和叔叔踏上了前往中国的漫漫长路。他们坐了船，骑了骆驼，走了整整三年半！路上一会儿是热得像蒸笼的沙漠，白天沙子烫得脚底起泡，晚上又冷得像冰窖；一会儿是又高又陡的雪山，空气稀薄得喘不上气。", "一路上充满了危险。他们遇到过强盗，骆驼被抢走了好几匹；在沙漠里遇到过沙尘暴，漫天黄沙把太阳都遮住了，他们差点迷路；在翻越高山的时候，有同伴因为高原病倒下了，再也没有起来。可马可咬着牙坚持着，因为他心里一直想着：到了中国，就能看到最繁华的东方世界！", "1275年，马可·波罗终于到达了元朝的首都大都（今天的北京）。他被带到了元世祖忽必烈的面前。忽必烈看到这个蓝眼睛、黄头发的欧洲年轻人，觉得非常新奇。马可聪明好学，很快就学会了蒙古语和汉语，还把欧洲的见闻讲给忽必烈听。忽必烈非常喜欢他，封他做了官。", "马可在中国一住就是十七年！他到过许多地方：杭州西湖边杨柳依依，苏州小桥流水人家，成都的集市热闹非凡，泉州的港口帆樯林立。每次回到大都，他都要把沿途的见闻写成笔记。他惊叹中国的城市比欧洲的城市大十倍，纸币在市场上流通比金币还方便，还有那种能烧出黑色液体的石头（煤）——这些在欧洲人看来简直不可思议！", "1295年，离家二十四年的马可·波罗终于回到了威尼斯。他穿着破旧的衣服，敲开自己家的门，邻居们差点认不出他来。他把从中国带回来的珍宝摆出来，人们都惊呆了！后来他参加了一场战争被俘虏，在监狱里把自己的经历讲给狱友听，狱友把这些故事记下来，写成了一本书——《马可·波罗游记》。", "这本书一出版，整个欧洲都轰动了！人们争相传阅：什么？东方有一个叫中国的地方，那里的宫殿是金子做的，街道比欧洲的广场还宽？后来，哥伦布就是看了这本书，才下定决心向西航行去寻找中国，结果发现了新大陆！马可·波罗的故事告诉我们：世界那么大，勇敢走出去，你就能看到别人一辈子都看不到的风景！"], "gukaizhi": ["一千六百多年前的东晋，江南无锡出了一个叫顾恺之的人。他小时候就特别喜欢画画，别的小朋友在院子里追蝴蝶、玩泥巴，他却蹲在案前，拿着毛笔在纸上画个不停。画什么像什么，连大人都啧啧称奇：这孩子的手是怎么长的？", "但顾恺之这个人，不光画画厉害，还特别有趣。人们说他有三绝：才绝、画绝、痴绝。什么叫痴绝呢？就是傻得可爱，痴得离谱！有一次，朋友给他送来一筐甘蔗，别人都是从根部最甜的地方吃起，他偏从梢头最不甜的那头啃。朋友笑他傻，他嘿嘿一笑说：你们不懂，这叫渐入佳境——越吃越甜，人生也是这样！", "顾恺之画画的功夫，那可真是绝了。他画人物，不急着画眼睛，先把衣服、身形、背景都画好了，最后一笔才点眼睛。有人问他：为什么眼睛要最后画？他认真地说：四肢画得再好，也只是个躯壳；只有画上了眼睛，人物才能活起来！他把最后一笔点眼睛叫做传神写照。", "最有名的故事是他在瓦官寺画壁画。瓦官寺的和尚想筹钱修庙，顾恺之找上门来说：我来帮你们画一尊维摩诘像，画好了，第一天来参观的人每人捐十万钱！和尚们吓了一跳：十万？谁会花十万钱看一幅画啊？可顾恺之胸有成竹地笑了笑。", "他关起门来，在寺庙的白墙上画了整整一个月。画像快完成的时候，就差最后一笔——画眼睛。顾恺之选了一个好日子，把寺庙的大门打开，请百姓们进来参观。他站在高高的架子上，提起笔，屏住呼吸，在画像的眼睛上轻轻点了两下。", "奇迹发生了！那墙上的维摩诘像，瞬间好像活了过来。眼睛炯炯有神，目光温柔而深邃，好像正在看着每一个观众。围观的百姓们看得目瞪口呆，纷纷跪下来磕头，说菩萨显灵了！第一天，真的有人捐了十万钱，没过几天，一百万钱就凑齐了！寺庙的和尚笑得合不拢嘴。", "顾恺之最有名的画是《女史箴图》和《洛神赋图》。《洛神赋图》画的是曹植梦见洛水女神的故事，画中的洛神衣带飘飘，在碧波之上若隐若现，眼神里满是依依不舍的深情。这幅画就像一首诗、一首歌，把那种说不出的惆怅全都画了出来。后来的人都说：这是中国画史上最美的画之一！", "顾恺之一辈子都在画画，八十多岁了还拿着笔不肯放下。他不光自己画得好，还写了一本画论，教后人怎么画画。他告诉人们：画人要传神，画山要有气韵，画水要有流动感。他被称为中国画的祖师爷、画绝。顾恺之的故事告诉我们：真正了不起的本事，都来自心里那份挡不住的热爱！"], "guoziyi": ["唐朝有位了不起的大将军叫郭子仪。他平定安史之乱、收复长安洛阳，功劳大得不得了。可郭子仪和其他将军不一样——他从来不打骂士兵，对百姓也和和气气的，大家都亲切地叫他郭令公。", "公元765年，唐朝发生了一件大危机。回纥和吐蕃两个部落纠集了三十万大军，兵分几路向唐朝杀来。一时间烽烟四起，长安城里的老百姓都吓得收拾包袱准备逃命了。唐朝的皇帝急得团团转：三十万大军啊，这仗可怎么打？", "郭子仪这时候正驻守在泾阳，他手下一共才一万多人。面对三十万敌军，将领们个个愁眉苦脸。郭子仪的儿子郭晞急得直跺脚：父亲，敌人太多了，我们赶紧调兵来吧！可郭子仪捋着胡子，沉思了一会儿说：调兵来不及了，让我去见见回纥首领。", "什么？父亲您要去敌营？那是送死啊！郭晞急得脸都白了，冲上去拉住父亲的马缰绳：您可千万不能去！回纥人不讲信义，万一他们把您抓了或杀了怎么办？我们要去也要带五百精兵保护您！", "郭子仪摆了摆手，笑着说：带兵去反而坏事。回纥首领和我有老交情，我一个人去，坦诚相见，他们反而不会害我。如果真的带兵去，他们一看这架势，肯定觉得我是来打仗的，那就真打起来了！", "郭子仪脱下盔甲，只带了一个随从，骑着马就朝回纥大营奔去。快到营门时，他让随从大声通报：郭令公来了！回纥士兵一听，吓得赶紧跑进去报告。回纥首领药葛罗正在帐中喝酒，听到消息大吃一惊——他抓起弓箭就冲到营门口。", "郭子仪远远看到药葛罗，摘下头盔，把盔甲也脱了，把枪扔在地上，双手抱拳，微笑着大步走来：老朋友，多年不见，别来无恙啊？药葛罗一看郭子仪真的单枪匹马、毫无防备地来了，心里又是惊讶又是佩服——他扔掉弓箭，翻身下马，跪在地上给郭子仪行礼。", "郭子仪扶起药葛罗，拉着他的手说：你们回纥帮我们唐朝平定了安史之乱，是立了大功的！现在吐蕃是想利用你们占便宜。如果你们肯退兵，我郭子仪保证：唐朝和回纥永远是好朋友！药葛罗被郭子仪的诚意深深打动，当即下令退兵。吐蕃听说回纥退兵了，也只好撤走了。一场天大的危机，就这样被郭子仪一人一马化解了！"], "liubowen": ["元朝末年，天下大乱。在浙江青田的一个小山村里，有个叫刘基的读书人，人们都尊称他刘伯温。他不仅满肚子学问，还特别善于观察天象、分析人心。乡亲们都说：伯温先生抬头看天就知道明天刮什么风，低头看地就知道哪里藏着水，真是神了！", "刘伯温在元朝做过官，可他发现元朝的官场实在太腐败了——当官的只顾着搜刮老百姓，根本不管百姓的死活。他气得辞官回家，每天坐在自家院子里看书喝茶。可他心里一刻也没闲下来：这天下，迟早要变天啊！", "那时候，穷苦出身的朱元璋正带着起义军打天下。朱元璋听说了刘伯温的大名，派人带着厚礼去请他出山。刘伯温被朱元璋的诚心打动，跟着使者来到了应天府（今天的南京）。朱元璋一看刘伯温气度不凡，恭恭敬敬地请他坐下，请教天下大事。", "刘伯温不慌不忙地从袖子里掏出一张纸，上面密密麻麻写满了字。他对朱元璋说：我给您献上十八条计策。第一条：先打陈友谅，后打张士诚。陈友谅兵强马壮，但骄傲自大；张士诚兵弱胆小，不会趁火打劫。先收拾了最强的，剩下的就好办了！", "朱元璋听了连连点头。可他手下的大将们却不太服气：一个从山沟里来的书生，能懂什么打仗？可接下来的事情让所有人都惊呆了。朱元璋按照刘伯温的计策，果然在鄱阳湖大战中打败了陈友谅。战场上，刘伯温站在高台上眺望，突然脸色一变：主公不好！有埋伏！快换船！", "朱元璋半信半疑地换了船。刚换完不到一炷香的功夫，他原来的那艘帅船就被炮火打得粉碎！朱元璋吓得冷汗直冒，拉着刘伯温的手说：先生真是神人啊！原来刘伯温早就观察到敌军旗帜摆动的规律和风向的变化，判断出敌军要偷袭帅船。", "后来朱元璋平定天下、建立明朝，论功行赏的时候说：刘伯温是我的张良啊！他给刘伯温封了很高的官。可刘伯温知道自己性格耿直，不适合在朝廷里跟那些溜须拍马的人打交道。没过多久，他就
