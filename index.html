<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史绘本故事集</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #fff;
}
.container {
  text-align: center;
  padding: 2rem;
}
h1 {
  font-size: 1.8rem;
  margin-bottom: 1rem;
  background: linear-gradient(90deg, #e94560, #f5a623);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.spinner {
  width: 40px; height: 40px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #e94560;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 1.5rem auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
p { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
.error { color: #e94560; }
.manual-link {
  display: inline-block;
  margin-top: 1rem;
  padding: 0.6rem 1.5rem;
  background: #e94560;
  color: #fff;
  border-radius: 8px;
  text-decoration: none;
  font-size: 1rem;
}
.manual-link:hover { background: #d63851; }
</style>
</head>
<body>
<div class="container">
  <h1>📖 历史绘本故事集</h1>
  <div class="spinner"></div>
  <p id="status">正在连接故事服务器...</p>
  <div id="errorBox" style="display:none;margin-top:1rem;">
    <p class="error" id="errorMsg"></p>
    <a class="manual-link" id="manualLink" href="#" style="display:none;">点击直接访问</a>
  </div>
</div>
<script>
(function() {
  var statusEl = document.getElementById('status');
  var errorBox = document.getElementById('errorBox');
  var errorMsg = document.getElementById('errorMsg');
  var manualLink = document.getElementById('manualLink');

  function showError(msg, url) {
    statusEl.textContent = '';
    document.querySelector('.spinner').style.display = 'none';
    errorMsg.textContent = msg;
    errorBox.style.display = 'block';
    if (url) {
      manualLink.href = url;
      manualLink.style.display = 'inline-block';
    }
  }

  // Try to fetch tunnel URL
  fetch('tunnel_url.txt?t=' + Date.now(), { cache: 'no-store' })
    .then(function(r) {
      if (!r.ok) throw new Error('无法获取地址');
      return r.text();
    })
    .then(function(url) {
      url = url.trim();
      if (!url || !url.startsWith('https://')) {
        throw new Error('地址格式不正确');
      }
      // Verify the tunnel is reachable before redirecting
      statusEl.textContent = '正在跳转...';
      window.location.href = url + '/index.html';
      // Fallback: if redirect doesn't happen in 5s, show manual link
      setTimeout(function() {
        showError('自动跳转未成功，请点击下方按钮', url + '/index.html');
      }, 5000);
    })
    .catch(function(err) {
      // tunnel_url.txt not available, try GitHub Pages fallback
      showError('连接故事服务器失败，请稍后再试');
    });

  // Also try GitHub Pages direct content as fallback after 8 seconds
  setTimeout(function() {
    if (!window.location.href.includes('trycloudflare')) {
      // Still on redirect page, try direct access
      var directUrl = 'https://loveczycsy.github.io/story-book/stories.html';
    }
  }, 8000);
})();
</script>
</body>
</html>
